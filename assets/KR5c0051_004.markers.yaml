  - {type: variant, offset: 9277, length: 0, content: '', ZTDZ: 聖推拍輐斷與物宛轉舍是與非苟可以免不師智慮不知前後魏然而已矣推而後行曳而後往若飄風之還若羽之旋若磨石之隧全而無非動靜無過未嘗有罪是何故夫無知之物無建已之}
  - {type: page-break, offset: 9277, content: '', id: KR5c0051_SJB_004-110631b}
  - {type: variant, offset: 9278, length: 0, content: '', ZTDZ: 無用知之累動靜不離於理是以終身無譽故曰至於若無知之物而已無用賢聖夫瑰不失道豪桀相與笑之曰愼到之道非生人之行而至死人之理適得怪焉田駢亦然學於彭蒙得不教焉彭蒙之師曰古之道人至於莫之是莫之非而已矣其風窢然惡可而言常反人不聚觀而不免於魭斷其所謂道非道而所言之韙不免於非彭蒙田駢愼到不知道雖然槩乎皆嘗有聞者也以本爲精以物爲粗以有積爲不足澹然獨與神明居古之道術有在於是者關尹老聃聞其風而悦之建之以常無有主之以太一以濡弱謙下爲表以空虚不毁萬物爲實關尹曰在己無居形物自著其動若水其靜若鏡其應若響芴乎若亡寂乎若清同焉者和得焉}
