  - {type: variant, offset: 2049, length: 0, content: '', ZTDZ: 予蜩甲也蛇蜕也似之而非也火與日吾屯也陰與夜吾代也彼吾所以有待邪而況乎以有待者乎彼來則我與之來彼往則我與之往彼彊陽則我與之彊陽彊陽者又何以有問乎陽子居南之沛老聃西遊於秦邀於郊至於梁而遇老子老子中道仰天而歎曰始以汝爲可教今不可也陽子居不荅至舍進盥潄巾櫛脱履户外膝行而前曰向者弟子欲請夫子夫子行不間是以不敢今間矣請問其過老子曰而睢睢盱盱而誰與居大白若辱盛德若不足陽子居蹴然變容曰敬聞命矣其往也舍者迎將其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣雜篇讓王第二十八堯以天下讓許由許由不受又讓於子州支父子州支父曰以我爲天子猶之可也雖然我適有幽憂之病方且治之未暇治天下也夫天下至重也而不以害其}
  - {type: page-break, offset: 2049, content: '', id: KR5c0051_SJB_004-110620a}
  - {type: variant, offset: 2050, length: 1, content: 同, ZTDZ: 又況他物乎唯無以天下爲者可以託天下也舜讓天下於子州支伯子州支伯曰予適有幽憂之病方且治之未暇治天下也故天下大器也而不以易生此有道者之所以異乎俗者也舜以天下讓善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種形足以勞動秋收斂身足以休食日出而作日入而息逍遥於天地之間而心意自得吾何以天下爲哉悲夫子之不知余也遂不受於是去而入深山莫知其處舜以天下讓其友石户之農石户之農曰捲捲乎后之爲人葆力之士也以舜之德爲未至也於是夫負妻戴携子以入海終身不反也大王亶父居邠狄人攻之事之以皮帛而不受事之以大馬而不受事之以珠玉而不受狄人之所求者土地也大王亶父曰與人之兄居而殺其弟與人之父居而殺其子吾不忍也子皆勉居矣爲吾臣與爲狄人臣奚以異且吾聞之不以所用養害所養因杖筴而去之民相連而從之遂成國於岐山之下夫大王亶父可謂能尊生矣能尊生者雖貴富不以養傷身雖貧賤不以利累形今世之人居高官尊爵者皆重失之見利輕亡其身豈不惑哉越人三世弑其君王子搜患之逃乎丹穴而越國無君求王子搜不得從之丹穴王子搜不肯出越人薰之以艾乘以玉輿王子搜援綏登車仰天而呼曰君乎君乎獨不可以舍我乎王子搜非惡爲君也惡爲君之患也若王子搜者可謂不以國傷生矣此固越人之所欲得爲君也韓魏相與爭侵地子華子見昭僖侯昭僖侯有憂色子華子曰今使天下書銘於君之前書之言曰左手攫之則右手廢右手攫之則左手廢然而攫之者必有天下君能攫之乎昭僖侯曰寡人不攫也子華子曰甚善自是觀之兩臂重於天下也身亦重於兩臂韓之輕於天下亦遠矣今之所爭者其輕於韓又遠君固愁身傷生以憂戚不得也僖侯曰善哉教寡人者衆矣未嘗得聞此言也子華子可謂知輕重矣魯君聞顔闔得道之人也使人以幣先}
  - {type: page-break, offset: 2050, content: '', id: KR5c0051_SJB_004-110620b}
  - {type: page-break, offset: 2050, content: '', id: KR5c0051_SJB_004-110620c}
  - {type: variant, offset: 2052, length: 0, content: '', ZTDZ: 顔闔守陋閶直布之衣而自飯牛魯君之使者至顔闔自對之使者曰此顔闔之家與顔闔對曰此闔之家也使者致幣顔闔對曰恐聽者謬而遺使者罪不若審之使者還反審之復來求之則不得已故若顔闔者眞惡富貴也故曰道之眞以治身其緒餘以爲國家其土苴以治天下由此觀之帝王之功聖人之餘事也非所以完身養生也今世俗之君子多危身棄生以殉物豈不悲哉凡聖人之動作也必察其所以之與其所以爲今且有人於此以隨使之珠彈千仞之雀世必笑之是何也則其所用者重而所要者輕也夫生者豈特隨侯之重哉子列子窮容貌有飢色客有言之於鄭子陽者曰列御寇蓋有道之士也居君之國而窮君無乃爲不好士乎鄭子陽即令官遺之粟子列子見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞爲有道者之妻子}
  - {type: page-break, offset: 2052, content: '', id: KR5c0051_SJB_004-110621a}
  - {type: variant, offset: 2054, length: 0, content: '', ZTDZ: 佚樂今有飢色君過}
  - {type: variant, offset: 2055, length: 0, content: '', ZTDZ: 遺先生食先生不受豈不命邪子列子笑謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽楚昭王失國屠羊說走而從於昭王昭王反國將賞從者及屠羊說屠羊說曰大王失國說失屠羊大王反國說亦反屠羊臣之爵禄已復矣又何賞之有王曰强之屠羊說曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見之屠羊說曰楚國之法必有重賞大功而後得見今臣之知不足以存國而勇不足以死寇吴軍入郢說畏難而避寇非故隨大王也今大王欲廢法毁約而見說此非臣之所以聞於天下也王謂司馬子綦曰屠羊說居處卑賤而陳義甚高子其爲我延之以三旌之位屠羊說曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之禄吾知其富於屠羊之利也然豈可以貪爵禄而使吾君有妄施之名乎說不敢當願復反吾屠羊之肆遂不受也原憲居魯環堵之室茨以生草蓬户不完桑以爲樞而甕牖二室褐以爲塞上漏下濕匡坐而弦子貢乘大馬中紺而表素軒車不容巷往見原憲原憲華冠縱履杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色原憲笑曰夫希世而行比周而友學以爲人教以爲己仁義之慝輿馬之飾憲不忍爲也曾子居於衛緼袍無表顔色腫噲手足胼胝三日不舉火十年不製衣正冠而纓絶捉衿而肘見納履而踵决曳縱而歌商頌聲若出金石天子不得臣諸侯不得友故養志者忘形養形者忘利致道者忘心矣孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畒足以給飦粥郭内之田十畝足以爲絲麻鼓琴足以自娛所學夫子之道足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自累也審自得者失之而不懼行修於内者無位而不怍丘誦之乆矣今於回而後見之是丘之得也中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下柰何瞻子曰重生重生則利輕中山公子牟曰雖知之未能自胜也瞻子曰不能自勝則從神無惡乎不能自勝而强不從者此之謂重傷重傷之人無壽類矣魏牟萬乘之公子也其隱巖穴也難爲於布衣之士雖未至乎道可謂有其意矣孔子窮於陳蔡之間七日不火食藜羹不糝顔色甚憊而弦歌於室顔回擇菜子路子貢相與言曰夫子再逐於魯削迹於衛伐樹於宋窮於商周圍於陳蔡殺夫子者無罪藉夫子者無禁弦歌鼓琴未嘗絶音君子之無恥也若此乎顔回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而來吾語之子路子貢入子路曰如此者可謂窮矣孔子曰是何言也君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之爲故自省而不窮於道臨難而不失其德天寒旣至霜雪旣降吾是以知松栢之茂也陳蔡之隘於丘其幸乎孔子削然反琴而弦歌子路扢然執干而舞子貢曰吾不知天之高也地之下也古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通爲寒暑風雨之序矣故許由娛於潁陽而共伯得乎丘首舜以天下讓其友北人無擇北人無擇曰異哉后之爲人也居於畎畝之中而遊堯之門不若是而已又欲以其辱行漫我吾羞見之因自投清冷之淵湯將伐桀因卞隨而謀卞隨曰非吾事也湯曰孰可曰吾不知也湯又因務光而謀務光曰非吾事也湯曰孰可曰吾不知也湯曰伊尹何如曰强力忍垢吾}
  - {type: page-break, offset: 2055, content: '', id: KR5c0051_SJB_004-110621b}
  - {type: page-break, offset: 2055, content: '', id: KR5c0051_SJB_004-110621c}
  - {type: page-break, offset: 2055, content: '', id: KR5c0051_SJB_004-110622a}
  - {type: page-break, offset: 2055, content: '', id: KR5c0051_SJB_004-110622b}
  - {type: variant, offset: 2058, length: 0, content: '', ZTDZ: 他也湯遂與伊尹謀伐桀尅之以讓卞隨卞隨辭曰后之伐桀也謀乎我必以我爲賊也勝桀而讓我必我爲貪也吾生乎亂世而無道之人再來漫我以其辱行吾不忍數聞也乃自投稠水而死湯又讓務光曰知者謀之武者遂之仁者居之古之道也吾子胡不立乎務光辭曰廢上非義也殺民非仁也人犯其難我享其利非廉也吾聞之曰非其義者不受其禄無道之世不踐其土況尊我乎吾不忍乆見也乃負石而自沈於廬水昔周之興有士二人處於孤竹曰伯夷叔齊二人相謂曰吾聞西方有人似有道者試往觀焉至於岐陽武王聞之使叔旦往見之與盟曰加富二等就官一列血牲而埋之二人相視而笑曰嘻異哉此非吾}
  - {type: variant, offset: 2059, length: 4, content: 以得夫物, ZTDZ: 謂道也昔者神農之}
  - {type: punctuation, offset: 2061, content: (, id: KR5c0051_krp_004-bkkpn184}
  - {type: variant, offset: 2061, length: 85, content: 夫物有常然任而不則泯然自得而不自覺也屈崔本作詘折之反謂屈折支體爲禮樂也呴况於反李况付反本又作傴於禹反俞音李音喻本又作呴音詡謂呴喻顔色爲仁義之貌纆音墨廣雅云索也索悉各反下同, HFL: ''}
  - {type: punctuation, offset: 2062, content: /, id: KR5c0051_krp_004-bkkpn185}
  - {type: punctuation, offset: 2063, content: ), id: KR5c0051_krp_004-bkkpn186}
