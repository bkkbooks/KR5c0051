  - {type: variant, offset: 3, length: 7, content: 玄註陸德明音義, ZTDZ: 狂惡來死桀紂亡人生莫不欲其臣之忠而忠未必信故伍員流于江萇弘死于蜀藏其血三年而化爲碧人親莫不欲其子之孝而孝未必愛故孝己憂而曾參悲木與木相摩則然金與火相守則流陰陽錯行則天地大絯於是乎有雷有霆水中有火乃焚大槐有甚憂兩陷而無所逃螴蜳不得成心若縣於天地之間慰暋沈屯利害相摩生火甚多衆人焚和月固不勝火於是乎有僓然而道盡}
  - {type: substitution, offset: 4, original: 註, replacement: 注, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16785}}
