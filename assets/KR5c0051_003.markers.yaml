  - {type: line-break, offset: 3208, content: '', id: KR5c0051_SBCK_003-11b01}
  - {type: punctuation, offset: 3208, content: (, id: KR5c0051_krp_003-bkkpn419}
  - {type: variant, offset: 3210, length: 102, content: 於死爲存於死爲存則何時而非存哉善天善老善始善終人猶效之此自均於百年之內不善少而否老禾能體變化齊死生也然其平粹猶足以師人也善夭崔本作狡同古卯反本又作天於表反簡文於橋反云異也少詩照反否音鄙本亦作鄙粹雖遂反又況, ZTDZ: 達}
  - {type: substitution, offset: 3212, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: substitution, offset: 3216, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: punctuation, offset: 3217, content: /, id: KR5c0051_krp_003-bkkpn420}
  - {type: punctuation, offset: 3225, content: ), id: KR5c0051_krp_003-bkkpn421}
  - {type: variant, offset: 3226, length: 1, content: 天, HFL: 夭}
  - {type: 'kr:newline', offset: 3233, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl139}
  - {type: line-break, offset: 3233, content: '', id: KR5c0051_SBCK_003-11b02}
  - {type: punctuation, offset: 3237, content: (, id: KR5c0051_krp_003-bkkpn422}
  - {type: variant, offset: 3237, length: 73, content: 此自均於百年之內不善少而否老禾能體變化齊死生也然其平粹猶足以師人也善夭崔本作狡同古卯反本又作天於表反簡文於橋反云異也少詩照反否音鄙本亦作鄙粹雖遂反, HFL: ''}
