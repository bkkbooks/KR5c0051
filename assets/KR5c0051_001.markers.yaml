  - {type: variant, offset: 17032, length: 2426, content: 之自爲故馳萬物而不窮也死生無變於已與變爲體故死生若一而況利害之端乎況利害於死生愈不足以介意瞿鵲子問乎長梧子曰吾聞諸夫子聖人不從事於務務自來而理自應耳非從而事之也瞿其倶反長梧子李云居長梧下因以爲名崔云名丘簡文云長梧封人也夫子向云瞿鵲之師不就利不違害任而直前無所避就不喜求求之不喜直取不怒不緣道獨至者也無謂有謂有謂無謂凡有稱謂者皆非吾所謂也彼各自謂耳故無彼有謂而有此無謂也稱尺正反下放此而遊乎塵垢之外凡非眞性皆塵垢也而遊崔本作而施夫子以爲孟浪之言而我以爲妙道之行也吾子以爲奚若長梧子曰是黃帝之所聽熒也而丘也何足以知之且女亦大早計見而求時夜見彈而求鴞炙夫物有自然理有至極循而直往則然自合非所言也故言之者孟浪而聞之者聽熒雖復黃帝猶不能使萬物無懷而聽熒至竟故聖人付當於塵垢之外而玄合乎視聽之表照之以天而不逆計放之自爾而不推明也今瞿鵲子方聞孟浪之言而便以爲妙道之行斯亦無異見而責司晨之功見彈而求鴞炙之實也夫不能安時處順而探變求化當生而慮死執是以辯非皆逆計之徒也孟如字徐武黨反或武葬反浪如字徐力蕩反向云孟浪音漫瀾無所趣舎之謂李云猶較畧也崔云不精要之貌行如字又下孟反黃帝本又作黃帝聽勑定反熒音瑩磨之瑩本亦作瑩於拘反向司馬云聽熒疑惑也李云不光明貌崔云小明不大了也向崔本作榮女音汝下同大音太徐李勑佐反注同時夜崔云時夜司夜謂雞也彈徒旦反鴞于驕反司馬云小鳩可炙毛詩草木䟽云大如班鳩緑色其肉甚美復扶又反下皆同下章注亦凖此予嘗爲女妄言之言之則孟浪也故試妄言之爲于僞反女以妄聽之奚若正聽妄言復爲大早計也故亦妄聽之何旁日月挾宇宙以死生爲晝夜旁日月之喻也以萬物爲一體挾宇宙之譬也旁薄葬反徐扶葬反司馬云依也崔本作謗挾戸牒反崔本作扶宇宙治救反尸子云天地四方曰宇往古來今曰宙文云舟輿所極覆曰宙爲其䐇合置其滑涽以相尊以有所賤故尊卑生焉而滑涽紛亂莫之能正各自是於一方矣故爲䐇然自合之道莫若置之勿言委之自爾也䐇然無際之謂也䐇本或作郭音泯徐武軫反李載枌反無波際之貌司馬云合也向音脣云若脣之相合也滑徐古没反亂也向本作汨音同崔戸八反云栝口木也涽徐音昏向云泪昏未定之謂崔本作緍武巾反云繩也衆人役役馳騖於是非之境也聖人愚芚芚然無知而直往之貌芚徐徒奔反郭治本反司馬云渾屯不分察也崔云厚貌也或云束也李丑倫反參萬歲而一成純純者不雜者也夫舉萬歲而參其變而衆人謂之雜矣故役役然勞形心而去彼就此唯大聖無執故芚然直往而與變化爲一一變化而常遊於獨者也故雖參糅億載千殊萬異道行之而成則古今一成也物謂之而然則萬物一然也之艾封人之子也晉國之始得之也涕泣沾及其至於王所與王同筐牀食芻豢而後悔其泣也一生之內情變若此當此之日則不知彼况夫死生之變惡能相知哉至於王所崔云六國時諸侯僣稱王因此謂獻公爲王也筐本亦作匡徐起狂反牀徐音床司馬云筐牀安牀也崔云筐方也一云正牀也予惡乎知夫死者不悔其始之蘄生乎蘄求也蘄音祈夢飮酒者旦而哭泣夢哭泣者旦而田獵此寤寐之事變也事苟變情亦異則死生之願不得同矣故生時樂生則死時樂死矣死生雖異其於各得所惡烏路反丘也與女皆夢也未能忘言而神解故非大覺也解音蟹下同予謂女夢亦夢也即復夢中之占夢也夫是以爲夢猶未寤也況竊竊然自以爲覺哉是其言也其名爲弔詭夫非常之談故非常人之所知故謂之弔當卓詭而不識其懸解弔如字音的至也詭九委反異也萬世之後而一遇大聖知其解者是旦暮遇之也言能蛻然無係而玄同死生者至希也解音蟹徐戶解反蛻音帨又始銳反旣使我與若辯矣若勝我我不若勝若果是也我果非也邪我勝若若不吾勝我果是也而果非也邪若而皆汝也其或是也其或非也邪其倶是也其倶非也邪我與若不能相知也則人固受其黮闇吾誰使正之不知而後推不見而後辯辯之而不足以自信以其與物對也辯對終日黮闇至竟莫能正之故當付之自正耳黮闇貪闇反李云黮闇不明貌使同乎若者正之旣與若同矣惡能正之使同乎我者正之旣同乎我矣惡能正之同故是之未足信也惡音烏下皆同使異乎我與若者正之旣異乎我與若矣惡能正之異故相非耳亦不足據使同乎我與若者正之旣同乎我與若矣惡能正之是若果是則天下不得復有非之者也非若信非則亦無缘復有是之者也今是其所同而非其所異異同旣具而是非無主故夫是非者生於好辯而休乎天均付之兩行而息乎自正也然則我與若與人俱不能相知也而待彼也邪各自正耳待彼不足以正此則天下莫能相正也故付之自正而至矣何謂和之以天倪天倪者自然之分也和如字崔胡臥反天倪李音崔徐音詣郭音五底反李云分也崔云或作霓音同際也班固曰天研曰是不是然不然是若果是也則是之異乎不是也亦無辯然若果然也則然之異乎不然也亦無辯是非然否彼我更對故無辨無辨故和之以天倪安其自然之分而巳不待彼以正此化聲之相待若其不相待是非之辯爲化聲夫化聲之相待俱不足以相正故若不相待也和之以天倪因之以曼所以窮年也和之以自然之分任其無極之化尋斯以往則是非之境自泯而性命之致自窮也曼徐音萬郭武半反徐以戰反司馬云曼無極也忘年忘義振於無竟故寓諸無竟夫忘年故玄同死生忘義故彌貫是非是非死生蕩而爲一斯至理也至理暢於無極故之者不得有窮也振如字崔云止也又之忍反竟如字極也崔作境罔兩問景曰曩子行今子止曩子坐今子起何其無特操與罔兩景外之微隂也罔兩向云景之景也崔本作罔浪云有無之狀景映永反又如字本或作影俗也徐乃蕩反李云曏者也無特本或作持崔云特辭也向云無特者行止無常也與音餘景曰吾有待而然者邪言天機自爾坐起無待無待而獨得者孰知其故而貴其所以哉吾所待又有待而然者邪若責其所待而尋其所由則尋責無極卒至於無待而獨化之理明矣吾待蛇蚹蜩翼邪若待蛇蚹蜩翼則無持操之所由未爲難識也今所以不識正由不待斯而獨化故耳蛇蚹音附徐又音敷司馬云謂蛇腹下齟齬可以行者也齟音士女反齬音魚女反蜩音條惡識所以然惡識所以不然世或謂罔兩待景景待形形待造物者請問夫造物者有邪無邪無也則胡能造物哉有也則不足以物衆形故明乎衆形之自物而後始可與言造物耳是以渉有物之域雖復罔兩未有不獨化於玄冥者也故造化者無主而物各自造物各自造而無所待焉此天地之正也故彼我相因形景俱生雖復玄合而非待也明斯理也將使萬物各反所宗於體中而不待乎外外無所謝而內無所矜是以, ZTDZ: ''}
