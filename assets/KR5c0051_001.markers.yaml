  - {type: variant, offset: 5430, length: 3, content: 假文屨, ZTDZ: 汝言其大略吾師乎吾師乎𩐎萬物而不爲義澤及萬世而不爲仁長於上古而不爲老覆載天地刻彫衆形而不爲巧此所遊已顔回曰回益矣仲尼曰何謂也曰回忘仁義矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也它日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹴然曰何謂坐忘顔回曰墮肢體黜聰明離形去知同於大通此謂坐忘仲尼曰同則無好也化則無常也而果其賢乎丘也請從而後也子輿與子桑友而淋雨十日子輿曰子桑殆病矣裹飯而往食之至子桑之門則若歌若哭鼓琴曰父邪母邪天乎人乎有不任其聲而趨舉其詩焉子輿入曰子之歌詩何故若是曰吾思}
  - {type: variant, offset: 5434, length: 0, content: '', ZTDZ: 使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其爲之者而不得也然而至此極者命也夫內篇應帝王第七齧缺問於王倪四問而四不}
  - {type: variant, offset: 5435, length: 3, content: 音智註, ZTDZ: 齧缺因躍而大喜行以告蒲衣子蒲衣子曰而乃今}
