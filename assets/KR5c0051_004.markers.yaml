  - {type: punctuation, offset: 15705, content: /, id: KR5c0051_krp_004-bkkpn1534}
  - {type: variant, offset: 15720, length: 349, content: 我矣安得而不自困哉而欲爲人之國者此攬乎三王之利而不見其患者也夫欲爲人之國者不因衆之自爲而以巳爲之者此爲徒求三王主物之利而不見巳爲之患也然則三王之所以利豈爲之哉因天下之自爲而任耳攬音覽本亦作覽此以人之國僥倖也幾何僥倖而不䘮人之國乎無萬分之一而䘮人之國也一不成而萬有餘䘮矣與天下相因而成者也今以一巳而專制天下則天下塞矣巳豈通哉故一身旣不成而萬方有餘䘮矣僥古堯反徐古了反字或作徼倖音幸一云僥倖求利不止之貌幾居豈反郭巨幾反䘮息浪反下及注同分如字又扶問反悲夫有土者之不知也夫有土者有大物也有大物者不可以物物不能用物而爲物用即是物耳豈能物物哉不能物物則不足以有大物矣而不物故能物物夫用物者不爲物用也不爲物用斯不物矣不物故物天下之物使各自得也明乎物物者之非物也豈獨治天下百姓而已哉出入六合遊乎九州用天下之自爲故馳, ZTDZ: ''}
