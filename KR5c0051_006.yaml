body:
  text: 郭象子玄注陸德明音義莊子外篇刻意第十五音義曰以義名篇刻意尚行離世異俗高論怨誹為亢而巳矣此山谷之士非世之人枯槁赴淵者之所好也語仁義忠信恭儉推讓為修而巳矣此平世之士教誨之人遊居學者之所好也語大功立大名禮君臣正上下為治而巳矣此朝廷之士尊主彊國之人致功并兼者之所好也就藪澤處閒曠釣魚閒處無為而巳矣此江海之士避世之人閒暇者之所好也吹詬呼吸吐故納新熊經鳥申為壽而巳矣此道引之士養形之人彭祖壽考者之所好也此數子者所好不同恣其所好各之其方亦所以為逍遙也然此僅各自得焉能靡所不樹哉若夫使萬物各得其分而不自失者故當付之無所執為也刻意司馬云刻削也峻其意也案謂削意令峻也廣雅云意志也行下孟反離力智反論力困反怨誹非謂反徐音非李云非世無道怨巳不遇也亢苦浪反李云窮高曰亢稿苦老反赴淵司馬云枯槁若鮑焦介推赴淵若申徒狄好呼報反下及注皆同治直吏反下同朝直遙反藪素口反閒音間下同釣本或作魡同雕呌反詬况于反字亦作喣吸許及反吐故納新李云吐故氣納新氣也熊經如字李古定反司馬云若熊之攀樹而引氣也鳥申如字郭音信司馬云若鳥之嚬呻也道引音導下同李云導氣令和引體令柔數所主反僅其靳反焉於䖍反若夫不刻意而高無仁義而修無功名而治無江海而閒不道引而壽所謂自然無不忘也無不有也忘故能有若有之則不能救其忘矣故有者非有之而有也忘而有之也淡然無極而衆美從之若厲巳以為之則不能無極而衆惡生淡大暫反徐音談然一本作淡而此天地之道聖人之德也不為萬物而萬物自生者天地也不為百行而百行目成者聖人也行下孟反下及篇末百行同故曰夫恬惔寂漠虛無無為此天地之平而道德之質也非夫寂漠無為也則危其平而喪其質也惔大暫反徐音談下皆同質正也喪息浪反下同故曰聖人休休焉則平易矣休乎恬惔寂漠息平虛無無為則雖歷乎險阻之變常平夷而無難休虛求反息也下及注同易以䜴反下及注皆同難乃旦反下同平易則恬惔矣患難生於有為有為亦生於患難故平易恬惔交相成也平易恬惔則憂患不能入邪氣不能襲泯然與正理俱往邪似嗟反下同故其德全而神不虧夫不平不惔者豈唯傷其形哉神德並喪於內也故曰聖人之生也天行任自然而運動其死也物化蛻然無所係蛻音帨又始鋭反靜而與隂同德動而與陽同波動靜無心而付之隂陽也不為福先不為禍始感而後應無所唱也迫而後動㑹至乃動不得巳而後起任理而起吾不得巳也去知與故循天之理天理自然知故無為乎其間去起吕反故無天災災生於違天無物纍纍生逆物無人非與人同者衆必是焉無責同於自得故無責其生若浮其死若休泛然無所惜也不思慮付之天理不豫謀理至而應光矣而不耀用天下之自光非吾耀也信矣而不期用天下之自信非吾期也其寢不夢其覺無憂其神純粹一無所欲覺古孝反粹雖遂反其魂不罷有欲乃疲罷音皮虛無恬惔乃合天德乃與天地合恬惔之德也故曰悲樂者德之邪喜怒者道之過好惡者德之失故心不憂樂德之至也至德常適故情無所槩樂音洛下同惡烏路反一而不變靜之至也靜而一者不可變也無所於忤虛之至也其心豁然盡乃無纎介之違忤五故反苦角反介音界不與物交淡之至也物自來耳至淡者無交物之情無所於逆粹之至也若雜乎濁欲則有所不順故曰形勞而不休則弊精用而不巳則勞勞則竭物皆有當不可失也水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也象天德者無心而階㑹也故曰純粹而不雜無非至當之事也靜一而不變常在當上住淡而無為與㑹俱而巳矣動而以天行若夫逐欲而動人行也此養神之道也夫有干越之劒者柙而藏之不敢用也寶之至也况敢輕用其神乎干越之劒司馬云干吳也吳越出善劒也季云干溪越山出名劒案吳有溪名干溪越有山名若耶並出善鐡鑄為名劒也柙戶甲反精神四逹並流無所不極上際於天下蟠於地夫體天地之極應萬物之數以為精神者故若是矣若是而有落天地之功者任天行耳非輕用也蟠音盤郭音煩化育萬物不可為象所育無方其名為同帝同天帝之不為純素之道唯神是守守而勿失與神為一常以純素守乎至寂而不蕩於外則冥也一之精通合于天倫精者物之真也野語有之曰衆人重利廉士重名賢士尚志聖人貴精與神為一非守神也不遠其精非貴精也然其迹則貴守之也故素也者謂其無所與雜也純也者謂其不虧其神也苟以不虧為純則雖百行同舉萬變參備乃至純也苟以不雜為素則雖龍章鳳姿倩乎有非常之觀乃至素也若不能保其自然之質而雜乎外飾則雖犬羊之鞹庸得謂之純素哉倩七練反觀古喚反苦郭反能體純素謂之真人莊子外篇繕性第十六音義曰以義名篇繕性於俗俗學以求復其初巳治性於俗矣而欲以俗學復性命之本所以求者愈非其道也繕善戰反崔云治也或云善也性性本也滑欲於俗思以求致其明巳亂其心於欲而方復役思以求明思之愈精失之愈遠滑音骨亂也崔云治也思李息吏反注役思同復扶又反下無復雖復同謂之蔽蒙之民若夫發者必離俗去欲而後幾焉離力智反下文同去起吕反古之治道者以恬養知恬靜而後知不蕩知不蕩而性不失也治始字又直吏反知音智下以意求之生而無以知為也謂之以知養恬大無以知為而任其自知則雖知周萬物而恬然自得也知與恬交相養而和理出其性知而非為則無害於恬恬而自為則無傷於知斯可謂交相養矣二者交相養則和理之分豈出他哉夫德和也道理也和故無不得道故無不理德無不容仁也無不容者非為仁也而仁迹行焉道無不理義也無不理者非為義也而義功著焉義明而物親忠也若夫義明而不由忠則物愈踈中純實而反乎情樂也仁義發中而還任本懷則志得矣志得矣其迹則樂也樂音洛注同信行容體而順乎文禮也信行容體而順乎自然之節文者其迹則禮也行下孟反注同下以行小行注行者行立皆放此禮樂遍行則天下亂矣以一體之所履一志之所樂行之天下則一方得而萬方失也遍音遍彼正而蒙已德德則不冒冒則物必失其性也各正性命而自蒙巳德則不以此冒彼也若以此冒彼安得不失其性哉冒莫報反崔云覆也古之人在混芒之中與一世而得淡漠焉當是時也隂陽和靜神不擾四時得節萬物不傷羣生不夭人雖有知無所用之任其自然而巳混胡本反芒莫剛反崔云混混芒芒未分時也徒暫反此之謂至一當是時也莫之為而常自然物皆自然故至一也逮德下衰夫德之所以下衰者由聖人不維世則在上者不能無為而羡無為之迹故致斯弊也及燧人伏戲始為天下是故順而不一世已失一或不可解故釋而不推順之而已燧音遂德又下衰及神農黃帝始為天下是故安而不順安之於其所安而巳德又下衰及唐虞始為天下興治化之流淳散朴聖人無心任世之自成成之淳薄皆非聖也聖能任世之自得耳豈能使世得聖哉故皇王之迹與世俱遷而聖人之道未始不全也古堯反本亦作澆淳本亦作醇音純離道以善善者過於適之稱故有善而道不全稱尺證反險德以行行者違性而行之故行立而德不夷然後去性而從於心以心自役則性去也心與心識彼我之心競為先識無復任性也心與心識如字衆本悉同向本作職云彼我之心競為先職矣郭注既與向同則亦當作職也知而不足以定天下忘知任性斯乃定也然後附之以文益之以博文滅質博溺心文博者心質之飾也溺乃歷反郭音奴學反然後民始惑亂無以反其性情而復其初初謂性命之本由是觀之世喪道矣道喪世矣世與道交相喪也夫道以不貴故能存世然世存則貴之貴之道斯喪矣道不能使世不貴而世亦不能不貴於道故交相喪也喪息浪反下及注皆同道之人何由興乎世世亦何由興乎道哉若不貴乃交相興也道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣今所以不隱由其有情以興也何由而興由無貴也隱故不自隱若夫自隱而用物則道世交相興矣何隱之有哉古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也莫知反一以息迹而逐迹以求一愈得迹愈失一斯大謬矣雖復起身以明之開言以出之顯知以發之何由而交興哉祗所以交喪也見音賢遍反祗音支當時命而大行乎天下此淡漠之時也則反一無迹反任物性而物性自一故無迹不當時命而大窮乎天下此不能淡漠之時也則深根寧極而待雖有事之世而聖人未始不漠也故深根寧極而待其自為耳斯道之所以不喪也此存身之道也未有身存而世不興者也古之存身者喪已於物失性於俗者謂之倒置之民營外內其置倒也倒置之民崔云逆其性命而不順也向云以外易內可謂倒置莊子外篇秋水第十七音義曰借物名篇秋水時至百川灌河涇流之大兩涘渚崖之間不辨牛馬言其廣也秋水李云水生於春壯於秋白虎通云水涯也灌古亂反涇音經司馬云涇通也崔本作徑云直度曰徑又云字或作淫涘音俟涯也渚司馬云水中可居曰渚釋名云渚遮也體高能遮水使從旁回也崖字又作涯亦作涯並同辨别也言廣大故望不分别也於是焉河伯欣然自喜以天下之美為盡在已順流而東行至於北海東靣而視不見水端於是焉何伯始旋其面目望洋向若而歎曰野語有之曰聞道百以為莫巳若者我之謂也且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我睹子之難窮也吾非至於子之門則殆矣吾長見於大方之家知其小而不能自大則理分有素尚之情無為乎其間河伯姓馮名夷一名水夷一名巳見太宗馮遲命篇一云姓吕名公子馮夷是公子之妻盡注忍反北海故云東海之北是也目盳莫剛反又音旁又音望本亦作望洋音羊司馬崔云盳洋猶望羊仰視貌向若向徐音嚮許亮反司馬云若海神聞道百李云萬分之一也今我睹舊音覩案文睹今字覩古字睹見也崔本作今睹我云睹大也大方司馬云方道也分扶問反後同北海若曰井蛙不可以語於海者拘於虛也夏不可以語於氷者篤於時也曲士不可以語於道者束於教也夫物之所生而安者趣各有極語如字下同虛音墟本亦作墟風俗通云墟虛也崔云拘於井中之空也夏尸嫁反曲士司馬云鄉曲之士也今爾出於崖涘觀於大海乃知爾醜爾將可與語大理矣以其知分故可與言理也天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時巳而不虛春秋不變水旱不知此其過江河之流不可為量數而吾未嘗以此自多者自以比形於天地而受氣於隂陽吾在於天地之間猶小石小木之在大山也方存乎見少又奚以自多窮百川之量而縣於河河縣於海海縣於天地則各有量也此發辭氣者有似乎觀大可以明小尋其意則不然夫世之所患者不夷也故體大者怏然謂小者為無餘質小者塊然謂大者為至足是以上下夸跂俯仰自失此乃生民之所惑也惑者求正正之者莫若先極其差而因其所謂所謂大者至足也故秋豪無以纍乎天地矣所謂小者無餘也故天地無以過乎秋豪矣然後惑者有山而反各知其極物安其分逍遙者用其本步而遊乎自得之場矣此莊子之所以發德音也若如惑者之說轉以小大相傾則相傾者無窮矣若夫覩大而不安其小視少而自以為多將奔馳於勝之竟而天民之矜夸豈逹乎莊生之㫖哉尾閭崔云海東川名司馬云泄海水出外者也泄息列反又與世反量音亮注及下同縣音玄下同怏於亮反又於良反竟音境計四海之在天地之間也不似礨空之在大澤乎計中國之在海內不似稊米之在太倉乎號物之數謂之萬人處一焉人卒九州榖食之所生舟車之所通人處一焉此其比萬物也不似豪末之在於馬體乎小大之辨各有階級不可相跂礨力罪反向同崔音壘李力對反空音孔壘孔小穴也李云小封也一云蟻塜也稊徒兮反司馬云稊米小米也李云稊草也案郭注爾雅稊似稗稗音蒲賣反大倉音泰卒尊忽反司馬云衆也崔子恤反云盡也五帝之所連三王之所爭仁人之所憂任而不多亦無餘也知量無窮而觀之知遠近大小之物各有量證嚮今故嚮明也今故猶古今嚮許亮反崔云往也向郭云明也又虛丈反故遙而不悶遙長也掇而不掇猶短也掇專劣反如字一本作企下注亦然知時無止證明古今知變化之不止於死生也故不以長而挹悶短故為也察乎盈虛故得而不喜失而不憂知分之無常也察其一盈一虛則知分之不常於得也故能忘其憂喜明乎坦塗死生者日新之正道坦吐但反故生而不死而不禍知終始之不可故也明終始之日新也則知故之不可執而留矣是以涉日新而不愕舍故而不驚死生之化若一音恱愕五各反舍音捨計人之所知不若其所不知所知各有限也其生之時不若未生之時生時各有年也以其至小求窮其至大之域是故迷亂而不能自得也莫若安於所受之分而巳由此觀之又何以知豪末之足以定至細之倪又何以知天地之足以窮至大之域以小求大理終不得各安其分則大小俱足矣若豪末不求天地之功則周身之餘皆為棄物天地不見大於秋豪則顧其形象裁自足耳將何以知細之定細大之定大也倪五崖反徐音詣郭五米反下同河伯曰世之議者皆曰至精無形至大不可圍是信情乎北海若曰夫自細視大者不盡自大視細者不明目之所見有常極不能無窮也故於大則有所不盡於細則有所不明直是目之所不逮耳精與大皆非無也庸詎知無形而不可圍者哉夫精小之微也埒大之殷也故異便大小異故所便不得同埒李普回反徐音孚謂盛也郭芳尤反崔音裒殷衆也便婢靣反徐扶靣反注皆同此之有也若無形而不可圍則無此異便之也夫精粗者期於有形者也有精粗矣故不得無形粗此胡反下同無形者數之所不能分也不可圍者數之所不能窮也可以言論者物之粗也可以意致者物之精也言之所不能論意之所不能察致者不期精粗焉唯無而巳何精粗之有哉夫言意者有也而所言所意者無也故求之於言意之表而入乎無言無意之域而後至焉分如字能論本或作諭是故大人之行不出乎害人大人者無意而任天行也舉足而投諸地豈出害人之塗哉不多仁恩無害而不自多其恩動不為利應理而動而理自無害為于僞反不賤門任其所能而位當於斯耳非由賤之故措之斯職措七故反貨財弗爭各使分定不多辭讓適中而巳事焉不借人各使自任不多食乎力足而巳不賤貪汙理自無欲行殊乎俗已獨無可無不可所以與俗殊行下孟反下堯桀之行同不多辟異任理而自殊辟四亦反為在從衆從衆之所為不賤佞諂自然正直世之爵祿不足以為勸戮耻不足以為辱外事不捿於心知是非之不可為分細大之不可為倪故玄同也聞曰道人不聞任物而物性自通不則功名歸物矣故不聞至德不得得者生於失也物各無失則得名去也大人無已任物而巳無巳音紀約分之至也約之以至其分故冥也夫唯極乎無形而不可圍者為然河伯曰若物之外若物之內惡至而倪貴賤惡至而倪小大北海若曰以道觀之物無貴賤各自足也惡音烏下同以物觀之自貴而相賤此區區者乃道之所錯綜而齊之者也以俗觀之貴賤不在巳斯所謂倒置也以差觀之因其所大而大之則萬物莫不大因其所小而小之則萬物莫不小知天地之為稊米也知豪末之為丘山也則差數覩矣所大者足也所小者無餘也故因其性足以名大則豪末丘山不得異其名因其無餘以稱小則天地稊米無所殊其稱若夫觀差而不由斯道則差數相加幾微相傾不可勝察也綜尺證反勝音升以功觀之因其所有而有之則萬物莫不有因其所無而無之則萬物莫不無知東西之相反而不可以相無則功分定矣天下莫不相與為彼我而彼我皆欲自為斯東西之相反也然彼我相與為脣齒脣齒者未嘗相為而脣亡則齒寒故彼之自為濟我之功弘矣斯相反而不可以相無者也故因其自為而無其功則天下之功莫不皆無矣因其不可相無而有其功則天下之功莫不皆有矣若乃忘其自為之功而思夫相為之惠惠之愈勤而僞薄滋甚天下天業而情性瀾漫矣故其功分無時可定也自為于僞反注內自為相為皆同餘如字以趣觀之因其所然而然之則萬物莫不然因其所非而非之則萬物莫不非知堯桀之自然而相非則趣操覩矣物皆自然故無不然物皆相非故無不非無不非則無然矣無不然則無非矣無然無非者堯也有然有非者桀也然此二君各受天素不能相為故因堯桀以觀天下之趣操其不能相為也可見矣昔者堯舜讓而帝之噲讓而絶湯武爭而王白公爭而滅夫順天應人而受天下者其迹則爭讓之迹也尋其迹者失其所以迹矣故絶滅也之噲音快又古邁反又古㑹反之者燕相子之也噲燕王名也司馬云燕王噲拙於謀用蘇代之說效堯舜讓位與子之三年而國亂而王往况反白公名勝楚平王之孫白縣尹僣稱公作亂而死事見左傳哀公十六年由此觀之爭讓之禮堯桀之行貴賤有時未可以為常也梁麗可以衝城而不可以窒穴言殊器也騏驥驊騮一日而馳千里捕鼠不如狸狌言殊技也鴟鵂夜撮蚤察豪末晝出瞋目而不見丘山言殊性也就其殊而任之則萬物莫不當也梁麗司馬李音禮一音如字司馬云梁麗小船也崔云屋棟也窒玲悉反爾雅云塞也崔李同文都節反騏音其驥音冀驊戶花反騮音留李云騏驥驊騮皆駿馬也捕音步本又作徐音付狸力之反狌音姓向同又音生崔本作鼬由又反技其綺反鴟尺夷反崔云鴟鵂鼬與委裊同七括反崔本作最音同蚤音早文跳蟲齧人者也淮南子鴟夜聚蚤察分豪末許慎云鴟夜聚食蚤蝨不失也司馬本作蚉音文云鴟鵂鶹夜取蚉食今郭本亦有作蚉者崔本作云鵂鶹夜聚人於巢中也瞑尺夷反向處辰反司馬云張也崔音眩又師慎反本或作瞑故曰蓋師是而無非師治而無亂乎是未明天地之理萬物之情者也夫天地之理萬物之情以得我為是失我為非適性為治失和為亂然物無定極我無常適殊性異便是非無主若以我之所是則彼不得非此知我而不見彼者耳故以道觀者於是非無當也付之天均恣之兩行則殊方異同焉皆得也師是或云師順也治直吏反注皆同是猶師天而無地師隂而無陽其不可行明矣然且語而不舍非愚則誣也天地隂陽對生也是非治亂互有也將奚去哉舍音捨下同帝王殊禪三代殊繼差其時逆其俗者謂之夫當其時順其俗者謂之義之徒默默乎河伯女惡知貴賤之門小大之家俗之所貴有時而賤物之所大世或小之故順物之迹不得不殊斯五帝三王之所以不同也篡夫初患反取也下如字女惡音汝後放此下音烏河伯曰然則我何為乎何不為乎吾辭受趣舍吾終奈何北海若曰以道觀之何貴何賤是謂反貴賤之道反覆相尋反又以戰反崔云無所貴賤乃反為美也本亦作畔李云猶漫合為一家覆芳服反無拘而志與道大蹇自拘執則不夷於道與道大蹇向紀輦反徐紀反本或作與天道蹇崔本蹇作浣云猶洽也何少何多是謂謝施隨其分故所施無常謝施如字司馬云謝代也施用也崔云不代其德是謂謝施無一而行與道參差不能隨變則不齊於道參初林反差初宜反嚴乎若國之有君其無私德公當而巳嚴魚檢反又如字繇繇乎若祭之有社其無私福天下之所同求繇音由泛泛乎其若四方之無窮其無所畛域泛泛然無所在泛孚劒反字又作泛畛之忍反域于逼反舊于目反兼懷萬物其孰承翼掩御羣生反之公內而乎往者也豈扶踈而承翼哉是謂無方無方故能以萬物為方萬物一齊孰短孰長莫不皆足道無終始物有死生死生者無窮之變耳非終始也不恃其成成無常處一虛一滿不位乎其形不以形為位而守之不變年不可舉欲舉之令去而不能令力呈反時不可止欲止之使停又不可消息盈虛終則有始變化日新未嘗守故是所以語大義之方論萬物之理也物之生也若驟若馳但當就用耳無動而不變無時而不移故不可執而守何為乎何不為乎夫固將自化若有為不為於其間則敗其自化矣河伯曰然則何貴於道邪以其自化北海若曰知道者必逹於理逹於理者必明於權明於權者不以物害已知道者知其無能也無能也則何能生我我自然而生耳而四支百體五藏精神已不為而自成矣又何有意乎生成之後哉逹乎斯理者必能遣過分之知遺益生之情而乘變應權故不以外傷內不以物害已而常全也藏才浪反至德者火弗能水弗能溺寒暑弗能害禽獸弗能賊夫心之所安則危不能危意無不適故苦不能苦也非謂其薄之也雖心所安亦不使犯之薄如字崔云謂以體著之言察乎安危知其不可逃也寧於禍福安乎命之所遇謹於去就審去就之非已莫之能害也不以害為害故莫之能害故曰天在內人在外天然在內而天然之所順者在外故太宗師曰知天人之所為者至矣明內外之分皆非為也德在乎天恣人任知則流蕩失素也知天人之行本乎天位乎得此天然之知自行而不出乎分者也故雖行於外而常本乎天而位乎得矣行如字蹢躅而屈伸與機㑹相應者有斯變也蹢丈益反又持革反躅丈録反又音濁伸音申反要而語極知雖落天地事雖接萬物而常不失其要極故天人之道全也要於妙反曰何謂天何謂人北海若曰牛馬四足是謂天落馬首穿牛鼻是謂人人之生也可不服牛乘馬乎服牛乘馬不可穿落之乎牛馬不辭穿落者天命之固當也苟當乎天命則雖之人事而本在乎天也故曰無以人滅天穿落之可也若乃走作過分驅步失節則天理滅矣無以故滅命不因其自為而故為之者命其安在乎無以得殉名所得有常分殉名則過也謹守而勿失是謂反其真真在性分之內䕫憐蚿蚿憐蛇蛇憐風風憐目目憐心䕫謂蚿曰吾以一足趻踔而行豫無如矣今子之使萬足獨奈何蚿曰不然子不見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也今豫動吾天機而不知其所以然蚿謂蛇曰吾以衆足行而不及子之無足何也蛇曰夫天機之所動何可易邪吾安用足哉物之生也非知生而生也則生之行也豈知行而行哉故足不知所以行目不知所以見心不知所以知俯然而自得矣遲速之節聰明之鑒或能或否皆非我也而或者因欲有其身而矜其能所以逆其天機而傷其神器也至人知天機之不可易也故捐聰明棄智慮魄然忘其為而任其自動故萬物無動而不逍遙也䕫求反一足獸也李云黃帝在位諸侯於東海流山得竒獸其狀如牛蒼色無角一足龍走出入水即風目光如日月其音如雷名曰䕫黃帝殺之取皮以冒鼓聲聞五百里憐音蓮蚿音賢又音玄司馬云馬蚿蟲也廣雅云蛆渠馬蚿蚿憐蛇蛇憐風風憐目目憐心司馬云䕫一足蚿多足蛇無足風無形目形綴於此明流於彼心則質幽為神遊外跉勑甚反郭莬咸反一音初禀反踔本亦作卓同勑角反李云跉卓行貌唾吐卧反噴普悶反又芳奔反又孚問反霧音務郭武貢反勝音升俯亡本反蛇謂風曰豫動吾脊脅而行則有似也今子蓬蓬然起於北海蓬蓬然入於南海而似無有何也風曰然豫蓬蓬然起於北海而入於南海也然而指我則勝我鰌我亦勝我雖然夫折大木蜚大屋者唯我能也故以衆小不勝為大勝也為大勝者唯聖人能之恣其天機無所與爭斯小不勝者也然乘萬物御羣才之所為使羣才各自得萬物各自為則天下莫不逍遙矣此乃聖人所以為大勝也蓬蓬步東反徐扶公反李云風貌鰌音秋李云藉也藉則削也本又作子六反又七六反迫也折之舌反蜚音飛又扶貴反孔子遊於匡宋人圍之數匝而弦歌不惙子路入見曰何夫子之娛也孔子曰來吾語女我諱窮久矣而不免命也求通久矣而不得時也將明時命之固當故之求諱孔子遊於匡宋人圍之數色主反匝子合反司馬云宋常作衛匡衛邑也衛人誤圍孔子以為陽虎虎嘗暴於匡人又孔子弟子顔剋時與虎俱後剋為孔子御至匡匡人共識剋又孔子容貌與虎相似故匡人共圍之惙本又作輟同丁劣反見賢遍反語魚據反當堯舜而天下無窮人非知得也當桀紂而天下無通人非知失也時勢適然無為勞心於窮通之間夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也情各有所安蛟音交父音甫兕徐反知窮之有命知通之有時臨大難而不懼者聖人之勇也聖人則無所不安難乃旦反由處矣吾命有所制矣命非巳制故無所用其心也夫安於命者無往而非逍遙矣故雖匡陳羑里無異於紫極間堂也閒音間無幾何將甲者進辭曰以為陽虎也故圍之今非也請辭而退公孫龍問於魏牟曰龍少學先王之道長而明仁義之行合同異離堅白然不然可不可困百家之知窮衆口之辨吾自以為至逹巳今吾聞莊子之言汒焉異之不知論之不及與知之弗若與今吾無所開吾喙敢問其方公子牟隱機大息仰天而曰子獨不聞夫塪井之蛙乎謂東海之鱉曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接掖持頥蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨跱塪井之樂此亦至矣夫子奚不時來入觀乎此猶小鳥之自足於蓬蒿幾居豈反將甲如字本亦作持甲公孫龍問於魏牟司馬云龍趙人牟魏之公子少詩照反長張丈反行下孟反知音智汒莫剛反郭音莽論力困反與音余下助句放此開如字本亦作兩通本或作閡喙許穢反又昌鋭反隱於靳反大音泰塪音坎郭音啖蛙本亦作蛙戶媧反司馬云塪井壞井也鼁水蟲形似蝦蟇鱉必滅反字亦作鱉吾樂音洛下之樂大樂同跳音條井幹古旦反司馬云井欄也諸詮之音西京賦作韓音甃側救反李云如闌以磚為之著井底䦨也字林壯謬反云井壁也赴水如字司馬本作踣云赴也蹶其月反又音厥泥則沒足滅跗方于反郭音附司馬云滅沒也跗足跗也李云言踊躍於塗中還音旋司馬云顧視也虷音寒井中赤蟲也一名蜎爾雅云蜎蠉郭注云井中小蛣蟩赤蟲也蜎音求兖反蠉音况兗反蛣蟩音吉厥蟹戶買反科苦禾反科斗蝦蟇子也擅市戰反專也壑火各反東海之鱉左足未入而右膝巳縶矣明大之不遊於小非樂然縶猪立反司馬云拘也三蒼云絆也樂音嶽又五教反於是逡巡而却告之海曰夫千里之遠不足以舉其大千仞之高不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損夫不為頃久推移不以多少進退者此亦東海之大樂也於是塪井之蛙聞之適適然驚規規然自失也以小羡大故自失逡七旬反潦音老弗為于僞反下同頃久司馬云猶早晚也適適始赤反又丈革反郭莬狄反規規如字又虛役反李徐紀睡反適適規規皆驚視自失貌且夫知不知是非之竟而猶欲觀於莊子之言是猶使蚉山商蚷馳河也必不勝任矣物各有分不可強相希效竟音境後同蚉音文商蚷音渠郭音巨司馬云商蚷蟲名北燕謂之馬蚿一本作蜄徐市軫反勝音升強其丈反且夫知不知論極妙之言而自適一時之利者是非塪井之蛙與且彼方跐黃泉而登大皇無南無北奭然四解淪於不測無東無西始於玄冥反於大通言其無不至也跐音此郭時紫反又側買反廣雅云踏也蹈也履也司馬云則也大皇音泰奭音釋解戶買反子乃規規然而求之以察索之以辨夫遊無窮者非察辨所得索所白反是直用管窺天用錐指地也不亦小乎子往矣非其任者去之可也且子獨不聞夫壽陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳以此效彼兩失之壽陵餘子司馬云壽陵邑名未應丁夫為餘子邯音寒鄲音丹趙國都也匍匐匍音蒲又音符匐蒲北反又音服今子不去將忘子之故失子之業公孫龍口呿而不合舌舉而不下乃逸而走莊子釣於濮水楚王使大夫二人往先焉曰願以竟內纍矣莊子持竿不顧曰吾聞楚有神死巳三千歲矣王巾笥而藏之廟堂之上此者寧其死為留骨而貴乎寧其生而曵尾於塗中乎二大夫曰寧生而曵尾塗中莊子曰往矣吾將曵尾於塗中性各有所安也口呿起據反司馬云開也李音祛又巨劫反濮水音陳地水也楚王司馬云威王也先焉先謂宣其言也笥息嗣反或音司藏之李云藏之以笥覆之以巾惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日三夜揚兵整旅相息亮反下同梁相梁惠王恐丘勇反搜字又作摉或作瘦所求反李悉溝反云索也說文云求也莊子往見之曰南方有鳥其名鵷雛子知之乎夫鵷雛發於南海而飛於北海非梧桐不止非練實不食非醴泉不飮於是鴟得腐鼠鵷雛過之仰而視之曰嚇今子欲以子之梁國而嚇我邪言物嗜好不同願各有極鵷於袁反雛仕俱反李云鵷雛鸞鳳之屬也醴泉音禮李云泉甘如醴嚇本亦作呼同許嫁反又許伯反司馬云嚇怒其聲恐其奪巳也詩箋云以口拒人曰嚇嗜時志反好呼報反莊子與惠子遊於濠梁之上莊子曰鯈魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂欲以起明相非而不可以相知之義耳子非我尚可以知我之非魚則我非魚亦可以知魚之樂也豪梁本亦作濠音同司馬云濠水名也石絶水曰梁鯈魚徐音條說文直留反李音由白魚也爾雅云鮂黑鰦郭注即白鯈也一音篠謂白鯈魚也從七容反樂音洛注下同惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣舍其本言而給辨以難也難乃旦反莊子曰請循其本子曰女安知魚樂云者既巳知吾知之而問我我知之濠上也尋惠子之本言云非魚則無緣相知耳今子非我也而云女安知魚樂者是知我之非魚也苟知我之非魚則凡相知者果可以此知彼不待是魚然後知魚也故循子安知之云巳知吾之所知矣而方復問我我正知之於濠上耳豈待入水哉夫物之所生而安者天地不能易其處隂陽不能回其業故以陸生之所安知水生之所樂未足稱妙耳復扶又反處昌慮反莊子外篇至樂第十八音義曰以義名篇樂音洛天下有至樂無有哉有可以活身者無有哉忘歡而後樂足樂足而後身存將以為有樂邪而至樂無歡將以為無樂邪而身以存而無憂樂音洛篇內不出者皆同至極也樂歡也今奚為奚據奚避奚處奚就奚去奚樂奚惡擇此八者莫足以活身唯無擇而任其所遇者乃全耳惡烏路反夫天下之所尊者冨貴壽善也所樂者身安厚味美服好色音聲也所下者貧賤夭惡也所苦者身不得安逸口不得厚味形不得美服目不得好色耳不得音聲若不得者則大憂以懼其為形也亦愚哉凡此失之無傷於形而得之有損於性今反以不得為憂故愚夫冨者苦身疾作多積財而不得盡用其為形也亦外矣內其形者知足而巳夫貴者夜以繼日思慮善否其為形也亦疏矣故親其形者自得於身中而巳人之生也與憂俱生壽者惛惛久憂不死何之苦也其為形也亦遠矣夫遺生然後能忘憂忘憂而後生可樂生可樂而後形是我有冨是我物貴是我榮也惛音昏又音門列士為天下見善矣未足以活身吾未知善之誠善邪誠不善邪若以為善矣不足活身以為不善矣足以活人善則過當故不周濟故曰忠諌不聽蹲循勿爭唯中庸之德為然蹲七旬反郭音存又趣允反循音旬又音脣爭爭鬪之爭下同故夫子胥爭之以殘其形不爭名亦不成誠有善無有哉故當緣督以為經也今俗之所為與其所樂吾又未知樂之果樂邪果不樂邪吾觀夫俗之所樂舉羣趣者誙誙然如將不得巳舉羣趣其所樂乃不避死也誙誙亡耕反徐苦耕反又胡挺反李云趣死貌崔云以是為非以非為是為誙誙本又作脛脛而皆曰樂者吾未之樂也亦未之不樂也無懷而恣物耳果有樂無有哉吾以無為誠樂矣夫無為之樂無憂而巳又俗之所大苦也故曰至樂無樂至譽無譽俗以鏗鎗為樂美善為譽鏗苦耕反鎗七羊反天下是非果未可定也雖然無為可以定是非我無為而任天下之是非是非者各自任則定矣至樂活身唯無為幾存百姓足則吾身近乎存也近附近之近請嘗試言之天無為以之清地無為以之寧皆自清寧耳非為之所得故兩無為相合萬物皆化不為而自合故皆化若有意乎為之則有時而滯也芒乎芴乎而無從出乎皆自出耳未有為而出之也芒李音荒又乎晃反下同芴音忽下同芴乎芒乎而無有象乎無有為之象萬物職職皆從無為殖皆自殖耳萬物職職司馬云職職猶祝祝也李云繁殖貌案爾雅職主也謂名有主而區别故曰天地無為也而無不為也若有為則有不齊也人也孰能得無為哉得無為則無樂而樂至矣莊子妻死惠子弔之莊子則方箕踞鼓盆而歌惠子曰與人居長子老身死不哭亦足矣又鼓盆而歌不亦甚乎莊子曰不然是其始死也我獨何能無槩然察其始而本無生非徒無生也而本無形非徒無形也而本無氣雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與為春秋冬夏四時行也人且偃然寢於巨室而我噭噭然隨而哭之自以為不通乎命故止也未明而槩巳逹而止斯所以誨有情者將令推至理以遣纍也踞音據盆謂瓦也長丁丈反槩古代反司馬云感也又音骨哀亂貌巨室巨大也司馬云以天地為室也噭古弔反又古堯反令力呈反支離叔與滑介叔觀於冥伯之丘昆崘之虛黃帝之所休俄而柳生其左肘其意蹶蹶然惡之支離叔曰子惡之乎滑介叔曰亡豫何惡生者假借也假之而生生者塵垢也死生為晝夜且吾與子觀化而化及我我又何惡焉斯皆先示有情然後尋至理以遣之若云我本無情故能無憂則夫有情者遂自絶於遠曠之域而迷困於憂樂之竟矣支離叔與滑音骨崔本作潏介音界叔李云支離忘形滑介忘智言二子乃識化也冥伯之丘李云丘名喻杳冥也崘力門反虛音墟休息也肘竹九反司馬本作胕音跌云胕足上也蹶蹶紀衛反動也惡之烏路反後皆同垢音苟竟音境莊子之楚見空髑髏髐然有形擊以馬捶因而問之曰夫子貪生失理而為此乎將子有亡國之事斧之誅而為此乎將子有不善之行愧遺父母妻子之醜而為此乎將子有凍餒之患而為此乎將子之春秋故及此乎於是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辨士諸子所言皆生人之纍也死則無此矣子欲聞死之乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事從然以天地為春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形為子骨肉肌膚反子父母妻子閭里知識子欲之乎髑髏深矉蹙頞曰吾安能棄南面王樂而復為人間之勞乎舊說云莊子樂死惡生斯說謬矣若然何謂齊乎所謂齊者生時安生死時安死生死之情既齊則無為當生而憂死耳此莊子之㫖也髑音獨髏音樓髐苦堯反徐又許堯反李呼交反司馬李云白骨貌有枯形也擊苦弔反又古的反說文作云旁擊也捶拙反又之睡反馬杖也遺唯季反凍丁貢反餒奴罪反援音袁枕針鴆反見賢遍反從七容反從容也李徐子用反縱逸也復音服又扶又反矉音頻蹙本又作顣又作䠞同子六反頞於葛反李云矉蹙者愁貌復扶又反顔淵東之齊孔子有憂色子貢下席而問曰小子敢問回東之齊夫子有憂色何邪孔子曰善哉女問昔者管子有言丘甚善之曰禇小者不可以懷大綆短者不可以汲深夫若是者以為命有所成而形有所適也夫不可損益故當任之而巳禇猪許反綆格猛反汲索也汲居及反適或作通吾恐回與齊侯言堯舜黃帝之道而重以燧人神農之言彼將內求於巳而不得不得則惑人惑則死內求不得將求於外舍內求外非惑如何皇帝謂三皇五帝也司馬本作黃帝重直用反舍音捨且女獨不聞邪昔者海鳥止於魯郊魯侯御而觴之于廟奏九韶以為樂具太牢以為膳鳥乃昡視憂悲不敢食一臠不敢飮一杯三日而死此以巳養養鳥也非以鳥養養鳥也夫以鳥養養鳥者宜栖之深林遊之壇陸浮之江湖食之鰌䱔隨行列而止委蛇而處彼唯人言之惡聞奚以夫譊譊為乎咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒聞之相與還而觀之魚處水而生人處水而死彼必相與異其好惡故異也故先聖不一其能不同其事各隨其情女音汝後同海鳥司馬云國語曰爰居也止魯東門之外三日臧文仲使國人祭之又云魯侯也爰居一名雜縣舉頭高八尺樊光注爾雅云形似明皇邪音訝觴音傷于廟司馬云飮之于廟中也九韶常遙反膳如字昡七遍反司馬本作玄音眩視如字徐市至反臠里轉反壇大旦反司馬本作澶音但云水沙澶也食之音嗣䱔音條又音篠又徒由反一音由行戶剛反委於危反蛇以支反又如字譊乃交反咸池堯樂名樂如字卒寸忽反司馬音子忽反云衆也彼音憊又旋面反好呼報反名止於實義設於適是之謂條逹而福持實而適故條逹性常得故福持列子行食於道從見百歲髑髏攓蓬而指之曰唯豫與女知而未嘗死未嘗生也各以所遇為樂道從如字司馬云從道旁也本或作徒攓居輦反徐紀偃反又起䖍反司馬云扶也或音厥蓬步東反徐音扶公反若果養乎豫果歡乎歡養之實未有定在若果一本作汝果元嘉本作汝過養司馬本作暮云死也豫果元嘉本音豫過歡乎司馬本作嚾云呼聲謂生也種有幾變化種數不可勝計種章勇反注同幾居豈反勝音升得水則為㡭得水土之際則為蛙蠙之衣生於陵屯則為陵舄陵舄得鬱棲則為烏足烏足之根為蠐螬其葉為胡蝶胡蝶胥也化而為蟲生於竈下其狀若脫其名為鴝掇鴝掇千日為鳥其名為乾餘骨乾餘骨之沫為斯彌斯彌為食醯頥輅生乎食醯黃軦生乎九猷瞀芮生乎腐蠸羊奚比乎不箰久竹生青寧青寧生程程生馬馬生人人又反入於機萬物皆出於機皆入於機此言一氣而萬形有變化而無死生也得水則為㡭此古絶字徐音絶今讀音繼司馬本作繼云萬物雖有兆朕得水上氣乃相繼而生也本或作斷又作續斷得水土之際則為蛙戶蝸反蠙步田反徐我賢反郭父因反又音賔李婢軨反之衣司馬云言物根在水土際布在水中就水上視不見抄之可得如張綿在水中楚人謂之蛙蠙之衣生於陵屯司馬音徒門反云阜也郭音純則為陵舄音昔司馬云言物因水成而陸産生於陵屯化作車前改名陵舄也一名澤舄隨燥溼變也然不知其祖言物化無常形也人之死也亦或化為草木草木之精或化為人也陵馬得鬱栖則為烏足司馬云鬱栖蟲名烏足草名生水邉也言鬱栖在陵舄之中則化為烏足也李云鬱栖糞壤也言陵舄在糞化為烏足也烏足之根為蠐音齊螬音曹司馬本作螬䗲云蝎也其葉為胡蝶音牒司馬云胡蝶蛺蝶也草化為蟲蟲化為草夫始有極胡蝶胥也一名胥也化而為蟲生放竈下司馬云得氣而生也其狀若脫它括反司馬音恱云新出皮恱好也鴝其俱反掇丁活反乾音干沫音末李云口中汁也斯彌李云蟲也食如字司馬本作蝕醯許反李音濠司馬云蝕醯若酒上蠛蠓也蠛音眠結反蠓音無孔反頥以之反輅音路一音洛黃軦音况徐李休往反司馬云頥輅黃軦皆蟲名九猷音由李云九宜為久久老也猷蟲名也瞀莫豆反又莫住反又亡角反芮如鋭反徐如悅反腐音輔蠸音權郭音歡司馬云亦蟲名也爾雅云一名守一名忿鼠也羊奚比毗志反箰息尹反司馬云羊奚草名根似蕪菁與久竹比合而為物皆生於非也青寧司馬云蟲名青寧生程李云未聞程生馬馬生人俗本多誤故具録之南華真經卷第六
