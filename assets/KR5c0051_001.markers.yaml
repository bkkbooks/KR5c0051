  - {type: variant, offset: 22423, length: 1, content: 首, ZTDZ: 百姓而已哉出入六合遊乎九州獨往獨來是謂獨}
  - {type: variant, offset: 22425, length: 6, content: 已字四十業十, ZTDZ: 獨有之人是之謂至貴大人之教若形之於影聲之於響有問而應之盡其所懷爲天下配處乎無響}
  - {type: punctuation, offset: 22427, content: /, id: KR5c0051_krp_001-bkkpn2911}
  - {type: variant, offset: 22432, length: 2, content: 注歸, ZTDZ: 乎無方挈汝適復}
  - {type: punctuation, offset: 22433, content: ), id: KR5c0051_krp_001-bkkpn2912}
  - {type: variant, offset: 22435, length: 0, content: '', ZTDZ: 撓撓以遊無端出入無旁與日無始頌論形軀合乎大同大同而無己無己惡乎得有有覩有者昔之君子覩無者天地之友賤而不可不任者物}
  - {type: variant, offset: 22436, length: 1, content: 哉, ZTDZ: 卑而不可不因者民也匿而不可不爲者事也麤而不可不陳者法也遠而不可不居者義也親而不可不廣者仁也節而不可不積者禮也中而不可不高者德也一而不可不易者道也神而不可不爲者天也故聖人觀於天而不助成於德而不累出於道而不謀會於仁而不恃薄於義而不積應於禮而不諱接於事而不讓齊於法而不亂恃於民而不輕因於物而不去物者莫足爲也而不可不爲不明於天者不純於德不通於道者}
