  - {type: punctuation, offset: 50, content: (, id: KR5c0051_krp_004-bkkpn4}
  - {type: variant, offset: 50, length: 388, content: 夫長者不爲有餘短者不爲不足此則駢贅皆出於形性非假物也然駢與不駢其於各足而此獨駢枝則於衆以爲多故曰侈耳而惑者或云非性因欲割而棄之是道有所不存德有所不載而人有棄財物有棄用也豈是至治之意哉夫物有小大能有少多所大即駢所多即贅駢贅之分物皆有之若莫之任是都棄萬物之性也駢歲田反廣雅云並也李云併也拇音母足大指也司馬云駢拇謂足拇指連第二指也崔云諸指連大指也枝指如字三蒼云枝指手有六指也崔云音岐謂指有也侈昌是反徐處䜴反郭云多貌司馬云溢也崔云過也德崔云德猶容也贅章銳反廣雅云疣也釋名云橫生一肉属著體也一云瘤結也縣音玄疣音而侈於性司馬云性人之本體也駢拇枝指附贅縣疣此四者各出於形性而非形性之正於衆人爲侈耳於形爲侈於性爲多故在手爲莫用之肉於足爲無施之指也王云性者受生之質德者全生之本駢指受生而有不可多於德贅疣形後而生不可多於性此四者以况才智德行夫音符發句之端於此治直吏反分扶問反後可以意求有之之或作定, HFL: ''}
  - {type: variant, offset: 54, length: 1, content: 爲, ZTDZ: 能避余且之網知能七十二鑽而無遺筴不能避刳腸之患如是則知}
  - {type: substitution, offset: 54, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 56, length: 59, content: 餘短者不爲不足此則駢贅皆出於形性非假物也然駢與不駢其於各足而此獨駢枝則於衆以爲多故曰侈耳而惑者或云非性因欲割而棄之是道, ZTDZ: 所困神}
