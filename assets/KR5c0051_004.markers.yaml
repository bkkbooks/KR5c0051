  - {type: variant, offset: 2964, length: 20, content: 寸博塞悉代反塞博之也漢書云吾丘壽王以善格, ZTDZ: ''}
  - {type: 'kr:non-cjk', offset: 2973, content: ⬤, id: KR5c0051_krp_004-bkkkrnonc47}
  - {type: punctuation, offset: 2973, content: /, id: KR5c0051_krp_004-bkkpn271}
  - {type: variant, offset: 2985, length: 473, content: 待詔謂博塞也首陽山名在河東蒲坂縣死謂餓而死東陵李云謂泰山也一云陵名今名東平陵屬濟南郡天下盡殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人其殉一也則有君子焉有小人焉若其殘生損性則盗跖亦伯夷已又惡取君子小人於其間哉天下皆以不殘爲善今均於殘生則雖所殉不同不足復計也夫生奚爲殘性奚爲易哉皆由乎尚無爲之迹也若知迹之由乎無爲而成則絶尚去甚而反冥我極矣堯桀將均於自得君子小人奚辨哉惡音烏君子小人於其間崔本無小人於三字且夫屬其性乎仁義者雖通如曾史非吾所謂臧也以此係彼爲屬屬性於仁殉仁者耳故不善也屬郭時欲反謂係屬也徐音燭謂屬著也下皆同屬其性於五味雖通如俞兒非吾所謂臧也率性通味乃善雖通如楊墨一本無此句俞兒音榆李武榆反司馬云古之善識味人也崔云尸子曰膳俞兒和之以薑桂爲人主上食淮南云俞兒狄牙嘗淄澠之水而別之一云俞兒黃帝時人狄牙則易牙齊桓公時識味人也一云俞兒亦齊人淮南子一本作申兒疑申當作屬其性乎五聲雖通如師曠非吾所謂聦也屬其性乎五色雖通如離朱非吾所謂明也不付之於我而屬之於彼則雖通之如彼而我已䘮矣故各任其耳目之用而不係於離曠乃聦明也吾所謂臧非仁義之謂也臧於其德, ZTDZ: 日}
