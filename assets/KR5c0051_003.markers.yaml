  - {type: variant, offset: 3608, length: 0, content: '', ZTDZ: 能自聞心之與形吾不知其異也而狂者不能自}
  - {type: variant, offset: 3609, length: 0, content: '', ZTDZ: 形之與形亦辟矣而物或間之邪欲相求而不能相得今謂趎曰全汝形抱汝生勿使汝思慮營營趎勉聞道達耳矣庚桑子曰辭盡矣曰奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣雞之與雞其德非不同也有能與不能者其才固有巨小也今吾才小不足以化子子胡不南見老子南榮趎赢糧七日七夜至老子之所老子曰子自楚之所來乎南榮趎曰唯老子曰子何與人偕來之衆也南榮趎懼然顧其後老子曰子不知吾所謂乎南榮趎俯而慚仰而歎曰今者吾忘吾答因失吾問老子曰何謂也南榮趎曰不知乎人謂我朱愚知乎反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我己我安逃此而可此三}
  - {type: page-break, offset: 3609, content: '', id: KR5c0051_SJB_003-110610a}
  - {type: variant, offset: 3610, length: 1, content: 久, ZTDZ: 者趎之所患}
  - {type: variant, offset: 3612, length: 3, content: 終始常, ZTDZ: 願因楚而問之老子曰向吾見若眉睫之間吾因以得汝矣今汝又言而信之若規規然若喪父母揭竿而求諸海也汝亡人哉惘惘乎汝欲反汝情性而}
  - {type: variant, offset: 3616, length: 0, content: '', ZTDZ: 由入可憐哉南榮趎請入就舍召其所好去其所惡十日自愁復見老子老子曰汝自洒濯熟哉鬱鬱乎然而中津津乎猶有惡也夫外穫}
  - {type: variant, offset: 3619, length: 1, content: 謂, ZTDZ: 繁而捉將内揵内穫者不可繆而捉將外揵外内穫者道德不能持而況放道而行者乎南榮趎曰里人有病里人問之病者能言其病然其病病者猶未病也若趎之聞大道譬猶飲藥以加病也趎願聞衛生之經而已矣}
  - {type: variant, offset: 3621, length: 0, content: '', ZTDZ: 子曰衛生之經能抱一乎能勿失乎能無卜筮而知吉凶乎能止乎能已乎能舍諸人而求諸己乎能翛然乎能侗然乎能兒子乎兒子終日嗥而嗌不嗄和之至}
  - {type: page-break, offset: 3621, content: '', id: KR5c0051_SJB_003-110610b}
