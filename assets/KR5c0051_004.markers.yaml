  - {type: variant, offset: 2841, length: 186, content: 天下之所惜者生也今殉之太甚俱殘其生則所殉是非不足復論臧作郞反崔云好書曰臧方言云齊之北鄙燕之北郟凡民男而婿婢謂之臧女而婦奴謂之張揖云婿婢之子謂之臧婦奴之子謂之榖如字爾雅云善也崔本作榖云孺子曰谷牧牧養之牧挾音協筴字又作策革反李云竹簡也古以冩書長二尺四寸博塞悉代反塞博之也漢書云吾丘壽王以善格五待詔謂博塞也首陽山名在河東蒲坂縣死謂餓而死東陵李云謂泰山也一云陵名今名東平陵屬濟南郡, HFL: ''}
