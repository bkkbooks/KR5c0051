  - {type: variant, offset: 13661, length: 0, content: '', ZTDZ: 期曰萬物者以數之多者號而讀之也是故天地者形之大者也陰陽者氣之大者也道者爲之公因其大以號而讀之則可也已有之矣乃將得比哉則若以斯辯譬猶狗馬其不及遠矣少知曰四方之内六合之裏萬物之所生惡起太公調曰陰陽相照相蓋相治四時相代相生相殺欲惡去就於是橋起雌雄片合於是庸有安危相易禍福相生緩急相摩聚散以成此名實之可紀精之可志也隨序之相理橋運之相使窮則反終則始此物之所有言之所盡知之所至極物而已覩道之人不隨其所廢不原其所起此議之所止少知曰委眞之莫爲接子之或使二家之議孰正於其情孰徧於其理太公調曰雞鳴狗吠是人之所知雖有大知不能以言讀其所自化又不能以意其所將爲斯而析之精至於無倫大至於不可圍或之使莫之爲未免於物而終以爲過或使則實莫爲則虚有名有實是物之居無名無實在物之虚可言可意言而愈疏未生不可忌已死不可阻死生非遠也埋不可覩或之使莫之爲疑之所假吾觀之本其往}
