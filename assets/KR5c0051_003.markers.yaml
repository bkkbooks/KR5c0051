  - {type: substitution, offset: 4, original: 註, replacement: 注, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16785}}
  - {type: indent, offset: 5, content: 　, id: KR5c0051_krp_003-bkkind2}
  - {type: indent, offset: 7, content: 　, id: KR5c0051_krp_003-bkkind3}
  - {type: 'kr:newline', offset: 9, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl2}
  - {type: line-break, offset: 9, content: '', id: KR5c0051_SBCK_003-1a03}
  - {type: punctuation, offset: 18, content: (, id: KR5c0051_krp_003-bkkpn1}
  - {type: variant, offset: 19, length: 1, content: 夫, ZTDZ: 天}
  - {type: punctuation, offset: 26, content: /, id: KR5c0051_krp_003-bkkpn2}
  - {type: variant, offset: 26, length: 1, content: 富, ZTDZ: 多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何爲而不得孔子顧謂弟子曰用志不分乃凝於神}
  - {type: page-break, offset: 26, content: '', id: KR5c0051_SJB_003-110600c}
  - {type: variant, offset: 28, length: 0, content: '', ZTDZ: 痀僂文人之謂乎顔淵問仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學邪曰可善游者數能若乃夫没人則未嘗見舟而便操之也吾問焉而不吾告敢問何謂也仲尼曰善游者數能忘水也若乃夫没人之未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車却也覆却萬方陳乎前而不得入其舍惡往而不暇以瓦注者巧以鉤注者憚以黄金注者殙其巧一也而有}
  - {type: variant, offset: 29, length: 1, content: 宗, ZTDZ: 矜則重外也凡外重者内拙田開之見周威公威公曰吾聞祝腎學生吾子與祝腎遊亦何聞焉田開之曰閑之操拔篲以侍門庭亦何聞於夫子威公曰田子無讓寡人願聞之開之曰聞之夫子曰善養生者若牧羊然視其後者}
  - {type: variant, offset: 31, length: 1, content: 師, ZTDZ: 鞭之威公曰何謂也田開之曰魯有單豹}
  - {type: variant, offset: 33, length: 0, content: '', ZTDZ: 巖居而水飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之有張毅者高門縣薄}
  - {type: punctuation, offset: 34, content: ), id: KR5c0051_krp_003-bkkpn3}
  - {type: 'kr:newline', offset: 34, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl3}
  - {type: line-break, offset: 34, content: '', id: KR5c0051_SBCK_003-1a04}
  - {type: punctuation, offset: 34, content: (, id: KR5c0051_krp_003-bkkpn4}
  - {type: variant, offset: 34, length: 1, content: 心, ZTDZ: 不走}
  - {type: 'kr:non-cjk', offset: 36, content: ○, id: KR5c0051_krp_003-bkkkrnonc1}
  - {type: variant, offset: 36, length: 2, content: 音義, ZTDZ: 行年四十而有内熱之病以死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者也仲尼}
  - {type: page-break, offset: 36, content: '', id: KR5c0051_SJB_003-110601a}
  - {type: variant, offset: 39, length: 11, content: 崔云遺形忘生當大宗此法, ZTDZ: 無入而藏無出而陽柴立其中央三者若得其名必極夫畏塗者十殺一人則父子兄弟相戒}
  - {type: punctuation, offset: 42, content: /, id: KR5c0051_krp_003-bkkpn5}
  - {type: punctuation, offset: 51, content: ), id: KR5c0051_krp_003-bkkpn6}
  - {type: 'kr:newline', offset: 51, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl4}
  - {type: line-break, offset: 51, content: '', id: KR5c0051_SBCK_003-1a05}
  - {type: variant, offset: 51, length: 0, content: '', ZTDZ: 必盛卒徒而後敢出焉不亦}
  - {type: variant, offset: 52, length: 5, content: 天之所爲知, ZTDZ: 乎}
  - {type: substitution, offset: 55, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 60, length: 0, content: '', ZTDZ: 取畏者袵席之上飲食之間而不知}
  - {type: substitution, offset: 60, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 61, length: 0, content: '', ZTDZ: 之戒}
  - {type: variant, offset: 62, length: 4, content: 至矣知天, ZTDZ: 過也祝宗人玄端以臨牢筴說彘曰汝奚惡死吾將三月㹖汝十日戒三日齊藉白茅加汝肩尻乎彫俎之上則汝爲之乎爲彘謀曰不如食以糠糟而錯之牢筴之中自爲謀則荀生有軒冕之尊死得於腞楯之上聚僂之中則爲之爲彘謀則去之自爲謀則取之所異彘者何也桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父何見對曰臣無所見公反誒詒爲病數日不出齊士有里子告敖者曰公則自傷鬼惡能傷公夫忿滀之氣散而不反則爲不足上而不下則使人善怒下而不上則使人善忘不上不下中身當心則爲病桓公曰然則有鬼乎曰有沈有履竈有髻户内之煩壤雷霆處之東北方之下者倍阿鮭蠪躍之西北方之下者則泆陽處之水有罔象丘有崒山有夔野有方皇澤有委蛇公曰請問委蛇之狀何如皇子曰委蛇其大如轂其長如轅紫衣而朱冠其爲物也惡聞雷車之聲則捧其首而立見之者殆乎霸桓公辴然而笑曰此寡}
  - {type: page-break, offset: 62, content: '', id: KR5c0051_SJB_003-110601b}
  - {type: punctuation, offset: 64, content: (, id: KR5c0051_krp_003-bkkpn7}
  - {type: punctuation, offset: 68, content: /, id: KR5c0051_krp_003-bkkpn8}
  - {type: variant, offset: 69, length: 0, content: '', ZTDZ: 見者也於是正衣冠與之坐不終日而不知病之去也紀渻子}
  - {type: substitution, offset: 69, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 70, length: 0, content: '', ZTDZ: 王養鬭雞十日而問雞已乎曰未也方虚憍而恃氣十日又問曰未也猶應嚮景十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴}
  - {type: variant, offset: 71, length: 7, content: 皆自然也則內放, ZTDZ: 已無變矣望之似木雞矣}
  - {type: punctuation, offset: 72, content: ), id: KR5c0051_krp_003-bkkpn9}
  - {type: 'kr:newline', offset: 72, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl5}
  - {type: line-break, offset: 72, content: '', id: KR5c0051_SBCK_003-1a06}
  - {type: punctuation, offset: 72, content: (, id: KR5c0051_krp_003-bkkpn10}
  - {type: variant, offset: 79, length: 4, content: 身而外冥, ZTDZ: 德全矣異雞無敢應者反走矣孔子觀}
  - {type: punctuation, offset: 84, content: /, id: KR5c0051_krp_003-bkkpn11}
  - {type: variant, offset: 84, length: 14, content: 物與衆玄同任之而無不至也知天, ZTDZ: 吕梁縣水三十仞流沫四十里黿鼉魚鼈}
  - {type: punctuation, offset: 96, content: ), id: KR5c0051_krp_003-bkkpn12}
  - {type: variant, offset: 100, length: 17, content: 爲者天而生也天者自然之謂也夫爲爲者, ZTDZ: ''}
  - {type: substitution, offset: 100, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: 'kr:newline', offset: 101, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl6}
  - {type: line-break, offset: 101, content: '', id: KR5c0051_SBCK_003-1a07}
  - {type: punctuation, offset: 106, content: (, id: KR5c0051_krp_003-bkkpn13}
  - {type: substitution, offset: 114, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: substitution, offset: 115, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: punctuation, offset: 118, content: /, id: KR5c0051_krp_003-bkkpn14}
  - {type: variant, offset: 119, length: 0, content: '', ZTDZ: 游也見一丈夫游之以}
  - {type: substitution, offset: 119, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 120, length: 0, content: '', ZTDZ: 有苦}
  - {type: variant, offset: 121, length: 0, content: '', ZTDZ: 欲死也使弟子並流而拯之數百步而出被髮行歌而游於塘下孔子從而問焉曰吾以子}
  - {type: substitution, offset: 121, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 122, length: 1, content: 自, ZTDZ: 鬼察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齊俱入與汩偕出從水之道而不}
  - {type: substitution, offset: 123, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 124, length: 7, content: 耳爲知者不能知, ZTDZ: 私焉此吾所以蹈之也孔子曰何謂始乎故長乎性成乎命曰吾生於陵}
  - {type: substitution, offset: 125, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: punctuation, offset: 130, content: ), id: KR5c0051_krp_003-bkkpn15}
  - {type: 'kr:newline', offset: 130, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl7}
  - {type: line-break, offset: 130, content: '', id: KR5c0051_SBCK_003-1a08}
  - {type: punctuation, offset: 130, content: (, id: KR5c0051_krp_003-bkkpn16}
  - {type: variant, offset: 132, length: 9, content: 知自知耳自知耳不知, ZTDZ: 安於陵故也長於水而安於水性}
  - {type: page-break, offset: 142, content: '', id: KR5c0051_SJB_003-110601c}
  - {type: variant, offset: 144, length: 0, content: '', ZTDZ: 吾所以然而然命}
  - {type: variant, offset: 145, length: 0, content: '', ZTDZ: 梓慶削木爲鐻鐻成見者驚猶鬼神魯侯見而問焉曰子何術以爲焉對曰臣工人何術之有雖然有一焉臣將爲鐻未嘗敢以耗氣也必齊以靜心齊三日而不敢懷慶賞爵禄齊五日不敢懷非譽巧拙齊七日輒然忘吾有四枝形體也當是時也無公朝其巧專而外滑消然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然}
  - {type: variant, offset: 146, length: 0, content: '', ZTDZ: 已則以天合天器之所以疑神者其是與東野稷以御見莊公進退中繩左右旋中規莊公以爲文弗過也使之鉤百而反顔闔遇之人見曰稷之馬將敗公密而不應少焉果敗而反公曰子何以}
  - {type: punctuation, offset: 147, content: /, id: KR5c0051_krp_003-bkkpn17}
  - {type: variant, offset: 147, length: 2, content: 出於, ZTDZ: 之曰其馬力竭矣而猶求焉故曰敗工倕旋而蓋規矩指與物化而}
  - {type: variant, offset: 150, length: 0, content: '', ZTDZ: 以心稽故其靈臺一而不桎忘足履之適也忘要帶之適也}
  - {type: variant, offset: 151, length: 1, content: 矣, ZTDZ: 忘}
  - {type: variant, offset: 152, length: 1, content: 自, ZTDZ: 是}
  - {type: variant, offset: 153, length: 1, content: 爲, ZTDZ: 非}
  - {type: substitution, offset: 153, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 154, length: 1, content: 耳, ZTDZ: 心}
  - {type: variant, offset: 155, length: 1, content: 不, ZTDZ: 之}
  - {type: variant, offset: 156, length: 1, content: 爲, ZTDZ: 適}
  - {type: substitution, offset: 156, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 159, length: 0, content: '', ZTDZ: 内變不外從事會之適也始乎適而未嘗不適者忘適之適也有孫休者踵門而詫子扁慶子曰休居鄕不見謂不修臨難不見謂不勇然而田原不遇歲事君不遇世賔於鄕里逐於州部則胡罪乎天哉休惡遇此命也扁子曰子獨不聞夫至人之自行邪忘其肝膽遺其耳目芒然彷徨乎塵垢之外逍遥乎無事之業是謂}
  - {type: page-break, offset: 159, content: '', id: KR5c0051_SJB_003-110602a}
  - {type: substitution, offset: 159, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 160, length: 0, content: '', ZTDZ: 而不恃長而不宰今汝飾知以驚愚修身以明汙昭昭乎若揭日月而行}
  - {type: variant, offset: 161, length: 0, content: '', ZTDZ: 汝得全而形軀具而九竅無中道天於聾盲跛蹇而比於人數亦幸矣又何暇乎天之怨哉子往矣孫子出扁子入坐有間仰天而歎弟子問曰先生何爲歎乎扁子曰向者休來吾告之以至人之德吾恐其驚而遂至於惑也弟子曰不然孫子之所言是邪先生之所言非邪非固不能惑是孫子所言非邪先生所言是邪彼固惑而來矣又奚罪焉扁子曰不然昔者有爲止於魯郊魯君悦之爲具太牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己養養鳥也若夫以鳥養養鳥者宜棲之深林浮之江湖食之以委蛇}
  - {type: variant, offset: 162, length: 2, content: 爲出, ZTDZ: 平陸而已矣今休款啓寡聞之民也吾告以至人之德譬之若載鼷以車馬樂鴳以鐘鼓也彼又惡能無驚乎哉外篇山木第二十莊子行}
