  - {type: variant, offset: 21255, length: 383, content: 自爾知下有我字十四行注自然而失者也無也字三十七葉十二行數十十數三十八葉六行知寡人傳國焉無而字八行汜而若無而字十六行注含徳之厚末有者字三十九葉三行注使形者才徳也無此句四行注戰而無而字十行注婚昏無猶四十葉十一行於乎四十一葉六行注徳元元作充九行注徃性四十二葉十六行小哉哉訛者四十三葉二行注獨及四十四葉九行注情此南華真經卷第二南華真經卷第三莊子内篇大宗師第六郭象注四葉一行受愛十五行注澤者上有字五葉八行注殉效六葉十五行注羣君七葉四行注閒閑九行注彼彼訛彼我八葉二行注竟境五行濡八行而其譽堯而作與十五行注生死死生然衍文九葉四行注豈常守故哉無哉字注不謂不作横十一行注乃方十葉十一行注故夫人人作神十三行而不老老上有為字十一葉十一行注故為生果不足以全生故字下有夫字十三葉一行道可得學邪無道字七行已外天矣天字上有下字八行而後外物後字下有能字十四葉五行注成矣成也十六葉二行雞鷄三行而予之尻, ZTDZ: 操}
