  - {type: variant, offset: 11646, length: 1, content: 居, ZTDZ: 之楚舍於蟻丘之漿其鄰有夫妻臣妾登極者子路曰是稯稯何爲者邪仲尼曰是聖人僕也是自埋於民自藏於畔其聲銷其志無窮其口雖言其心未嘗言方且與世違而心不屑與之俱是陸沈者也是其市南宜僚邪子路請往召之孔子曰已矣彼知丘之著於己也知丘之適楚也以丘爲必使楚王之召己也彼且以丘爲佞人也夫若然者其於佞人也羞聞其言而況親}
  - {type: variant, offset: 11648, length: 0, content: '', ZTDZ: 其身乎而何以爲存子路往視之其室虚矣長梧封人問子牢曰君爲政焉勿鹵莽治民焉勿滅裂昔予爲禾耕而鹵莽之則其實亦鹵莽而報予芸而滅裂之其實亦滅裂而報予予來年變齊深其耕而熱耰之其禾蘩以滋予終年厭飱莊子聞之曰今人之治其形理其心多有似封人之所謂遁其天離其性滅其情亡其神以衆爲故鹵莽其性者欲惡之孽爲性萑葦蒹葭始萌以扶吾形尋擢吾性並潰漏發不擇所出漂疽疥癕内熱溲膏是也栢矩學於}
