  - {type: substitution, offset: 15583, original: 㼜, replacement: 盎, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-3559}}
  - {type: variant, offset: 15585, length: 180, content: 癭齊桓公桓公之而視全人其脰肩肩偏情一往則醜者更好而好者更醜也闉音因郭烏年反音企郭其逆反支離無脤徐市軫反又音脣司馬云闉曲豉企也闉支離言脚常曲行體不正卷縮也無脤名也崔云闉者也支離傴者也脤脣同簡文云行也脤脣也衛始銳反又如字下齊桓同之音恱下之同脰音豆頸也肩肩胡田反又胡恩反李云小貌崔云猶玄玄也簡文云直貌甕烏送反郭於寵反㼜烏葬反郭於兩反李云甕㼜大癭貌崔同大癭一領反文云瘤, ZTDZ: 苦}
