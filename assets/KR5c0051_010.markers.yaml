  - {type: variant, offset: 14750, length: 373, content: 昔吾未覧莊子甞聞論者爭夫尺棰連環之意而皆云莊生之言遂以莊生爲辨者之流案此篇較評諸子至於此章則曰其道舛駁其言不中乃知道聽塗之傷實也吾意亦謂無經國體致眞所謂無用之談也然膏梁之子均之戯豫或倦於典言而能辯名祈理以宣其氣以係其思流於後世使性不邪淫不猶賢於博奕者故存而不論以貽好事也駘李音殆蕩殆者放也故蕩不得也夫音符論者力困反較音角評音病中丁仲反倦本亦作勌同思息嗣反邪以嗟反好事呼報反子玄之註論其大體眞可謂得莊生之旨矣郭生前歎膏梁之余亦晚覩貴遊之妄談斯所謂異代同風何可復言也或曰莊惠標濠梁之契發郢匠之模而云其書五車其言不中何也豈契郢匠褒國寢斤而相非之言如此之甚者也荅曰夫不失欲極有教之肆神明其言者豈得不善其辭而盡其喻乎莊生振徽音於七篇列斯文於世重言盡渉玄之路從事展有辭之叙雖談無貴辨而教無虚唱然其文易覧其趣難窺造懐而未逹者有過理之嫌祛斯之弊故大舉惠子之云辯也, HFL: ''}
