body:
  text: 郭象子玄註陸德明音義莊子外篇駢拇第八音義曰舉事以名篇駢拇枝指出乎性哉而侈於德附贅縣疣出乎形哉而侈於性夫長者不爲有餘短者不爲不足此則駢贅皆出於形性非假物也然駢與不駢其於各足而此獨駢枝則於衆以爲多故曰侈耳而惑者或云非性因欲割而棄之是道有所不存德有所不載而人有棄財物有棄用也豈是至治之意哉夫物有小大能有少多所大即駢所多即贅駢贅之分物皆有之若莫之任是都棄萬物之性也駢歲田反廣雅云並也李云併也拇音母足大指也司馬云駢拇謂足拇指連第二指也崔云諸指連大指也枝指如字三蒼云枝指手有六指也崔云音岐謂指有也侈昌是反徐處䜴反郭云多貌司馬云溢也崔云過也德崔云德猶容也贅章銳反廣雅云疣也釋名云橫生一肉属著體也一云瘤結也縣音玄疣音而侈於性司馬云性人之本體也駢拇枝指附贅縣疣此四者各出於形性而非形性之正於衆人爲侈耳於形爲侈於性爲多故在手爲莫用之肉於足爲無施之指也王云性者受生之質德者全生之本駢指受生而有不可多於德贅疣形後而生不可多於性此四者以况才智德行夫音符發句之端於此治直吏反分扶問反後可以意求有之之或作定多方乎仁義而用之者列於五藏哉而非道德之正也夫與物冥者無多也故多方於仁義者雖列於五藏然自一家之正耳未能與物無方而各正性命故曰非道德之正夫方之少多天下未之有限然少多之差各有定分豪芒之降即不可以相故各守其方則少多無不自得而或者聞多之不足以正少因欲棄多而任少是舉天下而棄之不亦妄乎五藏才浪反後皆同黃帝素問云肝心脾肺腎爲五藏是故駢於足者連無用之肉也枝於手者樹無用之指也直自性命不得不然非以有用故然也多方駢枝於五藏之情者淫僻於仁義之行五藏之情直自多方耳而少者橫復尚之以至僻而失至當於體中也僻本又作辟匹亦反徐敷赤反註及篇未同於仁義之行下孟反崔云駢枝贅疣雖非性之正亦出於形不可去也五藏之情雖非道德之正亦列於性不可治也今設仁義之教以治五藏之情猶削駢枝贅疣也旣傷自然之理更益其疾也復扶又反徐篇末注皆同當丁浪反後皆放此而多方於聦明之用也聦明之用各有本分故多方不爲有餘少方不爲不足然情欲之所蕩未嘗不賤少而貴多也見夫可貴而矯以尚之則自多於本用而困其自然之性若乃忘其所貴而保其素分則與性無多而異方倶全矣是故駢於明者亂五色淫文章青黃黼黻之煌煌非乎而離朱是巳多於聦者亂五聲淫六律金石絲竹黃鐘大吕之聲非乎而師曠是巳夫有耳目者未甞以慕聾盲自困也所困常在於希離慕曠則離曠雖性聦明乃是亂耳目之主也黼黻音甫下音弗周禮云白與黒謂之黼黒與青謂之黻煌煌音皇廣雅云光光也向崔本作䪄向云馬氏音煌毛詩傳云皇皇猶煌煌也煌又音晃非乎向云非乎言是也離朱司馬云黃帝時人百歩見秋豪之末一云見千里針鋒孟子作離婁是巳向云猶是也五聲本亦作五音師曠司馬云賢大夫也善音律能致神史記云兾州南和人生而無目枝於仁者擢德塞性以名聲使天下簧鼔以奉不及之法非乎而曾史是巳夫曾史性長於仁耳而性不長者橫復慕之慕之而仁仁巳僞矣天下未嘗慕桀跖而必慕曾史則曾史之簧鼔天下使失其眞性甚於桀跖也擢音濯司馬云㧞也簧音黃鼔謂笙簧也鼔動也曾史曾參史鰌也曾參行仁史鰌行義跖之石反駢於辯者纍瓦結繩句遊心於堅白同異之間而敝跬譽無用之言非乎而楊墨是已夫騁其奇辯致其危辭者未豐容思於檮杌之口而必競辨於楊墨之間則楊墨乃亂羣言之主也纍劣彼反瓦危委反向同崔如字一云瓦當作丸結繩李云言小辯危辭若結繩之纍瓦也崔云聚無用之語如瓦之纍繩之結也七亂反爾雅云微也一云藏也句紀具反司馬云句謂邪微隱穿鑿文句也一音鉤敝本又作蹩徐音婢郭父結反李歩計反司馬云罷也跬徐丘婢反郭音屑向崔本作䞨向丘氏反云近也司馬同李却垂反一音敝跬分外用力之貌譽音于楊墨崔李云楊朱墨翟也思息嗣反檮徒刀反杌音兀故此皆多駢旁枝之道非天下之至正也此數字皆師其天性直自多駢旁枝各自是一家之正耳然以一正萬則萬不正矣故至正者不以巳正天下使天下各得其正而巳數色主反下文此數音同彼正正者不失其性命之情物名任性乃正正也自此已下觀之至正可見矣故之情性但當任之耳意如字下同亦作醫彼仁人何其多憂也恐仁義非人情而憂之者眞可謂多憂也且夫駢於拇者决之則泣枝於手者齕之則啼二者或有餘於數或不足於數其於憂一也謂之不足故泣而决之以爲有餘故啼而齕之夫如此舉羣品萬殊無釋憂之地矣唯各安其天性不决駢而齕枝則曲成而無傷又何憂哉齕李音紇齒斷也徐胡切反郭胡突反啼音提崔本作諦今世之仁人蒿目而憂世之患兼愛之迹可尚則天下之目亂矣以可尚之迹蒿令有患而遂憂之此爲䧟人於難而後拯之也然今世正謂此爲仁也蒿目好羔反司馬云亂也李云蒿目决性之貌令力呈反下同難乃旦反拯拯救之拯不仁之人决性命之情而饕貴富夫貴富所以可饕由有蒿之者也若乃無可尚之迹則人安其分將量力受任豈有决巳效彼以饕竊非望哉饕吐刀反杜預注左傳云貪財曰饕故意仁義其非人情乎自三代以下者天下何其囂囂也夫仁義自是人情也而三代以下橫共囂囂棄情逐迹如將不及不亦多憂乎囂囂許橋反又五羔反字林云聲也崔云憂世之貌且夫待鉤繩規矩而正者是削其性也待繩約膠而固者是侵其德也屈折禮樂呴俞仁義以慰天下之心者此失其常然也天下有常然常然者曲者不以鉤直者不以繩圓者不以規方者不以矩附離不以膠約束不以纆索故天下誘然皆生而不知其所以生同焉皆得而不知其所以得夫物有常然任而不則泯然自得而不自覺也屈崔本作詘折之反謂屈折支體爲禮樂也呴况於反李况付反本又作傴於禹反俞音李音喻本又作呴音詡謂呴喻顔色爲仁義之貌纆音墨廣雅云索也索悉各反下同故古今不二不可虧也同物故與物無二而常全則仁義又奚連連如膠漆纆索而遊乎道德之間爲哉任道而得則抱朴獨往連連假物無爲其間也連連司馬云謂連續仁義遊道德間也使天下惑也仁義連連秪足以惑物使䘮其眞秪音支䘮息浪反下巳䘮同夫小惑易方大惑易性夫東西易方於體未虧矜仁尚義失其常然以之死地乃大惑也何以知其然邪自虞氏招仁義以撓天下也天下莫不奔命於仁義夫與物無傷者非爲仁也而仁迹行焉令萬理皆當者非爲義也而義功見焉故當而無傷者非仁義之招也然而天下奔馳弃我殉彼以失其常然故亂心不由於醜而在美色撓世不出於惡而由仁義則仁義者撓天下之具也撓而小反郭呼堯反又許羔反廣雅云亂也又奴反見賢遍反是非以仁義易其性與雖虞氏無易之情而天下之性固以異矣與音餘此可以意消息後皆倣此故嘗試論之自三代以下者天下莫不以物易其性矣自三代以上實有無爲之迹無爲之迹亦有爲者之所上也尚之則失其自然之素故雖聖人有不得巳或以槃夷之事易垂拱之性而况悠悠者哉三代夏殷周也上時掌反槃夷並如字謂創傷也依字應作瘢痍小人則以身殉利士則以身殉名大夫則以身殉家聖人則以身殉天下夫鶉居而鷇食鳥行而無章者何惜而不殉哉故與世常冥唯變所適其迹則殉世之迹也所遇者或時有槃夷秃脛之變其迹則傷性之迹也然而雖揮斥入極而神氣無變手足槃夷而居形者不擾則奚殉哉無狥也故乃不殉其所殉而迹與世同殉也殉辭俊反徐辭倫反司馬云營也崔云殺身從之曰殉鶉音純又音敦鷇口豆反秃吐木反揮音輝斥音赤故此數子者事業不同名聲異號其於傷性以身爲殉一也臧與榖二人相與牧羊而倶亡其羊問臧奚事則挾筴讀書問榖奚事則博塞以遊二人者事業不同其於亡羊均也伯夷死名於首陽之下盗跖死利於東陵之上二人者所死不同其於殘生傷性均也奚必伯夷之是而盗跖之非乎天下之所惜者生也今殉之太甚俱殘其生則所殉是非不足復論臧作郞反崔云好書曰臧方言云齊之北鄙燕之北郟凡民男而婿婢謂之臧女而婦奴謂之張揖云婿婢之子謂之臧婦奴之子謂之榖如字爾雅云善也崔本作榖云孺子曰谷牧牧養之牧挾音協筴字又作策革反李云竹簡也古以冩書長二尺四寸博塞悉代反塞博之也漢書云吾丘壽王以善格五待詔謂博塞也首陽山名在河東蒲坂縣死謂餓而死東陵李云謂泰山也一云陵名今名東平陵屬濟南郡天下盡殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人其殉一也則有君子焉有小人焉若其殘生損性則盗跖亦伯夷已又惡取君子小人於其間哉天下皆以不殘爲善今均於殘生則雖所殉不同不足復計也夫生奚爲殘性奚爲易哉皆由乎尚無爲之迹也若知迹之由乎無爲而成則絶尚去甚而反冥我極矣堯桀將均於自得君子小人奚辨哉惡音烏君子小人於其間崔本無小人於三字且夫屬其性乎仁義者雖通如曾史非吾所謂臧也以此係彼爲屬屬性於仁殉仁者耳故不善也屬郭時欲反謂係屬也徐音燭謂屬著也下皆同屬其性於五味雖通如俞兒非吾所謂臧也率性通味乃善雖通如楊墨一本無此句俞兒音榆李武榆反司馬云古之善識味人也崔云尸子曰膳俞兒和之以薑桂爲人主上食淮南云俞兒狄牙嘗淄澠之水而別之一云俞兒黃帝時人狄牙則易牙齊桓公時識味人也一云俞兒亦齊人淮南子一本作申兒疑申當作屬其性乎五聲雖通如師曠非吾所謂聦也屬其性乎五色雖通如離朱非吾所謂明也不付之於我而屬之於彼則雖通之如彼而我已䘮矣故各任其耳目之用而不係於離曠乃聦明也吾所謂臧非仁義之謂也臧於其德而已矣善於自得忘仁而仁吾所謂臧者非所謂仁義之謂也任其性命之情而已矣謂仁義爲善則損身以殉之此於性命還自不仁也身且不仁其如人何故任其性命乃能及人及人而不累於已彼我同於自得斯可謂善也累劣僞反後皆放此吾所謂聦者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣夫絶離棄曠自任聞見則萬方之聦明莫不皆全也夫不自見而見彼不自得而得彼者是得人之得而不自得其得者也適人之適而不自適其適者也此舎已效人者也雖效之若人而巳已亡矣舍音捨夫適人之適而不自適其適雖盗踞與伯夷是同爲淫僻也苟以失性爲淫僻則雖所失之異其於失之一也余愧乎道德是以上不敢爲仁義之操而下不敢爲淫僻之行也愧道德之不爲謝冥復之無迹故絶操行忘名利從容吹累遺我忘彼若斯而巳矣槐崔本作䁛云聭愧同行下孟反注同復音服從七容反吹如字又昌僞反字亦作莊子外篇馬蹄第九音義曰舉事以名篇馬蹄可以踐霜雪毛可以禦風寒齕草飮水翹足而陸此馬之眞性也駑名適於身而足馬釋名云武也王弼註易云在下而行者也蹄音提司馬云馬足甲也禦魚吕反廣雅云敵也崔本作辟齕根發反又胡切反翹祁饒反足崔本作尾陸司馬云陸跳也字書作馬健也駑音奴惡馬也音兾千里善馬也雖有義臺路寢無所用之馬之眞性非辭鞌而惡乗但無羡於榮華義許冝反又如字徐音儀崔本同一本作義臺崔云羲臺猶靈臺也路寢路正也大也崔云路寢正室惡烏路反及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皁棧馬之死者十二三矣有意治之則不治矣治之爲善斯不善也伯樂音洛下同伯樂姓孫名陽善馭馬石氏星經云伯樂天星名主典天馬孫陽善馭故以爲名剔敕整反字林云剃也徐詩赤反向崔本作鬄向音郝雒音洛司馬云燒謂燒鐡以爍之剔謂翦其毛刻謂削其甲雒謂羈雒其頭也羈居宜反廣雅云勒也馽丁邑反徐丁力反絆也李音述本亦作馽非也馽之樹反司馬向崔本並作䋶向云馬氏音竦崔云絆前兩足也編必然反皁才老反櫪也一云槽也崔云馬閑也棧士板反徐在簡反又士諌反編木作似牀日棧以禦温也崔云木棚也治直吏反飢之渴之馳之驟之整之齊之前有橛飾之患而後有鞭筴之威而馬之死者已過半矣夫善御者將以盡其能也盡能在於自任而乃走作驅歩求其過能之用故有不堪而多死焉若乃任駑之力適遲疾之分雖則足迹接乎八荒之表而衆馬之性全矣而或者聞任馬之性乃謂放而不乗聞無爲之風遂云行不如臥何其生而不返哉斯失乎莊生之㫖逺矣驟士救反橛向徐其月反司馬云衘也崔云鑣也飾徐音式司馬云排衘也謂加飾於馬鑣也鞭必然反筴革反杜注左傳云馬檛也檛竹反陶者曰我善治埴圎者中規方者中矩匠人者我善治木曲者中鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也世以任自然而不加巧者爲不善於治也揉曲爲直厲駑習能爲規矩以矯拂其性使死而後巳乃謂之善治也不亦過乎陶道刀反謂窑也窑音戈消反埴徐時力反崔云土也司馬云埴土可以爲陶器尚書傳云土黏曰埴釋名云埴膱也膱音之食反中丁仲反下皆同應對之應後不音者放此揉汝久反矯居兆反拂房弗反吾意善治天下者不然以不治治之乃善治也彼民有常性織而衣耕而食是謂同德夫民之德小異而大同故性之不可去者衣食也事之不可廢者耕織也此天下之所同而爲本者也守斯道者無爲之至也去羗吕反一而不黨命曰天放放之而自一耳非黨也故謂之天放放如字崔本作牧云養也故至德之世其行塡塡其視顚顚此自足於內無所求及之貌塡塡徐音田又徒偃反質重貌崔云重遲也一云詳徐貌淮南作莫莫顚顚丁田反崔云專一也淮南作溟溟當是時也山無蹊隧澤無舟梁不求非望之利故止於一家而足蹊徐音兮李云治天下者不然以不治治之乃善治也彼民有常性織而衣耕而食是謂同德夫民之德小異而大同故性之不可去者衣食也事之不可廢者耕織也此天下之所同而爲本者也守斯道者無爲之至也去羗吕反一而不黨命曰天放放之而自一耳非黨也故謂之天放放如字崔本作牧云養也故至德之世其行塡塡其視顚顚此自足於內無所求及之貌塡塡徐音田又徒偃反質重貌崔云重遲也一云詳徐貌淮南作莫莫顚顚丁田反崔云專一也淮南作溟溟當是時也山無蹊隧澤無舟梁不求非望之利故止於一家而足蹊徐音兮李云徑也隧徐音遂崔云道也萬物羣生連屬其鄕混芒而同得也則與一世而淡漠焉豈國異而家殊也連屬其鄕王云旣無國異家殊故其鄕連屬混胡本反芒莫剛反淡徒暫反漠音莫禽獸成羣草木遂長足性而止無呑夷之欲故物全長丁丈反又直良反吞敕恩反又音夭是故禽獸可係羈而遊鳥鵲之巢可攀援而闚與物無害故物馴也攀本又作扳普班反援音廣雅云牽也引也闚去規反馴似遵反或音純夫至德之世同與禽獸居族與萬物並惡乎知君子小人哉同乎無知其德不離知則離道以善也惡音烏離力智反注皆同同乎無欲是謂素樸欲則離性以飾也樸普剥反素樸而民性得矣無煩乎知欲也重意老三章常使民無知無欲及至聖人聖人者民得性之迹耳非所以迹也此云及至聖人猶云及至其迹也蹩躠爲仁踶跂爲義而天下始疑矣澶漫爲樂摘僻爲禮而天下始分矣夫聖迹旣彰則仁義不眞而禮樂離性徒得形表而巳矣有聖人即有斯弊吾若是何哉蹩歩結反向崔本作弊音同躠本又作薛悉結反向崔本作殺音同又音素反踶直氏反向同崔音緹跂丘氏反一音吕氏反崔音枝李云蹩躠踶皆用心爲仁義之貌澶本又作澶徒旦反又吐旦反向崔本作但音憚漫武半反向崔本作曼音同李云澶漫猶縱逸也崔云但曼也一云澶漫牽引也摘敕歷反又渉革反辟匹壁反向音檗徐敷歷反李父歷反本或作僻音同李云紏擿邪辟而爲禮也一音婦赤反法也崔云擿辟多節分如字下分皆同故純樸不殘孰爲犧樽白玉不毀孰爲珪璋道德不廢安取仁義性情不離安用禮樂五色不亂孰爲文采五聲不亂孰應六律凡此皆變樸爲華弃本崇末於其天素有殘廢矣世雖貴之非其貴也犧尊音羲尊或作樽司馬云畫犧牛象以飾樽也王肅云刻爲牛頭鄭玄云畫鳳凰羽飾尊婆娑然也音先河反珪璋音章李云皆器名也銳上方下曰珪半珪曰璋情性不離如字別離也夫殘樸以爲器工匠之罪也毀道德以爲仁義聖人之過也工匠則有規矩之制聖人則有可尚之迹夫馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬知已此矣御其眞知乗其自陸則萬里之路可致而羣馬之性不失頸領也居郢反又祁盈反靡如字李云摩也一云愛也踶大計反又徒反又徒祁反李云踶謂也廣雅字韻聲並同通俗文云小謂之踶知李音智下同夫加之以衡扼齊之以月題而馬知介倪闉扼鷙曼詭銜竊轡故馬之知而能至盗者伯樂之罪也馬性不同而齊求其用故有力竭而熊作者扼於革反衡轅前横木縛軛者也扼又馬頸者也月題徒兮反司馬崔云馬額上當顱如月形者也介徐古八反倪徐五圭反郭五第反李云介倪猶脾倪也崔云介出俾倪也闉音因鷙徐敕二反郭音躓曼武半反郭武諌反李云闉曲也鷙抵也曼突也崔云闉扼鷙曼距扼頓遲也司馬云言曲頸於扼以抵突也一云鷙曼旁出也詭九彼反銜口中勒也或云詭銜吐出銜也竊轡齧轡也崔云詭銜竊轡戾銜撅盗艱轡也熊吐代反夫赫胥氏之時民居不知所爲行不知所之含哺而熈鼔腹而遊民能以此矣此民之眞能也赫本或作呼百反胥氏司馬云赫胥氏上古帝王也一云有赫然之德使民胥附故曰赫胥蓋炎帝也哺音歩及至聖人屈折禮樂以匡天下之形縣仁義以慰天下之心而民乃始踶好知爭歸於利不可止也此亦聖人之過也其過皆由乎迹之可尚也縣音玄踶直氏反丘氏反好呼報反知音智莊子外篇胠篋第十音義曰舉事以名篇將爲胠篋探囊發匱之盗而爲守備則必攝緘縢固扃鐍此世俗之所謂知也然而巨盜至則匱掲篋擔囊而趨唯恐緘縢扃鐍之不固也然則鄕之所謂知者不乃爲大盜積者也知之不足恃也如此胠李起居反史記作愶徐起法反一音虚乏反司馬云從旁開爲胠一云發也篋苦協反探吐南反囊乃剛反匱其位反檻也攝如字李云結也崔云也緘古减反縢向崔本作同徒登反崔云約也案廣雅云緘縢皆䋲也扃古熒反崔李云也鐍古穴反李云紐也崔云環舌也知如字又音智下同掲徐其謁反又音桀三蒼云舉也檐也也擔下甘反趨七須反李云走也恐丘用反鄕本又作向亦作嚮同許亮反爲于僞反下及下注而爲同積如字李子賜反故甞試論之世俗所謂知者有不爲大盜積者乎所謂聖者有不爲大盜守者乎何以知其然邪昔者齊國鄰邑相望雞狗之音相聞罔罟之所布耒耨之所刺方二千餘里闔四竟之內所以立宗廟社稷治邑屋州閭鄕曲者甞不法聖人哉然而田成子一旦殺齊君而盜其國法聖人者法其迹耳夫迹者巳去之物非應變之具也奚足尚而執之哉執成迹以御乎無方無方至而迹滯矣所以守國而爲人守之也罔罟音古罔之通名耒力對反徐力猥反郭吕匱反李云犁也一云耜柄也耨乃豆反李云耡也成云以木爲耡柄刺徐七智反闔戶臘反竟音境下之竟同治直吏反屋周禮夫三爲屋州五黨爲州二千五百家也閭五比爲閭二十五家也鄕五州爲鄕萬二千五百家也田成子齊大夫陳恒也一旦宋元嘉中本作一日殺音弑齊君簡公也春秋哀公十四年陳恒殺之于舒州盗其國司馬云謂割安邑以東至琅邪自爲封邑也所盗者豈獨其國邪幷與其聖知之法而盗之不盗其聖法乃無以取其國也知音智下同故田成子有乎盗賊之名而身處堯舜之安小國不敢非大國不敢誅十二世有齊國則是不乃竊齊國并與其聖知之法以守其盜賊之身乎言聖法唯人所用未足以爲全當之具十二世有齊國自敬仲至莊子九世知齊政自太公和至威王三世爲齊侯故云十二世也守如字舊音狩甞試論之世俗之所謂至知者有不爲大盜積者乎所謂至聖者有不爲大盜守者乎何以知其然邪昔者龍逢斬比干剖萇弘胣子胥靡故四子之賢而身不免乎戮言暴亂之君亦得據君人之威以戮賢人而莫之敢亢者皆聖法之由也向無聖法則桀紂焉得守斯位而放其毒使天下側目哉比干剖普口反謂割心也崔本作節云支解也長直良反弘胣本又作肔徐勑反郭詩氏反崔云讀若拖或作施字胣裂也淮南子曰萇弘鈹裂而死司馬云胣剔也萇弘周靈王賢臣也案左傳是周景王敬王之大夫魯哀公三年六月周人殺萇弘一云刳腸曰胣子胥靡密地反司馬如字云縻也崔云爛之於江中也案子胥伍貟也諌夫差夫差不從賜之屬縷以死投之江也焉於䖍反故跖之徒問於跖曰盜亦有道乎跖曰何適而無有道邪夫妄意室中之藏聖也入先勇也出後義也知可否知也分均仁也五者不備而能成大盜者天下未之有也五者所以禁盗而反爲盗資也跖之石反藏才浪反又如字知可如字本或作知可否分符問反又如字由是觀之善人不得聖人之道不立跖不得聖人之道不行天下之善人少而不善人多則聖人之利天下也少而害天下也多信哉斯言斯言雖信而猶不可亡聖者猶天下之知未能都亡故須聖道以鎭之也羣知不亡而獨亡聖知則天下之害又多於有聖矣然則有聖之害雖多猶愈於亡聖之無治也雖愈於亡聖故未若都亡之無害也甚矣天下莫不求利而不能一亡其知何其迷而失致哉治直吏反下文始治同故曰脣竭則齒寒魯酒薄而邯鄲圍聖人生而大盜起夫竭脣非以寒齒而齒寒魯酒薄非以圍邯鄲而邯鄲圍聖人生非以起大盜而大盜起此自然相生必至之也夫聖人雖不立尚於物而亦不能使物不尚也故人無貴賤事無眞僞苟效聖法則天下吞聲而闇服之斯乃桀跖之所至頼而以成其大盜者也邯音寒鄲音丹邯鄲趙國都也圍楚宣王朝諸侯魯恭公後至而酒薄宣王怒欲辱之恭公不受命乃曰我周公之㣧長於諸侯行天子禮樂勲在周室我送酒巳失禮方責其薄無乃太甚遂不辭而還宣王怒乃發兵與齊攻魯梁惠王常欲擊趙而畏楚救楚以魯爲事故梁得圍邯鄲言事相由也亦是感應宣王名熊良夫悼王之子恭公名奮穆公之子許愼注淮南云楚會諸侯魯趙倶獻酒於楚王魯酒薄而趙酒厚楚之主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄酒奏之楚王以趙酒薄故圍邯鄲也掊擊聖人縱舍盜賊而天下始治矣夫聖人者天下之所尚也若乃其所尚而守其素朴弃其禁令而代以寡欲此所以掊擊聖人而我素朴自全縱舍盗賊而彼姦自息也故古人有言曰閑邪存誠不在善察息淫去華不在嚴刑此之謂也掊普口反擊徐古歷反舍音捨注同邪似嗟反去起吕反下注去欲去其皆同夫川竭而谷虚丘夷而淵實聖人已死則大盜不起竭川非以虚谷而谷虚夷丘非以實淵而淵實絶聖非以止盗而盗止故止盗在去欲不在彰聖知聖人巳死則大盗不起向云事業日新新者爲生故者爲死故曰聖人巳死也乗天地之正御日新之變得實而損其名歸眞而妄其途則大盗息矣天下平而無故矣非惟息盗争尚之迹故都去矣争争闘之争後皆同聖人不死大盜不止雖重聖人而治天下則是重利盜跖也將重聖人以治天下而桀跖之徒亦資其法所資者重故所利不得輕也聖人不死大道不止向云聖人不死言守故而不日新牽名而不造實也大盗不止不亦冝乎爲之斗斛以量之則并與斗斛而竊之爲之權衡以稱之則并與權衡而竊之爲之符璽以信之則并與符璽而竊之爲之仁義以矯之則并與仁義而竊之小盗之所因乃大盗之所資而利也爲之斗斛以量之向云自此以下皆所以明苟非其人雖法無益權衡李云權稱錘衡稱衡也錘音僞反璽音徙矯居表反何以知其然邪彼竊鉤者誅竊國者爲諸侯諸侯之門而仁義存焉則是非竊仁義聖知邪故逐於大盜掲諸侯竊仁義并斗斛權衡符璽之利者雖有軒冕之賞弗能勸斧鉞之威弗能禁夫軒冕斧鉞賞罰之重者也重賞罰以禁盗然大盗者又逐而竊之則反爲盜用矣所用者重乃所以成其大盗也大盗也者必行以仁義平以權衡信以符璽勸以軒冕威以斧鉞盗此公器然後諸侯可得而掲也是故仁義賞罰者適足以誅竊鉤者也鉤謂帶也掲其謁其列二反音越禁音令又居鴆反下不可禁同此重利盜跖而使不可禁者是乃聖人之過也夫跖之不可禁由所盗之利重也利之所以重由聖人之不輕也故絕盗在賤貨不在重聖也故曰魚不可脫於淵國之利器不可以示人魚失淵則爲人禽利器明則爲盗資故不可示人彼聖人者天下之利器也夫聖人者誠能絶聖棄知而反冥物極物極各冥則其迹利物之迹也器猶迹耳可執而用曰器非所以明天下也示利器於天下所以資其盗賊故絶聖棄知大盜乃止去其所資則未施禁而自止也擿玉毀珠小盜不起賤其所寳則不加刑而自息也擿持赤反義與擲字同崔云猶投弃之也郭都革反李云刻也焚符破璽而民朴鄙除矯詐之所頼者則無以行其姦巧掊斗折衡而民不爭夫小平乃大不平之所用也殫殘天下之聖法而民始可與論議外無所矯則內全我朴而無自失之言也殫音丹盡也擢亂六律鑠絶竽瑟塞曠之耳而天下始人含其聦矣滅文章散五采膠離朱之目而天下始人含其明矣夫聲色離曠有耳目者之所貴也受生有分而以所貴引之則性命䘮矣若乃毀其所貴弃彼任我則聦明各全人含其眞也鑠郭李詩灼反向徐音藥崔云燒斷之也竽徐音于瑟本亦作笙塞崔本作塞杜云塞也膠音交徐古孝反䘮矣息浪反毀絶鉤繩而弃規矩攦工倕之指而天下始人有其巧矣故曰大巧若拙夫以蜘蛛蛣蜣之陋而布網轉丸不求之於工匠則萬物各有能也所能雖不同而所習不敢異則若巧而拙矣故善用人者使能方者爲方能圓者爲圓各任其所能人安其性不責萬民以工倕之巧故衆技以不相能似拙而天下皆自能則大巧矣夫用其自能則規矩可弃而妙匠之指可攦也攦郭吕係反又力結反徐所綺反李云折也崔云撕之也倕音垂堯時巧者也一名睡蜘音知蛛音誅蛣起一反蜣音削曾史之行鉗楊墨之口攘弃仁義而天下之德始玄同矣去其亂羣之率則天下各復其所而同於玄德也行下孟反鉗李巨炎反又其嚴反攘如羊反率本又作帥同所反彼人含其明則天下不鑠矣人含其聦則天下不累矣人含其知則天下不惑矣人含其德則天下不僻矣彼曾史楊墨師曠工倕離朱者皆外立其德而以爚亂天下者也此數人者所禀多方故使天下躍而效之效之則失我我失由彼則彼爲亂主矣夫天下之大患者失我也不鑠失灼反崔云不消壞也向音燿僻匹亦反爚徐音藥三蒼云火光銷也司馬崔云散也數所主反法之所無用也若夫法之所用者視不過於所見故衆目無不明聽不過於所聞故衆耳無不聦事不過於所能故衆技無不巧知不過於所知故羣性無不適德不過於所得故羣德無不當安用立所不逮於性分之表使天下奔馳而不能自反哉子獨不知至德之世乎昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏戲氏神農氏當是時也民結繩而用之足以紀要而巳容成氏司馬云此十二氏皆古帝王驪徐力也反李音犁畜徐敕六反戲音羲甘其食美其服適故常甘當故常美若思夫侈靡則無時慊矣慊口簟反樂其俗安其居鄰國相望雞狗之音相聞民至老死而不相往來無求之至樂音洛而不相往來一本作不相與往來檢元嘉中郭注本及崔向永和中本並無與字若此之時則至治巳今遂至使民延頸舉踵曰某所有賢者贏糧而趣之則內弃其親而外去其主之事足跡接乎諸侯之境車結乎千里之外至治之迹猶致斯弊治直吏反注同頸如字李巨盈反嬴音盈崔云裹也廣雅云也糧音良趣七子反徐七喻反則是上好知之過也上謂好知之君知而好之則有斯過矣好呼報反注下皆同上誠好知而無道則天下大亂矣何以知其然邪夫弓弩畢弋機變之知多則鳥亂於上矣鉤餌網罟罾笱之知多則魚亂於水矣削格羅落罘之知多則獸亂於澤矣攻之愈密避之愈巧則雖禽獸猶不可圖之以知而况人哉故治天下者唯不任知任知無妙也弩音怒畢弋機變李云兎網曰畢射曰弋弩牙曰機知音智下及注并下知詐皆同餌如志反罾音曾笱音鉤釣鉤也餌魚餌也廣雅云謂罔魚網也爾雅云婦之笱謂之罶削七妙反格古百反李云削格所以施羅網也子斜反罘本又作罦音浮爾雅云鳥罟謂之羅兎罟謂之罝罬謂之罦孚覆車也郭璞云今飜車也知詐漸毒頡滑堅白解垢同異之變多則俗惑於辯矣上之所多者下不能安其少也性少而以逐多則迷也漸毒李云漸漬之毒不覺深也崔云漸毒猶深害頡戸結反滑子八反頡滑謂難料理也崔云纒屈也李云骨滑稽也一云頡滑不正之語也解苦懈反垢苦豆反司馬崔云解垢隔角也或云詭曲之辭故天下毎毎大亂罪在於好知故天下皆知求其所不知而莫知求其所已知者不求所知而求所不知此乃巳效人而不止其分也毎毎李云猶皆昏也舎音捨下文同皆知非其所不善而莫知非其所已善者善其所善争尚之所由生也是以大亂故上悖日月之明下爍山川之精中墮四時之施惴耎之蟲肖翹之物莫不失其性甚矣夫好知之亂天下也夫吉㐫悔吝生於動也而知之所動誠能揺蕩天地運御羣生故君人者胡可以不忘其知哉悖李郭云必內反又音佩司馬云薄食也樂失約反崔云消也司馬云崩竭也崔向本作櫟同徐音藥墮許規反毀也施始䜴反惴本亦作端又作喘川兖反向音揣耎耳轉反崔云蠉動蟲也一云揣耎謂無足蟲肖翹音消下音祁饒反崔云肖翹植物也李云翾飛之属自三代以下者是已舍夫種種之機而恱夫役役之佞釋夫恬淡無爲而恱夫啍啍之意啍啍已亂天下矣啍啍以巳誨人也種種向章勇反李云謹慤貌一云淳厚也音恱下同役役李云貌一云有爲人也恬徒謙反惔徒暫反徐大敢反啍啍李之閏反又之純反郭音惇下同司馬云少智貌徐許彭反又許剛反向本作啍音亨崔本上句作啍啍少知而芒也一云啍啍壯徤之貌莊子外篇在宥第十一音義曰以義名篇聞在宥天下不聞治天下也宥使自在則治治之則亂也人之生也直莫之蕩則性命不過欲惡不爽在上者不能無爲上之所爲而民皆赴之故有誘慕好欲而民性矣故所貴聖王者非貴其能治也貴其無爲而任物之自爲也宥音又㝟也則治直吏反下治亂同惡烏路反好呼報反在之也者恐天下之淫其性也宥之也者恐天下之遷其德也天下不淫其性不遷其德有治天下者哉無治乃不迁淫有治天下者哉崔本作有治天下者材失云強治之是材之失也昔堯之治天下也使天下欣欣焉人樂其性是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愉也夫堯雖在宥天下其迹則治也治亂雖殊其於失後之世恬愉使物争尚畏鄙而不自得則同耳故譽堯而非桀不如兩也樂音洛恬徒謙反瘁瘁在季反病也廣雅云憂也崔本作醉愉音瑜徐音喻譽音餘夫不恬不愉非德也非德也而可長久者天下無之恬愉自得乃可長久人大喜邪毗於陽大怒邪毗於隂隂陽并毗四時不至寒暑之和不成其反傷人之形乎使人喜怒失位居處無常思慮不自得中道不成章此皆堯桀之流使物喜怒大過以致斯患也人在天地之中最能以靈知喜怒擾亂羣生而振蕩隂陽也故得失之間喜怒集乎百姓之懷則寒暑之和敗四時之節差百度昏亡萬事失落也毗如字司馬云助也一云并也思息嗣反大過音泰於是乎天下始喬詰卓而後有盜跖曾史之行故舉天下以賞其善者不足慕賞乃善故賞不能供喬向欽消反或去夭反郭音矯李音驕詰李去吉反徐起列反崔云喬詰意不平也卓勑角反郭丁角反向音䈇勑二反李猪立反又勑栗反崔云卓行不平也行下孟反舉天下以罰其惡者不給畏罰乃止故罰不能勝勝音升故天下之大不足以賞罰自三代以下者匈匈焉終以賞罰爲事彼何暇安其性命之情哉忘賞罰而自善性命乃大足耳夫賞罰者聖王之所以當功過非以著勸畏也故理至則遺之然後至一可反也而三代以下遂尋其事迹故匈匈焉與迹競逐終以所爲事性命之情何暇而安哉匈音凶而且明邪是淫於色也聦邪是淫於聲也仁邪是亂於德也義邪是悖於理也禮邪是相於技也樂邪是相於淫也聖邪是相於藝也知邪是相於疵也當理無恱恱之則致淫悖之患矣相助也且如字徐子餘反音恱下同悖必內反徐蒲没反相息亮反下及注皆同技其綺反李音崔向云不端也知音智疵疾斯反天下將安其性命之情之八者存可也亡可也存亡無所在任其所受之分則性命安矣天下將不安其性命之情之八者乃始臠卷愴囊而亂天下也必存此八者則不能縱任自然故爲臠卷愴囊也臠力轉反崔本作欒卷卷勉反徐居阮反司馬云臠卷不伸舒之狀也崔同一云相牽引也愴音倉崔本作戕囊如字崔云戕囊猶搶攘而天下乃始尊之惜之甚矣天下之惑也不能遺之以爲誤矣而乃復尊之以爲貴豈不甚惑哉復扶又反豈直過也而去之邪乃齊戒以言之跪坐以進之鼔歌以儛之吾若是何哉非直由寄而過去也乃珍貴之如此去起慮反邪崔本唯此一字作邪餘皆作咫齊本又作齋同側皆反跪其詭反郭音危故君子不得已而臨莅天下莫若無爲無爲也而後安其性命之情無爲者非拱黙之謂也直各任其自爲則性命安矣不得巳者非迫於威刑也直抱道懷朴任乎必然之極而天下自賔也莅音利又音故貴以身於爲天下則可以託天下愛以身於爲天下則可以寄天下若夫輕身以赴利弃我而殉物則身且不能安其如天下何故君子苟能無解其五藏無擢其聦明解擢則傷也解如字一音蟹散也尸居而龍見淵黙而雷聲出處語黙常無其心而付之自然見賢遍反向崔本作鶂向音見崔音睍神動而天隨神順物而動天隨理而行從容無爲而萬物炊累焉若遊塵之自動從七容反炊昌瑞反又昌規反本或作吹同累劣僞反司馬云炊累猶動升也向郭云如塵埃之自動也吾又何暇治天下哉任其自然而巳崔瞿問於老聃曰不治天下安臧人心老聃曰汝愼無攖人心攖之則傷其自善也崔瞿向崔本作臞向求朱反崔瞿人姓名也聃吐藍反女音汝攖於營反又於盈反司馬云引也崔云覊落也人心排下而進上排之則下進之則上言其易揺蕩也排皮皆反崔本作排上時掌反注及下同易以䜴反上下囚殺無所排進乃安全耳因殺如字徐所例反言囚殺萬物也淖約柔乎剛強言能淖約則剛強者柔矣淖昌略反又直各反廉劌彫琢其熱焦火其寒凝冰夫焦火之熱凝冰之寒皆喜怒并積之所生若乃不彫不琢各全其朴則何氷炭之有哉劌居衛反司馬云傷也廣雅云利也琢丁角反其疾俛仰之間而再撫四海之外風俗之所動也其居也淵而靜其動也縣而天靜之可使如淵動之則係天而踊躍也縣而天音玄向本無而字云希高慕逺之故也曰縣天也僨驕而不可係者其唯人心乎人心之變靡所不爲順而放之則静而通治而係之則而僨驕僨驕者不可禁之勢也僨粉問反廣雅云僵也郭音奔驕如字又居表反昔者黃帝始以仁義攖人之心夫黃帝非爲仁義也直與物冥則仁義之迹自見迹自見則後世之心必自殉之是亦黃帝之迹使物攖也見賢遍反下同堯舜於是乎股無胈脛無毛以養天下之形愁其五藏以爲仁義矜其血氣以規法度然猶有不勝也堯於放讙兠於崇山投三苗於三峗流共工於幽都此不勝天下也夫施及三王而天下大駭矣夫堯舜帝王之名皆其迹耳我寄斯迹而迹非我也故駭者自世世彌駭其迹愈粗粗之與妙自之夷險耳遊者豈常改其足哉故聖人一也天有堯舜湯武之異明斯異者時世之名耳未足以名聖人之實也故夫堯舜者豈直堯舜而巳哉是以雖有矜愁之貌仁義之迹而所以迹者故全也股音古脛本曰股胈畔末反向父末反李扶蓋反云白肉也或云字當作紱紱蔽膝也崔云胈也脛刑定反讙音歡兠丁侯反崇山南裔也堯六十年放讙兠于崇山投三苗崔本投作殺尚書作竄三苗者縉雲氏之子即饕餮也三峗音危本亦作危三危西裔之山也今属天水堯六十六年竄三苗於三危共工音恭共工官名即窮奇也幽都李云即幽州也尚書作幽州北裔也堯六十四年流共工于幽州施以智反崔云延也駭驚也粗音麄下同下有桀跖上有曾史而儒墨畢起於是乎喜怒相疑愚知相欺善否相非誕信相譏而天下衰矣莫能齊於自得知音智下及注同大德不同而性命爛漫矣立小異而不止於分天下好知而百姓求竭矣知無涯而好之故無以供其求好呼報反注同於是乎釿鋸制焉繩墨殺焉椎鑿决焉彫琢性命遂至於此釿音斤本亦作斤鋸音據釿鋸制謂如肉刑也繩墨殺焉並如字崔云謂彈正殺之椎直追反鑿在洛反决古穴反又苦穴反崔云肉刑故用椎鑿天下脊脊大亂罪在攖人心故賢者伏處大山嵁岩之下而萬乗之君憂慓乎廟堂之上故夫任自然而居當則賢愚襲情而貴賤履位君臣上下莫匪爾極而天下無患矣斯迹也攖天下之心使奔馳而不可止故中知以下莫不外飾其性以眩惑衆人惡直醜正蕃徒相引是以任眞者失其據而崇僞者竊其柄於是主憂於上民困於下矣脊脊音籍在亦反相踐籍也本亦作肴肴廣韻云肴亂也大山音泰亦如字堪苦岩反一音苦咸反又苦嚴反岩音嚴語衘反一音嵒語咸反眩玄遍反惡烏路反蕃音煩今世殊死者相枕也桁楊者相推也刑戮者相望也而儒墨乃始離攘臂乎桎梏之間意甚矣哉其無愧而不知耻也甚矣由腐儒守迹故致斯禍不思迹反一而方復攘臂用迹以治迹可謂無愧而不知耻之甚也殊死如字廣雅云殊斷也司馬云决也一云誅也字林云死也文同又云漢令曰蠻夷長有罪當殊之崔本作殀也枕之鴆反桁戸剛反司馬云㫢長械也楊向音楊崔云械錮頸及挳者皆曰桁楊離力氏反又力智反丘氏反又丘䜴反攘如羊反桎之實反梏古毒反意如字又音醫愧崔本作䁛腐音輔復扶又反吾未知聖知之不爲桁楊椄槢也仁義之不爲桎梏鑿枘也桁楊以接槢爲管而桎梏以鑿枘爲用聖知仁義者逺於罪之迹也迹逺罪則民思尚之尚之則矯詐生焉矯詐生而禦奸之噐不具者未之有也故弃所向則矯詐不作矯詐不作則桁楊桎梏廢矣何鑿枘椄槢之爲哉椄李如字向徐音妾郭慈接反槢郭李音習徐徒余反司馬云椄槢械者音息節反崔本作云讀爲牒或作謂字椄槢桎梏梁也淮南曰大者爲柱梁小者爲椄槢也鑿在洛反又在報反衲人銳反向本作內音同三蒼云柱頭枘也鑿頭厠木如柱頭枘逺力萬反下同禦魚吕反本作御音同焉知曾史之不爲桀跖嚆矢也嚆矢矢之猛者言曾史爲桀跖之利用也焉於䖍反嗃矢許本亦作嗃向云嚆矢矢之鳴者也朴云嚆大呼也崔本作蒿云蕭蒿可以爲箭或作矯矯揉也崔本此下更有有無之相生也則甚曾史與桀跖皆有無也又惡得無相轂也凡二十四字故曰絶聖棄知而天下大治去其所以攖也治直吏反去起吕反黃帝立爲天子十九年令行天下聞廣成子在於空同之上故往見之曰我聞吾子逹於至道敢問至道之精吾欲取天地之精以佐五榖以養民人吾又欲官隂陽以遂羣生爲之柰何廣成子曰而所欲問者物之質也問至道之精可謂質也廣成子或云即老子也空同司馬云當北斗下山也爾雅云北戴斗極爲空同一曰在梁國虞城東三十里質廣雅云質正也而所欲官者物之殘也不任其自爾而欲官之故殘也自而治天下雲氣不待族而草木不待黃而落日月之光益以荒矣而佞人之心翦翦者又奚足以語至道黃帝退天下築特室席白茅間居三月復往邀之廣成子南首而臥黃帝順下風膝行而進再拜稽首而問曰聞吾子逹於至道敢問治身柰何而可以長久廣成子蹷然而起曰善哉問乎人皆自修而不治天下則天下治矣故善之也雲氣不待族而司馬云族聚也未聚而言澤少草木不待黃而落司馬云言殺氣多也爾雅云落死也益以崔本作蓋以佞如字郭音寧翦翦如字郭司馬云善辨也一云佞貌李云淺短貌或云狹小之貌恱全反間音閑下註同復扶又反邀古堯反要也首音狩蹷其月反又音厥驚而起也治直吏反來吾語女至道至道之精窈窈冥冥至道之極昏昏黙黙窈冥昏黙皆了無也夫莊老之所以屢稱無者何哉民生物者無物而物自生耳自生耳非爲生也又何有爲於巳生乎語魚據反下同女音汝後放此窈烏了反無視無聽抱神以靜形將自正忘視而自見聽而自聞則神不擾而形不邪也邪似嗟反必靜必清無勞女形無搖女精乃可以長生任其自動故間静而不天也目無所見耳無所聞心無所知女神將守形形乃長生此皆率性而動故長生也愼女內全其眞也閉女外守其分也多知爲敗知無崖故敗我爲女遂於大明之上矣至彼至陽之原也爲女入於窈冥之門矣至彼至隂之原也夫極隂陽之原乃遂於大明之上入於窈冥之門也爲于僞反下同天地有官隂陽有藏但當任之愼守女身物將自壯我守其一以處其和故我脩身千二百歲矣吾形未常衰取於盡性命之極極長生之致耳身不天乃能及物也物將自壯則亮反謂不治天下則衆物皆自任自任而壯也黃帝再拜稽首曰廣成子之謂天矣天無爲也廣成子曰來余語女彼其物無窮而人皆以爲終彼其物無測而人皆以爲極徒見其一變也得吾道者上爲皇而下爲王皇王之稱隨世之上下耳其於得通變之道以應無窮一也稱尺證反失吾道者上見光而下爲土失無窮之道則自信於一變而不得均同上下故俯仰異心今夫百昌皆生於土而反於土故余將去女土無心者也生於無心故當反守無心而獨往也百昌司馬云猶百物也入無窮之門以遊無極之野與化俱也吾與日月參光吾與天地爲常都任之也當我緡乎逺我昬乎物之去來皆不覺也當如字緡武巾反郭音泯泯合也逺于萬反昏如字暗也司馬云緡昏並無心之謂也人其盡死而我獨存乎以死主爲一體則無往而非存雲將東遊過扶搖之枝而適遭鴻鴻方將拊脾雀躍而遊雲將見之倘然止䞇然立曰叟何人邪叟何爲此鴻拊脾雀躍不輟對雲將曰遊雲將曰朕願有問也鴻仰而視雲將曰吁雲將曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育羣生爲之柰何鴻拊脾雀躍掉頭曰吾弗知吾弗知雲將不得問又三年東遊過有宋之野而適遭鴻雲將大喜行趨而進曰天忘朕邪天忘朕邪再拜稽首願聞於鴻鴻曰浮遊不知所求而自得所求也雲將子匠反下同李云雲主帥也扶搖扶亦作夫李云扶搖神木也生東海一云風也鴻如字司馬云自然元氣也一云海上氣也拊孚甫反一音甫脛本又作髀音陛徐甫婢反又甫娣反崔本又作爵同將略反躍司馬云雀躍若雀浴也一云如爵之跳躍也倘尺掌反又云吐郎反李云吐黨反司馬云欲貌李云自失貌䞇之二反又猪立反又魚列反李云不動貌叟本又作素口反郭䟽溝反司馬云長者稱輟丁劣反李云止也吁况于反亦作呼結如字崔本作綰音結掉徒弔反宋如字國名也本作宗者非猖狂不知所往而自得所往也遊者鞅掌以觀無夫內足者舉目皆自正也鞅掌於丈反毛詩傳云鞅掌失容也今此言自得而正也朕又何知以斯而已也雲將曰朕也自以爲猖狂而民隨予所往朕也不得已於民今則民之放也夫乗物非爲迹而迹自彰猖狂非招民而民自往故爲民所放效而不得巳也放方往反效也注同願聞一言鴻曰亂天下之經逆物之情玄天弗成若夫順物性而不治則情不逆而經不亂玄黙成而自然得也解獸之羣而鳥皆夜鳴離其所以静也災及草木禍及止蟲皆坐而受害也止蟲如字本亦作昆虫崔本作止虫坐才臥反意治人之過也夫有治之迹亂之所由生也意音醫本又作噫下皆同雲將曰然則吾柰何鴻曰意毒哉言治人之過深僊僊乎歸矣僊僊坐起之貌嫌不能隤然通放故遣使歸僊音仙雲將曰吾遇天難願聞一言鴻曰意心養夫心以用傷則養心者其唯不用心乎汝徒處無爲而物自化墮爾形體吐爾聦明倫與物理與物皆不以存懷而闇付自然則無爲而自化矣墮音許規反大同乎涬溟與物無際涬戸項反又音幸溟亡頃反司馬云涬溟自然氣也解心釋神莫然無魂坐亡任獨萬物云云各復其根各復其根而不知不知而復乃眞復也渾渾沌沌終身不離渾沌無知而任其自復乃能終身不離其本也渾戸本反沌徒本反離力智反下及注皆同若彼知之乃是離之知而復知與復矣無問其名無闚其情物故自生闚問則失其自生也雲將曰天降朕以德示朕以黙躬身求之乃今也得知而不黙常自失也再拜稽首起辭而行世俗之人皆喜人之同乎己而惡人之異於已也同於已而欲之異於已而不欲者以出乎衆爲心也心欲出羣爲衆携也惡烏路反夫以出乎衆爲心者曷常出乎衆哉衆皆以出爲心故所以爲衆人也若我亦欲出乎衆則與衆無異而不能相出矣夫衆皆以相出爲心而我獨無往而不同乃大殊於衆而爲衆主也因衆以寧所聞不如衆技衆矣吾一人之所聞不如衆技多故因衆則寧也若不因衆則衆之千萬皆我敵也因衆以寧所聞因衆人之所聞見委而任之則自寧安不如衆技音其綺反衆以若役我之知逹衆人衆人之技多於我矣安得而不自困哉而欲爲人之國者此攬乎三王之利而不見其患者也夫欲爲人之國者不因衆之自爲而以巳爲之者此爲徒求三王主物之利而不見巳爲之患也然則三王之所以利豈爲之哉因天下之自爲而任耳攬音覽本亦作覽此以人之國僥倖也幾何僥倖而不䘮人之國乎無萬分之一而䘮人之國也一不成而萬有餘䘮矣與天下相因而成者也今以一巳而專制天下則天下塞矣巳豈通哉故一身旣不成而萬方有餘䘮矣僥古堯反徐古了反字或作徼倖音幸一云僥倖求利不止之貌幾居豈反郭巨幾反䘮息浪反下及注同分如字又扶問反悲夫有土者之不知也夫有土者有大物也有大物者不可以物物不能用物而爲物用即是物耳豈能物物哉不能物物則不足以有大物矣而不物故能物物夫用物者不爲物用也不爲物用斯不物矣不物故物天下之物使各自得也明乎物物者之非物也豈獨治天下百姓而已哉出入六合遊乎九州用天下之自爲故馳萬物而不窮獨往獨來是謂獨有人皆自異而巳獨羣遊斯乃獨往獨來者也獨有斯獨可謂獨有矣獨有之人是之謂至貴夫與衆玄同非求貴於衆而衆人不能不貴斯至貴也若乃信其偏見而以獨異爲心則雖同於一致故是俗中之一物耳非獨有者也未能獨有而欲饕竊軒冕冐取非分衆豈歸之也哉故非至貴也饕吐刀反冐亡報反又亡北反大人之教若形之於影聲之於嚮百姓之心形聲也大人之教影嚮也大人之於天下何心哉猶影嚮之隨形聲耳嚮許丈反本又作響注及下同有問而應之盡其所懷使物之所懷各得自盡也爲天下配問者爲主應故爲配處乎無嚮寂以待物行乎無方隨物轉化挈汝適復之撓撓撓撓自動也提挈萬物使復歸自動之性即無爲之至也挈苦結反廣雅云持也撓而小反以遊無端與化倶故無端出入無旁玄同無表與日無始與日新俱故無始也頌論形軀合乎大同其形容與天地無異大同而無巳有巳則不能大同也無巳惡乎得有有天下之難無者巳也巳旣無矣則羣有不足復有之惡音烏復扶又反覩有者昔之君子能美其名者耳覩無者天地之友覩無則任其獨生也賤而不可不任者物也卑而不可不因者民也因其性而任之則治反其性而凌之則亂夫民物之所以卑而賤者不能因任故也是以任賤者貴因卑者尊此必然之符也治直吏反匿而不可不爲者事也夫事藏於彼故匿也彼各自爲故不可不爲但當因任耳匿女力反麤而不可不陳者法也法者妙事之迹也安可以迹麄而不陳妙事哉逺而不可不居者義也當乃居之所以爲逺親而不可不廣者仁也親則苦偏故廣乃仁耳節而不可不積者禮也夫禮節者患於係一故物物體之則積而周矣中而不可不高者德也事之下者雖中非德中而不可不高者德也中者順也順其性而高也一而不可不易者道也事之難者雖一非道况不一哉易以䜴反下注同神而不可不爲者天也執意不爲雖神非天况不神哉故聖人觀於天而不助順自爲而巳成於德而不累自然與高會也出於道而不謀不謀而一所以爲易會於仁而不恃恃則不廣薄於義而不積率性居逺非積也應於禮而不諱自然應禮非由忌諱接於事而不辭事以理接能否自任應動而動無所辭讓應憶升反齊於法而不亂御粗以妙故不亂也恃於民而不輕恃其自爲耳不輕用也因於物而不去因而就任之不去其本也物者莫足爲也而不可不爲夫爲者豈以足爲故爲哉自體此爲故不可得而止也物者莫足爲也分外也而不可不爲分內也不明於天者不純於德不明自然則有爲有爲而德不純也不通於道者無自而可不能虚巳以待物則事事失會不明於道者悲夫何謂道有天道有人道無爲而尊者天道也在上而任萬物之自爲也有爲而累者人道也以有爲爲累者不能率其自德也主者天道也同乎天之任物則自然居物上臣者人道也各當所任天道之與人道也相去逺矣君任無爲而委百官百官有所司而君不與焉二者俱以不爲而自得則君道逸臣道勞勞逸之際不可同日而論之也與焉音預不可不
