  - {type: variant, offset: 3365, length: 546, content: 恱賢而惡不肖惡用而求有以異苟能恱賢惡愚聞義而服便爲明君也苟爲明君則不苦無賢臣汝往亦不足復奇如其不爾往必受害故以有心而往無往而可無心而應其應自來則無往而不可也夫音符肖音徐蘇呌反似也惡用音烏若唯無詔王公必將乗人而其捷汝唯有寂然不言耳言則王公必乗人以君人之勢而角其捷辯以距諌飾非也唯郭如字一音唯癸反詔絶句詔告也言也崔本作詻音額云逆擊曰詻王公必將乗人絶句而闘其捷在接反崔讀若唯無詻王公絶句必將乗人而闘絶句捷作接其接引續也而目將熒之其言辯捷使人眼眩熒戸扄反向崔本作營音熒眩玄遍反而色將平之不能復自異於彼也口將營之自救解不暇容將形之心且成之乃且釋巳以從彼也容將形之謂擎跽也是以火救火以水救水名之曰益多適不能救乃更足以成彼之盛順始無窮尋常守故未肯變也若殆以不信厚言必死於暴人之前矣未信而諌雖厚爲害且昔者桀殺龍逢紂殺王子比干是皆脩其身以下傴拊人之民以下拂其上者也居下而任上之憂比干非其事也龍逢夏桀之賢臣王子比干殷紂之叔父下遐嫁反傴紆甫反拊徐向音撫李云傴拊謂憐愛之也崔云猶嘔呴謂養也拂符弗反崔云違也又勞弗反故其君因其脩以擠之是好名者也不欲令臣有勝君之名也擠徐子計反又子禮反司馬云毒也一云䧟也方言云滅也簡文云排也好呼報反令力呈反昔者堯攻叢枝胥敖禹攻有扈國爲虚厲身爲刑戮其用兵不止其求實無已是皆求名實者也而獨不聞之, ZTDZ: 安怊}
