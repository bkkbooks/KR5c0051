  - {type: variant, offset: 3622, length: 3, content: 大音泰, ZTDZ: 終日握而手不掜共其德也終日視而目不瞚偏不在外也行不知所}
  - {type: variant, offset: 3626, length: 5, content: 先一本作先, ZTDZ: 居不知所爲與物委蛇而同其波是衛生}
  - {type: variant, offset: 3632, length: 20, content: 崔本同先天悉薦反長丁丈反稱尺證反狶韋氏得, ZTDZ: 經已南榮趎曰然則是至人}
