  - {type: punctuation, offset: 15926, content: /, id: KR5c0051_krp_001-bkkpn1696}
  - {type: variant, offset: 15929, length: 643, content: 而彼我莫能相正故無所用其知齧五結反缺丘恱反王倪徐五嵇反李音詣高士傳云王倪堯時賢人也天地篇云齧缺之師惡音烏下皆同子知子之所不知邪曰吾惡乎知之若自知其所不知即爲有知有知則不能任羣才之自當然則物無知邪曰吾惡乎知之都不知乃曠然無不任矣雖然嘗試言之以其不知故未敢正言試言之耳庸詎知吾所謂知之非不知邪魚游於水水物所同咸謂之知然自魚觀之則向所謂知者復爲不知矣夫蛣之知非於轉丸而笑蛣者乃以蘇合爲貴故所同之知未可正據庸詎徐本作巨其庶反郭音鉅李云庸用也詎何也猶言何用也服䖍云詎猶未也復扶又反蛣丘一反丘良反爾雅云蛣蜋也庸詎知吾所謂不知之非知邪所謂不知者直是不同耳亦自一家之知且吾嘗試問乎女已不知其正故試問女女音汝注及下同巳音紀民溼寢則腰疾偏死鰌然乎哉木處則惴慄恂懼猨猴然乎哉三者孰知正處此畧舉三者以明萬物之異便偏死司馬云偏枯死也鰌徐音秋司馬云魚名惴之瑞反慄音栗恂郭音荀徐音峻恐貌崔云戰也班固作眴也猨音猿猴音侯便婢靣反民食芻豢麋鹿食薦蝍且甘帶鴟鴉䑕四者孰知正味此畧舉四者以明美惡之無主芻倶反小爾雅云秆謂之芻秆音古但反豢徐音患又胡滿反司馬云牛羊曰芻犬豕曰豢以所食得名也麋音眉薦牋練反司馬云美草也崔云甘草也郭璞云三蒼云六畜所食曰薦蝍音即且字或作蛆子徐反李云蝍且蟲名也廣雅云蜈公也爾雅云蒺蔾蝍蛆郭璞注云似蝗大腹長角能食蛇腦蒺音疾蔾音棃帶如字崔云蛇也司馬云小蛇也蝍蛆好食其眼鴟尺夷反鴉本亦作鴟於加反崔云烏也市志反字或作崔本作其惡烏路反猨猵狙以爲雌麋與鹿交鰌與魚游毛嬙麗人之所美也魚見之深入鳥見之高飛麋鹿見之決驟四者孰知, ZTDZ: ''}
