  - {type: variant, offset: 7291, length: 1, content: 遊, ZTDZ: 怒者唯同乎天和者爲然出怒不怒則怒出}
  - {type: variant, offset: 7293, length: 2, content: 外者, ZTDZ: 不怒矣出爲無爲則爲出於無爲矣欲靜則平氣欲神則順心有爲}
  - {type: variant, offset: 7296, length: 38, content: 故聖人常遊外以私內無心以順有故雖終日揮形而神氣無變俯仰萬機而淡然自若夫見形而, ZTDZ: 欲當則縁於}
