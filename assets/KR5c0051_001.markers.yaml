  - {type: variant, offset: 22333, length: 5, content: 十七葉十二, ZTDZ: 年東遊過有宋之野而適遭鴻蒙雲將大喜}
  - {type: punctuation, offset: 22339, content: ), id: KR5c0051_krp_001-bkkpn2881}
  - {type: variant, offset: 22339, length: 0, content: '', ZTDZ: 趨而進曰天忘朕邪天忘朕邪再拜稽首願聞於鴻蒙鴻蒙曰浮遊不知所求猖狂不知所往遊者鞅掌以觀無妄朕又何知雲將曰朕也自以爲猖狂而民隨}
  - {type: substitution, offset: 22339, original: 予, replacement: 豫, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20745}}
