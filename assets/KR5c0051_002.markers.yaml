  - {type: variant, offset: 12175, length: 579, content: 間蕩然無不當而擴然無不適也物視其所一而不見其所䘮視䘮其足猶遺土也體夫極數之妙心故能無物而不同無物而不同則死生變化無往而非我矣故生爲我時死爲我順時爲我聚順爲我散聚散雖異而我皆我之則生故我耳未始有得死亦我也未始有䘮夫死生之變猶以爲一旣觀其一則然無係玄同彼我以死生爲寤寐以形骸爲逆旅去生如脫屣斷足如遺土吾未見足以纓茀其心也䘮息浪反下及注同始銳反又音恱脫屣九具反本亦作屣所買反斷丁管反常季曰彼爲已以其知嫌王駘未能忘知而自存爲于僞反得其心以其心嫌未能遺心而自得得其常心物何爲最之哉夫得其常心平往者也嫌其不能平往而與物過常故使物就之最徂會反徐采㑹反下注同司馬云聚也仲尼曰人莫鑑於流水而鑑於止水夫止水之致鑑者非爲止以求鑑也故王駘之聚衆衆自歸之豈引物使從巳鑑古暫反流水崔本作沬水云沫或作流唯止能止衆止動而爲之則不能居衆物之止受命於地唯松栢獨也在冬夏靑靑夫松栢特禀自然之鍾氣故能爲衆木之傑耳非能爲而得之也受命於天唯舜獨也正言特受自然之正氣者至希也下首則唯爲松栢上首則唯有聖人故凡不正者皆來求正耳若物皆有青全則無貴於松栢人各自正則無羡於大聖而趣之幸能正生以正衆生幸自能正耳非爲正以正之夫保始之徵不懼之實勇士一人雄入於九軍將求名而能自要者而猶若是非能遺名而無不任保始之徴李云徴成也終始可保成也九軍崔李云天子六軍諸侯三軍通爲九軍也簡文云兵書以攻九天九地故謂之九軍要一遥反而況官天地府, ZTDZ: 理}
