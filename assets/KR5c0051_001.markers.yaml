  - {type: variant, offset: 22185, length: 9, content: 郭象注二十六葉十二, ZTDZ: 聞在宥天下不聞治天下也在之也者恐天下之淫其性也宥之也者恐天下之遷其德也天下不淫其性不遷其德有治天下者哉昔堯之治天下也使天下欣欣焉人樂其性是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愉也夫不恬不愉非德也非德也而可長乆者天下無之人大喜邪毗於陽大怒邪毗於陰陰陽並毗四時不至寒暑之和不成其反傷人之形乎使人喜怒失位居處無常思慮不自得中道不成章於是乎天下始喬詰卓鷙而後有盜跖曾史之}
  - {type: page-break, offset: 22185, content: '', id: KR5c0051_SJB_001-110584a}
