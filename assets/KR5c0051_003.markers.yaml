  - {type: variant, offset: 165, length: 0, content: '', ZTDZ: 山中見大木枝葉盛茂伐木者止其旁而}
  - {type: variant, offset: 166, length: 7, content: 爲矣爲出於不爲, ZTDZ: 取也問其}
