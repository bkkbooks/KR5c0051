  - {type: variant, offset: 141, length: 2, content: 鯤鯤, ZTDZ: 攖寧攖寧也者攖而後成者也南伯子葵曰子獨惡乎聞之曰聞諸副墨之子副墨之子聞諸洛誦之孫洛誦之孫聞之瞻明瞻明聞之聶許聶許聞之需役需役聞之於謳於謳聞之玄冥玄冥聞之參寥參寥聞之疑始子祀子輿子犁子來四人相與語曰孰能以無爲首以生爲脊以死爲尻孰知死生存亡之一體者吾與之友矣四人相視而笑莫逆於心遂相與爲友俄而子輿有病子祀往問之曰偉哉夫造物者將以子爲此拘拘也曲僂發背上有五管順隱於齊肩高於頂句贅指天陰陽之氣有沴其心閒而無事跰𨇤而鑑于井曰嗟乎夫造物者又將以予爲此拘拘也子祀曰汝惡之乎曰亡予何惡浸假而化予之左臂以爲雞予因以求時夜浸假而化予之右臂以爲彈予因以求鴞炙浸假而化予之尻以爲輪以神爲馬予因而乘之豈更駕哉且夫得者時也失者順也安時而處順哀樂不能入也此古之所謂縣解也而不能自解者物有結之且夫物不勝天久矣吾又何惡焉俄而子來有病喘喘然將死其妻子環而泣之犁徃問之曰叱避無恒化倚其户與之語曰偉哉造化又將奚以汝爲將奚以汝適以汝爲鼠肝乎以汝爲蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅於父母彼近吾死而我不聽我則捍矣彼何罪焉夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也今}
  - {type: page-break, offset: 141, content: '', id: KR5c0051_SJB_001-110578b}
  - {type: page-break, offset: 141, content: '', id: KR5c0051_SJB_001-110578c}
  - {type: variant, offset: 145, length: 0, content: '', ZTDZ: 冶鑄金金踴躍曰我且必爲鏌鋣大冶必以爲不祥之金今一犯人之形而曰人耳人耳夫造化者必以爲不祥之人今一以天地爲大鑪以造化爲大冶惡乎往而不可哉成然寐蘧然覺子桑户孟子反子琴張三人相與友曰孰能相與於與相與相爲於無相爲孰能登天遊霧撓挑無極相忘以生無所終窮二人相視而笑莫逆於心遂相與友莫然有間而子桑户死未葬孔子聞之使子貢往待事焉或編曲或鼓琴相和而歌曰嗟來桑户乎嗟來桑户乎而已反其眞而我猶爲人猗子貢趨而進曰敢問臨尸而歌禮乎二人相視而笑曰是惡知禮意子貢反以告孔子曰彼何人者邪脩行無有而外其形骸臨尸而歌顔色不變無以命之彼何人者邪孔子曰彼遊方之外者也而丘遊方之内者也外内不相及而丘使汝往弔之丘則陋矣彼方且與造物者爲人而遊乎天地之一氣彼以生爲附贅縣疣以死爲决疣潰癰夫若然者又惡知死生先後之所在假於異物託於同體忘其肝膽遺其耳目反覆終始}
  - {type: page-break, offset: 145, content: '', id: KR5c0051_SJB_001-110579a}
  - {type: variant, offset: 147, length: 0, content: '', ZTDZ: 端倪芒然彷徨乎塵垢之外逍遥乎無爲之業彼又惡能憒憒然爲世俗之禮以觀衆人之耳目哉子貢曰然則夫子何方之依曰丘天之戮民也雖然吾與汝共之子貢曰敢問}
  - {type: variant, offset: 148, length: 3, content: 幾千里, ZTDZ: 方孔子曰魚相造乎水人相造乎道相造乎水者穿池而養給相造乎道者無事而生定故曰魚相忘乎江湖人相忘乎道術子貢曰敢問畸人曰畸人者畸於人而侔於天故曰天之小人人之君子人之君子天之小人}
  - {type: 'kr:newline', offset: 151, content: '

