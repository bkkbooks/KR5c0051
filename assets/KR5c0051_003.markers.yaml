      ', id: KR5c0051_krp_003-bkkkrnewl152}
  - {type: line-break, offset: 3538, content: '', id: KR5c0051_SBCK_003-12a06}
  - {type: punctuation, offset: 3538, content: (, id: KR5c0051_krp_003-bkkpn458}
  - {type: variant, offset: 3538, length: 0, content: '', ZTDZ: 已行矣吾聞至人尸居環堵}
  - {type: variant, offset: 3539, length: 0, content: '', ZTDZ: 室而百姓猖狂不知所如往今以畏壘之細民而竊竊焉欲俎豆予于賢人之間我其杓之人邪吾是以不釋於老聃之言弟子曰不然夫尋常之溝巨魚}
  - {type: variant, offset: 3541, length: 1, content: 不, ZTDZ: 還}
