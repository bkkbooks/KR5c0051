  - {type: substitution, offset: 15497, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 15499, length: 1, content: 通, ZTDZ: 達}
  - {type: variant, offset: 15500, length: 1, content: 矣, ZTDZ: 已}
  - {type: variant, offset: 15504, length: 0, content: '', ZTDZ: 莊子之言汒焉異之不知論之不及與知之弗若與今吾無所開吾喙敢問其方公子牟隱机大息仰天而笑曰子獨不聞夫塪井之蛙乎謂東海之鼈曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接腋持頤蹶泥則没足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨踦塪井之樂此亦}
  - {type: page-break, offset: 15504, content: '', id: KR5c0051_SJB_002-110597c}
  - {type: variant, offset: 15505, length: 0, content: '', ZTDZ: 矣夫子奚不時來入觀乎東海之鼈左足未入而右膝已縶矣於是逡巡而却告之海曰夫千里之遠不足以舉其大千仞之高不足以極其深禹之時十年九潦而水弗爲加益湯之時八年七旱而崖不爲加損夫不爲頃乆推移不以多少進退者此亦東海之大樂也於是塪井之蛙聞之適適然驚規規然自失也且夫知不知是非之境而猶欲觀於莊子之言是猶使蚉負山商距馳河也必不勝任矣且夫知不知論極妙之言而自適一時之利者是非塪井之蛙與且彼方跐黄泉而登大皇無南無北爽然四解淪於不測無東無西始於玄冥反於大通子乃規規然而求之以察索之以辯是眞用管闚夭用錐指地也不亦小乎子往矣且子獨不聞夫壽陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳今子不去將忘子之故失子之業公孫龍口呿而不合舌舉而不下乃逸而走莊子釣於濮水楚王使大夫二人往先焉曰願以境内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死爲留骨而貴乎寧其生而曳尾於塗中乎二大夫曰寧生而曳尾於塗中莊子曰往矣吾將曳尾於塗中惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日三夜莊子往見之曰南方有鳥其名鵷鷄子知之乎夫鵷鶵發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是䲭得腐鼠鵷鶵過之仰而視之曰嚇今子欲以子之梁國而嚇我邪莊子與惠子遊於濠梁之上莊子曰儵魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本子曰汝安知魚樂云者旣已知吾知之而問我我知之濠上也外篇至樂第十八天下有至樂無有哉有可以活身者無有哉今奚爲奚據奚避奚處奚就奚去奚樂奚惡夫天下之所尊者富貴壽善也所樂者身安厚味美服好色音聲也所下者貧賤夭惡也所苦者身不得安逸口不得厚味形不得美服目不得好色耳不得音聲若不得者則大憂以懼其爲形也亦愚哉夫富者苦身疾作多積財而不得盡用其爲形也亦外矣夫貴者夜以繼日思慮善否其爲形也亦疏矣}
  - {type: page-break, offset: 15505, content: '', id: KR5c0051_SJB_002-110598a}
  - {type: page-break, offset: 15505, content: '', id: KR5c0051_SJB_002-110598b}
  - {type: variant, offset: 15507, length: 2, content: 言恐, ZTDZ: 生也與憂俱生壽者惽惽乆憂不死何之苦也其爲形也亦遠矣烈士爲天下見善矣未足以活身}
  - {type: 'kr:newline', offset: 15509, content: '

      ', id: KR5c0051_krp_002-bkkkrnewl686}
  - {type: line-break, offset: 15509, content: '', id: KR5c0051_SBCK_002-43b05}
  - {type: variant, offset: 15510, length: 0, content: '', ZTDZ: 未知善之誠善邪誠不善邪若以爲善矣不足活身以爲不善矣足以活人故曰忠諫不聽蹲循弗爭故夫子胥爭之以殘其形不爭名亦不成誠有善}
  - {type: variant, offset: 15511, length: 0, content: '', ZTDZ: 有哉今俗之所爲與}
  - {type: variant, offset: 15512, length: 3, content: 實輕用, ZTDZ: 所樂}
  - {type: variant, offset: 15516, length: 1, content: 身, ZTDZ: 又未知樂之果樂邪果不樂邪吾觀夫俗之所樂舉群趣者誙誙然如將不得已}
  - {type: variant, offset: 15518, length: 1, content: 亡, ZTDZ: 皆曰樂者}
  - {type: variant, offset: 15520, length: 1, content: 國, ZTDZ: 未之樂也亦未之不樂也果有樂無有哉}
  - {type: variant, offset: 15522, length: 11, content: 與孔丘非君臣也德友而巳, ZTDZ: 以無爲誠樂}
  - {type: 'kr:newline', offset: 15526, content: '

      ', id: KR5c0051_krp_002-bkkkrnewl687}
  - {type: line-break, offset: 15526, content: '', id: KR5c0051_SBCK_002-43b06}
  - {type: page-break, offset: 15533, content: '', id: KR5c0051_SJB_002-110598c}
  - {type: punctuation, offset: 15534, content: (, id: KR5c0051_krp_002-bkkpn1827}
  - {type: variant, offset: 15534, length: 3, content: 聞德元, ZTDZ: 又俗}
  - {type: voice, offset: 15534, length: 29, name: note, id: n286}
  - {type: variant, offset: 15538, length: 46, content: 風者雖復哀公猶欲遺形骸忘貴賤也閔子孔子弟子閔子騫也闉支離無脤衛靈公靈公之而視全人其脰肩肩甕㼜, ZTDZ: 所}
