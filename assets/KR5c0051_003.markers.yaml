  - {type: variant, offset: 7637, length: 216, content: 芒然莫剛反李云無係之貌彷善剛反徨音皇塵垢如字崔本作塜坸云塜音塳坸垢同齊人以風塵爲摓堁彼又惡能憒憒然爲世俗之禮以觀衆人之耳目哉其所以觀示於衆人者皆其塵垢耳非方外之冥物也憒上內反文蒼頡篇並云亂也觀古亂反示也注同子貢曰然則夫子何方之依子貢不聞性與天道故見其所依而不見其所以依也夫所以依者不依也世豈覺之哉曰丘天之戮民也以方內爲桎梏明所貴在方外也夫遊外者依內離人者合俗故有天下者無以天下爲也是以遺物而後能入羣坐而後能應務愈遺之愈得之苟居斯極則, ZTDZ: 君}
