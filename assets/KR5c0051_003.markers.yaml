  - {type: variant, offset: 3818, length: 4, content: 然則凡得, ZTDZ: 辯者辯其所不能辯也知止乎其所不能知至矣若有不即是者天鈞敗}
  - {type: variant, offset: 3823, length: 0, content: '', ZTDZ: 備物以將形藏不虞以生心敬中以達彼若是而萬惡至}
