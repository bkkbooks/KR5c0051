  - {type: punctuation, offset: 821, content: /, id: KR5c0051_krp_001-bkkpn74}
  - {type: variant, offset: 823, length: 952, content: 其於適性一也槍七羊反枋音方野馬也塵埃也生物之以息相吹也此皆鵬之所慿以飛者耳野馬者遊氣也野馬司馬云春月澤中遊氣也崔云天地間氣如野馬馳也埃音哀崔云天地間氣蓊鬱似塵埃揚也吹如字崔本作炊馮皮冰反本亦作慿天之蒼蒼其正色邪其逺而無所至極邪其視下也亦若是則巳矣今觀天之蒼蒼竟未知便是天之正色邪天之爲逺而無極邪鵬之自上以視地亦若人之自此視天則止而圖南矣言鵬不知道里之逺近趣足以自勝而逝邪也嗟反句不定之辭後放此且夫水之積也不厚則大舟也無力覆杯水於堂之上則芥爲之舟置杯焉則膠水淺而舟大也此皆明鵬之所以高飛者翼大故耳夫質小者所資不待大則質大者所用不得小矣故理有至分物有定極各足稱事其濟一也若乃失乎忘生之生而營生於至當之外事不任力動不稱情則雖垂天之翼不能無窮决起之飛不能無困矣夫音符覆芳服反杯崔本作盃於交反又烏了反李又伊九反崔云堂道謂之司馬云地令平支遁云謂有垤形也芥古邁反徐古邁反一音古反李云小草也膠徐李古孝反一音如字崔云膠著地也李云黏也稱尺證反後同濟子細反本又作齊如字之生本亦作王字當丁浪反後皆同風之積也不厚則其大翼也無力故九萬里則風斯在下矣而後乃今培風背青天而莫之夭閼者而後乃今將圖南夫所以乃今將圖南者非其好高而慕逺也風不積則夭閼不通故耳此大鵬之逍遙也培音裴重也徐扶杯反又父宰反一音扶北反本或作陪風絶句背青天一讀以背字屬上句夭於表反司馬云折也閼徐於葛反一音謁司馬云止也李云塞也蜩與學鳩之曰我決起而飛槍榆枋時則不至而控於地而巳矣奚以之九萬里而南爲苟足於其性則雖大鵬無以自貴於小鳥小鳥無羡於天地而榮願有餘矣故小大雖殊逍遙一也蜩音條司馬云蟬學鳩如字一音於角反本又作鷽音同本或作鷽音預崔云學讀爲滑滑鳩一名滑雕司馬云學鳩小鳩也李云鶻鵰也毛詩草木䟽云鶻鳩班鳩也簡文云月令云鳲鳩拂其羽是也決向徐喜抉反李呼穴反李順云疾貌槍七良反司馬李云猶集也崔云著也支遁云槍突也榆徐音踰木名也枋徐音方李云檀木也崔云木也或曰木名控苦貢反司馬云投也又云引也崔云叩也適莽蒼者三飡而反腹猶果然適百里者舂糧適千里者三月聚糧所適彌逺則聚糧彌多故其翼彌大則積氣彌厚也莽莫浪反或莫郎反蒼七蕩反或如字司馬云莽蒼近郊之色也李云近野也支遁云家間也崔云草野之色飡七丹反果徐如字又苦火反衆家皆云飽貌春束容反糧音良之二蟲又何知二蟲謂鵬蜩也對大於小所以均異趣也夫趣之所以異豈知異而異哉皆, ZTDZ: 孟孫氏}
