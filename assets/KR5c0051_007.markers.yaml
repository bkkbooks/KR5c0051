  - {type: punctuation, offset: 2999, content: (, id: KR5c0051_krp_007-bkkpn313}
  - {type: variant, offset: 2999, length: 518, content: 此章言憂來而累生者不明也患去而性得者逹理也去反一本作公反誒於代反郭音熈說文云可惡之辭也李呼該反一音哀詒吐代反郭音怡李音臺司馬云懈倦貌李云誒詒失魂魄也數日所主反司馬本作數月皇子告敖如字司馬云皇姓告敖字齊之賢士也惡音烏忿拂粉反李房粉反滀敕六反之氣散而不反則爲不足李云忿滿也滀結聚也精神有逆則隂陽結於内魂魄散於外故曰不足上音時掌反下同而不下則使人善怒下而不上則使人善忘忘尚反李云陽散隂凝故怒隂發陽伏故忘也不上不下中丁仲反身當心則爲病李云上下不和則隂陽爭而攻心精神主故病也沈有履司馬本作沈有漏云沈水汙也漏神名竈有髻音結徐胡節反郭音詰李音吉司馬云䯻竈神着赤衣狀如美女霆音庭又音挺又徒復反倍音裴徐扶來反鮭本亦作蛙戸媧反徐胡佳反蠪音聾又音龍躍之司馬云陪阿神名也鮭蠪狀如小兒長一尺四寸黒衣赤幘大冠帶劒持㦸泆音逸司馬云泆陽豹頭馬尾一作狗頭一云神名也㒺象如字司馬本作無傷云狀如小兒赤黒色赤大耳長臂一云水神名崒本又作莘所巾反又音臻司馬云狀如狗有角文身五采䕫求反司馬云狀如鼔而一足方音傍本亦作彷同皇本亦作徨同司馬云彷徨狀如蛇兩頭五采文委於危反又如字朱冠司馬本作俞冠云俞國之冠也其制似螺惡聞烏路反捧芳勇反首司馬本同一本作手辴敕引反徐敕一反又敕私反司馬云貌李云大貌, HFL: ''}
