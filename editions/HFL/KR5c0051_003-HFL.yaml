body:
  text: 內篇應帝王第七齧缺問於王倪四問而四不知齧缺因躍而大喜行以告蒲衣子蒲衣子曰而乃今知之乎有虞氏不及泰氏有虞氏其猶臧仁以要人亦得人矣而未始出於非人泰氏其卧徐徐其覺于于一以己爲馬一以己爲牛其知情信其德甚眞而未始入於非人肩吾見狂接輿狂接輿曰日中始何以語汝肩吾曰告我君人者以己出經式義度人孰敢不聽而化諸狂接輿曰是欺德也其於治天下也猶涉海鑿河而使蚉負山也夫聖人之治也治外乎正而後行确乎能其事者而已矣且鳥高飛以避矰弋之害鼷鼠深穴乎神丘之下以避熏鑿之患而曾二蟲之無知天根遊於殷陽至蓼水之上適遭無名人而問焉曰請問爲天下無名人曰去汝鄙人也何問之不豫也予方將與造物者爲人厭則又乘夫莽眇之鳥以出六極之外而遊無何有之郷以處壙垠之野汝又何帠以治天下感予之心爲又復問無名人曰汝遊心於淡合氣於漠順物自然而無容私焉而天下治矣陽子居見老聃曰有人於此嚮疾彊梁物徹疏明學道不倦如是者可比明王乎老聃曰是於聖人也胥易技係勞形怵心者也且也虎豹之文來田猨狙之便執斄之狗來藉如是者可比明王乎陽子居蹴然曰敢問明王之治老聃曰明王之功蓋天下而似不自己化貸萬物而民弗恃有莫舉名使物自喜立乎不測而遊於無有者也鄭有神巫曰季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆棄而走列子見之而心醉歸以告壺子曰始吾以夫子之道爲至矣則又有至焉者矣壺子曰吾與汝旣其文未旣其實而固得道與衆雄而無雄而又奚卯焉而以遁與世亢必信夫故使人得而相汝嘗試與來以予示之明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣吾見怪焉見濕灰焉列子入泣涕沾襟以告壺子壺子曰曏吾示之以地文萌乎不震不正是殆見吾杜德機也嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有廖矣全然有生矣吾見其杜權矣列子入以告壺子壺子曰曏吾示之以天壤名實不入而機發於踵是殆見吾善者機也嘗又與來明日又與之見壺子岀而謂列子曰子之先生不齊吾無得而相焉試齊且復相之列子入以告壺子壺子曰吾曏示之以太冲莫勝是殆見吾衡氣機也鯢栢之審爲淵止水之審爲淵流水之審爲淵淵有九名此處三焉嘗又與來明日又與之見壺子立未定自失而走壺子曰追之列子追之不及反以報壺子曰已滅矣已失矣吾弗及已壺子曰曏吾示之以未始出吾宗吾與之虚而委蛇不知其誰何因以爲弟靡因以爲波流故逃也然後列子自以爲未始學而歸三年不出爲其妻爨食豕如食人於事無與親彫豕復朴塊然獨以其形立紛而封哉一以是終無爲名尸無爲謀府無爲事任無爲知主體盡無窮而遊無眹盡其所受乎天而無見得亦虚而已至人之用心若鏡不將不迎應而不藏故能勝物而不傷南海之帝爲鯈北海之帝爲忽中央之帝爲渾沌鯈與忽時相與遇於渾沌之地渾沌待之甚善鯈與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死
