  - {type: line-break, offset: 151, content: '', id: KR5c0051_SBCK_001-1a08}
  - {type: variant, offset: 152, length: 1, content: 化, ZTDZ: 顔回問仲尼曰孟孫才其母死哭泣無涕中心不感居喪不哀無是三者以善喪蓋魯國固有無其實}
