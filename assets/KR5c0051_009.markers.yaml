  - {type: variant, offset: 937, length: 329, content: 此言志趣不同故經世之宜小大各有所適也任如字下同李云任國名鉤本作釣巨緇司馬云大黒綸也搳郭占邁反云犍牛也徐音界文云騬也司馬云犠牛也騬音繩犍紀言反餌音二蹲音存㑹古外反稽古反㑹稽山名今爲郡也期年本亦作朞同音基言必乆其事後乃能感也錎音䧟字林猶䧟字也鶩音務一本作驚鬐徐求夷反李音須憚徒旦反赫火百反千里言千里皆懼魚司馬云大魚名海神也或云若魚猶言此魚腊音昔制河諸設反依字應作浙漢書音義音逝河亦江也北人名水皆曰河浙江今在餘杭郡後漢以爲吳㑹分界司馬云浙江今在㑹稽錢塘輇七全反又硯專反又音權李云輇量人也本或作軨軨小也本又或作輕諷力鳯反揭其列其謁二反竿累劣彼反謂次足不得並足也本亦作累司馬云力追反云綸也趣本又作趨同七須反灌瀆司馬云漑瀆之瀆鯢五兮反鮒音附又音蒲本又作蒲李云鯢鮒皆小魚也, HFL: ''}
