  - {type: variant, offset: 8616, length: 4, content: 器猶迹耳, ZTDZ: 子行矣魯哀公問乎顔闔曰吾以仲尼爲貞幹國其有瘳乎曰殆哉圾乎仲尼方且飾羽而晝從事華辭以支爲㫖忍性以視民而不知不信受乎心宰乎神夫何足以上民彼宜汝與予頤與誤而}
  - {type: variant, offset: 8621, length: 5, content: 執而用曰器, ZTDZ: 矣今使民離實學僞}
