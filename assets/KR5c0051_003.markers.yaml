  - {type: variant, offset: 7439, length: 2, content: 內迹, ZTDZ: 道雜篇徐無鬼第二十四徐無鬼因女商見魏武侯武侯勞之曰先生病矣苦於山林之勞故乃肯見於寡人徐無鬼曰我則勞於君君有何勞於我君將盈嗜欲長好惡則性命之情病矣君將黜嗜欲掔好惡則耳目病矣我將勞君君有何勞於我武侯超然不對少焉徐無鬼曰嘗語君吾相狗也下之質執飽}
  - {type: page-break, offset: 7439, content: '', id: KR5c0051_SJB_003-110611c}
