  - {type: variant, offset: 8568, length: 2, content: 器明, ZTDZ: 故滿若堵耳而不知避且馮而不舍可謂辱矣財積而無用服膺而不舍滿心戚醮求益而不止可謂憂矣内}
  - {type: variant, offset: 8571, length: 4, content: 爲盗資故, ZTDZ: 疑刦請之賊外則畏寇盜之害内周樓疏外}
