  - {type: variant, offset: 7137, length: 460, content: 無害者無所可用安所困苦哉夫小大之物苟失其極則利害之理均用得其所則物皆逍遥也樗勑魚反木名擁腫章勇反李云擁腫猶盤癭申丁仲反下同卷本又作拳同音權徐紀阮反李丘圎反去如字李吕反狸力之反狌徐音姓郭音生又音星司馬云㹨也㹨音由救反敖徐李五到反支云伺彼怠傲謂申夫隕殆也本又作傲同司馬音遨謂何遨翔之物而食之雞䑕之屬也跳音條辟音避合本多作避下放此機辟毗赤反司馬云罔也罟徐音古牛郭吕之反徐李音來又音離司馬云旄牛無何有之鄕廣莫之野謂寂絶無用之地也簡文云莫大也彷薄剛反又音房徨音皇彷徨猶翺翔也崔本作方羊簡文同廣雅云彷徉徙倚也莊子內篇齊物論第二夫自是而非彼美巳而惡人物莫不皆然然故是非雖異而彼我均也論力頓反李如字惡烏路反南郭子綦隱几而坐仰天而嘘嗒焉似䘮其耦同天人均彼我故外無與爲歡而嗒焉解體若失其配匹南郭子綦音其司馬云居南郭困爲號隱於靳反馮也机音紀李本作几嘘音虚吐氣爲嘘向云息也荅本又作嗒同吐荅反又都納反注同解體貌䘮息浪反下同耦本又作偶五口反匹也對也司馬云耦身也身與神爲耦顔成子游立侍乎前曰何居乎形固可使如槁木而心固可使如死乎死槁木取其寂寞無情耳夫任, ZTDZ: ''}
