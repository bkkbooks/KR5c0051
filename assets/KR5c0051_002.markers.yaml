  - {type: variant, offset: 8159, length: 772, content: 作石輟丁劣反厭於艶反又於蟾反散悉但反徐悉旦反下同速如字向崔本作數向所椂反下同腐扶甫反夜音亦樠亡言反向李莫于反郭武半反司馬云液津液也樠謂脂出樠樠然也崔云黒液出也蠧丁故反匠石歸櫟社見夢曰女將惡乎比予哉若將比予於文木邪凡可用之木爲文木見胡薦反女音汝惡音烏下同夫柤梨橘柚果蓏之屬實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道天自掊擊於世俗者也物莫不若是物皆以自用傷柤側加反橘均必反柚由救反徐以救反蓏徐力果反泄徐思列反崔云泄同若如字崔本作枯棓普口反徐方垢反且予求無所可用久矣幾死乃今得之數有䁹睨巳者唯今匠石明之耳幾音祈又音機下同數音朔普係反變五係反爲予大用積無用乃爲濟生之大用使予也而有用且得有此大也邪若有用久見伐且也若與予也皆物也柰何哉其相物也而幾死之散人又惡知散木以戲匠石而幾死之絶句向同一讀連下散人爲句崔同匠石覺而診其夢弟子曰趣取無用則爲社何邪猶嫌其以爲社自榮不趣取於無用而已覺古孝反診徐直信反司馬向云診占夢也曰密若無言彼亦直焉社自來耳非此木求之爲社也以爲不知巳者詬厲也言此木乃以社爲不知巳而見辱病也豈榮之哉詬李云呼豆反徐音垢厲如字司馬云詬辱也厲病也不爲社者且幾有翦乎本自以無用爲用則雖不爲社亦終不近於翦伐之害幾音機或音祈翦乎子淺反崔本作前于近附近之近下同且也彼其所保與衆異彼以無保爲保而衆以有保爲保而以義喻之不亦逺乎利人長物禁民爲非社之義也夫無用者泊然不爲而羣才自用用者各得其叙而不與焉此無用之所以全也汝以社譽之無縁近也譽音餘注同長丁兩反泊歩各反與音餘南伯子綦遊乎商之丘見大木焉有異結駟千乗隱將芘其所藾其枝所隂可以隱芘千乗南伯李云即南郭也伯長也商之丘司馬云今梁國睢陽縣是也乗䋲證反隱崔云傷於熱也芘本亦作疵徐甫至反又悲位反崔本作芘云芘也藾音頼崔木作頼向云䕃也可以隱芘千乗也李同隂於鴆反子綦曰此何木也哉此必有異材夫仰而視其細枝則拳曲而不, ZTDZ: ''}
