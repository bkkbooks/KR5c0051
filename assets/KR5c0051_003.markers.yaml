  - {type: variant, offset: 11272, length: 7, content: 去汝鄙人也何問, ZTDZ: 夫爲天下者亦若此而已矣又奚事焉予少而自遊於六合}
  - {type: variant, offset: 11280, length: 3, content: 不預也, ZTDZ: 内予適有瞀病有長者教予曰若乘日之車而遊於襄城之野今予病少痊予又且復遊於六合之外夫爲天下亦若此而已予又奚事焉黄帝曰夫爲天下者則誠非吾子之事雖然請}
  - {type: variant, offset: 11281, length: 1, content: 預, HFL: 豫}
  - {type: punctuation, offset: 11283, content: (, id: KR5c0051_krp_003-bkkpn1256}
  - {type: variant, offset: 11283, length: 86, content: 問爲天下則非起於大止於玄冥也天根崔云人姓名也遊於殷陽李云殷山名陽山之陽崔云殷陽地名司馬云殷衆也言向南遊也或作殷湯蓼音了李云水名也不豫司馬云嫌不漸豫太倉卒也簡文云豫恱也大音泰, HFL: ''}
  - {type: substitution, offset: 11284, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: punctuation, offset: 11287, content: /, id: KR5c0051_krp_003-bkkpn1257}
  - {type: variant, offset: 11287, length: 0, content: '', ZTDZ: 小童辭黄帝又問小童曰夫爲天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣黄帝再拜稽首稱天師而退知士無思慮之變}
  - {type: page-break, offset: 11287, content: '', id: KR5c0051_SJB_003-110612c}
  - {type: variant, offset: 11288, length: 0, content: '', ZTDZ: 不樂辯士無談說之序則不樂察士無凌誶之事則不樂皆囿於物者也招世之士與朝中民之士榮官筋力之士矜難勇敢之士奮患兵革之士樂戰祜槁之士宿名法律之士廣治禮教之士敬容仁義之士貴際農夫無草萊之事則不比商賈無市井之事則不比庶人有旦暮之業則勸百工有器械之巧則壯錢財不積則貪者憂權勢不尤則夸者悲勢物之徒樂變遭時有所用不能無爲也此皆順比於歲不物於易者也馳其形性潜之萬物終身不反悲夫莊子曰射者}
  - {type: variant, offset: 11289, length: 1, content: 起, ZTDZ: 前期而中謂之善射天下皆羿也可乎惠子曰可莊子曰天下非有公是也而各是其所是天下皆堯也可乎惠子曰可莊子曰然則儒墨楊秉四與夫子爲五果孰是邪或者若魯遽者邪其弟子曰我得夫子之道矣吾能冬爨鼎而夏造冰矣魯遽曰是直以陽召陽以陰召陰非吾所謂道也吾示子乎吾道於是爲之調瑟廢一於堂廢一於室鼓宫宫動鼓角角動音律同矣夫或改調一絃於五音無當也鼓之二十五絃皆動未始異於聲而音之君已且若是者邪惠子曰今夫儒墨楊秉且方與我以辯相拂以辭相鎭以聲而未始吾非也則奚若矣莊子曰齊人蹢子於宋者其命閽也不以完其求鈃鍾也以束縛其求唐子也而未始出域有遺類矣夫楚人寄而蹢閽者夜半於無人之時而與舟人鬭未始離於岑而足以造於怨也莊子送葬過惠子之墓顧謂從者曰郢人堊漫其鼻端若蠅翼使匠石斲之匠石運斤成風聽而斲之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試爲寡人爲之匠石曰臣則嘗能斲之雖然臣之質死乆矣自夫子之死也吾無以爲質矣吾無與言之矣管仲有病桓公問之曰仲父之病病矣可不謂云至}
