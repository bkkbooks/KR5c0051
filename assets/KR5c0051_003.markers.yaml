  - {type: punctuation, offset: 3061, content: /, id: KR5c0051_krp_003-bkkpn399}
  - {type: punctuation, offset: 3064, content: ), id: KR5c0051_krp_003-bkkpn400}
  - {type: 'kr:newline', offset: 3064, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl132}
  - {type: line-break, offset: 3064, content: '', id: KR5c0051_SBCK_003-11a04}
  - {type: punctuation, offset: 3064, content: (, id: KR5c0051_krp_003-bkkpn401}
  - {type: variant, offset: 3065, length: 6, content: 一遇耳未獨喜, ZTDZ: 君子孰能脱焉老聃曰不然夫水之於汋}
  - {type: variant, offset: 3073, length: 1, content: 極, ZTDZ: 爲而才自然矣至人}
  - {type: variant, offset: 3075, length: 0, content: '', ZTDZ: 於德也不修而物不能離焉若天之自高地之自厚日月之自明夫何修焉孔子出以告顔回曰丘之於道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也莊山見魯哀公哀公曰魯多儒士少爲先生方者莊子曰魯少儒哀公曰舉魯國而儒服何謂少乎莊子曰周聞之儒者冠圜冠者知天時履方履者知地形緩佩玦者事至而斷君子有其道者未必爲其服也爲其服者未必知其道也公固以爲不然何不號於國}
  - {type: page-break, offset: 3075, content: '', id: KR5c0051_SJB_003-110605c}
  - {type: variant, offset: 3076, length: 2, content: 所遇, ZTDZ: 曰無此道而爲此服}
  - {type: variant, offset: 3079, length: 2, content: 皆若, ZTDZ: 其罪死於是哀公號之五日而魯國無敢儒服者獨有一丈夫儒服而立乎公門公即召而問以國事千轉萬變而不窮莊子曰以魯國而儒者一}
  - {type: punctuation, offset: 3081, content: /, id: KR5c0051_krp_003-bkkpn402}
  - {type: variant, offset: 3083, length: 2, content: 豈特, ZTDZ: 可謂多乎百里奚爵禄不入於心故飯牛而牛肥使秦穆公忘其賤與之政也有虞氏死生不入於心故足以動}
  - {type: variant, offset: 3086, length: 1, content: 形, ZTDZ: 宋元君將畫圖衆史皆至受揖而立舐筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣槃礴贏君曰}
  - {type: variant, offset: 3088, length: 1, content: 喜, ZTDZ: 矣是眞畫者也文王觀於臧見一丈夫釣}
  - {type: variant, offset: 3090, length: 2, content: 餘物, ZTDZ: 其釣莫釣非持其釣有釣者也常釣也文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之}
  - {type: variant, offset: 3093, length: 9, content: 樂邪樂音洛下及注同, ZTDZ: 天也於是旦而屬之大夫曰昔者寡人夢見良人黑色而𩑺乘駁馬而偏朱蹄號曰寓而政於臧丈人庶幾乎民有廖乎諸大夫蹴然曰先君王也文王曰然則卜之諸大夫曰先君之命王}
  - {type: page-break, offset: 3093, content: '', id: KR5c0051_SJB_003-110606a}
  - {type: 'kr:non-cjk', offset: 3095, content: ○, id: KR5c0051_krp_003-bkkkrnonc61}
  - {type: punctuation, offset: 3097, content: ), id: KR5c0051_krp_003-bkkpn403}
  - {type: 'kr:newline', offset: 3097, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl133}
  - {type: line-break, offset: 3097, content: '', id: KR5c0051_SBCK_003-11a05}
  - {type: punctuation, offset: 3097, content: (, id: KR5c0051_krp_003-bkkpn404}
  - {type: punctuation, offset: 3100, content: /, id: KR5c0051_krp_003-bkkpn405}
  - {type: punctuation, offset: 3102, content: ), id: KR5c0051_krp_003-bkkpn406}
  - {type: variant, offset: 3103, length: 8, content: 爲樂可勝計邪本非, ZTDZ: 無他又何卜焉遂迎臧丈}
  - {type: substitution, offset: 3103, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: punctuation, offset: 3109, content: (, id: KR5c0051_krp_003-bkkpn407}
  - {type: variant, offset: 3109, length: 42, content: 本非人而化爲人化爲人失於故矣失故而喜喜所遇也變化無窮何所不遇所遇而樂樂豈有極乎勝音升, HFL: ''}
  - {type: variant, offset: 3113, length: 1, content: 化, ZTDZ: 授之政典法無更偏令無出三年文王觀於國則列士壞植散群長官者不成德螤斛不敢入於四境列士壞植散群則尚同也長官者不成德則同務也螤斛不敢入於四境則諸侯無二心也文王於是焉以}
  - {type: substitution, offset: 3114, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 3115, length: 0, content: '', ZTDZ: 大師北面而問曰政可以及天下乎臧丈}
  - {type: punctuation, offset: 3116, content: /, id: KR5c0051_krp_003-bkkpn408}
  - {type: variant, offset: 3116, length: 1, content: 化, ZTDZ: 昧然而不應泛然而辭朝令而夜遁終身無聞顔淵問於仲尼曰文王其猶未邪又何以夢}
  - {type: substitution, offset: 3117, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 3118, length: 0, content: '', ZTDZ: 乎仲尼曰默汝無言夫文王盡之也而又何論刺焉彼直以循斯須也列御寇爲伯昏無}
  - {type: variant, offset: 3119, length: 0, content: '', ZTDZ: 射引之盈貫措杯水其肘上發之適矢復沓方矢復寓當是時猶象人也伯昏無人曰是射之射也非不射之射也嘗與汝登高山履危石臨百仞之淵若能射乎於是無人遂登高山履危石臨百仞之淵背逡巡足二分垂在外揖御寇而進之御寇伏地汗流至踵伯昏無人曰夫至人者上闚青天下潜黄泉揮斥八極神氣不變今汝怵然有恂目之志爾於中也殆矣夫肩吾問於孫叔敖曰子三爲令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨柰何孫叔敖曰吾何以過人哉吾以其來不可却也其去不可止也吾以爲得}
  - {type: page-break, offset: 3119, content: '', id: KR5c0051_SJB_003-110606b}
  - {type: variant, offset: 3120, length: 0, content: '', ZTDZ: 之非我也而無憂色而已矣我何以過人哉且不知其在彼乎其在我乎其在彼邪亡乎我在我邪亡乎彼方將躊躇方將四顧何暇至乎人貴人賤哉仲尼聞之曰古之眞人知者不得說美人不得濫盜人不得劫伏戲黄帝不得友死生亦大矣而無變乎己况爵禄乎若然者其神經乎大山而無介入乎淵泉而不濡處卑細而不憊充滿天地旣以與人己愈有楚王與凡君坐少焉楚王左右曰凡亡者三凡君曰凡之亡也不足以喪吾存夫凡之亡不足以喪吾存則楚之存不足以存存由是觀之則凡未始亡而楚未始存也外篇知北遊第二十二知北遊}
  - {type: page-break, offset: 3120, content: '', id: KR5c0051_SJB_003-110606c}
  - {type: variant, offset: 3121, length: 4, content: 故矣失故, ZTDZ: 玄水之上登隱弅之丘}
  - {type: punctuation, offset: 3123, content: ), id: KR5c0051_krp_003-bkkpn409}
  - {type: 'kr:newline', offset: 3123, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl134}
  - {type: line-break, offset: 3123, content: '', id: KR5c0051_SBCK_003-11a06}
  - {type: punctuation, offset: 3123, content: (, id: KR5c0051_krp_003-bkkpn410}
  - {type: variant, offset: 3126, length: 2, content: 喜喜, ZTDZ: 適遭無爲謂焉知謂無爲謂曰予欲有問乎若何思何慮則知道何處何服則安道何從何道則得道三問而無爲謂不答也非不答不知答也知不得問反於白水之南登狐闋之上而覩狂屈焉知以之言也問乎狂屈狂屈曰唉予知之將語若中欲言而忘其}
  - {type: variant, offset: 3129, length: 1, content: 遇, ZTDZ: 欲言知不得問反於帝宫見黄帝而問焉黄帝曰無思無慮始知道無處無服始安道無從無道始得道知問黄帝曰我與若知之彼與彼不知}
  - {type: variant, offset: 3131, length: 2, content: 變化, ZTDZ: 其孰是耶黄帝曰彼}
  - {type: variant, offset: 3134, length: 3, content: 窮何所, ZTDZ: 爲謂眞是也狂屈似之我與汝終}
  - {type: punctuation, offset: 3138, content: /, id: KR5c0051_krp_003-bkkpn411}
  - {type: variant, offset: 3138, length: 13, content: 遇所遇而樂樂豈有極乎勝音升, ZTDZ: 近也夫知者不言言者不知}
  - {type: 'kr:non-cjk', offset: 3148, content: ○, id: KR5c0051_krp_003-bkkkrnonc62}
  - {type: punctuation, offset: 3151, content: ), id: KR5c0051_krp_003-bkkpn412}
  - {type: 'kr:newline', offset: 3153, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl135}
  - {type: line-break, offset: 3153, content: '', id: KR5c0051_SBCK_003-11a07}
  - {type: variant, offset: 3154, length: 2, content: 將遊, ZTDZ: 行不言之教道不可致德不可至仁可爲也義可虧也禮相僞也故曰失道而後德失德而後仁失仁而後義失義而後禮禮者道之華而亂之首也故曰爲道者日損損之又損之以至}
  - {type: variant, offset: 3157, length: 0, content: '', ZTDZ: 無爲無爲而無不爲也今已爲}
  - {type: variant, offset: 3158, length: 0, content: '', ZTDZ: 也欲復歸根不亦難乎其易也其唯大人乎生者死}
  - {type: variant, offset: 3159, length: 0, content: '', ZTDZ: 徒死者生之始孰知其紀人之生氣之聚也聚則爲生散則爲死若死生爲徒吾又何患故萬物一也是其}
  - {type: page-break, offset: 3159, content: '', id: KR5c0051_SJB_003-110607a}
  - {type: variant, offset: 3160, length: 7, content: 不得遯而皆存夫, ZTDZ: 美者爲神奇其所惡者爲臭腐臭腐復化爲神奇神奇復化爲臭腐故曰通天下一氣耳}
  - {type: substitution, offset: 3162, original: 遯, replacement: 遁, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-18484}}
  - {type: punctuation, offset: 3166, content: (, id: KR5c0051_krp_003-bkkpn413}
  - {type: variant, offset: 3166, length: 59, content: 夫聖人遊於變化之途放於日新之流萬物萬化亦與之萬化化者無拯亦與之無拯誰得遯之哉夫於生爲亡而於死爲存於死爲存則何時而非存哉, HFL: ''}
  - {type: variant, offset: 3169, length: 4, content: 遊於變化, ZTDZ: 故貴一知謂黄帝曰吾問無爲謂無爲謂不應我非不我應不知應我也吾問狂屈狂屈中欲告我而不我告非不我告中欲告而忘}
  - {type: punctuation, offset: 3170, content: /, id: KR5c0051_krp_003-bkkpn414}
  - {type: punctuation, offset: 3174, content: ), id: KR5c0051_krp_003-bkkpn415}
  - {type: 'kr:newline', offset: 3174, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl136}
  - {type: line-break, offset: 3174, content: '', id: KR5c0051_SBCK_003-11a08}
  - {type: punctuation, offset: 3174, content: (, id: KR5c0051_krp_003-bkkpn416}
  - {type: variant, offset: 3174, length: 5, content: 途放於日新, ZTDZ: 也今予問乎若若知}
  - {type: variant, offset: 3180, length: 1, content: 流, ZTDZ: 奚故不近黄帝曰彼其眞是也以其不知也此其似之也以其忘之也予與若終不近也以其知之也狂屈聞之以黄帝爲知言天地有大美而不言四時有明法而不議}
  - {type: variant, offset: 3183, length: 4, content: 萬化亦與, ZTDZ: 有成理而不說聖人者原天地}
  - {type: variant, offset: 3188, length: 21, content: 萬化化者無拯亦與之無拯誰得遯之哉夫於生爲亡, ZTDZ: 美}
  - {type: punctuation, offset: 3191, content: /, id: KR5c0051_krp_003-bkkpn417}
  - {type: substitution, offset: 3201, original: 遯, replacement: 遁, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-18484}}
  - {type: substitution, offset: 3207, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: punctuation, offset: 3208, content: ), id: KR5c0051_krp_003-bkkpn418}
