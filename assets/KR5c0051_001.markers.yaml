  - {type: variant, offset: 1918, length: 899, content: 者無死無生者也苟有乎死生則雖大椿之與蟪蛄彭祖之與朝菌均於短折耳故遊於無小無大者無窮者也冥乎不死不生者無極者也若夫逍遥而繫於有方則雖放之使遊而有所窮矣未能無待也知音智本亦作智下大知并注同下年知放此丘䜴反後同累劣僞反下皆同奚以知其然也朝菌不知晦朔蟪蛄不知春秋此小年也楚之南有冥靈者以五百歲爲春五百歲爲秋上古有大椿者以八千歲爲春八千歲爲秋而彭祖乃今以久特聞衆人匹之不亦悲乎夫年知不相及若此之懸也比於衆人之所悲亦可悲矣而衆人未甞悲此者以其性各有極也苟知其極則豪分不可相天下又何所悲乎哉夫物未甞以大欲小而必以小羡大故舉小大之殊各有定分非羡欲所及則羡欲之累可以絶矣夫悲生於累累絶則悲去悲去而性命不安者未之有也朝菌徐其隕反司馬云大芝也天隂生糞上見日則死一名日及故不知月之終始也崔云糞上芝朝生暮死晦者不及朔朔者不及晦支遁云一名舜英朝生暮落潘尼云木槿也簡文云歘生之芝也歘音况物反晦冥也朔旦也惠本亦作蟪同蛄音姑司馬云惠蛄寒蟬也一名蝭蟧春生夏死夏生秋死崔云蛁蟧也或曰山蟬秋鳴者不及春春鳴者不及秋廣雅云蟪蛄蛁蟧也案即楚詞所云寒螿者也蝭音提蟧音勞又音遼蛁音彫螿音將冥本或作榠同靈李順云冥靈木名也江南生以葉生爲春葉落爲秋此木以二千歲爲一年椿丑倫反司馬云木一名橓橓木槿也崔音橓華同李云生江南一云生北戸南此木三萬二千歲爲一年彭祖李云名鏗堯臣封於彭城歷虞夏至啇年七百歲故以久壽見聞世本云姓籛名鏗在啇爲守藏史在周爲柱下史年八百歲籛音翦一云即老子也崔云堯臣仕殷世其人甫壽七百年王逸評楚辭天問云彭鏗即彭祖事帝堯彭祖至七百歲猶曰悔不壽恨杖晚而唾逺云帝嚳之玄孫特聞如字崔本作待聞懸音玄分符問反又方云反湯之問棘也是巳湯之問棘亦云物各有極任之則條暢故莊子以所問爲是也李云湯時賢人又云是棘子崔云齊諧之徒識冥靈大椿者名也簡文云一曰湯廣大也棘狹小也窮髮之北有冥海者天池也有魚焉其廣數千里未有知其脩者其名爲鯤有鳥焉其名爲鵬背若泰山翼若垂天之雲搏扶搖羊角而上者九萬里絕雲氣靑天然後圖南且適南冥也斥鴳之曰彼且奚適也我騰躍而上不過數而下翺翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辯也各以得性爲至自盡爲極也向言二蟲殊翼故所至不同或翺翔天池或畢志榆枋直各稱體而足, ZTDZ: ''}
