  - {type: variant, offset: 17112, length: 0, content: '', HFL: 世俗謂之不肖子}
  - {type: variant, offset: 17113, length: 2, content: 道逸, HFL: 之所言而然所行而善則世俗謂之不肖}
  - {type: variant, offset: 17116, length: 1, content: 道, HFL: 而未知此其必然邪世俗之所謂然而然之所謂善而善之則不謂之導諛之人也然則俗故嚴於親而尊於君邪謂己導人則勃然作色謂己諛人則怫然作色而終身導人也終身諛人也合譬飾辭聚衆也是終始本末不相坐垂衣裳設采色動客貌以媚一世而不自謂導諛與夫人之爲徒通是非而不自謂衆人愚之至也知其愚者非大愚也知其惑者非大惑也大惑者終身不解大愚者終身不靈三人行而一人惑所適者猶可致也惑者少也二人惑則}
  - {type: page-break, offset: 17116, content: '', id: KR5c0051_HFL_003-009a, image: hfl/0350/0350-077.png}
  - {type: variant, offset: 17118, length: 4, content: 勞逸之際, HFL: 而不至惑者勝也而今也以天下惑予雖有祈嚮}
  - {type: punctuation, offset: 17122, content: /, id: KR5c0051_krp_004-bkkpn1749}
  - {type: variant, offset: 17124, length: 2, content: 同日, HFL: 得也不亦悲乎大聲不入於里耳折揚皇華則嗑然}
  - {type: variant, offset: 17127, length: 1, content: 論, HFL: 笑是故高言不止於衆人}
  - {type: variant, offset: 17129, length: 0, content: '', HFL: 心至言不出俗言勝也以二垂踵惑而所適不得矣而今也以天下惑予雖有祈嚮其庸可得邪知其不可得也而强之又一惑也故莫若釋之而不推不推誰其比憂厲之人夜半生其子遽取火而視之汲汲然唯恐其似己也百年之木破爲犧樽青黄而文之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也跖與曾史行義有間矣然其失性均也且夫失性有五一曰五色亂目使目不明二曰五聲亂耳使耳不聰三曰五臭薰鼻困惾中顙四曰五味濁口使口厲爽五曰趣舍滑心使性飛揚此五者皆生之害也而楊墨乃始離跂自以爲得非吾所謂得也夫得者困可以爲得乎則鳩鴞之在於籠也亦可以爲得矣且夫趣舍聲色以柴其内皮弁鷸冠搢笏紳脩以約其外内支盈於柴栅外重纏繳睆睆然在纏繳之中而自以爲得則是罪人交臂歷指而虎豹在於囊檻亦可以爲得矣外篇天道第十三天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海内服明於天通於聖六通四辟於帝王之德者其自爲也昧然無不靜者矣聖人之靜也非曰靜也善故靜也萬物無足以鐃心者故靜也水靜則明燭鬚眉平中准大匠取法焉水靜猶明而況精神聖人之心靜乎天地之鑒也萬物之鏡也夫虚靜恬淡寂漠無爲者天地之平而道德之至故帝王聖人休焉休則虚虚則實實者倫矣虚則靜靜則動動則得矣靜則無爲無爲也則任事者責矣無爲則俞俞俞俞者憂患不能處年壽長矣夫虚靜恬淡寂漠無爲者萬物之本也明此以南卿堯之爲君也明此以北面舜之爲臣也以此處上帝王天子之德也以此處下玄聖素王之道也以此退居而間游江海山林之士服以此進爲而撫世則功大名顯而天下一也靜而聖動而王無爲也而尊樸素而天下莫能與之爭美夫明白於天地之德者此之謂大本大宗與天和者也所以均調天下與人和者}
