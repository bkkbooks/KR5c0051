  - {type: variant, offset: 17137, length: 0, content: '', HFL: 爲仁長於上古而不爲壽覆載天地刻彫衆形而不爲巧此之謂天樂故曰知天樂者其生也天行其死也物化靜而與陰同德動而與陽同波故知天樂}
