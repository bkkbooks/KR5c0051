  - {type: line-break, offset: 3520, content: '', id: KR5c0051_SBCK_003-12a05}
  - {type: variant, offset: 3525, length: 0, content: '', ZTDZ: 者物邪物物者非物物出不得先物也猶其有物也無已聖人之愛人也終無已者亦乃取於是者也顔淵問乎仲尼曰回嘗聞諸夫子曰無有所將無有所迎回敢問其遊仲尼曰古之人外化而内不化今之人内化而外不化與物化者一不化者也安化安不化安與之相靡必與之莫多狶韋氏之囿黄帝之圃有虞氏之宫湯武之室君子之人若儒墨者師故以是非相𩐎也而況今之人乎聖人處物不傷物不傷物者物亦不能傷也唯無所傷者爲能與人相將迎山林與臯壤與使我欣欣然而樂與樂未畢也哀又繼之哀樂之來吾不能禦其去弗能止悲夫世人直爲物逆旅耳夫知遇}
  - {type: page-break, offset: 3525, content: '', id: KR5c0051_SJB_003-110609a}
  - {type: variant, offset: 3527, length: 6, content: 爲久長於上古, ZTDZ: 知所不遇知能能}
  - {type: substitution, offset: 3527, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 3528, length: 1, content: 久, HFL: 乆}
  - {type: variant, offset: 3535, length: 0, content: '', HFL: 爲}
  - {type: variant, offset: 3535, length: 0, content: '', ZTDZ: 能所不能無知無能者固人之所不免也夫務免乎人之所不免者豈不亦悲哉至言去言至爲去爲齊知之所知則淺矣雜篇庚桑楚第二十三}
  - {type: punctuation, offset: 3536, content: (, id: KR5c0051_krp_003-bkkpn455}
  - {type: variant, offset: 3536, length: 112, content: 言道之無所不在也故在高爲無高在深爲無深在久爲無久在老爲無老無所不在而所在皆無也且上下無不格者不得以高卑稱也内外無不至者不得以表裏名也與化俱移者不得言久也終始常無者不可謂老也大音泰之先一本作先之崔本同先天悉薦反長丁丈反稱尺證反, HFL: ''}
  - {type: variant, offset: 3536, length: 0, content: '', ZTDZ: 聃之役有庚桑楚者偏得老聃之道以北居畏壘之山其臣之畫然知者去之其妾之絜然仁者遠之擁腫之與居鞅掌之爲使居三年畏壘大穰畏壘之民相與}
  - {type: punctuation, offset: 3537, content: /, id: KR5c0051_krp_003-bkkpn456}
  - {type: variant, offset: 3537, length: 0, content: '', ZTDZ: 曰庚桑子之始來吾洒然異之今吾日計之而不足歳計之而有餘庶幾其聖人乎子胡不相與尸而祝之杜而稷之乎庚桑子聞之南面而不釋然弟子異之庚桑子曰弟子何異於予夫春氣發而百草生正得秋而萬寳成夫春與秋豈無得而然哉天}
  - {type: page-break, offset: 3537, content: '', id: KR5c0051_SJB_003-110609b}
