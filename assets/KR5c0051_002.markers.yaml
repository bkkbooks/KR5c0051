  - {type: variant, offset: 12756, length: 696, content: 冥然無不體也寓六骸所謂逆旅六骸崔云手足首身也象耳目人用耳目亦用耳目非須耳目一知之所知而心未嘗死者乎知與變化俱則無往而不冥此知之一者也心與死生順則無時而非生此心之未嘗死也彼且擇日而登假人則從是也以不失會爲擇耳斯人無擇也任其天行而時動者也故假借之人由此而最之耳且如字徐子余反下同假又古雅反借也徐音遐讀連上句人字向下彼且何肯以物爲事乎其恬漠故全也申徒嘉兀者也而與鄭子産同師於伯昏無人子産謂申徒嘉曰我先出則子止子先出則我止羞與刖者並行申徒嘉李云申徒氏嘉名無人離篇作瞀人刖音月又五亂反其明日又與合堂同席而坐子産謂申徒嘉曰我先出則子止子先出則我止今我將出子可以止乎其未邪質而問之欲使必不並已且子見執政而不違子齊執政乎常以執政自多故直云子齊執政便謂足以明其不遜申徒嘉曰先生之門固有執政焉如此哉此論德之處非計位也處昌慮反子而子之執政而後人者也其矜在位欲處物先音恱注同聞之曰鑑明則塵垢不止止則不明也久與賢人處則無過今子之所取大者先生也而猶出言若是不亦過乎事明師而鄙吝之心猶未去乃眞過也子産曰子旣若是矣若是形殘猶與堯爭善計子之德不足以自反邪言不自顧省而欲輕蔑在位與有德者並計子之德故不足以形殘之過争善如字申徒嘉曰自狀其過以不當亡者衆多自陳其過狀以已爲不當亡者衆也不狀其過以不當存者寡黙然爲過自以爲應死者少也知不可柰何而安之若命唯有德者能之遊於羿之彀中中央者中地也然而不中者命也羿古之善射者弓矢所及爲彀中夫利害相攻則天下皆羿也自不遺身忘知與物同波者皆遊於羿之彀中耳雖張毅之出單豹之處猶未免於中地則中與不中唯在命耳而區區者各有其所遇而不知命之自爾故免乎弓矢之害者自以爲巧欣然多巳及至不免則自恨其謬而志傷神辱斯未能逹命, ZTDZ: ''}
