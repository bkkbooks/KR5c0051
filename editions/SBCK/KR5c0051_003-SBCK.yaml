body:
  text: 郭象子玄註陸德音義莊子內篇大宗師第六雖夫地之大萬物之富其所宗而師者無心也音義曰崔云遺形忘生當大宗此法也知天之所爲知人之所爲者至矣知天人之所爲者皆自然也則內放其身而外冥於物與衆玄同任之而無不至也知天之所爲者天而生也天者自然之謂也夫爲爲者不能爲而爲自爲耳爲知者不能知而知自知耳自知耳不知也不知也則知出於不知矣自爲耳不爲也不爲也則爲出於不爲矣爲出於不爲故以不爲爲主知出於不知故以不知爲宗是故眞人遺知而知不爲而爲自然而生坐忘而得故知稱絶而爲名去也天而生向崔本作失而生稱尺證反知人之所爲者以其知之所知以養其知之所不知終其天年而不中道夭者是知之盛也人之生也形雖七尺而五常必具故雖區區之身乃舉天地以奉之故天地萬物凡所有者不可一日而相無也一物不具則生者無由得生一理不至則天年無縁得終然身之所有者知或不知也理之所存者爲或不爲也故知之所知者寡而身之所有者衆爲之所爲者少而理之所存者愽在上者莫能器之而求其備焉人之所知不必同自全非畏死也故眞人陸行而非避濡也逺火而非逃熱也無過而非措當也故雖不以熱爲熱而未嘗赴火不以濡爲濡未甞蹈水不以死爲死未甞䘮生故夫生者豈生之而生哉成者豈成之而成哉故任之而無不至者眞人也豈有槩意於所遇哉慄音栗濡而朱反假更百反至也逺于阮反槩古愛反古之眞人其寢不夢無意想也其覺無憂當所遇而安也覺古孝反其食不甘理當食耳其息深深眞人之息以踵乃在根本中來深深李云內息之貌踵章勇反王穆夜云起息於踵遍體而深衆人之息以喉屈服者其嗌言若哇氣不平暢喉向云喘悸之息以喉爲節言情欲奔競所致嗌音益郭音厄厄咽喉也哇獲媧反徐胡卦反又音絓崔一音於佳反結也言咽喉之氣結礙不通也簡文云哇嘔也其欲深者其天機淺深根寧極然後反一無欲市志反古之眞人不知生不知惡死與化爲體音恱惡烏路反其出不訢其入不距泰然而任之訢音欣又音祈距本又作拒音巨李云欣出則營生距入則惡死翛然而往翛然而來而已矣之至理故往來而不難翛然音蕭本又作儵徐音叔郭與久反李音悠向云翛然自然無心而自爾之謂郭崔云往來不難之貌司馬云儵疾貌李同不忘其所始不求其所終終始變化皆忘之矣豈直逆忘其生而猶復探求死意也復扶又反下非復同也受而喜之不問所受者何物遇之而無不適也忘而復之復之不由於識乃至是之謂不以心道不以人天是之謂眞人人生而静天之性也感物而動性之欲也物之感人無窮人之逐欲無節則天理烕矣眞人知用心則背道助天則傷生故不爲也徐以全反郭作揖一入反崔云或作楫所以行舟也背音佩若然者其心志所居而安爲志其容寂雖行而無傷於静容寂本亦作家崔本作宗其顙䪻頯大朴之貌顙息黨反崔云也䪻徐去反郭苦對反李音一音逹權也王云質朴無飾也向本作䫥云䫥然大朴貌廣雅云大也五罪反凄然似秋殺物非爲威也凄七西反煖然似春生物非爲仁也煖音暄徐况晚反喜怒通四時夫體道合變者與寒暑同其温嚴而未嘗有心也然有温嚴之貌生殺之節故名於喜怒與物有宜而莫知其極無心於物故不奪物宜無物不宜故莫知其極故聖人之用兵也亡國而不失人心利澤施乎萬世不爲愛人因人心之所欲亡而亡之故不失人心也夫白日登天六合倶照非愛人而照之也故聖人之在天下煖焉若陽春之自和故澤者不謝凄乎若秋霜之自降故彫落者不怨亡國而不失人心崔云亡敵國而得其人心故樂通物非聖人也夫聖人無樂也直莫之塞而物自通有親非仁也至仁無親任理而自存天時非賢也時之者未若時而自合之賢也利害不通非君子也不能一是非之塗而就利違害則傷德而累當矣行名失已非士也善爲士者遺名而自得故名當其實而福應其身應應對之應亡身不眞非役人也自失其性而矯以從物受役多矣安能役人若狐不偕務光伯夷叔齊箕子胥餘紀他申徒狄是役人之役適人之適而不自適其適者也斯皆舎已殉人徇彼傷我也狐不階司馬云古賢人也務光皇甫謐云黃帝時人其長七寸伯夷叔齊孤竹君之二子箕子胥餘司馬云胥餘箕子名也見尸子崔同又云尸子曰箕子胥餘身爲厲髮徉彺或云尸子曰比干也胥餘其名他徒何反申徒狄殷時人石自沈於河崔本作同俱也舎音捨下同古之眞人其狀義而不朋與物同宜而非朋黨若不足而不承冲虚無餘如若不足也下之而無不上若不足而不承也承如字李云迎也又音拯上時掌反與乎其觚而不堅也常遊於獨而非固守與如字又音豫同云疑貌觚音王云觚特立不倚也崔云觚稜也張乎其虚而不華也曠然無懷乃至於實邴邴乎其似喜乎至人無喜暢然和適故似喜也邴邴徐音丙郭甫杏反向云喜貌簡文云明貌崔乎其不得巳乎動静行止常居必然之極崔于罪反徐息罪反郭旦雷反向云動貌簡文云速貌滀乎進我色也不以物傷巳也傗本又作滀勑六反司馬不色憤起貌王云冨有德充也簡文云聚也與乎止我德也無所趨也厲乎其似世乎至人無厲與世同行故若厲也厲如字崔本作廣云苞羅者廣也謷乎其未可制也高放而自得謷五羔反徐五到反司馬云志逺貌王云高邁於俗也連乎其似好閉也緜邈深逺莫見其門連如字李云連緜長貌雀云寒連也音輦好呼報反下皆同悗乎其言也不識不知而天機自發故悗然也悗亡本反字或作免李云無匹貌王云廢忘也崔云婉順也以刑爲體刑者治之體非我爲治直吏反以禮爲翼禮者世之所以自行耳非我制以知爲時知自時之動非我唱以德爲循德者自彼所循非我作循本亦作修兩得以刑爲體者綽乎其殺也任治之自殺故雖殺而寛綽昌略反崔本作淖以禮爲翼者所以行於世也順世之所行故無不行以知爲時者不得已於事也夫高下相受不可逆之流也小大相羣不得巳之勢也曠然無情羣知之府也承百流之會居師人之極者奚爲哉任時世之知委必然之事其不一與人爲徒彼彼而我我者人也天與人不相勝也是之謂眞人夫眞人同天人齊萬致萬致不相非天人不相勝故曠然無不一冥然無不在而玄同彼我也死生命也其有夜旦之常天也其有晝夜之常天之道也故知死生者命之極非然也若夜旦耳奚所係哉旦如字崔本作但音担人之有所不得與皆物之情也夫眞人在晝得晝在夜得夜以死生爲晝夜豈有所不得乎人之有所不得而憂娛在懷皆物情耳非理也彼特以天爲父而身猶愛之而況其卓乎卓者獨化之謂也夫相因之功莫若獨化之至也故人之所因者天也天之所生者獨化也人皆以天爲父故晝夜之變寒暑之節猶不敢惡隨天安之况乎卓爾獨化至於玄冥之竟又安得而不任之哉旣任之則死生變化唯命之從也淖中至反惡烏路反竟音境人特以有君爲愈乎巳而身猶死之而況其眞乎夫眞者不假於物而自然也夫自然之不可避豈直君命而已哉泉涸魚相與處於陸相呴以濕相濡以沫不如相於江湖與其不足而相愛豈若有餘而相涸戸各反郭戸格反爾雅云愼也呴况于况付二反濡本又作濡音儒或一音如戌反沬音末音亾下同而其譽堯而非桀也不如兩而化其道夫非譽皆生於不足故至足者忘善惡遺死生與變化爲一曠然無不適矣又安知堯桀之所在邪譽音餘注同夫大塊載我以形勞我以生佚我以老息我以死夫形生老死皆我也故形爲我載生爲我勞老爲我佚死爲我息四者雖變未始非我我奚惜哉塊苦怪反又苦對反徐胡罪反佚音逸故善吾生者乃所以善吾死也死與生皆命也無善則巳有善則生不獨善也故若以吾生爲善乎則吾死亦善也夫藏舟於壑藏山於澤謂之固矣方言生死變化之不可逃故先舉固逃之極然然後明之以必變之符將任化而無係也壑火各反然而夜半有力者之而走昧者不知也夫無力之力莫大於變化者也故乃掲天地以趍新山嶽以舍故故不暫停忽已渉新則天地萬物無時而不移也世皆新矣而日以爲故舟日易矣而視之若舊山日更矣而視之若前今交一臂而失之皆在冥中去矣故向者之我非復今我也我與今倶往豈常守故哉而世莫之覺不謂今之所遇可係而在豈不昧哉掲其列其謁二反藏小大有宜猶有所遯不知與化爲體而思藏之使不化則雖至深至固各得其所宜而無以禁其日變也故夫藏而有之者不能止其遯也無藏而任化者變不能變也若夫藏天下於天下而不得所遯是恒物之大情也無所藏而都任之則與物無不冥與化無不一故無外無內無死無生體天地而合變化索所遯而不得矣此乃常存之大情非一曲之小意索所百反特犯人之形而猶喜之若人之形者萬化而未始有極也人形乃是萬化之一遇耳未獨喜也無極之中所遇者皆若人耳豈特人形可喜而餘物無樂邪樂音洛下及注同其爲樂可勝計邪本非人而化爲人化爲人失於故矣失故而喜喜所遇也變化無窮何所不遇所遇而樂樂豈有極乎勝音升故聖人將遊於物之所不得遯而皆存夫聖人遊於變化之途放於日新之流萬物萬化亦與之萬化化者無拯亦與之無拯誰得遯之哉夫於生爲亡而於死爲存於死爲存則何時而非存哉善天善老善始善終人猶效之此自均於百年之內不善少而否老禾能體變化齊死生也然其平粹猶足以師人也善夭崔本作狡同古卯反本又作天於表反簡文於橋反云異也少詩照反否音鄙本亦作鄙粹雖遂反又況萬物之所係而一化之所待乎此玄同萬物而與化爲體故其爲天下之所宗也不亦宜乎夫道有情有信無爲無形有無情之情故無爲也有常無之信故無形也可傳而不可受故今傳而宅之莫能受而有之傳直專反注同可得而不可見咸得自容而莫見其狀自本自根未有天地自古以固存明無不待有而無也神神帝生天生地無也豈能生神哉不神帝而帝自神斯乃不神之神也不生天地而天地自生斯乃不生之生也故夫人之果不足以神而不神則神矣功何足有事何足恃哉在太極之先而不爲高在六極之下而不爲深先天地生而不爲久長於上古而不老言道之無所不在也故在高爲無高在深爲無深在久爲無久在老爲無老無所不在而所在皆無也且上下無不格者不得以高卑稱也内外無不至者不得以表裏名也與化俱移者不得言久也終始常無者不可謂老也大音泰之先一本作先之崔本同先天悉薦反長丁丈反稱尺證反狶韋氏得之以挈天地伏戲得之以襲氣母維斗得之終古不忒日月得之終古不息堪坏得之以襲崐崘馮夷得之以遊大川肩吾得之以處大山黃帝得之以登雲天顓頊得之以處玄宫禺強得之立乎北極西王母得之坐乎少廣莫知其始莫知其終彭祖得之上及有虞下及五伯傳得之以相武丁奄有天下乗東維騎箕尾而比於列星道無能也此言得之於道乃所以明其自得耳自得耳道不能使之得也我之未得又不能爲得也然則凡得之者外不資於道內不由於已掘然自得而獨化也夫生之難也猶獨化而自得之矣旣得其生又何患於生之不得而爲之哉故爲生果不足以全生以其生之不由於已爲也而爲之則傷其眞生也狶韋氏許豈反郭禇伊反李音豕司馬云上古帝王名挈徐苦結反郭苦係反司馬云要也得天地要也崔云成也伏戲音羲崔本作伏戲氏襲氣母司馬襲入也氣母兀氣之母也崔云取元氣之本維斗李云北斗所以爲天之綱維終古崔云終古久也鄭玄注周禮云終古猶言常也忒它得反差也崔本作代堪坏徐扶眉反郭孚坏反崔作邳司馬云堪坏神名人靣獸形淮南作欽崐崘崐或作岷同音昆下力門反崐崘山名馮夷司馬云清泠傅曰華隂僮鄕隄伯人也服八石得水仙是爲河伯一云以八月庚子浴於河而溺死一云渡河溺死大川河也崔本作泰川肩吾司馬云山神不死至孔子時大山泰又如字黃帝崔云得道而上天也顓音專頊許玉反玄宫李云顓頊帝高陽氏玄宫北方宫也月令曰其帝顓頊其神玄冥禺強音虞郭語龍反司馬云山海經曰北海之渚有神人靣鳥身珥兩青蛇踐兩赤蛇名禺強崔云大荒經曰北海之神名曰禺強靈爲之使歸藏曰昔穆王子筮卦於禺強案海外經云北方禺強黒身手足乗兩龍郭璞以爲水神人靣鳥身簡文云北海神也一名禺京是黃帝之孫也西王母山海經云狀如人狗尾逢頭戴勝善哨居洵水之涯漢武內傳云西王母與上元夫人降帝美容貌神仙人也少廣司馬云穴名崔云山名或西方空界之名彭祖解見逍遙篇崔云壽七百歲或以爲仙不死相息亮反武丁至列星司馬云傅殷相也武丁殷王高宗也東維箕斗之間天漢津之東維也星經曰一星在尾上言其乗東維騎箕尾之間也崔云傳死其精神乗東維託龍角乃列今尾上有傳星崔本此下更有其生無父母死登遐三年而形遯此言神之無能名者也凢二十二字掘其勿反南伯子葵問乎女偊曰子之年長矣而色若孺子何也曰吾聞道矣聞道則任其自生故氣色全也葵李云葵當作綦聲之誤也偊徐音禹李音矩一云是婦人也長丁丈反孺本亦作儒如喻反李云弱子也南伯子葵曰道可得學邪曰惡惡可子非其人也夫梁倚有聖人之才而無聖人之道我有聖人之道而無聖人之才吾欲以教之庶幾其果爲聖人乎不然以聖人之道告聖人之才亦易矣吾猶守而告之參日而後能外天下外猶遺也惡惡並音鳥下烏乎同梁倚魚綺反又其綺反李云梁姓倚名易以䜴反參音三已外天矣吾又守之七日而後外物物者朝夕所須切巳難忘已外物矣吾又守之九日而後能外生都遺也已外生矣而後能朝徹遺生則不惡死不惡死故所遇即安豁然無滯見機而作斯朝徹也朝如字李除遥反下同徹如字郭司馬云朝旦也徹逹妙之道李云夫能洞照不崇朝而逺徹也惡烏路反下同豁喚活反朝徹而後能見獨當所遇而安之忘先後之所接斯見獨者也見獨而後能無古今與獨倶往無古今而後能入於不死不生夫係生故有死惡死故有生是以無係無惡然後能無死無生殺生者不死生生者不生其爲物無不將也任其自將故無不將殺生者不死李云殺猶亡也亡生者不死崔云除其營生爲殺生生生者不生李云矜生者不生也崔云常營其生爲生生無不迎也任其自迎故無不迎無不毀也任其自毀故無不毀無不成也任其自成故無不成其名爲攖寧夫與物冥者物縈亦縈而未始不寧也攖郭音縈徐於營反李於反崔云有所繫著也攖寧也者攖而後成者也物縈而獨不縈則敗矣故縈而任之則莫不曲成矣南伯子葵曰子獨惡乎聞之曰聞諸副墨之子副墨之子聞諸洛誦之孫洛誦之孫聞之瞻明瞻明聞之聶許聶許聞之需役需役聞之於謳於謳聞之玄冥玄冥者所以名無而非無副墨李云可以副貳玄墨也崔云此巳下皆古人姓名或寓之耳無其人洛誦李云誦通也苞洛無所不通也瞻明音占李云神明洞徹也聶許徐乃攝反李云許與也攝而保之無所施與也需役徐音須李音儒云儒弱爲役也王云需待也役亭毒也於音烏又如字謳徐烏侯反李香于反云謳煦也欲化之貌王云謳歌謡也玄冥李云強名曰玄視之冥然向郭云所名無而非無也玄冥聞之參寥夫階名以至無者必得無於名表故雖玄冥猶未極而又推寄於參寥亦玄之又玄也參七南反寥徐力彫反李云參高也高邈寥曠不可名也參寥聞之疑始夫自然之理有積習而成者蓋階近以至逺研粗以至精故乃七重而後無之名九重而後疑無是始也疑始李云又疑無是始則始非無名也粗七胡反重直龍反下同子祀子輿子犂子來四人相與語曰孰能以無爲首以生爲脊以死爲尻孰知死生存亡之一體者吾與之友矣四人相視而莫逆於心遂相與爲友俄而子輿有病子祀往問之曰偉哉夫造物者將以予爲此拘拘也曲僂發背上有五管頥隱於齊肩高於頂句贅指天隂陽之氣有沴沴陵亂也子祀崔云淮南作子水作年五十四而病傴僂子輿本又作與音餘犂禮兮反尻苦羔反偉韋反向云美也崔云自此至鑑干井皆子祀自病狀也拘拘郭音駒司馬云體拘挛也王云不伸也僂徐力主反頂本亦作項崔本作缸音項句倶對反徐古侯反贅徐之稅反指天李云句贅項推也其形似贅言其上向也沴音麗徐又待顯反郭奴結反云陵亂也李同崔本作洗云滿也其心間而無事不以爲患間音閑崔以其心属上句跰而鑑于井曰嗟乎夫造物者又將以予爲此拘拘也夫任自然之變者無差也與物嗟耳跰歩田反下悉田反崔本作邊鮮司馬云病不能行故跰也鑑古暫反曰嗟乎崔云此子輿辭子祀曰女惡之乎曰亡予何惡浸假而化予之左臂以爲雞予因以求時夜浸假而化予之右臂以爲彈予因以求鴞炙浸假而予之尻以爲輪以神爲馬予因而乗之豈更駕哉浸漸也夫體化合變則無往而不因無因而不可也女惡音汝下同下烏路反亡如字絶句予何惡烏路反下及注間一音如字讀則連亡字爲句浸子鴆反向云漸也以求時夜一本無求字彈徒旦反鴞于嬌反炙章夜反且夫得者時也當所遇之時世謂之得失者順也時不暫停順往而去世謂之失安時而處順哀樂不能入也此古之所謂縣解也而不能自解者物有結之一不能自解則衆物其結之矣故能解則無所不解則無所而解也樂音洛縣音玄解音解下及注同向云縣解無所係也且夫物不勝天久矣吾又何惡焉天不能無晝夜我安能無死生而惡之哉俄而子來有病喘喘然將死其妻子環而泣之犁往問之曰叱避無怛化夫死生猶寤寐耳於理當寐不願人驚之將化而叱無爲怛之也喘喘川轉反又尺軟反崔本作惴惴環如字徐音患李云繞也叱昌失反怛才逹反崔本作靼音怛案怛驚也鄭玄注周禮考工記不能驚怛是也倚其戸與之語曰偉哉造化又將奚以汝爲將奚以汝適以汝爲䑕肝乎以汝爲蟲臂乎子來曰父母於子東西南北唯命之從隂陽於人不翅於父母自古或有能違父母之命者未有能違隂陽之變而距晝夜之節者也倚於綺反䑕肝向云委弃土壤而巳王云取微蔑至賤臂亦作腸崔本同翅徐詩知反彼近吾死而我不聽我則悍矣彼何罪焉死生猶晝夜耳未足爲逺也時當死亦非所禁而橫有不聽之則適足捍逆於理以速其死其死之速由於我悍非死之罪也彼謂死耳在生故以死爲彼彼近如字悍本亦作捍胡旦反又音于文云持抵也夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也理常俱也今大冶鑄金金踊躍曰我且必爲鏌鋣大冶必以爲不祥之金今一犯人之形而曰人耳人耳夫造化者必以爲不祥之人人耳人耳唯願爲人也亦猶金之踊躍世皆知金之不祥而不能任其自化夫變化之道靡所不遇今一遇人形豈故爲哉生非故爲時自生耳矜而有之不亦妄乎且如字徐子餘反鏌音莫鋣以嗟反鏌鋣劒名今一以天地爲大鑪以造化爲大冶往而不可哉人皆知金之有係爲不祥故明巳之無異於金則所係之情可解可解則無不可也鑢劣奴反於音烏解如字下同成然寐蘧然覺寐寤自若不以死生累心成然如寐崔同李云成然縣解之貌本或作成音盛簡文云當作城本又作晎呼括反視高貌本亦作俄然蘧然李音渠崔本作據又其據反遽然句形之貌覺古孝反向崔本此下更有發然汀出一句云無係則侓液通也崔本作衛利通不以化爲人也子桑戸孟子反子琴張三人相與友曰孰能相與於無相與相爲於無相爲夫體天地冥而化者雖手足異任五藏殊管未嘗相與而百節同和斯相與於無相與也未嘗相爲而表裏俱濟斯相爲於無相爲也若乃役其心志以恤手足運其股肱以營五藏則相營愈篤而外內愈困矣故以天下爲一體者無愛爲於其間也與如字崔云猶親也或一音豫相爲如字或一音于僞反愛爲于僞反孰能登天遊霧橈桃無極無所不任橈徐而少反郭許堯反桃徐徒了反郭李徒堯反又作兆李云橈桃猶宛轉也宛轉玄曠之中簡文云循環之名相忘以生無所終窮忘其生則無不忘矣故能隨變任化無所窮竟三人相視而莫逆於心遂相與友若然者豈友哉蓋明至親而無愛念之近情也莫然有間而子桑戸死未葬孔子聞之使子貢往待事焉或編曲或鼓琴相和而歌曰嗟來桑戸乎嗟來桑戸乎而已反其眞而我猶爲人猗人哭亦哭俗內之迹也齊死生忘哀樂臨尸能歌方外之至也莫然如字崔云定也有間如字崔李六填切本亦作爲間編曲必連反字林布千反郭父珍反史記甫連反李云曲蚕傳和胡卧反猶崔本作獨猗於反崔云辭也樂音洛子貢趨而進曰敢問臨尸而歌禮乎二人相視而曰是惡知禮意夫知禮意者必遊外以經內守母以存子稱情而直往也若乃矜乎名聲牽乎形制則孝不任誠慈不任實父子兄弟懷情相欺豈禮之大意哉惡音烏下同稱尺證反子貢反以吿孔子曰彼何人者邪脩行無有而外其形骸臨尸而歌顔色不變無以命之彼何人者邪孔子曰彼遊方之外者也而丘遊方之內者也夫理有至極外內相冥未有極遊外之致而不冥於內者也未有能冥於內而不遊於外者也故聖人常遊外以私內無心以順有故雖終日揮形而神氣無變俯仰萬機而淡然自若夫見形而不及神者天下之常累也是故覩其與羣物並行則莫能謂之遺物而離人矣觀其體化而應務則莫能謂之坐忘而自得矣豈直謂聖人不然哉乃必謂至理之無此是故莊子將明流統之所宗以釋天下之可悟若直就稱仲尼之如此或者將據所見以排之故超聖人之內迹而方外於數子宜其所寄以尋述作之大意則夫遊外弘內之道坦然自明而莊子之書故是渉俗蓋世之談矣無以命之崔李云命名也淡徒暫反離力知反下同應應對之應下同數所主反坦徒但反外內不相及而丘使女往弔之丘則陋矣夫弔者方內之近事也施之於方外則陋矣女音汝下同彼方且與造物者爲人而遊乎天地之一氣皆冥之故無二彼以生爲附贅縣疣若疣之自縣贅之自附此氣之時聚非所樂也縣音玄注同爲之業所謂無爲之業非拱黙而巳所謂塵垢之外非伏於山林也芒然莫剛反李云無係之貌彷善剛反徨音皇塵垢如字崔本作塜坸云塜音塳坸垢同齊人以風塵爲摓堁彼又惡能憒憒然爲世俗之禮以觀衆人之耳目哉其所以觀示於衆人者皆其塵垢耳非方外之冥物也憒上內反文蒼頡篇並云亂也觀古亂反示也注同子貢曰然則夫子何方之依子貢不聞性與天道故見其所依而不見其所以依也夫所以依者不依也世豈覺之哉曰丘天之戮民也以方內爲桎梏明所貴在方外也夫遊外者依內離人者合俗故有天下者無以天下爲也是以遺物而後能入羣坐而後能應務愈遺之愈得之苟居斯極則雖欲釋之而理固自來斯乃天人之所不赦者也雖然吾與汝共之雖爲世所桎梏但爲與汝共之耳明巳恒自在外也子貢曰敢問其方問所以遊外而共內之意孔子曰魚相造乎水人相造乎道相造乎水者穿池而養給相造乎道者無事而生定所造雖異其於由無事以得事自方外以共內然後養給而生定則莫不皆然也倶不自知耳故成無爲也造七報反詣也下同池本亦作地崔同故曰魚相忘乎江湖人相忘乎道術各自足而相忘者天下莫不然也至人常足故常忘也忘音亡下同子貢曰敢問畸人問向之所謂方外而不耦於俗者又安在也畸人居宜反司馬云不耦也不耦於人謂闕於禮教也李其宜反言奇異也曰畸人者畸於人而侔於天夫與內冥者遊於外也獨能遊外以冥內任萬物之自然使天性各足而帝王道成斯乃畸於人而侔於天也侔音謀司馬云等也亦從也故曰天之小人人之君子人之君子天之小人也以自然言之則人無小大以人理言之則侔於天者可謂君子矣顔回問仲尼曰孟孫才其母死哭泣無涕中心不慼居䘮不哀無是三者以善䘮蓋魯國固有無其實而得其名者乎回一怪之魯國觀其禮而顔回察其心孟孫才李云三後才其名也崔云才或作牛仲尼曰夫孟孫氏盡之矣進於知矣盡死生之理應內外之宜者動而以天行非知之匹也應應對之應唯簡之而不得簡擇死生而不得其異若春秋冬夏四時行耳夫已有所簡矣孟孫氏不知所以生不知所以死巳簡而不得故無不安無不安故不以生死槩意而付之自化也不知就先不知就後所遇而安若化爲物不違化也以待其所不知之化巳乎死生宛轉與化爲一猶乃忘其所知於當今豈待所未知而豫憂者哉且方將化惡知不化哉方將不化惡知巳化哉巳化而生焉知未生之時哉未化而死焉知巳死之後哉故無所避就而與化倶生也惡音烏下同焉於䖍反下皆同吾特與汝其夢未始覺者邪夫死生猶覺夢耳今夢自以爲覺則無以明覺之非夢也苟無以明覺之非夢則亦無以明生之非死矣死生覺夢未知所在當其所遇無不自得何爲在此而憂彼哉覺古孝反注下皆同且彼有駭形而無損心以變化爲形之駭動耳故不以死生損累其心駭形如字崔作咳云有嬰兒之形有旦宅而無情死似形骸之變爲旦宅之日新耳其情不以爲死旦宅並如字王云旦暮改易宅是神居也李本作怛㤞上丹末反下陟嫁反云驚惋之貌崔本作靼宅靼怛也孟孫氏特覺人哭亦哭是自其所以乃夫常覺者無往而有逆也故人哭亦哭正自是其所宜也乃崔本作惡且也相與吾之耳矣夫死生變化吾皆吾之旣皆自吾吾何失哉未始失吾吾何憂哉無逆故人哭亦哭無憂故哭而不哀庸詎知吾所謂吾之乎靡所不吾也故玄同外內彌貫古今與化日新豈知吾之所在也詎其庶反下章同且汝夢爲鳥而厲乎天夢爲魚而没於淵言無往而不自得也不識今之言者其覺者乎其夢者乎夢之時自以爲覺則焉知今者之非夢邪亦焉知其非覺邪覺夢之化無往而不可則死生之變無時而足惜也造適不及獻不及排所造皆適則忘適矣故不及也排者推移之謂也夫禮哭必哀獻必樂哀樂存懷則不能與適推移矣今孟孫常適故哭而不哀與化倶往也造七報反注同獻向云獻善也王云章也意有適章於故曰獻排皮皆反樂音洛下同安排而去化乃入於寥天一安於推移而與化倶去故乃入於寂寥而與天爲一也自此以上至于子祀其致一也所執之䘮異故歌哭不同寥本亦作廖力彫反李良救反天一崔本作造敵不及獻不及安排而造化不及不及雄漂淰雄漂㑫不及簟筮簟筮乃入於漻天一上時掌反意而子見許由許由曰堯何以資汝資者給濟之謂意而子李云賢士也資給也意而子曰堯謂我汝必躬服仁義而明言是非許由曰而奚來爲軹夫堯旣已黥汝以仁義而劓汝以是非矣汝將何以遊夫遥蕩恣睢轉徙之乎言其將以形教自虧殘而不能復遊夫自得之塲無係之也軹之是反郭之忍反崔云軹辭也李云是也黥其京反劓魚器反李云毀道德以爲仁義不似黥乎破玄同以爲是非不似劓乎遥蕩王云縱散也恣七咨反又如字睢郭李云許維反徐許鼻反李王皆云恣睢自得貌復扶又反下同意而子曰雖然吾願遊於其藩不敢復求渉中道也且願遊其藩傍而已藩甫煩反李音煩司馬向皆云崔也崔云域也許由曰不然夫盲者無以與乎眉目顔色之好瞽者無以與乎青黃黼黻之觀意而子曰夫無莊之失其美據梁之失其力黃帝之亡其知皆在鑪捶之間耳言天下之物未必皆自成也自然之理亦有須治鍜而爲噐者耳故此之三人亦皆聞道而後亡其所務也此皆言以遣云爲之累盲本又作崔本作目云目或作刑刑黥劓也與音豫下同好如字又呼報反黼音甫黻音弗觀古亂反無莊據梁司馬云皆人名李云無莊無莊飾也據梁強梁也鑪音盧棰本又作徐之睡反又之蘂反一音時蘂反李云錘鴟頭頗口句鐡以吹火也崔云盧謂之瓮捶當作甀盧甀之間言小處也甀音丈僞反鍜丁亂反庸詎知夫造物者之不息我黥而我劓使我乗成以隨先生邪夫率性直往者自然也往而傷性性傷而能改者亦自然也庸詎我知之自然當不息黥劓而乗可成之道以隨夫子邪而欲弃而勿告恐非造物之至許由曰噫未可知也我爲汝言其大略吾師乎吾師乎萬物而不爲義澤及萬世而不爲仁皆自爾耳亦無愛爲於其間也安所其仁義噫徐音醫李云歎聲也崔云辭也本亦作意音同又如字謂呼意而名也爲于僞反注同子兮反司馬云碎也長於上古而不爲老日新也長丁丈反覆載天地刻彫衆形而不爲巧自然故非巧也此所遊已遊於不爲而師於無師也顔回曰回益矣以損之爲益也仲尼曰何謂也曰回忘仁義矣曰可矣猶未也仁者兼愛之迹義者成物之功愛之非仁仁迹行焉成之非義義功見焉存夫仁義不足以知愛利之由無心故忘之可也但忘功迹故猶未玄逹見賢遍反下文同它日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也禮者形體之用樂者樂生之具忘其具未若忘其所以具也它日崔本作異旦下亦然復扶又反下同樂音洛又音嶽它日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹵然曰何謂坐忘顔回曰墮枝體黜聦明離形去知同於大通此謂坐忘夫坐忘者奚所不忘哉旣其迹又忘其所以迹者內不覺其一身外不識有天地然後曠然與變化爲體而無不通也蹵然子六反崔云變色貌墮許規反徐又待果反去起吕反知音智坐崔云端坐而仲尼曰同則無好也無物不同則未嘗不適朱嘗不適何好何惡哉好呼報反注同惡烏路反化則無常也同於化者唯化所適故無常也而果其賢乎丘也請從而後也子輿與子桑友而霖十日子輿曰子桑殆病矣裹飯而往食之此二人相爲於無相爲者也今裹飯而相食者乃任之天理而自爾非相爲而後往也霖本又作淋音林左傳云三日以往爲霖裹音果食音嗣注同至子桑之門則若歌若哭鼔琴曰父邪母邪天乎人乎有不任其聲而趨舉其詩焉子輿入曰子之歌詩何故若是嫌其有情所以趨出逺理有不任音壬其聲而趨七佳反舉其詩焉崔云不任其聲憊也趨舉其詩無音曲也曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其爲之者而不得也然而至此極者命也夫言物皆自然無爲之者也莊子內篇應帝王第七夫無心而任乎自化者應爲帝王也音義曰崔云行不言之教使天下自以爲牛馬應爲帝王者也齧缺問於王倪四問而四不知齧缺因躍而大喜行以告蒲衣子蒲衣子曰而乃今知之乎有虞氏不及泰氏夫有虞氏之與泰氏皆世事之迹耳非所以迹也所以迹者無迹也世孰名之哉未之甞名何勝之有邪然無迹者乗羣變履萬世世有夷險故迹有不及也齧五結反缺丘恱反倪五兮反四問而四不知向云事在齊物論中蒲衣子尸子云蒲衣八歲舜讓以天下崔云即衣王倪之師也淮南子曰齧缺問道於衣泰氏司馬云上古帝王也崔云帝王也李云大庭氏又云無名之君也有虞氏其猶藏仁以要人亦得人矣而未始出於非人夫以所好爲是人所惡爲非人者唯以是非爲域者也夫能出於非人之域者必入於無非人之竟矣故無得無失無可無不可豈直藏仁而要人也藏仁才剛反崔云懷仁心以結人也本亦作藏作剛反善也簡文云要一遥反註同好呼報反惡烏路反之竟音境泰氏其卧徐徐其覺于于一以已爲馬一以巳爲牛夫如是又奚是人非人之有哉斯可謂出於非人之域徐徐如字崔本作祛祛覺古孝反于于如字司馬云徐徐安穩貌于于無所知貌簡文云徐徐于于寐之狀也其知情信任其自知故情信其德甚眞任其自得故無僞而未始入於非人不入乎是非之域所以絶於有虞之世肩吾見狂接輿狂接輿曰日中始何以語女肩吾曰告我君人者以已出經式義度人孰敢不聽而化諸接輿曰是欺德也以巳制物則物失其眞日人實反中音仲亦如字始李云日中始人姓名賢者也崔本無日字云中始賢人也語魚據反女音汝後皆同出經絶句司馬云出行也經常也崔云出典法也式義度人絶句式法也崔云式用也用仁義以法度人也欺簡文云欺妄也其於治天下也猶渉海鑿河而使蚉山也夫寄當於萬物則無事而自成以一身制天下則功莫就而任不勝也鑿在洛反下同郭粗鶴反河李云渉海必䧟波鑿河無成也蚉音文本亦作蟁同勝音升夫聖人之治也治外乎全其性分之內而已正而後行各正性命乎能其事者而已矣不爲其所不能苦學反李云堅貌崔本作橐音託且鳥高飛以避矰弋之害鼷䑕深穴乎神丘之下以避重鑿之患禽獸猶各有以自存故常王任之而不爲則自成也矰則能反李云罔也害崔本作菑鼷音兮而曾二蟲之無知言汝曾不如此二蟲之各存而不待教乎天根遊於殷陽至蓼水之上適遭無名人而問焉曰請問爲天下無名人曰去汝鄙人也何問之不預也問爲天下則非起於大止於玄冥也天根崔云人姓名也遊於殷陽李云殷山名陽山之陽崔云殷陽地名司馬云殷衆也言向南遊也或作殷湯蓼音了李云水名也不豫司馬云嫌不漸豫太倉卒也簡文云豫恱也大音泰予方將與造物者爲人任人之自爲厭則又乗夫莽之鳥以出六極之外而遊無何有之鄕以處壙埌之野莽羣碎之謂耳乗羣碎馳萬物故能出處常通而無狹滯之地夫音符莽莫蕩反崔本作猛妙小反莽輕虚之狀也崔云猛之鳥首也取其行而無迹壙徐苦廣反埌徐力黨反李音浪壙埌無滯爲名也崔云猶曠蕩也挾戸夾反汝又何帠以治天下感予之心爲言皆放之自得之場則不治而自治也帠徐音藝又魚例反司馬云法也一本作牛世反崔本作爲治直吏反下文同又復問無名人曰汝遊心於淡任其性而無所飾焉則淡矣復扶又反淡徒暫反徐大敢反合氣於漠漠然静於性而止漠音莫順物自然而無容私焉而天下治矣任性自生公也心欲益之私也容私果不足以生生而順公乃全也陽子居見老聃曰有人於此嚮疾疆梁物徹䟽明學道不勌如是者可比明王乎老聃曰是於聖人也胥易技係勞形心者也言此功夫容身不得不足以此聖王楊子居李云居名也子男子通稱嚮許亮反李云許兩反疾強梁崔云所在疾強梁之人也李云敏疾如嚮也簡文云如嚮應聲之疾故是強梁之貌物徹䟽明司馬云物事也徹通也事能通而開明也崔云無物不逹無物不明勌其眷反胥如字司馬云䟽也簡文云相也易音亦崔以豉反相輕易也簡文同技徐其綺反簡文云藝也係如字崔本作繫或云作繫簡文云音繫勑律反且也虎豹之文來田猨狙之便執之狗來藉如是者可比明王乎此皆以其文章技能係累其身非渉虚以御乎無方也來田李云虎豹以皮有文章見獵也田獵也猨音狙七餘反便毗肩反舊扶靣反音來李音狸崔云旄牛也藉司馬云藉繩也由捷見結縳也崔云藉繫也陽子居蹵然曰敢問明王之治老聃曰明王之治功蓋天下而似不自已天下若無明王則莫能自得今之自得實明王之功也然功在無爲而還任天下天下皆得自任故似非明王之功蹵然子六反改容之貌冶直吏反下同化貸萬物而民弗恃夫明王皆就足物性故人人皆云我自爾而莫知恃頼於明王頼吐代反有莫舉名使物自喜雖有蓋天下之功而不舉以爲已名故物皆自以爲得而喜立乎不測居變化之日新而無方而遊於無有者也與萬物爲體則所遊者虚也不能物則迕物不睱何睱遊虚哉鄭有神巫曰季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆弃而走不憙自聞死日也神巫曰季咸李云女曰巫男曰覡季咸名不憙許忌反列子見之而心醉歸以告壺子曰始吾以夫子之道爲至矣則又有至焉者矣謂季咸之至又過於夫子心醉向云迷感於其道也壺子司馬云名林鄭人列子師壺子曰吾與汝旣其文未旣其實而固得道與衆雌而無雄而又奚焉言列子之未懷道也旣其文李云旣盡也與音餘衆雌而無雄而又奚夘焉司馬云言汝受訓未熟故未成若衆雌無雄則無也而以道與世亢必信夫故使人得而相汝未懷道則有心有心而亢其一方以必信於世故可得而相之亢苦浪反必信崔力純反相息亮反注下同嘗試與來以予示之明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣吾見怪焉見濕焉列子入泣涕沾以告壺子壼子曰鄕吾示之以地文萌乎不震不正萌然不動亦不自正與枯木同其不華濕均於寂魄此乃至人無感之時也夫至人其動也天其静也地其行也水流其止也淵黙淵黙之與水流天行之與地止其於不爲而自爾一也今季咸見其尸居而坐忘即謂之將死覩其神動而天隨因謂之有生誠應不以心而理自玄符與變化升降而以世爲量然後足爲物主而順時無極故非相者所測耳此應帝王之大意也示之本亦作視崔云示視之也嘻徐音熈郭許意反數所主反鄕許亮反本作曏亦作向同崔本作康云向也地文與士同也崔云文猶理也不震不正並如字崔本作不誫不止云如動不動也應應對之應後同是殆見吾杜德機也德機不發曰杜吾杜德機崔云塞吾德之機嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣全然有生矣吾見其杜權矣權機也今乃自覺昨日之所見見其杜權故謂之將死瘳丑留反列子入以吿壺子壺子曰鄕吾示之以天壤天壤之中覆載之功見矣比之地文不猶乎此應感之容也見賢遍反名實不入任自然而覆載則天機玄應而名利之飾皆爲弃物而機發於踵常在極上起是殆見吾善者機也機發而善於彼彼乃見之甞又與來明日又與之見壺子出而謂列子曰子之先生不齊吾無得而相焉試齊且復相之列子入以告壺子壺子曰吾鄕示之以太沖莫勝居太沖之極浩然泊心而玄同萬方故勝莫得措其間也齊側皆反本又作齊下同復扶又反泊白博反又音魄晉七赦反字又作措同是殆見吾衡氣機也無往不平混然一之以管闚天者莫見其涯故似不齊闚去規反鯢桓之審爲淵止水之審爲淵流水之審爲淵淵有九名此處三焉淵者静黙之謂耳夫水常無心委順外物故雖流之與止鯢桓之與龍躍常淵然自若未始失其静黙也夫至人用之則行捨之則止行止雖異而玄黙一焉故略舉三異以明之雖波流九變治亂紛如居其極者常淡然自得泊乎忘爲也鯢五兮反桓司馬云鯢桓二魚名也簡文云鯢鯨魚也桓盤桓也崔本作鯢拒云魚所處之方穴也又云拒或作桓審郭如字簡文云處也司馬云審當爲蟠蟠聚也崔本作畨云回流所鍾之域也淵有九名淮南子云有九琁之淵許愼注云至深也治直吏反嘗又與來明日又與之見壺子立未定自失而走壺子曰追之列子追之不及反以報壺子曰已滅矣已矢矣吾弗及已壺子曰鄕吾示之以未始出吾宗雖變化無常深根寧極也失而走如字徐音逸㓕崔云㓕不見也吾與之虚而委蛇無心而隨物化委於危反蛇以支反委蛇至順之貌不知其誰何汎然無所係也因以爲弟靡因以爲波流故逃也變化頽靡世事波流無往而不因也夫至人一耳然應世變而時動故相者無所措其目自失而走此明應帝王者無方也爲弟徐音頽文回反靡弟靡不窮之貌崔云猶遜伏也波流如字崔本作波隨云常隨從之然後列子自以爲未始學而歸三年不出爲其妻爨食豕如食人忘貴賤也爲于僞反爨七判反食音嗣下同於事無與親唯所遇耳雕復朴去華取實竹角反復符六反塊然獨以其形立外飾去也塊徐苦怪反又苦對反紛而封哉雖動而眞不散也紛芳云反崔云亂貌封崔本作戎云封戎散亂也一以是終使物各自終無爲名尸因物則物各自當其名也無爲謀府使物各自謀也無爲事任付物使各自任無爲知主無心則物各自主其知也知音智註同體盡無窮因天下之自爲故馳萬物而無窮而遊無朕任物故無迹朕直忍反崔云兆也盡其所受乎天足則止也而無見得見得則不知止亦虚而已不虚則不能任羣實至人之用心若鏡鑒物而無情不將不逆應而不藏來即應去即止藏如字本又作臧故能勝物而不傷物來即鑒鑒不以心故雖天下之廣而無勞神之累南海之帝爲儵北海之帝爲忽中央之帝爲渾沌儵與忽時相與遇於渾沌之地渾沌待之甚善儵與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死爲者敗之儵音叔李云喻有象也忽李云喻無形也渾胡本反沌徒本反崔云渾沌無孔竅也李云清濁未分也此喻自然簡文云儵忽取神速爲名渾沌以合和爲貌神速譬有爲合和譬無爲竅苦呌反文云孔也七日而渾沌死崔云言不順自然強開耳目也南華眞經卷第三
