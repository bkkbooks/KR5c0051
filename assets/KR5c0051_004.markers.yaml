  - {type: variant, offset: 8756, length: 2, content: 聖法, ZTDZ: 尚賢也縱脱無行}
  - {type: variant, offset: 8759, length: 514, content: 民始可與論議外無所矯則內全我朴而無自失之言也殫音丹盡也擢亂六律鑠絶竽瑟塞曠之耳而天下始人含其聦矣滅文章散五采膠離朱之目而天下始人含其明矣夫聲色離曠有耳目者之所貴也受生有分而以所貴引之則性命䘮矣若乃毀其所貴弃彼任我則聦明各全人含其眞也鑠郭李詩灼反向徐音藥崔云燒斷之也竽徐音于瑟本亦作笙塞崔本作塞杜云塞也膠音交徐古孝反䘮矣息浪反毀絶鉤繩而弃規矩攦工倕之指而天下始人有其巧矣故曰大巧若拙夫以蜘蛛蛣蜣之陋而布網轉丸不求之於工匠則萬物各有能也所能雖不同而所習不敢異則若巧而拙矣故善用人者使能方者爲方能圓者爲圓各任其所能人安其性不責萬民以工倕之巧故衆技以不相能似拙而天下皆自能則大巧矣夫用其自能則規矩可弃而妙匠之指可攦也攦郭吕係反又力結反徐所綺反李云折也崔云撕之也倕音垂堯時巧者也一名睡蜘音知蛛音誅蛣起一反蜣音削曾史之行鉗楊墨之口攘弃仁義而天下之德始玄同矣去其亂羣之率則天下各復其所而同於玄德也行下孟反鉗李巨炎反又其嚴反攘如羊反率本又作帥同所反彼人含其明則天下不鑠矣人含其聦則天下不累矣人含其知則天下不惑矣人含其德則天下不僻矣彼曾史楊墨師曠工倕離朱者皆外立其德而以爚亂天下者也此數人者所禀多方故使天下躍而效之效之則失我我失由彼則彼爲亂主矣夫, ZTDZ: 非}
