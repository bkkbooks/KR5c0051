  - {type: variant, offset: 0, length: 3061, content: 南華眞經卷第六郭象子玄註陸德明音義莊子外篇刻意第十五音義曰以義名篇刻意尚行離世異俗高論怨誹爲亢而巳矣此山谷之士非世之人枯槁赴淵者之所好也語仁義忠信恭儉推讓爲脩而巳矣此平世之士教誨之人遊居學者之所好也語大功立大名禮君臣正上下爲治而巳矣此朝廷之士尊主彊國之人致功并兼者之所好也就藪澤處閒曠釣魚閒處無爲而巳矣此江海之士避世之人閒暇者之所好也吹呴呼吸吐故納新熊經鳥申爲壽而巳矣此道引之士養形之人彭祖壽考者之所好也此數子者所好不同恣其所好各之其方亦所以爲逍遙也然此僅各自得焉能靡所不樹哉若夫使萬物各得其分而不自失者故當付之無所執爲也刻意司馬云刻削也峻其意也案謂削意令峻也廣雅云意志也行下孟反離力智反論力困反怨誹非謂反徐音非李云非世無道怨巳不遇也亢苦浪反李云窮高曰亢稿苦老反赴淵司馬云枯槁若鮑焦介推赴淵若申徒狄好呼報反下及注皆同治直吏反下同朝直遥反藪素口反閒音閑下同釣本或作魡同彫呌反呴况于反字亦作喣吸許及反吐故納新李云吐故氣納新氣也熊經如字李古定反司馬云若熊之攀樹而引氣也鳥申如字郭音信司馬云若鳥之嚬呻也道引音導下同李云導氣令和引體令柔數所主反僅其靳反焉於䖍反若夫不刻意而高無仁義而脩無功名而治無江海而閒不道引而壽所謂自然無不忘也無不有也忘故能有若有之則不能救其忘矣故有者非有之而有也忘而有之也澹然無極而衆美從之若厲巳以爲之則不能無極而衆惡生澹大暫反徐音談然一本作澹而此天地之道聖人之德也不爲萬物而萬物自生者天地也不爲百行而百行目成者聖人也行下孟反下及篇末百行同故曰夫恬惔寂漠虚無無爲此天地之平而道德之質也非夫寂漠無爲也則危其平而䘮其質也惔大暫反徐音談下皆同質正也䘮息浪反下同故曰聖人休休焉則平易矣休乎恬惔寂漠息平虚無無爲則雖歷乎險阻之變常平夷而無難休虚求反息也下及注同易以䜴反下及注皆同難乃旦反下同平易則恬惔矣患難生於有爲有爲亦生於患難故平易恬惔交相成也平易恬惔則憂患不能入邪氣不能襲泯然與正理俱徃邪似嗟反下同故其德全而神不虧夫不平不惔者豈唯傷其形哉神德並喪於内也故曰聖人之生也天行任自然而運動其死也物化蛻然無所係蛻音帨又始銳反靜而與隂同德動而與陽同波動静無心而付之隂陽也不爲福先不爲禍始感而後應無所唱也迫而後動㑹至乃動不得巳而後起任理而起吾不得巳也去知與故循天之理天理自然知故無爲乎其間去起吕反故無天災災生於違天無物累累生逆物無人非與人同者衆必是焉無責同於自得故無責其生若浮其死若休汎然無所惜也不思慮付之天理不豫謀理至而應光矣而不耀用天下之自光非吾耀也信矣而不期用天下之自信非吾期也其寢不夢其覺無憂其神純粹一無所欲覺古孝反粹雖遂反其魂不罷有欲乃疲罷音皮虚無恬惔乃合天德乃與天地合恬惔之德也故曰悲樂者德之邪喜怒者道之過好惡者德之失故心不憂樂德之至也至德常適故情無所槩樂音洛下同惡烏路反一而不變靜之至也静而一者不可變也無所於忤虚之至也其心豁然盡乃無纎介之違忤五故反苦角反介音界不與物交淡之至也物自來耳至淡者無交物之情無所於逆粹之至也若雜乎濁欲則有所不順故曰形勞而不休則弊精用而不巳則勞勞則竭物皆有當不可失也水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也象天德者無心而階㑹也故曰純粹而不雜無非至當之事也靜一而不變常在當上住淡而無爲與㑹俱而巳矣動而以天行若夫逐欲而動人行也此養神之道也夫有干越之劒者柙而藏之不敢用也寳之至也况敢輕用其神乎干越之劒司馬云干吳也吳越出善劒也季云干谿越山出名劒案吳有谿名干谿越有山名若耶並出善鐡鑄爲名劒也柙戶甲反精神四逹並流無所不極上際於天下蟠於地夫體天地之極應萬物之數以爲精神者故若是矣若是而有落天地之功者任天行耳非輕用也蟠音盤郭音煩化育萬物不可爲象所育無方其名爲同帝同天帝之不爲純素之道唯神是守守而勿失與神爲一常以純素守乎至寂而不蕩於外則㝠也一之精通合于天倫精者物之眞也野語有之曰衆人重利廉士重名賢士尚志聖人貴精與神爲一非守神也不遠其精非貴精也然其迹則貴守之也故素也者謂其無所與雜也純也者謂其不虧其神也苟以不虧爲純則雖百行同舉萬變參備乃至純也苟以不雜爲素則雖龍章鳳姿倩乎有非常之觀乃至素也若不能保其自然之質而雜乎外飾則雖犬羊之鞹庸得謂之純素哉倩七練反觀古喚反苦郭反能體純素謂之真人莊子外篇繕性第十六音義曰以義名篇繕性於俗俗學以求復其初巳治性於俗矣而欲以俗學復性命之本所以求者愈非其道也繕善戰反崔云治也或云善也性性本也滑欲於俗思以求致其明巳亂其心於欲而方復役思以求明思之愈精失之愈遠滑音骨亂也崔云治也思李息吏反注役思同復扶又反下無復雖復同謂之蔽蒙之民若夫發者必離俗去欲而後幾焉離力智反下文同去起吕反古之治道者以恬養知恬静而後知不蕩知不蕩而性不失也治始字又直吏反知音智下以意求之生而無以知爲也謂之以知養恬大無以知爲而任其自知則雖知周萬物而恬然自得也知與恬交相養而和理出其性知而非爲則無害於恬恬而自爲則無傷於知斯可謂交相養矣二者交相養則和理之分豈出他哉夫德和也道理也和故無不得道故無不理德無不容仁也無不容者非爲仁也而仁迹行焉道無不理義也無不理者非爲義也而義功著焉義明而物親忠也若夫義明而不由忠則物愈踈中純實而反乎情樂也仁義發中而還任本懷則志得矣志得矣其迹則樂也樂音洛注同信行容體而順乎文禮也信行容體而順乎自然之節文者其迹則禮也行下孟反注同下以行小行注行者行立皆放此禮樂徧行則天下亂矣以一體之所履一志之所樂行之天下則一方得而萬方失也徧音遍彼正而蒙已德德則不冒冒則物必失其性也各正性命而自蒙巳德則不以此冒彼也若以此冒彼安得不失其性哉冒莫報反崔云覆也古之人在混芒之中與一世而得澹漠焉當是時也隂陽和靜神不擾四時得節萬物不傷羣生不夭人雖有知無所用之任其自然而巳混胡本反芒莫剛反崔云混混芒芒未分時也徒暫反此之謂至一當是時也莫之爲而常自然物皆自然故至一也逮德下衰夫德之所以下衰者由聖人不維世則在上者不能無爲而羡無爲之迹故致斯弊也及燧人伏戲始爲天下是故順而不一世已失一或不可解故釋而不推順之而已燧音遂德又下衰及神農黃帝始爲天下是故安而不順安之於其所安而巳德又下衰及唐虞始爲天下興治化之流淳散朴聖人無心任世之自成成之淳薄皆非聖也聖能任世之自得耳豈能使世得聖哉故皇王之迹與世俱遷而聖人之道未始不全也古堯反本亦作澆淳本亦作醇音純離道以善善者過於適之稱故有善而道不全稱尺證反險德以行行者違性而行之故行立而德不夷然後去性而從於心以心自役則性去也心與心識彼我之心競爲先識無復任性也心與心識如字衆本悉同向本作職云彼我之心競爲先職矣郭注旣與向同則亦當作職也知而不足以定天下忘知任性斯乃定也然後附之以文益之以博文滅質博溺心文博者心質之飾也溺乃歷反郭音奴學反然後民始惑亂無以反其性情而復其初初謂性命之本由是觀之世喪道矣道喪世矣世與道交相喪也夫道以不貴故能存世然世存則貴之貴之道斯喪矣道不能使世不貴而世亦不能不貴於道故交相喪也喪息浪反下及注皆同道之人何由興乎世世亦何由興乎道哉若不貴乃交相興也道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣今所以不隱由其有情以興也何由而興由無貴也隱故不自隱若夫自隱而用物則道世交相興矣何隱之有哉古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也莫知反一以息迹而逐迹以求一愈得迹愈失一斯大謬矣雖復起身以明之開言以出之顯知以發之何由而交興哉祗所以交喪也見音賢遍反祗音支當時命而大行乎天下此澹漠之時也則反一無迹反任物性而物性自一故無迹不當時命而大窮乎天下此不能澹漠之時也則深根寧極而待雖有事之世而聖人未始不漠也故深根寧極而待其自爲耳斯道之所以不喪也此存身之道也未有身存而世不興者也古之存身者喪已, HFL: ''}
