  - {type: variant, offset: 9101, length: 927, content: 直解也咶食反嗅崔云齅許救反狂酲音呈李云狂如酲也病酒曰酲爲之于僞反下爲之皆同宋有荆氏者冝楸柏桑其拱把而上者求狙猴之杙者斬之三圍四圍求高名之麗者斬之七圍八圍貴人冨商之家求樿傍者斬之故未終其天年而中道之夭於斧斤此材之患也有材者未能無惜也荆氏司馬云地名也一曰里名冝揪拍桑崔云荆氏之地宜此三木李云三木文木也拱恭勇反把百推反司馬云兩手曰拱一手曰把上時掌反狙七餘反猴音侯杙以職反又羊植反郭具羊反司馬作扒音八李云欲以栖戲狙猴也崔本作㧞音䟦云栁也三圍崔云圍環八尺爲一圍嚴如字又音禮司馬云小船也又屋隱也禪本亦作擅音膳傍薄剛反崔云禪傍棺也司馬云棺之全一邊者謂之禪傍故解之以牛之白顙者與豚之亢鼻者與人有痔病者不可以適河巫祝解除弃此三者必妙選騂具然後敢用解徐古賣反又佳買反注同向古邂反顙息黨反司馬云額也亢司馬云高也額折故鼻高崔云仰也痔徐直里反司馬隱創也適河司馬云謂沈人於河察也騂恤管反此皆巫祝以知之矣巫祝於此亦知不材者全所以爲不祥也此乃神人之所以爲大祥也夫全生者天下之所謂祥也巫祝以不材爲不祥而弗用也彼乃以不祥全生乃大祥也神人者無心而順物者也故天下之所謂大祥神人不逆支離䟽者頥隱於齊肩高於頂會撮指天五管在上兩髀爲脅挫鍼治繲足以餬口鼔筴播精足以食十人上徴武士則支離攘臂於其間恃其無用故不自竄匿支離䟽司馬云形體支離不全貌䟽其名也頥以之反頂如字本作項亦如字司馬云言曲頸縮也淮南曰脊管高於頂也會古外反徐古活反向音活撮子列反向徐子活反崔云會撮項推也指天司馬云會撮䯻也古者髻在項中脊曲頭低故髻指天也向云兩肩竦而上會撮然也管崔本作筦在上李云管腧也五藏之腧皆在上也髀本又作脾同音陛徐又甫婢反崔云僂人腹在髀裏也脅許劫反司馬云脊曲髀腎故與肩並也挫徐子臥反郭租禾反崔云案也鍼執金反司馬云挫鍼縫衣也繲佳賣反司馬云浣衣也向同崔作音綫餬徐音胡李云食也崔云字或作互或作䬯鼔莢革反徐又音頰司馬云鼓簸也小箕也筴崔云鼓筴揲鑚也播精如字一音所字則當作數精司馬云簡米曰精崔云播精卦占兆也鼔筴播精言賣食音嗣攘如羊反臂于其間如字司馬云間裏也崔本作攘臂於其開云開門中也匿女力反上有大役則支離以有常疾不受功不任作役故上與病者粟則受三鍾與十束薪役則不與賜則受之三鍾司馬云斛斛四斗曰鍾與音豫夫支離其形者猶足以養其身終其天年又況支離其, ZTDZ: ''}
