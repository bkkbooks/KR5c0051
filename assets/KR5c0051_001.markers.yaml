  - {type: variant, offset: 22289, length: 2, content: 夫任, ZTDZ: 往見之曰我聞吾子達於至道敢問至道之精吾欲取天地之精以佐五穀以養民人吾又欲官陰陽以遂群生爲之奈何廣成子曰而所欲問者物之質也而所欲官者物之殘也}
  - {type: variant, offset: 22292, length: 7, content: 然故作四行注攖, ZTDZ: 而治}
