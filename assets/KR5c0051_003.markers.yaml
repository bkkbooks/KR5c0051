  - {type: punctuation, offset: 11382, content: (, id: KR5c0051_krp_003-bkkpn1271}
  - {type: variant, offset: 11382, length: 0, content: '', ZTDZ: 喪者吾又悲夫悲人之悲者其後而日遠矣仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言已曰丘也聞不言之言矣未之嘗言於此乎言之市南宜僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵丘願有喙三尺彼之謂不道之道此之謂不言之辯故德總乎道之所一而言休乎知之所不知至矣道之所一者德不能同也知之所不能知者辯不能舉也名若儒墨而凶矣故海不辭東流大之至也聖人並包天地澤及天下而不知其誰氏是故生無爵死無謚實不聚名不立此之謂大人狗不以善吠}
