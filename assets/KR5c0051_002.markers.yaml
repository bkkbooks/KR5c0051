  - {type: substitution, offset: 286, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 287, length: 1, content: 惡, ZTDZ: 忘己忘己之人是之謂入於天蔣閶葂見季徹曰魯君謂葂也曰請受教辭不獲命旣已告矣未知中否請嘗薦之吾謂魯君曰必服恭儉拔出公忠之屬而}
  - {type: 'kr:newline', offset: 288, content: '

      ', id: KR5c0051_krp_002-bkkkrnewl13}
  - {type: line-break, offset: 288, content: '', id: KR5c0051_SBCK_002-1b05}
  - {type: variant, offset: 289, length: 4, content: 近刑善惡, ZTDZ: 阿私民孰不敢輯季徹局局然笑曰若夫子之言於帝王之德猶螳蜋之怒臂以當車轍則必不勝任矣且若是則其自爲處危其觀臺多物將往投迹者衆蔣閶葂覤覤然驚曰葂也汒若於夫子之所言矣雖然願先生之言其風也季徹曰大聖之治天下也摇蕩民心使之成教易俗舉滅其賊心}
  - {type: punctuation, offset: 291, content: (, id: KR5c0051_krp_002-bkkpn37}
  - {type: 'kr:non-cjk', offset: 291, content: ⬤, id: KR5c0051_krp_002-bkkkrnonc7}
  - {type: voice, offset: 291, length: 47, name: note, id: n6}
  - {type: variant, offset: 294, length: 5, content: 居中任萬物, ZTDZ: 皆進其獨志若性}
  - {type: substitution, offset: 301, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 302, length: 1, content: 悶, ZTDZ: 而民不知其所由}
  - {type: punctuation, offset: 304, content: /, id: KR5c0051_krp_002-bkkpn38}
  - {type: variant, offset: 304, length: 3, content: 與至當, ZTDZ: 若然者豈兄堯舜之教民溟涬然弟之哉欲同乎德而心居矣子貢南遊於楚反於晋過漢陰見一丈人方將}
  - {type: substitution, offset: 307, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 308, length: 0, content: '', ZTDZ: 圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此}
  - {type: variant, offset: 309, length: 0, content: '', ZTDZ: 日浸百畦用力甚寡而見功多夫子不欲乎爲圃者仰而視之曰奈何曰鑿木爲機後重前輕挈水若抽數如泆湯其名爲橰爲圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不爲也子貢瞞然慚俯而不對有間爲圃者曰子奚爲者邪曰孔丘之徒也爲圃者曰子非夫博學以擬聖於于以蓋衆獨弦哀歌以賣名聲於天下者乎汝方將忘汝神氣墮汝形骸而庶幾乎而身之不能治而何暇治天下乎子往矣無乏吾事子貢卑陬失色頊頊然不自得行三十里而後俞其弟子曰向之人何爲者邪夫子何}
  - {type: page-break, offset: 309, content: '', id: KR5c0051_SJB_002-110588a}
  - {type: variant, offset: 310, length: 13, content: 刑名逺已而全理在身也近附近, ZTDZ: 見}
