  - {type: variant, offset: 649, length: 137, content: 五藏之情直自多方耳而少者橫復尚之以至僻而失至當於體中也僻本又作辟匹亦反徐敷赤反註及篇未同於仁義之行下孟反崔云駢枝贅疣雖非性之正亦出於形不可去也五藏之情雖非道德之正亦列於性不可治也今設仁義之教以治五藏之情猶削駢枝贅疣也旣傷自然之理更益其疾也復扶又反徐篇末注皆同當丁浪反後皆放此, HFL: ''}
  - {type: variant, offset: 649, length: 2, content: 五藏, ZTDZ: 噫其非至知厚德}
  - {type: variant, offset: 652, length: 5, content: 情直自多方, ZTDZ: 任與覆墜而不反火馳而不顧雖相與爲君臣時也易世而無以相賤故曰至人不留行焉夫尊古而卑今學者之流也且以狶韋氏之流觀今之世夫孰能不波唯至人乃能遊於世而不僻順人而不失已彼教不學承意不彼目徹爲明}
