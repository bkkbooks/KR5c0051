  - {type: punctuation, offset: 9710, content: (, id: KR5c0051_krp_003-bkkpn1086}
  - {type: variant, offset: 9710, length: 59, content: 皆自爾耳亦無愛爲於其間也安所其仁義噫徐音醫李云歎聲也崔云辭也本亦作意音同又如字謂呼意而名也爲于僞反注同子兮反司馬云碎也, HFL: ''}
  - {type: variant, offset: 9711, length: 1113, content: 自爾耳亦無愛爲於其間也安所其仁義噫徐音醫李云歎聲也崔云辭也本亦作意音同又如字謂呼意而名也爲于僞反注同子兮反司馬云碎也長於上古而不爲老日新也長丁丈反覆載天地刻彫衆形而不爲巧自然故非巧也此所遊已遊於不爲而師於無師也顔回曰回益矣以損之爲益也仲尼曰何謂也曰回忘仁義矣曰可矣猶未也仁者兼愛之迹義者成物之功愛之非仁仁迹行焉成之非義義功見焉存夫仁義不足以知愛利之由無心故忘之可也但忘功迹故猶未玄逹見賢遍反下文同它日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也禮者形體之用樂者樂生之具忘其具未若忘其所以具也它日崔本作異旦下亦然復扶又反下同樂音洛又音嶽它日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹵然曰何謂坐忘顔回曰墮枝體黜聦明離形去知同於大通此謂坐忘夫坐忘者奚所不忘哉旣其迹又忘其所以迹者內不覺其一身外不識有天地然後曠然與變化爲體而無不通也蹵然子六反崔云變色貌墮許規反徐又待果反去起吕反知音智坐崔云端坐而仲尼曰同則無好也無物不同則未嘗不適朱嘗不適何好何惡哉好呼報反注同惡烏路反化則無常也同於化者唯化所適故無常也而果其賢乎丘也請從而後也子輿與子桑友而霖十日子輿曰子桑殆病矣裹飯而往食之此二人相爲於無相爲者也今裹飯而相食者乃任之天理而自爾非相爲而後往也霖本又作淋音林左傳云三日以往爲霖裹音果食音嗣注同至子桑之門則若歌若哭鼔琴曰父邪母邪天乎人乎有不任其聲而趨舉其詩焉子輿入曰子之歌詩何故若是嫌其有情所以趨出逺理有不任音壬其聲而趨七佳反舉其詩焉崔云不任其聲憊也趨舉其詩無音曲也曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其爲之者而不得也然而至此極者命也夫言物皆自然無爲之者也莊子內篇應帝王第七夫無心而任乎自化者應爲帝王也音義曰崔云行不言之教使天下自以爲牛馬應爲帝王者也齧缺問於王倪四問而四不知齧缺因躍而大喜行以告蒲衣子蒲衣子曰而乃今知之乎有虞氏不及泰氏夫有虞氏之與泰氏皆世事之迹耳非所以迹也所以迹者無迹也世孰名之哉未之甞名何勝之有邪然無迹者乗羣變履萬世世有夷險故迹有不及也齧五結反缺丘恱反倪五兮反四問而四不知向云事在齊物論中蒲衣子尸子云蒲衣八歲舜讓以天下崔云即衣王倪之師也淮南子曰齧缺問道於衣泰氏司馬云上古帝王也崔云帝王也李云大庭氏又云無名之君也有虞氏其猶藏仁以要人亦得人矣而未始出於非人夫以所好爲是人所惡爲非人者唯以是非爲域者也夫能出於非人之域者必入於無非人之竟矣故無得無失無可無不可豈直藏仁而要人也藏仁才剛反崔云懷仁心以結人也本亦作藏作剛反善也簡文云要一遥反註同好呼報反惡烏路反之竟音境泰氏其卧徐徐其覺于于一以已爲馬一以巳爲牛夫如是又奚是人非人之有哉斯可謂出於非人之域徐徐如字崔本作祛祛覺古孝反于于如字司馬云徐徐安穩貌于于, ZTDZ: 迷}
