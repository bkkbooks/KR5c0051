front:
  text: 雜篇外物第二十六外物不可必故龍逄誅比干戮箕子狂惡來死桀紂亡人生莫不欲其臣之忠而忠未必信故伍員流于江萇弘死于蜀藏其血三年而化爲碧人親莫不欲其子之孝而孝未必愛故孝己憂而曾參悲木與木相摩則然金與火相守則流陰陽錯行則天地大絯於是乎有雷有霆水中有火乃焚大槐有甚憂兩陷而無所逃螴蜳不得成心若縣於天地之間慰暋沈屯利害相摩生火甚多衆人焚和月固不勝火於是乎有僓然而道盡莊子家貧故往貸粟於監河侯監河侯曰諾我將得邑金將貸子三百金可乎莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何爲者邪對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我且南遊吴越之王激西江之水而迎子可乎鮒魚忿然作色曰吾失我常與我無所處吾得斗升之水然活耳君乃言此曾不如早索我於枯魚之肆任公子爲大鉤巨緇五十犗以爲餌蹲乎會稽投竿東海旦旦而釣期年不得魚已而大魚食之牽巨鉤錎没而下驚揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而腊之自制河以東蒼梧已北莫不厭若魚者已而後世輇才諷說之徒皆驚而相告也夫揭竿累趨灌瀆守鯤鮒其於得大魚難矣飾小說以干縣令其於大達亦遠矣是以未嘗聞任氏之風俗其不可與經於世亦遠矣儒以詩禮發冢大儒臚傳曰東方作矣事之何若小儒曰未解裙襦口中有珠詩固有之曰青青之麥生於陵陂生不布施死何舍珠爲接其鬢擪其顪儒以金椎控其頤徐别其頰無傷口中珠老萊子之弟子出薪遇仲尼反以告曰有人於彼脩上而趨下末僂而後耳視若營四海不知其誰氏之子老萊子曰是丘也召而來仲尼至曰丘去汝躬矜與汝容知斯爲君子矣仲尼揖而退蹙然改容而問曰業可得進乎老萊子曰夫不忍一世之傷而驁萬世之患抑固窶邪亡其略弗及邪惠以歡爲驁終身之醜中民之行進焉耳相引以名相結以隱與其譽堯而非桀不如兩忘而閉其所譽反無非傷也動無非邪也聖人躊躇以與事以每成功柰何哉其載焉終矜爾宋元君夜半而夢人被髮闚阿門曰予自宰路之淵予爲清江使河伯之所漁者余且得予元君覺使人占之曰此神龜也君曰魚者有余且乎左右曰有君曰令余且會朝明日余且朝君曰漁何得對曰且之網得白龜焉其圓五尺吾曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑽而無遺筴仲尼曰神龜能見夢於元君而不能避余且之網知能七十二鑽而無遺筴不能避刳腸之患如是則知有所困神有所不及也雖有至知萬人謀之魚不畏網而畏鵜鶘去小知而大知明去善而自善矣嬰兒生無石師而能言與能言者處也惠子謂莊子曰子言無用莊子曰知無用而始可與言用矣天地非不廣且大也人之所用容足耳然則厠足而墊之致黄泉人尚有用乎惠子曰無用莊子曰然則無用之爲用也亦明矣莊子曰人有能遊且得不遊乎人而不能遊且得遊乎夫流遁之志决絶之行噫其非至知厚德之任與覆墜而不反火馳而不顧雖相與爲君臣時也易世而無以相賤故曰至人不留行焉夫尊古而卑今學者之流也且以狶韋氏之流觀今之世夫孰能不波唯至人乃能遊於世而不僻順人而不失已彼教不學承意不彼目徹爲明耳徹爲聰鼻徹爲顫口徹爲甘心徹爲知知徹爲德凡道不欲壅壅則哽哽而不止則畛畛則衆害生物之有知者恃息其不殷非天之罪天之穿之日夜無降人則顧塞其寳胞有重閬心有天遊室無空虚則婦姑勃磎心無天遊則六鑿相攘大林丘山之善於人也亦神者不勝德溢乎名名溢乎暴謀稽乎誸知出乎爭柴生乎守官事果乎衆宜春雨日時草木怒生銚鎒於是乎始修草木之到植者過半而不知其然靜然可以補病眥𡟬可以休老寧可以止遽雖然若是勞者之務也非佚者之所未嘗過而問焉聖人之所以駴天下神人未嘗過而問焉賢人所以駴世聖人未嘗過而問焉君子所以駴國賢人未嘗過而問焉小人所以合時君子未嘗過而問焉演門有親死者以善毁爵爲官師其黨人毁而死者半堯與許由天下許由逃之湯與務光務光怒之紀他聞之帥弟子而踆於窾水諸侯吊之三年申徒狄因以踣河筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言吾安得夫忘言之人而與之言哉
