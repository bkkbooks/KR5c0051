front:
  text: 南華眞經卷之五貞六
  hash: sha256:ec258583ac7e300030b1853690c8e96f07b17d322fab4562445120639b21f19c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0051_SJB_004-110617c}
body:
  text: 雜篇外物第二十六外物不可必故龍逄誅比干戮箕子狂惡來死桀紂亡人生莫不欲其臣之忠而忠未必信故伍員流于江萇弘死于蜀藏其血三年而化爲碧人親莫不欲其子之孝而孝未必愛故孝己憂而曾參悲木與木相摩則然金與火相守則流陰陽錯行則天地大絯於是乎有雷有霆水中有火乃焚大槐有甚憂兩陷而無所逃螴蜳不得成心若縣於天地之間慰暋沈屯利害相摩生火甚多衆人焚和月固不勝火於是乎有僓然而道盡莊子家貧故往貸粟於監河侯監河侯曰諾我將得邑金將貸子三百金可乎莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何爲者邪對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我且南遊吴越之王激西江之水而迎子可乎鮒魚忿然作色曰吾失我常與我無所處吾得斗升之水然活耳君乃言此曾不如早索我於枯魚之肆任公子爲大鉤巨緇五十犗以爲餌蹲乎會稽投竿東海旦旦而釣期年不得魚已而大魚食之牽巨鉤錎没而下驚揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而腊之自制河以東蒼梧已北莫不厭若魚者已而後世輇才諷說之徒皆驚而相告也夫揭竿累趨灌瀆守鯤鮒其於得大魚難矣飾小說以干縣令其於大達亦遠矣是以未嘗聞任氏之風俗其不可與經於世亦遠矣儒以詩禮發冢大儒臚傳曰東方作矣事之何若小儒曰未解裙襦口中有珠詩固有之曰青青之麥生於陵陂生不布施死何舍珠爲接其鬢擪其顪儒以金椎控其頤徐别其頰無傷口中珠老萊子之弟子出薪遇仲尼反以告曰有人於彼脩上而趨下末僂而後耳視若營四海不知其誰氏之子老萊子曰是丘也召而來仲尼至曰丘去汝躬矜與汝容知斯爲君子矣仲尼揖而退蹙然改容而問曰業可得進乎老萊子曰夫不忍一世之傷而驁萬世之患抑固窶邪亡其略弗及邪惠以歡爲驁終身之醜中民之行進焉耳相引以名相結以隱與其譽堯而非桀不如兩忘而閉其所譽反無非傷也動無非邪也聖人躊躇以與事以每成功柰何哉其載焉終矜爾宋元君夜半而夢人被髮闚阿門曰予自宰路之淵予爲清江使河伯之所漁者余且得予元君覺使人占之曰此神龜也君曰魚者有余且乎左右曰有君曰令余且會朝明日余且朝君曰漁何得對曰且之網得白龜焉其圓五尺吾曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑽而無遺筴仲尼曰神龜能見夢於元君而不能避余且之網知能七十二鑽而無遺筴不能避刳腸之患如是則知有所困神有所不及也雖有至知萬人謀之魚不畏網而畏鵜鶘去小知而大知明去善而自善矣嬰兒生無石師而能言與能言者處也惠子謂莊子曰子言無用莊子曰知無用而始可與言用矣天地非不廣且大也人之所用容足耳然則厠足而墊之致黄泉人尚有用乎惠子曰無用莊子曰然則無用之爲用也亦明矣莊子曰人有能遊且得不遊乎人而不能遊且得遊乎夫流遁之志决絶之行噫其非至知厚德之任與覆墜而不反火馳而不顧雖相與爲君臣時也易世而無以相賤故曰至人不留行焉夫尊古而卑今學者之流也且以狶韋氏之流觀今之世夫孰能不波唯至人乃能遊於世而不僻順人而不失已彼教不學承意不彼目徹爲明耳徹爲聰鼻徹爲顫口徹爲甘心徹爲知知徹爲德凡道不欲壅壅則哽哽而不止則畛畛則衆害生物之有知者恃息其不殷非天之罪天之穿之日夜無降人則顧塞其寳胞有重閬心有天遊室無空虚則婦姑勃磎心無天遊則六鑿相攘大林丘山之善於人也亦神者不勝德溢乎名名溢乎暴謀稽乎誸知出乎爭柴生乎守官事果乎衆宜春雨日時草木怒生銚鎒於是乎始修草木之到植者過半而不知其然靜然可以補病眥𡟬可以休老寧可以止遽雖然若是勞者之務也非佚者之所未嘗過而問焉聖人之所以駴天下神人未嘗過而問焉賢人所以駴世聖人未嘗過而問焉君子所以駴國賢人未嘗過而問焉小人所以合時君子未嘗過而問焉演門有親死者以善毁爵爲官師其黨人毁而死者半堯與許由天下許由逃之湯與務光務光怒之紀他聞之帥弟子而踆於窾水諸侯吊之三年申徒狄因以踣河筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言吾安得夫忘言之人而與之言哉雜篇寓言第二十七寓言十九重言十七巵言日出和以天倪寓言十九藉外論之親父不爲其子媒親父譽之不若非其父者也非吾罪也人之罪也與己同則應不與己同則反同於己爲是之異於己爲非之重言十七所以已言也是爲耆艾年先矣而無經緯本末以期年耆者是非先也人而無以先人無人道也人而無人道是之謂陳人卮言日出和以天倪因以曼衍所以窮年不言則齊齊與言不齊言與齊不齊也故曰無言言無言終身言未嘗言終身不言未嘗不言有自也而可有自也而不可有自也而然有自也而不然惡乎然然於然惡乎不然不然於不然惡乎可可於可惡乎不可不可於不可物固有所然物固有所可無物不然無物不可非巵言日出和以天倪孰得其乆萬物皆種也以不同形相禪始卒若環莫得其倫是謂天均天均者天倪也莊子謂惠子曰孔子行年六十而六十化始時所是卒而非之未知今之所謂是之非五十九非也惠子曰孔子勤志服知也莊子曰孔子謝之矣而其未之嘗言孔子云夫受才乎大本復靈以生鳴而當律言而當法利義陳乎前而好惡是非直服人之口而已矣使人乃以心服而不敢蘁立定天下之定已乎已乎吾且不得及彼乎曾子再仕而心再化曰吾及親仕三釜而心樂後仕三千鍾不洎吾心悲弟子問于仲尼曰若參者可謂無所縣其罪乎曰旣已縣矣夫無所縣者可以有哀乎彼視三釜三千鍾如觀雀蚊虻相過乎前也顔成子游謂東郭子綦曰自吾聞子之言一年而野二年而從三年而通四年而物五年而來六年而鬼入七年而天成八年而不知死不知生九年而大妙生有爲死也勸公以其死也有自也而生陽也無自也而果然乎惡乎其所適惡乎其所不適天有歷數地有人據吾惡乎求之莫知其所終若之何其無命也莫知其所始若之何其有命也有以相應也若之何其無鬼邪無以相應也若之何其有鬼邪衆罔兩問於影曰若向也俯而今也仰向也括而今也被髮向也坐而今也起向也行而今也止何也影曰叟叟也奚稍問也予有而不知其所以予蜩甲也蛇蜕也似之而非也火與日吾屯也陰與夜吾代也彼吾所以有待邪而況乎以有待者乎彼來則我與之來彼往則我與之往彼彊陽則我與之彊陽彊陽者又何以有問乎陽子居南之沛老聃西遊於秦邀於郊至於梁而遇老子老子中道仰天而歎曰始以汝爲可教今不可也陽子居不荅至舍進盥潄巾櫛脱履户外膝行而前曰向者弟子欲請夫子夫子行不間是以不敢今間矣請問其過老子曰而睢睢盱盱而誰與居大白若辱盛德若不足陽子居蹴然變容曰敬聞命矣其往也舍者迎將其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣雜篇讓王第二十八堯以天下讓許由許由不受又讓於子州支父子州支父曰以我爲天子猶之可也雖然我適有幽憂之病方且治之未暇治天下也夫天下至重也而不以害其生又況他物乎唯無以天下爲者可以託天下也舜讓天下於子州支伯子州支伯曰予適有幽憂之病方且治之未暇治天下也故天下大器也而不以易生此有道者之所以異乎俗者也舜以天下讓善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種形足以勞動秋收斂身足以休食日出而作日入而息逍遥於天地之間而心意自得吾何以天下爲哉悲夫子之不知余也遂不受於是去而入深山莫知其處舜以天下讓其友石户之農石户之農曰捲捲乎后之爲人葆力之士也以舜之德爲未至也於是夫負妻戴携子以入海終身不反也大王亶父居邠狄人攻之事之以皮帛而不受事之以大馬而不受事之以珠玉而不受狄人之所求者土地也大王亶父曰與人之兄居而殺其弟與人之父居而殺其子吾不忍也子皆勉居矣爲吾臣與爲狄人臣奚以異且吾聞之不以所用養害所養因杖筴而去之民相連而從之遂成國於岐山之下夫大王亶父可謂能尊生矣能尊生者雖貴富不以養傷身雖貧賤不以利累形今世之人居高官尊爵者皆重失之見利輕亡其身豈不惑哉越人三世弑其君王子搜患之逃乎丹穴而越國無君求王子搜不得從之丹穴王子搜不肯出越人薰之以艾乘以玉輿王子搜援綏登車仰天而呼曰君乎君乎獨不可以舍我乎王子搜非惡爲君也惡爲君之患也若王子搜者可謂不以國傷生矣此固越人之所欲得爲君也韓魏相與爭侵地子華子見昭僖侯昭僖侯有憂色子華子曰今使天下書銘於君之前書之言曰左手攫之則右手廢右手攫之則左手廢然而攫之者必有天下君能攫之乎昭僖侯曰寡人不攫也子華子曰甚善自是觀之兩臂重於天下也身亦重於兩臂韓之輕於天下亦遠矣今之所爭者其輕於韓又遠君固愁身傷生以憂戚不得也僖侯曰善哉教寡人者衆矣未嘗得聞此言也子華子可謂知輕重矣魯君聞顔闔得道之人也使人以幣先焉顔闔守陋閶直布之衣而自飯牛魯君之使者至顔闔自對之使者曰此顔闔之家與顔闔對曰此闔之家也使者致幣顔闔對曰恐聽者謬而遺使者罪不若審之使者還反審之復來求之則不得已故若顔闔者眞惡富貴也故曰道之眞以治身其緒餘以爲國家其土苴以治天下由此觀之帝王之功聖人之餘事也非所以完身養生也今世俗之君子多危身棄生以殉物豈不悲哉凡聖人之動作也必察其所以之與其所以爲今且有人於此以隨使之珠彈千仞之雀世必笑之是何也則其所用者重而所要者輕也夫生者豈特隨侯之重哉子列子窮容貌有飢色客有言之於鄭子陽者曰列御寇蓋有道之士也居君之國而窮君無乃爲不好士乎鄭子陽即令官遺之粟子列子見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞爲有道者之妻子皆得佚樂今有飢色君過而遺先生食先生不受豈不命邪子列子笑謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽楚昭王失國屠羊說走而從於昭王昭王反國將賞從者及屠羊說屠羊說曰大王失國說失屠羊大王反國說亦反屠羊臣之爵禄已復矣又何賞之有王曰强之屠羊說曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見之屠羊說曰楚國之法必有重賞大功而後得見今臣之知不足以存國而勇不足以死寇吴軍入郢說畏難而避寇非故隨大王也今大王欲廢法毁約而見說此非臣之所以聞於天下也王謂司馬子綦曰屠羊說居處卑賤而陳義甚高子其爲我延之以三旌之位屠羊說曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之禄吾知其富於屠羊之利也然豈可以貪爵禄而使吾君有妄施之名乎說不敢當願復反吾屠羊之肆遂不受也原憲居魯環堵之室茨以生草蓬户不完桑以爲樞而甕牖二室褐以爲塞上漏下濕匡坐而弦子貢乘大馬中紺而表素軒車不容巷往見原憲原憲華冠縱履杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色原憲笑曰夫希世而行比周而友學以爲人教以爲己仁義之慝輿馬之飾憲不忍爲也曾子居於衛緼袍無表顔色腫噲手足胼胝三日不舉火十年不製衣正冠而纓絶捉衿而肘見納履而踵决曳縱而歌商頌聲若出金石天子不得臣諸侯不得友故養志者忘形養形者忘利致道者忘心矣孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畒足以給飦粥郭内之田十畝足以爲絲麻鼓琴足以自娛所學夫子之道足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自累也審自得者失之而不懼行修於内者無位而不怍丘誦之乆矣今於回而後見之是丘之得也中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下柰何瞻子曰重生重生則利輕中山公子牟曰雖知之未能自胜也瞻子曰不能自勝則從神無惡乎不能自勝而强不從者此之謂重傷重傷之人無壽類矣魏牟萬乘之公子也其隱巖穴也難爲於布衣之士雖未至乎道可謂有其意矣孔子窮於陳蔡之間七日不火食藜羹不糝顔色甚憊而弦歌於室顔回擇菜子路子貢相與言曰夫子再逐於魯削迹於衛伐樹於宋窮於商周圍於陳蔡殺夫子者無罪藉夫子者無禁弦歌鼓琴未嘗絶音君子之無恥也若此乎顔回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而來吾語之子路子貢入子路曰如此者可謂窮矣孔子曰是何言也君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之爲故自省而不窮於道臨難而不失其德天寒旣至霜雪旣降吾是以知松栢之茂也陳蔡之隘於丘其幸乎孔子削然反琴而弦歌子路扢然執干而舞子貢曰吾不知天之高也地之下也古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通爲寒暑風雨之序矣故許由娛於潁陽而共伯得乎丘首舜以天下讓其友北人無擇北人無擇曰異哉后之爲人也居於畎畝之中而遊堯之門不若是而已又欲以其辱行漫我吾羞見之因自投清冷之淵湯將伐桀因卞隨而謀卞隨曰非吾事也湯曰孰可曰吾不知也湯又因務光而謀務光曰非吾事也湯曰孰可曰吾不知也湯曰伊尹何如曰强力忍垢吾不知其他也湯遂與伊尹謀伐桀尅之以讓卞隨卞隨辭曰后之伐桀也謀乎我必以我爲賊也勝桀而讓我必我爲貪也吾生乎亂世而無道之人再來漫我以其辱行吾不忍數聞也乃自投稠水而死湯又讓務光曰知者謀之武者遂之仁者居之古之道也吾子胡不立乎務光辭曰廢上非義也殺民非仁也人犯其難我享其利非廉也吾聞之曰非其義者不受其禄無道之世不踐其土況尊我乎吾不忍乆見也乃負石而自沈於廬水昔周之興有士二人處於孤竹曰伯夷叔齊二人相謂曰吾聞西方有人似有道者試往觀焉至於岐陽武王聞之使叔旦往見之與盟曰加富二等就官一列血牲而埋之二人相視而笑曰嘻異哉此非吾所謂道也昔者神農之有天下也時祀盡敬而不祈喜其於人也忠信盡治而無求焉樂與政爲政樂與治爲治不以人之壤自成也不以人之卑自高也不以遭峙自利也今周見殷之亂而遽爲政上謀而下行貨阻兵而保威割牲而盟以爲信揚行以悅衆殺伐以要利是推亂以易暴也吾聞古之士遭治世不避其任遇亂世不爲荀存今天下闇周德衰其並乎周以塗吾身也不如避之以絜吾行二子北至於首陽之山遂餓而死焉若伯夷叔齊者其於富貴也荀可得已則必不賴高節戾行獨樂其志不事於世此二士之節也雜篇盜跖第二十九孔子與柳下季爲友柳下季之弟名曰盜跖盜跖從卒九千人橫行天下侵暴諸侯穴室樞户驅人牛馬取人婦女貪得忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之孔子謂柳下季曰夫爲人父者必能詔其子爲人兄者必能教其弟若父不能詔其子兄不能教其弟則無貴父子兄弟之親矣今先生世之才士也弟爲盜跖爲天下害而弗能教也丘竊爲先生羞之丘請爲先生往說之柳下季曰先生言爲人父者必能詔其子爲人兄者必能教其弟若子不聽父之詔弟不受兄之教雖今先生之辯將柰之何哉且跖之爲人也心如湧泉意如飄風强足以距敵辯足以飾非順其心則喜逆其心則怒易辱人以言先生必無往孔子不聽顔回爲馭子貢爲右往見盜跖盜跖乃方休卒徒太山之陽膾人肝而餔之孔子下車而前見謁者曰魯人孔丘聞將軍高義敬再拜謁者謁者入通盜跖聞之大怒目如明星髮上指冠曰此夫魯國之巧僞人孔丘非邪爲我告之爾作言造語妄稱文武冠枝木之冠帶死牛之脅多辭謬說不耕而食不織而衣摇脣鼓舌擅生是非以迷天下之主使天下學士不反其本妄作孝悌而徼倖於封侯富貴者也子之罪大極重疾走歸不然我將以子肝益晝餔之膳孔子復通曰丘得幸於季願望履幕下謁者復通盜跖曰使來前孔子趨而進避席反走再拜盜跖盜跖大怒兩展其足案劍瞋目聲如乳虎曰丘來前若所言順吾意則生逆吾心則死孔子曰丘聞之凡天下有三德生而長大美好無雙少長貴賤見而皆悦之此上德也知維天地能辯諸物此中德也勇悍果敢聚衆率兵此下德也凡人有此一德者足以南面稱孤矣今將軍兼此三者身長八尺二寸面目有光唇如激丹齒如齊貝音中黄鍾而名曰盜跖丘竊爲將軍恥不取焉將軍有意聽臣臣請南使吴越北使齊魯東使宋衛西使晋楚使爲將軍造大城數百里立數十萬户之邑尊將軍爲諸侯與天下更始罷兵休卒收養昆弟共祭先祖此聖人才士之行而天下之願也盜跖大怒曰丘來前夫可規以利而可諫以言者皆愚陋恒民之謂耳今長大美好人見而悦之者此吾父母之遺德也丘雖不吾譽吾獨不自知邪且吾聞之好面譽人者亦好背而毁之今丘告我以大城衆民是於規我以利而恒民畜我也安可乆長也城之大者莫大乎天下矣堯舜有天下子孫無置錐之地湯武立爲天子而後世絶滅非以其利大故邪且吾聞之古者禽獸多而人民少於是民皆巢居以避之晝拾橡栗暮栖木上故命之曰有巢氏之民古者民不知衣服夏多積薪冬則煬之故命之曰知生之民神農之世卧則居居起則于于民知其母不知其父與麋鹿共處耕而食織而衣無有相害之心此至德之隆也然而黄帝不能致德與蚩尤戰於涿鹿之野流血百里堯舜作立群臣湯放其主武王殺紂自是之後以强凌弱以衆暴寡湯武以來皆亂人之徒也今子修文武之道掌天下之辯以教後世縫衣淺帶矯言僞行以迷惑天下之主而欲求富貴焉盜莫大於子天下何故不謂子爲盜丘而乃謂我爲盜跖子以甘辭說子路而使從之使子路去其危冠解其長劍而受教於子天下皆曰孔丘能止暴禁非其卒之也子路欲殺衛君而事不成身菹於衛東門之上是子教之不至也子自謂才士聖人邪則再逐於魯削跡於衛窮於齊圍於陳蔡不容身於天下子教子路菹此患上無以爲身下無以爲人子之道豈足貴邪世之所高莫若黄帝黄帝尚不能全德而戰涿鹿之野流血百里堯不慈舜不孝禹偏枯湯放其主武王伐紂文王拘姜里此六子者世之所高也孰論之皆以利惑其眞而强反其情性其行乃甚可羞也世之所謂賢士伯夷叔齊伯夷叔齊辭孤竹之君而餓死於首陽之山骨肉不葬鮑焦飾行非世抱木而死申徒狄諫而不聽負石自投於河爲魚鼈所食介子推至忠也自割其股以食文公文公後背之子推怒而去抱木而燔死尾生與女子期於梁下女子不來水至不去抱梁柱而死此六子者無異於磔大流豕操瓢而乞者皆離名輕死不念本養壽命者也世之所謂忠臣者莫若王子比干伍子胥子胥沈江比干剖心此二子者世謂忠臣也然卒爲天下笑自上觀之至于子胥比干皆不足貴也丘之所以說我者若告我以鬼事則我不能知也若告我以人事者不過此矣皆吾所聞知也今吾告子以人之情目欲視色耳欲聽聲口欲察味志氣欲盈人上壽百歲中壽八十下壽六十除病瘦喪死憂患其中開口而笑者一月之中不過四五日而已矣天與地無窮人死者有時操有時之具而託於無窮之間忽然無異騏驥之馳過隙也不能悦其志意養其壽命者皆非通道者也丘之所言皆吾之所棄也亟去走歸無復言之子之道狂狂伋伋詐巧虚僞事也非可以全眞也奚足論哉孔子再拜趨走出門上車執轡三失目芒然無見色若死灰據軾低頭不能出氣歸到魯東門外適遇柳下季柳下季曰今者闕然數日不見車馬有行色得微往見跖邪孔子仰天而歎曰然柳下季曰跖得無逆汝意若前乎孔子曰然丘所謂無病而自灸也疾走料虎頭編虎須幾不免虎口哉子張問於滿荀得曰盍不爲行無行則不信不信則不任不任則不利故觀之名計之利而義眞是也若棄名利反之於心則夫士之爲行不可一日不爲乎滿荀得曰無恥者富多信者顯夫名利之大者幾在無恥而信故觀之名計之利而信眞是也若棄名利反之於心則夫士之爲行抱其天乎子張曰昔者桀紂貴爲天子富有天下今謂臧聚曰汝行如桀紂則有怍色有不服之心者小人所賤也仲尼墨翟窮爲匹夫今謂宰相曰子行如仲尼墨翟則變容易色稱不足者士誠貴也故勢爲天子未必貴也窮爲匹夫未必賤也貴賤之分在行之美惡滿苟得曰小盜者拘大盜者爲諸侯諸侯之門義士存焉昔者桓公小白殺兄入嫂而管仲爲臣田成子常殺君竊國而孔子受幣論則賤之行則下之則是言行之情悖戰於胸中也不亦拂乎故書曰孰惡孰美成者爲首不成者爲尾子張曰子不爲行即將疏戚無倫貴賤無義長幼無序五紀六位將何以爲别乎滿荀得曰堯殺長子舜流母弟疏戚有倫乎湯放桀武王殺紂貴賤有義乎王季爲適周公殺兄長幼有序乎儒者僞辭墨者兼愛五紀六位將有别乎且子正爲名我正爲利名利之實不順於埋不監於道吾日與子訟於無約曰小人殉財君子殉名其所以變其情易其性則異矣乃至於棄其所爲而殉其所不爲則一也故曰無爲小人反殉而天無爲君子從天之埋若枉若直相而天極面觀四方與時消息若是若非執而圓機獨成而意與道徘徊無轉而行無成而義將失而所爲無赴而富無殉而成將棄而天比干剖心子胥抉眼忠之禍也直躬證父尾生溺死信之患也鮑子立乾申子不自理廉之害也孔子不見母匡子不見父義之失也此上世之所傳下世之所語以爲士者正其言必其行故服其殃離其患也無足問於知和曰人卒未有不與名就利者彼富則人歸之歸則下之下則貴之夫見下貴者所以長生安體樂意之道也今子獨無意焉知不足邪意知而力不能行邪故推正不忘邪知和曰今夫此人以爲與己同時而生同郷而處者以爲夫絶俗過世之士焉是專無主正所以覽古今之時是非之分也與俗化世去至重棄至尊以爲其所爲也此其所以論長生安體樂意之道不亦遠乎慘怛之疾恬愉之安不監於體怵惕之恐欣歡之喜不監於心知爲爲而不知所以爲是以貴爲天子富有天下而不免於患也無足曰夫富之於人無所不利窮美究勢至人之所不得逮賢人之所不能及俠人之勇力而以爲威强秉人之知謀以爲明察因人之德以爲賢良非享國而嚴若君父且夫聲色滋味權勢之於人心不待學而樂之體不侍象而安之夫欲惡避就固不待師此人之性也天下雖非我孰能辭之知和曰知者之爲故動以百姓不違其度是以足而不爭無以爲故不求不足故求之爭四處而不自以爲貪有餘故辭之棄天下而不自以爲廉廉貪之實非以迫外也及監之度勢爲天子而不以貴驕人富有天下而不以財戲人計其患慮其反以爲害於性故辭而不受也非以要名譽也堯舜爲帝而雍非仁天下也不以美害生也善卷許由得帝而不受非虚辭讓也不以事害己也此皆就其利辭其害而天下稱賢焉則可以有之彼非以與名譽也無足曰必持其名苦體絶甘約養以持生則亦乆病長阨而不死者也知和曰平爲福有餘爲害者物莫不然而財其甚者也今富人耳營鐘鼓管籥之聲口嗛於芻豢醪醴之味以感其意遺忘其業可謂亂矣侅溺於馮氣若負重行而上也可謂苦矣貪財而取慰貪權而取竭靜居則溺體澤則馮可謂疾矣爲欲富就利故滿若堵耳而不知避且馮而不舍可謂辱矣財積而無用服膺而不舍滿心戚醮求益而不止可謂憂矣内則疑刦請之賊外則畏寇盜之害内周樓疏外不敢獨行可謂畏矣此六者天下之至害也皆遺忘而不知察及其患至求盡性竭財單以反一日之無故而不可得也故觀之名則不見求之利則不得繚意絶體而爭此不亦感乎雜篇說剱第三十昔趙文王喜劍劍士夾門而客三千餘人日夜相擊於前死傷者歲百餘人好之不厭如是三年國衰諸侯謀之太子悝患之募左右曰孰能說王之意止劍士者賜之千金左右曰莊子當能太子乃使人以千金奉莊子莊子弗受與使者俱往見太子曰太子何以教周賜周千金太子曰聞夫子明聖謹奉千金以幣從者夫子弗受悝尚何敢言莊子曰聞太子所欲用周者欲絶王之喜好也使臣上說大王而逆王意下不當太子則身刑而死周尚安所事金乎使臣上說大王下當太子趙國何求而不得也太子曰然吾王所見唯劍士也莊子曰諾周善爲劍太子曰然吾王所見劍士皆蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難王乃悅之今夫子必儒服而見王事必大逆莊子曰請治劍服治劍服三日乃見太子太子乃與見王王脱白刃待之莊子入殿門不趨見王不拜王曰子欲何以教寡人使太子先曰臣聞大王喜劍故以劍見王王曰子之劍何能禁制曰臣之劍十步一人千里不留行王大悦之曰天下無敵矣莊子曰夫爲劍者示之以虚開之以利後之以發先之以至願得試之王曰夫子休就舍待命令設戲請夫子王乃校劍士七日死傷者六十餘人得五六人使奉劍於殿下乃召莊子王曰今日試使士敦劍莊子曰望之乆矣王曰夫子所御杖長短何如曰臣之所奉皆可然臣有三劍唯王所用請先言而後試王曰願聞三劍曰有天子劍有諸侯劍有庶人劍王曰天子之劍何如曰天子之劍以燕谿石城爲鋒齊岱爲鍔晋魏爲脊周宋爲鐔韓魏爲鋏包以四夷裹以四時繞以渤海帶以常山制以五行論以刑德開以陰陽持以春夏行以秋冬此劍直之無前舉之無上案之無下運之無旁上决浮云下絶地紀此劍一用匡諸侯天下服矣此天子之劍也文王芒然自失曰諸侯之劍何如曰諸侯之劍以知勇士爲鋒以清廉士爲鍔以賢良士爲脊以忠勝士爲鐔以豪傑士爲鋏此劍直之亦無前舉之亦無上案之亦無下運之亦無旁上法圓天以順三光下法方地以順四時中知民意以安四鄕此劍一用如雷霆之震也四封之内無不賔服而聽從君命者矣此諸侯之劍也王曰庶人之劍何如曰庶人之劍蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難相擊於前上斬頸領下决肝肺此庶人之劍無異於鬭雞一旦命已絶矣無所用於國事今大王有天子之位而好庶人之劍臣竊爲大王薄之王乃牽而上殿宰人上食王三環之莊子曰大王安坐定氣劍事已畢奏矣於是文王不出宫三月劍士皆服斃其處也雜篇漁父第三十一孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子弦歌鼓琴奏曲未半有漁父者下船而來鬢眉交白被髮揄袂行原以上距陸而止左手據膝右手持頤以聽曲終而招子貢子路二人俱對客指孔子曰彼何爲者也子路對曰魯之君子也客問其族子路對曰族孔氏客曰孔氏者何治也子路未應子貢對曰孔氏者性服忠信身行仁義飾禮樂選人倫上以忠於世主下以化於齊民將以利天下此孔氏之所治也又問曰有土之君與子貢曰非也侯王之佐與子貢曰非也客乃笑而還行言曰仁則仁矣恐不免其身苦心勞形以危其眞嗚呼遠哉其分於道也子貢還報孔子孔子推琴而起曰其聖人與乃下求之至於澤畔方將杖挐而引其船顧見孔子還鄕而立孔子反走再拜而進客曰子將何求孔子曰曩者先生有緒言而去丘不肖未知所謂竊待於下風幸聞咳唾之音以卒相丘也客曰嘻甚矣子之好學也孔子再拜而起曰丘少而修學以至於今六十九歲矣無所得聞至教敢不虚心客曰同類相從同聲相應固天之埋也吾請釋吾之所有而經子之所以子之所以者人事也天子諸侯大夫庶人此四者自正治之美也四者離位而亂莫大焉官治其職人憂其事乃無所陵故田荒室露衣食不足徵賦不屬妻妾不和長少無序庶人之憂也能不勝任官事不治行不清白群下荒怠功美不有爵禄不持大夫之憂也廷無忠臣國家昏亂工技不巧貢職不美春秋後倫不順天子諸侯之憂也陰陽不和寒暑不時以傷庶物諸侯暴亂擅相攘伐以殘民人禮樂不節財用窮匱人倫不飾百姓淫亂天子有司之憂也今子旣上無君侯有司之勢而下無大臣職事之官而擅飾禮樂選人倫以化齊民不泰多事乎且人有八疵事有四患不可不察也非其事而事之謂之揔莫之顧而進之謂之佞希意導言謂之謟不擇是非之言謂之諛好言人之惡謂之讒析交離親謂之賊稱譽詐僞以敗惡人謂之應不擇善否兩容顔適偷拔其所欲謂之險此八疵者外以亂人内以傷身君子不友明君不臣所謂四患者好經大事變更易常以挂功名謂之叨專知擅事侵人自用謂之貪見過不更聞諫愈甚謂之狠人同於己則可不同於己雖善不善謂之矜此四患也能去八疵無行四患而始可教已孔子愀然而歎再拜而起曰丘再逐於魯削迹於衛伐樹於宋圍於陳蔡丘不知所失而離此四謗者何也客悽然變容曰甚矣子之難悟也人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影不離身自以爲尚遲疾走不休絶力而死不知處陰以休影處靜以息迹愚亦甚矣子審仁義之間察同異之際觀動靜之變適受與之度理好惡之情和喜怒之節而幾於不免矣謹修而身愼守其眞還以物與人則無所累矣今不修之身而求之人不亦外乎孔子愀然曰請問何謂眞客曰眞者精誠之至也不精不誠不能動人故彊哭者雖悲不哀彊怒者雖嚴不威彊親者雖笑不和眞悲無聲而哀眞怒未發而威眞親未笑而和眞在内者神動於外是所以貴眞也其用於人理也事親則慈孝事君則忠貞飲酒則歡樂處喪則悲哀忠貞以功爲主飲酒以樂爲主處喪以哀爲主事親以適爲主功成之美無一其迹矣事親以適不論所以矣飲酒以樂不選其具矣處喪以哀無問其禮矣禮者世俗之所爲也眞者所以受於天也自然不可易也故聖人法天貴眞不拘於俗愚者反此不能法天而恤於人不知貴眞禄禄而受變於俗故不足惜哉子之早湛於人僞而晚聞大道也孔子又再拜而起曰今者丘得遇也若天幸然先生不羞而比之服役而身教之敢問舍所在請因受業而卒學大道客曰吾聞之可與往者與之至於妙道不可與往者不知其道愼勿與之身乃無咎子勉之吾去子矣吾去子矣乃刺船而去延縁葦間顔淵還車子路授綏孔子不顧待水波定不聞拏音而後敢乘子路旁車而問曰由得爲役乆矣未嘗見夫子遇人如此其威也萬乘之主千乘之君見夫子未嘗不分庭伉禮夫子猶有倨傲之容今漁父杖拏逆立而夫子曲要磬折再拜而應得無太甚乎門人皆怪夫子矣漁父何以得此乎孔子伏軾而歎曰甚矣由之難化也湛於禮義有間矣而樸鄙之心至今未去進吾語汝夫遇長不敬失禮也見賢不尊不仁也彼非至人不能下人下人不精不得其眞故長傷身惜哉不仁之於人也禍莫大焉而由獨擅之且道者萬物之所由也庶物失之者死得之者生爲事逆之則敗順之則成故道之所在聖人尊之今漁父之於道可謂有矣吾敢不敬乎雜篇列御寇第三十二列御寇之齊中道而反遇伯昏瞀人伯昏瞀人曰奚方而反曰吾驚焉曰惡乎驚曰吾嘗食於十漿而五漿先饋伯昏瞀人曰若是則汝何爲驚已曰夫内誠不解形諜成光以外鎭人心使人輕乎貴老而𩐎其所患夫漿人特爲食羹之貨多餘之赢其爲利也薄其爲權也輕而猶若是而況於萬乘之主乎身勞於國而知盡於事彼將任我以事而效我以功吾是以驚伯昏瞀人曰善哉觀乎汝處已人將保汝矣無幾何而往則户外之履滿矣伯昏瞀人北面而立敦杖蹙之乎頤立有間不言而出賔者以告列子列子提履跣而走暨乎門曰先生旣來曾不發藥乎曰已矣吾固告汝曰人將保汝果保汝矣非汝能使人保汝而汝不能使人無保汝也而焉用之感豫出異也必且有感摇而本性又無謂也與汝遊者又莫與告也彼所小言盡人毒也莫覺莫悟何相孰也巧者勞而知者憂無能者無所求飽食而遨遊汎若不繫之舟虚而遨遊者也鄭人緩也呻吟裘氏之地祇三年而緩爲儒河潤九里澤及三族使其弟墨儒墨相與辯其父助翟十年而緩自殺其父夢之曰使而子爲墨者予也闔胡嘗視其良旣爲秋栢之實也夫造物者之報人也不報其人而報其人之天彼故使彼夫人以己爲有以異於人以賤其親齊人之井飲者相捽也故日今之世皆緩也自是有德者以不知也而況有道者乎古者謂之遁天之刑聖人安其所安不安其所不安衆人安其所不安不安其所安莊子曰知道易勿言難知而不言所以之天也知而言之所以之人也古之人天而不人朱泙漫學屠龍於支離益單千金之家三年技成而無所用其巧聖人以必不必故無兵衆人以不必必之故多兵順於兵故行有求兵恃之則亡小夫之知不離苞苴竿牘敝精神乎蹇淺而欲兼濟導物太一形虚若是者迷惑於宇宙形累不知大初彼至人者歸精神乎無始而甘暝乎無何有之郷水流乎無形發泄乎太清悲哉乎汝爲知在毫毛而不知大寧宋人有曹商者爲宋王使秦其往也得車數乘王悦之益車百乘反於宋見莊子曰夫處窮閶阨巷困窘織履槁項黄馘者商之所短也一悟萬乘之主而從車百乘者商之所長也莊子曰秦王有病召醫破癕潰痤者得車一乘舐痔者得車五乘所治愈下得車愈多子豈治其痔邪何得車之多也子行矣魯哀公問乎顔闔曰吾以仲尼爲貞幹國其有瘳乎曰殆哉圾乎仲尼方且飾羽而晝從事華辭以支爲㫖忍性以視民而不知不信受乎心宰乎神夫何足以上民彼宜汝與予頤與誤而可矣今使民離實學僞非所以視民也爲後世慮不若休之難治也施於人而不忘非天布也商賈不齒雖以事齒之神者弗齒爲外刑者金與木也爲内刑者動與過也宵人之離外刑者金木訊之離内刑者陰陽食之夫免乎外内之刑者唯眞人能之孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深情故有貌願而益有長若不肖有順儂而達有堅而縵有緩而釬故其就義若渴者其去義若熱故君子達使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色九徵至不肖人得矣正考父一命而傴再命而僂三命而俯循墻而走孰敢不軌如而夫者一命而吕鉅再命而於車上舞三命而名諸父孰協唐許賊莫大乎德有心而心有眼及其有眼也而内視内視而敗矣凶德有五中德爲首何謂中德中德也者有以自好也而吡其所不爲者也窮有八極達有三必形有六府美髯長大壯麗勇敢八者俱過人也因以是窮縁循偃俠困畏不若人三者俱通達知慧外通勇敢多怨仁義多責達生之情者傀達於知者肖達大命者隨達小命者遭人有見宋王者錫車十乘以其十乘驕穉莊子莊子曰河上有家貧恃緯蕭而食者其子没於淵得千金之珠其父謂其子曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子爲𩐎粉夫或騁於莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽而入於太廟雖欲爲孤犢其可得乎莊子將死弟子欲厚葬之莊子曰吾以天地爲棺槨以曰月爲連璧星辰爲珠璣萬物爲齎送吾葬具豈不備邪何以加此弟子曰吾恐烏鳶之食夫子也莊子曰在天爲烏鳶食在下爲螻蟻食奪彼與此何其偏也以不平平其平也不平以不徵徵其徵也不徵明者唯爲之使神者徵之夫明之不勝神也乆矣而愚者恃其所見入於人其功外也不亦悲乎雜篇天下第三十三天下之治方術者多矣皆以其有爲不可加矣古之所謂道術者果惡乎在曰無乎不在曰神何由降明何由出聖有所生王有所成皆原於一不離於宗謂之天人不離於精謂之神人不離於眞謂之至人以天爲宗以德爲本以道爲門兆於變化謂之聖人以仁爲恩以義爲理以禮爲行以樂爲和薰然慈仁謂之君子以法爲分以名爲表以參爲驗以稽爲決其數一二三四是也百官以此相齒以事爲常以衣食爲主蕃息蓄藏老弱孤寡爲意皆有以養民之理也古之人其備乎配神明醇天地育萬物和天下澤及百姓明於本數係於末度六通四闢小大精粗其運無乎不在其明而在數度者舊法世傳之史尚多有之其在於詩書禮樂者鄒魯之士搢紳先生多能明之詩以道志書以道事禮以道行樂以道和易以道陰陽春秋以道名分其數散於天下而設於中國者百家之學時或稱而道之天下大亂賢聖不明道德不一天下多得一察焉以自好譬如耳曰鼻口皆有所明不能相通猶百家衆技也皆有所長時有所用雖然不該不偏一曲之士也判天地之美析萬物之理察古人之全寡能備於天地之美稱神明之容是故内聖外王之道闇而不明鬱而不發天下之人各爲其所欲焉以自爲方悲夫百家往而不反必不合矣後世之學者不幸不見天地之純古人之大體道術將爲天下裂不侈於後世不靡於萬物不暉於數度以繩墨自矯而備世之急古之道術有在於是者墨翟禽滑釐聞其風而悦之爲之太過已之大循作爲非樂命之曰節用生不歌死無服墨子氾愛兼利而非鬭其道不怒又好學而博不異不與先王同毁古之禮樂黄帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟雍之樂武王周公作武古之喪禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重今墨子獨生不歌死不服桐棺三寸而無槨以爲法式以此教人恐不愛人以此自行固不愛己末敗墨子道雖然歌而非歌哭而非哭樂而非樂是果類乎其生也勤其死也薄其道大觳使人憂使人悲其行難爲也恐其不可以爲聖人之道反天下之心天下不堪墨子雖獨能任柰天下何離於天下其去王也遠矣墨子稱道曰昔者禹之湮洪水决江河而通四夷九州也名川三百支川三千小者無數禹親自操橐耜而九雜天下之川腓無肢脛無毛沐甚雨櫛疾風置萬國禹大聖也而形勞天下也如此使後世之墨者多以裘褐爲衣以跂蹻爲服日夜不休以自苦爲極曰不能如此非禹之道也不足謂墨相里勤之弟子五侯之徒南方之墨者苦獲已齒鄧陵子之屬俱誦墨經而倍譎不同相謂别墨以堅白同異之辯相訾以觭偶不仵之辭相應以巨子爲聖人皆願爲之尸冀得爲其後世至今不决墨翟禽滑釐之意則是其行則非也將使後世之墨者必自苦以腓無肢脛無毛相進而已矣亂之上也治之下也雖然墨子眞天下之好也將求之不得也雖枯槁不舍也才士也夫不累於俗不飾於物不荀於人不忮於衆願天下之安寧以活民命人我之養畢足而止以此白心古之道術有在於是者宋鈃尹文聞其風而悅之作爲華山之冠以自表接萬物以别宥爲始語心之容命之曰心之行以聏合驩以調海内請欲置之以爲主見侮不辱救民之鬭禁攻寢兵救世之戰以此周行天下上說下教雖天下不取强聒而不舍者也故曰上下見厭而强見也雖然其爲人太多其自爲太少曰請欲固置五升之飯足矣先生恐不得飽弟子雖飢不忘天下日夜不休曰我必得活哉圖傲乎救世之士哉曰君子不爲苛察不以身假物以爲無益於天下者明之不如已也以禁攻寢兵爲外以情欲寡淺爲内其小大精粗其行適至是而止公而不黨易而無私决然無主趣物而不兩不顧於慮不謀於知於物無擇與之俱往古之道術有在於是者彭蒙田駢愼到聞其風而悅之齊萬物以爲首曰天能覆之而不能載之地能載之而不能覆之大道能包之而不能辯之知萬物皆有所可皆有所不可故曰選則不徧教則不至道則無遺者矣是故愼到棄知去已而縁不得已泠汰於物以爲道理曰知不知將薄知而後鄰傷之者也謑髀無任而笑天下之尚賢也縱脱無行而非天下之大聖推拍輐斷與物宛轉舍是與非苟可以免不師智慮不知前後魏然而已矣推而後行曳而後往若飄風之還若羽之旋若磨石之隧全而無非動靜無過未嘗有罪是何故夫無知之物無建已之患無用知之累動靜不離於理是以終身無譽故曰至於若無知之物而已無用賢聖夫瑰不失道豪桀相與笑之曰愼到之道非生人之行而至死人之理適得怪焉田駢亦然學於彭蒙得不教焉彭蒙之師曰古之道人至於莫之是莫之非而已矣其風窢然惡可而言常反人不聚觀而不免於魭斷其所謂道非道而所言之韙不免於非彭蒙田駢愼到不知道雖然槩乎皆嘗有聞者也以本爲精以物爲粗以有積爲不足澹然獨與神明居古之道術有在於是者關尹老聃聞其風而悦之建之以常無有主之以太一以濡弱謙下爲表以空虚不毁萬物爲實關尹曰在己無居形物自著其動若水其靜若鏡其應若響芴乎若亡寂乎若清同焉者和得焉者失未嘗先人而常隨人老聃曰知其雄守其雌爲天下谿知其白守其辱爲天下谷人皆取先己獨取後曰受天下之垢人皆取實己獨取虚無藏也故有餘巋然而有餘其行身也徐而不費無爲也而笑巧人皆求福己獨曲全曰荀免於咎以深爲根以約爲紀曰堅則毁矣鋭則挫矣常寬容於物不削於人可謂至極關尹老聃乎古之博大眞人哉寂漠無形變化無常死與生與天地並與神明往與芒乎何之忽乎何適萬物畢羅莫足以歸古之道術有在於是者莊周聞其風而悅之以謬悠之說荒唐之言無端崖之辭時恣縱而不儻不以觭見之也以天下爲沉濁不可與莊語以卮言爲曼衍以重言爲眞以寓言爲廣獨與天地精神往來而不敖倪於萬物不譴是非以與世俗處其書雖壞瑋而連抃無傷也其辭雖參差而諔詭可觀彼其充實不可以已上與造物者遊而下與外死生無終始者爲友其於本也弘大而闢深閎而肆其於宗也可謂調適而上遂矣雖然其應於化而解於物也其理不竭其來不蜕芒乎昧乎未之盡者惠施多方其書五車其道舛駁其言也不中歷物之意曰至大無外謂之大一至小無内謂之小一無厚不可積也其大千里天與地卑山與澤平日方中方睨物方生方死大同而與小同異此之謂小同異萬物畢同畢異此之謂大同異南方無窮而有窮今日適越而昔來連環可解也我知天下之中央燕之北越之南是也氾愛萬物天地一體也惠施以此爲大觀於天下而曉辯者天下之辯者相與樂之卵有毛雞三足郢有天下大可以爲羊馬有卵丁子有尾火不熱山出口輪不蹍地目不見指不至至不絶龜長於蛇矩不方規不可以爲圓鑿不圍枘飛鳥之景未嘗動也鏃矢之疾而有不行不止之時狗非犬黄馬驪牛三白狗黑狐駒未常有母一尺之捶日取其半萬世不竭辯者以此與惠施相應終身無窮桓團公孫龍辯者之徒飾人之心易人之意能勝人之口不能服人之心辯者之囿也惠施日以其知與人之辯特與天下之辯者爲怪此其柢也然惠施之口談自以爲最賢曰天地其壯乎施存雄而無術南方有倚人焉曰黄繚問天地所以不墜不陷風雨雷霆之故惠施不辭而應不慮而對徧爲萬物說說而不休多而無已猶以爲寡益之以怪以反人爲實而欲以勝人爲名是以與衆不適也弱於德强於物其塗隩矣由天地之道觀惠施之能其猶一蚉一虻之勞者也其於物也何庸夫充一尚可曰愈貴道幾矣惠施不能以此自寧散於萬物而不厭卒以善辯爲名惜乎惠施之才駘蕩而不得逐萬物而不反是窮響以聲形與影競走也悲夫南華眞經卷之五
