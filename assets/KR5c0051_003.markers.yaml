  - {type: variant, offset: 7452, length: 3, content: 尋述作, ZTDZ: 說吾君乎吾所以說吾君者橫說}
  - {type: variant, offset: 7456, length: 0, content: '', ZTDZ: 則以詩書禮樂從說之則以金板六弢奉事而}
  - {type: variant, offset: 7457, length: 2, content: 意則, ZTDZ: 有功者不可爲數而吾君未嘗啓齒今先生何以說吾君使吾君悅若此乎徐無鬼曰吾直告之吾相狗馬耳女商曰若是乎曰子不聞}
  - {type: variant, offset: 7460, length: 4, content: 遊外弘內, ZTDZ: 越}
  - {type: variant, offset: 7465, length: 2, content: 道坦, ZTDZ: 流人乎去國數日見其所知而喜去國旬月見所嘗見於國中者喜及期年也見似人者而喜矣不亦去人滋乆思人滋深乎夫逃虚空者藜藋柱乎鼪鼬之逕踉位其空聞人足音跫}
  - {type: page-break, offset: 7465, content: '', id: KR5c0051_SJB_003-110612a}
