  - {type: variant, offset: 1781, length: 685, content: 巳澤雉十歩一啄百歩一飮不蘄畜乎樊中蘄求也樊所以籠雉也夫俯仰乎天地之間逍遥乎自得之場固養生之妙處也又何求於入籠而服養哉啄陟角反蘄音祈求也樊中音煩李云藩也所以籠雉也向郭同崔以爲園中也處昌慮反神雖王不善也夫始乎適而未嘗不適者適也雖心神長王志氣盈豫而自放於清曠之地忽然不覺善之爲善也王于况反注同長丁亮反又直良反老聃死秦失弔之三號而出人弔亦弔人號亦號老聃吐藍反司馬云老子也宋本又作佚各依字讀亦皆音逸號戸羔反注同弟子曰非夫子之友邪怪其不倚戸觀化乃至三號也於綺反曰然然則弔焉若此可乎曰然至人無情與衆號耳故若斯可也始也吾以爲其人也而今非也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其母彼其所以會之必有不蘄言而言不蘄哭而哭者嫌其先物施惠不在理上往故致此甚愛也少詩照反先悉薦反又如字上往一本往作住是遁天倍情忘其所受天性所受各有本分不可逃亦不可加遯天徒遜反又作遁倍音裴加也又布對反本又作背古者謂之遁天之刑感物太深不止於當遁天者也將馳䳱於憂樂之境雖楚戮未加而性情巳困庸非刑哉大深音泰樂音洛下文注同適來夫子時也時自生也適去夫子順也理當死也安時而處順哀樂不能入也夫哀樂生於失得也今玄通合變之士無時而不安無順而不處冥然與造化爲一則無往而非我矣將何得何失孰死孰生哉故任其所受而哀樂無所錯其間矣錯七路反古者謂是帝之縣解以有係者爲縣則無係者縣解也縣解而性命之情得矣此養生之要也縣音玄解音蟹注同崔云以生爲縣以死爲解指窮於爲薪火傳也窮盡也爲薪猶前薪也前薪以指指盡前薪之理故火傳而不滅心得納養之中故命續而不絶明夫養生乃生之所以生也指窮於爲薪如字絶句爲猶前也傳直專反注同也傳者相傳繼續也崔云薪火爝火也傳延也中丁仲反, ZTDZ: ''}
