  - {type: variant, offset: 3913, length: 1436, content: 治之由乎不治爲之出乎無爲也取於堯而足豈借之許由哉若謂拱黙乎山林之中而後得稱無爲者此莊老之談所以見棄於當當者自必於有爲之域而不反者斯由之也堯唐帝也許由隱人也隱於箕山司馬云穎川陽城人簡文云陽城槐里人李云字仲武爝本亦作燋音爵郭祖繳反司馬云然也向云人所然决也一云燋火謂小火也字林云爝炬火也子召反燋所以然持火者子約反浸子鴆反灌古亂反天下治直吏反下已治註天下治而治者也旣治而治實而治者得以治者音同令力呈反下同而我猶代子吾將爲名乎名者實之賔也吾將爲賔乎夫自任者對物而順物者與物無對故堯無對於天下而許由與稷契爲匹矣何以言其然邪夫與物冥者故羣物之所不能離也是以無心玄應唯感之從汎乎若不繫之舟東西之非巳也故無行而不與百姓共者亦無往而不爲天下之君矣以此爲君若天之自高實君之德也若獨亢然立乎高山之頂非夫人有情於自守守一家之偏尚何得專此此故俗中之一物而爲堯之外臣耳若以外臣代乎內主斯有爲君之名而無任君之實也稷契息列反皆唐虞臣也稷周之始祖名棄契殷之始祖名離力智反應應對之應汎芳劔反非夫音扶下明夫同鷦鷯巢於深林不過一枝偃䑕飮河不過滿腹性各有極苟足其極則餘天下之財也鷦子遥反鷯音遼李云鷦鷯小鳥也郭璞云鷦鷯桃雀偃䑕如字李云鼷䑕也文鼢䑕一曰偃䑕鼢扶問反歸休乎君予無所用天下爲均之無用而堯獨有之明夫懷豁者無方故天下樂推而不厭乎君絶句一讀至乎字絕句君别讀豁呼活反樂音洛厭於絕反庖人雖不治庖尸祝不越樽爼而代之矣庖人尸祝各安其所司鳥獸萬物各足於所受帝堯許由各静其所遇此乃天下之至實也各得其實又何所爲乎哉自得而巳矣故堯許天地雖異其於逍遥一也庖鮑交反徐扶交反掌㕑人也周禮有庖人職祝之六反傳神辭曰祝樽子存反本亦作尊爼徐似吕反肩吾問於連叔曰吾聞言於接輿大而無當往而不反吾驚怖其言猶河漢而無極也大有逕庭不近人情焉連叔曰其言謂何哉曰藐姑射之山有神人居焉肌膚若冰雪淖約若處子此皆言耳夫神人即今所謂聖人也夫聖人雖在廟堂之上然其心無異於山林之中世豈識之哉徒見其戴黃屋佩玉璽便謂足以纓紼其心矣見其歷山川同民事便謂足以憔悴其神矣豈知至至者之不虧哉今言王德之人而之此山將明世所無由識故乃託之於絶垠之外而推之於視聽之表耳處子者不以外傷內肩吾李云賢人也司馬云神名連叔李云懷道人也接輿本又作與同音餘接輿楚人也姓陸名通皇甫謐云接輿躬耕楚王遣使以黃金百鎰車二駟聘之不應當丁浪反司馬云言語宏大無隱當也怖普布反爾雅云懼也大有音泰徐勑佐反逕徐古定反司馬本作莖庭勑定反李云逕庭謂激過也近附近之近藐音邈又妙紹反簡文云逺也射徐音夜又食亦反李實夜反山名在北海中肌居其反淖郭昌略反又徒學反字林又卓反蘇林漢書音火也約如字李云淖約柔弱貌司馬云好貌處子在室女也黃屋車蓋以黃爲裹一云冕裹黃也璽音徙纓字或作嬰紱方物反字或作紼憔在遥反悴在醉反至至者本亦作至足者王徐于况反本亦作至垠音銀又五根反本又作限不食五榖吸風飮露倶食五榖而獨爲神人明神人者非五榖所爲而特禀自然之妙氣吸許及反乗雲氣御飛龍而遊乎四海之外其神凝使物不疵癘而年榖熟吾以是狂而不信也夫體神居靈而窮理極妙者雖静黙間堂之裏而玄同四海之表故乗兩儀而御六氣同人羣而驅萬物苟無物而不順則浮雲斯乗矣無形而不載則飛龍斯御矣遺身而自得雖然而不待坐忘行忘忘而爲之故行若曵枯木止若聚死是以云其神凝也其神凝則不凝者自得矣世皆齊其所見而斷之豈甞信此哉凝魚升反疵在斯反病也司馬云毀也一音子爾反癘音厲李音賴惡病也本或作厲狂求匡反李云癡也李又九况反間音閑徒暫反恬静也齊才細反又如字斷丁亂反連叔曰然瞽者無以與乎文章之觀聾者無以與乎鍾鼔之聲豈唯形骸有聾, ZTDZ: ''}
