front:
  text: 雜篇庚桑楚第二十三老聃之役有庚桑楚者偏得老聃之道以北居畏壘之山其臣之畫然知者去之其妾之絜然仁者遠之擁腫之與居鞅掌之爲使居三年畏壘大穰畏壘之民相與言曰庚桑子之始來吾洒然異之今吾日計之而不足歳計之而有餘庶幾其聖人乎子胡不相與尸而祝之杜而稷之乎庚桑子聞之南面而不釋然弟子異之庚桑子曰弟子何異於予夫春氣發而百草生正得秋而萬寳成夫春與秋豈無得而然哉天道已行矣吾聞至人尸居環堵之室而百姓猖狂不知所如往今以畏壘之細民而竊竊焉欲俎豆予于賢人之間我其杓之人邪吾是以不釋於老聃之言弟子曰不然夫尋常之溝巨魚無所還其體而鯢鰌爲之制步仞之丘陵巨獸無所隱其軀而㜸狐爲之祥且夫尊賢授能先善與利自古堯舜以然而況畏壘之民乎夫子亦聽矣庚桑子曰小子來夫函車之獸介而離山則不免于罔罟之患吞舟之魚碭而失水則蟻能苦之故鳥獸不厭高魚鼈不厭深夫全其形生之人藏其身也不厭深眇而已矣且夫二子者又何足以稱揚哉是其於辯也將妄鑿垣墻而殖蓬蒿也簡髮而櫛數米而炊竊竊乎又何足以濟世哉舉賢則民相軋任知則民相盜之數物者不足以厚民民之於利甚勤子有殺父臣有殺君正晝爲盜日中穴阫吾語汝大亂之本必生于堯舜之間其末存乎千世之後千世之後其必有人與人相食者也南榮趎蹴然正坐曰若趎之年者已長矣將惡乎託業以及此言邪庚桑子曰全汝形抱汝生無使汝思慮營營若此三年則可以及此言也南榮趎曰目之與形吾不知其異也而盲者不能自見耳之與形吾不知其異也而聾者不能自聞心之與形吾不知其異也而狂者不能自得形之與形亦辟矣而物或間之邪欲相求而不能相得今謂趎曰全汝形抱汝生勿使汝思慮營營趎勉聞道達耳矣庚桑子曰辭盡矣曰奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣雞之與雞其德非不同也有能與不能者其才固有巨小也今吾才小不足以化子子胡不南見老子南榮趎赢糧七日七夜至老子之所老子曰子自楚之所來乎南榮趎曰唯老子曰子何與人偕來之衆也南榮趎懼然顧其後老子曰子不知吾所謂乎南榮趎俯而慚仰而歎曰今者吾忘吾答因失吾問老子曰何謂也南榮趎曰不知乎人謂我朱愚知乎反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我己我安逃此而可此三言者趎之所患也願因楚而問之老子曰向吾見若眉睫之間吾因以得汝矣今汝又言而信之若規規然若喪父母揭竿而求諸海也汝亡人哉惘惘乎汝欲反汝情性而無由入可憐哉南榮趎請入就舍召其所好去其所惡十日自愁復見老子老子曰汝自洒濯熟哉鬱鬱乎然而中津津乎猶有惡也夫外穫者不可繁而捉將内揵内穫者不可繆而捉將外揵外内穫者道德不能持而況放道而行者乎南榮趎曰里人有病里人問之病者能言其病然其病病者猶未病也若趎之聞大道譬猶飲藥以加病也趎願聞衛生之經而已矣老子曰衛生之經能抱一乎能勿失乎能無卜筮而知吉凶乎能止乎能已乎能舍諸人而求諸己乎能翛然乎能侗然乎能兒子乎兒子終日嗥而嗌不嗄和之至也終日握而手不掜共其德也終日視而目不瞚偏不在外也行不知所之居不知所爲與物委蛇而同其波是衛生之經已南榮趎曰然則是至人之德已乎曰非也是乃所謂冰解凍釋者夫至人者相與交食乎地而交樂乎天不以人物利害相攖不相與爲怪不相與爲謀不相與爲事翛然而往侗然而來是謂衛生之經已曰然則是至乎曰未也吾固告汝曰能兒子乎兒子動不知所爲行不知所之身若槁木之枝而心若死灰若是者禍亦不至福亦不來禍福無有惡有人灾也宇泰定者發乎天光發乎天光者人見其人人有修者乃今有恒有恒者人舍之天助之人之所舍謂之天民天之所助謂之天子學者學其所不能學也行者行其所不能行也辯者辯其所不能辯也知止乎其所不能知至矣若有不即是者天鈞敗之備物以將形藏不虞以生心敬中以達彼若是而萬惡至者皆天也而非人也不足以滑成不可内於靈臺靈臺者有持而不知其所持而不可持者也不見其誠己而發每發而不當業入而不舍每更爲失爲不善乎顯明之中者人得而誅之爲不善乎幽間之中者鬼得而誅之明乎人明乎鬼者然後能獨行券内者行乎無名券外者志乎期費行乎無名者唯庸有光志乎期費者唯賈人也人見其跂猶之魁然與物窮者物入焉與物且者其身之不能容焉能容人不能容人者無親無親者盡人兵莫憯于志鏌鎁爲下寇莫大於陰陽無所逃於天地之間非陰陽賊之心則使之也道通其分也其成也毁也所惡乎分者其分也以備所以惡乎備者其有以備故出而不反見其鬼出而得是謂得死滅而有實鬼之一也以有形者象無形者而定矣出無本入無竅有實而無乎處有長而無乎本剽有所出而無竅者有實有實而無乎處者宇也有長而無本剽者宙也有乎生有乎死有乎出有乎入入出而無見其形是謂天門天門者無有也萬物出乎無有有不能以有爲有必出乎無有而無有一無有聖人藏乎是古之人其知有所至矣惡乎至有以爲未始有物者至矣盡矣弗可以加矣其次以爲有物矣將以生爲喪也以死爲反也是以分已其次曰始無有旣而有生生俄而死以無有爲首以生爲體以死爲尻孰知有無死生之一守者吾與之爲友是三者雖異公族也昭景也著戴也甲氏也著封也非一也有生黬也披然曰移是嘗言移是非所言也雖然不可知者也臘者之有膍胲可散而不可散也觀室者周於寢廟又適其偃焉爲是舉移是請常言移是是以生爲本以知爲師因以乘是非果有名實因以己爲質使人以爲己節因以死償節若然者以用爲知以不用爲愚以徹爲名以窮爲辱移是今之人也是蜩與學鳩同於同也蹍市人之足則辭以放驚兄則以嫗大親則已矣故曰至禮有不人至義不物至知不謀至仁無親至信辟金徹志之勃解心之繆去德之累達道之塞貴富顯嚴名利六者勃志也容動色理氣意六者繆心也惡欲喜怒哀樂六者累德也去就取與知能六者塞道也此四六者不盪胸中則正正則靜靜則明明則虚虚則無爲而無不爲也道者德之欽也生者德之光也性者生之質也性之動謂爲之爲之僞謂之失如者接也知者謨也知者之所不知猶睨也動以不得已之謂德動無非我之謂治名相反而實相順也羿工乎中微而拙乎使人無己譽聖人工乎天而拙乎人夫工乎天而食乎人者唯全人能之唯蟲能蟲唯蟲能天全人惡天惡人之天而況吾天乎人乎一雀適羿羿必得之威也以天下爲之籠則雀無所逃是故湯以庖人籠伊尹秦穆公以五羊之皮籠百里奚是故非以其所好籠之而可得者無有也介者拸畫外非譽也胥靡登高而不懼遺死生也夫復謂不餽而忘人忘人因以爲天人矣故敬之而不喜侮之而不怒者唯同乎天和者爲然出怒不怒則怒出於不怒矣出爲無爲則爲出於無爲矣欲靜則平氣欲神則順心有爲也欲當則縁於不得已不得已之類聖人之道
