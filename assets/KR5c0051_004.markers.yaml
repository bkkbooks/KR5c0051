  - {type: variant, offset: 17085, length: 1, content: 任, HFL: 也君原於德而成於天故曰玄古之君天下無爲也天德而已矣以道觀言而天下之君正以道觀分而君臣之義明以道觀能而天下之官治以道汎觀而萬物之應備故通於天地者德也行於萬物者道也上治人者事也能有所藝者技也技兼於事事兼於義義兼於德德兼於道道兼於天故曰古之畜天下者無欲而天下足}
