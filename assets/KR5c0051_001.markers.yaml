  - {type: punctuation, offset: 22303, content: (, id: KR5c0051_krp_001-bkkpn2867}
  - {type: variant, offset: 22303, length: 0, content: '', ZTDZ: 翦翦者又奚足以語至道黄帝退捐天下築特室席白茅閒居三月復往邀之廣成子南}
  - {type: variant, offset: 22304, length: 0, content: '', ZTDZ: 而卧黄帝順下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長乆廣成子蹷然而起曰善哉問乎來吾語汝至道至道之精窈窈㝠㝠至道之極昏昏默默無視無聽抱神以靜形將自正必靜必清無勞汝形無摇汝精乃可以長生目無所見耳無所聞心無所知汝神將守形形乃長生愼汝内閑汝外多知爲敗我爲汝遂於大明之上矣至彼至陽之原也爲汝入於窈㝠之門矣至彼至陰之原也天地}
  - {type: page-break, offset: 22304, content: '', id: KR5c0051_SJB_001-110585a}
  - {type: variant, offset: 22305, length: 6, content: 遂字三十三葉, ZTDZ: 官陰陽有藏愼守汝身物將自壯我守其一以處其和故我修身千}
  - {type: punctuation, offset: 22307, content: /, id: KR5c0051_krp_001-bkkpn2868}
  - {type: variant, offset: 22312, length: 16, content: 行注思斯矯驕奸姦三十六葉十行脾雀, ZTDZ: 百歲矣吾形未常衰黄帝再拜稽首曰廣成子之謂天矣廣成子曰來余語汝彼其物無窮而人皆以爲終彼其物無測而人皆以爲極得吾道者上爲皇而下爲王失吾道者上見光而下爲土今夫百昌皆生於土而反於土故余將去汝入無窮之門以遊無極之野吾與日月參光吾與天地爲常當我緡乎遠我昬乎人其盡死而我獨存乎雲將東遊過扶摇之枝而適遭鴻蒙鴻蒙方將拊}
  - {type: punctuation, offset: 22314, content: ), id: KR5c0051_krp_001-bkkpn2869}
