body:
  text: 郭象子玄註陸德明音義莊子外篇天地第十二音義曰以事名篇天地雖大其化均也均於不爲而自化也天地釋名云天顯也高顯在上也又坦也坦然高逺也地底也其體低下載萬物也體統云天地者元氣之所生萬物之祖也易云元氣分清輕上爲天濁重下爲地萬物雖多其治一也一以自得爲治治直吏反註同下官治并註亦同人卒雖衆其主君也天下異心無心者主也卒尊忽反君原於德而成於天以德爲原無物不得得者自得故得而不謝所以成天原原本也故曰玄古之君天下無爲也天德而已矣任自然之運動以道觀言而天下之君正無爲者自然爲君非邪也邪似嗟反本又作爲以道觀分而君臣之義明各當其分則無爲位上有爲位下也以道觀能而天下之官治官各當其所能則治矣以道汎觀而萬物之應備無爲也則天下各以其無爲應之故通於天地者德也萬物莫不皆得則天地通行於萬物者道也道不塞其所由則萬物自得其行矣上治人者事也使人人自得其事能有所藝者技也技者萬物之末用也技其綺反註下同技兼於事事兼於義義兼於德德兼於道道兼於天夫本末之相兼猶手臂之相包故一身和則百節皆適天道順則本末俱暢故曰古之畜天下者無欲而天下足無爲而萬物化淵靜而百姓定記曰通於一而萬事畢無心得而神服一無爲而羣理都舉記書名也云老子所作夫子曰夫道覆載萬物者也洋洋乎大哉君子不可以不刳心焉有心則累其自然故當刳而去之夫子司馬云莊子也一云老子也此兩夫子曰元嘉本皆爲別章崔本亦爾覆芳冨反洋洋音羊又音詳刳口吳反又口侯反崔本作軒云寛恱之貌去起吕反無爲爲之之謂天不爲此爲而此爲自爲乃天道無爲言之之謂德不爲此言而此言自言乃眞德愛人利物之謂仁此任其性命之情也不同同之之謂大萬物萬形各止其分不引彼以同我乃成大耳行不崖異之謂寛玄同彼我則萬物自容故有餘有萬不同之謂冨我無不同故能獨有斯萬故執德之謂紀德者人之綱要德成之謂立非德而成者不可謂立循於道之謂備夫道非偏物也循音旬或作脩不以物挫志之謂完內自得也挫竹卧反君子明於此十者則韜乎其事心之大也心大故事無不容也韜吐刀反廣雅云載也沛乎其爲萬物逝也德澤滂沛任萬物之自往也沛普貝反字林云流也逝崔本逝作啓云開也滂普旁反若然者藏金於山藏珠於淵不貴難得之物不利貨財乃能忘我况貨財乎不近貴冨自來耳心常去之逺也近附近之近不樂壽不哀夭所謂縣解樂音洛縣解上音玄下音蟹不榮通不醜窮忘壽夭於胸中况窮通之間哉不拘一世之利以爲已私分皆委之萬物也不以王天下爲巳處顯忽然不覺榮之在身王于况反下王德並同顯則明不顯則黙而巳萬物一府死生同狀蛻然無所在也蛻始銳反又音帨夫子曰夫道淵乎其居也漻乎其淸也金石不得無以鳴聲由寂彰漻李良由反徐力蕭反廣雅下巧反云清貌故金石有聲不考不鳴因以喻體道者物感而後應也萬物孰能定之應感無方夫王德之人素逝而恥通於事任素而往耳非好通於事也好呼報反立之本原而知通於神本立而知不逆知音智註同故其德廣任素通神而後彌廣其心之出有物採之物採之而後出耳非先物而唱也故形非道不生生非德不明存形窮生立德明道非王德者邪蕩蕩乎忽然出勃然動而萬物從之乎此謂王德之人忽勃皆無心而應之貌動出無心故萬物從之斯蕩蕩矣故能存形窮生立德明道而成王德也視乎冥冥聽乎無聲冥冥之中獨見曉焉無聲之中獨聞和焉若夫視聽而不之於寂則有闇昧而不和也故深之又深而能物焉窮其原而後能物物神之又神反司馬云喫詬多力也乃使象㒺象㒺得之黃帝曰異哉象㒺乃可以得之乎明得眞者非用心也象罔然即眞也堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰衣堯問於許由曰齧缺可以配天乎謂爲天子倪徐五反音披吾藉王倪以要之欲因其師以要而使之要一遥反注同許由曰殆哉圾乎天下圾危也圾本又作岌五急反又五合反郭李云危也齧缺之爲人也聦明叡知給數以敏其性過人聦敏過人則使人之屢傷於人也數音朔而又乃以人受天用知以求復其自然彼審乎禁過而不知過之所由生夫過生於聦知而又後知以禁之其過彌甚矣故曰無過在去知不在於強禁去起吕反強其文反與之配天乎彼且乘人而無天若與之天下彼且遂使後世任知而失眞方且本身而異形夫以萬物爲本則羣變可一而異形可同斯迹也將遂使後世由已以制物則萬物乖矣且如字凡言方且者言方將有所爲也方且尊知而火馳賢者當位於前則知見尊於後奔競而火馳也方且爲緒使將興後世事役之端方且爲物絯將遂使後世拘牽而制物絯徐戸隔反廣雅公才反云束也與郭義同今用廣雅音方且四顧而物應將遂使後世麾以動物令應工務令力呈反方且應衆宜將遂使後世不能忘善而利仁以應冝也方且與物化將遂使後世與物相逐而不能自得於內而未始有恒此皆盡當時之宜也然今日受其德而明日承其弊矣故曰未始有恒夫何足以配天乎雖然有族有祖其事可得而祖效可以爲衆父而不可以爲衆父父衆父父者所以迹也治亂之率也言非但治主乃爲亂率治直吏反注同率色反注同又色律反北靣之禍也夫桀紂非能殺賢臣乃頼聖知之迹以禍之南靣之賊也田恒非能殺君乃資仁義以賊之殺音試本又作弑音同堯觀乎華華封人曰嘻聖人請祝聖人使聖人壽堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰壽富多男子人之所欲也女獨不欲何邪堯曰多男子則多懼富則多事壽則多辱是三者非所以養德也故辭封人曰始也我以女爲聖人邪今然君子也天生萬民必授之職多男子而授之職則何懼之有物皆得所而志定也華胡化反又胡花反司馬云地名也封人司馬云守封疆人也嘻音熈祝之又反又州六反女音汝後同富而使人分之則何事之有寄之天下故無事也夫聖人鶉居無意而其安也鶉音淳居鶉居謂無常處也又云如鶉之居猶言野處而鷇食仰物而足鷇口豆反食爾雅云主哺鷇鷇食者言仰物而足也鳥行而無彰率性而動非常迹也天下有道則與物皆昌猖狂行而自大方也天下無道則脩德就間雖湯武之事苟順天應人未爲不間也故無爲而無不爲者非不間也間音閑注同千歲厭世去而上僊夫至人極壽命之長任窮理之變其生也天行其死也物化故云厭世而上僊也僊音仙乗彼白雲至于帝鄕氣之散無不之三患莫至身常無殃則何辱之有封人去之堯隨之曰請問封人曰退已堯治天下伯成子高立爲諸侯堯授舜舜授禹伯成子高辭爲諸侯而耕禹往見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立爲諸侯堯授舜舜授予而吾子辭爲諸侯而耕敢問其故何也子高曰昔堯治天下不賞而民勸不罰而民畏今子賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣夫子闔行邪無落吾事俋俋乎耕而不顧夫禹時三聖相承治成德備功美漸去故史籍無所載仲尼不能間是以雖有天下而不與焉斯乃有而無之也故考其時而禹爲最優計其人則雖三聖故一堯耳時無聖人故天下之心俄然歸啓夫至公而居當者付天下於百姓取與之非巳故失之不求得之不辭忽然而往侗然而來是以受非毀於廉節之士而名列於三王未足怪也莊子因斯以明堯之弊弊起於堯而釁成於禹况後世之無聖乎逺迹於子高便棄而不治將以絶聖而反一遺知而寧極耳其實則未聞也夫莊子之言不可以一詰或以黃帝之迹秃堯舜之脛豈獨貴堯而賤禹哉故當遺其所而錄其絶聖棄知之意焉伯成子高通變經云老子從此天地闢以來吾身一壬三百變後世得道伯成子高是也闔本亦作盍胡臘反落猶發也俋俋徐於執反徐直立反李云耕貌一云耕人行貌又音秩又於十反字林云勇壯貌治直吏反間間厠之間與音預同音洞又音同泰初有無無有無名無有故無所名泰初易云氣之始也一之所起有一而未形一者有之至妙者也至妙故未有物理之形耳夫一之所起起於至一非起於無也然莊子之所以屢稱無合於喙鳴喙丁豆反又充芮喜穢二反喙鳴合與天地爲合天地亦無心而自動其合緡緡若愚若昬坐忘而自合耳非照察以合之緡咸巾反是謂玄德同乎大順德玄而所順者大矣夫子問于老聃曰有人治道若相放可不可然不然若相放效強以不可爲可不然爲然斯矯其性情也夫子仲尼也相放甫狂反注同本亦作方如字又甫往反強其兩反辯者有言曰離堅白若縣㝢言其高顯易見縣音玄㝢音字司馬云辯明白若縣室在人前也易以䜴反若是則可謂聖人乎老聃曰是胥易技係勞形心者也執留之狗成思猨狙之便自山林來言此皆失其常然也技其綺反執留如字本又作留音同一本作狸亦如字司馬云狸竹䑕也一云執留之狗謂有能故留係成愁思也猨音狙七徐反便婢靣反徐扶靣反司馬云言便捷見捕丘予告若而所不能聞與而所不能言凡有首有趾無心無耳者衆首趾猶始終也無心無耳言其自化有形者與無形無狀而皆存者盡無言有形者善變不能與無形無狀者並存也故善治道者不以故自持也將順日新之化而巳其動止也其死生也其廢起也此又非其所以也此言動止死生盛衰廢興未始有恒皆自然而然非其所用而然故放之而自得也有治在人不在乎主自用忘乎物忘乎天其名爲忘巳天物皆忘非獨忘巳復何所有哉復扶又反忘已之人是之謂入於天人之所不能忘者巳也巳猶忘之又奚識哉斯乃不識不知而冥於自然將閭葂見季徹曰魯君謂葂也曰請受教辭不獲命旣已告矣未知中否請嘗薦之吾謂魯君曰必服恭儉抜出公忠之屬而無阿私民孰敢不輯季徹局局然曰若夫子之言於帝王之德猶螳蜋之怒臂以當車軼則必不勝任矣必服恭儉非忘儉而儉也抜出公忠非忘忠而忠也故雖無阿私而不足以勝矯詐之任也將一本作蔣閭萬於反葂字亦作莬音免又音晚郭音同蔣閭莬人姓名也一云姓蔣閭名葂或云姓蔣名閭葂也季徹人姓名也蓋季氏之族魯君或云定公中丁仲反輯音集爾雅曰和也又側立反郭思魚反局局其玉反一云大之貌螳蜋音堂郎軼音轍勝音升注同且若是則其自爲處危其觀臺此皆自處高顯若臺觀之可覩也處其據反本又作處觀古亂反注同多物將往將使物不止於本性之分而矯自多以附之投迹者衆亢足投迹不安其本歩也蔣閭葂覤覤然驚曰葂也汒若於夫子之所言矣雖然願先生之言其風也季徹曰大聖之治天下也搖蕩民心使之成教易俗舉滅其賊心而皆進其獨志若性之自爲而民不知其所由然夫志各有趣不可相效也故因其自揺而揺之則雖揺而非爲也因其自蕩而蕩之則雖蕩而非動也故其賊心自㓕獨志自進教成俗易悶然無迹履性自爲而不知所由皆云我自然矣舉皆也覤許逆反又生責反或云驚懼之貌汒本或作芒武剛反郭武蕩反悶音門若然者豈兄堯舜之教民溟涬然弟之哉溟涬甚貴之謂也不肯多謝堯舜而推之爲兄也兄元嘉本作足溟亡頂反涬戸頂反欲同乎德而心居矣居者不逐於外也心不居則德不同也子貢南遊於楚反於過漢隂見一丈人方將爲圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎爲圃者卬而視之曰奈何曰鑿木爲機後重前輕挈水若抽數如泆湯其名爲橰爲圃者忿然作色而曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不爲也夫用時之所用者乃純備也斯人欲脩純備而抱一守古失其㫖也圃布戸反又音布園也李云菜曰圃畦戸圭反李云呼中曰畦文云五十畒曰畦隧音遂李云道也甕鳥送反字林作瓮搰苦骨反徐李苦滑反郭忽滑反用力貌一音胡没反械戶戒反字林作械李云器械也浸子鴆反司馬云灌也卬音抑本又作仰挈口節反抽敕留反李云引也司馬崔本作流數所角反徐所錄反泆湯音逸本或作溢李云疾速如湯沸溢也司馬本作佚蕩亦言其往來數疾如佚蕩佚蕩唐佚也橰本又作橋或作臯同音羔徐居橋反司馬李云桔橰也吾師謂老子也子貢瞞然慙俯而不對有間爲圃者曰子奚爲者邪曰孔丘之徒也爲圃者曰子非夫博學以擬聖於于以蓋衆獨弦哀歌以賣名聲於天下者乎汝方將忘汝神氣墮汝形骸而庶幾乎不忘不墮則無庶幾之道瞞武版反又亡安反字林云目皆平貌李天典反慙貌一音門又亡于反司馬本作撫音武崔本作撫於于並如字本或作於吁音同司馬云夸誕貌一云行仁恩之貌蓋司馬本作善墮許規反而身之不能治而何暇治天下乎子往矣無乏吾事子貢卑陬失色頊頊然不自得行三十里而後愈其弟子曰向之人何爲者邪夫子何故見之變容失色終日不自反邪曰始吾以爲天下一人耳謂孔子也乏廢也陬走侯反徐側留反李云卑陬愧懼貌一云顔色不自得也頊頊本又作旭旭許玉反李云自失貌向許亮反本又作郷音同後倣此不知復有夫人也吾聞之夫子事求可功求成用力少見功多者聖人之道聖人之道即用百姓之心耳復扶又反夫音符下夫人同今徒不然執道者德全德全者形全形全者神全神全者聖人之道也託生與民並行而不知其所之汒乎淳備哉功利機巧必忘夫人之心此乃聖王之道非夫人也子貢聞其假脩之而服之未知純白者之同乎世也汒莫剛反心或作道若夫人者非其志不之非其心不爲雖以天下譽之得其所謂謷然不顧以天下非之失其所謂儻然不受天下之非譽無益損焉是謂全德之人哉我之謂風波之民此宋榮子之徒未足以爲全德子貢之迷没於此人即若列子之心醉於季咸也譽音餘下同謷五羔反司馬本作謷儻本亦作精司馬本作㒉同勑蕩反郭此更反反於魯以吿孔子孔子曰彼假脩渾沌氏之術者也以其背今向古修爲世事故知其非眞渾沌也渾胡本反沌徒本反背音佩識其一不知其二徒識修古抱灌之朴而不知因時任物之易也易以䜴反治其內而不治其外夫眞渾沌都不治也豈以外內爲異而偏有所治哉夫明白入素無爲復朴體性抱神以遊世俗之間者汝將固驚邪此眞渾沌也故與世同波而不自失則雖遊於世俗而泯然無迹豈必使汝驚哉且渾沌氏之術予與汝何足以識之哉在彼爲彼在此爲此渾沌玄同孰識之哉所識者常識其迹耳諄芒將東之大壑適遇風於東海之濱風曰子將奚之曰將之大壑曰奚爲焉曰夫大壑之爲物也注焉而不滿酌焉而不竭吾將遊焉風曰夫子無意于橫目之民乎願聞聖治諄芒曰聖治乎官施而不失其冝抜舉而不失其能畢見其情事而行其所爲皆因而任之諄郭之倫反又述倫反芒本或作汒武剛反李云望之諄諄察之芒芒故曰諄芒一云姓名也或云霧氣也壑火各反李云大壑東海也風本亦作宛徐於阮反李云小貌謂遊世俗也一云風姓名一云扶搖大風也濵音賓酌一本作取橫目之民李云倮虫之屬欲令其治之也聞本或依司馬云作問下同治直吏反下皆同施始支反又始智反司馬云施政布教各得其宜行言自爲而天下化使物爲之則不化也手撓顧指四方之民莫不俱至此之謂聖治言其指麾顧眄而民各至其性也任其自爲故手撓而小反又而了反司馬云動也一云謂指麾四方也顧指如字向云顧指者言指麾顧盻而治也或音頥本亦作頥以之反謂舉頥指麾也願聞德人曰德人者居無思行無慮率自然耳不藏是非美惡無是非於胷中而任之天下惡烏路反四海之內共利之之謂恱共給之之爲安無自私之懷也怊乎若嬰兒之失其母也儻乎若行而失其道也財用有餘而不知其所自來飮食取足而不知其所從此謂德人之容德者神人迹也故曰容怊音超字林云悵也徐尺遥反郭音條儻敕黨反司馬本作容牟凶反或云依注當作客願聞神人願聞所以迹也曰上神乗光與形㓕亡乗光者乃無光此謂照曠無我而任物空虚無所攘者非闇塞也致命盡情天地樂而萬事銷亡情盡命至天地樂矣事不妨樂斯無事矣樂音洛注同銷徐音消萬物復情此之謂混冥情復而混冥無迹也混胡本反門無與赤張滿稽觀於武王之師赤張滿稽曰不及有虞氏乎故離此患也門無曰天下均治而有虞氏治之邪其亂而後治之與言二聖俱以亂故治之則揖讓之與用師直是時異耳未有勝於其間也門無司馬本作無畏云門姓無畏字也滿本或作蒲稽古奚反李云門赤張氏也無滿稽名也治直吏反下及注均治並同與音餘本又作邪赤張滿稽曰天下均治之爲願而何計以有虞氏爲均治則願各足矣復何爲計有虞氏之德而推以爲君哉許無之言是也復扶又反下章注同有虞氏之藥瘍也天下皆患創亂故求虞氏之藥瘍音羊李云頭創也言創以喻亂求虞氏薬治之司馬云疵瘍也創良反秃而施髢病而求醫孝子操藥以脩慈父其色燋然聖人羞之明治天下者非以爲榮秃吐木反髢大細反司馬云髲也又吐帝反郭音毛李云髦髮也操七刀反燋將遙反又音撨至德之世不尙賢賢當其位非尚之也不使能能者自爲非使之也上如標枝出物上而不自高也標方小反徐方遥方又方妙反言樹標之枝無心在上也民如野鹿放而自得也端正而不知以爲義相愛而不知以爲仁實而不知以爲忠當而不知以爲信率性自然非由知也蠢動而相使不以爲賜用其自動故動而不謝蠢郭處允反動也是故行而無迹王能任其自行故無迹也事而無傳各止其分故不傳敎於彼也傳文專反孝子不䛕其親忠臣不諂其君臣子之盛也親之所言而然所行而善則世俗謂之不肖子君之所言而然所行而善則世俗謂之不肖臣而未知此其必然邪此直違俗而從君親故俗謂不肖耳未知至當正在何許䛕羊朱反郭貽附反諂敕檢反肖音世俗之所謂然而然之所謂善而善之則不謂之道䛕之人也然則俗故嚴於親而尊於君邪言俗不爲尊嚴於君親而從俗俗不謂之諂明尊嚴不足以服物則服物者更在於從俗也是以聖人未甞獨異於世必與時消息故在皇爲皇在王爲王豈有背俗而用我哉之道音導下同背音佩謂已道人則勃然作色謂已䛕人則怫然作色世俗遂以多同爲正故謂之道䛕則作色不受勃歩忽反謂巳䛕人本多作衆人下同司馬云衆人凡人也怫符弗反郭敷謂反而終身道人也終身䛕人也亦不問道理期於相善耳合譬飾辭聚衆也是終始本末不相坐夫合譬飾辭應受道䛕之罪而世復以此得人以此聚衆亦爲從俗者不見罪坐也坐才臥反注同垂衣裳設采色動容貌以媚一世而不自謂道䛕與夫人之爲徒通是非而不自謂衆人愚之至也世皆至愚乃更不可不從夫音符知其愚者非大愚也知其惑者非大惑也大惑者終身不解大愚者終身不靈夫聖人道同而帝王殊迹者誠世俗之惑不可解故隨而任之解音蟹又佳買反不靈本又作無靈司馬云靈曉也三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者勝也而今也以適不得矣各自信據故不知所之以二缶鍾應作垂鍾應作踵言垂脚空中必不得有之適也司馬本作二垂鍾云鍾注意也適司馬云至也而今也以天下惑予雖有祈嚮其庸可得邪知其不可得也而強之又一惑也故莫若釋之而不推即而同之強其丈反下注同不推誰其比憂趣令得當時之適不強推之令解也則相與無憂於一世矣比毗至反司馬本作鼻云始也令力呈反下同解音蟹厲之人夜半生其子遽取火而視之汲汲然唯恐其似巳也厲惡人也言天下皆不願爲惡及其爲惡或迫於苛役或迷而失性耳然迷者自思復而厲者自思善故我無爲而天下自化厲音頼又如字遽巨據反本或作蘧音同汲音急苛音何百年之木破爲犧樽靑黃而文之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也跖與曾史行義有間矣然其失性均也且夫失性有五一曰五色亂目使目不明二曰五聲亂耳使耳不聦三曰五臭薫鼻困惾中顙四曰五味濁口使口厲爽五曰趣舍滑心使性飛揚此五者皆生之害也而楊墨乃始離自以爲得非吾所謂得也夫得者困可以爲得乎則鳩鴞之在於籠也亦可以爲得矣且夫趣舍聲色以柴其內皮弁鷸冠搢笏紳脩以約其外內支盈於柴柵外重纆繳睆睆然在纆繳之中而自以爲得則是罪人交臂歷指而虎豹在於囊檻亦可以爲得矣犧音羲又素河反斷徒亂反下同本或作故困如字本或作悃音同惾子公反郭音俊又素奏反李云困惾猶刻賊不通也中丁仲反顙桑蕩反濁本又作噣音同滑李音骨本亦作噣離力智反丘䜴反鷸尹必反徐音述本又作音同鳥名也一名翠似燕紺色出鬱林取其羽毛以飾冠笏音忽紳音申帶也柵楚格反郭音策重直龍反纆音墨繳音灼郭古弔反睆睆環版反李云窮視貌一云眠目貌交臂歷指司馬云交臂反縛也歷指猶歷樓貌檻戸覽反莊子外篇天道第十三音義曰以義名篇天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海內服此三者皆恣物之性而無所牽滯也積謂滯積不通明於天通於聖六通四辟於帝王之德者其自爲也昧然無不靜者矣任其自爲故雖六通四辟而無傷於静也六通謂六氣隂陽風晦明四辟毗赤反謂四方開也昧音妹聖人之靜也非曰靜也善故靜也善之乃静則有時而動也萬物無足以鐃心者故靜也斯乃自得也鐃乃孝反又女交反一音而小反水靜則明燭鬚眉平中准大匠取法焉水靜猶明而況精神聖人之心靜乎天地之鑒也萬物之鏡也夫有其具而任其自爲故所照無不洞明中丁仲反大匠或云天子也夫虚靜恬淡寂漠無爲者天地之平而道德之至凡不平不至者生於有爲淡徒暫反故帝王聖人休焉未甞動也休則虚虚則實實者倫矣倫理也虚則靜靜則動動則得矣不失其所以動靜則無爲無爲也則任事者責矣夫無爲也則羣才萬品各任其事而自當其責矣故曰巍巍乎舜禹之有天下而不與焉此之謂也巍魚歸反與音預無爲則俞俞俞俞者憂患不能處年壽長矣俞俞然從容自得之貌俞俞羊朱反廣雅云喜也又音喻從七容反夫虚靜恬淡寂漠無爲者萬物之本也尋其本皆在不爲中來明此以南鄕堯之爲君也明此以北靣舜之爲臣也以此處上帝王天子之德也以此處下玄聖素王之道也此皆無爲之至也有其道爲天下所歸而無其爵者所謂素王自貴也鄕許亮反本亦作嚮王于况反注同以此退居而間游江海山林之士服以此進爲而撫世則功大名顯而天下一也此又其次也故退則巢許之流進則伊望之倫也夫無爲之體大矣天下何所不爲哉故主上不爲宰之任則伊吕静而司尹矣宰不爲百官之所執則百官静而御事者無天怨無人非無物累無責故曰其動也天其靜也地動静雖殊無心一也一心定而王天下其不祟其魂不疲常無心故王天下而不疲病王往况反注及下王天同祟雖遂反徐息反李云禍也一心定而萬物服言以虚靜推於天地通於萬物此之謂天樂我心常静則萬物之心通矣通則服不通則叛天樂者聖人之心以畜天下也聖人之心所以畜天下者奚爲哉天樂而巳畜許六反注同夫帝王之德以天下爲宗以道德爲主以無爲爲常無爲也則用天下而有餘有餘者閑暇之謂也有爲也則爲天下用而不足不足者汲汲然欲爲物用也欲爲物用故可得而臣也及其爲臣亦有餘也故古之人貴夫無爲也上無爲也下亦無爲也是下與上同德下與上同德則不臣下有爲也上亦有爲也是上與下同道上與下同道則不主夫工人無爲於刻木而有爲於用斧主上無爲於親事而有爲於用臣臣能親事主能用臣斧能刻木而工能用斧各當其能則天理自然非有爲也若乃主代臣事則非主矣臣秉主用則非臣矣故各司其任則上下咸得而無爲之理至矣上必無爲而用天下下必有爲爲天下用此不易之道也無爲之言不可不察也夫用天下者亦有用之爲耳然自得此爲率性而動故謂之無爲也今之爲天下用者亦自得耳但居下者親事故雖舜禹爲臣猶稱有爲故對上下則君静而臣動比古今則堯舜無爲而湯武有事然各用其性而天機玄發則古今上下無爲誰有爲也故古之王天下者知雖落天地不自慮也辯雖彫萬物不自也能雖窮海內不自爲也夫在上者患於不能無爲而代人臣之所司使咎繇不得行其明斷后稷不得施其播殖則羣才失其任而主上困於役矣故冕旒垂目而付之天下天下皆得其自爲斯乃無爲而無不爲者也故上下皆無爲矣但上之無爲則用下下之無爲則自用也知音智下愚知同音恱咎音羔繇音遥斷丁亂反天不産而萬物化地不長而萬物育所謂自爾帝王無爲而天下功功自彼成故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地同乎天地之無爲也乗天地馳萬物而用人羣之道也本在於上末在於下要在於主詳在於臣三軍五兵之運德之末也賞罰利害五刑之辟教之末也禮法度數刑名比詳治之末也鐘鼔之音羽旄之容樂之末也哭泣衰經隆殺之服哀之末也此五末者須精神之運心術之動然後從之者也夫精神心術者五末之本也任自然運動則五事之末不振而自舉也本在於上末在於下李云本天道末人道也辟毗赤反比毗至反下同治一音如字云比校詳審治直吏反下治之至治又之道同衰音崔絰田結反殺所界反末學者古人有之而非所以先也所以先者本也君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從夫尊卑先後天地之行也故聖人取象焉言此先後雖是人事然皆在至理中來非聖人之所作也少詩照反天尊地卑神明之位也春夏先秋冬後四時之序也萬物化作萌區有狀盛衰之殺變化之流也夫天地至神而有尊卑先後之序而況人道乎明夫尊卑先後之序固有物之所不能無也區曲俱反宗廟尚親朝廷尙尊鄕黨尙齒行事尙賢大道之序也言非但人倫所尚也朝直遥反語道而非其序者非其道也語道而非其道者安取道所以取道爲有序也是故古之明大道者先明天而道德次之天者自然也自然旣明則物得其道也道德巳明而仁義次之物得其道而和理自適也仁義巳明而分守次之理適而不失其分也分守巳明而形名次之得分而物物之名各當其形也形名巳明而因任次之無所復改因任已明而原省次之物各自任則罪責除也原省所景反原除省廢也原省已明而是非次之各以得性爲是失性爲非是非已明而賞罰次之賞罰者失得之報也夫至治之道本在於天而未極於斯賞罰已明而愚知處宜貴賤履位言各當其才也仁賢不肖襲情各自行其所能之情必分其能無相易業分方云反必由其名名當其實故由名而實不濫也以此事上以此畜下以此治物以此脩身知謀不用必歸其天此之謂太平治之至也故書曰有形有名形名者古人有之而非所以先也古之語大道者五變而形名可舉九變而賞罰可言也自先明天以下至形名而五至賞罰而九此自然先後之序也知音智大音泰驟而語形名不知其本也驟而語賞罰不知其始也倒道而言迕道而者人之所治也安能治人治人者必順序迕音悟司馬云橫也徐音恱又如字驟而語形名賞罰此有知治之具非知治之道治道先明天不爲弃賞罰也但當不失其先後之序耳可用於天下不足以用天下此之謂辯士一曲之人也夫用天下者必大通順序之道重意荀解蔽篇凡人之患蔽於一曲而闇於大理禮法數度形名比詳古人有之此下之所以事上非上之所以畜下也此事於羣才斯乃畜下也昔者舜問於堯曰天王之用心何如堯曰吾不敖無告無告者所謂頑民也敖五報反不廢窮民恒加恩也苦死者嘉孺子而哀婦人此吾所以用心已舜曰美則美矣而未大也堯曰然則何如舜曰天德而出寧與天合德則雖出而静日月照而四時行若晝夜之有經雲行而雨施矣此皆不爲而自然也施始䜴反堯曰膠膠擾擾乎自嫌有事膠膠交卯反司馬云和也擾擾而小反司馬云柔也案如注意膠膠擾擾動亂之貌子天之合也我人之合也夫天地者古之所大也而黃帝堯舜之所共美也故古之王天下者奚爲哉天地而已矣孔子西藏書於周室子路謀曰由聞周之徵藏史有老聃者免而歸居夫子欲藏書則試往因焉孔子曰善往見老聃而老聃不許於是繙十二經以老聃中其曰大謾願聞其要孔子曰要在仁義老聃曰請問仁義人之性邪孔子曰然君子不仁則不成不義則不生仁義眞人之性也又將奚爲矣老聃曰請問何謂仁義孔子曰中心物愷兼愛無私此仁義之情也此常人之所謂仁義者也故寄孔老以正之王往况反藏書司馬云藏其所著書也徴藏才浪反司馬云徴藏藏名也一云徴典也史藏府之史老聃吐甘反或云老聃是孔子時老子號也免而歸言老子見周之末不復可匡所以辭去也繙敷反徐又音盤又音煩司馬煩也十二經者云詩書禮樂易春秋六經又加六緯合爲十二經也一云易上下經并十翼爲十二又一云春秋十二公經也如字又始銳反絶句中丁仲反其如字絶句大音泰徐敕佐反謾末旦反郭武諌反物本亦作勿愷待反司馬云樂也老聃曰意幾乎後言夫兼愛不亦迂乎夫至仁者無愛而直前也意於其反司馬云不平聲也下同幾音機司馬本作頎云頎長也復言長也迂乎音于無私焉乃私也世所謂無私者釋已而愛人夫愛人者欲人之愛巳此乃甚私非忘公而公也夫子若欲使天下無失其牧乎則天地固有常矣日月固有明矣星辰固有列矣禽獸固有羣矣樹木固有立矣皆以自足牧司馬云牧養也夫子亦放德而行循道而趨已至矣不待於兼愛也放方往反又何偈偈乎揭仁義若擊鼔而求亡子焉無由得之偈偈居謁反又巨謁反或云用力之貌掲其謁反又音傑意夫子亂人之性也事至而愛當義而止斯忘仁義者也常念之則亂眞矣士成綺見老子而問曰吾聞夫子聖人也吾固不辭逺道而來願見百舍重趼而不敢息今吾觀子非聖人也䑕壤有餘言其不惜物也士成綺如字又魚反士成綺人姓名也見賢遍反下同百舍司馬云百日止也重直龍反研古顯反司馬云胝也胝音陟其反許愼云足指約中斷傷爲研餘所居反又音所司馬云讀曰糈糈粒也䑕壤內有遺餘之粒穢惡過甚也一云如䑕之堆壤餘益䟽外也而棄妹不仁也無近恩故曰弃弃妹一本作妹之者不仁釋名云妹末也謂末學之徒須慈誘之乃見弃薄不仁之甚也生熟不盡於前至足故恒有餘生熟司馬云生膾也一云生熟謂好惡也而積歛無崖萬物歸懷來者受之不小立界畔也積子亦反李子賜反歛力撿反李狸艶反老子漠然不應不以其言槩意士成綺明日復見曰昔者吾有刺於子今吾心正郤矣何故也自怪刺譏之心所以壞也復扶又反刺千賜反郤去逆反或云息也老子曰夫巧知神聖之人吾自以爲脫焉脫過去也巧苦教反又如字知音智脫徒活反注同昔者子呼我牛也而謂之牛呼我馬也而謂之馬隨物所名茍有其實人與之名而弗受有實故不以毀譽經心也譽音餘下同再受其殃一毀一譽若受之於心則名實俱累斯所以再受其殃也吾服也恒服服者容行之謂也不以毀譽自殃故能不變其容行如字吾非以服有服有爲爲之則不能恒服士成綺鴈行避影履行遂進而問脩身若何老子曰而容崖然進趨不安之貌而目衝然衝出之貌而顙頯然高露發美之貌顙頯上息黨反下去反本又作顯如字司馬本作而口闞然虓豁之貌闞郭許覽反又火斬反又火暫反虓火交反豁火括反而狀義然蝭跂自持之貌踶直氏反去氏反似繫馬而止也志在奔馳動而持不能自舒放也發也機趣舎速也察而審明是非也知巧而覩於泰泰者多於本性之謂也巧於見泰則拙於抱朴凡以爲不信凡此十事以爲不信性命而蕩夫毁譽皆非脩身之道也邊竟有人焉其名爲竊亦知汝所行非正人也邊竟音境有人焉其名爲竊邊陲之人不聞知禮樂之正縱有言語偶會墳典皆是竊盗所得其道何足語哉司馬云言逺方甞有是人老子曰夫道於大不終於小不遺故萬物備廣廣乎其無不容也淵乎其不可測也形德仁義神之末也非至人孰能定之夫至人有世不亦大乎而不足以爲之累用世故不患其大也天下奮棅而不與之偕静而順之棅音柄司馬云威權也李丑倫反一本作審乎無假而不與利遷任眞而直往也極物之眞能守其本故外天地遺萬物而神未甞有所困也通乎道合乎德退仁義進道德也賓禮樂以情性爲主也至人之心有所定矣定於無爲也世之所貴道者書也書不過語語有貴也語之所貴者意也意有所隨意之所隨者不可以言傳也而世因貴言傳書世雖貴之哉猶不足貴也爲其貴非其貴也其貴恒在意言之表傳大專反後同爲于僞反故視而可見者形與色也聽而可聞者名與聲也悲夫世人以形色名聲爲足以得彼之情夫形色名聲果不足以得彼之情得彼情唯言遺書者耳則知者不言言者不知而世豈識之哉此絶學去尚之意也知如字下同或並音智去起吕反桓公讀書於堂上輪扁斵輪於堂下釋椎鑿而上問桓公曰敢問公之所讀爲何言邪公曰聖人之言也曰聖人在乎公曰巳死矣曰然則君之所讀者古人之糟魄已夫桓公曰寡人讀書輪人安得議乎有則可無則死輪扁曰臣也以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪此言物各有性教學之無益也桓公李云齊桓公也名小白輪扁音篇又符殄反司馬云斵輪人也名扁斵陟角反椎直追反上時掌反糟音遭李云酒滓也魄普各反司馬云爛食曰魄一云糟爛爲魄本又作粕因同許愼云粕巳漉麄糟也或普白反謂魂魄也巳夫音符絶句或如字甘如字又音酣司馬云甘者緩也苦者急也數李云色注反數術也古之人與其不可傳也死矣然則君之所讀者古人之糟魄已夫當古之事巳㓕於古矣雖或傳之豈能使古在今哉古不在今今事巳變故絶學任性與時變化而後至焉人與如字又一音餘傳直專反注同莊子外篇天運第十四音義曰以義名篇天運司馬作天貟天其運乎不運而自行也運爾雅云運徙也廣雅云轉也地其處乎不處而自止也日月其爭於所乎不爭所而自代謝也孰主張是孰維綱是皆自爾孰居無事推而行是無則無所能推有則各自有事然則無事而推行是者誰乎哉各自行耳推如字一音吐回反司馬本作誰意者其有機緘而不得已邪意者其運轉而不能自止邪自爾故不可知也緘古咸反徐古䧟反司馬本作咸云引也雲者爲乎者爲雲乎二者倶不能相爲各自爾也爲于僞反下及注同孰隆施是孰居無事淫樂而勸是風起北方一西一東有上彷徨孰嘘吸是孰居無事而披拂是敢問何故設問所以自爾之故施音弛式氏反樂音洛又音嶽勸司馬本勸作倦云讀曰隨言誰無所作主隨天往來運轉無巳也上時掌反彷薄皇反徨音皇司馬本作旁皇云旁皇颷風也嘘音虚吸許急反披芳皮反拂芳弗反郭扶弗反披拂風貌司馬本作翇巫咸祒曰來吾語女天有六極五常夫物事之近或知其故然尋其原以至乎極則無故而自爾也自爾則無所稍問其故也但當順之巫咸招赤遥反郭音條又音紹李云巫咸殷相也祒寄名也語魚㩀反女音汝後皆同六極司馬云四方上下也帝王順之則治逆之則凶夫假學可變而天性不可逆也九洛之事治成德備監照下土天下載之此謂上皇順其自爾故也商大宰蕩問仁於莊子莊子曰虎狼仁也曰何謂也莊子曰父子相親何爲不仁曰請問至仁莊子曰至仁無親無親者非薄惡之謂也夫人之一體非有親也而首自在上足自處下府藏居內皮毛在外外內上下尊卑貴賤於其體中各任其極而未有親愛於其間也然至仁足矣故五親六族賢愚逺近不失分於天下者理自然也又奚取於有親哉大音泰下文大息同宰蕩司馬云商未也大宰官也蕩字也藏才浪反大宰曰蕩聞之無親則不愛不愛則不孝謂至仁不孝可乎莊子曰不然夫至仁尙矣孝固不足以言之必言之於忘仁忘孝之地然後至矣蕩一本蕩作盈崔本同或云盈太宰字此非過孝之言也不及孝之言也凡名生於不及者故過仁孝之名而渉乎無名之境然後至焉夫南行者至於郢北靣而不見㝠山是何也則去之逺也冥山在乎北極而南行以觀之至仁在乎無親而仁愛以言之故郢雖見而愈逺冥山仁孝雖彰而愈非至理也郢以井反又以政反楚都也在江陵北冥司馬云北海山名逺于萬反故曰以敬孝易以愛孝難以愛孝易而忘親難忘親易使親忘我難使親忘我易兼忘天下難兼忘天下易使天下兼忘我難夫至仁者百節皆適則終日不自識也聖人在上非有爲也恣之使各自得而巳耳自得其爲則衆務自適羣生自足天下安得不各自忘我哉各自忘矣主其安在乎斯所謂兼忘也易以䜴反下皆同夫德遺堯舜而不爲也遺堯舜然後堯舜之德全耳若係之在心則非自得也利澤施於萬世天下莫知也泯然常適豈太息而言仁孝乎哉失於江湖乃思濡沫夫孝悌仁義忠信貞廉此皆自勉以役其德者也不足多也故曰至貴國爵并焉并者除弃之謂也夫貴在於身身猶忘之况國爵乎斯貴之至也并必領反弃除也至富國財并焉至富者自足而巳故除天下之財也至願名譽并焉所至願者適也得適而仁孝之名都去矣是以道不渝去華取實故也北門成問於黃帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩黙黙乃不自得不自得坐忘之謂也北門成人姓名也懼如字或音句下同一本作戄音况縛反案文懼是正字戄古文帝曰女殆其然哉吾奏之以人徴之以天行之以禮義建之以太清由此觀之知夫至樂者非音聲之謂也必先順乎天應乎人得於心而適於性然後發之以聲奏之以曲耳故咸池之樂必待黃帝之化而後成焉徴如字古本多作微大音泰夫至樂者先應之以人事順之以天理行之以五德應之以自然然後調理四時太和萬物四時迭起萬物循生一盛一衰文武倫經一清一濁隂陽調和流光其聲自然律吕以滿天地之間但當順而不奪則至樂全迭大節反一本作遞大計反蟄蟄始作吾驚之以雷霆因其自作而用其所以動蟄沈執反郭音執爾雅云静也霆音廷又音挺徒佞反電也其卒無尾其始無首運轉無極一死一生一僨一起所常無窮以變化爲常則所常者無窮也僨方問反司馬云仆也而一不可待女故懼也聞無窮之變不能待之以一故懼然悚聽吾又奏之以隂陽之和燭之以日月之明所謂用天之道其聲能短能長能柔能剛變化齊一不主故常齊一於變化故不主故常在谷滿谷在阬滿阬至樂之道無不周也阬苦庚反爾雅云虚也郤守神塞其兊也郤去逆反與義同兊徒外反以物爲量大制不割量音亮其聲揮綽所謂闡諧其名高明名當其實則高明也是故神守其幽不離其所離力智反日月星辰行其紀不失其度吾止之於有窮常在極上住也流之於無止隨變而往也子欲慮之而不能知也望之而不能見也逐之而不能及也故闇然恣使化去儻然立於四虚之道弘敞無偏之謂儻敕黨反一音敞倚於槁梧而吟無所復爲也倚於綺反槁枯老反目知窮乎所欲見力屈乎所欲逐吾旣不及巳夫言物之知力各有所齊限知音智齊才細反形充空虚乃至委蛇女委蛇故怠夫形充空虚無身也無身故能委蛇委蛇任性而悚懼之情怠也委於危反徐如字蛇以支反又作施徐音絶吾又奏之以無怠之聲意旣怠矣乃復無怠此其至也調之以自然之命命之所有者非爲也皆自然耳故若混逐叢生混然無係隨叢而生叢才公反林樂而無形至樂者適而巳適在體中故無别形樂音洛亦如字布揮而不曵自布耳揮音輝廣雅云振也幽昏而無聲所謂至樂動於無方夫動者豈有方而後動哉居於窈冥所謂寧極窈烏了反或謂之死或謂之生或謂之實或謂之榮行流散徙不主常聲隨物變也世疑之稽於聖人明聖人應非也唱也稽古兮反聖也者逹於情而遂於命也故有情有命者莫不資焉天機不張而五官皆備此之謂天樂忘樂而樂足非張而後備無言而心心在適不在言也音恱注同故有焱氏爲之頌曰聽之不聞其聲視之不見其形充滿天地苞裹六極女欲聽之而無接焉而故惑也此乃無樂之樂樂之至也焱必遥反本亦作炎苞音包本或作包樂也者始於懼懼故祟懼然竦聽故是祟耳未大和也崇雖遂反吾又次之以怠怠故遁迹稍㓕也卒之於惑惑故愚愚故道道可載而與之俱也以無知爲愚愚乃至也孔子西遊於衛顔淵問師金曰以夫子之行爲奚如師金曰惜乎而夫子其窮哉顔淵曰何也師金曰夫芻狗之未陳也盛以篋巾以文繡尸祝齊戒以將之及其巳陳也行者踐其首脊蘇者取而㸑之而已將復取而盛以篋巾以文繡遊居寢臥其下彼不得夢必且數焉廢弃之物於時無用則更致他妖也師金李云師魯大師也金其名也行下孟反芻狗李云結芻爲狗巫祝用之盛音成下同篋苦牒反本或作筐延善反郭怡靣反李云笥也盛狗之物也司馬云合也齊戒側皆反本亦作齋蘇李云蘇草也取草者得以炊也案方言云江淮南楚之間謂之蘇史記云樵蘇後㸑注云蘇取草也㸑七丸反復扶又反且如字徐子餘反數音朔李音米又音美字林云物入眼爲病也司馬云厭也音一琰反今而夫子亦取先王巳陳芻狗取弟子遊居寢臥其下故伐樹於宋削迹於衛窮於商周是非其夢邪圍於陳蔡之間七日不火食死生相與鄰是非其眯邪此皆絶聖棄知之意耳無所稍嫌也夫先王典禮所以適時用也時過而不弃即爲民妖所以興矯效之端也夫水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸則没世不行尋常古今非水陸與周魯非舟車與今蘄行周於魯是猶推舟於陸也勞而無功身必有殃彼未知夫無方之傳應物而不窮者也時移世異禮亦宜變故因物而無所係焉斯不勞而有功也推郭吐回反又如字下同與音餘下曰蘄音祈求也無方之傳直專反下注同司馬云方常也且子獨不見夫桔橰者乎引之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人故夫三皇五帝之禮義法度不矜於同而矜於治期於合時冝應治體而巳桔音結橰音羔治直吏反注同故譬三皇五帝之禮義法度其猶柤棃橘柚邪其味相反而皆可於口故禮義法度者應時而變者也彼以爲美而此或以爲故當應時而變然後皆適也柤側加反抽由救反今取猨狙而衣以周公之服彼必齕齧挽裂盡去而後慊觀古今之異猶猨狙之異乎周公也故西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美矉而不知矉之所以美况夫禮義當其時而用之則西施也時過而不棄則醜人也猨音狙七餘反衣於旣反齕音紇挽音晚去起吕反慊苦牒反李云足也本亦作嗛音同矉徐扶真反又扶人反通俗文云蹙頞曰矉其里絶句捧敷勇反郭音奉挈苦結反惜乎而夫子其窮哉孔子行年五十有一而不聞道乃南之沛見老聃老聃曰子來乎吾聞子北方之賢者也子亦得道乎孔子曰未得也老子曰子惡乎求之哉曰吾求之於度數五年而未得也老子曰子又惡乎求之哉曰吾求之於隂陽十有二年而未得此皆寄孔老以明絶學之義也沛音貝司馬云老子陳國相人相今屬苦縣與沛相近惡音烏下同老子曰然使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以吿人則人莫不吿其兄弟使道而可以與人則人莫不與其子孫然而不可者無他也中無主而不止心中天受道之質則雖聞道而過去也外無正而不行中無主則外物亦無正已者也故未嘗通也由中出者不受於外聖人不出由中岀者聖人之道也外有能受之者乃出耳由外入者無主於中聖人不隱由外入者假學以成性者也雖由假學成然要當內有其質若無主於中則無以藏聖道也名公器也夫名者天下之所共用名公器釋名云名鳴也名平也器用也尹文子云名有三科一曰命物之名方圜是也二曰毀譽之名善惡是也三曰况謂之名愛憎是也凡此是毀譽之名也不可多取矯飾過實多取者也多取而天下亂也仁義先王之蘧廬也猶傳舍也蘧音渠司馬郭云蘧廬猶傳舍也止可以一而不可久處覯而多責夫仁義者人之性也人性有變古今不同也故遊寄而過去則冥若無滯而係於一方則見見則僞生僞生而責多矣覯古候反見也遇也古之至人假道於仁託於義隨時而變無常迹也以遊逍遥之虚食於苟簡之田立於不貸之圃逍遥無爲也有爲則非仁義虚音墟本亦作墟苟簡王云苟且也簡略也司馬本簡作間云分別也貸敕敗反司馬云施惠也圃音苟簡易養也且從其簡故易養也易以䜴反注同不貸無出也不貸者不損巳以爲物也爲于僞反古者謂是采眞之遊遊而任之則眞采也采眞則色不僞矣以富爲是者不能讓祿以顯爲是者不能讓名親權者不能與人柄天下未有以所非自累者而各没命於所是所是而以没其命者非立乎不貸之圃也操之則慄舍之則悲舍之悲者操之不能不慄也操七刀反舍音捨注同而一無所鑒以闚其所不休者是天之戮民也言其知進而不知止則性命䘮矣所以爲戮䘮息浪反怨恩取與諌教生殺八者正之器也唯循大變無所湮者爲能用之故曰正者正也其心以爲不然者天門弗開矣守故不變則失正矣湮音因李云塞也亦滯也郭音煙又烏節反司馬本作歅疑也簡文作甄云隔也天門一云謂心也一云大道也孔子見老聃而語仁義老聃曰夫播穅眯目則天地四方易位矣蚊虻膚則通昔不寐矣外物加之雖小而傷性巳大也播甫佐反又彼我反穅音康字亦作康蚊音文字亦作蟁虻音盲字亦作蝱替子盍反郭子合反司馬云齧也通昔昔夜也夫仁義然乃憤吾心亂莫大焉尚之以加其性故亂七惑反憤扶粉反本人作憒古內反吾子使天下無失其朴質全而仁義著吾子亦放風而動揔德而立矣風自動而依之徳自立而秉之斯易持易行之道也放方往反風而動司馬云放依也依無爲之風而動也易持易行並以䜴反又奚傑然若建鼔而求亡子者邪言夫掲仁義以趨道德之鄕其猶擊鼓而求逃者無由得也傑郭居竭反又居謁反巨竭反掲其列其謁二反夫鵠不日浴而白烏不日黔而黑自然各已足鵠本又作鶴同胡洛反黔巨淹反徐其金反司馬云黒也黑白之朴不足以爲辯俱自然耳無所偏尚名譽之觀不足以爲廣夫至足者忘名譽忘名譽乃廣耳觀古亂反司馬本作讙泉涸魚相與處於陸相呴以濕相濡以沬言仁義之譽皆生於不足涸胡洛反呴况付反又况于反濡如主反又如羽反沬音末不若相忘於江湖斯乃忘仁而仁者也相忘並如字孔子見老聃歸三日不談弟子問曰夫子見老聃亦將何規哉孔子曰吾乃今於是乎見龍龍合而成體散而成章謂老聃能變化不談本亦作不言乗乎雲氣而養乎隂陽言其因御無方自然巳足予口張而不能嗋予又何規老聃哉子貢曰然則人固有尸居而龍見雷聲而淵黙發動如天地者乎賜亦可得而觀乎遂以孔子聲見老聃老聃方將倨堂而應微曰予年運而往矣子將何以戒我乎子貢曰夫三王五帝之治天下不同其係聲名一也而先生獨以爲非聖人如何哉老聃曰小子少進子何以謂不同對曰堯授舜舜授禹禹用力而湯用兵文王順紂而不敢逆武王逆紂而不肯順故曰不同老聃曰小子少進余語女三王五帝之治天下黃帝之治天下使民心一民有其親死不哭而民不非也若非之則強哭脅許劫反合也見賢遍反賜亦本又作賜也倨居慮反跂也三王本或作三皇依注作王是也餘皆作三皇語魚據反下同強其丈反堯之治天下使民心親民有爲其親殺其殺而民不非也殺降也言親䟽有降殺僞于僞反殺其殺並所戒反降也注同舜之治天下使民心競民孕婦十月生子子生五月而能言教之速也孕以證反不至乎孩而始誰誰者別人之意也未孩巳擇人言其競教速成也孩亥才反文云也别彼列反下同則人始有天矣不能同彼我則心競於親䟽故不終其天年也禹之治天下使民心變人有心而兵有順此言兵有順則天下巳有不順故也殺盗非殺盗自應死殺之順也故非殺人自爲種而天下耳不能大齊萬物而人人自別斯人自爲種也承百代之流而會乎當今之變其弊至於斯者非禹也故曰天下耳言聖知之迹非亂天下而天下必有斯亂種章勇反註同是以天下大駭儒墨皆起此乃百代之弊駭胡楷反其作始有倫而今乎婦女今之以女爲婦而上下悖逆者非作始之無理但至理之弊遂至於此何言哉弊生於理故無所復言復扶又反余語女三皇五帝之治天下名曰治之而亂莫甚焉必弊故也三皇之知上悖日月之明下睽山川之精中墮四時之施其知㦧於蠆之尾鮮規之獸莫得安其性命之情者而猶自以爲聖人不可耻乎其無耻也子貢蹵蹵然立不安子貢本謂老子獨經三王故欲同三王於五帝耳今又見老子通毀五帝上及三皇則失其所以爲談矣知音智下同悖對反睽苦圭反又音圭乖也墮許規反施式䜴反七感反敕邁反又音例本又作厲郭音頼又敕界反蠆許謁反或敕邁反或云依字上當作蠆下當作蠍通俗文云長尾爲蠆短尾爲蠍鮮規之獸李云鮮規明貌一云小蟲也一云小獸也蹵子六反孔子謂老聃曰丘治詩書禮樂易春秋六經自以爲久矣孰知其故矣以奸者七十二君論先王之道而明周召之迹一君無所鉤用甚矣夫人一之難也道之難明邪老子曰幸矣子之不遇治世之君也夫六經先王之陳迹也豈其所以迹哉所以迹者眞性也夫任物之眞性者其迹則六經也奸音干三蒼云犯也鉤取也矣夫音符篇末同始銳反治直吏反今子之所言猶迹也夫迹履之所出而迹豈履哉况今之人事則以自然爲履六經爲迹夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應於下風而化鶂以眸子相視蟲以鳴聲相應俱不待合而便生子故曰風化鶂五歷反三蒼云鶬鶂也司馬云鳥子也相視眸茂侯反子不運而風化司馬云相待風氣而化生也又云相視而成隂陽蟲雄鳴於上風雌應於下風而化一本作而風化司馬云雄者黿雌者鼈自爲雌雄故風化夫同之雌雄各自有以相感相感之異不可勝極苟得其其化不難故乃有遥感而風化也自爲雌雄故風化或云方之物猶如草木異種而同也山海經云亶爰之山有獸焉其狀如狸而有髮其名曰師帶山有鳥其狀如鳯五采文其名曰奇皆自牝牡也勝音升性不可易命不可變時不可止道不可壅故至人皆順而通之壅於勇反苟得於道無自而不可雖化者無方而皆可也失焉者無自而可所在皆不可也孔子不出三月復見曰丘得之矣烏鵲孺魚傅沫細要者化言物之自然各有性也復扶又反見賢遍反又如字烏鵲孺如喻反李云孚乳而生也傅音附又音付本亦作傳直專反沬音末司馬云傳沬者以沫相育也一云傳口中沫相與而生子也細要一遥反者化蜂之屬也司馬去取桑蟲祝使似已也案即詩所謂螟蛉有子果贏之有弟而兄啼言人之性舎長而視㓜故啼也舎音捨長張丈反久矣夫丘不與化爲人不與化爲人安能化人夫與化爲人者任其自化者也若繙六經以則䟽也老子曰可丘得之矣南華眞經卷第五
