  - {type: punctuation, offset: 7854, content: /, id: KR5c0051_krp_003-bkkpn875}
  - {type: variant, offset: 7854, length: 1403, content: 欲釋之而理固自來斯乃天人之所不赦者也雖然吾與汝共之雖爲世所桎梏但爲與汝共之耳明巳恒自在外也子貢曰敢問其方問所以遊外而共內之意孔子曰魚相造乎水人相造乎道相造乎水者穿池而養給相造乎道者無事而生定所造雖異其於由無事以得事自方外以共內然後養給而生定則莫不皆然也倶不自知耳故成無爲也造七報反詣也下同池本亦作地崔同故曰魚相忘乎江湖人相忘乎道術各自足而相忘者天下莫不然也至人常足故常忘也忘音亡下同子貢曰敢問畸人問向之所謂方外而不耦於俗者又安在也畸人居宜反司馬云不耦也不耦於人謂闕於禮教也李其宜反言奇異也曰畸人者畸於人而侔於天夫與內冥者遊於外也獨能遊外以冥內任萬物之自然使天性各足而帝王道成斯乃畸於人而侔於天也侔音謀司馬云等也亦從也故曰天之小人人之君子人之君子天之小人也以自然言之則人無小大以人理言之則侔於天者可謂君子矣顔回問仲尼曰孟孫才其母死哭泣無涕中心不慼居䘮不哀無是三者以善䘮蓋魯國固有無其實而得其名者乎回一怪之魯國觀其禮而顔回察其心孟孫才李云三後才其名也崔云才或作牛仲尼曰夫孟孫氏盡之矣進於知矣盡死生之理應內外之宜者動而以天行非知之匹也應應對之應唯簡之而不得簡擇死生而不得其異若春秋冬夏四時行耳夫已有所簡矣孟孫氏不知所以生不知所以死巳簡而不得故無不安無不安故不以生死槩意而付之自化也不知就先不知就後所遇而安若化爲物不違化也以待其所不知之化巳乎死生宛轉與化爲一猶乃忘其所知於當今豈待所未知而豫憂者哉且方將化惡知不化哉方將不化惡知巳化哉巳化而生焉知未生之時哉未化而死焉知巳死之後哉故無所避就而與化倶生也惡音烏下同焉於䖍反下皆同吾特與汝其夢未始覺者邪夫死生猶覺夢耳今夢自以爲覺則無以明覺之非夢也苟無以明覺之非夢則亦無以明生之非死矣死生覺夢未知所在當其所遇無不自得何爲在此而憂彼哉覺古孝反注下皆同且彼有駭形而無損心以變化爲形之駭動耳故不以死生損累其心駭形如字崔作咳云有嬰兒之形有旦宅而無情死似形骸之變爲旦宅之日新耳其情不以爲死旦宅並如字王云旦暮改易宅是神居也李本作怛㤞上丹末反下陟嫁反云驚惋之貌崔本作靼宅靼怛也孟孫氏特覺人哭亦哭是自其所以乃夫常覺者無往而有逆也故人哭亦哭正自是其所宜也乃崔本作惡且也相與吾之耳矣夫死生變化吾皆吾之旣皆自吾吾何失哉未始失吾吾何憂哉無逆故人哭亦哭無憂故哭而不哀庸詎知吾所謂吾之乎靡所不吾也故玄同外內彌貫古今與化日新豈知吾之所在也詎其庶反下章同且汝夢爲鳥而厲乎天夢爲魚而没於淵言無往而不自得也不識今之言者其覺者乎其夢者乎夢之時自以爲覺則焉知今者之非夢邪亦焉知其非覺邪覺夢之化無往而不可則死生之變無時而足惜也造適不及獻不及排所造皆適則忘適矣故不及也排者推移之謂也夫禮哭必哀獻必樂哀樂存懷則不能與適推移矣今孟孫常適故哭而不哀與化倶往也造七報反注同獻向云獻善也王云章也意有適章於故曰獻排皮皆反樂音洛下同安排而去化乃入於寥天一安於推移而與化倶去故乃入於寂寥而與天爲一也自此以上至于子祀其致一也所執之䘮異故歌哭不同寥本亦作廖力彫反李良救反天一崔本作造敵不及獻不及安排而造化不及不及雄漂淰雄漂㑫不及簟筮簟筮乃入於漻天一上時掌反意而子見許由許由曰堯何以資汝資者給濟之謂意而子李云賢士也資給也意而子曰堯謂我汝必躬服仁義而明言是非許由曰而奚來爲軹夫堯旣已黥汝以仁義而劓汝以是非矣汝將何以遊夫遥蕩恣睢轉徙之乎言其將以形教自虧殘而不能復遊夫自得之塲無係之也軹之是反郭之忍反崔云軹辭也李云是也黥其京反劓魚器反李云毀道德以, ZTDZ: ''}
