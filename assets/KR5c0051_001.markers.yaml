  - {type: variant, offset: 13031, length: 1533, content: 未始有封也雖未都忘猶能忘其彼此其次以爲有封焉而未始有是非也雖未能忘彼此猶能忘彼此之是非也是非之彰也道之所以虧也無是非乃全也道之所以虧愛之所以成道虧則情有所偏而愛有所成未能忘愛釋私玄同彼我也果且有成與虧乎哉果且無成與虧乎哉有之與無斯不能知乃至有成與虧故昭氏之鼔琴也無成與虧故昭氏之不鼔琴也夫聲不可勝舉也故吹管操弦雖有繁手遺聲多矣而執籥鳴弦者欲以彰聲也彰聲而聲遺不彰聲而聲全故欲成而虧之者昭文之鼔琴也不成而無虧者昭文之不鼔琴也勝音升操七刀反籥羊灼反昭文司馬云古善琴者昭文之鼔琴也師曠之枝策也惠子之據梧也三子之知幾乎幾盡也夫三子者皆欲辨非巳所明以明之故知盡慮窮形勞神倦或枝策假寐或據梧而暝枝策司馬云枝杜也策杖也崔云舉杖以擊節梧音吾司馬云梧琴也崔云琴瑟也知音智暝亡千反皆其盛者也故載之末年賴其盛故能久不爾早困也故載之未年崔云書之於今也唯其好之也以異於彼言此三子唯獨好其所明自以殊於衆人其好之也欲以明之明示衆人欲使同乎我之所好彼非所明而明之故以堅白之昧終是猶對牛鼔簧耳彼竟不明故巳之道術終於昧然也堅白司馬云謂堅石白馬之辨也又云公孫龍有卒劒之法謂之堅白崔同又云或曰設矛伐之爲堅辨白馬之名爲白簧音黄而其子又以文之綸終終身無成昭文之子又乃終文之緒亦卒不成綸音倫崔云琴瑟弦也若是而可謂成乎雖我亦成也此三子雖求明於彼彼竟不明所以終身無成若三子而可謂成則雖我之不成亦可謂成也若是而不可謂成乎物與我無成也物皆自明而不明彼若彼不明即謂不成則萬物皆相與無成矣故聖人不顯此以耀彼不捨巳而逐物從而任之各冥其所能故曲成而不遺也今三子欲以巳之所好明示於彼不亦妄乎是故滑疑之耀聖人之所圖也爲是不用而寓諸庸此之謂以明夫聖人無我者也故滑疑之耀則圖而域之恢恑橘怪則通而一之使羣異各安其所安衆人不失其所是則巳不用於物而萬物之用用矣物皆自用則孰是孰非哉故雖故蕩之變屈奇之異曲而從之寄之自用則用雖萬珠歷然自明滑古没反司馬云亂也屈求物反今且有言於此不知其與是乎其與是不乎與不相與爲則與彼無以異矣今以言無是非則不知其與言有者乎不乎欲謂之則我以無爲是而彼以無爲非斯不矣然此雖是非不同亦固未免於有是非也則與彼矣故曰與不又相與爲則與彼無以異也然則將大不莫若無心旣遣是非又遣其遣遣之又遣之以至於無遣然後無遣無不遣而是非自去矣雖然請甞言之至理無言言則與故試言之有始也者有始則有終有未始有始也者謂無終始而一死生有未始有夫未始有始也者夫一之者未若不一而自齊斯又忘其一也有有也者有有則美惡是非具也有無也者有無而未知無無也則是非好惡猶未離懷好惡並如字離力智反有未始有無也者知無無矣而猶未能無知有未始有夫未始有無也者俄而有無矣而未知有無之果孰有孰無也此都忘其知也爾乃俄然始了無耳了無則天地萬物彼我是非豁然斯也俄徐音峩斯苦角反斯又作澌音賜字思利反今我則巳有謂矣謂無是非即復有謂復扶又反而未知吾所謂之其果有謂乎其果無謂乎又不知謂之有無爾乃蕩然無纎芥於胷中也芥古邁反又音界天下莫大於秋豪之末而大山爲小莫壽乎殤子而彭祖爲天地與我並生而萬物與我爲一夫以形相對則大山大於秋豪也若各㩀其性分物冥其極則形大未爲有餘形小不爲不足苟各足於其性則秋豪不獨小其小而太山不獨大其大矣若以性足爲大則天下之足未有過於秋豪也若性足者非大則雖太山亦可稱小矣故曰天下莫大於秋豪之末而太山爲小太山爲小則天下無大矣秋豪爲大則天下無小也無小無大無壽無夭是以蟪蛄不羡大椿而欣然自得斥鴳不貴天池而榮願以足苟足於天然而安其性命故雖天地未足爲壽而與我並生萬物未足爲異而與我同得則天地之生又何不並萬物之得又何不一哉秋豪如字依字應作豪司馬云兎毫在秋而成王逸任楚辭云銳毛也案毛至秋而耎細故以喻小也大山音泰殤子短命者也或云年十九以下爲殤旣巳爲一矣且得有言乎萬物萬形同於自得其得一也巳自一矣理無所言旣, ZTDZ: ''}
