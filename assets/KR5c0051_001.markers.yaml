  - {type: variant, offset: 184, length: 458, content: 自得故極小大之致以明性分之適逹觀之士冝要其會歸而遺其所不足事事曲與生自不害其弘㫖皆可略之北冥本亦作溟覔經切北海也嵇康云取其溟溟無涯也梁簡文帝云窅冥無極故謂之冥東方朔十洲記云水黒色謂之冥海無風洪波百丈鯤徐音昆李侯温反大魚名也崔譔云鯤當爲鯨簡文同幾居豈反下同鵬歩登反徐音朋郭甫登反崔音鳳云鵬即古鳳字非來儀之鳳也文云朋及鵬皆古文鳳字也朋鳥象形鳳飛羣鳥從以萬數故以鵬爲朋黨字字林云鵬朋黨也古以爲鳳字夫音符發句之端皆同分符問反下皆同觀古亂反要一遥反鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南冥南冥者天池也非冥海不足以運其身非九萬里不足以其翼此豈好奇哉直以大物必自生於大處大處亦必自生此大物理固自然不患其失又何措心於其間哉垂天之雲司馬彪云若雲垂天旁崔云垂猶邊也其大如天一靣雲也海運司馬云運轉也向秀云非海不行故曰海運簡文云運徙也好呼報反下皆同處昌慮反下同厝七故反本又作措齊諧者志怪者也諧之言曰鵬之徙於南冥也水擊三千里搏扶揺而上者九萬里夫翼大則難舉故搏扶搖而後能上九萬里乃足自勝耳旣有斯翼豈得决然而起數仞而下哉此皆, ZTDZ: ''}
