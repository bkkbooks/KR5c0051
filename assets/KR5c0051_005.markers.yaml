  - {type: variant, offset: 17740, length: 2, content: 南華, HFL: 外篇刻意第十五刻意尚行離世異俗高論怨誹爲亢而已矣此山谷之士非世之人枯稿赴淵者之所好也語仁義忠信恭儉推讓爲修而已矣此平世之士教誨之人遊居學者之所好也語大功立大名禮君臣正上下爲治而已矣此朝廷之士尊主强國之人致功井兼者之所好也就藪澤處間曠釣魚間處無爲而已矣此江海之士避世之人間暇者之所好也吹呴呼吸吐故納新熊經鳥申爲壽而已矣此導引之士養形之人彭祖壽考者之所好也若夫不刻意而高無仁義而修無功名而治無江海而間不導引而壽無不忘也無不有也澹然無極而衆美從之此天地之道聖人之德也故曰夫恬惔寂寞虚無無爲此天地之平而道德之質也故曰聖人休休焉則平易矣平易則恬惔矣平易恬惔則憂患不能入邪氣不能襲故其德全而神不虧故曰聖人之生也天行其死也物化靜而與陰同德動而與陽同波不爲福先不爲禍始感而後應迫而後動不得已而後起去知與故循天之理故無天灾無物累無人非無鬼責其生若浮其死若休不思慮不豫謀光矣而不耀信矣而不期其寢不夢其覺無憂其神純粹其魂不罷虚無恬惔乃合天德故曰悲樂者德之邪喜怒者道之過好惡者德之失故心不憂樂德之至也一而不變靜之至也無所於忤虚之至也不與物交淡之至也無所於逆粹之至也故曰形勞而不休則弊精用而不已則勞勞則竭水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也故曰純粹而不雜靜一而不變淡而無爲動而以天行此養神之道也夫有干越之劍者柙而藏之不敢用也寳之至也精神四達並流無所不極上際於天下蟠於地化育萬物不可爲象其名爲同帝純素之道唯神是守守而勿失與神爲一一之精通合于天倫野語有之曰衆人重利廉士重名賢士尚志聖人貴精故素也者謂其無所與雜也純也者謂其不虧其神也能體純素謂之}
