  - {type: variant, offset: 20510, length: 461, content: 無也字五行女汝下同十九葉一行注音有二十葉三行注衆異二十一葉六行注明服二十二葉十五行注自其二十三葉五行注百自六行注有若若有十五行注自目說恱下同二十四葉十六行注逐遂二十五葉一行薾二十九葉十三行注各可無各字三十葉十二行莫暮三十一葉十一行注我此三十三葉九行注遣俱作遺十一行注寄嘗十二行注池訛地三十五葉六行注忘亡八行注自辯辨已二字互異三十八葉九行注言之耳無耳字十五行注故試問女無故字三十九葉四行且蛆注略舉四者以明美惡之无主無略舉以之四字四十葉八行沍冱四十一葉七行熒十二行注夫不能無夫字四十二葉七行䐇脗注同九行注波十五行注去失四十三葉七行注不知下有所謂二字八行注而惡下無之字十六行注其於各得無於字四十四葉五行注大患夫患四十七葉五行注主至四十八葉七行棹停南華真經卷第一南華真經卷第二莊子内篇養生主第三郭象注一葉六行注而神氣自若而作其二葉二行手之所解所觸十三行注耳且十五行所見無非牛者無非全牛者注無其間二字三葉二行注順理理順四葉八行注拭訛試十六行注知其知之六葉一行注徃住十五行注火傳二字不重莊子而篇人間世第四郭象注九葉九行注苦十葉十五行聖, ZTDZ: 適}
