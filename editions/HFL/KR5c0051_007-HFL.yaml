front:
  text: 生第十九達生之情者不務生之所無以爲達命之情者不務知之所無奈何養形必先之以物物有餘而形不養者有之矣有生必先無離形形不離而生亡者有之矣生之來不能却其去不能止悲夫世之人以爲養形足以存生而養形果不足以存生則世奚足爲哉雖不足爲而不可不爲者其爲不免矣夫欲免爲形者莫如弃世棄世則無累無累則正平正平則與彼更生更生則幾矣事奚足弃而生奚足遺弃事則形不勞遺生則精不虧夫形全精復與天爲一天地者萬物之父母也合則成體散則成始形精不虧是謂能移精而又精反以相天子列子問關尹曰至人潜行不窒蹈火不熱行乎萬物之上而不慄請問何以至於此關尹曰是純氣之守也非知巧果敢之列居予語汝凡有貌象聲色者皆物也物與物何以相遠夫奚足以至乎先是色而已則物之造乎不形而止乎無所化夫得是而窮之者物焉得而止焉彼將處乎不淫之度而藏乎無端之紀遊乎萬物之所終始壹其性養其氣合其德以通乎物之所造夫若是者其天守全其神無郤物奚自入焉夫醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也乘亦不知也墜亦不知也死生驚懼不入乎其胸中是故選物而不慴彼得全於酒而猶若是而沉得全於天乎聖人藏於天故莫之能傷也復讎者不折鏌干雖有忮心者不怨飄瓦是以天下均平故無攻戰之亂無殺戮之刑者由此道也不開人之天而開天之天開天者德生開人者賊生不厭其天不忽於人民幾乎以其眞仲尼適楚出於林中見痀僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月累丸二而不墜則失者錙銖累三而不墜則失者十一累五而不墜猶掇之也吾處身也若橛株拘吾執臂也若槁木之技雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何爲而不得孔子顧謂弟子曰用志不分乃凝於神其痀僂文人之謂乎顔淵問仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學邪曰可善游者數能若乃夫没人則未嘗見舟而便操之也吾問焉而不吾告敢問何謂也仲尼曰善游者數能忘水也若乃夫没人之未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車却也覆却萬方陳乎前而不得入其舍惡往而不暇以瓦注者巧以鉤注者憚以黄金注者殙其巧一也而有所矜則重外也凡外重者内拙田開之見周威公威公曰吾聞祝腎學生吾子與祝腎遊亦何聞焉田開之曰閑之操拔篲以侍門庭亦何聞於夫子威公曰田子無讓寡人願聞之開之曰聞之夫子曰善養生者若牧羊然視其後者而鞭之威公曰何謂也田開之曰魯有單豹者巖居而水飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之有張毅者高門縣薄無不走也行年四十而有内熱之病以死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者也仲尼曰無入而藏無出而陽柴立其中央三者若得其名必極夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎人之所取畏者袵席之上飲食之間而不知爲之戒者過也祝宗人玄端以臨牢筴說彘曰汝奚惡死吾將三月㹖汝十日戒三日齊藉白茅加汝肩尻乎彫俎之上則汝爲之乎爲彘謀曰不如食以糠糟而錯之牢筴之中自爲謀則荀生有軒冕之尊死得於腞楯之上聚僂之中則爲之爲彘謀則去之自爲謀則取之所異彘者何也桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父何見對曰臣無所見公反誒詒爲病數日不出齊士有里子告敖者曰公則自傷鬼惡能傷公夫忿滀之氣散而不反則爲不足上而不下則使人善怒下而不上則使人善忘不上不下中身當心則爲病桓公曰然則有鬼乎曰有沈有履竈有髻户内之煩壤雷霆處之東北方之下者倍阿鮭蠪躍之西北方之下者則泆陽處之水有罔象丘有崒山有夔野有方皇澤有委蛇公曰請問委蛇之狀何如皇子曰委蛇其大如轂其長如轅紫衣而朱冠其爲物也惡聞雷車之聲則捧其首而立見之者殆乎霸桓公辴然而笑曰此寡人之所見者也於是正衣冠與之坐不終日而不知病之去也紀渻子爲王養鬭雞十日而問雞已乎曰未也方虚憍而恃氣十日又問曰未也猶應嚮景十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者已無變矣望之似木雞矣其德全矣異雞無敢應者反走矣孔子觀於吕梁縣水三十仞流沫四十里黿鼉魚鼈之所不能游也見一丈夫游之以爲有苦而欲死也使弟子並流而拯之數百步而出被髮行歌而游於塘下孔子從而問焉曰吾以子爲鬼察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齊俱入與汩偕出從水之道而不爲私焉此吾所以蹈之也孔子曰何謂始乎故長乎性成乎命曰吾生於陵而安於陵故也長於水而安於水性也不知吾所以然而然命也梓慶削木爲鐻鐻成見者驚猶鬼神魯侯見而問焉曰子何術以爲焉對曰臣工人何術之有雖然有一焉臣將爲鐻未嘗敢以耗氣也必齊以靜心齊三日而不敢懷慶賞爵禄齊五日不敢懷非譽巧拙齊七日輒然忘吾有四枝形體也當是時也無公朝其巧專而外滑消然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然則已則以天合天器之所以疑神者其是與東野稷以御見莊公進退中繩左右旋中規莊公以爲文弗過也使之鉤百而反顔闔遇之人見曰稷之馬將敗公密而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗工倕旋而蓋規矩指與物化而不以心稽故其靈臺一而不桎忘足履之適也忘要帶之適也知忘是非心之適也不内變不外從事會之適也始乎適而未嘗不適者忘適之適也有孫休者踵門而詫子扁慶子曰休居鄕不見謂不修臨難不見謂不勇然而田原不遇歲事君不遇世賔於鄕里逐於州部則胡罪乎天哉休惡遇此命也扁子曰子獨不聞夫至人之自行邪忘其肝膽遺其耳目芒然彷徨乎塵垢之外逍遥乎無事之業是謂爲而不恃長而不宰今汝飾知以驚愚修身以明汙昭昭乎若揭日月而行也汝得全而形軀具而九竅無中道天於聾盲跛蹇而比於人數亦幸矣又何暇乎天之怨哉子往矣孫子出扁子入坐有間仰天而歎弟子問曰先生何爲歎乎扁子曰向者休來吾告之以至人之德吾恐其驚而遂至於惑也弟子曰不然孫子之所言是邪先生之所言非邪非固不能惑是孫子所言非邪先生所言是邪彼固惑而來矣又奚罪焉扁子曰不然昔者有爲止於魯郊魯君悦之爲具太牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己養養鳥也若夫以鳥養養鳥者宜棲之深林浮之江湖食之以委蛇則平陸而已矣今休款啓寡聞之民也吾告以至人之德譬之若載鼷以車馬樂鴳以鐘鼓也彼又惡能無驚乎哉
