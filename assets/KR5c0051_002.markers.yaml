  - {type: variant, offset: 10030, length: 261, content: 乎神人無用於物而物各得自用歸功名於羣才與物冥而無迹故免人間之害處常美之實此支離其德也孔子適楚楚狂接輿遊其門曰鳳兮鳳兮何如德之衰也當順時直前盡乎會通之宜耳世之衰盛篾然不足覺故曰何如來世不可待往世不可追也趣當盡臨時之宜耳天下有道聖人成焉天下無道聖人生焉付之自爾而理自生成生成非我也豈爲治亂易節哉治自求成故遺成而不敗亂自求生故忘生而不死爲于僞反治直吏反下同方今之時僅免刑焉不瞻前顧後而盡當今之會冥然與時世爲一而後妙當可全刑名可免僅音覲福輕乎羽莫之知載足能行而放之手能執而任之聽耳之所聞視目之所見知止其所不知能止其所不能用其自用爲, ZTDZ: ''}
