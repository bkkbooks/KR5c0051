body:
  text: 雜篇寓言第二十七寓言十九重言十七巵言日出和以天倪寓言十九藉外論之親父不爲其子媒親父譽之不若非其父者也非吾罪也人之罪也與己同則應不與己同則反同於己爲是之異於己爲非之重言十七所以已言也是爲耆艾年先矣而無經緯本末以期年耆者是非先也人而無以先人無人道也人而無人道是之謂陳人卮言日出和以天倪因以曼衍所以窮年不言則齊齊與言不齊言與齊不齊也故曰無言言無言終身言未嘗言終身不言未嘗不言有自也而可有自也而不可有自也而然有自也而不然惡乎然然於然惡乎不然不然於不然惡乎可可於可惡乎不可不可於不可物固有所然物固有所可無物不然無物不可非巵言日出和以天倪孰得其乆萬物皆種也以不同形相禪始卒若環莫得其倫是謂天均天均者天倪也莊子謂惠子曰孔子行年六十而六十化始時所是卒而非之未知今之所謂是之非五十九非也惠子曰孔子勤志服知也莊子曰孔子謝之矣而其未之嘗言孔子云夫受才乎大本復靈以生鳴而當律言而當法利義陳乎前而好惡是非直服人之口而已矣使人乃以心服而不敢蘁立定天下之定已乎已乎吾且不得及彼乎曾子再仕而心再化曰吾及親仕三釜而心樂後仕三千鍾不洎吾心悲弟子問于仲尼曰若參者可謂無所縣其罪乎曰旣已縣矣夫無所縣者可以有哀乎彼視三釜三千鍾如觀雀蚊虻相過乎前也顔成子游謂東郭子綦曰自吾聞子之言一年而野二年而從三年而通四年而物五年而來六年而鬼入七年而天成八年而不知死不知生九年而大妙生有爲死也勸公以其死也有自也而生陽也無自也而果然乎惡乎其所適惡乎其所不適天有歷數地有人據吾惡乎求之莫知其所終若之何其無命也莫知其所始若之何其有命也有以相應也若之何其無鬼邪無以相應也若之何其有鬼邪衆罔兩問於影曰若向也俯而今也仰向也括而今也被髮向也坐而今也起向也行而今也止何也影曰叟叟也奚稍問也予有而不知其所以予蜩甲也蛇蜕也似之而非也火與日吾屯也陰與夜吾代也彼吾所以有待邪而況乎以有待者乎彼來則我與之來彼往則我與之往彼彊陽則我與之彊陽彊陽者又何以有問乎陽子居南之沛老聃西遊於秦邀於郊至於梁而遇老子老子中道仰天而歎曰始以汝爲可教今不可也陽子居不荅至舍進盥潄巾櫛脱履户外膝行而前曰向者弟子欲請夫子夫子行不間是以不敢今間矣請問其過老子曰而睢睢盱盱而誰與居大白若辱盛德若不足陽子居蹴然變容曰敬聞命矣其往也舍者迎將其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣雜篇讓王第二十八堯以天下讓許由許由不受又讓於子州支父子州支父曰以我爲天子猶之可也雖然我適有幽憂之病方且治之未暇治天下也夫天下至重也而不以害其生又況他物乎唯無以天下爲者可以託天下也舜讓天下於子州支伯子州支伯曰予適有幽憂之病方且治之未暇治天下也故天下大器也而不以易生此有道者之所以異乎俗者也舜以天下讓善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種形足以勞動秋收斂身足以休食日出而作日入而息逍遥於天地之間而心意自得吾何以天下爲哉悲夫子之不知余也遂不受於是去而入深山莫知其處舜以天下讓其友石户之農石户之農曰捲捲乎后之爲人葆力之士也以舜之德爲未至也於是夫負妻戴携子以入海終身不反也大王亶父居邠狄人攻之事之以皮帛而不受事之以大馬而不受事之以珠玉而不受狄人之所求者土地也大王亶父曰與人之兄居而殺其弟與人之父居而殺其子吾不忍也子皆勉居矣爲吾臣與爲狄人臣奚以異且吾聞之不以所用養害所養因杖筴而去之民相連而從之遂成國於岐山之下夫大王亶父可謂能尊生矣能尊生者雖貴富不以養傷身雖貧賤不以利累形今世之人居高官尊爵者皆重失之見利輕亡其身豈不惑哉越人三世弑其君王子搜患之逃乎丹穴而越國無君求王子搜不得從之丹穴王子搜不肯出越人薰之以艾乘以玉輿王子搜援綏登車仰天而呼曰君乎君乎獨不可以舍我乎王子搜非惡爲君也惡爲君之患也若王子搜者可謂不以國傷生矣此固越人之所欲得爲君也韓魏相與爭侵地子華子見昭僖侯昭僖侯有憂色子華子曰今使天下書銘於君之前書之言曰左手攫之則右手廢右手攫之則左手廢然而攫之者必有天下君能攫之乎昭僖侯曰寡人不攫也子華子曰甚善自是觀之兩臂重於天下也身亦重於兩臂韓之輕於天下亦遠矣今之所爭者其輕於韓又遠君固愁身傷生以憂戚不得也僖侯曰善哉教寡人者衆矣未嘗得聞此言也子華子可謂知輕重矣魯君聞顔闔得道之人也使人以幣先焉顔闔守陋閶直布之衣而自飯牛魯君之使者至顔闔自對之使者曰此顔闔之家與顔闔對曰此闔之家也使者致幣顔闔對曰恐聽者謬而遺使者罪不若審之使者還反審之復來求之則不得已故若顔闔者眞惡富貴也故曰道之眞以治身其緒餘以爲國家其土苴以治天下由此觀之帝王之功聖人之餘事也非所以完身養生也今世俗之君子多危身棄生以殉物豈不悲哉凡聖人之動作也必察其所以之與其所以爲今且有人於此以隨使之珠彈千仞之雀世必笑之是何也則其所用者重而所要者輕也夫生者豈特隨侯之重哉子列子窮容貌有飢色客有言之於鄭子陽者曰列御寇蓋有道之士也居君之國而窮君無乃爲不好士乎鄭子陽即令官遺之粟子列子見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞爲有道者之妻子皆得佚樂今有飢色君過而遺先生食先生不受豈不命邪子列子笑謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽楚昭王失國屠羊說走而從於昭王昭王反國將賞從者及屠羊說屠羊說曰大王失國說失屠羊大王反國說亦反屠羊臣之爵禄已復矣又何賞之有王曰强之屠羊說曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見之屠羊說曰楚國之法必有重賞大功而後得見今臣之知不足以存國而勇不足以死寇吴軍入郢說畏難而避寇非故隨大王也今大王欲廢法毁約而見說此非臣之所以聞於天下也王謂司馬子綦曰屠羊說居處卑賤而陳義甚高子其爲我延之以三旌之位屠羊說曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之禄吾知其富於屠羊之利也然豈可以貪爵禄而使吾君有妄施之名乎說不敢當願復反吾屠羊之肆遂不受也原憲居魯環堵之室茨以生草蓬户不完桑以爲樞而甕牖二室褐以爲塞上漏下濕匡坐而弦子貢乘大馬中紺而表素軒車不容巷往見原憲原憲華冠縱履杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色原憲笑曰夫希世而行比周而友學以爲人教以爲己仁義之慝輿馬之飾憲不忍爲也曾子居於衛緼袍無表顔色腫噲手足胼胝三日不舉火十年不製衣正冠而纓絶捉衿而肘見納履而踵决曳縱而歌商頌聲若出金石天子不得臣諸侯不得友故養志者忘形養形者忘利致道者忘心矣孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畒足以給飦粥郭内之田十畝足以爲絲麻鼓琴足以自娛所學夫子之道足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自累也審自得者失之而不懼行修於内者無位而不怍丘誦之乆矣今於回而後見之是丘之得也中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下柰何瞻子曰重生重生則利輕中山公子牟曰雖知之未能自胜也瞻子曰不能自勝則從神無惡乎不能自勝而强不從者此之謂重傷重傷之人無壽類矣魏牟萬乘之公子也其隱巖穴也難爲於布衣之士雖未至乎道可謂有其意矣孔子窮於陳蔡之間七日不火食藜羹不糝顔色甚憊而弦歌於室顔回擇菜子路子貢相與言曰夫子再逐於魯削迹於衛伐樹於宋窮於商周圍於陳蔡殺夫子者無罪藉夫子者無禁弦歌鼓琴未嘗絶音君子之無恥也若此乎顔回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而來吾語之子路子貢入子路曰如此者可謂窮矣孔子曰是何言也君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之爲故自省而不窮於道臨難而不失其德天寒旣至霜雪旣降吾是以知松栢之茂也陳蔡之隘於丘其幸乎孔子削然反琴而弦歌子路扢然執干而舞子貢曰吾不知天之高也地之下也古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通爲寒暑風雨之序矣故許由娛於潁陽而共伯得乎丘首舜以天下讓其友北人無擇北人無擇曰異哉后之爲人也居於畎畝之中而遊堯之門不若是而已又欲以其辱行漫我吾羞見之因自投清冷之淵湯將伐桀因卞隨而謀卞隨曰非吾事也湯曰孰可曰吾不知也湯又因務光而謀務光曰非吾事也湯曰孰可曰吾不知也湯曰伊尹何如曰强力忍垢吾不知其他也湯遂與伊尹謀伐桀尅之以讓卞隨卞隨辭曰后之伐桀也謀乎我必以我爲賊也勝桀而讓我必我爲貪也吾生乎亂世而無道之人再來漫我以其辱行吾不忍數聞也乃自投稠水而死湯又讓務光曰知者謀之武者遂之仁者居之古之道也吾子胡不立乎務光辭曰廢上非義也殺民非仁也人犯其難我享其利非廉也吾聞之曰非其義者不受其禄無道之世不踐其土況尊我乎吾不忍乆見也乃負石而自沈於廬水昔周之興有士二人處於孤竹曰伯夷叔齊二人相謂曰吾聞西方有人似有道者試往觀焉至於岐陽武王聞之使叔旦往見之與盟曰加富二等就官一列血牲而埋之二人相視而笑曰嘻異哉此非吾所謂道也昔者神農之有天下也時祀盡敬而不祈喜其於人也忠信盡治而無求焉樂與政爲政樂與治爲治不以人之壤自成也不以人之卑自高也不以遭峙自利也今周見殷之亂而遽爲政上謀而下行貨阻兵而保威割牲而盟以爲信揚行以悅衆殺伐以要利是推亂以易暴也吾聞古之士遭治世不避其任遇亂世不爲荀存今天下闇周德衰其並乎周以塗吾身也不如避之以絜吾行二子北至於首陽之山遂餓而死焉若伯夷叔齊者其於富貴也荀可得已則必不賴高節戾行獨樂其志不事於世此二士之節也雜篇盜跖第二十九孔子與柳下季爲友柳下季之弟名曰盜跖盜跖從卒九千人橫行天下侵暴諸侯穴室樞户驅人牛馬取人婦女貪得忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之孔子謂柳下季曰夫爲人父者必能詔其子爲人兄者必能教其弟若父不能詔其子兄不能教其弟則無貴父子兄弟之親矣今先生世之才士也弟爲盜跖爲天下害而弗能教也丘竊爲先生羞之丘請爲先生往說之柳下季曰先生言爲人父者必能詔其子爲人兄者必能教其弟若子不聽父之詔弟不受兄之教雖今先生之辯將柰之何哉且跖之爲人也心如湧泉意如飄風强足以距敵辯足以飾非順其心則喜逆其心則怒易辱人以言先生必無往孔子不聽顔回爲馭子貢爲右往見盜跖盜跖乃方休卒徒太山之陽膾人肝而餔之孔子下車而前見謁者曰魯人孔丘聞將軍高義敬再拜謁者謁者入通盜跖聞之大怒目如明星髮上指冠曰此夫魯國之巧僞人孔丘非邪爲我告之爾作言造語妄稱文武冠枝木之冠帶死牛之脅多辭謬說不耕而食不織而衣摇脣鼓舌擅生是非以迷天下之主使天下學士不反其本妄作孝悌而徼倖於封侯富貴者也子之罪大極重疾走歸不然我將以子肝益晝餔之膳孔子復通曰丘得幸於季願望履幕下謁者復通盜跖曰使來前孔子趨而進避席反走再拜盜跖盜跖大怒兩展其足案劍瞋目聲如乳虎曰丘來前若所言順吾意則生逆吾心則死孔子曰丘聞之凡天下有三德生而長大美好無雙少長貴賤見而皆悦之此上德也知維天地能辯諸物此中德也勇悍果敢聚衆率兵此下德也凡人有此一德者足以南面稱孤矣今將軍兼此三者身長八尺二寸面目有光唇如激丹齒如齊貝音中黄鍾而名曰盜跖丘竊爲將軍恥不取焉將軍有意聽臣臣請南使吴越北使齊魯東使宋衛西使晋楚使爲將軍造大城數百里立數十萬户之邑尊將軍爲諸侯與天下更始罷兵休卒收養昆弟共祭先祖此聖人才士之行而天下之願也盜跖大怒曰丘來前夫可規以利而可諫以言者皆愚陋恒民之謂耳今長大美好人見而悦之者此吾父母之遺德也丘雖不吾譽吾獨不自知邪且吾聞之好面譽人者亦好背而毁之今丘告我以大城衆民是於規我以利而恒民畜我也安可乆長也城之大者莫大乎天下矣堯舜有天下子孫無置錐之地湯武立爲天子而後世絶滅非以其利大故邪且吾聞之古者禽獸多而人民少於是民皆巢居以避之晝拾橡栗暮栖木上故命之曰有巢氏之民古者民不知衣服夏多積薪冬則煬之故命之曰知生之民神農之世卧則居居起則于于民知其母不知其父與麋鹿共處耕而食織而衣無有相害之心此至德之隆也然而黄帝不能致德與蚩尤戰於涿鹿之野流血百里堯舜作立群臣湯放其主武王殺紂自是之後以强凌弱以衆暴寡湯武以來皆亂人之徒也今子修文武之道掌天下之辯以教後世縫衣淺帶矯言僞行以迷惑天下之主而欲求富貴焉盜莫大於子天下何故不謂子爲盜丘而乃謂我爲盜跖子以甘辭說子路而使從之使子路去其危冠解其長劍而受教於子天下皆曰孔丘能止暴禁非其卒之也子路欲殺衛君而事不成身菹於衛東門之上是子教之不至也子自謂才士聖人邪則再逐於魯削跡於衛窮於齊圍於陳蔡不容身於天下子教子路菹此患上無以爲身下無以爲人子之道豈足貴邪世之所高莫若黄帝黄帝尚不能全德而戰涿鹿之野流血百里堯不慈舜不孝禹偏枯湯放其主武王伐紂文王拘姜里此六子者世之所高也孰論之皆以利惑其眞而强反其情性其行乃甚可羞也世之所謂賢士伯夷叔齊伯夷叔齊辭孤竹之君而餓死於首陽之山骨肉不葬鮑焦飾行非世抱木而死申徒狄諫而不聽負石自投於河爲魚鼈所食介子推至忠也自割其股以食文公文公後背之子推怒而去抱木而燔死尾生與女子期於梁下女子不來水至不去抱梁柱而死此六子者無異於磔大流豕操瓢而乞者皆離名輕死不念本養壽命者也世之所謂忠臣者莫若王子比干伍子胥子胥沈江比干剖心此二子者世謂忠臣也然卒爲天下笑自上觀之至于子胥比干皆不足貴也丘之所以說我者若告我以鬼事則我不能知也若告我以人事者不過此矣皆吾所聞知也今吾告子以人之情目欲視色耳欲聽聲口欲察味志氣欲盈人上壽百歲中壽八十下壽六十除病瘦喪死憂患其中開口而笑者一月之中不過四五日而已矣天與地無窮人死者有時操有時之具而託於無窮之間忽然無異騏驥之馳過隙也不能悦其志意養其壽命者皆非通道者也丘之所言皆吾之所棄也亟去走歸無復言之子之道狂狂伋伋詐巧虚僞事也非可以全眞也奚足論哉孔子再拜趨走出門上車執轡三失目芒然無見色若死灰據軾低頭不能出氣歸到魯東門外適遇柳下季柳下季曰今者闕然數日不見車馬有行色得微往見跖邪孔子仰天而歎曰然柳下季曰跖得無逆汝意若前乎孔子曰然丘所謂無病而自灸也疾走料虎頭編虎須幾不免虎口哉子張問於滿荀得曰盍不爲行無行則不信不信則不任不任則不利故觀之名計之利而義眞是也若棄名利反之於心則夫士之爲行不可一日不爲乎滿荀得曰無恥者富多信者顯夫名利之大者幾在無恥而信故觀之名計之利而信眞是也若棄名利反之於心則夫士之爲行抱其天乎子張曰昔者桀紂貴爲天子富有天下今謂臧聚曰汝行如桀紂則有怍色有不服之心者小人所賤也仲尼墨翟窮爲匹夫今謂宰相曰子行如仲尼墨翟則變容易色稱不足者士誠貴也故勢爲天子未必貴也窮爲匹夫未必賤也貴賤之分在行之美惡滿苟得曰小盜者拘大盜者爲諸侯諸侯之門義士存焉昔者桓公小白殺兄入嫂而管仲爲臣田成子常殺君竊國而孔子受幣論則賤之行則下之則是言行之情悖戰於胸中也不亦拂乎故書曰孰惡孰美成者爲首不成者爲尾子張曰子不爲行即將疏戚無倫貴賤無義長幼無序五紀六位將何以爲别乎滿荀得曰堯殺長子舜流母弟疏戚有倫乎湯放桀武王殺紂貴賤有義乎王季爲適周公殺兄長幼有序乎儒者僞辭墨者兼愛五紀六位將有别乎且子正爲名我正爲利名利之實不順於埋不監於道吾日與子訟於無約曰小人殉財君子殉名其所以變其情易其性則異矣乃至於棄其所爲而殉其所不爲則一也故曰無爲小人反殉而天無爲君子從天之埋若枉若直相而天極面觀四方與時消息若是若非執而圓機獨成而意與道徘徊無轉而行無成而義將失而所爲無赴而富無殉而成將棄而天比干剖心子胥抉眼忠之禍也直躬證父尾生溺死信之患也鮑子立乾申子不自理廉之害也孔子不見母匡子不見父義之失也此上世之所傳下世之所語以爲士者正其言必其行故服其殃離其患也無足問於知和曰人卒未有不與名就利者彼富則人歸之歸則下之下則貴之夫見下貴者所以長生安體樂意之道也今子獨無意焉知不足邪意知而力不能行邪故推正不忘邪知和曰今夫此人以爲與己同時而生同郷而處者以爲夫絶俗過世之士焉是專無主正所以覽古今之時是非之分也與俗化世去至重棄至尊以爲其所爲也此其所以論長生安體樂意之道不亦遠乎慘怛之疾恬愉之安不監於體怵惕之恐欣歡之喜不監於心知爲爲而不知所以爲是以貴爲天子富有天下而不免於患也無足曰夫富之於人無所不利窮美究勢至人之所不得逮賢人之所不能及俠人之勇力而以爲威强秉人之知謀以爲明察因人之德以爲賢良非享國而嚴若君父且夫聲色滋味權勢之於人心不待學而樂之體不侍象而安之夫欲惡避就固不待師此人之性也天下雖非我孰能辭之知和曰知者之爲故動以百姓不違其度是以足而不爭無以爲故不求不足故求之爭四處而不自以爲貪有餘故辭之棄天下而不自以爲廉廉貪之實非以迫外也及監之度勢爲天子而不以貴驕人富有天下而不以財戲人計其患慮其反以爲害於性故辭而不受也非以要名譽也堯舜爲帝而雍非仁天下也不以美害生也善卷許由得帝而不受非虚辭讓也不以事害己也此皆就其利辭其害而天下稱賢焉則可以有之彼非以與名譽也無足曰必持其名苦體絶甘約養以持生則亦乆病長阨而不死者也知和曰平爲福有餘爲害者物莫不然而財其甚者也今富人耳營鐘鼓管籥之聲口嗛於芻豢醪醴之味以感其意遺忘其業可謂亂矣侅溺於馮氣若負重行而上也可謂苦矣貪財而取慰貪權而取竭靜居則溺體澤則馮可謂疾矣爲欲富就利故滿若堵耳而不知避且馮而不舍可謂辱矣財積而無用服膺而不舍滿心戚醮求益而不止可謂憂矣内則疑刦請之賊外則畏寇盜之害内周樓疏外不敢獨行可謂畏矣此六者天下之至害也皆遺忘而不知察及其患至求盡性竭財單以反一日之無故而不可得也故觀之名則不見求之利則不得繚意絶體而爭此不亦感乎雜篇說剱
