  - {type: variant, offset: 5496, length: 344, content: 五管頥隱於齊肩高於頂句贅指天隂陽之氣有沴沴陵亂也子祀崔云淮南作子水作年五十四而病傴僂子輿本又作與音餘犂禮兮反尻苦羔反偉韋反向云美也崔云自此至鑑干井皆子祀自病狀也拘拘郭音駒司馬云體拘挛也王云不伸也僂徐力主反頂本亦作項崔本作缸音項句倶對反徐古侯反贅徐之稅反指天李云句贅項推也其形似贅言其上向也沴音麗徐又待顯反郭奴結反云陵亂也李同崔本作洗云滿也其心間而無事不以爲患間音閑崔以其心属上句跰而鑑于井曰嗟乎夫造物者又將以予爲此拘拘也夫任自然之變者無差也與物嗟耳跰歩田反下悉田反崔本作邊鮮司馬云病不能行故跰也鑑古暫反曰嗟乎崔云此子輿辭子祀曰女惡之乎曰亡予何惡浸假而化予之左臂以爲雞予因以求時夜浸假而化予之右臂以爲彈予因以求鴞炙浸假而予之尻以爲輪以神爲馬予因而乗之豈更駕哉浸漸也夫體化合變則無往而不因無因, ZTDZ: 膍胲可散}
