  - {type: variant, offset: 8455, length: 336, content: 咬於交反或音狡司馬云聲哀切咬咬然又許拜反前者唱于而隨者唱喁冷風則小和飄風則大和夫聲之宫商雖千變萬化唱和大小莫不稱其所受而各當其分唱于如字喁五恭反徐又音愚又五斗反李云于喁聲之相和也泠風音零李云泠泠小風也和胡卧反下及注皆同飄風鼻遥反又符遥反李敷遥反司馬云疾風也爾雅云回風爲飄稱尺證反分符問反下不出者兒厲風濟則衆竅爲虚濟止也烈風作則衆竅實反其止則衆竅虚虚實雖異其於各得則同厲風司馬云大風向郭云烈風濟子細反向云止也而獨不見之調調之刀刀乎調調刀刀動搖貌也言物聲旣異而形之動搖亦又不同也動雖不同其得齊一耳豈調調獨是而刀刀獨非乎調音條刀徐都堯反向云調調刀刀皆動搖貌搖如字又羊照反子游曰地則衆竅是巳人則比竹是已敢問天子綦曰夫吹萬不同而使其自已也此天也夫天者豈復別有一物哉即衆竅比竹之屬接乎, ZTDZ: ''}
