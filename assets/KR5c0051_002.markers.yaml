  - {type: variant, offset: 7536, length: 377, content: 以犯之幾矣積汝之才伐汝之美以犯此人危殆之道汝不知夫養虎者乎不敢以生物與之爲其殺之之怒也恐其因有殺心而遂怒也爲于僞反下同不敢以全物與之爲其决之之怒也方使虎自齧分之則因用力而怒矣分如字時其飢飽逹其怒心知其所以怒而順之虎之與人異而媚養巳者順也故其殺者逆也順理則異生愛逆節則至親交兵夫愛馬者以筐盛矢以蜄盛溺矢溺至賤而以寳噐盛之愛馬之至也盛矢音成下及注同矢或作屎同蜄徐市軫反蛤溺徒弔反適有蚉䖟僕緣僕僕然羣著馬蚉音文本或作同䖟孟庚反僕縁普木反徐敷木反向云僕僕然蚉䖟縁馬稠穊之貌崔音如字云僕御著直略反而拊之不時雖救其患而掩馬之不意拊李音撫又音付一音附崔本作府音拊則缺銜毀首碎胷掩其不備故驚而至此意有所至而愛有所亡可不愼邪意至除患率然拊之以致毀碎失其所以愛矣故當世接物逆順之際不可不愼也率踈律反本或作卒七忽反匠石之齊至乎曲轅見櫟社樹其大蔽牛絜之百圍其高臨山十仞而後有枝其, ZTDZ: 困}
