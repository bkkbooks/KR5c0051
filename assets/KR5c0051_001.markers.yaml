  - {type: variant, offset: 22360, length: 1, content: 二, ZTDZ: 噫治人之過也雲將曰然則吾奈何鴻蒙曰噫毒哉僊僊乎歸矣雲將曰吾遇天難願聞一言鴻蒙曰噫心養汝徒處無爲而物自化墮爾形體吐爾聰明倫與物忘大同乎澤溟解心釋神莫然無魂萬物云云各復其根各復其根而不知渾渾沌沌終身不離若彼知之乃是離之無問其名無闚其情物固自生雲將曰天降朕以德示朕以默躬身求之乃今也得再拜稽首起辭而}
