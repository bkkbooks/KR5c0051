  - {type: variant, offset: 17898, length: 237, content: 蝸至微而有兩角魏瑩郭本作瑩音罃磨之瑩今本多作罃乙耕反司馬云魏惠王也與田侯一本作田侯牟司馬云田侯齊威王也名牟桓公子案史記威王名囚不名牟約徐於妙反又如字司馬云約誓在惠王二十六年背音佩刺七賜反犀首魏官名也司馬云今虎牙將軍公孫爲此官元嘉本作齒首乗繩證反爲君于僞反下請爲君同忌也出走忌畏而走或言圍之也元嘉本忌作亡抶敕一反三蒼云擊也郭云秩又豬栗反折之舌反季子魏臣壞音怪華子亦魏臣也惠子惠施也見賢遍反下同戴人梁國賢人惠施薦之於魏王蝸音郭音戈李云蝸蟲有兩角俗謂之蝸牛三蒼云小牛螺也云俗各黃犢, HFL: ''}
