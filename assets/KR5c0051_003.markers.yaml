  - {type: variant, offset: 13062, length: 190, content: 淵者静黙之謂耳夫水常無心委順外物故雖流之與止鯢桓之與龍躍常淵然自若未始失其静黙也夫至人用之則行捨之則止行止雖異而玄黙一焉故略舉三異以明之雖波流九變治亂紛如居其極者常淡然自得泊乎忘爲也鯢五兮反桓司馬云鯢桓二魚名也簡文云鯢鯨魚也桓盤桓也崔本作鯢拒云魚所處之方穴也又云拒或作桓審郭如字簡文云處也司馬云審當爲蟠蟠聚也崔本作畨云回流所鍾之域也淵有九名淮南子云有九琁之淵許愼注云至深也治直吏反, HFL: ''}
