  - {type: variant, offset: 22498, length: 3077, content: 郭象注三葉二行韜韜十行注已止四葉十三行還旋七葉四行注其期八葉八行注名列首有已其二字九行注便使十葉一行留狸十一行注何所有無所字十一葉十五行注舉皆也此是釋文別本皆誤作注趙本無之十二葉七行卬仰十八葉八行道導下同二十葉五行注令舍十五行惾十六行濁噣莊子外篇天道第十三郭象注二十二葉六行准準二十四葉六行自耳耳作爾十六行天下天地二十六葉六行乘上有此字二十七葉二行注言此先後無言字三行注至無至字二十八葉三行注言官三十葉一行大太三十一葉一行注以已三十三葉一行竟境注亦知知作如十五行雖貴之哉無哉字注其貴句趙本無三十四葉六行爲者三十五葉四行注當古古作今已滅滅作減莊子外篇天運第十四郭象注三十七葉一行注矣耳三行境謹三十八葉三行注仁孝下無之字八行徵徽十一行夫至樂者至太和萬物趙本無此三十五字十五行注全下有矣字三十九葉十六行夫矣四十一葉七行齊齋四十三葉七行注況夫二字二則字俱無四十四葉六行注者下無也字九行注由假性可十行注天下天子四十五葉一行虚墟六行注則斯十一行注則無則字四十六葉四行㦧七行注秉乘八行傑下重一傑字南華真經卷第五南華真經卷第六莊子外篇刻意第十五郭象注一葉十二行道導二葉十五行注險阻阻險三葉十五行注合下有其字五葉五行注之也之作迹莊子外篇繕性第十六郭象注七葉八行八葉十六行存身者存作行九葉一行知窮上有以字十三行注而得而作自十葉二行注置倒倒置莊子外篇秋水第十七郭象注十一葉四行鼃蛙五行虚墟八行崖涯十四行於無於字十五葉十二行任理下無而字十四行注外事不棲於心無此句十六行注通下無不字十六葉六行注齊之下無者字十七葉二行注天業天作失十一行注齊下脫於字十四行泛泛汎汎二十葉二行注之下有一字十行注不可可不二十二葉三行數下無也字六行注而生也無也字而行哉無哉字故足無故字八行注器下無也字二十三葉五行注不勝者也無者也二字六行注天下下無莫不二字此乃無乃字九行惙輟二十四葉十四行鼃蛙二十六葉四行注大訛之八行注效下有也字二十八葉十行魚之樂下有惠施不體物性妄起質疑莊子非魚焉知魚樂十八字注莊子外篇至樂第十八郭象注二十九葉十二行注其所遇者無者字三十葉三行注内其形知足而已内形知足十五行注舉羣趣其所樂乃不避死也無此二句三十一葉一行亦未之不樂也之作知六行注是非者無者字七行注足定十四行注齊濟三十二葉八行注未訛夫三十六葉四行若汝五行予果予作子南華真經卷第六南華真經卷第七莊子外篇達生第十九郭象注一葉六行先之下有以字四葉四行注勸勌十行注其承上有故字十四行厥橛五葉三行凝毓修按列子作疑注云分猶意散專則與神相似者也六葉十行岩巖七葉十行使便八葉三行注間問十二葉七行骨滑十一行注乃耳二字無十四葉十五行來下有者字莊子外篇山木第二十郭象注十六葉四行周將處夫材與不材之間下重材與不材之間六字十九葉六行舩船惼褊二十葉八行毫豪十一行子惡死乎曰然六字無十四行名上有其字二十葉五行患意二十二葉六行虖雩二十三葉十六行騰螣二十五葉十行偕之偕之偕逝二十六葉十一行亦也亦天也二十七葉十一行注相常二十八葉六行注言以出三字無十二行注可下有也字莊子外篇田子方第二十一郭象注十六行注无功功作故三十四葉八行注故也三十五葉一行偃假三十六葉十一行般槃三十八葉七行注天下也無也字三十九葉八行注自得也無也字四十葉七行注於其莊子外篇知北遊第二十二郭象注四十二葉十一行注效教四十四葉七行注焉哉九行注質下有也字四十五葉一行朣瞳四十六葉四行齊齋四十八葉十四行注煙煴烟煴五十一葉十六行注主王五十三葉六行注責貴九行注涉步五十六葉四行南華真經卷第七南華真經卷第八莊子雜篇庚桑楚第二十三郭象注四葉二行櫛八葉十五行偏訛徧九葉三行注若字便欲自三字俱無十六行注與宇十葉四行注自然二字無十二葉五行注樵燋疑凝十五葉七行注也矣十六葉三行注足是十七葉十三行注名各十四行注取敗十八葉七行胞庖莊子雜篇徐无鬼第二十四郭象注二十二葉一行而況而作又二十六葉十行注公分十三行注外下有故可囿也四字二十七葉一行樂教二十八葉六行注復無復字十六行注未下有爲字能爲無爲字二十九葉二行排拂四行注使便五行注子手十五行注已以三十葉二行慢漫三十一葉三行皇黄十行三十二葉二行助鋤八行中口三十四葉九行注凶下有也字三十五葉十一行況於無於字三十七葉十三行注之下有也字三十八葉十六行虚墟三十九葉四行注用相常全耳無耳字八行注而致之無之字四十葉六行注容貴四十一葉二行注夫乎四十三葉三行不亦亦不莊子雜篇則陽第二十五郭象注四十四葉十三行誤娛四十五葉五行注内外外内十一行注其行其作而四十六葉八行注若愛之至衰也無此二句十行注況誤无四十七葉十四行注而耳四十八葉一行注芥介五行首下有公孫衍三字八行抶誤拔十四行明聞四十九葉十六行注物耳無耳字五十葉十五行捐損十六行注規是視長五十一葉十四行注無所所作為五十二葉三行注致至五十三葉十二行注責下有也字五十四葉十行注惻測十四行此則無則字五十五葉十五行里理五十六葉六行大太後同五十九葉十四行注去下有也字六十葉二行徂阻十三行其有有所注議識南華真經卷第八南華真經卷第九莊子雜篇外物第二十六郭象注二葉一行注莫知知作之三葉六行騖驚十行趣趨四葉十行壓擪十二行注恃持六葉二行注括進恬退八葉八行注厚下無則字十一行注大齊同大齊下重齊字同下有也字十五行注正政十六行注徃性九葉一行注至全二行鸇顫十六行注也乎十葉二行注立亡五行注覺齊十一葉五行荃筌莊子雜篇寓言第二十七郭象注十二葉三行注借下有者字十三葉一行注與於十五行注也化十四葉一行注是不可常誤不可不常十五葉五行觀作鸛十六葉九行景影下同十一行捜十五行注似以十七葉二行注所謂有待者無所謂二字率作卒至矣無此二字莊子雜篇讓王第二十八郭象注二十葉九行王玉二十六葉十行作怍十五行心居心無下心字二十七葉三行能下有自字六行重傷下重重傷二字七行曰也十一行擇擇二十八葉七行雪露十四行共首共作丘二十九葉十一行瞀務下同三十葉十三行注外天下也無也字十五行謂曰無曰字三十一葉二行與之無之字三十二葉五行注遺貴七行注亦聖人之迹也以下十二字脫八行注矣上有人字莊子雜篇盜跖第二十九郭象注三十四葉一行拒距四行大太十五行弟悌三十五葉一行餔脯幸下有然字三十八葉十三行伯夷叔齊下重伯夷叔齊四字四十葉七行汲汲伋伋四十三葉八行徘徊俳佪十一行勝申十四行注尚上四十五葉四行埶五行聖賢四十六葉九行筦管四十七葉八行注章意南華真經卷第九南華真經卷第十莊子雜篇說劔第三十郭象注四葉八行良聖傑桀莊子雜篇漁父第三十一郭象注五葉十二行須十一行頰顔十葉十二行湛於下有人字莊子雜篇列御寇第三十二郭象注十二葉八行昬昏下同十一行漿下同十三葉一行䪠四行若食食作是注薄可無可字十四葉一行才性觀注則郭固作性六行食上有飽字十五葉九行注平性性作徃十一行注亦則十五行注偽為十六葉八行注貴責十三行注徃性十四行注惔淡十七葉二行道導注同五行冥瞑十八葉五行汲圾下同八行注從事將然十九葉三行士事六行注内外外内七行之離支離訙訊注垣坦十一行不問卜不問大小十三行達者無者字二十葉十三行注堯下有也字二十一葉一行睫眼十二行注涯崖十四行則責二十二葉九行十行注以必十五行芻叔叔作菽二十三葉四行齎齋十五行注功之無之字莊子雜篇天下第三十三郭象注二十四葉二行注其所以其八行注不目二十五葉三行辟闢二十六葉一行有百十四行注而急而作故十六行順循二十七葉十六行未末二十八葉十行名山山作川十二行甚風風作雨疾雨雨作風三十一葉十二行注亦必三十二葉一行當黨十三行曰日三十三葉四行注故輐三十四葉九行見聚三十五葉十二行注其非其作豈十三行注如谿谷也無也字三十六葉一行注其少誤其守十二行芴寂三十七葉二行儻黨八行注而兩十五行稠調三十八葉五行厤歴三十九葉十三行天下有下字四十二葉八行棰捶四十四葉二行注者下有乎字南華真經卷第十, ZTDZ: ''}
