  front:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR5c0051_SBCK_003-1a01}
  - {type: variant, offset: 0, length: 527, content: 南華眞經卷第三郭象子玄註陸德音義莊子內篇大宗師第六雖夫地之大萬物之富其所宗而師者無心也音義曰崔云遺形忘生當大宗此法也知天之所爲知人之所爲者至矣知天人之所爲者皆自然也則內放其身而外冥於物與衆玄同任之而無不至也知天之所爲者天而生也天者自然之謂也夫爲爲者不能爲而爲自爲耳爲知者不能知而知自知耳自知耳不知也不知也則知出於不知矣自爲耳不爲也不爲也則爲出於不爲矣爲出於不爲故以不爲爲主知出於不知故以不知爲宗是故眞人遺知而知不爲而爲自然而生坐忘而得故知稱絶而爲名去也天而生向崔本作失而生稱尺證反知人之所爲者以其知之所知以養其知之所不知終其天年而不中道夭者是知之盛也人之生也形雖七尺而五常必具故雖區區之身乃舉天地以奉之故天地萬物凡所有者不可一日而相無也一物不具則生者無由得生一理不至則天年無縁得終然身之所有者知或不知也理之所存者爲或不爲也故知之所知者寡而身之所有者衆爲之所爲者少而理之所存者愽在上者莫能器之而求其備焉人之所知不必同自全非畏死也故眞人陸行而非避濡也逺火而非逃熱也無過而非措當也故雖不以熱爲熱而未嘗赴火不以濡爲濡未甞蹈水不以死爲死未甞䘮生故夫生者豈生之而生哉成者豈成之而成哉故任之而無不至者眞人也豈有槩意於所遇哉慄音栗濡而朱反假更百反至也逺于阮反槩古愛反古之, HFL: ''}
  - {type: page-break, offset: 0, content: '', id: KR5c0051_SJB_003-110600a}
  - {type: substitution, offset: 2, original: 眞, replacement: 真, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19545}}
  - {type: variant, offset: 5, length: 0, content: '', ZTDZ: 之四貞五外篇達生}
  - {type: variant, offset: 6, length: 0, content: '', ZTDZ: 十九達生之情者不務生之所無以爲達命之情者不務知之所無奈何養形必先之以物物有餘而形不養者有之矣有生必先無離形形不離而生亡者有之矣生之來不能却其去不能止悲夫世之人以爲養形足以存生而養形果不足以存生則世奚足爲哉雖不足爲而不可不爲者其爲不免矣夫欲免爲形者莫如弃世棄世則無累無累則正平正平則與彼更生更生則幾矣事奚足弃而生奚足遺弃事則形不勞遺生則精不虧夫形全精復與天爲一天地者萬物之父母也合則成體散則成始形精不虧是謂能移精而又精反以相天子列子問關尹曰至人潜行不窒蹈火不熱行乎萬物之上而不慄請問何以至於此關尹曰是純氣之守也非知巧果敢之列居予語汝凡有貌象聲色者皆物也物與物何以相遠夫奚足以至乎先是色而已則物之造乎不形而止乎無所化夫得是而窮之者物焉得而止焉彼將處乎不淫之度而藏乎無端之紀遊乎萬物之所終始壹其性養其氣合其德以通乎物之所造夫若是者其天守全其神無郤物奚自入焉夫醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也乘亦不知也墜亦不知也死生驚懼不入乎其胸中是故選物而不慴彼得全於酒而猶若是而沉得全於天乎聖人藏於天故莫之能傷也復讎者不折鏌干雖有忮心者不怨飄瓦是以天下均平故無攻戰之亂無殺戮之刑者由此道也不開人之天而開天之天開天者德生開人者賊生不厭其天不忽於人民幾乎以其眞仲尼適楚出於林中見痀僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月累丸二而不墜則失者錙銖累}
  - {type: page-break, offset: 6, content: '', id: KR5c0051_SJB_003-110600b}
  - {type: variant, offset: 7, length: 18, content: 郭象子玄註陸德音義莊子內篇大宗師第六, ZTDZ: 而不墜則失者十一累五而不墜猶掇之也吾處身也若橛株拘吾執臂也若槁木之技}
