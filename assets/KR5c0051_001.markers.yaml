  - {type: variant, offset: 22415, length: 6, content: 句十四行注與, ZTDZ: 無萬分之一而喪人之國也一不成而萬有餘喪矣悲夫有土者之不知也夫有土者有大物也有大物者不可以物物而不物故能物物明乎物物者之非物也豈獨治}
