  - {type: variant, offset: 669, length: 3, content: 失至當, ZTDZ: 問焉聖人之所以駴天下神人未嘗過而問焉賢人所以駴世聖人未嘗過而問焉君子所以駴國賢人未嘗過而問焉小人所以合時君子未嘗過而問焉演門有親死者以善毁爵爲官師其黨人毁而死者半堯與許由天下許由逃之湯與務光務光怒之紀他聞之帥弟子而踆}
  - {type: variant, offset: 673, length: 2, content: 體中, ZTDZ: 窾水諸侯吊之三年申徒狄因以踣河筌者所以在魚得魚而忘筌蹄者所以在兔得兔而忘蹄言者所以在意得意而忘言吾安得夫忘言之人而與之言哉雜篇寓言第二十七寓言十九重言十七巵言日出和以天倪寓言十九藉外論之親父不爲其子媒親父譽之不若非其父者}
