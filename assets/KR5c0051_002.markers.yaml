  - {type: variant, offset: 13526, length: 155, content: 而失者也知如字又音智羿音詣徐胡係反善射人唐夏有之乃云有窮之君夏者也彀音遘張弓也中如字央於良反又於倉反中地丁仲反下不中注中地中與不中同單音善人以其全足吾更貌曰子無乃稱巳悟則厭其多言也蹵子六反稱如字舉也又尺證反魯有兀者叔山無趾踵見仲尼踵頻也叔山無趾音止李云叔山字無足趾踵朱勇反向郭云頻也崔云無趾故踵行見賢遍反仲尼曰, ZTDZ: ''}
