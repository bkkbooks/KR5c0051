  - {type: variant, offset: 11610, length: 2, content: 後安, ZTDZ: 笑巧人皆求福己獨曲全曰荀免於咎以深爲根以約爲紀曰堅則毁矣鋭則挫矣常寬容於物不削於人可謂至極關尹老聃乎古之博大眞人哉寂漠無形變化無常死與生與天地並與神明往與芒乎何之忽乎何適萬物畢羅莫足以歸古之道術有在於是者莊周聞}
