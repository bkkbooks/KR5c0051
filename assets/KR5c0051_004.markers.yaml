  - {type: variant, offset: 10764, length: 842, content: 自得則同耳故譽堯而非桀不如兩也樂音洛恬徒謙反瘁瘁在季反病也廣雅云憂也崔本作醉愉音瑜徐音喻譽音餘夫不恬不愉非德也非德也而可長久者天下無之恬愉自得乃可長久人大喜邪毗於陽大怒邪毗於隂隂陽并毗四時不至寒暑之和不成其反傷人之形乎使人喜怒失位居處無常思慮不自得中道不成章此皆堯桀之流使物喜怒大過以致斯患也人在天地之中最能以靈知喜怒擾亂羣生而振蕩隂陽也故得失之間喜怒集乎百姓之懷則寒暑之和敗四時之節差百度昏亡萬事失落也毗如字司馬云助也一云并也思息嗣反大過音泰於是乎天下始喬詰卓而後有盜跖曾史之行故舉天下以賞其善者不足慕賞乃善故賞不能供喬向欽消反或去夭反郭音矯李音驕詰李去吉反徐起列反崔云喬詰意不平也卓勑角反郭丁角反向音䈇勑二反李猪立反又勑栗反崔云卓行不平也行下孟反舉天下以罰其惡者不給畏罰乃止故罰不能勝勝音升故天下之大不足以賞罰自三代以下者匈匈焉終以賞罰爲事彼何暇安其性命之情哉忘賞罰而自善性命乃大足耳夫賞罰者聖王之所以當功過非以著勸畏也故理至則遺之然後至一可反也而三代以下遂尋其事迹故匈匈焉與迹競逐終以所爲事性命之情何暇而安哉匈音凶而且明邪是淫於色也聦邪是淫於聲也仁邪是亂於德也義邪是悖於理也禮邪是相於技也樂邪是相於淫也聖邪是相於藝也知邪是相於疵也當理無恱恱之則致淫悖之患矣相助也且如字徐子餘反音恱下同悖必內反徐蒲没反相息亮反下及注皆同技其綺反李音崔向云不端也知音智疵疾斯反天下將安其性命之情之八者存可也亡可也存亡無所在任其所受之分則性命安矣天下將不安其性命之情之八者乃始臠卷愴囊而亂天下也必存此八者則不能縱任自然故爲臠卷愴囊也臠力轉反崔本作欒卷卷勉反徐居阮反司馬云臠卷不伸舒之狀也崔同一云相牽引也愴音倉崔本作戕囊如字崔云戕囊猶搶攘而天下乃始尊之惜之甚矣天下之惑也不能遺之以爲誤矣而乃復尊之以爲貴豈不甚惑哉復扶又反豈直過也而去之邪乃齊戒以言之跪坐以進之鼔歌以儛之吾若是何哉非直由寄而過去也乃珍貴之如此去起慮反邪崔本唯此一字作邪餘皆作咫齊本又作齋同側皆反跪其詭反郭音危故君子不得已而臨莅天下莫若無爲, ZTDZ: 費}
