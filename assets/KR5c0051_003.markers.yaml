  - {type: variant, offset: 3315, length: 2, content: 所係, ZTDZ: 理是故至人無爲大聖不作觀於天地之謂也今彼神明至精與彼百化物已死生方圓莫知其根也扁然}
  - {type: variant, offset: 3318, length: 9, content: 一化之所待乎此玄同, ZTDZ: ''}
  - {type: 'kr:newline', offset: 3320, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl142}
  - {type: line-break, offset: 3320, content: '', id: KR5c0051_SBCK_003-11b05}
  - {type: punctuation, offset: 3324, content: (, id: KR5c0051_krp_003-bkkpn431}
  - {type: variant, offset: 3324, length: 23, content: 此玄同萬物而與化爲體故其爲天下之所宗也不亦宜乎, HFL: ''}
  - {type: variant, offset: 3329, length: 93, content: 而與化爲體故其爲天下之所宗也不亦宜乎夫道有情有信無爲無形有無情之情故無爲也有常無之信故無形也可傳而不可受故今傳而宅之莫能受而有之傳直專反注同可得而不可見咸得自容而莫見其狀自本自根未有天地, ZTDZ: ''}
