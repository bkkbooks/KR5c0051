  - {type: variant, offset: 5213, length: 2077, content: 分者也而欲違天爲僞不亦難乎粗音麄聞以有翼飛者矣未聞以無翼飛者也聞以有知知者矣未聞以無知知者也言必有其具乃能其事今無至虚之宅無由有化物之實也知知上音智下如字下句同瞻彼闋者虚室生白夫視有若無虚室者也虚室而純白獨生矣闋徐苦穴反司馬云空也虚室生白崔云白者日光所照也司馬云室比喻心心能空虚則純白獨生也祥止止夫吉祥之所集者至虚至静也夫且不止是之謂坐馳若夫不止於當不會於極此爲以應坐之日而馳騖不息也故外敵未至而內巳困矣豈能化物哉夫徇耳目內通而外於心知神將來舎而況人乎夫使耳目閉而自然得者心知之用外矣故將任性直通無往不冥尚無幽昧之責而况人間之累乎狥辭後反徐辭倫反李云使也知音智注同是萬物之化也禹舜之所紐也伏羲几蘧之所行終而況散焉者乎言物無貴賤未有不由心知耳目以自通者也故出之所謂知者豈欲知而知哉所謂見者豈謂見而見哉若夫知見可以欲爲而得者則欲賢可以得賢爲聖可以得聖乎固不可矣而世不知知之自知因欲爲知以知之不見見之自見因欲爲見以見之不知生之自生又將爲生以生之故見目而求離婁之明見耳而責師曠之聦故心神奔馳於內耳目竭䘮於外身處不適則與物不冥矣不冥矣而能合乎人間之變應乎世世之節者未之有也紐徐女酒反崔云系而行之曰紐簡文云紐本也戲本又作羲亦作犧同許宜反即大曍三皇之始也凡蘧其居反向云古之帝王也李云上古帝王散悉旦反李云放也崔云德不及聖王爲散聦本作䘮息浪反葉公子高將使於齊問於仲尼曰王使諸梁也甚重重其使欲有所求也葉音攝子高楚大夫爲葉縣尹僣称公姓沈名諸梁字子高將使所吏反不待使及注同齊之待使者蓋將甚敬而不急恐直空報其敬而不肯急應其求也匹夫猶未可動也而況諸侯乎吾甚慄之子嘗語諸梁也曰凡事若小若大寡不道以懽成夫事無小大少有不言以成爲懽者耳此仲尼之所曾告諸梁也慄音栗李云懼也語魚據反下同事若不成則必有人道之患夫以成爲懽者不成則怒矣此楚王之所不能免也事若成則必有隂陽之患人患雖去然喜懼戰於胷中固巳結氷炭於五藏矣藏才浪反若成若不成而後無患者唯有德者能之成敗若任之於彼而莫足以患心者唯有德者乎吾食也執粗而不臧爨無欲清之人對火而不思凉明其所饌儉薄也執衆家本並然簡文作熱粗音麤又才古反臧作郎反善也絶句一音才郎反句至㸑字爨七亂反清七性反字宜從青從凊者假借也清凉也之人言爨火爲食而不思清凉明火微而食宜儉薄饌士戀反今吾朝受命而夕飮冰我其內與所饌儉薄而內飮氷者誠憂事之難非美食之爲與音餘下㥀與同内向云食美食者必內熱吾未至乎事之情而旣有隂陽之患矣事若不成必有人道之患是兩也事未成則唯恐不成耳若果不成則恐懼結於內而刑網羅於外也恐丘勇反爲人臣者不足以任之子其有以語我來仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心自然結固不可解也任而林反又而鳩反臣之事君義也無適而非君也無所逃於天地之間千人聚不以一人爲主不亂則散故多賢不可以多君無賢不可以無君此天人之道必至之宜是之謂大戒若君可逃而親可解則不足戒也是以夫事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命德之至也知不可奈何者命也而安之則無哀無樂何易施之有哉故冥然以所遇爲命而不施心於其間泯然與至當爲一而無休戚於其中雖事凡人猶無往而不適而况君親乎樂音洛注下同施如字崔以䜴反云移也爲人臣子者固有所不得已行事之情而忘其身事有必至理固常通故任之則事濟事濟而身不存者未之有也又何用心於其身哉何暇至於恱生而惡死夫子其行可矣理無不通故當任所遇而直前耳若乃信道不篤而恱惡存懷不能與至當倶往而謀生慮死未見能成其事者也惡烏路反下皆同丘請復以所聞凡交近則必相靡以信近者得接故以其信驗親相靡服也復扶又反下注同遠則必忠之以言遥以言傳意也傳丈專反下文并注同言必或傳之夫傳兩喜兩怒之言天下之難者也夫喜怒之言若過其實傳之者宜使兩不失中故未易也怒如字注同本又作下同易以豉反下文注皆同夫兩喜必多溢美之言兩怒必多溢惡之言溢過也喜怒之言常過其當也凡溢之妄嫌非彼言以傳者妄作妄則其信之也莫莫然疑之莫則傳言者殃就傳過言似於誕妄受者有疑則傳言者横以輕重爲罪也故法言曰傳其常情無傳其溢言則幾乎全雖聞臨時之過言而勿傳也必稱其常情而要其誠致則近於全也要一遥反近附近之近且以巧力者始乎陽本共好戲好呼報反常卒乎隂欲勝情至潜興害彼泰至則多竒巧不復循理大至音泰本亦作泰徐敕佐反下同巧如字又苦孝反以禮飮酒者始乎治尊卑有別旅酬有次治直吏反別彼列反計反故法言曰無遷令傳彼實也無勸成任其自成過度益也益則非任實遷令勸成殆事此事之危殆美成在久美成者任其時化譬之種植不可一朝成惡成不及改彼之所惡而勸彊成之則悔敗尋至惡烏路反彊其丈反下欲彊同可不愼與且夫乗物以遊心物以爲意也託不得巳以養中至矣任理之必然者中庸之符全矣斯接物之至也何作爲報也當任齊所報之實何爲爲齊作意於其間哉爲爲上如字下于僞反莫若爲致命此其難者直爲致命最易所以喜怒施心故難也顔闔將傳衛靈公大子而問於蘧伯玉曰有人於此其德天殺與之爲無方則危吾國與之爲有方則危吾身夫小人之性引之制則憎巳縱其無度則亂顔闔胡臘反向崔本作蓋魯之賢人隱者衛靈公左傳云名元太子音泰司馬云蒯聵也蘧其居反伯玉名瑗衛大夫天殺如字謂如天殺物也徐所列反無方李云方, ZTDZ: ''}
