  - {type: variant, offset: 19494, length: 1, content: 萬, ZTDZ: 仁義又奚連連如膠漆纏索而遊乎道德之間爲哉使天下惑也夫小惑易方大惑易性何以知其然邪自虞氏招仁義以撓天下也天下莫不奔命於仁義是非以仁義易其性與故嘗試論之自三代以下者天下莫不以}
  - {type: variant, offset: 19496, length: 2, content: 雖聚, ZTDZ: 易其性矣小人則以身殉利士則以身殉名大夫則以身殉家聖人則以身殉天下故此數子者事業不同名聲異號其於傷性以身爲殉一也臧與穀二人相與牧羊}
