  - {type: substitution, offset: 172, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 174, length: 0, content: '', ZTDZ: 曰無所可用莊子曰此木}
  - {type: variant, offset: 176, length: 33, content: 爲爲主知出於不知故以不知爲宗是故眞人遺知而知不爲而爲自然而生坐忘而, ZTDZ: 材}
