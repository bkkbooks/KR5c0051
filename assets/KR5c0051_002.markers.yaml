  - {type: punctuation, offset: 11534, content: /, id: KR5c0051_krp_002-bkkpn1351}
  - {type: variant, offset: 11536, length: 5, content: 離藏才浪反, ZTDZ: 與之爭美夫明白於天地之德者此之謂大本大宗與天和者也所以均調天下與人和者也與人和者謂之人樂與天和者謂之天樂莊子曰吾師乎吾師乎𩐎萬物而不爲戾澤及萬世而不爲仁長於上古而不爲壽覆載天地刻彫衆形而不爲巧此之謂天樂故曰知天樂者其生也天行其死也物化靜而與陰同德動而與陽同波故知天樂者無天怨無人非無物累無鬼責故曰其動也天其靜也地一心定而王天下其鬼不崇其魂不疲一心定而萬物服言以虚靜推於天地通於萬物此之謂天樂天樂者聖人之心以畜天下也夫帝王之德以天地爲宗以道德爲主以無爲爲常無爲也則用天下而有餘有爲也則爲天下用而不足故古之人貴夫無爲也上無爲也下亦無爲也是下與上同德下與上同德則不臣下有爲也上亦有爲也是上與}
  - {type: page-break, offset: 11536, content: '', id: KR5c0051_SJB_002-110590a}
  - {type: 'kr:non-cjk', offset: 11537, content: ○, id: KR5c0051_krp_002-bkkkrnonc192}
  - {type: punctuation, offset: 11543, content: ), id: KR5c0051_krp_002-bkkpn1352}
  - {type: variant, offset: 11543, length: 0, content: '', ZTDZ: 道上與下同道則不主上必無爲而用天下下必有爲爲天下用此不易之道也故古之王天下者知雖落天地不自慮也辯雖彫萬物不自說也能雖窮海内不自爲也天不産而萬物化地不長而萬物育帝王無爲而天下功故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地此乘天地馳萬物而用人羣之道也本在於上末在於下要在於主詳在於臣三軍五兵之運德之末也賞罰利害五刑之辟教之末也禮法度數刑名比詳治之末也鍾鼓之音羽旄之容樂之末也哭泣衰絰隆殺之服哀之末也此五末者須精神之運心術之動然後從之者也末學者古人有之而非所以先也君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從夫尊卑先後天地之行也故聖人取象焉天尊地卑神明之位也春夏先秋冬後四時之序也萬物化作萌區有狀盛衰之殺變化之流也夫天地至神而有尊卑先後之序而況人道乎宗廟尚親朝廷尚尊郷黨尚齒行事尚賢大道之序也語道而非其序者非道也語道而非其道者安取道}
  - {type: page-break, offset: 11543, content: '', id: KR5c0051_SJB_002-110590b}
  - {type: variant, offset: 11544, length: 1, content: 何, ZTDZ: 故古之明大道者先明天而道德次之道德已明而仁義次之仁義已明而分守次之分守已明而刑名次之刑名已明而因任次之因任己明而原省次之原省已明而是非次之是非已明而賞罰次之賞罰已明而愚知處宜貴賤履位仁賢不肖襲情必分其能必由其名以此事上以此畜下以此治物以此修身知謀不用必歸其天此之謂太平治之至也故書曰有刑有名刑名者古人有之而非所以先也古之語大道者五變而刑名可舉九變而賞罰可言也驟而語刑名不知其本也驟而語賞罰不知其始也到道而言迕道而說者人之所治也安能治人驟而語刑名賞罰此有知治之具非知治之道可用於天下不足以用天下此之謂辯士一曲之}
  - {type: page-break, offset: 11544, content: '', id: KR5c0051_SJB_002-110590c}
  - {type: variant, offset: 11547, length: 2, content: 仲尼, ZTDZ: 禮法度數刑名比詳古人有之此下之所以事上非上之所以畜下也昔者舜問於堯}
  - {type: 'kr:newline', offset: 11550, content: '

      ', id: KR5c0051_krp_002-bkkkrnewl509}
  - {type: line-break, offset: 11550, content: '', id: KR5c0051_SBCK_002-32a02}
  - {type: variant, offset: 11550, length: 0, content: '', ZTDZ: 天王之用心何如堯曰吾不敖無告不廢窮民苦死者嘉孺子而哀婦人此吾所以用心已舜曰美則美矣而未大也堯曰然則何如舜曰天德而出寧日月照而四時行若晝夜之有經雲行而雨施矣堯曰膠膠擾擾乎子天之合也我人之合也夫天地者古之所大也而黄帝堯舜之所共美也故古之王天下者奚爲哉天地而已矣孔子西藏書於周室子路謀曰由聞周之徵藏史有老聃者免而歸居夫子欲藏書則試往因焉孔子曰善往見老聃而老聃不許於是緒十二經以說老聃中其說曰大謾願聞其要孔子曰要在仁義老聃曰請問仁義人之性邪孔子曰然君子不仁則不成不義則不生仁義眞人之性也又將奚爲矣老聃曰請問何謂仁義孔子曰中心物愷兼愛無私此仁義之情也老聃曰噫幾乎後言夫兼愛不亦迂乎無私焉乃私也夫子若欲使天下無失其牧乎則天地固有常矣日月固有明矣星辰固有列矣禽獸固有群矣樹木固有立矣夫子亦放德而行循道而趨已至矣又何偈偈乎揭仁義若擊鼓而求亡子焉意夫子亂人之性也士成綺見老子而問曰吾聞}
  - {type: page-break, offset: 11550, content: '', id: KR5c0051_SJB_002-110591a}
  - {type: variant, offset: 11555, length: 1, content: 丘, ZTDZ: 吾固不辭遠道而來願見百舍重趼而不敢息今吾觀子非聖人}
  - {type: variant, offset: 11557, length: 0, content: '', ZTDZ: 鼠壤有餘蔬而棄妹不仁也生熟不盡於前而積斂無崖老子漠然不應士成綺明日復見曰昔者吾有刺於子今吾心正郤矣何故也老子曰夫巧知神聖之人吾自以爲脱焉昔者子呼我牛也而謂之牛呼我馬也而謂之馬荀有其實人與之名而弗受再受其殃吾服也恒服吾非以服有服士成綺鴈行避影履行遂進而問修身若何老子曰而容崖然而目衝然而顙頯然而口闞然而狀義然似擊馬而止也動而持發也機察而審知巧而覩於泰凡以爲不信邊境有人焉其名爲竊夫子曰夫道於大不終於小不遺故萬物備廣廣乎其無不容也淵乎其不可測也形德仁義神之末也非至人孰能定之夫至人有世不亦大乎而不足以爲之累天下奮棅而不與之偕審乎無假而不與利遷極物之眞能守其本故外天地遣萬物而神未嘗有所困也通乎道合乎德退仁義賔禮樂至人之心有所定矣世之所貴道者書也書不過語語有貴也語之所貴者意也意有所隨意之所隨者不可以言傳也而世因貴言傳書世雖貴之哉猶不足貴也爲其貴非其貴也故視而可見者形與色也聽而可聞者名與聲也悲夫世人以形色名聲爲足以得彼之情夫形色名聲果不足以得彼之情則知者不言言者不知而世豈識之哉桓公讀書於堂上輪扁斲輪於堂下釋椎鑿而上問桓公曰敢問公之所讀者何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟魄已夫桓公曰寡人讀書輪人安得議乎有說則可無說則死輪扁曰臣也以臣之事觀之斲輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斲輪古之人與其不可傳也死矣然則君之所讀者古人之糟魄已矣外篇天運第十四天其運乎地其處乎日月其爭於所乎孰主張是孰維綱是孰居無事推而行是意者其有機緘而不得己邪意者其運轉而不能自止邪雲者爲雨乎雨者爲雲乎孰隆弛是孰居無事淫樂而勸是風起北方一西一東有上仿徨孰嘘吸是孰居無事而披拂是敢問何故巫咸祒曰來吾語汝天有六極五常帝王順之則治逆之由凶九洛之事治成德備監照下土天下載之此謂上皇商大宰蕩問仁於莊子莊子曰虎狼仁也曰何謂也莊子曰父子相親何謂不仁曰請問至仁莊子曰至仁無親大宰曰蕩聞之無親則不愛不愛則不孝謂至仁不孝可乎莊子曰不然夫至仁尚矣孝固不足以言之此非遇孝之言也不及孝之言也夫南行者至於郢北面而不見冥山是何也則去之遠也故曰以敬孝易以愛孝難以愛孝易而忘親難忘親易使親忘我難使親忘我易兼忘天下難兼忘天下易使天下兼忘我難夫德遺堯舜而不爲也利澤施於萬世天下莫知也豈}
