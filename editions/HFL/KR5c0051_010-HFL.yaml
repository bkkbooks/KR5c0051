body:
  text: 雜篇漁父第三十一孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子弦歌鼓琴奏曲未半有漁父者下船而來鬢眉交白被髮揄袂行原以上距陸而止左手據膝右手持頤以聽曲終而招子貢子路二人俱對客指孔子曰彼何爲者也子路對曰魯之君子也客問其族子路對曰族孔氏客曰孔氏者何治也子路未應子貢對曰孔氏者性服忠信身行仁義飾禮樂選人倫上以忠於世主下以化於齊民將以利天下此孔氏之所治也又問曰有土之君與子貢曰非也侯王之佐與子貢曰非也客乃笑而還行言曰仁則仁矣恐不免其身苦心勞形以危其眞嗚呼遠哉其分於道也子貢還報孔子孔子推琴而起曰其聖人與乃下求之至於澤畔方將杖挐而引其船顧見孔子還鄕而立孔子反走再拜而進客曰子將何求孔子曰曩者先生有緒言而去丘不肖未知所謂竊待於下風幸聞咳唾之音以卒相丘也客曰嘻甚矣子之好學也孔子再拜而起曰丘少而修學以至於今六十九歲矣無所得聞至教敢不虚心客曰同類相從同聲相應固天之埋也吾請釋吾之所有而經子之所以子之所以者人事也天子諸侯大夫庶人此四者自正治之美也四者離位而亂莫大焉官治其職人憂其事乃無所陵故田荒室露衣食不足徵賦不屬妻妾不和長少無序庶人之憂也能不勝任官事不治行不清白群下荒怠功美不有爵禄不持大夫之憂也廷無忠臣國家昏亂工技不巧貢職不美春秋後倫不順天子諸侯之憂也陰陽不和寒暑不時以傷庶物諸侯暴亂擅相攘伐以殘民人禮樂不節財用窮匱人倫不飾百姓淫亂天子有司之憂也今子旣上無君侯有司之勢而下無大臣職事之官而擅飾禮樂選人倫以化齊民不泰多事乎且人有八疵事有四患不可不察也非其事而事之謂之揔莫之顧而進之謂之佞希意導言謂之謟不擇是非之言謂之諛好言人之惡謂之讒析交離親謂之賊稱譽詐僞以敗惡人謂之應不擇善否兩容顔適偷拔其所欲謂之險此八疵者外以亂人内以傷身君子不友明君不臣所謂四患者好經大事變更易常以挂功名謂之叨專知擅事侵人自用謂之貪見過不更聞諫愈甚謂之狠人同於己則可不同於己雖善不善謂之矜此四患也能去八疵無行四患而始可教已孔子愀然而歎再拜而起曰丘再逐於魯削迹於衛伐樹於宋圍於陳蔡丘不知所失而離此四謗者何也客悽然變容曰甚矣子之難悟也人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影不離身自以爲尚遲疾走不休絶力而死不知處陰以休影處靜以息迹愚亦甚矣子審仁義之間察同異之際觀動靜之變適受與之度理好惡之情和喜怒之節而幾於不免矣謹修而身愼守其眞還以物與人則無所累矣今不修之身而求之人不亦外乎孔子愀然曰請問何謂眞客曰眞者精誠之至也不精不誠不能動人故彊哭者雖悲不哀彊怒者雖嚴不威彊親者雖笑不和眞悲無聲而哀眞怒未發而威眞親未笑而和眞在内者神動於外是所以貴眞也其用於人理也事親則慈孝事君則忠貞飲酒則歡樂處喪則悲哀忠貞以功爲主飲酒以樂爲主處喪以哀爲主事親以適爲主功成之美無一其迹矣事親以適不論所以矣飲酒以樂不選其具矣處喪以哀無問其禮矣禮者世俗之所爲也眞者所以受於天也自然不可易也故聖人法天貴眞不拘於俗愚者反此不能法天而恤於人不知貴眞禄禄而受變於俗故不足惜哉子之早湛於人僞而晚聞大道也孔子又再拜而起曰今者丘得遇也若天幸然先生不羞而比之服役而身教之敢問舍所在請因受業而卒學大道客曰吾聞之可與往者與之至於妙道不可與往者不知其道愼勿與之身乃無咎子勉之吾去子矣吾去子矣乃刺船而去延縁葦間顔淵還車子路授綏孔子不顧待水波定不聞拏音而後敢乘子路旁車而問曰由得爲役乆矣未嘗見夫子遇人如此其威也萬乘之主千乘之君見夫子未嘗不分庭伉禮夫子猶有倨傲之容今漁父杖拏逆立而夫子曲要磬折再拜而應得無太甚乎門人皆怪夫子矣漁父何以得此乎孔子伏軾而歎曰甚矣由之難化也湛於禮義有間矣而樸鄙之心至今未去進吾語汝夫遇長不敬失禮也見賢不尊不仁也彼非至人不能下人下人不精不得其眞故長傷身惜哉不仁之於人也禍莫大焉而由獨擅之且道者萬物之所由也庶物失之者死得之者生爲事逆之則敗順之則成故道之所在聖人尊之今漁父之於道可謂有矣吾敢不敬乎雜篇列御寇第三十二列御寇之齊中道而反遇伯昏瞀人伯昏瞀人曰奚方而反曰吾驚焉曰惡乎驚曰吾嘗食於十漿而五漿先饋伯昏瞀人曰若是則汝何爲驚已曰夫内誠不解形諜成光以外鎭人心使人輕乎貴老而𩐎其所患夫漿人特爲食羹之貨多餘之赢其爲利也薄其爲權也輕而猶若是而況於萬乘之主乎身勞於國而知盡於事彼將任我以事而效我以功吾是以驚伯昏瞀人曰善哉觀乎汝處已人將保汝矣無幾何而往則户外之履滿矣伯昏瞀人北面而立敦杖蹙之乎頤立有間不言而出賔者以告列子列子提履跣而走暨乎門曰先生旣來曾不發藥乎曰已矣吾固告汝曰人將保汝果保汝矣非汝能使人保汝而汝不能使人無保汝也而焉用之感豫出異也必且有感摇而本性又無謂也與汝遊者又莫與告也彼所小言盡人毒也莫覺莫悟何相孰也巧者勞而知者憂無能者無所求飽食而遨遊汎若不繫之舟虚而遨遊者也鄭人緩也呻吟裘氏之地祇三年而緩爲儒河潤九里澤及三族使其弟墨儒墨相與辯其父助翟十年而緩自殺其父夢之曰使而子爲墨者予也闔胡嘗視其良旣爲秋栢之實也夫造物者之報人也不報其人而報其人之天彼故使彼夫人以己爲有以異於人以賤其親齊人之井飲者相捽也故日今之世皆緩也自是有德者以不知也而況有道者乎古者謂之遁天之刑聖人安其所安不安其所不安衆人安其所不安不安其所安莊子曰知道易勿言難知而不言所以之天也知而言之所以之人也古之人天而不人朱泙漫學屠龍於支離益單千金之家三年技成而無所用其巧聖人以必不必故無兵衆人以不必必之故多兵順於兵故行有求兵恃之則亡小夫之知不離苞苴竿牘敝精神乎蹇淺而欲兼濟導物太一形虚若是者迷惑於宇宙形累不知大初彼至人者歸精神乎無始而甘暝乎無何有之郷水流乎無形發泄乎太清悲哉乎汝爲知在毫毛而不知大寧宋人有曹商者爲宋王使秦其往也得車數乘王悦之益車百乘反於宋見莊子曰夫處窮閶阨巷困窘織履槁項黄馘者商之所短也一悟萬乘之主而從車百乘者商之所長也莊子曰秦王有病召醫破癕潰痤者得車一乘舐痔者得車五乘所治愈下得車愈多子豈治其痔邪何得車之多也子行矣魯哀公問乎顔闔曰吾以仲尼爲貞幹國其有瘳乎曰殆哉圾乎仲尼方且飾羽而晝從事華辭以支爲㫖忍性以視民而不知不信受乎心宰乎神夫何足以上民彼宜汝與予頤與誤而可矣今使民離實學僞非所以視民也爲後世慮不若休之難治也施於人而不忘非天布也商賈不齒雖以事齒之神者弗齒爲外刑者金與木也爲内刑者動與過也宵人之離外刑者金木訊之離内刑者陰陽食之夫免乎外内之刑者唯眞人能之孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深情故有貌願而益有長若不肖有順儂而達有堅而縵有緩而釬故其就義若渴者其去義若熱故君子達使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色九徵至不肖人得矣正考父一命而傴再命而僂三命而俯循墻而走孰敢不軌如而夫者一命而吕鉅再命而於車上舞三命而名諸父孰協唐許賊莫大乎德有心而心有眼及其有眼也而内視内視而敗矣凶德有五中德爲首何謂中德中德也者有以自好也而吡其所不爲者也窮有八極達有三必形有六府美髯長大壯麗勇敢八者俱過人也因以是窮縁循偃俠困畏不若人三者俱通達知慧外通勇敢多怨仁義多責達生之情者傀達於知者肖達大命者隨達小命者遭人有見宋王者錫車十乘以其十乘驕穉莊子莊子曰河上有家貧恃緯蕭而食者其子没於淵得千金之珠其父謂其子曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子爲𩐎粉夫或騁於莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽而入於太廟雖欲爲孤犢其可得乎莊子將死弟子欲厚葬之莊子曰吾以天地爲棺槨以曰月爲連璧星辰爲珠璣萬物爲齎送吾葬具豈不備邪何以加此弟子曰吾恐烏鳶之食夫子也莊子曰在天爲烏鳶食在下爲螻蟻食奪彼與此何其偏也以不平平其平也不平以不徵徵其徵也不徵明者唯爲之使神者徵之夫明之不勝神也乆矣而愚者恃其所見入於人其功外也不亦悲乎雜篇天下第三十三天下之治方術者多矣皆以其有爲不可加矣古之所謂道術者果惡乎在曰無乎不在曰神何由降明何由出聖有所生王有所成皆原於一不離於宗謂之天人不離於精謂之神人不離於眞謂之至人以天爲宗以德爲本以道爲門兆於變化謂之聖人以仁爲恩以義爲理以禮爲行以樂爲和薰然慈仁謂之君子以法爲分以名爲表以參爲驗以稽爲決其數一二三四是也百官以此相齒以事爲常以衣食爲主蕃息蓄藏老弱孤寡爲意皆有以養民之理也古之人其備乎配神明醇天地育萬物和天下澤及百姓明於本數係於末度六通四闢小大精粗其運無乎不在其明而在數度者舊法世傳之史尚多有之其在於詩書禮樂者鄒魯之士搢紳先生多能明之詩以道志書以道事禮以道行樂以道和易以道陰陽春秋以道名分其數散於天下而設於中國者百家之學時或稱而道之天下大亂賢聖不明道德不一天下多得一察焉以自好譬如耳曰鼻口皆有所明不能相通猶百家衆技也皆有所長時有所用雖然不該不偏一曲之士也判天地之美析萬物之理察古人之全寡能備於天地之美稱神明之容是故内聖外王之道闇而不明鬱而不發天下之人各爲其所欲焉以自爲方悲夫百家往而不反必不合矣後世之學者不幸不見天地之純古人之大體道術將爲天下裂不侈於後世不靡於萬物不暉於數度以繩墨自矯而備世之急古之道術有在於是者墨翟禽滑釐聞其風而悦之爲之太過已之大循作爲非樂命之曰節用生不歌死無服墨子氾愛兼利而非鬭其道不怒又好學而博不異不與先王同毁古之禮樂黄帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟雍之樂武王周公作武古之喪禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重今墨子獨生不歌死不服桐棺三寸而無槨以爲法式以此教人恐不愛人以此自行固不愛己末敗墨子道雖然歌而非歌哭而非哭樂而非樂是果類乎其生也勤其死也薄其道大觳使人憂使人悲其行難爲也恐其不可以爲聖人之道反天下之心天下不堪墨子雖獨能任柰天下何離於天下其去王也遠矣墨子稱道曰昔者禹之湮洪水决江河而通四夷九州也名川三百支川三千小者無數禹親自操橐耜而九雜天下之川腓無肢脛無毛沐甚雨櫛疾風置萬國禹大聖也而形勞天下也如此使後世之墨者多以裘褐爲衣以跂蹻爲服日夜不休以自苦爲極曰不能如此非禹之道也不足謂墨相里勤之弟子五侯之徒南方之墨者苦獲已齒鄧陵子之屬俱誦墨經而倍譎不同相謂别墨以堅白同異之辯相訾以觭偶不仵之辭相應以巨子爲聖人皆願爲之尸冀得爲其後世至今不决墨翟禽滑釐之意則是其行則非也將使後世之墨者必自苦以腓無肢脛無毛相進而已矣亂之上也治之下也雖然墨子眞天下之好也將求之不得也雖枯槁不舍也才士也夫不累於俗不飾於物不荀於人不忮於衆願天下之安寧以活民命人我之養畢足而止以此白心古之道術有在於是者宋鈃尹文聞其風而悅之作爲華山之冠以自表接萬物以别宥爲始語心之容命之曰心之行以聏合驩以調海内請欲置之以爲主見侮不辱救民之鬭禁攻寢兵救世之戰以此周行天下上說下教雖天下不取强聒而不舍者也故曰上下見厭而强見也雖然其爲人太多其自爲太少曰請欲固置五升之飯足矣先生恐不得飽弟子雖飢不忘天下日夜不休曰我必得活哉圖傲乎救世之士哉曰君子不爲苛察不以身假物以爲無益於天下者明之不如已也以禁攻寢兵爲外以情欲寡淺爲内其小大精粗其行適至是而止公而不黨易而無私决然無主趣物而不兩不顧於慮不謀於知於物無擇與之俱往古之道術有在於是者彭蒙田駢愼到聞其風而悅之齊萬物以爲首曰天能覆之而不能載之地能載之而不能覆之大道能包之而不能辯之知萬物皆有所可皆有所不可故曰選則不徧教則不至道則無遺者矣是故愼到棄知去已而縁不得已泠汰於物以爲道理曰知不知將薄知而後鄰傷之者也謑髀無任而笑天下之尚賢也縱脱無行而非天下之大聖推拍輐斷與物宛轉舍是與非苟可以免不師智慮不知前後魏然而已矣推而後行曳而後往若飄風之還若羽之旋若磨石之隧全而無非動靜無過未嘗有罪是何故夫無知之物無建已之患無用知之累動靜不離於理是以終身無譽故曰至於若無知之物而已無用賢聖夫瑰不失道豪桀相與笑之曰愼到之道非生人之行而至死人之理適得怪焉田駢亦然學於彭蒙得不教焉彭蒙之師曰古之道人至於莫之是莫之非而已矣其風窢然惡可而言常反人不聚觀而不免於魭斷其所謂道非道而所言之韙不免於非彭蒙田駢愼到不知道雖然槩乎皆嘗有聞者也以本爲精以物爲粗以有積爲不足澹然獨與神明居古之道術有在於是者關尹老聃聞其風而悦之建之以常無有主之以太一以濡弱謙下爲表以空虚不毁萬物爲實關尹曰在己無居形物自著其動若水其靜若鏡其應若響芴乎若亡寂乎若清同焉者和得焉者失未嘗先人而常隨人老聃曰知其雄守其雌爲天下谿知其白守其辱爲天下谷人皆取先己獨取後曰受天下之垢人皆取實己獨取虚無藏也故有餘巋然而有餘其行身也徐而不費無爲也而笑巧人皆求福己獨曲全曰荀免於咎以深爲根以約爲紀曰堅則毁矣鋭則挫矣常寬容於物不削於人可謂至極關尹老聃乎古之博大眞人哉寂漠無形變化無常死與生與天地並與神明往與芒乎何之忽乎何適萬物畢羅莫足以歸古之道術有在於是者莊周聞其風而悅之以謬悠之說荒唐之言無端崖之辭時恣縱而不儻不以觭見之也以天下爲沉濁不可與莊語以卮言爲曼衍以重言爲眞以寓言爲廣獨與天地精神往來而不敖倪於萬物不譴是非以與世俗處其書雖壞瑋而連抃無傷也其辭雖參差而諔詭可觀彼其充實不可以已上與造物者遊而下與外死生無終始者爲友其於本也弘大而闢深閎而肆其於宗也可謂調適而上遂矣雖然其應於化而解於物也其理不竭其來不蜕芒乎昧乎未之盡者惠施多方其書五車其道舛駁其言也不中歷物之意曰至大無外謂之大一至小無内謂之小一無厚不可積也其大千里天與地卑山與澤平日方中方睨物方生方死大同而與小同異此之謂小同異萬物畢同畢異此之謂大同異南方無窮而有窮今日適越而昔來連環可解也我知天下之中央燕之北越之南是也氾愛萬物天地一體也惠施以此爲大觀於天下而曉辯者天下之辯者相與樂之卵有毛雞三足郢有天下大可以爲羊馬有卵丁子有尾火不熱山出口輪不蹍地目不見指不至至不絶龜長於蛇矩不方規不可以爲圓鑿不圍枘飛鳥之景未嘗動也鏃矢之疾而有不行不止之時狗非犬黄馬驪牛三白狗黑狐駒未常有母一尺之捶日取其半萬世不竭辯者以此與惠施相應終身無窮桓團公孫龍辯者之徒飾人之心易人之意能勝人之口不能服人之心辯者之囿也惠施日以其知與人之辯特與天下之辯者爲怪此其柢也然惠施之口談自以爲最賢曰天地其壯乎施存雄而無術南方有倚人焉曰黄繚問天地所以不墜不陷風雨雷霆之故惠施不辭而應不慮而對徧爲萬物說說而不休多而無已猶以爲寡益之以怪以反人爲實而欲以勝人爲名是以與衆不適也弱於德强於物其塗隩矣由天地之道觀惠施之能其猶一蚉一虻之勞者也其於物也何庸夫充一尚可曰愈貴道幾矣惠施不能以此自寧散於萬物而不厭卒以善辯爲名惜乎惠施之才駘蕩而不得逐萬物而不反是窮響以聲形與影競走也悲夫南華眞經卷之五
