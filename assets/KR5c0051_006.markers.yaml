  - {type: variant, offset: 3750, length: 291, content: 窮百川之量而縣於河河縣於海海縣於天地則各有量也此發辭氣者有似乎觀大可以明小尋其意則不然夫世之所患者不夷也故體大者怏然謂小者爲無餘質小者塊然謂大者爲至足是以上下夸跂俯仰自失此乃生民之所惑也惑者求正正之者莫若先極其差而因其所謂所謂大者至足也故秋豪無以累乎天地矣所謂小者無餘也故天地無以過乎秋豪矣然後惑者有山而反各知其極物安其分逍遥者用其本歩而遊乎自得之場矣此莊子之所以發德音也若如惑者之說轉以小大相傾則相傾者無窮矣若夫覩大而不安其小視少而自以爲多將奔馳於勝之竟而天民之矜夸豈逹乎莊生之㫖哉尾閭崔云海東川名司馬云泄海水出外者也泄息列反又與世反量音亮註及下同縣音玄下同怏於亮反又於良反竟音境, HFL: ''}
