  - {type: punctuation, offset: 22188, content: (, id: KR5c0051_krp_001-bkkpn2828}
  - {type: variant, offset: 22195, length: 4, content: 注迁遷十, ZTDZ: 故舉天下以賞其善者不足舉天下以罰其惡者不給故天下之大不足以賞罰自三代以下者匈匈焉終以賞罰爲事彼何暇安其性命之情哉而且悅明邪是淫於色也悅聰邪是淫於聲也悅仁邪是亂於德也悦義邪是悖於理也悦禮邪是相於技也悅樂邪是相於淫也悦聖邪是相於藝也悅知邪是相於疵也天下將安其性命之情之八者存可也亡可也天下將不安其性命之情之八者乃始臠卷聯拳傖囊而亂天下也而天下乃始尊之惜之甚矣天下之惑也豈直過也而去之邪乃齋戒以言之跪坐以進之鼓歌以舞之吾若是何哉故君子不得已而臨蒞天下莫若無爲無爲也而後安其性命之情故貴以身於爲天下則可以託天下愛以身於爲天下則可以寄天下故君子荀能無解其}
  - {type: page-break, offset: 22195, content: '', id: KR5c0051_SJB_001-110584b}
