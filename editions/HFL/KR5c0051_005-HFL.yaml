body:
  text: 外篇天運第十四天其運乎地其處乎日月其爭於所乎孰主張是孰維綱是孰居無事推而行是意者其有機緘而不得己邪意者其運轉而不能自止邪雲者爲雨乎雨者爲雲乎孰隆弛是孰居無事淫樂而勸是風起北方一西一東有上仿徨孰嘘吸是孰居無事而披拂是敢問何故巫咸祒曰來吾語汝天有六極五常帝王順之則治逆之由凶九洛之事治成德備監照下土天下載之此謂上皇商大宰蕩問仁於莊子莊子曰虎狼仁也曰何謂也莊子曰父子相親何謂不仁曰請問至仁莊子曰至仁無親大宰曰蕩聞之無親則不愛不愛則不孝謂至仁不孝可乎莊子曰不然夫至仁尚矣孝固不足以言之此非遇孝之言也不及孝之言也夫南行者至於郢北面而不見冥山是何也則去之遠也故曰以敬孝易以愛孝難以愛孝易而忘親難忘親易使親忘我難使親忘我易兼忘天下難兼忘天下易使天下兼忘我難夫德遺堯舜而不爲也利澤施於萬世天下莫知也豈直太息而言仁孝乎哉夫孝悌仁義忠信貞廉此皆自勉以役其德者也不足多也故曰至貴國爵并焉至富國財并焉至願名譽并焉是以道不渝北門成問於黄帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩默默乃不自得帝曰汝殆其然哉吾奏之以人徽之以天行之以禮義建之以太清四時迭起萬物循生一盛一衰文武倫經一清一濁陰陽調和流光其聲蟄蟲始作吾驚之以雷霆其卒無尾其始無首一死一生一僨一起所常無窮而一不可待汝故懼也吾又奏之以陰陽之和燭之以日月之明其聲能短能長能柔能剛變化齊一不主故常在谷滿谷在阬滿阬塗郤守神以物爲量其聲揮綽其名高明是故鬼神守其幽日月星辰行其紀吾止之於有窮流之於無止子欲慮之而不能知也望之而不能見也逐之而不能及也儻然立於四虚之道倚於槁梧而吟目知窮乎所欲見力屈乎所欲逐吾旣不及已矣形充空虚乃至委蛇汝委蛇故怠吾又奏之以無怠之聲調之以自然之命故若混逐叢生林樂而無形布揮而不曳幽昏而無聲動於無方居於窈冥或謂之死或謂之生或謂之實或謂之榮行流散徙不主常聲世疑之稽於聖人聖也者達於情而遂於命也天機不張而五官皆備此之謂天樂無言而心悦故有焱氏爲之頌曰聽之不聞其聲視之不見其形充滿天地苞裹六極汝欲聽之而無接焉而故惑也樂也者始於懼懼故祟吾又次之以怠怠故遁卒之於惑惑故愚愚故道道可載而與之俱也孔子西遊於衛顔淵問師金曰以夫子之行爲奚如師金曰惜乎而夫子其窮哉顔淵曰何也師金曰夫芻狗之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而爨之而已將復取而盛以篋衍巾以文繡遊居寢卧其下彼不得夢必且數眯焉今而夫子亦取先生已陳芻狗取弟子遊居寢卧其下故伐樹於宋削迹於衛窮於商周是非其夢邪圍於陳蔡之間七日不火食死生相與鄰是非其昧邪夫水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸則没世不行尋常古今非水陸與周魯非舟車與今蘄行周於魯是猶推舟於陸也勞而無功身必有殃彼未知夫無方之傳應物而不窮者也且子獨不見夫桔橰者乎引之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人故夫三皇五帝之禮義法度不矜於同而矜於治故譬三皇五帝之禮義法度其猶相梨橘柚邪其味相反而皆可於口故禮義法度者應時而變者也今取猨狙而衣以周公之服彼必齕齧挽裂盡去而後慊觀古今之異猶猨狙之異乎周公也故西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美矉而不知矉之所以美惜乎而夫子其窮哉孔子行年五十有一而不聞道乃南之沛見老聃老聃曰子來乎吾聞子北方之賢者也子亦得道乎孔子曰未得也老子曰子惡乎求之哉曰吾求之於度數五年而未得老子曰子又惡乎求之哉曰吾求之於陰陽十有二年而未得老子曰然使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以告人則人莫不告其兄弟使道而可以與人則人莫不與其子孫然而不可者無他也中無主而不止外無正而不行由中出者不受於外聖人不出由外入者無主於中聖人不隱名公器也不可多取仁義先生之蘧廬也止可以一宿而不可乆處覯而多責古之至人假道於仁託宿於義以遊道遥之墟食於荀簡之田立於不貸之圃逍遥無爲也荀簡易養也不貸無出也古者謂是采眞之遊以富爲是者不能讓禄以顯爲是者不能讓名親權者不能與人柄操之則慄舍之則悲而一無所鑒以闚其所不休者是天之戮民也怨恩取與諫教生殺八者正之器也唯循大變無所湮者爲能用之故曰正者正也其心以爲不然者天門弗開矣孔子見老聃而語仁義老聃曰夫播穅眯曰則天地四方易位矣蚊虻噆膚則通昔不寐矣夫仁義憯然乃憤吾心亂莫大焉吾子使天下無失其朴吾子亦放風而動總德而立矣又奚傑然若負建鼓而求亡子者邪夫鵠不日浴而白鳥不日黔而黑黑白之朴不足以爲辯名譽之觀不足以爲廣泉涸魚相與處於陸相呴以濕相濡以沫不若相忘於江湖孔子見老聃歸三曰不談弟子問曰夫子見老聃亦將何規哉孔子曰吾乃今於是乎見龍龍合而成體散而成章乘乎雲氣而養乎陰陽予口張而不能嗋予又何規老聃哉子貢曰然則人固有尸居而龍見雷聲而淵默發動如天地者乎賜亦可得而觀乎遂以孔子聲見老聃老聃方將倨堂而應徵曰予年運而往矣子將何以戒我乎子貢曰夫三王五帝之治天下不同其係聲名一也而先生獨以爲非聖人如何哉老聃曰小子少進子何以謂不同對曰堯授舜舜授禹禹用力而湯用兵文王順紂而不敢逆武王逆紂而不肯順故曰不同老聃曰小子少進余語汝三皇五帝之治天下黄帝之治天下使民心一民有其親死不哭而民不非也堯之治天下使民心親民有爲其親殺其殺而民不非也舜之治天下使民心競民孕婦十月生子子生五月而能言不至乎孩而始誰則人始有夭矣禹之治天下使民心變人有心而兵有順殺盜非殺人自爲種而天下耳是以天下大駭儒墨皆起其作始有倫而今乎婦女何言哉余語汝三皇五帝之治天下名曰治之而亂莫甚焉三皇之知上悖日月之明下睽山川之精中墮四時之施其知憯於𧓽蠆之尾鮮規之獸莫得安其性命之情者而猶自以爲聖人不可恥乎其無恥也子貢蹴蹴然立不安孔子謂老聃曰丘治詩書禮樂易春秋六經自以爲乆矣孰知其故矣以奸者七十二君論先王之道而明周召之迹一君無所鉤用甚矣夫人之難說也道之難明邪老子曰幸矣子之不過治世之君也夫六經先王之陳迹也豈其所以迹哉今子之所言猶迹也夫迹履之所出而迹豈履哉夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應於下風而風化類自爲雌雄故風化性不可易命不可變時不可止道不可壅荀得於道無自而不可失焉者無自而可孔子不出三月復見曰丘得之矣爲鵲孺魚傳沫細要者化有弟而兄啼乆矣夫丘不與化爲人不與化爲人安能化人老子曰可丘得之矣外篇刻意第十五刻意尚行離世異俗高論怨誹爲亢而已矣此山谷之士非世之人枯稿赴淵者之所好也語仁義忠信恭儉推讓爲修而已矣此平世之士教誨之人遊居學者之所好也語大功立大名禮君臣正上下爲治而已矣此朝廷之士尊主强國之人致功井兼者之所好也就藪澤處間曠釣魚間處無爲而已矣此江海之士避世之人間暇者之所好也吹呴呼吸吐故納新熊經鳥申爲壽而已矣此導引之士養形之人彭祖壽考者之所好也若夫不刻意而高無仁義而修無功名而治無江海而間不導引而壽無不忘也無不有也澹然無極而衆美從之此天地之道聖人之德也故曰夫恬惔寂寞虚無無爲此天地之平而道德之質也故曰聖人休休焉則平易矣平易則恬惔矣平易恬惔則憂患不能入邪氣不能襲故其德全而神不虧故曰聖人之生也天行其死也物化靜而與陰同德動而與陽同波不爲福先不爲禍始感而後應迫而後動不得已而後起去知與故循天之理故無天灾無物累無人非無鬼責其生若浮其死若休不思慮不豫謀光矣而不耀信矣而不期其寢不夢其覺無憂其神純粹其魂不罷虚無恬惔乃合天德故曰悲樂者德之邪喜怒者道之過好惡者德之失故心不憂樂德之至也一而不變靜之至也無所於忤虚之至也不與物交淡之至也無所於逆粹之至也故曰形勞而不休則弊精用而不已則勞勞則竭水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也故曰純粹而不雜靜一而不變淡而無爲動而以天行此養神之道也夫有干越之劍者柙而藏之不敢用也寳之至也精神四達並流無所不極上際於天下蟠於地化育萬物不可爲象其名爲同帝純素之道唯神是守守而勿失與神爲一一之精通合于天倫野語有之曰衆人重利廉士重名賢士尚志聖人貴精故素也者謂其無所與雜也純也者謂其不虧其神也能體純素謂之眞人外篇繕性第十六繕性於俗俗學以求復其初滑欲於俗思以求致其明謂之蔽蒙之民古之治道者以恬養知生而無以知爲也謂之以知養恬知與恬交相養而和理出其性夫德和也道理也德無不容仁也道無不理義也義明而物親忠也中純實而反乎情樂也信行容體而順乎文禮也禮樂徧行則天下亂矣彼正而蒙己德德則不冒冒則物必失其性也古之人在混芒之中與一世而得澹漠焉當是時也陰陽和靜鬼神不擾四時得節萬物不傷群生不夭人雖有知無所用之此之謂至一當是時也莫之爲而常自然逮德下衰及燧人伏義始爲天下是故順而不一德又下衰及神農黄帝始爲天下是故安而不順德又下衰及唐虞始爲天下興治化之流𣻏淳散朴離道以善險德以行然後去性而從於心心與心識知而不足以定天下然後附之以文益之以博文滅質博溺心然後民始惑亂無以反其性情而復其初由是觀之世喪道矣道喪世矣世與道交相喪也道之人何由興乎世世亦何由興乎道哉道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣隱故不自隱古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也當時命而大行乎天下則反一無迹不當時命而大窮乎天下則深根寧極而待此存身之道也古之行身者不以辯飾知不以知窮天下不以知窮德危然處其所而反其性已又何爲哉道固不小行德固不小識小識傷德小行傷道故曰正己而已矣樂全之謂得志古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣今之所謂得志者軒冕之謂也軒冕在身非性命也物之儻來寄也寄之其來不可圍其去不可止故不爲軒冕肆志不爲窮約趨俗其樂彼與此同故無憂而已矣今寄去則不樂由是觀之雖樂未嘗不荒也故曰喪己
