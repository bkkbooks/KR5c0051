  - {type: variant, offset: 7260, length: 5, content: 夫理有至極, HFL: ''}
  - {type: variant, offset: 7266, length: 255, content: 內相冥未有極遊外之致而不冥於內者也未有能冥於內而不遊於外者也故聖人常遊外以私內無心以順有故雖終日揮形而神氣無變俯仰萬機而淡然自若夫見形而不及神者天下之常累也是故覩其與羣物並行則莫能謂之遺物而離人矣觀其體化而應務則莫能謂之坐忘而自得矣豈直謂聖人不然哉乃必謂至理之無此是故莊子將明流統之所宗以釋天下之可悟若直就稱仲尼之如此或者將據所見以排之故超聖人之內迹而方外於數子宜其所寄以尋述作之大意則夫遊外弘內之道坦然自明而莊子之書故是渉俗蓋世之談矣無以命之崔李云命名也淡徒暫反離力知反下同應應對之應下同數所主反坦徒但反外內, HFL: 内}
  - {type: punctuation, offset: 7272, content: /, id: KR5c0051_krp_003-bkkpn812}
  - {type: variant, offset: 7278, length: 11, content: 冥於內者也未有能冥於內, ZTDZ: 喜侮之}
