  - {type: variant, offset: 8827, length: 95, content: 夫聲色離曠有耳目者之所貴也受生有分而以所貴引之則性命䘮矣若乃毀其所貴弃彼任我則聦明各全人含其眞也鑠郭李詩灼反向徐音藥崔云燒斷之也竽徐音于瑟本亦作笙塞崔本作塞杜云塞也膠音交徐古孝反䘮矣息浪反毀, HFL: 毁}
