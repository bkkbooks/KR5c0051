  - {type: variant, offset: 22330, length: 2, content: 下同, ZTDZ: 躍而遊雲將見之倘然止贄然立曰叟何人邪叟何爲此鴻蒙拊髀爵躍不輟對雲將曰遊雲將曰朕願有問也鴻蒙仰而視雲將曰吁雲將曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育群生爲之奈何鴻蒙拊髀爵躍掉頭曰吾弗知吾弗知雲將不得問又}
