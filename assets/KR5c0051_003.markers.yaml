  - {type: punctuation, offset: 3427, content: (, id: KR5c0051_krp_003-bkkpn446}
  - {type: variant, offset: 3427, length: 8, content: 明無不待有而無也, HFL: ''}
  - {type: variant, offset: 3427, length: 2, content: 明無, ZTDZ: 六合爲巨未離其内秋豪爲小侍之在體天下莫}
  - {type: variant, offset: 3430, length: 2, content: 待有, ZTDZ: 沈浮終身不故陰陽四時運行各得其序惛然若亡而存油然不形而神萬物畜而不知此之謂本根可以觀於天矣齧缺問道乎被衣被衣曰若正汝形一汝視天和將至攝汝知一汝度神將來舍德將爲汝美道將爲汝居汝瞳焉如新生之犢}
  - {type: page-break, offset: 3430, content: '', id: KR5c0051_SJB_003-110607b}
  - {type: punctuation, offset: 3431, content: /, id: KR5c0051_krp_003-bkkpn447}
  - {type: variant, offset: 3434, length: 0, content: '', ZTDZ: 求其故言未卒齧缺睡寐被衣大悅行歌而去之曰形若槁骸心若死灰眞其實知不以故自持媒媒晦晦無心而不可與謀彼何人哉舜問乎丞曰道可得而有乎曰汝身非汝有}
  - {type: punctuation, offset: 3435, content: ), id: KR5c0051_krp_003-bkkpn448}
  - {type: variant, offset: 3435, length: 0, content: '', ZTDZ: 汝何得有夫道舜曰吾身非吾有也孰有之哉曰是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也孫子非汝有是天地之委蜕也故行不知所往處不知所持食不知所味天地之彊陽氣也又胡可得而有邪孔子問於老聃曰今日晏間敢問至道老聃曰汝齋戒疏淪而心澡雪而精}
  - {type: 'kr:non-cjk', offset: 3436, content: ⬤, id: KR5c0051_krp_003-bkkkrnonc65}
  - {type: variant, offset: 3436, length: 0, content: '', HFL: 鬼}
  - {type: variant, offset: 3436, length: 0, content: '', ZTDZ: 掊擊而知夫道窅然難言哉將爲汝言其崖略夫昭昭生於冥冥有倫生於無形精}
  - {type: variant, offset: 3437, length: 0, content: '', ZTDZ: 生於道形本生於精而萬物以形相生故九竅者胎生八竅者卵生其來無迹其往無崖無門無房四達之皇皇也邀於此者四枝彊思慮恂達耳目聰明其用心不勞其應物無方天不得不高地不得不廣日月不得不行萬物不得不昌此其道與且夫博之不必知辯之不必慧聖人以斷之矣若夫益之而不加益損之而不加損者聖人之所保也淵淵乎其若海巍巍乎其終則復始也運量萬物而不匱則君子之道彼其外與萬物皆往資焉而不匱此其道與中國有人焉非陰非陽處於天地之間直且爲人將反於宗自本觀之生者喑醷物也雖有壽夭相去幾何須臾之說也奚足以爲堯桀之是非果蓏有理人倫雖難所以相齒聖人遭之而不違過之而不守調而應之德也偶而應之道也}
  - {type: page-break, offset: 3437, content: '', id: KR5c0051_SJB_003-110607c}
  - {type: variant, offset: 3438, length: 5, content: 生天生地無, ZTDZ: 之所與王之所起}
  - {type: 'kr:newline', offset: 3440, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl148}
  - {type: line-break, offset: 3440, content: '', id: KR5c0051_SBCK_003-12a02}
  - {type: punctuation, offset: 3442, content: (, id: KR5c0051_krp_003-bkkpn449}
  - {type: variant, offset: 3442, length: 61, content: 無也豈能生神哉不神帝而帝自神斯乃不神之神也不生天地而天地自生斯乃不生之生也故夫人之果不足以神而不神則神矣功何足有事何足恃哉, HFL: ''}
  - {type: variant, offset: 3444, length: 20, content: 豈能生神哉不神帝而帝自神斯乃不神之神也不, ZTDZ: 人}
  - {type: 'kr:non-cjk', offset: 3451, content: ⬤, id: KR5c0051_krp_003-bkkkrnonc66}
