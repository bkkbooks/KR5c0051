  text: 南華眞經卷之二貞三
  hash: sha256:756cda6b16b66f845adf023ce7cd76b9cb9c8e70f447dc99900ec1a0f46cf80f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0051_SJB_001-110577a}
body:
  text: 內篇大宗師第六知天之所爲知人之所爲者至矣知天之所爲者天而生也知人之所爲者以其知之所知以養其知之所不知終其天年而不中道夭者是知之盛也雖然有患夫知有所待而後當其所待者特未定也庸詎知吾所謂天之非人乎所謂人之非天乎且有眞人而後有眞知何謂眞人古之眞人不逆寡不雄成不謨士若然者過而弗悔當而自得也若然者登高不慄入水不濡入火不熱是知之能登假於道也若此古之眞人其寢不夢其覺無憂其食不甘其息深深眞人之息以踵衆人之息以喉屈服者其嗌言若哇其嗜欲深者其天機淺古之眞人不知悅生不知惡死其出不訢其入不距翛然而往翛然而來而已矣不忘其所始不求其所終受而喜之忘而復之是之謂不以心捐道不以人助天是之謂眞人若然者其心志其容寂其顙頯凄然似秋煖然似春喜怒通四時與物有宜而莫知其極故聖人之用兵也亡國而不失人心利澤施乎萬世不爲愛人故樂通物非聖人也有親非仁也天時非賢也利害不通非君子也行名失已非士也亡身不眞非役人也若狐不偕務光伯夷叔齊箕子胥餘紀他申徒狄是役人之役適人之適而不自適其適者也古之眞人其狀義而不朋若不足而不承與乎其觚而不竪也張乎其虚而不華也邴邴乎其似喜乎崔乎其不得已乎滀乎進我色也與乎止我德也厲乎其似世乎謷乎其未可制也連乎其似好閉也悗乎忘其言也以刑爲體以禮爲翼以知爲時以德爲循以刑爲體者綽乎其殺也以禮爲翼者所以行於世也以知爲時者不得已於事也以德爲循者言其與有足者至於丘也而人眞以爲勤行者也故其好之也一其弗好之也一其一也一其不一也一其一與天爲徒其不一與人爲徒天與人不相勝也是之謂眞人死生命也其有夜旦之常天也人之有所不得與皆物之情也彼特以天爲父而身猶愛之而沉其卓乎人特以有君爲愈乎已而身猶死之而況其眞乎泉涸魚相與處於陸相呴以濕相濡以沫不如相忘於江湖與其譽堯而非桀也不如兩忘而化其道夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以喜吾死也夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也藏小大有宜猶有所遯若夫藏天下於天下而不得所遯是怕物之大情也特犯人之形而猶喜之若人之形者萬化之未始有極也其爲樂可勝計邪故聖人將遊於物之所不得遯而皆存善夭善老善始善終人猶效之又況萬物之所係而一化之所待乎夫道有情有信無爲無形可傳而不可受可得而不可見自本自根未有天地自古以固存神鬼神帝生天生地在太極之先而不爲高在六極之下而不爲深先天地生而不爲乆長於上古而不爲老狶韋氏得之以挈天地伏犧氏得之以襲氣母維斗得之終古不忒日月得之終古不息堪坏得之以襲崑崙馮夷得之以遊大川肩吾得之以處太山黄帝得之以登雲天顓頊得之以處玄宫禺强得之立乎北極西王母得之坐乎少廣莫知其始莫知其終彭祖得之上及有虞下及五伯傳說得之以相武丁奄有天下乘東維騎箕尾而比於列星南伯子葵問乎女偊曰子之年長矣而色若孺子何也曰吾聞道矣南伯子葵曰道可得學耶曰惡惡可子非其人也夫卜梁倚有聖人之才而無聖人之道我有聖人之道而無聖人之才吾欲以教之庶幾其果爲聖人乎不然以聖人之道告聖人之才亦易矣吾猶守而告之叁日而後能外天下已外天下矣吾又守之七日而後能外物已外物矣吾又守之九日而後能外生已外生矣而後能朝徹朝徹而後能見獨見獨而後有無古今無古今而後能入於不死不生殺生者不死生生者不生其爲物無不將也無不迎也無不毁也無不成也其名爲攖寧攖寧也者攖而後成者也南伯子葵曰子獨惡乎聞之曰聞諸副墨之子副墨之子聞諸洛誦之孫洛誦之孫聞之瞻明瞻明聞之聶許聶許聞之需役需役聞之於謳於謳聞之玄冥玄冥聞之參寥參寥聞之疑始子祀子輿子犁子來四人相與語曰孰能以無爲首以生爲脊以死爲尻孰知死生存亡之一體者吾與之友矣四人相視而笑莫逆於心遂相與爲友俄而子輿有病子祀往問之曰偉哉夫造物者將以子爲此拘拘也曲僂發背上有五管順隱於齊肩高於頂句贅指天陰陽之氣有沴其心閒而無事跰𨇤而鑑于井曰嗟乎夫造物者又將以予爲此拘拘也子祀曰汝惡之乎曰亡予何惡浸假而化予之左臂以爲雞予因以求時夜浸假而化予之右臂以爲彈予因以求鴞炙浸假而化予之尻以爲輪以神爲馬予因而乘之豈更駕哉且夫得者時也失者順也安時而處順哀樂不能入也此古之所謂縣解也而不能自解者物有結之且夫物不勝天久矣吾又何惡焉俄而子來有病喘喘然將死其妻子環而泣之犁徃問之曰叱避無恒化倚其户與之語曰偉哉造化又將奚以汝爲將奚以汝適以汝爲鼠肝乎以汝爲蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅於父母彼近吾死而我不聽我則捍矣彼何罪焉夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也今之大冶鑄金金踴躍曰我且必爲鏌鋣大冶必以爲不祥之金今一犯人之形而曰人耳人耳夫造化者必以爲不祥之人今一以天地爲大鑪以造化爲大冶惡乎往而不可哉成然寐蘧然覺子桑户孟子反子琴張三人相與友曰孰能相與於與相與相爲於無相爲孰能登天遊霧撓挑無極相忘以生無所終窮二人相視而笑莫逆於心遂相與友莫然有間而子桑户死未葬孔子聞之使子貢往待事焉或編曲或鼓琴相和而歌曰嗟來桑户乎嗟來桑户乎而已反其眞而我猶爲人猗子貢趨而進曰敢問臨尸而歌禮乎二人相視而笑曰是惡知禮意子貢反以告孔子曰彼何人者邪脩行無有而外其形骸臨尸而歌顔色不變無以命之彼何人者邪孔子曰彼遊方之外者也而丘遊方之内者也外内不相及而丘使汝往弔之丘則陋矣彼方且與造物者爲人而遊乎天地之一氣彼以生爲附贅縣疣以死爲决疣潰癰夫若然者又惡知死生先後之所在假於異物託於同體忘其肝膽遺其耳目反覆終始不知端倪芒然彷徨乎塵垢之外逍遥乎無爲之業彼又惡能憒憒然爲世俗之禮以觀衆人之耳目哉子貢曰然則夫子何方之依曰丘天之戮民也雖然吾與汝共之子貢曰敢問其方孔子曰魚相造乎水人相造乎道相造乎水者穿池而養給相造乎道者無事而生定故曰魚相忘乎江湖人相忘乎道術子貢曰敢問畸人曰畸人者畸於人而侔於天故曰天之小人人之君子人之君子天之小人也顔回問仲尼曰孟孫才其母死哭泣無涕中心不感居喪不哀無是三者以善喪蓋魯國固有無其實而得其名者乎回壹怪之仲尼曰夫孟孫氏盡之矣進於知矣唯簡之而不得夫已有所簡矣孟孫氏不知所以生不知所以死不知就先不知就後若化爲物以待其所不知之化已乎且方將化惡知不化哉方將不化惡知已化哉吾特與汝其夢未始覺者邪且彼有駭形而無損心有旦宅而無情死孟孫氏特覺人哭亦哭是自其所以乃且也相與吾之耳矣庸詎知吾所謂吾之乎且汝夢爲鳥而厲乎天夢爲魚而没於淵不識今之言者其覺者乎其夢者乎造適不及笑獻笑不及排安排而去化乃入於寥天一意而子見許由許由曰堯何以資汝意而子曰堯謂我汝必躬服仁義而明言是非許由曰而奚來爲軹夫堯旣已黥汝以仁義而劓汝以是非矣汝將何以遊夫遥蕩恣瞧轉徒之塗乎意而子曰雖然吾願遊於其藩許由曰不然夫盲者無以與乎眉目顔色之好瞽者無以與乎青黄黼黻之觀意而子曰夫無莊之失其美據梁之失其力黄帝之亡其知皆在鑪錘之間耳庸詎知夫造物者之不息我黥而補我劓使我乘成以隨先生邪許由曰噫未可知也我爲汝言其大略吾師乎吾師乎𩐎萬物而不爲義澤及萬世而不爲仁長於上古而不爲老覆載天地刻彫衆形而不爲巧此所遊已顔回曰回益矣仲尼曰何謂也曰回忘仁義矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也它日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹴然曰何謂坐忘顔回曰墮肢體黜聰明離形去知同於大通此謂坐忘仲尼曰同則無好也化則無常也而果其賢乎丘也請從而後也子輿與子桑友而淋雨十日子輿曰子桑殆病矣裹飯而往食之至子桑之門則若歌若哭鼓琴曰父邪母邪天乎人乎有不任其聲而趨舉其詩焉子輿入曰子之歌詩何故若是曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其爲之者而不得也然而至此極者命也夫內篇應帝王第七齧缺問於王倪四問而四不知齧缺因躍而大喜行以告蒲衣子蒲衣子曰而乃今知之乎有虞氏不及泰氏有虞氏其猶臧仁以要人亦得人矣而未始出於非人泰氏其卧徐徐其覺于于一以己爲馬一以己爲牛其知情信其德甚眞而未始入於非人肩吾見狂接輿狂接輿曰日中始何以語汝肩吾曰告我君人者以己出經式義度人孰敢不聽而化諸狂接輿曰是欺德也其於治天下也猶涉海鑿河而使蚉負山也夫聖人之治也治外乎正而後行确乎能其事者而已矣且鳥高飛以避矰弋之害鼷鼠深穴乎神丘之下以避熏鑿之患而曾二蟲之無知天根遊於殷陽至蓼水之上適遭無名人而問焉曰請問爲天下無名人曰去汝鄙人也何問之不豫也予方將與造物者爲人厭則又乘夫莽眇之鳥以出六極之外而遊無何有之郷以處壙垠之野汝又何帠以治天下感予之心爲又復問無名人曰汝遊心於淡合氣於漠順物自然而無容私焉而天下治矣陽子居見老聃曰有人於此嚮疾彊梁物徹疏明學道不倦如是者可比明王乎老聃曰是於聖人也胥易技係勞形怵心者也且也虎豹之文來田猨狙之便執斄之狗來藉如是者可比明王乎陽子居蹴然曰敢問明王之治老聃曰明王之功蓋天下而似不自己化貸萬物而民弗恃有莫舉名使物自喜立乎不測而遊於無有者也鄭有神巫曰季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆棄而走列子見之而心醉歸以告壺子曰始吾以夫子之道爲至矣則又有至焉者矣壺子曰吾與汝旣其文未旣其實而固得道與衆雄而無雄而又奚卯焉而以遁與世亢必信夫故使人得而相汝嘗試與來以予示之明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣吾見怪焉見濕灰焉列子入泣涕沾襟以告壺子壺子曰曏吾示之以地文萌乎不震不正是殆見吾杜德機也嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有廖矣全然有生矣吾見其杜權矣列子入以告壺子壺子曰曏吾示之以天壤名實不入而機發於踵是殆見吾善者機也嘗又與來明日又與之見壺子岀而謂列子曰子之先生不齊吾無得而相焉試齊且復相之列子入以告壺子壺子曰吾曏示之以太冲莫勝是殆見吾衡氣機也鯢栢之審爲淵止水之審爲淵流水之審爲淵淵有九名此處三焉嘗又與來明日又與之見壺子立未定自失而走壺子曰追之列子追之不及反以報壺子曰已滅矣已失矣吾弗及已壺子曰曏吾示之以未始出吾宗吾與之虚而委蛇不知其誰何因以爲弟靡因以爲波流故逃也然後列子自以爲未始學而歸三年不出爲其妻爨食豕如食人於事無與親彫豕復朴塊然獨以其形立紛而封哉一以是終無爲名尸無爲謀府無爲事任無爲知主體盡無窮而遊無眹盡其所受乎天而無見得亦虚而已至人之用心若鏡不將不迎應而不藏故能勝物而不傷南海之帝爲鯈北海之帝爲忽中央之帝爲渾沌鯈與忽時相與遇於渾沌之地渾沌待之甚善鯈與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死外篇駢拇第八駢拇枝指出乎性哉而侈於德附贅縣疣出乎形哉而侈於性多方乎仁義而用之者列於五臟哉而非道德之正也是故駢於足者連無用之肉也枝於手者樹無用之指也多方駢枝於五臟之情者淫僻於仁義之行而多方於聰明之用也是故駢於明者亂五色淫文章青黄黼黻之煌煌非乎而離朱是已多於聰者亂五聲淫六律金石絲竹黄鍾大吕之聲非乎而師曠是已枝於仁者擢德塞性以收名聲使天下簧鼓以奉不及之法非乎而曾史是已駢於辯者纍瓦結繩竄句遊心於堅白同異之間而敝跬譽無用之言非乎而揚墨是已故此皆多駢旁枝之道非天下之至正也彼正正者不失其性命之情故合者不爲駢而枝者不爲跂長者不爲有餘短者不爲不足是故鳧脛雖短續之則憂鶴脛雖長斷之則悲故性長非所斷性短非所續無所去憂也意仁義其非人情乎彼仁人何其多憂也且夫駢於拇者决之則泣枝於手者齕之則啼二者或有餘於數或不足於數其於憂一也今世之仁人蒿目而憂世之患不仁之人决性命之情而饕貴富故意仁義其非人情乎自三代以下者天下何其囂囂也且夫待鉤繩規矩而正者是削其性也待繩約膠漆而固者是侵其德也屈折禮樂呴俞仁義以慰天下之心者此失其常然也天下有常然常然者曲者不以鉤直者不以繩圓者不以規方者不以矩附離不以膠漆約束不以纏索故天下誘然皆生而不知其所以生同焉皆得而不知其所以得故古今不二不可虧也則仁義又奚連連如膠漆纏索而遊乎道德之間爲哉使天下惑也夫小惑易方大惑易性何以知其然邪自虞氏招仁義以撓天下也天下莫不奔命於仁義是非以仁義易其性與故嘗試論之自三代以下者天下莫不以物易其性矣小人則以身殉利士則以身殉名大夫則以身殉家聖人則以身殉天下故此數子者事業不同名聲異號其於傷性以身爲殉一也臧與穀二人相與牧羊而俱亡其羊問臧奚事則挾筴讀書問穀奚事則博塞以遊二人者事業不同其於亡羊均也伯夷死名於首陽之下盜跖死利於東陵之上二人者所死不同其於殘生傷性均也奚必伯夷之是而盜跖之非乎天下盡殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人其殉一也則有君子焉有小人焉若其殘生損性則盜跖亦伯夷已又惡取君子小人於其間哉且夫屬其性乎仁義者雖通如曾史非吾所謂臧也屬其性於五味雖通如俞兒非吾所謂臧也屬其性乎五聲雖通如師曠非吾所謂聰也屬其性乎五色雖通如離朱非吾所謂明也吾所謂臧者非仁義之謂也臧於其德而已矣吾所謂臧者非所謂仁義之謂也任其性命之情而已矣吾所謂聰者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣夫不自見而見彼不自得而得彼者是得人之得而不自得其得者也適人之適而不自適其適者也夫適人之適而不自適其適雖盜跖與伯夷是同爲淫僻也余愧乎道德是以上不敢爲仁義之操而下不敢爲淫僻之行也外篇馬蹄第九馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之眞性也雖有義臺路寢無所用之及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皁棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飾之患而後有鞭筴之威而馬之死者已過半矣陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者中鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也吾意善治天下者不然彼民有常性織而衣耕而食是謂同德一而不黨命曰天放故至德之世其行填填其視顛顛當是時也山無蹊隧澤無舟梁萬物群生連屬其鄕禽獸成群草木遂長是故禽獸可係羈而遊鳥鵲之巢可攀援而闚夫至德之世同與禽獸居族與萬物並惡乎知君子小人哉同乎無知其德不離同乎無欲是謂素樸素樸而民性得矣及至聖人蹩躠爲仁踶跂爲義而天下始疑矣澶漫爲樂摘僻爲禮而天下始分矣故純樸不殘孰爲犧樽白玉不毁孰爲珪璋道德不廢安取仁義性情不離安用禮樂五色不亂孰爲文采五聲不亂孰應六律夫殘樸以爲器工匠之罪也毁道德以爲仁義聖人之過也夫馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬知已此矣夫加之以衡扼齊之以月題而馬知介倪闉扼鷙曼詭銜竊轡故馬之知而能至盜者伯樂之罪也夫赫胥氏之時民居不知所爲行不知所之含哺而熙鼓腹而遊民能已此矣及至聖人屈折禮樂以匡天下之形縣跂仁義以慰天下之心而民乃始踶跂好知爭歸於利不可止也此亦聖人之過也外篇胠篋第十將爲胠篋探囊發匱之盜而爲守備則必攝緘滕固扃鐍此世俗之所謂知也然而巨盜至則負匱揭篋擔囊而趨唯恐緘縢扃鐍之不固也然則向之所謂知者不乃爲大盜積者也故嘗試論之世俗之所謂知者有不爲大盜積者乎所謂聖者有不爲大盜守者乎何以知其然邪昔者齊國鄰邑相望雞狗之音相聞罔罟之所布來耨之所刺方三千餘里闔四境之内所以立宗廟社稷治邑屋州閶鄕曲者曷嘗不法聖人哉然而田成子一旦殺齊君而盜其國所盜者豈獨其國邪並與其聖知之法而盜之故田成子有乎盜賊之名而身處堯舜之安小國不敢非大國不敢誅十二世有齊國則是不乃竊齊國並與其聖知之法以守其盜賊之身乎嘗試論之世俗之所謂至知者有不爲大盜積者乎所謂至聖者有不爲大盜守者乎何以知其然邪昔者龍逄斬比干剖萇弘肔子胥靡故四子之賢而身不免乎戮故跖之徒問於跖曰盜亦有道乎跖曰何適而無有道邪夫妄意室中之藏聖也入先勇也出後義也知可否知也分均仁也五者不備而能成大盜者天下未之有也由是觀之善人不得聖人之道不立跖不得聖人之道不行天下之善人少而不善人多則聖人之利天下也少而害天下也多故曰脣竭則齒寒魯酒薄而邯鄲圍聖人生而大盜起掊擊聖人縱舍盜賊而天下始治矣夫川竭而谷虚丘夷而淵實聖人已死則大盜不起天下平而無故矣聖人不死大盜不止雖重聖人而治天下則是重利盜跖也爲之斗斛以量之則并與斗斛而竊之爲之權衡以稱之則並與權衡而竊之爲之符璽以信之則並與符璽而竊之爲之仁義以矯之則并與仁義而竊之何以知其然邪彼竊鉤者誅竊國者爲諸侯諸侯之門而仁義存焉則是非竊仁義聖知邪故逐於大盜揭諸侯竊仁義并斗斛權衡符璽之利者雖有軒冕之賞弗能勸斧鉞之威弗能禁此重利盜跖而使不可禁者是乃聖人之過也故曰魚不可脱於淵國之利器不可以示人彼聖人者天下之利器也非所以明天下也故絶聖棄知大盜乃止摘玉毁珠小盜不起焚符破璽而民朴鄙掊斗折衡而民不爭殫殘天下之聖法而民始可與論議擢亂六律鑠絶竽瑟塞瞽曠之耳而天下始人舍其聰矣滅文章散五采膠離朱之目而天下始人舍其明矣毁絶鉤繩而棄規矩攦工倕之指而天下始人有其巧矣故曰大巧若拙削曾史之行鉗揚墨之口攘棄仁義而天下之德始玄同矣彼人含其明則天下不鑠矣人舍其聰則天下不累矣人含其知則天下不惑矣人含其德則天下不僻矣彼曾史楊墨師曠工倕離朱者皆外立其德而以爚亂天下者也法之所無用也子獨不知至德之世乎昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏戲氏神農氏當是時也民結繩而用之甘其食美其服樂其俗安其居鄰國相望雞狗之音相聞民至老死而不相往來若此之時則至治已今遂至使民延頸舉踵曰某所有賢者赢糧而趣之則内棄其親而外去其主之事足跡接乎諸侯之境車軌結乎千里之外則是上好知之過也上誠好知而無道則天下大亂矣何以知其然邪夫弓弩畢弋機變之知多則鳥亂於上矣鉤餌罔罟罾笱之知多則魚亂於水矣削格羅落置罘不知多則獸亂於澤矣知詐漸毒頡滑堅白解垢同異之變多則俗惑於辯矣故天下每每大亂罪在於好知故天下皆知求其所不知而莫知求其所已知者皆知非其所不善而莫知非其所已善者是以大亂故上悖日月之明下爍山川之精中墮四時之施喘耎之蟲肖翹之物莫不失其性甚矣夫好知之亂天下也自三代以下者是已舍夫種種之民而悦夫役役之佞釋夫恬惔無爲而悅夫哼哼之意啍啍已亂天下矣外篇在宥第十一聞在宥天下不聞治天下也在之也者恐天下之淫其性也宥之也者恐天下之遷其德也天下不淫其性不遷其德有治天下者哉昔堯之治天下也使天下欣欣焉人樂其性是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愉也夫不恬不愉非德也非德也而可長乆者天下無之人大喜邪毗於陽大怒邪毗於陰陰陽並毗四時不至寒暑之和不成其反傷人之形乎使人喜怒失位居處無常思慮不自得中道不成章於是乎天下始喬詰卓鷙而後有盜跖曾史之行故舉天下以賞其善者不足舉天下以罰其惡者不給故天下之大不足以賞罰自三代以下者匈匈焉終以賞罰爲事彼何暇安其性命之情哉而且悅明邪是淫於色也悅聰邪是淫於聲也悅仁邪是亂於德也悦義邪是悖於理也悦禮邪是相於技也悅樂邪是相於淫也悦聖邪是相於藝也悅知邪是相於疵也天下將安其性命之情之八者存可也亡可也天下將不安其性命之情之八者乃始臠卷聯拳傖囊而亂天下也而天下乃始尊之惜之甚矣天下之惑也豈直過也而去之邪乃齋戒以言之跪坐以進之鼓歌以舞之吾若是何哉故君子不得已而臨蒞天下莫若無爲無爲也而後安其性命之情故貴以身於爲天下則可以託天下愛以身於爲天下則可以寄天下故君子荀能無解其五藏無擢其聰明尸居而龍見淵默而雷聲神動而天隨從容無爲而萬物炊累焉吾又何暇治天下哉崔瞿問於老聃曰不治天下安臧人心老聃曰汝愼無攖人心人心排下而進上上下囚殺淖約柔乎剛彊廉劌彫琢其熱焦火其寒凝冰其疾俛仰之間而再撫四海之外其居也淵而靜其動也縣而天僨驕而不可係者其唯人心乎昔者黄帝始以仁義攖人之心堯舜於是乎股無胈脛無毛以養天下之形愁其其五藏以爲仁義矜其血氣以規法度然猶有不勝也堯於是放讙兜於崇山投三苗於三峗流共工於幽都此不勝天下也夫施及三王而天下大駭矣下有桀跖上有曾史而儒墨畢起於是乎喜怒相疑愚知相欺善否相非誕信相譏而天下衰矣大德不同而性命爛漫矣天下好知而百姓求竭矣於是乎釿鋸制焉繩墨殺焉椎鑿决焉天下脊脊大亂罪在攖人心故賢者伏處大山堪巖之下而萬乘之君憂慄乎廟堂之上今世殊死者相枕也桁楊者相推也刑戮者相望也而儒墨乃始離跂攘臂乎桎梏之間意甚矣哉其無愧而不知恥也甚矣吾未知聖知之不爲桁楊椄槢也仁義之不爲桎梏鑿枘也焉知曾史之不爲桀跖嚆矢也故曰絶聖棄知而天下大治黄帝立爲天子十九年令行天下聞廣成子在於空同之上故往見之曰我聞吾子達於至道敢問至道之精吾欲取天地之精以佐五穀以養民人吾又欲官陰陽以遂群生爲之奈何廣成子曰而所欲問者物之質也而所欲官者物之殘也自而治天下雲氣不待族而雨草木不待黄而落日月之光益以荒矣而佞人之心翦翦者又奚足以語至道黄帝退捐天下築特室席白茅閒居三月復往邀之廣成子南首而卧黄帝順下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長乆廣成子蹷然而起曰善哉問乎來吾語汝至道至道之精窈窈㝠㝠至道之極昏昏默默無視無聽抱神以靜形將自正必靜必清無勞汝形無摇汝精乃可以長生目無所見耳無所聞心無所知汝神將守形形乃長生愼汝内閑汝外多知爲敗我爲汝遂於大明之上矣至彼至陽之原也爲汝入於窈㝠之門矣至彼至陰之原也天地有官陰陽有藏愼守汝身物將自壯我守其一以處其和故我修身千二百歲矣吾形未常衰黄帝再拜稽首曰廣成子之謂天矣廣成子曰來余語汝彼其物無窮而人皆以爲終彼其物無測而人皆以爲極得吾道者上爲皇而下爲王失吾道者上見光而下爲土今夫百昌皆生於土而反於土故余將去汝入無窮之門以遊無極之野吾與日月參光吾與天地爲常當我緡乎遠我昬乎人其盡死而我獨存乎雲將東遊過扶摇之枝而適遭鴻蒙鴻蒙方將拊髀爵躍而遊雲將見之倘然止贄然立曰叟何人邪叟何爲此鴻蒙拊髀爵躍不輟對雲將曰遊雲將曰朕願有問也鴻蒙仰而視雲將曰吁雲將曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育群生爲之奈何鴻蒙拊髀爵躍掉頭曰吾弗知吾弗知雲將不得問又三年東遊過有宋之野而適遭鴻蒙雲將大喜行趨而進曰天忘朕邪天忘朕邪再拜稽首願聞於鴻蒙鴻蒙曰浮遊不知所求猖狂不知所往遊者鞅掌以觀無妄朕又何知雲將曰朕也自以爲猖狂而民隨予所往朕也不得已於民今則民之放也願聞一言鴻蒙曰亂天之經道物之情玄天弗成解獸之群而爲皆夜鳴灾及草木禍及昆蟲噫治人之過也雲將曰然則吾奈何鴻蒙曰噫毒哉僊僊乎歸矣雲將曰吾遇天難願聞一言鴻蒙曰噫心養汝徒處無爲而物自化墮爾形體吐爾聰明倫與物忘大同乎澤溟解心釋神莫然無魂萬物云云各復其根各復其根而不知渾渾沌沌終身不離若彼知之乃是離之無問其名無闚其情物固自生雲將曰天降朕以德示朕以默躬身求之乃今也得再拜稽首起辭而行世俗之人皆喜人之同乎己而惡人之異於己也同於己而欲之異於己而不欲者以出乎衆爲心也夫以出乎衆爲心者曷常出乎衆哉因衆以寧所聞不如衆技衆矣而欲爲人之國者此攬乎三王之利而不見其患者也此以人之國僥倖也幾何僥倖而不喪人之國乎其存人之國也無萬分之一而喪人之國也一不成而萬有餘喪矣悲夫有土者之不知也夫有土者有大物也有大物者不可以物物而不物故能物物明乎物物者之非物也豈獨治天下百姓而已哉出入六合遊乎九州獨往獨來是謂獨有獨有之人是之謂至貴大人之教若形之於影聲之於響有問而應之盡其所懷爲天下配處乎無響行乎無方挈汝適復之撓撓以遊無端出入無旁與日無始頌論形軀合乎大同大同而無己無己惡乎得有有覩有者昔之君子覩無者天地之友賤而不可不任者物也卑而不可不因者民也匿而不可不爲者事也麤而不可不陳者法也遠而不可不居者義也親而不可不廣者仁也節而不可不積者禮也中而不可不高者德也一而不可不易者道也神而不可不爲者天也故聖人觀於天而不助成於德而不累出於道而不謀會於仁而不恃薄於義而不積應於禮而不諱接於事而不讓齊於法而不亂恃於民而不輕因於物而不去物者莫足爲也而不可不爲不明於天者不純於德不通於道者無自而可不明於道者悲夫何謂道有天道有人道無爲而尊者天道也有爲而累者人道也主者天道也臣者人道也天道之與人道也相去遠矣不可不察也南華眞經卷之二
