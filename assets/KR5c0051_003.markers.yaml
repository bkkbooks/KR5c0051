  - {type: variant, offset: 3576, length: 5, content: 上下無不格, ZTDZ: 夫二子者又何足以稱揚哉是其於辯也將妄鑿垣墻而殖蓬蒿也簡髮而櫛數米而炊竊竊乎又何足以濟世哉舉賢則民相軋任知則民相盜之數物}
