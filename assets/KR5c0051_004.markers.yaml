  - {type: variant, offset: 12366, length: 284, content: 夫堯舜帝王之名皆其迹耳我寄斯迹而迹非我也故駭者自世世彌駭其迹愈粗粗之與妙自之夷險耳遊者豈常改其足哉故聖人一也天有堯舜湯武之異明斯異者時世之名耳未足以名聖人之實也故夫堯舜者豈直堯舜而巳哉是以雖有矜愁之貌仁義之迹而所以迹者故全也股音古脛本曰股胈畔末反向父末反李扶蓋反云白肉也或云字當作紱紱蔽膝也崔云胈也脛刑定反讙音歡兠丁侯反崇山南裔也堯六十年放讙兠于崇山投三苗崔本投作殺尚書作竄三苗者縉雲氏之子即饕餮也三峗音危本亦作危三危西裔之山也今属天水堯六十六年竄三苗於三危共工音恭共工官名即窮奇也幽都李云即幽州也尚書作幽州北裔也堯六十四年流共工于幽州施以智反崔云延也駭驚也粗音麄下同, HFL: ''}
