  - {type: line-break, offset: 10, content: '', id: KR5c0051_SBCK_001-1a03}
  - {type: variant, offset: 14, length: 1, content: 逍, ZTDZ: 大}
  - {type: variant, offset: 15, length: 1, content: 遥, ZTDZ: 宗}
  - {type: substitution, offset: 15, original: 遥, replacement: 遙, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20748}}
  - {type: variant, offset: 16, length: 1, content: 遊, ZTDZ: 師}
  - {type: variant, offset: 18, length: 0, content: '', ZTDZ: 六知天之所爲知人之所爲者至矣知天之所爲者天而生也知人之所爲者以其知之所知以養其知之所不知終其天年而不中道夭者是知之盛也雖然有患夫知有所待而後當其所待者特未定也庸詎知吾所謂天之非人乎所謂人之非天乎且有眞人而後有眞知何謂眞人古之眞人不逆寡不雄成不謨士若然者過而弗悔當而自得也若然者登高不慄入水不濡入火不熱是知之能登假於道也若此古之眞人其寢不夢其覺無憂其食不甘其息深深眞人之息以踵衆人之息以喉屈服者其嗌言若哇其嗜欲深者其天機淺古之眞人不知悅生不知惡死其出不訢其入不距翛然而往翛然而來而已矣不忘其所始不求其所終受而喜之忘而復之是之謂不以心捐道不以人助天是之謂眞人若然者其心志其容寂其顙頯凄然似秋煖然似春喜怒通四時與物有宜而莫知其極故聖人之用兵也亡國而不失人心利澤施乎萬世不爲愛人故樂通物非聖人也有親非仁也天時非賢也利害不通非君子也行名失已非士也亡身不眞非役人也若狐不偕務光伯夷叔齊箕子胥餘紀他申徒狄是役人之役適人之適而不自適其適者也古之眞人其狀義而不朋若不足而不承與乎其觚而不竪也張乎其虚而不華也邴邴乎其似喜乎崔乎其不得已乎滀乎進我色也與乎止我德也厲乎其似世乎謷乎其未可制也連乎其似好閉也悗乎忘其言也以刑爲體以禮爲翼以知爲時以德爲循以刑爲體者綽乎其殺也以禮爲翼者所以行於世也以知爲時者不得已於事也以德爲循者言其與有足者至於丘也而人眞以爲勤行者也故其好之也}
  - {type: page-break, offset: 18, content: '', id: KR5c0051_SJB_001-110577b}
  - {type: punctuation, offset: 19, content: (, id: KR5c0051_krp_001-bkkpn1}
  - {type: variant, offset: 19, length: 0, content: '', ZTDZ: 其弗好之也一其一也一其不一也一其一與天爲徒其不一與人爲徒天與人不相勝也是之謂眞人死生命也其有夜旦之常天也人之有所不得與皆物之情也彼特以天爲父而身猶愛之而沉其卓乎人特以有君爲愈乎已而身猶死之而況其眞乎泉涸魚相與處於陸相呴以濕相濡以沫不如相忘於江湖與其譽堯而非桀也不如兩忘而化其道}
  - {type: page-break, offset: 19, content: '', id: KR5c0051_SJB_001-110577c}
  - {type: variant, offset: 20, length: 0, content: '', ZTDZ: 大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以喜吾死也夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也藏}
  - {type: variant, offset: 22, length: 2, content: 雖殊, ZTDZ: 有宜猶有所遯若夫藏天下於天下}
  - {type: variant, offset: 25, length: 1, content: 放, ZTDZ: 不得所遯是怕物之大情也特犯人之形而猶喜之若人之形者萬化之未始有極也其爲樂可勝計邪故聖人將遊}
  - {type: punctuation, offset: 27, content: /, id: KR5c0051_krp_001-bkkpn2}
  - {type: variant, offset: 27, length: 0, content: '', ZTDZ: 物之所不得遯而皆存善夭善老善始善終人猶效之又況萬物之所係而一化之所待乎夫道有情有信無爲無形可傳而不可受可得而不可見}
  - {type: variant, offset: 28, length: 0, content: '', ZTDZ: 本自根未有天地自古以固存神鬼神帝生天生地在太極之先而不爲高在六極之下而不爲深先天地生而不爲乆長於上古而不爲老狶韋氏}
  - {type: variant, offset: 30, length: 2, content: 場財, ZTDZ: 以挈天地伏犧氏得之以襲氣母維斗得之終古不忒日月得之終古不息堪坏得之以襲崑崙馮夷得之以遊大川肩吾得之以處太山黄帝得之以登雲天顓頊得之以處玄宫禺强得之立乎北極西王母得之坐乎少廣莫知其始莫知其終彭祖得之上及有虞下及五伯傳說得之以相武丁奄有天下乘東維騎箕尾而比於列星南伯子葵問乎女偊曰子之年長矣而色若孺子何也曰吾聞道矣南伯子葵曰道可得學耶曰惡惡可子非其人也夫卜梁倚有聖人之才而無聖人之道我有聖人之道而無聖人之才吾欲以教之庶幾其果爲聖人乎不然以聖人之道告聖人之才亦易矣吾猶守而告之叁日而後能外天下已外天下矣吾又守之七日而後能外}
  - {type: page-break, offset: 30, content: '', id: KR5c0051_SJB_001-110578a}
  - {type: variant, offset: 33, length: 1, content: 任, ZTDZ: 已外物矣吾又守之九日而後能外生已外生矣而後能朝徹朝徹而後能見獨見獨而後有無古今無古今而後能入於不死不生殺生者不死生生者不生}
