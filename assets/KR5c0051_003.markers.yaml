  - {type: variant, offset: 11692, length: 161, content: 言此功夫容身不得不足以此聖王楊子居李云居名也子男子通稱嚮許亮反李云許兩反疾強梁崔云所在疾強梁之人也李云敏疾如嚮也簡文云如嚮應聲之疾故是強梁之貌物徹䟽明司馬云物事也徹通也事能通而開明也崔云無物不逹無物不明勌其眷反胥如字司馬云䟽也簡文云相也易音亦崔以豉反相輕易也簡文同技徐其綺反簡文云藝也係如字崔本作繫或云作繫簡文云音繫勑律反, HFL: ''}
