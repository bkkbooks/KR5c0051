  - {type: variant, offset: 412, length: 961, content: 過分蓋全理盡年而已矣庖丁爲文惠君解牛手之所解肩之所足之所履之所踦砉然嚮然奏刀騞然莫不中音合於桑林之舞乃中經首之會言其因便施巧無不閑解盡理之甚旣適牛理又合音節庖丁崔本作胞同白交反庖人丁其名也管子有屠牛坦一朝解九牛力可剃毛爲于僞反文惠君崔司馬云梁惠王也徐於綺反向偃彼反徐又於佇反李音妖踦徐居彼反向魚彼反李云刺也砉然向呼鵙反徐許賜反崔音畫又古鵙反李又呼歷反司馬云皮骨相離聲嚮然許丈反郭許亮反本或無然字奏如字崔云聞也騞呼反徐許臂反向他亦反又音麥崔云音近聲大於砉也中丁仲反下皆同桑林司馬云湯樂名崔云宋舞樂名案即左傳舞師題以旌夏是也經首向司馬云咸池樂章也崔云樂章名也或云奏樂名便婢靣反解音蟹文惠君曰譆善哉技蓋至此乎庖丁釋刀對曰臣之所好者道也進乎技矣直道理於技耳所好者非技也譆徐音熈李云歎聲也技具綺反下同好呼報反注同始臣之解牛之時所見無非牛者未能見其理間三年之後未嘗見全牛也但見其理間也方今之時臣以神遇而不以目視闇與理會神遇向云暗與理㑹謂之神遇官知止而神欲行司察之官廢縱心而順理官知如字崔云官知謂有所掌在也向音智專所司察而後動謂之官智而神欲行如字向云從手放意無心而得謂之神欲依乎天理不橫截也批大郤有際之處因而批之令離批備結反一音鋪迷反字林云擊也父迷父節二反郤徐去逆反郭音郄崔李云間也處昌慮反令力呈反下同離力智反導大節解空就導令殊導音道注同苦管反又苦天反崔郭司馬云空也向音空解戸買反因其固然刀不妄加技經肯綮之未嘗技之妙也常遊刃於空未嘗經槩於微礙也技本或作猗其綺反徐音技肯徐苦等反文作肎字林同口乃反云著骨肉也一曰骨無肉也崔云許叔重曰骨間肉肯肯著也綮苦挺反崔向徐並音啓李烏係反又一音罄司馬云猶結處也槩古代反礙五代反而況大軱乎軱戾大骨衂刀刃也大軱音孤向云軱戾大骨也崔云槃結骨衂女六反良庖歲更刀割也不中其理間也良庖司馬云良善也割司馬云以刀割肉故歲歲更作崔云歲一易刀猶堪割也族庖月更刀折也中骨而折刀也族庖司馬云族離也崔云族衆也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎硎砥石也硎音刑磨石也崔本作形云新所受形也砥音脂又之履反尚書傳云砥細於礪皆磨石也彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎雖然毎至於族吾見其難爲交錯聚結爲族怵然爲戒視爲止不復属目於他物也爲于僞反下皆同行爲遲徐其手也動刀甚微謋然巳解得其宜則, ZTDZ: 成}
