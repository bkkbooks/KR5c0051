  - {type: variant, offset: 1637, length: 1198, content: 如字又音豫同云疑貌觚音王云觚特立不倚也崔云觚稜也張乎其虚而不華也曠然無懷乃至於實邴邴乎其似喜乎至人無喜暢然和適故似喜也邴邴徐音丙郭甫杏反向云喜貌簡文云明貌崔乎其不得巳乎動静行止常居必然之極崔于罪反徐息罪反郭旦雷反向云動貌簡文云速貌滀乎進我色也不以物傷巳也傗本又作滀勑六反司馬不色憤起貌王云冨有德充也簡文云聚也與乎止我德也無所趨也厲乎其似世乎至人無厲與世同行故若厲也厲如字崔本作廣云苞羅者廣也謷乎其未可制也高放而自得謷五羔反徐五到反司馬云志逺貌王云高邁於俗也連乎其似好閉也緜邈深逺莫見其門連如字李云連緜長貌雀云寒連也音輦好呼報反下皆同悗乎其言也不識不知而天機自發故悗然也悗亡本反字或作免李云無匹貌王云廢忘也崔云婉順也以刑爲體刑者治之體非我爲治直吏反以禮爲翼禮者世之所以自行耳非我制以知爲時知自時之動非我唱以德爲循德者自彼所循非我作循本亦作修兩得以刑爲體者綽乎其殺也任治之自殺故雖殺而寛綽昌略反崔本作淖以禮爲翼者所以行於世也順世之所行故無不行以知爲時者不得已於事也夫高下相受不可逆之流也小大相羣不得巳之勢也曠然無情羣知之府也承百流之會居師人之極者奚爲哉任時世之知委必然之事其不一與人爲徒彼彼而我我者人也天與人不相勝也是之謂眞人夫眞人同天人齊萬致萬致不相非天人不相勝故曠然無不一冥然無不在而玄同彼我也死生命也其有夜旦之常天也其有晝夜之常天之道也故知死生者命之極非然也若夜旦耳奚所係哉旦如字崔本作但音担人之有所不得與皆物之情也夫眞人在晝得晝在夜得夜以死生爲晝夜豈有所不得乎人之有所不得而憂娛在懷皆物情耳非理也彼特以天爲父而身猶愛之而況其卓乎卓者獨化之謂也夫相因之功莫若獨化之至也故人之所因者天也天之所生者獨化也人皆以天爲父故晝夜之變寒暑之節猶不敢惡隨天安之况乎卓爾獨化至於玄冥之竟又安得而不任之哉旣任之則死生變化唯命之從也淖中至反惡烏路反竟音境人特以有君爲愈乎巳而身猶死之而況其眞乎夫眞者不假於物而自然也夫自然之不可避豈直君命而已哉泉涸魚相與處於陸相呴以濕相濡以沫不如相於江湖與其不足而相愛豈若有餘而相涸戸各反郭戸格反爾雅云愼也呴况于况付二反濡本又作濡音儒或一音如戌反沬音末音亾下同而其譽堯而非桀也不如兩而化其道夫非譽皆生於不足故至足者忘善惡遺死生與變化爲一曠然無不適矣又安知堯桀之所在邪譽音餘注同夫大塊載我以形勞我以生佚我以老息我以死夫形生老死皆我也故形爲我載生爲我勞老爲我佚死爲我息四者雖變未始非我我奚惜哉塊苦怪反又苦對反徐胡罪反佚音逸故善吾生者乃所以善吾死也死與生皆命也無善則巳有善則生不獨善也故若以吾生爲善乎則吾死亦善也夫藏舟於壑藏山於澤謂之固矣方言生死變化之不可逃故先舉固逃之極然然後明之以必變之符將任化而無係也壑火各反然而夜半有力者之而走昧者不知也夫無力之力莫大於變化者也故乃掲天地以趍新山嶽以舍故故不暫停忽已渉新則天地萬物無時而不移也世皆新矣而日以爲故舟日易矣而視之若舊山日更矣而視之若前今, ZTDZ: 汝}
