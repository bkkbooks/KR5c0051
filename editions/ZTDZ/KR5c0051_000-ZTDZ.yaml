front:
  text: 莊子貞二莊子宋人也名周字休生睢陽蒙縣嘗爲蒙漆園吏學無所不窺要本歸於老子之言故其著書十餘萬言大抵率寓言也其言洸洋自恣以適己故自王公大人不能器之楚威王聞周賢使使厚幣迎之許以爲相周笑謂使者千金重利卿相尊位也子獨不見郊祭之犧牛乎養食之數歲衣以文繡以入太廟當是之時欲爲孤豚其可得乎子亟去無污我我寧游戲污瀆之中自快無爲有國者所羈終身不仕以快吾志焉唐封南華眞人書爲南華眞經南華眞經卷之一
