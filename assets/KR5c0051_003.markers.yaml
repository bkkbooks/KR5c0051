  - {type: variant, offset: 7442, length: 0, content: '', ZTDZ: 止是狸德也中之質若視曰上之質若亡其一吾相狗又不若吾相馬也吾相馬直者中繩曲者中鉤}
  - {type: variant, offset: 7443, length: 5, content: 外於數子宜, ZTDZ: 者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若卹若失若喪其一若是者超軼絶塵不知}
  - {type: 'kr:non-cjk', offset: 7448, content: ⬤, id: KR5c0051_krp_003-bkkkrnonc116}
  - {type: variant, offset: 7450, length: 1, content: 寄, ZTDZ: 武侯大悅而笑徐無鬼出女商曰先生獨何}
  - {type: punctuation, offset: 7452, content: ), id: KR5c0051_krp_003-bkkpn828}
  - {type: 'kr:newline', offset: 7452, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl320}
