  - {type: variant, offset: 16397, length: 93, content: 爲離曠而弗能也然離曠以無情而聦明矣有情以爲賢聖而弗能也然賢聖以無情而賢聖也豈直賢聖絶逺而離曠難慕哉雖下愚聾瞽及雞鳴狗吠豈有情於爲之亦終不能也不問逺之與近雖去巳一分顔孔之際終莫之得也是以之, ZTDZ: 機}
