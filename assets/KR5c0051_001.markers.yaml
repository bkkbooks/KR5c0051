  - {type: variant, offset: 22200, length: 2, content: 行注, ZTDZ: 藏無擢其聰明尸居而龍見淵默而雷聲神動而天隨從容無爲而萬物炊累焉吾又何暇治天下哉崔瞿問於老聃曰不治天下安臧人心老聃曰汝愼無攖人心人心排下而進上上下囚殺淖約柔乎剛彊廉劌彫琢其熱焦火其寒凝冰其疾俛仰}
