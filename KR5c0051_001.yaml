body:
  text: 郭象子玄注陸德明音義莊子內篇逍遙遊第一夫小大雖殊而放於自得之場財物任其性事稱其能各當其分逍遙一也豈容勝於其間哉音義曰內篇內者對外立名文云篇書也字從竹從非者草名耳非也逍音銷亦作消遙如字亦作搖遊如字亦作遊逍遙遊者篇名義取間放不拘怡適自得夫音符埸直良切稱尺證切當丁浪切分符問切北有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬鯤之實吾所未詳也夫莊子之大意在乎逍遙遊放無為而自得故極小大之致以明性分之適逹觀之士冝要其會歸而遺其所不足事事曲與生自不害其弘旨皆可略之北冥本亦作溟覔經切北海也嵇康云取其溟溟無涯也梁簡文帝云窅冥無極故謂之冥東方朔十洲記云水黑色謂之冥海無風洪波百丈鯤徐音昆李侯溫反大魚名也崔撰云鯤當為鯨簡文同幾居豈反下同鵬步登反徐音朋郭甫登反崔音鳳云鵬即古鳳字非來儀之鳳也文云朋及鵬皆古文鳳字也朋鳥象形鳳飛羣鳥從以萬數故以鵬為朋黨字字林云鵬朋黨也古以為鳳字夫音符發句之端皆同分符問反下皆同觀古亂反要一遙反鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南冥南冥者天池也非冥海不足以運其身非九萬里不足以其翼此豈好奇哉直以大物必自生於大處大處亦必自生此大物理固自然不患其失又何措心於其間哉垂天之雲司馬彪云若雲垂天旁崔云垂猶邊也其大如天一靣雲也海運司馬云運轉也向秀云非海不行故曰海運簡文云運徙也好呼報反下皆同處昌慮反下同厝七故反本又作措齊諧者志怪者也諧之言曰鵬之徙於南冥也水擊三千里搏扶搖而上者九萬里夫翼大則難舉故搏扶搖而後能上九萬里乃足自勝耳既有斯翼豈得決然而起數仞而下哉此皆不得不然非樂然也齊諧戶皆反司馬及崔並云人姓名簡文云書志怪志記也怪異也水擊崔云將飛舉翼擊水踉蹌也踉音亮蹌七亮反搏徒端反司馬云搏飛而上也一音搏崔云柎翼徘徊而上也扶搖徐音遙風名也司馬云上行風謂之扶搖爾雅云扶搖謂之颷郭璞云暴風從下上也上時掌反注同勝音升下同缺喜缺反下同數色主反下同樂音嶽又五孝反去以六月息者也夫大鳥一去半歲至天地而息小鳥一飛半朝槍榆枋而止此比所能則有間矣其於適性一也槍七羊反枋音方野馬也塵埃也生物之以息相吹也此皆鵬之所慿以飛者耳野馬者遊氣也野馬司馬云春月澤中遊氣也崔云天地間氣如野馬馳也埃音哀崔云天地間氣蓊鬱似塵埃揚也吹如字崔本作炊馮皮冰反本亦作慿天之蒼蒼其正色邪其逺而無所至極邪其視下也亦若是則巳矣今觀天之蒼蒼竟未知便是天之正色邪天之為逺而無極邪鵬之自上以視地亦若人之自此視天則止而圖南矣言鵬不知道里之逺近趣足以自勝而逝邪也嗟反句不定之辭後放此且夫水之積也不厚則大舟也無力覆杯水於堂之上則芥為之舟置杯焉則膠水淺而舟大也此皆明鵬之所以高飛者翼大故耳夫質小者所資不待大則質大者所用不得小矣故理有至分物有定極各足稱事其濟一也若乃失乎忘生之生而營生於至當之外事不任力動不稱情則雖垂天之翼不能無窮決起之飛不能無困矣夫音符覆芳服反杯崔本作杯於交反又烏了反李又伊九反崔云堂道謂之司馬云地令平支遁云謂有垤形也芥古邁反徐古邁反一音古反李云小草也膠徐李古孝反一音如字崔云膠著地也李云黏也稱尺證反後同濟子細反本又作齊如字之生本亦作王字當丁浪反後皆同風之積也不厚則其大翼也無力故九萬里則風斯在下矣而後乃今培風背青天而莫之夭閼者而後乃今將圖南夫所以乃今將圖南者非其好高而慕逺也風不積則夭閼不通故耳此大鵬之逍遙也培音裴重也徐扶杯反又父宰反一音扶北反本或作陪風絶句背青天一讀以背字屬上句夭於表反司馬云折也閼徐於葛反一音謁司馬云止也李云塞也蜩與學鳩之曰我決起而飛槍榆枋時則不至而控於地而巳矣奚以之九萬里而南為苟足於其性則雖大鵬無以自貴於小鳥小鳥無羡於天地而榮願有餘矣故小大雖殊逍遙一也蜩音條司馬云蟬學鳩如字一音於角反本又作鷽音同本或作鷽音預崔云學讀為滑滑鳩一名滑雕司馬云學鳩小鳩也李云鶻雕也毛詩草木疏云鶻鳩班鳩也簡文云月令云鳲鳩拂其羽是也決向徐喜抉反李呼穴反李順云疾貌槍七良反司馬李云猶集也崔云著也支遁云槍突也榆徐音踰木名也枋徐音方李云檀木也崔云木也或曰木名控苦貢反司馬云投也又云引也崔云叩也適莽蒼者三餐而反腹猶果然適百里者舂糧適千里者三月聚糧所適彌逺則聚糧彌多故其翼彌大則積氣彌厚也莽莫浪反或莫郎反蒼七蕩反或如字司馬云莽蒼近郊之色也李云近野也支遁云家間也崔云草野之色餐七丹反果徐如字又苦火反衆家皆云飽貌春束容反糧音良之二蟲又何知二蟲謂鵬蜩也對大於小所以均異趣也夫趣之所以異豈知異而異哉皆不知所以然而自然耳自然耳不為也此逍遙之大意小知不及大知小年不及大年物各有性性各有極皆如年知豈尚之所及哉自此巳下至于列子歷舉年知之大小各信其一方未有足以相傾者也然後統以無待之人遺彼忘我冥此羣異異方同得而我無功名是故統小大者無小無大者也苟有乎小大則雖大鵬之與斥鴳宰官之與御風同為纍物耳齊死生者無死無生者也苟有乎死生則雖大椿之與蟪蛄彭祖之與朝菌均於短折耳故遊於無小無大者無窮者也冥乎不死不生者無極者也若夫逍遙而繫於有方則雖放之使遊而有所窮矣未能無待也知音智本亦作智下大知并注同下年知放此丘䜴反後同纍劣偽反下皆同奚以知其然也朝菌不知晦朔蟪蛄不知春秋此小年也楚之南有冥靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋而彭祖乃今以久特聞衆人匹之不亦悲乎夫年知不相及若此之懸也比於衆人之所悲亦可悲矣而衆人未嘗悲此者以其性各有極也苟知其極則豪分不可相天下又何所悲乎哉夫物未嘗以大欲小而必以小羡大故舉小大之殊各有定分非羡欲所及則羡欲之纍可以絶矣夫悲生於纍纍絶則悲去悲去而性命不安者未之有也朝菌徐其隕反司馬云大芝也天隂生糞上見日則死一名日及故不知月之終始也崔云糞上芝朝生暮死晦者不及朔朔者不及晦支遁云一名舜英朝生暮落潘尼云木槿也簡文云歘生之芝也歘音况物反晦冥也朔旦也惠本亦作蟪同蛄音姑司馬云惠蛄寒蟬也一名蝭蟧春生夏死夏生秋死崔云蛁蟧也或曰山蟬秋鳴者不及春春鳴者不及秋廣雅云蟪蛄蛁蟧也案即楚詞所云寒螿者也蝭音提蟧音勞又音遼蛁音雕螿音將冥本或作榠同靈李順云冥靈木名也江南生以葉生為春葉落為秋此木以二千歲為一年椿丑倫反司馬云木一名蕣蕣木槿也崔音蕣華同李云生江南一云生北戶南此木三萬二千歲為一年彭祖李云名鏗堯臣封於彭城歷虞夏至啇年七百歲故以久壽見聞世本云姓籛名鏗在啇為守藏史在周為柱下史年八百歲籛音翦一云即老子也崔云堯臣仕殷世其人甫壽七百年王逸評楚辭天問云彭鏗即彭祖事帝堯彭祖至七百歲猶曰悔不壽恨杖晚而唾逺云帝嚳之玄孫特聞如字崔本作待聞懸音玄分符問反又方云反湯之問棘也是巳湯之問棘亦云物各有極任之則條暢故莊子以所問為是也李云湯時賢人又云是棘子崔云齊諧之徒識冥靈大椿者名也簡文云一曰湯廣大也棘狹小也窮髮之北有冥海者天池也有魚焉其廣數千里未有知其修者其名為鯤有鳥焉其名為鵬背若泰山翼若垂天之雲搏扶搖羊角而上者九萬里絶雲氣靑天然後圖南且適南冥也斥鴳之曰彼且奚適也我騰躍而上不過數而下翺翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辨也各以得性為至自盡為極也向言二蟲殊翼故所至不同或翺翔天池或畢志榆枋直各稱體而足不知所以然也今言小大之辨各有自然之素既非慕之所及亦各安其天性不悲所以異故再出之髮李云髮猶毛也司馬云北極之下無毛之地也崔云北方無毛地也案毛草也地理書云山以草木為髮廣古曠反數色主反下同羊角司馬云風曲上行若羊角上時掌反下同且如字舊子餘反下同斥如字司馬云小澤也本亦作尺崔本同簡文云竹尺非鴳於諌反字亦作鷃司馬云鴳鴳省也躍由若反翺五刀反蒿好刀反故夫知效一官行比一鄉德合一君而徴一國者其自視也亦若此矣亦猶鳥之自得於一方也知效音智下戶教反行下孟反比毗至反徐扶至反李云合也徵如字司馬云信也崔支云成也而宋榮子猶然之未能齊故有宋榮子司馬李云宋國人也崔云賢者也猶然之崔李云猶貌案謂猶以為且舉世而譽之而不加勸舉世而非之而不加沮審自得也譽音餘沮慈吕反敗也定乎內外之分內我而外物辨乎榮辱之竟榮巳而辱人之竟居領反斯已矣亦不能復過此復扶又反彼其於世未數數然也足於身故間於世也數數音朔下同徐所祿反一音桑縷反司馬云猶汲汲也崔云迫促意也簡文所喻反謂計數間音間本亦作間雖然猶有未樹也唯能自是耳未能無所不可也未樹司馬云樹立也未立至德也夫列子御風而行泠然善也冷然輕妙之貌列子李云鄭人名御冦得風征乘風而行與鄭穆公同時冷音零旬有五日而後反苟有待焉則雖御風而行不能以一時而周也彼於致福者未數數然也自然御風行耳非數數然求之也此雖免乎行猶有所待者也非風則不得行斯必有待也唯無所不乘者無待耳若夫乘天地之正而御六氣之辨以遊無窮者彼且惡乎待哉天地者萬物之總名也天地以萬物為體而萬物必以自然為正自然者不為而自然者也故大鵬之能高斥鴳之能下椿木之能長朝菌之能短凡此皆自然之所能非為之所能也不為而自能所以為正也故乘天地之正者即是順萬物之性也御六氣之辨者即是遊變化之也如斯以往則何往而有窮哉所遇斯乘又將惡乎待哉此乃至德之人玄同彼我者之逍遙也苟有待焉則雖列子之輕妙猶不能以無風而行故必得其所待然後逍遙耳而况大鵬乎夫唯與物冥而循大變者為能無待而常通豈自通而巳哉又順有待者使不失其所待所待不失則同於大通矣故有待無待吾所不能齊也至於各安其性天機自張受而不知則吾所不能殊也夫無待猶不足以殊有待况有待者之巨細乎六氣司馬云隂陽風晦明也李云平旦為朝霞日中為正陽日入為飛泉夜半為沆瀣天玄地黃為六氣王逸注楚辭云陵陽子明經言春食朝霞朝霞者日欲出時黃氣也秋食淪隂淪隂者日沒巳後赤黃氣也冬食沆瀣沆瀣者北方夜半氣也夏食正陽正陽者南方日中氣也并天玄地黃之氣是為六氣沆音戶黨反瀣音下界反支云天地四時之氣辨如字變也崔本作和惡音烏注同故下治不治天下者也故堯以不治治之非治之而治者也今許由方明既治則無所代之而治實由堯故有子治之言冝忘言以尋其所况而或者遂云治之而治者堯也不治而堯得以治者許由也斯失之逺矣夫治之由乎不治為之出乎無為也取於堯而足豈借之許由哉若謂拱默乎山林之中而後得稱無為者此莊老之談所以見棄於當當者自必於有為之域而不反者斯由之也堯唐帝也許由隱人也隱於箕山司馬云穎川陽城人簡文云陽城槐里人李云字仲武爝本亦作燋音爵郭祖繳反司馬云然也向云人所然決也一云燋火謂小火也字林云爝炬火也子召反燋所以然持火者子約反浸子鴆反灌古亂反天下治直吏反下已治注天下治而治者也既治而治實而治者得以治者音同令力呈反下同而我猶代子吾將為名乎名者實之賔也吾將為賔乎夫自任者對物而順物者與物無對故堯無對於天下而許由與稷契為匹矣何以言其然邪夫與物冥者故羣物之所不能離也是以無心玄應唯感之從泛乎若不繫之舟東西之非巳也故無行而不與百姓共者亦無往而不為天下之君矣以此為君若天之自高實君之德也若獨亢然立乎高山之頂非夫人有情於自守守一家之偏尚何得專此此故俗中之一物而為堯之外臣耳若以外臣代乎內主斯有為君之名而無任君之實也稷契息列反皆唐虞臣也稷周之始祖名棄契殷之始祖名離力智反應應對之應泛芳劔反非夫音扶下明夫同鷦鷯巢於深林不過一枝偃鼠飮河不過滿腹性各有極苟足其極則餘天下之財也鷦子遙反鷯音遼李云鷦鷯小鳥也郭璞云鷦鷯桃雀偃鼠如字李云鼷鼠也文蚡鼠一曰偃鼠蚡扶問反歸休乎君豫無所用天下為均之無用而堯獨有之明夫懷豁者無方故天下樂推而不厭乎君絶句一讀至乎字絶句君别讀豁呼活反樂音洛厭於絶反庖人雖不治庖尸祝不越樽爼而代之矣庖人尸祝各安其所司鳥獸萬物各足於所受帝堯許由各靜其所遇此乃天下之至實也各得其實又何所為乎哉自得而巳矣故堯許天地雖異其於逍遙一也庖鮑交反徐扶交反掌厨人也周禮有庖人職祝之六反傳神辭曰祝樽子存反本亦作尊爼徐似吕反肩吾問於連叔曰吾聞言於接輿大而無當往而不反吾驚怖其言猶河漢而無極也大有徑庭不近人情焉連叔曰其言謂何哉曰藐姑射之山有神人居焉肌膚若冰雪淖約若處子此皆言耳夫神人即今所謂聖人也夫聖人雖在廟堂之上然其心無異於山林之中世豈識之哉徒見其戴黃屋佩玉璽便謂足以纓紼其心矣見其歷山川同民事便謂足以憔悴其神矣豈知至至者之不虧哉今言王德之人而之此山將明世所無由識故乃託之於絶垠之外而推之於視聽之表耳處子者不以外傷內肩吾李云賢人也司馬云神名連叔李云懷道人也接輿本又作與同音餘接輿楚人也姓陸名通皇甫謐云接輿躬耕楚王遣使以黃金百鎰車二駟聘之不應當丁浪反司馬云言語宏大無隱當也怖普布反爾雅云懼也大有音泰徐勑佐反徑徐古定反司馬本作莖庭勑定反李云徑庭謂激過也近附近之近藐音邈又妙紹反簡文云逺也射徐音夜又食亦反李實夜反山名在北海中肌居其反淖郭昌略反又徒學反字林又卓反蘇林漢書音火也約如字李云淖約柔弱貌司馬云好貌處子在室女也黃屋車蓋以黃為裹一云冕裹黃也璽音徙纓字或作嬰紱方物反字或作紼憔在遙反悴在醉反至至者本亦作至足者王徐于况反本亦作至垠音銀又五根反本又作限不食五榖吸風飮露俱食五榖而獨為神人明神人者非五榖所為而特稟自然之妙氣吸許及反乘雲氣御飛龍而遊乎四海之外其神凝使物不疵癘而年榖熟吾以是狂而不信也夫體神居靈而窮理極妙者雖靜默間堂之裏而玄同四海之表故乘兩儀而御六氣同人羣而驅萬物苟無物而不順則浮雲斯乘矣無形而不載則飛龍斯御矣遺身而自得雖然而不待坐忘行忘忘而為之故行若曵枯木止若聚死是以云其神凝也其神凝則不凝者自得矣世皆齊其所見而斷之豈嘗信此哉凝魚升反疵在斯反病也司馬云毀也一音子爾反癘音厲李音賴惡病也本或作厲狂求匡反李云癡也李又九况反間音間徒暫反恬靜也齊才細反又如字斷丁亂反連叔曰然瞽者無以與乎文章之觀聾者無以與乎鍾鼓之聲豈唯形骸有聾盲哉夫知亦有之不知至言之極妙而以為狂而不信此知之聾盲也瞽音古盲者無目如鼓皮也與徐音豫下同觀古亂反聾鹿工反不聞也之聲崔向司馬本此下更有者無以與乎眉目之好夫刖者不自為假文屨夫知音智注知之同是其言也猶時女也謂此接輿之所言者自然為物所求但知之聾盲者謂無此理時女司馬云猶處女也向云時女虛靜柔順和而不喧未嘗求人而為人所求也之人也之德也將旁礴萬物以為一世蘄乎亂孰弊弊焉以天下為事夫聖人之心極兩儀之至會窮萬物之妙數故能體化合變無往不可旁礴萬物無物不然世以亂故求我我無心也我苟無心亦何為不應世哉然則體玄而極妙者其所以會通萬物之性而陶鑄天下之化以成堯舜之名者常以不為為之耳孰弊弊焉勞神苦思以事為事然後能乎旁礴剛反李鋪剛反字又作磅同礴蒲博反李普各反司馬云旁礴猶混同也蘄徐音祈李云求也弊弊李扶世反徐扶計反簡文云弊弊經營貌司馬本作蔽蔽應應對之應思息嗣反之人也物莫之傷夫安於所傷則傷不能傷傷不能傷而物亦不傷之也大浸稽天而不溺大旱金石流土山焦而不熱無往而不安則所在皆適死生無變於巳況溺熱之間哉故至人之不嬰乎禍難非辟之也推理直前而自然與吉會浸子鴆反稽音雞徐李音啓司馬云至也溺奴歷反或奴學反難乃旦反非辟音避是其塵垢粃粳將猶陶鑄堯舜者也孰肯以物為事堯舜者世事之名耳為名者非名也故夫堯舜者豈直堯舜而已哉必有神人之實焉今所稱堯舜者徒名其塵垢粃粳耳垢古口反塵垢猶染汚粃本又作秕徐甫娕反又悲矣反粳字亦作康音康粃粳猶煩碎陶徒刀反李移昭反本亦作鋾音同鑄之樹反宋人資章甫而適諸越越人斷髮文身無所用之堯治天下之民平海內之政往見四子藐姑射之山汾水之陽窅然喪其天下焉夫堯之無用天下為亦猶越人之無所用章甫耳然遺天下者固天下之所宗天下雖宗堯而堯未嘗有天下也故窅然喪之而常遊心於絶冥之境雖坐萬物之上而未始不逍遙也四子者蓋言以明堯之不一於堯耳夫堯實冥矣其迹則堯也自迹觀冥外內異域未足怪也世徒見堯之為堯豈識其冥哉故將求四子於海外而據堯於所見因謂與物同波者失其所以逍遙也然未知至逺之所順者更近而至高之所會者反下也若乃厲然以獨高為至而不夷乎俗者斯山谷之士非無待者也奚足以語至極而遊無窮哉宋人宋今梁國睢陽縣殷後微子所封資章甫李云資貨也章甫殷冠也以冠為貨越今會稽山隂縣斷丁管反李徒短反司馬本作敦云敦斷也四子司馬李云王倪齧缺衣許由汾水徐扶云反郭方聞反案汾水出太原今莊生寓言也司馬崔本作盆水窅然徐烏子反郭武駢反李云窅然猶悵然喪息浪反注同冥亡丁反竟音境本亦作境惠子謂莊子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以為瓢則落無所容非不呺然大也吾為其無用而掊之莊子曰夫子固拙於用大矣宋人有善為不手之藥者世世以洴澼絖為事其藥能令手不拘坼故常漂絮於水中也惠子司馬云姓惠名施為梁相魏王司馬云梁惠王也按魏自河東遷大梁故謂之魏或謂之梁也貽徐音怡郭與志反遺也瓠徐音護種章勇反實五石司馬云實中容五石盛音成剖普口反瓢毗遙反徐扶堯反則戶郭反司馬音護下同落簡文云落猶廓落也司馬云布護也落零落也言其形平而淺受水則零落而容也呺本亦作號徐許橋反李云號然虛大貌崔作簡文同吾為于偽反棓徐方垢迄司馬云擊要也手愧悲反徐舉倫反李居危反向云坸坼也司馬云文拆如文也又云如縮也洴徐扶經反澼普歷反徐敷歷反郭李恪歷反澼聲絖音曠小爾稚云絮細者謂之絖李云洴澼絖者漂絮於水上絖絮也令力呈反不拘紀于反依字宜作跔紀于求于二反周書云天寒足跔是也折勑白反漂四妙反韋昭云以水擊絮為漂文作敝豐市反又四例反絮胥慮反客聞之請買其方百金聚族而謀曰我世世為洴澼絖不過數金今一朝而鬻技百金請與之客得之以吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之能不手一也或以封或不免於洴澼絖則所用之異也今子有五石之瓠何不慮以為大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫蓬非直逹者也此章言物各有宜苟得其宜安往而不逍遙也百金李云金方寸重一斤為一金百金百斤也數色主反鬻音育司馬云賣也技本或作竭彼反始鋭反又如字難乃旦反將子匠反敗必邁反大樽本亦作尊司馬云樽如酒器縛之於身浮於江湖可以自渡慮猶結綴也案所謂舟蓬向云蓬者短不暢曲土之謂惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之匠者不顧今子之言大而無用衆所同去也莊子曰子獨不見狸狌乎卑身而伏以候敖者東西跳梁不避高下中於機辟死於罔罟今夫牛其大若垂天之雲此能為大矣而不能執鼠今子有大樹患其無用何不樹之於無何有之鄉廣莫之野倣徨乎無為其側逍遙乎寢臥其下不夭斤斧物無害者無所可用安所困苦哉夫小大之物苟失其極則利害之理均用得其所則物皆逍遙也樗勑魚反木名擁腫章勇反李云擁腫猶盤癭申丁仲反下同卷本又作拳同音權徐紀阮反李丘圎反去如字李吕反狸力之反狌徐音姓郭音生又音星司馬云㹨也㹨音由救反敖徐李五到反支云伺彼怠傲謂申夫隕殆也本又作傲同司馬音遨謂何遨翔之物而食之雞鼠之屬也跳音條辟音避合本多作避下放此機辟毗赤反司馬云罔也罟徐音古牛郭吕之反徐李音來又音離司馬云旄牛無何有之鄉廣莫之野謂寂絶無用之地也簡文云莫大也倣薄剛反又音房徨音皇倣徨猶翺翔也崔本作方羊簡文同廣雅云倣徉徙倚也莊子內篇齊物論第二夫自是而非彼美巳而惡人物莫不皆然然故是非雖異而彼我均也論力頓反李如字惡烏路反南郭子綦隱几而坐仰天而噓嗒焉似喪其耦同天人均彼我故外無與為歡而嗒焉解體若失其配匹南郭子綦音其司馬云居南郭困為號隱於靳反馮也機音紀李本作几噓音虛吐氣為噓向云息也答本又作嗒同吐答反又都納反注同解體貌喪息浪反下同耦本又作偶五口反匹也對也司馬云耦身也身與神為耦顔成子遊立侍乎前曰何居乎形固可使如稿木而心固可使如死乎死稿木取其寂寞無情耳夫任自然而忘是非者其體中獨任天真而巳又何所有哉故止若立枯木動若運稿枝坐若死行若遊塵動止之容吾所不能一也其於無心而自得吾所不能一也顔成子遊李云子綦弟子也姓顔名偃諡成字子遊何居如字又音司馬云猶故也稿枯老反注同家音寂本亦作寂寞本亦作漠今之隱几者非昔之隱几者也子遊常見隱几者而未見若子綦也子綦曰偃不亦善乎而問之也今者吾喪我汝知之乎吾喪我我自忘矣我自忘矣天下有何物足識哉故都忘外內然後超然俱得女聞人而未聞地女聞地而未聞天夫籟簫也夫簫管參差宮商異律故音短長高下萬殊之聲聲雖萬殊而所稟之度一也然則優劣無所錯其間矣况之風物異音同是而咸自取焉則天地之見矣女音汝下皆同本亦作汝力帶反夫音扶參林反差宜反錯七故反見賢遍反子遊曰敢問其方子綦曰夫大塊噫氣其名為風大塊者無物也夫噫氣者豈有物哉氣塊然而自噫耳物之生也莫不塊然而自生則塊然之體大矣故遂以大塊為名塊苦怪反李苦對反文同云俗由字也徐口回反徐李又胡罪反郭又苦猥反司馬云大朴之貌衆家或作大槐班固同淮南子作大昧解者或以為無或以為元氣或以為混成或以為天謬也噫乙戒反注同一音蔭是唯無作作則萬竅怒呺言風唯無作作則萬竅皆怒動而為聲也竅苦弔反呺胡到反徐又許口反又胡到反而獨不聞之翏翏乎長風之聲翏良救反又六收反長風聲也李本作飂音同又力竹反山林之畏佳大風之所扇動也畏於反郭烏罪反崔本作崴佳醉癸反徐子唯反郭祖罪反李諸反李頥云畏隹山阜貌大木百圍之竅穴似鼻似口似耳似枅似圈似似窪者似汚者此略舉衆竅之所似竅崔本作竅似鼻似口司馬云言風吹竅穴動作或似人鼻或似人口枅音雞又音肩字作云柱上方求也簡文云欂櫨也似圈起權反郭音權杯圈也徐其阮反言如羊豕之闌圈也臼其九反似窪烏反李於花反又烏反郭烏蛙反司馬云若窪曲汚音烏司馬云若汚下激者謞者叱者吸者呌者譹者宎者咬者此略與衆竅之聲殊激經歷反如水激也李古弔反司馬云聲若激喚也李又驅弔反謞音孝李虛交反簡文云若箭去之聲司馬云若歡謞聲叱昌實反徐音七司馬云若叱咄聲吸許及反司馬云若噓吸聲也呌古弔反郭古幼反李居耀反司馬云若呌呼聲也譹音豪郭又戶報反司馬云若譹哭聲宎徐於堯反一音杳又於弔反司馬云深者也若深宎突然咬於交反或音狡司馬云聲哀切咬咬然又許拜反前者唱于而隨者唱喁冷風則小和飄風則大和夫聲之宫商雖千變萬化唱和大小莫不稱其所受而各當其分唱于如字喁五恭反徐又音愚又五斗反李云于喁聲之相和也泠風音零李云泠泠小風也和胡卧反下及注皆同飄風鼻遙反又符遙反李敷遙反司馬云疾風也爾雅云回風為飄稱尺證反分符問反下不出者兒厲風濟則衆竅為虛濟止也烈風作則衆竅實反其止則衆竅虛虛實雖異其於各得則同厲風司馬云大風向郭云烈風濟子細反向云止也而獨不見之調調之刀刀乎調調刀刀動搖貌也言物聲既異而形之動搖亦又不同也動雖不同其得齊一耳豈調調獨是而刀刀獨非乎調音條刀徐都堯反向云調調刀刀皆動搖貌搖如字又羊照反子遊曰地則衆竅是巳人則比竹是已敢問天子綦曰夫吹萬不同而使其自已也此天也夫天者豈復別有一物哉即衆竅比竹之屬接乎有生之會而共成一天耳無既無矣則不能生有有之未生又不能為生然則生生者誰哉塊然而自生耳自生耳非我生也我既不能生物物亦不能生我則我自然矣自巳而然則謂之天然天然耳非為也故以天言之以天言之所以明其自然也豈蒼蒼之謂哉而或者謂天役物使從巳也夫天且不能自有况能有物哉故天也者萬物之總名也莫適為天誰主役物乎故物各自生而無所出焉此天道也比毗志反又必履反李扶必反注同復扶又反適丁歷反簡文云寬心也窖古孝反司馬云深也李云穴也案穴地藏縠曰窖簡文云深心也小恐惴惴大恐縵縵此蓋恐悸之異恐曲勇反下及注同惴之瑞反李云小心貌爾雅云懼也縵縵李云齊死生貌悸其季反其發若機栝其司是非之謂也其留如詛盟其守勝之謂也此蓋動止之異機栝古活反機弩牙栝箭栝詛惻據反盟音明徐武耕反郭武病反其殺如秋冬以言其日消也其衰殺日消有如此者殺色界反徐色例反注同其溺之所為之不可使復之也其溺而遂往有如此者溺奴狄反郭奴徼反其厭也如緘以言其老洫也其厭沒於欲老而愈洫有如此者厭於葉反徐於冉反又於感反緘徐古咸反洫本亦作溢同音逸郭許鵙反又已質反近死之心莫使復陽也其利患輕禍隂結遂志有如此者近附近之近復陽陽謂生也喜怒哀樂慮嘆變熱姚佚啓態此蓋性情之異者樂音洛熱之涉反司馬云不動貌姚郭音遙徐李勑弔反佚音逸態勑代反李又奴載反樂出虛蒸成菌此蓋事變之異也自此以上略舉天之無方自此以下明無方之自然也物各自然不知所以然而然則形雖彌異自然彌同也蒸之膺反菌其損反向云結也上時掌反日夜相代乎前而莫知其所萌日夜相代代故以新也夫天地萬物變化日新與時俱往何物萌之哉自然而然耳萌武耕反已乎已乎旦暮得此其所由以生乎言其自生暮本又作莫音同非彼無我非我無所取是亦近矣彼自然也自然生我我自然生故自然者即我之自然豈逺之哉而不知其所為使凡物云云皆百爾耳非相為使也故任之而理自至矣相為于偽反下未為同若有真宰而特不得其眹萬物萬情趣舍不同有若真宰使之然也起索真宰之眹迹而亦終不得則明物皆自然無使物然也特崔云特辭也眹李除忍反兆也趣舍七喻反字或作取下音捨或音赦下皆放此索所百反可行已信今夫行者信已可得行也而不見其形不見所以得行之形有情而無形情當其物故形不別見也當丁浪反不皆同見賢遍反百骸九竅六藏賅而存焉付之自然而莫不皆存也骸戶皆反六藏才浪反案心肺肝脾腎謂之五藏大小腸膀胱三焦謂之六府身别有九藏氣天地人天以候頭角之氣人候耳目之氣地候口齒之氣三部各有天地人三三而九神藏五形藏四故九今此云六藏未見所出賅徐古來反司馬云備也小爾雅同簡文云兼也吾誰與為親直自存耳汝皆之乎其有私焉皆之則是有所私也有私則不能賅而存矣故不而自存不為而自生也皆音注同今本多即作恱字後皆放此如是皆有為臣妾乎若皆私之則志過其分上下相冒而莫為臣妾矣臣妾之才而不安臣妾之任則失矣故知君臣上下手足外內乃天理自然豈直人之所為哉其臣妾不足以相治乎夫臣妾但各當其分耳未為不足以相治也相治也者若手足耳目四支百體各有所司而更相御用也更音庚其遞相為君臣乎夫時之所賢者為君才不應世者為臣若天之自高地之自卑首自在上足自居下豈有遞哉雖無錯於當而必自當也遞音弟徐又音第應應謂之應錯七索反下同其有真君存焉任之而自爾則非偽也如求得其情與不得無益損乎其真凡得真性用其自為者雖復皂猶不顧毀譽而自安其業故知與不知皆自若也若乃開希幸之路以下冒上物喪其真人忘其本則毀譽之間俯仰失錯也復扶又反下同譽音餘喪息浪反一受其成形不亡以待盡言物各有分故知者守知以待終而愚者抱愚以至死豈有能中易其性者也與物相刃相靡其行盡如馳而莫之能止不亦悲乎羣品云云逆順相交各信其偏見而恣其所行莫能自反此比衆人之所悲者亦可悲矣而衆人未嘗以此為悲者性然故也物各性然又何物足悲哉終身役役而不見其成功夫物情無極知足者鮮故得此不止復逐於彼皆疲役終身未厭其志死而後巳故其成功者無時可見也骸息淺反薾然疲役而不知其所歸可不哀邪凡物各以所好役其形骸至于疲困然不知所以好此之歸趣云何也然乃結反徐李乃協反崔音捻云忘貌簡文云疲病困之狀好呼報反下同人謂之不死奚益言其實與死同其形化其心與之然可不謂大哀乎言其心形並馳困而不反比於凡人所哀則此真哀之大也然凡人未嘗以此為哀則凡所哀者不足哀也人之生也固若是芒乎其我獨芒而人亦有不芒者乎凡此上事皆不知所以然而然故曰芒也今夫知者皆不知所以知而自知矣生者不知所以生而自生矣萬物雖異至於生不由知則未有不同者也故天下莫不芒也芒莫剛反又音亡芒芒昧也簡文云芒同也夫隨其成心而師之誰獨且無師乎夫心之足以制一身之用者謂之成心人自師其成心則人各自有師矣人各自有師故付之而自當奚必知代而心自取者有之愚者與有焉夫以成代不成非知也心自得耳故愚者亦師其成心未肯用其所謂短而舍其所謂長者也與音豫舍音捨字亦作捨下同未成乎心而有是非是今日適越而昔至也今日適越昨日何由至哉未成乎心是非何由生哉明夫是非者羣品之所不能無故至人兩順之昔至崔云昔夕也向云昔者昨日之謂也是以無有為有無有為有雖有神禹且不能知吾獨且奈何哉理無是非而或者以為有此以無有為有也或心已成雖聖人不能解故付之自若而不強知也強其丈反夫言非吹也言者有言各有所故異於吹吹如字又叱瑞反崔云吹猶籟也其所言者特未定也我以為是而彼以為非彼之所是我又非之故未定也未定也者由彼我之情偏果有言邪以為有言邪然未足以有所定其未嘗有言邪以為無言邪則據巳已有言其以為異於鷇音亦有辨乎其無辨乎夫言與鷇音其致一也有辨無辨誠未可定也天下之情不必同而所言不能異故是非紛紜莫知所定鷇苦豆反李音殼司馬云鳥子欲出者也道惡乎隱而有真偽言惡乎隱而有是非道焉不在言何隱蔽而有真偽是非之名紛然而起惡音烏下皆同真偽一本作真詭崔本作真然烏於虔反道惡乎往而不存皆存言惡乎存而不可皆可道隱於小成言隱於榮華夫小成榮華自隱於道而道不可隱則真偽是非者行於榮華而止於實當見於小成而滅於大全也當丁浪反後可以意求不復重出見賢遍反故有儒墨之是非以是其所非而非其所是儒墨更相是非而天下皆儒墨也故百家並起各私所見而未始出其方也更音庚欲是其所非而非其所是則莫若以明夫有是有非者儒墨之所是也無是無非者儒墨之所非也今欲是儒墨之所非而非儒墨之所是者乃欲明無是無非也欲明無是無非則莫若還以儒墨反覆相明反覆相明則所是者非是而所非者非非矣非非則無非非是則無是覆芳服反下同物無非彼物無非是物皆自是故無非是物皆相彼故無非彼無非彼則天下無是矣無非是則天下無彼矣無彼無是所以玄同也自彼則不見自知則知之故曰彼出於是是亦因彼夫物之偏也皆不見彼之所見而獨自知其所知自知其所知則自以為是自以為是則以彼為非矣故曰彼出於是是亦因彼彼是相因而生者也彼是方生之也雖然方生方死方死方生方可方不可方不可方可因是因非因非因是夫死生之變猶春秋冬夏四時行耳故生死之狀雖異其於各安所遇一也今生者方自謂生為生而死者方自謂生為死則無生矣生者方自謂死為死而死者方自謂死為生則無死矣無生無死無可無不可故儒墨之辨吾所不能同也至於各冥其分吾所不能異也是以聖人不由而照之于天亦因是也夫懷豁者因天下之是非而自無是非也故不由是非之而是非無患不當者直明其天然而無所奪故也是亦彼也我亦為彼所彼彼亦是也彼亦自以為是彼亦一是非此亦一是非此亦自是而非彼彼亦自是而非此此與彼各有一是一非於體中也果且有彼是乎哉果且無彼是乎哉今欲謂彼為彼而彼復自是欲謂是為是而是復為彼所彼故彼是有無未果定也復扶又反下同彼是莫得其偶謂之道樞偶對也彼是相對而聖人兩順之故無心者與物冥而未嘗有對於天下也此居其樞要而會其玄極以應夫無方也樞尺朱反樞要也應應對之應前注同後可以意求不復重音樞始得其環中以應無窮夫是非反覆相尋無窮故謂之環環中空矣今以是非為環而得其中者無是無非也無是無非故能應夫是非是非無窮故應亦無窮是亦一無窮非亦一無窮也天下莫不自是而莫不相非故一是一非兩行無窮唯涉空得中者曠然無懷乘之以遊也故曰莫若以明以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也天地一指也萬物一馬也夫自是而非彼彼我之常情也故以我指喻彼指則指於我指獨為非指矣此以指喻指之非指也若覆以彼指還喻我指則我指於彼指復為非指矣此以非指喻指之非指也將明無是無非莫若反覆相喻反覆相喻則彼之與我既同於自是又均於相非均於相非則天下無是同於自是則天下無非何以明其然邪是若果是則天下不得復有非之者也非若果非亦不得復有是之者也今是非無主紛然殽亂明此區區者各信其偏見而同於二致耳仰觀俯察莫不皆然是以至人知天地一指也萬物一馬也故浩然大寧而天地萬物各當其分同於自得而無是無非也天地一指也萬物一馬也崔云指百體之一體馬萬物之一物浩戶老反可乎可可於巳者即謂之可不可乎不可不可於巳者即謂之不可道行之而成無不成也物謂之而然無不然也惡乎然然於然惡乎不然不然於不然物固有所然物固有所可各然其所然各可其所可無物不然無物不可故為是舉莛與楹厲與西施恢恑譎怪道通為一夫莛橫而楹縱厲醜而西施好所謂齊者豈必齊形狀同規矩哉故舉縱橫好醜恢恑譎怪各然其所然各可其所可則形雖萬殊而性同得故曰道通為一也無物不然無物不可崔本此下更有可於可而不可於不可不可於不可而可於可為于偽反下為是皆同莛徐音庭李音挺司馬云屋梁也楹音盈司馬云屋柱也厲如字惡也李音賴司馬云病西施司馬云夏也案勾踐所獻吳王美女也恢徐苦回反大也郭苦虺反簡文本作弔恑九委反徐九彼反李云戾也橘怪音決李云橘也怪異也縱本亦作從形容反其分也成也夫物或此以為散而彼以為成分如字其成也毀也我之所謂成而彼或謂之毀凡物無成與毀復通為一夫成毀者生於自見而不見彼也故無成與毀猶無是與非也復扶又反唯逹者知通為一為是不用而寓諸庸庸也者用也用也者通也通也者得也夫逹者無滯於一方故忽然自忘而當於自用自用者莫不條暢而自得也適得而幾矣幾盡也至理盡於自得也幾音機盡也下同徐具衣反因是已逹者因而不作已而不知其然謂之道夫逹者之因是豈知因為善而因之哉不知所以因而自因耳故謂之道也謂之道向郭絶句崔讀謂之道勞云因自然是道之功也勞神明為一而不知其同也謂之朝三何謂朝三曰狙公賦芧曰朝三而莫四衆狙皆怒曰然則朝四而莫三衆狙皆恱名實未虧而喜怒為用亦因是也夫逹者之於一豈勞神哉若勞神明於為一不足賴也與彼不一者無以異矣亦同衆狙之或因所好而自是也狙公七徐反又緇慮反司馬云狙公典狙官也崔云養猿狙者也李云老狙也廣雅云狙獮猴芧音序徐食汝反李音豫司馬云橡子也朝三莫四司馬云朝三升莫四升也好呼報反下文皆同是以聖人和之以是非而休乎天鈞莫之偏任故付之自均而止也鈞本又作均崔云鈞陶鈞也是之謂兩行任天下之是非古之人其知有所至矣惡乎至有以為未始有物者至矣盡矣不可以加矣此忘天地遺萬物外不察乎宇宙內不覺其一身故能曠然無纍與物俱往而無所不應也其次以為有物矣而未始有封也雖未都忘猶能忘其彼此其次以為有封焉而未始有是非也雖未能忘彼此猶能忘彼此之是非也是非之彰也道之所以虧也無是非乃全也道之所以虧愛之所以成道虧則情有所偏而愛有所成未能忘愛釋私玄同彼我也果且有成與虧乎哉果且無成與虧乎哉有之與無斯不能知乃至有成與虧故昭氏之鼓琴也無成與虧故昭氏之不鼓琴也夫聲不可勝舉也故吹管操弦雖有繁手遺聲多矣而執籥鳴弦者欲以彰聲也彰聲而聲遺不彰聲而聲全故欲成而虧之者昭文之鼓琴也不成而無虧者昭文之不鼓琴也勝音升操七刀反籥羊灼反昭文司馬云古善琴者昭文之鼓琴也師曠之枝策也惠子之據梧也三子之知幾乎幾盡也夫三子者皆欲辨非巳所明以明之故知盡慮窮形勞神倦或枝策假寐或據梧而暝枝策司馬云枝杜也策杖也崔云舉杖以擊節梧音吾司馬云梧琴也崔云琴瑟也知音智暝亡千反皆其盛者也故載之末年賴其盛故能久不爾早困也故載之未年崔云書之於今也唯其好之也以異於彼言此三子唯獨好其所明自以殊於衆人其好之也欲以明之明示衆人欲使同乎我之所好彼非所明而明之故以堅白之昧終是猶對牛鼓簧耳彼竟不明故巳之道術終於昧然也堅白司馬云謂堅石白馬之辨也又云公孫龍有卒劒之法謂之堅白崔同又云或曰設矛伐之為堅辨白馬之名為白簧音黃而其子又以文之綸終終身無成昭文之子又乃終文之緒亦卒不成綸音倫崔云琴瑟弦也若是而可謂成乎雖我亦成也此三子雖求明於彼彼竟不明所以終身無成若三子而可謂成則雖我之不成亦可謂成也若是而不可謂成乎物與我無成也物皆自明而不明彼若彼不明即謂不成則萬物皆相與無成矣故聖人不顯此以耀彼不捨巳而逐物從而任之各冥其所能故曲成而不遺也今三子欲以巳之所好明示於彼不亦妄乎是故滑疑之耀聖人之所圖也為是不用而寓諸庸此之謂以明夫聖人無我者也故滑疑之耀則圖而域之恢恑橘怪則通而一之使羣異各安其所安衆人不失其所是則巳不用於物而萬物之用用矣物皆自用則孰是孰非哉故雖故蕩之變屈奇之異曲而從之寄之自用則用雖萬珠歷然自明滑古沒反司馬云亂也屈求物反今且有言於此不知其與是乎其與是不乎與不相與為則與彼無以異矣今以言無是非則不知其與言有者乎不乎欲謂之則我以無為是而彼以無為非斯不矣然此雖是非不同亦固未免於有是非也則與彼矣故曰與不又相與為則與彼無以異也然則將大不莫若無心既遣是非又遣其遣遣之又遣之以至於無遣然後無遣無不遣而是非自去矣雖然請嘗言之至理無言言則與故試言之有始也者有始則有終有未始有始也者謂無終始而一死生有未始有夫未始有始也者夫一之者未若不一而自齊斯又忘其一也有有也者有有則美惡是非具也有無也者有無而未知無無也則是非好惡猶未離懷好惡並如字離力智反有未始有無也者知無無矣而猶未能無知有未始有夫未始有無也者俄而有無矣而未知有無之果孰有孰無也此都忘其知也爾乃俄然始了無耳了無則天地萬物彼我是非豁然斯也俄徐音峩斯苦角反斯又作澌音賜字思利反今我則巳有謂矣謂無是非即復有謂復扶又反而未知吾所謂之其果有謂乎其果無謂乎又不知謂之有無爾乃蕩然無纎芥於胸中也芥古邁反又音界天下莫大於秋豪之末而大山為小莫壽乎殤子而彭祖為天地與我並生而萬物與我為一夫以形相對則大山大於秋豪也若各據其性分物冥其極則形大未為有餘形小不為不足苟各足於其性則秋豪不獨小其小而太山不獨大其大矣若以性足為大則天下之足未有過於秋豪也若性足者非大則雖太山亦可稱小矣故曰天下莫大於秋豪之末而太山為小太山為小則天下無大矣秋豪為大則天下無小也無小無大無壽無夭是以蟪蛄不羡大椿而欣然自得斥鴳不貴天池而榮願以足苟足於天然而安其性命故雖天地未足為壽而與我並生萬物未足為異而與我同得則天地之生又何不並萬物之得又何不一哉秋豪如字依字應作豪司馬云兔毫在秋而成王逸任楚辭云鋭毛也案毛至秋而耎細故以喻小也大山音泰殤子短命者也或云年十九以下為殤既巳為一矣且得有言乎萬物萬形同於自得其得一也巳自一矣理無所言既已謂之一矣且得無言乎夫名謂生於不明者也物或不能自明其一而以此逐彼故謂一以正之既謂之一即是有言矣一與言為二二與一為三自此以往巧歷不能得而況其凡乎夫以言言一而一非言也則一與言為二矣一既一矣言又二之有一有二得不謂之三乎夫以一言言一猶乃成三況尋其支流凡物殊稱雖有善數莫之能紀也故一之者與彼未殊而忘一者無言而自一稱尺證反數色主反故自無適有以至於三而況自有適有乎夫一無言也而有言則至三況尋其末數其可窮乎無適焉因是已各止於其所能乃最是也夫道未始有封宜然無不在也夫道未始有封崔云齊物七章此連上章而班固在外篇言未始有常彼此言之故是非無定主為是而有畛也道無封故萬物得恣其分域為于偽反畛徐之忍反郭李音真謂封域畛陌也請言其畛有左有右各異便也有左有右崔本作有在宥也便婢靣反有倫有義物物有理事事有宜有倫有義崔本作有論有議有分有辨羣分而別也分如字注同別彼列反下皆同有競有爭並逐曰競對辨曰爭爭爭鬪之爭注同此之謂八德略而判之有此八德六合之外聖人存而不論夫六合之外謂萬物性分之表耳夫物之性表雖有理存焉而非性分之內則未嘗以感聖人也故聖人未嘗論之若論之則是引萬物使學其所不能也故不論其外而八畛同於自得也六合之內聖人論而不議陳其性而安之春秋經世先王之志聖人議而不辨順其成迹而擬乎至當之極不執其所是以非衆人也故分也者有不分也辨也者有不辨也夫物物自分事事自別而欲由已以分別之者不見彼之自別也分如是下及注同曰何也聖人懷之以不辨為懷耳聖人無懷衆人辨之以相示也故曰辨也者有不見也不見彼之自辨故辨已所知以示之夫大道不稱付之自稱無所稱謂稱尺證反注同大辨不言已自別也大仁不仁無愛而自存也大廉不嗛夫至足者物之去來非我也故無所容其嗛盈嗛郭欺簟反徐音謙大勇不忮無往而不順故能無險而不往忮徐之䜴反又音䜴李之移反害也李云健也道昭而不道以此明彼彼此俱失矣昭音照言辨而不及不能及其自分仁常而不成物無常愛而常愛必不周廉清而不信激然廉清貪名者耳非真廉也勇忮而不成忮逆之勇天下共疾之無敢舉足之地也五者園而幾向方矣此五者皆以有為傷當者也不能上乎本性而求外無巳大外不可求而求之譬猶以圓學方以魚慕烏耳雖希翼鸞鳳擬規日月此愈近彼愈逺實學彌得而性彌失故齊物而遍尚之纍去矣園崔音刓徐五丸反司馬云圎也郭音團幾徐其衣反向方本亦作嚮音同下皆放此近附近之近逺于萬反故知止其所不知至矣所不知者皆性分之外也故止於所知之內而至也孰知不言之辨不道之道若有能知此之謂天府浩然都任之也注焉而不滿酌焉而不竭至人之心若鏡應而不藏故曠然無盈虛之變也注徐之喻反而不知其所由來至理之來自然無迹此之謂葆光任其自明故其光不弊也葆光音保崔云若有若無謂之葆光故昔者堯問於舜曰我欲伐宗膾胥敖南靣而不釋然其故何也於安任之道未弘故聽朝而不怡也將寄明齊一之理於大聖故發自怪之問以起對也膾徐古外反胥息徐反華胥國敖徐五高反司馬云宗膾胥敖三國名也崔云宗一也膾二也胥敖三也朝直遙反舜曰夫三子者猶存乎蓬艾之間夫物之所安無陋也則蓬艾乃三子之妙處也處昌慮反若不釋然何哉昔者十日並出萬物皆照夫重明登天六合俱照無有蓬艾而不光也重直龍反皮反而況德之進乎日者乎夫日月雖無私於照猶有所不及德則無不得也而今欲奪蓬艾之願而伐使從巳於至道豈弘哉故不釋然神解耳若乃物暢其性各安其所安無逺近幽深付之自若皆得其極則彼無不當而我無不怡也解音蟹齧缺問乎王倪曰子知物之所同是乎曰吾惡乎知之所同未必是所異不獨非而彼我莫能相正故無所用其知齧五結反缺丘恱反王倪徐五嵇反李音詣高士傳云王倪堯時賢人也天地篇云齧缺之師惡音烏下皆同子知子之所不知邪曰吾惡乎知之若自知其所不知即為有知有知則不能任羣才之自當然則物無知邪曰吾惡乎知之都不知乃曠然無不任矣雖然嘗試言之以其不知故未敢正言試言之耳庸詎知吾所謂知之非不知邪魚遊於水水物所同咸謂之知然自魚觀之則向所謂知者復為不知矣夫蛣之知非於轉丸而笑蛣者乃以蘇合為貴故所同之知未可正據庸詎徐本作巨其庶反郭音巨李云庸用也詎何也猶言何用也服虔云詎猶未也復扶又反蛣丘一反丘良反爾雅云蛣蜋也庸詎知吾所謂不知之非知邪所謂不知者直是不同耳亦自一家之知且吾嘗試問乎女已不知其正故試問女女音汝注及下同巳音紀民溼寢則腰疾偏死鰌然乎哉木處則惴栗恂懼猿猴然乎哉三者孰知正處此略舉三者以明萬物之異便偏死司馬云偏枯死也鰌徐音秋司馬云魚名惴之瑞反栗音栗恂郭音荀徐音峻恐貌崔云戰也班固作眴也猿音猿猴音侯便婢靣反民食芻豢麋鹿食薦蝍且甘帶鴟鴉鼠四者孰知正味此略舉四者以明美惡之無主芻俱反小爾雅云秆謂之芻秆音古但反豢徐音患又胡滿反司馬云牛羊曰芻犬豕曰豢以所食得名也麋音眉薦箋練反司馬云美草也崔云甘草也郭璞云三蒼云六畜所食曰薦蝍音即且字或作蛆子徐反李云蝍且蟲名也廣雅云蜈公也爾雅云蒺藜蝍蛆郭璞注云似蝗大腹長角能食蛇腦蒺音疾藜音梨帶如字崔云蛇也司馬云小蛇也蝍蛆好食其眼鴟尺夷反鴉本亦作鴟於加反崔云烏也市志反字或作崔本作其惡烏路反猿猵狙以為雌麋與鹿交鰌與魚遊毛嬙麗人之所美也魚見之深入鳥見之高飛麋鹿見之決驟四者孰知天下之正色哉此略舉四者以明天下所好之不同也不同者而非之則無以知所同之必是猵篇靣反徐敷靣反又敷畏反郭李音之狙七餘反司馬云狙一名獦牂似猿而狗頭喜與雌猿交也崔云遍狙一名獦牂其雄喜與猿雌為牝牡向云猵狙以猿為雌也獦音雌音妻一音如字毛嬙徐在良反司馬云毛嬙古美人一云越王美也麗力知反下同麗晉獻公之嬖以為夫人崔孝作西施決喜缺反李云疾貌崔云疾走不顧為決徐古惠反郭音古穴反驟上救反又在遘反好呼報反自我觀之仁義之端是非之塗樊然殽亂吾惡能知其辨夫利於彼者或害於此而天下之彼我無窮則是非之竟無常故唯莫之辨而任其自是然後蕩然俱得樊音煩殽徐戶交反郭作散悉旦反之竟音境今本或作境下放此齧缺曰子不知利害則至人固不知利害乎未能妙其不知故猶嫌至人當知之斯懸之未解也解音蟹王倪曰至人神矣無心而無不順大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚夫神全形具而體與物冥者雖涉至變而未始非我故蕩然無蠆介於胸中也沍戶故反徐又戶各反李戶格反向曰凍也崔云沍猶涸也蠆勑邁反又音豸介古邁反又音界若然者乘雲氣物而行非我動也日月有晝夜而無死生也而遊乎四海之外夫唯無其知而任天下之自為故馳萬物而不窮也死生無變於已與變為體故死生若一而況利害之端乎況利害於死生愈不足以介意瞿鵲子問乎長梧子曰吾聞諸夫子聖人不從事於務務自來而理自應耳非從而事之也瞿其俱反長梧子李云居長梧下因以為名崔云名丘簡文云長梧封人也夫子向云瞿鵲之師不就利不違害任而直前無所避就不喜求求之不喜直取不怒不緣道獨至者也無謂有謂有謂無謂凡有稱謂者皆非吾所謂也彼各自謂耳故無彼有謂而有此無謂也稱尺正反下放此而遊乎塵垢之外凡非真性皆塵垢也而遊崔本作而施夫子以為孟浪之言而我以為妙道之行也吾子以為奚若長梧子曰是黃帝之所聽熒也而丘也何足以知之且女亦大早計見而求時夜見彈而求梟炙夫物有自然理有至極循而直往則然自合非所言也故言之者孟浪而聞之者聽熒雖復黃帝猶不能使萬物無懷而聽熒至竟故聖人付當於塵垢之外而玄合乎視聽之表照之以天而不逆計放之自爾而不推明也今瞿鵲子方聞孟浪之言而便以為妙道之行斯亦無異見而責司晨之功見彈而求梟炙之實也夫不能安時處順而探變求化當生而慮死執是以辨非皆逆計之徒也孟如字徐武黨反或武葬反浪如字徐力蕩反向云孟浪音漫瀾無所趣舍之謂李云猶較略也崔云不精要之貌行如字又下孟反黃帝本又作黃帝聽勑定反熒音瑩磨之瑩本亦作瑩於拘反向司馬云聽熒疑惑也李云不光明貌崔云小明不大了也向崔本作榮女音汝下同大音太徐李勑佐反注同時夜崔云時夜司夜謂雞也彈徒旦反梟于驕反司馬云小鳩可炙毛詩草木疏云大如班鳩緑色其肉甚美復扶又反下皆同下章注亦凖此豫嘗為女妄言之言之則孟浪也故試妄言之為于偽反女以妄聽之奚若正聽妄言復為大早計也故亦妄聽之何旁日月挾宇宙以死生為晝夜旁日月之喻也以萬物為一體挾宇宙之譬也旁薄葬反徐扶葬反司馬云依也崔本作謗挾戶牒反崔本作扶宇宙治救反尸子云天地四方曰宇往古來今曰宙文云舟輿所極覆曰宙為其䐇合置其滑涽以相尊以有所賤故尊卑生焉而滑涽紛亂莫之能正各自是於一方矣故為䐇然自合之道莫若置之勿言委之自爾也䐇然無際之謂也䐇本或作郭音泯徐武軫反李載枌反無波際之貌司馬云合也向音脣云若脣之相合也滑徐古沒反亂也向本作汨音同崔戶八反云栝口木也涽徐音昏向云泪昏未定之謂崔本作緍武巾反云繩也衆人役役馳騖於是非之境也聖人愚芚芚然無知而直往之貌芚徐徒奔反郭治本反司馬云渾屯不分察也崔云厚貌也或云束也李丑倫反參萬歲而一成純純者不雜者也夫舉萬歲而參其變而衆人謂之雜矣故役役然勞形心而去彼就此唯大聖無執故芚然直往而與變化為一一變化而常遊於獨者也故雖參糅億載千殊萬異道行之而成則古今一成也物謂之而然則萬物一然也之艾封人之子也晉國之始得之也涕泣沾及其至於王所與王同筐牀食芻豢而後悔其泣也一生之內情變若此當此之日則不知彼况夫死生之變惡能相知哉至於王所崔云六國時諸侯僣稱王因此謂獻公為王也筐本亦作匡徐起狂反牀徐音床司馬云筐牀安牀也崔云筐方也一云正牀也豫惡乎知夫死者不悔其始之蘄生乎蘄求也蘄音祈夢飮酒者旦而哭泣夢哭泣者旦而田獵此寤寐之事變也事苟變情亦異則死生之願不得同矣故生時樂生則死時樂死矣死生雖異其於各得所惡烏路反丘也與女皆夢也未能忘言而神解故非大覺也解音蟹下同豫謂女夢亦夢也即復夢中之占夢也夫是以為夢猶未寤也況竊竊然自以為覺哉是其言也其名為弔詭夫非常之談故非常人之所知故謂之弔當卓詭而不識其懸解弔如字音的至也詭九委反異也萬世之後而一遇大聖知其解者是旦暮遇之也言能蛻然無係而玄同死生者至希也解音蟹徐戶解反蛻音帨又始鋭反既使我與若辨矣若勝我我不若勝若果是也我果非也邪我勝若若不吾勝我果是也而果非也邪若而皆汝也其或是也其或非也邪其俱是也其俱非也邪我與若不能相知也則人固受其黮暗吾誰使正之不知而後推不見而後辨辨之而不足以自信以其與物對也辨對終日黮暗至竟莫能正之故當付之自正耳黮暗貪暗反李云黮暗不明貌使同乎若者正之既與若同矣惡能正之使同乎我者正之既同乎我矣惡能正之同故是之未足信也惡音烏下皆同使異乎我與若者正之既異乎我與若矣惡能正之異故相非耳亦不足據使同乎我與若者正之既同乎我與若矣惡能正之是若果是則天下不得復有非之者也非若信非則亦無緣復有是之者也今是其所同而非其所異異同既具而是非無主故夫是非者生於好辨而休乎天均付之兩行而息乎自正也然則我與若與人俱不能相知也而待彼也邪各自正耳待彼不足以正此則天下莫能相正也故付之自正而至矣何謂和之以天倪天倪者自然之分也和如字崔胡臥反天倪李音崔徐音詣郭音五底反李云分也崔云或作霓音同際也班固曰天研曰是不是然不然是若果是也則是之異乎不是也亦無辨然若果然也則然之異乎不然也亦無辨是非然否彼我更對故無辨無辨故和之以天倪安其自然之分而巳不待彼以正此化聲之相待若其不相待是非之辨為化聲夫化聲之相待俱不足以相正故若不相待也和之以天倪因之以曼所以窮年也和之以自然之分任其無極之化尋斯以往則是非之境自泯而性命之致自窮也曼徐音萬郭武半反徐以戰反司馬云曼無極也忘年忘義振於無竟故寓諸無竟夫忘年故玄同死生忘義故彌貫是非是非死生蕩而為一斯至理也至理暢於無極故之者不得有窮也振如字崔云止也又之忍反竟如字極也崔作境罔兩問景曰曩子行今子止曩子坐今子起何其無特操與罔兩景外之微隂也罔兩向云景之景也崔本作罔浪云有無之狀景映永反又如字本或作影俗也徐乃蕩反李云嚮者也無特本或作持崔云特辭也向云無特者行止無常也與音餘景曰吾有待而然者邪言天機自爾坐起無待無待而獨得者孰知其故而貴其所以哉吾所待又有待而然者邪若責其所待而尋其所由則尋責無極卒至於無待而獨化之理明矣吾待蛇蚹蜩翼邪若待蛇蚹蜩翼則無持操之所由未為難識也今所以不識正由不待斯而獨化故耳蛇蚹音附徐又音敷司馬云謂蛇腹下齟齬可以行者也齟音士女反齬音魚女反蜩音條惡識所以然惡識所以不然世或謂罔兩待景景待形形待造物者請問夫造物者有邪無邪無也則胡能造物哉有也則不足以物衆形故明乎衆形之自物而後始可與言造物耳是以涉有物之域雖復罔兩未有不獨化於玄冥者也故造化者無主而物各自造物各自造而無所待焉此天地之正也故彼我相因形景俱生雖復玄合而非待也明斯理也將使萬物各反所宗於體中而不待乎外外無所謝而內無所矜是以誘然皆生而不知所以生同焉皆得而不知所以得也今罔兩之因景猶云俱生而非待也則萬物雖聚而共成乎天而皆歷然莫不獨見矣故罔兩非景之所制而景非形之所使形非無之所化也則化與不化然與不然從人之與由已莫不自爾吾安識其所以哉故任而不則本末內外暢然俱得泯然無迹若乃責此近因而忘其自爾宗物於外喪主於內而愛尚生矣雖欲推而齊之然其所尚巳存乎胸中何夷之得有哉喪息浪反昔者莊周夢為胡蝶栩栩然胡蝶也自喻適志與自快得意恱豫而行胡蝶徐徒協反司馬崔云蛺蝶也栩栩徐况羽反喜貌崔本作師喻李云喻快也與音餘下同崔云與哉不知周也方其夢為胡蝶而不知周則與殊死不異也然所在無不適志則當生而係生者必當死而戀死矣由此觀之知夫在生而哀死者誤也俄然覺則蘧蘧然周也自周而言故稱覺耳未必非夢也覺古孝反蘧蘧徐音渠又其慮反李云有形貌崔作據據引大宗師云據然覺不知周之夢為胡蝶與胡蝶之夢為周與今之不知胡蝶無異於夢之不知周也而各適一時之忘則無以明胡蝶之不夢為周矣世有假寐而夢經百年者則無以明今之百年非假寐之夢者也周與胡蝶則必有分矣夫覺夢之分無異於死生之辨也今所以自喻適志由其分定非由無分也此之謂物化夫時不暫棹而今不遂存故昨日之夢於今化矣死生之變豈異於此而勞心於其間哉方為此則不知彼夢為胡蝶是也取之於人則一生之中今不莊子札記辛壬間滬市出宋刻莊子卷末有二行云安仁趙諌議宅一樣口子樣字下一字為人挖去續墨客揮犀七木饅頭大中祥符年一樣造五十隻以此例之挖去者必為數目字矣趙氏所刻蓋不止莊子殷敬竟鏡匡徵讓完構遘等字皆為字不成知是南宋重開北宋本所見莊子要以此為古矣引陸氏釋文頗略大抵録音不録義如逍遙遊祗云逍音消遙音搖北宋人刻古書音義輒附卷後不應莊子音義散入注下疑南宋人所為趙氏原刻不爾也趙本每葉十八行行十五字注倍之豫既借校於世德堂本上又手摹一葉與繆藝風先生今刻入書影者是也後見雍正中沈寶硯校本一樣下亦闕一字蓋所見即此本矣叢刋中以世德堂本影印復録趙本異同如左壬戌十月留菴居士孫育修南華真經序河南郭象字子撰一葉四行無無下同十六行芒茫二葉二行源流深長源深流長七行士壬八行倣佛仿佛南華真經卷第一莊子內篇逍遙遊第一郭象注下接注文一葉四行注各名二葉八行注足自自足十三行注天地池亦訛地槍搶亦作槍三葉四行注而圖南矣無矣字五行注逝近四葉三行學鷽六葉十六行泰山大山八葉二行竟境九葉九行注王至十葉三行注出乎無為也無也字五行注由之之由十二行注泛訛況十一葉八行注天之十四葉三行注辟避五行粳十五葉六行瓠瓠下同莊子內篇齊物論第二郭象注十八葉四行注而嗒焉解體無解字九行注寂寞寂漠十行注一也無也字其于無心而自得無心自得十一行注二也無也字五行女汝下同十九葉一行注音有二十葉三行注衆異二十一葉六行注明服二十二葉十五行注自其二十三葉五行注百自六行注有若若有十五行注自目説恱下同二十四葉十六行注逐遂二十五葉一行薾二十九葉十三行注各可無各字三十葉十二行莫暮三十一葉十一行注我此三十三葉九行注遣俱作遺十一行注寄嘗十二行注池訛地三十五葉六行注忘亡八行注自辨辨已二字互異三十八葉九行注言之耳無耳字十五行注故試問女無故字三十九葉四行且蛆注略舉四者以明美惡之無主無略舉以之四字四十葉八行沍沍四十一葉七行熒十二行注夫不能無夫字四十二葉七行䐇吻注同九行注波十五行注去失四十三葉七行注不知下有所謂二字八行注而惡下無之字十六行注其於各得無於字四十四葉五行注大患夫患四十七葉五行注主至四十八葉七行棹停南華真經卷第一南華真經卷第二莊子內篇養生主第三郭象注一葉六行注而神氣自若而作其二葉二行手之所解所觸十三行注耳且十五行所見無非牛者無非全牛者注無其間二字三葉二行注順理理順四葉八行注拭訛試十六行注知其知之六葉一行注往住十五行注火傳二字不重莊子而篇人間世第四郭象注九葉九行注苦十葉十五行聖人之所無之字十一葉六行注快使七行注藉籍十六行注性信十二葉一行與人之為徒無之字五行注有諷責之旨有字上有實字十四行有而為之無之字八行注虛室室虛十五葉一行注謂為三行注婁朱十六葉十行注刑形十八葉一行注以似三行注誕妄妄誕十三行注則實喪矣矣作也二十葉九行注逆忤十行注還遂十五行注悶閟二十一葉十一行注而則十六行注著馬著焉二十二葉六行潔潔二十四葉九行喻譽二十五葉七行注乘臣二十八葉十行注緇錙十三行注德得莊子內篇德充符第五郭象注三十九葉八行注應物物應三十一葉一行注奚其八行注都亡亡訛志九行注擴曠十三行注音恱三十二葉七行注鍾種八行注為有三十三葉十二行注明其不遜明其不遜也十一行注而不知命之自爾知下有我字十四行注自然而失者也無也字三十七葉十二行數十十數三十八葉六行知寡人傳國焉無而字八行汜而若無而字十六行注含德之厚末有者字三十九葉三行注使形者才德也無此句四行注戰而無而字十行注婚昏無猶四十葉十一行於乎四十一葉六行注德元元作充九行注往性四十二葉十六行小哉哉訛者四十三葉二行注獨及四十四葉九行注情此南華真經卷第二南華真經卷第三莊子內篇大宗師第六郭象注四葉一行受愛十五行注澤者上有字五葉八行注殉效六葉十五行注羣君七葉四行注間間九行注彼彼訛彼我八葉二行注竟境五行濡八行而其譽堯而作與十五行注生死死生然衍文九葉四行注豈常守故哉無哉字注不謂不作橫十一行注乃方十葉十一行注故夫人人作神十三行而不老老上有為字十一葉十一行注故為生果不足以全生故字下有夫字十三葉一行道可得學邪無道字七行已外天矣天字上有下字八行而後外物後字下有能字十四葉五行注成矣成也十六葉二行雞雞三行而豫之尻而下有化字十七葉六行悍捍下同十八葉一行往而不可得首有惡乎二字八行注夫體天地無夫字冥而化者而作變無者字手足異任五藏殊管手足五臟異殊十九葉十四行注私冥二十葉九行注疣十五行注及極二十二葉六行小大小人八行以善喪喪下有處字九行一一二十三葉三行注生往八行注似以十一行注夫常覺者無夫字其所宜也無也字十二行注自是十三行注哉矣二十五葉六行捶錘七行注冶治十三行注性然十四行注我知知我二十七葉四行霖淋莊子內篇應帝王第七郭象注二十八葉八行藏臧二十九葉三行接輿上有狂字十三行重熏注常帝十五行注如知三十葉一行預豫十五行疆強三十一葉二行注此比三十二葉十六行鄉嚮下同三十五葉一行注深根寧極也首有而常二字三十六葉一行逆迎二行注物來即鑒即作乃天下之廣天下來照南華真經卷第三南華真經卷第四莊子外篇駢拇第八郭象注一葉七行注財才三葉二行鐘鍾十五行注豐曽辨辨四葉五行注字子十六行注之自五葉五行注舉雖十四行注棄乘七葉一行注不出出作由六行注上尚八葉十六行注辨辨莊子外篇馬蹄第九郭象注十一葉十四行注生而往而十三葉二行注而家殊也也作哉注夫聖迹既彰無夫字注形表而已矣無矣字十四葉七行注雖訛唯莊子外篇胠篋第十郭象注十六葉三行鄉向十七葉十五行胣肔十五行注而同於德也無也字二十四葉四行注猶致斯弊斯作其二十五葉六行注止正九行惴喘十五行機民莊子外篇在宥第十一郭象注二十六葉十二行注遷遷十五行注之世世之二十七葉八行注失天二十八葉十行愴傖三十葉三行強強十行注則靜而通通上有自字三十一葉三行注天有堯舜湯武首有而字四行注聖至三十三葉二行大太三行憂慓乎廟堂之上憂栗廟堂之上注故夫任自然故作四行注攖天下之心首有遂字三十三葉二行注思斯矯驕姦姦三十六葉十行脾雀髀爵下同三十七葉十二行豫子十五行亂天句無下字三十八葉一行止蟲昆蟲二行意噫下同此四行仙仙十三行注復知復之三十九葉四行注衆皆以出為心出下有衆字十三行而不喪人之國乎下有其存人之國也句十四行注與天下首有已字四十業十行注歸之也哉無也字十二行嚮響四十二葉一行注順下有其字十三行注德得四十三葉一行注亂矣矣作也南華真經卷第四南華真經卷第五莊子外篇天地第十二郭象注三葉二行韜韜十行注已止四葉十三行還旋七葉四行注其期八葉八行注名列首有已其二字九行注便使十葉一行留狸十一行注何所有無所字十一葉十五行注舉皆也此是釋文別本皆誤作注趙本無之十二葉七行卬仰十八葉八行道導下同二十葉五行注令舍十五行惾十六行濁噣莊子外篇天道第十三郭象注二十二葉六行準準二十四葉六行自耳耳作爾十六行天下天地二十六葉六行乘上有此字二十七葉二行注言此先後無言字三行注至無至字二十八葉三行注言官三十葉一行大太三十一葉一行注以已三十三葉一行竟境注亦知知作如十五行雖貴之哉無哉字注其貴句趙本無三十四葉六行為者三十五葉四行注當古古作今已滅滅作減莊子外篇天運第十四郭象注三十七葉一行注矣耳三行境謹三十八葉三行注仁孝下無之字八行徵徽十一行夫至樂者至太和萬物趙本無此三十五字十五行注全下有矣字三十九葉十六行夫矣四十一葉七行齊齋四十三葉七行注況夫二字二則字俱無四十四葉六行注者下無也字九行注由假性可十行注天下天子四十五葉一行虛墟六行注則斯十一行注則無則字四十六葉四行憯七行注秉乘八行傑下重一傑字南華真經卷第五南華真經卷第六莊子外篇刻意第十五郭象注一葉十二行道導二葉十五行注險阻阻險三葉十五行注合下有其字五葉五行注之也之作迹莊子外篇繕性第十六郭象注七葉八行八葉十六行存身者存作行九葉一行知窮上有以字十三行注而得而作自十葉二行注置倒倒置莊子外篇秋水第十七郭象注十一葉四行蛙蛙五行虛墟八行崖涯十四行於無於字十五葉十二行任理下無而字十四行注外事不棲於心無此句十六行注通下無不字十六葉六行注齊之下無者字十七葉二行注天業天作失十一行注齊下脫於字十四行泛泛泛泛二十葉二行注之下有一字十行注不可可不二十二葉三行數下無也字六行注而生也無也字而行哉無哉字故足無故字八行注器下無也字二十三葉五行注不勝者也無者也二字六行注天下下無莫不二字此乃無乃字九行惙輟二十四葉十四行蛙蛙二十六葉四行注大訛之八行注效下有也字二十八葉十行魚之樂下有惠施不體物性妄起質疑莊子非魚焉知魚樂十八字注莊子外篇至樂第十八郭象注二十九葉十二行注其所遇者無者字三十葉三行注內其形知足而已內形知足十五行注舉羣趣其所樂乃不避死也無此二句三十一葉一行亦未之不樂也之作知六行注是非者無者字七行注足定十四行注齊濟三十二葉八行注未訛夫三十六葉四行若汝五行豫果豫作子南華真經卷第六南華真經卷第七莊子外篇達生第十九郭象注一葉六行先之下有以字四葉四行注勸倦十行注其承上有故字十四行厥橛五葉三行凝育修按列子作疑注云分猶意散專則與神相似者也六葉十行岩巖七葉十行使便八葉三行注間問十二葉七行骨滑十一行注乃耳二字無十四葉十五行來下有者字莊子外篇山木第二十郭象注十六葉四行周將處夫材與不材之間下重材與不材之間六字十九葉六行船船惼褊二十葉八行毫豪十一行子惡死乎曰然六字無十四行名上有其字二十葉五行患意二十二葉六行呼雩二十三葉十六行騰螣二十五葉十行偕之偕之偕逝二十六葉十一行亦也亦天也二十七葉十一行注相常二十八葉六行注言以出三字無十二行注可下有也字莊子外篇田子方第二十一郭象注十六行注無功功作故三十四葉八行注故也三十五葉一行偃假三十六葉十一行般槃三十八葉七行注天下也無也字三十九葉八行注自得也無也字四十葉七行注於其莊子外篇知北遊第二十二郭象注四十二葉十一行注效教四十四葉七行注焉哉九行注質下有也字四十五葉一行朣瞳四十六葉四行齊齋四十八葉十四行注煙煴煙煴五十一葉十六行注主王五十三葉六行注責貴九行注涉步五十六葉四行南華真經卷第七南華真經卷第八莊子雜篇庚桑楚第二十三郭象注四葉二行櫛八葉十五行偏訛遍九葉三行注若字便欲自三字俱無十六行注與宇十葉四行注自然二字無十二葉五行注樵燋疑凝十五葉七行注也矣十六葉三行注足是十七葉十三行注名各十四行注取敗十八葉七行胞庖莊子雜篇徐無鬼第二十四郭象注二十二葉一行而況而作又二十六葉十行注公分十三行注外下有故可囿也四字二十七葉一行樂教二十八葉六行注復無復字十六行注未下有為字能為無為字二十九葉二行排拂四行注使便五行注子手十五行注已以三十葉二行慢漫三十一葉三行皇黃十行三十二葉二行助鋤八行中口三十四葉九行注凶下有也字三十五葉十一行況於無於字三十七葉十三行注之下有也字三十八葉十六行虛墟三十九葉四行注用相常全耳無耳字八行注而致之無之字四十葉六行注容貴四十一葉二行注夫乎四十三葉三行不亦亦不莊子雜篇則陽第二十五郭象注四十四葉十三行誤娛四十五葉五行注內外外內十一行注其行其作而四十六葉八行注若愛之至衰也無此二句十行注況誤無四十七葉十四行注而耳四十八葉一行注芥介五行首下有公孫衍三字八行抶誤拔十四行明聞四十九葉十六行注物耳無耳字五十葉十五行捐損十六行注規是視長五十一葉十四行注無所所作為五十二葉三行注致至五十三葉十二行注責下有也字五十四葉十行注惻測十四行此則無則字五十五葉十五行里理五十六葉六行大太後同五十九葉十四行注去下有也字六十葉二行徂阻十三行其有有所注議識南華真經卷第八南華真經卷第九莊子雜篇外物第二十六郭象注二葉一行注莫知知作之三葉六行騖驚十行趣趨四葉十行壓擪十二行注恃持六葉二行注括進恬退八葉八行注厚下無則字十一行注大齊同大齊下重齊字同下有也字十五行注正政十六行注往性九葉一行注至全二行鸇顫十六行注也乎十葉二行注立亡五行注覺齊十一葉五行荃筌莊子雜篇寓言第二十七郭象注十二葉三行注借下有者字十三葉一行注與於十五行注也化十四葉一行注是不可常誤不可不常十五葉五行觀作鸛十六葉九行景影下同十一行搜十五行注似以十七葉二行注所謂有待者無所謂二字率作卒至矣無此二字莊子雜篇讓王第二十八郭象注二十葉九行王玉二十六葉十行作怍十五行心居心無下心字二十七葉三行能下有自字六行重傷下重重傷二字七行曰也十一行擇擇二十八葉七行雪露十四行共首共作丘二十九葉十一行瞀務下同三十葉十三行注外天下也無也字十五行謂曰無曰字三十一葉二行與之無之字三十二葉五行注遺貴七行注亦聖人之迹也以下十二字脫八行注矣上有人字莊子雜篇盜跖第二十九郭象注三十四葉一行拒距四行大太十五行弟悌三十五葉一行餔脯幸下有然字三十八葉十三行伯夷叔齊下重伯夷叔齊四字四十葉七行汲汲伋伋四十三葉八行徘徊俳佪十一行勝申十四行注尚上四十五葉四行藝五行聖賢四十六葉九行管管四十七葉八行注章意南華真經卷第九南華真經卷第十莊子雜篇説劔第三十郭象注四葉八行良聖傑桀莊子雜篇漁父第三十一郭象注五葉十二行須十一行頰顔十葉十二行湛於下有人字莊子雜篇列御寇第三十二郭象注十二葉八行昏昏下同十一行漿下同十三葉一行齏四行若食食作是注薄可無可字十四葉一行才性觀注則郭固作性六行食上有飽字十五葉九行注平性性作往十一行注亦則十五行注偽為十六葉八行注貴責十三行注往性十四行注惔淡十七葉二行道導注同五行冥瞑十八葉五行汲圾下同八行注從事將然十九葉三行士事六行注內外外內七行之離支離訙訊注垣坦十一行不問卜不問大小十三行達者無者字二十葉十三行注堯下有也字二十一葉一行睫眼十二行注涯崖十四行則責二十二葉九行十行注以必十五行芻叔叔作菽二十三葉四行齎齋十五行注功之無之字莊子雜篇天下第三十三郭象注二十四葉二行注其所以其八行注不目二十五葉三行辟闢二十六葉一行有百十四行注而急而作故十六行順循二十七葉十六行未末二十八葉十行名山山作川十二行甚風風作雨疾雨雨作風三十一葉十二行注亦必三十二葉一行當黨十三行曰日三十三葉四行注故輐三十四葉九行見聚三十五葉十二行注其非其作豈十三行注如溪谷也無也字三十六葉一行注其少誤其守十二行芴寂三十七葉二行儻黨八行注而兩十五行稠調三十八葉五行曆歷三十九葉十三行天下有下字四十二葉八行捶捶四十四葉二行注者下有乎字南華真經卷第十
