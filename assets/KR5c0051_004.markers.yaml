  - {type: line-break, offset: 10, content: '', id: KR5c0051_SBCK_004-1a03}
  - {type: variant, offset: 12, length: 8, content: 外篇駢拇第八音義, ZTDZ: 家貧故往貸粟於監河侯監河侯}
  - {type: punctuation, offset: 18, content: (, id: KR5c0051_krp_004-bkkpn1}
  - {type: 'kr:non-cjk', offset: 18, content: ○, id: KR5c0051_krp_004-bkkkrnonc1}
  - {type: variant, offset: 18, length: 8, content: 音義曰舉事以名篇, HFL: ''}
  - {type: variant, offset: 21, length: 1, content: 舉, ZTDZ: 諾我將得邑金將貸子三百金可乎莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何爲者邪對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我且南遊吴越之王激西江之水而迎子可乎鮒魚忿然作色曰吾失我常與我無所處吾得斗升之水然活耳君乃言此曾不如早索我於枯魚之肆任公子爲大鉤巨緇五十犗以爲餌蹲乎會稽投竿東海旦旦而釣期年不得魚已而大魚食之牽巨鉤錎没而下驚揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而腊之自制河以東蒼梧已北莫不厭若魚者已而後世輇才諷說之徒皆驚而相告也夫揭竿累趨灌瀆守鯤鮒其於得大魚難矣飾小說以干縣令其於大達亦遠矣是以未嘗聞任氏之風俗其不可與經於世亦遠矣儒以詩禮發冢大儒臚傳曰東方作矣事之何若小儒曰未解裙襦口中有珠詩固有之曰青青之麥生於陵陂生不布施死何舍珠爲接其鬢擪其顪儒以金椎控其頤徐别其頰無傷口中珠老萊子之弟子出薪遇仲尼反以告曰有人於彼脩上而趨下末僂而後耳視若營四海不知其誰氏之子老萊子曰是丘也召而來仲尼至曰丘去汝躬矜與汝容知斯爲君子矣仲尼揖而退蹙然改容而問曰業可得進乎老萊子曰夫不忍一世之傷而驁萬世之患抑固窶邪亡其略弗及邪惠以歡爲驁終身之醜中民之行進焉耳相引以名相結以隱與其譽堯而非桀不如兩忘而閉其所譽反無非傷也動無非邪也聖人躊躇以與}
  - {type: page-break, offset: 21, content: '', id: KR5c0051_SJB_004-110618a}
