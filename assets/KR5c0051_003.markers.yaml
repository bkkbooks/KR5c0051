  - {type: punctuation, offset: 3455, content: /, id: KR5c0051_krp_003-bkkpn450}
  - {type: variant, offset: 3467, length: 0, content: '', ZTDZ: 之間若白駒之過郤忽然}
  - {type: variant, offset: 3468, length: 0, content: '', ZTDZ: 已注然勃然莫不出焉油然漻然莫不入焉已化而生又化而死生物哀之人類悲之解其天弢墮其天𧙍紛乎宛乎魂魄將往乃身從之乃大歸乎不形之形形之不形是人之所同知也非將至之所務也此衆人之所同論也彼至則不論論則不至明見無值辯不若默道不可聞聞不若塞此之謂大得東郭子問於莊子曰所謂道惡乎在莊子曰無所不在東郭子曰期而後可莊子曰在螻蟻曰何其下邪曰在稊稗曰何其愈下邪曰在瓦甓曰何其愈甚邪曰在屎溺東郭子不應莊子曰夫子之問也固不及質正獲之問於監市履狶也每下愈況汝唯莫必無乎逃物至道若是大言亦然周徧咸三者異名同實其指一也嘗相與游乎無何有之宫同合而論無所終窮乎嘗相與無爲乎澹而靜乎漠而清乎調而間乎寥已吾志無往焉而不知其所至去而來而不知其所止吾已往來焉而不知其所終仿徨乎嗎閎大知入焉而不知其所窮物物者與物無際而物有際者所謂物際者也不際之際際之不際者也謂盈虚衰殺彼爲盈虚非盈虚彼爲衰殺非衰殺彼爲本末非本末彼爲積散非積散也妸荷甘與神農同學於老龍吉神農隱几闔户晝瞑妸荷甘日中多户而入曰老龍死矣神農隱几擁杖而起嚗然放杖而笑曰天知予僻陋慢訑故棄予而死已矣夫子無所發予之狂言而死矣夫弇堈弔聞之曰夫體道者天下之君子所擊焉今於道秋豪之端萬分未得處一焉而猶知藏其狂言而死又況夫體道者乎視之無形聽之無聲於人之論者謂之㝠㝠所以論道而非道也於是泰清問乎無窮曰子知道乎無窮曰吾不知又問乎無爲無爲曰吾知道曰子之知道亦有數乎曰有曰其數若何無爲曰吾知道之可以貴可以賤可以約可以散此吾所以知道之數也泰清以之言也問乎無始曰若是則無窮之弗知與無爲之知孰是而孰非乎無始曰不知深矣知之淺矣弗知内矣知之外矣於是泰清中而歎曰弗知乃知乎知乃不知乎孰知不知之知無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也知形形之不形乎道不當名無始曰有問道而應之者不知道也雖問道者亦未聞道道無問問無應無問問之是問窮也無應應之是無内也以無内待問窮若是者外不觀乎宇宙内不知乎大初是以不過乎崑崙不遊乎太虚光曜問乎無有曰夫子有乎其無有乎光曜不得問而孰視其狀貌窅然空然終日視之而不見聽之而不聞搏之而不得也光曜曰至矣其孰能至此乎予能有無矣而未能無無也及爲無有矣何從至此哉大馬之捶鉤者年八十矣而不失豪芒大馬曰子巧與有道與曰臣有守也臣之年二十而好捶鉤於物無視也非鉤無察也是用之者假不用者也以長得其用而況乎無不用者乎物孰不資焉冉求問於仲尼曰未有}
