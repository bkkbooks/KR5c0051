  - {type: punctuation, offset: 8654, content: (, id: KR5c0051_krp_004-bkkpn795}
  - {type: variant, offset: 8654, length: 13, content: 去其所資則未施禁而自止也擿, HFL: 摘}
  - {type: variant, offset: 8655, length: 7, content: 其所資則未施禁, ZTDZ: 已}
  - {type: punctuation, offset: 8660, content: /, id: KR5c0051_krp_004-bkkpn796}
  - {type: variant, offset: 8663, length: 2, content: 自止, ZTDZ: 縁不得已泠汰於物以爲道理曰知不知將薄知而後鄰傷之者}
  - {type: punctuation, offset: 8666, content: ), id: KR5c0051_krp_004-bkkpn797}
  - {type: variant, offset: 8666, length: 16, content: 擿玉毀珠小盜不起賤其所寳則不加刑, ZTDZ: 謑髀無任}
