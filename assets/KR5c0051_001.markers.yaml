  - {type: variant, offset: 8891, length: 250, content: 謂哉而或者謂天役物使從巳也夫天且不能自有况能有物哉故天也者萬物之總名也莫適爲天誰主役物乎故物各自生而無所出焉此天道也比毗志反又必履反李扶必反注同復扶又反適丁歷反簡文云寛心也窖古孝反司馬云深也李云穴也案穴地藏縠曰窖簡文云深心也小恐惴惴大恐縵縵此盖恐悸之異恐曲勇反下及注同惴之瑞反李云小心貌爾雅云懼也縵縵李云齊死生貌悸其季反其發若機栝其司是非之謂也其留如詛盟其守勝之謂也此盖動止之異機栝古活反機弩牙栝箭栝詛惻據反盟音明徐武耕反郭武病反其殺如秋冬以言其日消也其衰殺日消有如此者殺色界反徐色例反注同其溺之所爲, ZTDZ: 列子追}
