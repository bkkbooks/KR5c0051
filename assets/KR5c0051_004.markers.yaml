  - {type: variant, offset: 8586, length: 0, content: '', ZTDZ: 至害也皆遺忘而不知察及其患至求盡性竭財單以反一日之無故而不可得也故觀之名則不見求之}
  - {type: variant, offset: 8587, length: 1, content: 器, ZTDZ: 則不得繚意絶體而爭此不亦感乎雜篇說剱第三十昔趙文王喜劍劍士夾門而客三千餘人日夜相擊於前死傷者歲百餘人好之不厭如是三年國衰諸侯謀之太子悝患之募左右曰孰能說王之意止劍士者賜之千金左右曰莊子當能太子乃使人以千金奉莊子莊子弗受與使者俱往見太子曰太子何以教周賜周千金太子曰聞夫子明聖謹奉千金以幣從者夫子弗受悝尚何敢言莊子曰聞太子所欲用周者欲絶王之喜好也使臣上說大王而逆王意下不當太子則身刑而死周尚安所事金乎使臣上說大王下當太子趙國何求而不得也太子曰然吾王所見唯劍士也莊子曰諾周善爲劍太子曰然吾王所見劍士皆蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難王乃悅之今夫子必儒服而見王事必大逆莊子曰請治劍服治劍服三日乃見太子太子乃與見王王脱白刃待之莊子入殿門不趨見王不拜王曰子欲何以教寡人使太子先曰臣聞大王喜劍故以劍見王王曰子之劍何能禁制曰臣之劍十步一人千里不留行王大悦之曰天下無敵矣莊子曰夫爲劍者示之以虚開之以利後之以發先之以至願得試之王曰夫子休就舍待命令設戲請夫子王乃校劍士七日死傷者六十餘人得五六人使奉劍於殿下乃召莊子王曰今日試使士敦劍莊子曰望之乆矣王曰夫子所御杖長短何如曰臣之所奉皆可然臣有三劍唯王所用請先言而後試王曰願聞三劍曰有天子劍有諸侯劍有庶人劍王曰天子之劍何如曰天子之劍以燕谿石城爲鋒齊岱爲鍔晋魏爲脊周宋爲鐔韓魏爲鋏包以四夷裹以四時繞以渤海帶以常山制以五行論以刑德開以陰陽持以春夏行以秋冬此劍直之無前舉之無上案之無下運之無旁上决浮云下絶地紀此劍一用匡諸侯天下服矣此天子之劍也文王芒然自失曰諸侯之劍何如曰諸侯之劍以知勇士爲鋒以清廉士爲鍔以賢良士爲脊以忠勝士爲鐔以豪傑士爲鋏此劍直之亦無前舉之亦無上案之亦無下運之亦無旁上法圓天以順三光下法方地以順四時中知民意以安四鄕此劍一用如雷霆之震也四封之内無不賔服而聽從君命者矣此諸侯之劍也王曰庶人之劍何如曰庶人之劍蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難相擊於前上斬頸領下决肝肺此庶人之劍無異於鬭雞一旦命已絶矣無所用於國事今大王有天子之位而好庶人之劍臣竊爲大王薄之王乃牽而上殿宰人上食王三環之莊子曰大王安坐定氣劍事已畢奏矣於是文王不出宫三月劍士皆服斃其處也雜篇漁父第三十一孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子弦歌鼓琴奏曲未半有漁父者下船而來鬢眉交白被髮揄袂行原以上距陸而止左手據膝右手持頤以聽曲終而招子貢子路二人俱對客指孔子曰彼何爲者也子路對曰魯之君子也客問其族子路對曰族孔氏客曰孔氏者何治也子路未應子貢對曰孔氏者性服忠信身行仁義飾禮樂選人倫上以忠於世主下以化於齊民將以利天下此孔氏之所治也又問曰有土之君與子貢曰非也侯王之佐與子貢曰非也客乃笑而還行言曰仁則仁矣恐不免其身苦心勞形以危其眞嗚呼遠哉其分於道也子貢還報孔子孔子推琴而起曰其聖人與乃下求之至於澤畔方將杖挐而引其船顧見孔子還鄕而立孔子反走再拜而進客曰子將何求孔子曰曩者先生有緒言而去丘不肖未知所謂竊待於下風幸聞咳唾之音以卒相丘也客曰嘻甚矣子之好學也孔子再拜而起曰丘少而修學以至於今六十九歲矣無所得聞至教敢不虚心客曰同類相從同聲相應固天之埋也吾請釋吾之所有而經子之所以子之所以者人事也天子諸侯大夫庶人此四者自正治之美也四者離位而亂莫大焉官治其職人憂其事乃無所陵故田荒室露衣食不足徵賦不屬妻妾不和長少無序庶人之憂也能不勝任官事不治行不清白群下荒怠功美不有爵禄不持大夫之憂也廷無忠臣國家昏亂工技不巧貢職不美春秋後倫不順天子諸侯之憂也陰陽不和寒暑不時以傷庶物諸侯暴亂擅相攘伐以殘民人禮樂不節財用窮匱人倫不飾百姓淫亂天子有司之憂也今子旣上無君侯有司之勢而下無大臣職事之官而擅飾禮樂選人倫以化齊民不泰多事乎且人有八疵事有四患不可不察也非其事而事之謂之揔莫之顧而進之謂之佞希意導言謂之謟不擇是非之言謂之諛好言人之惡謂之讒析交離親謂之賊稱譽詐僞以敗惡人謂之應不擇善否兩容顔適偷拔其所欲謂之險此八疵者外以亂人内以傷身君子不友明君不臣所謂四患者好經大事變更易常以挂功名謂之叨專知擅事侵人自用謂之貪見過不更聞諫愈甚謂之狠人同於己則可不同於己雖善不善謂之矜此四患也能去八疵無行四患而始可教已孔子愀然而歎再拜而起曰丘再逐於魯削迹於衛伐樹於宋圍於陳蔡丘不知所失而離此四謗者何也客悽然變容曰甚矣子之難悟也人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影不離身自以爲尚遲疾走不休絶力而死不知處陰以休影處靜以息迹愚亦甚矣子審仁義之間察同異之際觀動靜之變適受與之度理好惡之情和喜怒之節而幾於不免矣謹修而身愼守其眞還以物與人則無所累矣今不修之身而求之人不亦外乎孔子愀然曰請問何謂眞客曰眞者精誠之至也不精不誠不能動人故彊哭者雖悲不哀彊怒者雖嚴不威彊親者雖笑不和眞悲無聲而哀眞怒未發而威眞親未笑而和眞在内者神動於外是所以貴眞也其用於人理也事親則慈孝事君則忠貞飲酒則歡樂處喪則悲哀忠貞以功爲主飲酒以樂爲主處喪以哀爲主事親以適爲主功成之美無一其迹矣事親以適不論所以矣飲酒以樂不選其具矣處喪以哀無問其禮矣禮者世俗之所爲也眞者所以受於天也自然不可易也故聖人法天貴眞不拘於俗愚者反此不能法天而恤於人不知貴眞禄禄而受變於俗故不足惜哉子之早湛於人僞而晚聞大道也孔子又再拜而起曰今者丘得遇也若天幸然先生不羞而比之服役而身教之敢問舍所在請因受業而卒學大道客曰吾聞之可與往者與之至於妙道不可與往者不知其道愼勿與之身乃無咎子勉之吾去子矣吾去子矣乃刺船而去延縁葦間顔淵還車子路授綏孔子不顧待水波定不聞拏音而後敢乘子路旁車而問曰由得爲役乆矣未嘗見夫子遇人如此其威也萬乘之主千乘之君見夫子未嘗不分庭伉禮夫子猶有倨傲之容今漁父杖拏逆立而夫子曲要磬折再拜而應得無太甚乎門人皆怪夫子矣漁父何以得此乎孔子伏軾而歎曰甚矣由之難化也湛於禮義有間矣而樸鄙之心至今未去進吾語汝夫遇長不敬失禮也見賢不尊不仁也彼非至人不能下人下人不精不得其眞故長傷身惜哉不仁之於人也禍莫大焉而由獨擅之且道者萬物之所由也庶物失之者死得之者生爲事逆之則敗順之則成故道之所在聖人尊之今漁父之於道可謂有矣吾敢不敬乎雜篇列御寇第三十二列御寇之齊中道而反遇伯昏瞀人伯昏瞀人曰奚方而反曰吾驚焉曰惡乎驚曰吾嘗食於十漿而五漿先饋伯昏瞀人曰若是則汝何爲驚已曰夫内誠不解形諜成光以外鎭人心使人輕乎貴老而𩐎其所患夫漿人特爲食羹之貨多餘之赢其爲利也薄其爲權也輕而猶若是而況於萬乘之主乎身勞於國而知盡於事彼將任我以事而效我以功吾是以驚伯昏瞀人曰善哉觀乎汝處已人將保汝矣無幾何而往則户外之履滿矣伯昏瞀人北面而立敦杖蹙之乎頤立有間不言而出賔者以告列子列子提履跣而走暨乎門曰先生旣來曾不發藥乎曰已矣吾固告汝曰人將保汝果保汝矣非汝能使人保汝而汝不能使人無保汝也而焉用之感豫出異也必且有感摇而本性又無謂也與汝遊者又莫與告也彼所小言盡人毒也莫覺莫悟何相孰也巧者勞而知者憂無能者無所求飽食而遨遊汎若不繫之舟虚而遨遊者也鄭人緩也呻吟裘氏之地祇三年而緩爲儒河潤九里澤及三族使其弟墨儒墨相與辯其父助翟十年而緩自殺其父夢之曰使而子爲墨者予也闔胡嘗視其良旣爲秋栢之實}
