  - {type: variant, offset: 665, length: 0, content: '', ZTDZ: 罪天之穿之日夜無降人則顧塞其寳胞有重閬心有天遊室無空虚則婦姑勃磎心無天遊則六鑿相攘大林丘山之善於人也亦神者不勝德溢乎名名溢乎暴謀稽乎誸知出乎爭柴生乎守官事果乎衆宜春雨日時草木怒生銚鎒於是乎始修草木之到植者過半而不知其然靜然可}
