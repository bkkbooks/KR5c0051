front:
  text: 南華眞經卷之三貞四
  hash: sha256:7a8768c66c7a47712fb1358ed42b8b4328ddf0bcd1276471575c78930b0edfe8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0051_SJB_002-110586b}
body:
  text: 外篇天地第十二天地雖大其化均也萬物雖多其治一也人卒雖衆其主君也君原於德而成於天故曰玄古之君天下無爲也天德而已矣以道觀言而天下之君正以道觀分而君臣之義明以道觀能而天下之官治以道汎觀而萬物之應備故通於天地者德也行於萬物者道也上治人者事也能有所藝者技也技兼於事事兼於義義兼於德德兼於道道兼於天故曰古之畜天下者無欲而天下足無爲而萬物化淵靜而百姓定記曰通於一而萬事畢無心得而鬼神服夫子曰夫道覆載萬物者也洋洋乎大哉君子不可以不刳心焉無爲爲之之謂天無爲言之之謂德愛人利物之謂仁不同同之之謂大行不崖異之謂寬有萬不同之謂富故執德之謂紀德成之謂立循於道之謂備不以物挫志之謂完君子明於此十者則韜乎其事心之大也沛乎其爲萬物逝也若然者藏金於山藏珠於淵不利貨財不近貴富不樂壽不哀夭不榮通不醜窮不拘一世之利以爲己私分不以王天下爲己處顯顯則明萬物一府死生同狀夫子曰夫道淵乎其居也漻乎其清也金石不得無以鳴故金石有聲不考不鳴萬物孰能定之夫王德之人素逝而恥通於事立之本原而知通於神故其德廣其心之出有物採之故形非道不生生非德不明存形窮生立德明道非王德者邪蕩蕩乎忽然出勃然動而萬物從之乎此謂王德之人視乎㝠㝠聽乎無聲冥冥之中獨見曉焉無聲之中獨聞和焉故深之又深而能物焉神之又神而能精焉故其與萬物接也至無而供其求時騁而要其宿大小長短脩遠黄帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其玄珠使知索之而不得使離朱索之而不得使喫詬索之而不得也乃使象罔象罔得之黄帝曰異哉象罔乃可以得之乎堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣堯問於許由曰齧缺可以配天乎吾藉王倪以要之許由曰殆哉圾于天下齧缺之爲人也聰明叡知給數以敏其性過人而又乃以人受天彼審乎禁過而不知過之所由生與之配天乎彼且乘人而無天方且本身而異形方且尊知而火馳方且爲緒使方且爲物絯方且四顧而物應方且應衆宜方且與物化而未始有恒夫何足以配天乎雖然有族有祖可以爲衆父而不可以爲衆父父治亂之率也北面之禍也南面之賊也堯觀乎華華對人曰嘻聖人請祝聖人使聖人壽堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰壽富多男子人之所欲也汝獨不欲何邪堯曰多男子則多懼富則多事壽則多辱是三者非所以養德也故辭封人曰始也我以汝爲聖人邪今然君子也天生萬民必授之職多男子而授之職則何懼之有富而使人分之則何事之有夫聖人鶉居而鷇食鳥行而無彰天下有道則與物皆昌天下無道則脩德就間千歲厭世去而上僊乘彼白雲至于帝郷三患莫至身常無殃則何辱之有封人去之堯隨之曰請問封人曰退已堯治天下伯成子高立爲諸侯堯授舜舜授禹伯成子高辭爲諸侯而耕禹往見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立爲諸侯堯授舜舜授予而吾子辭爲諸侯而耕敢問其故何也子高曰昔堯治天下不賞而民勸不罰而民畏今子賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣夫子闔行邪無落吾事俋俋乎耕而不顧泰初有無無有無名一之所起有一而未形物得以生謂之德未形者有分且然無間謂之命留動而生物物成生理謂之形形體保神各有儀則謂之性性脩反德德至同於初同乃虚虚乃大合喙鳴喙鳴合與天地爲合其合緡緡若愚若昏是謂玄德同乎大順夫子向于老聃曰有人治道若相放可不可然不然辨者有言曰離堅白若縣寓若是則可謂聖人乎老聃曰是胥易技係勞形怵心者也執狸之狗成思猨狙之便自山林來丘予告若而所不能聞與而所不能言凡有首有趾無心無耳者衆有形者與無形無狀而皆存者盡無其動止也其死生也其廢起也此又非其所以也有治在人忘乎物忘乎天其名爲忘己忘己之人是之謂入於天蔣閶葂見季徹曰魯君謂葂也曰請受教辭不獲命旣已告矣未知中否請嘗薦之吾謂魯君曰必服恭儉拔出公忠之屬而無阿私民孰不敢輯季徹局局然笑曰若夫子之言於帝王之德猶螳蜋之怒臂以當車轍則必不勝任矣且若是則其自爲處危其觀臺多物將往投迹者衆蔣閶葂覤覤然驚曰葂也汒若於夫子之所言矣雖然願先生之言其風也季徹曰大聖之治天下也摇蕩民心使之成教易俗舉滅其賊心而皆進其獨志若性之自爲而民不知其所由然若然者豈兄堯舜之教民溟涬然弟之哉欲同乎德而心居矣子貢南遊於楚反於晋過漢陰見一丈人方將爲圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎爲圃者仰而視之曰奈何曰鑿木爲機後重前輕挈水若抽數如泆湯其名爲橰爲圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不爲也子貢瞞然慚俯而不對有間爲圃者曰子奚爲者邪曰孔丘之徒也爲圃者曰子非夫博學以擬聖於于以蓋衆獨弦哀歌以賣名聲於天下者乎汝方將忘汝神氣墮汝形骸而庶幾乎而身之不能治而何暇治天下乎子往矣無乏吾事子貢卑陬失色頊頊然不自得行三十里而後俞其弟子曰向之人何爲者邪夫子何故見之變容失色終日不自反邪曰始吾以爲天下一人耳不知復有夫人也吾聞之夫子事求可功求成用力少見功多者聖人之道今徒不然執道者德全德全者形全形全者神全神全者聖人之道也託生與民並行而不知其所之汒乎淳備哉功利機巧必忘夫人之心若夫人者非其志不之非其心不爲雖以天下譽之得其所謂謷然不顧以天下非之失其所謂儻然不受天下之非譽無益損焉是謂全德之人哉我之謂風波之民反於魯以告孔子孔子曰彼假脩渾沌氏之術者也識其一不知其二治其内而不治其外夫明白入素無爲復朴體性抱神以遊世俗之間者汝將固驚邪且渾沌氏之術予與汝何足以識之哉諄芒將東之大壑適遇苑風於東海之濱苑風曰子將奚之曰將之大壑曰奚爲焉曰夫大壑之爲物也注焉而不滿酌焉而不竭吾將遊焉苑風曰夫子無意于橫目之民乎願聞聖治諄芒曰聖治乎官施而不失其宜拔舉而不失其能畢見其情事而行其所爲行言自爲而天下化手撓顧指四方之民莫不俱至此之謂聖治願聞德人曰德人者居無思行無慮不藏是非美惡四海之内共利之之爲悅共給之之爲安怊乎若嬰兒之失其母也儻乎若行而失其道也財用有餘而不知其所自來飲食取足而不知其所從此謂德人之容願聞神人曰上神乘光與形滅亡此謂照曠致命盡情天地樂而萬事銷亡萬物復情此之謂混冥門無鬼與赤張滿稽觀於武王之師赤張滿稽曰不及有虞氏乎故離此患也門無鬼曰天下均治而有虞氏治之邪其亂而後治之與赤張滿稽曰天下均治之爲願而何計以有虞氏爲有虞氏之藥瘍也秃而施髢病而求醫孝子操藥以脩慈父其色燋然聖人羞之至德之世不尚賢不使能上如標枝民如野鹿端正而不知以爲義相愛而不知以爲仁實而不知以爲忠當而不知以爲信蠢動而相使不以爲賜是故行而無迹事而無傳孝子不諛其親忠臣不謟其君臣子之盛也親之所言而然所行而善則世俗謂之不肖子君之所言而然所行而善則世俗謂之不肖臣而未知此其必然邪世俗之所謂然而然之所謂善而善之則不謂之導諛之人也然則俗故嚴於親而尊於君邪謂己導人則勃然作色謂己諛人則怫然作色而終身導人也終身諛人也合譬飾辭聚衆也是終始本末不相坐垂衣裳設采色動客貌以媚一世而不自謂導諛與夫人之爲徒通是非而不自謂衆人愚之至也知其愚者非大愚也知其惑者非大惑也大惑者終身不解大愚者終身不靈三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者勝也而今也以天下惑予雖有祈嚮不可得也不亦悲乎大聲不入於里耳折揚皇華則嗑然而笑是故高言不止於衆人之心至言不出俗言勝也以二垂踵惑而所適不得矣而今也以天下惑予雖有祈嚮其庸可得邪知其不可得也而强之又一惑也故莫若釋之而不推不推誰其比憂厲之人夜半生其子遽取火而視之汲汲然唯恐其似己也百年之木破爲犧樽青黄而文之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也跖與曾史行義有間矣然其失性均也且夫失性有五一曰五色亂目使目不明二曰五聲亂耳使耳不聰三曰五臭薰鼻困惾中顙四曰五味濁口使口厲爽五曰趣舍滑心使性飛揚此五者皆生之害也而楊墨乃始離跂自以爲得非吾所謂得也夫得者困可以爲得乎則鳩鴞之在於籠也亦可以爲得矣且夫趣舍聲色以柴其内皮弁鷸冠搢笏紳脩以約其外内支盈於柴栅外重纏繳睆睆然在纏繳之中而自以爲得則是罪人交臂歷指而虎豹在於囊檻亦可以爲得矣外篇天道第十三天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海内服明於天通於聖六通四辟於帝王之德者其自爲也昧然無不靜者矣聖人之靜也非曰靜也善故靜也萬物無足以鐃心者故靜也水靜則明燭鬚眉平中准大匠取法焉水靜猶明而況精神聖人之心靜乎天地之鑒也萬物之鏡也夫虚靜恬淡寂漠無爲者天地之平而道德之至故帝王聖人休焉休則虚虚則實實者倫矣虚則靜靜則動動則得矣靜則無爲無爲也則任事者責矣無爲則俞俞俞俞者憂患不能處年壽長矣夫虚靜恬淡寂漠無爲者萬物之本也明此以南卿堯之爲君也明此以北面舜之爲臣也以此處上帝王天子之德也以此處下玄聖素王之道也以此退居而間游江海山林之士服以此進爲而撫世則功大名顯而天下一也靜而聖動而王無爲也而尊樸素而天下莫能與之爭美夫明白於天地之德者此之謂大本大宗與天和者也所以均調天下與人和者也與人和者謂之人樂與天和者謂之天樂莊子曰吾師乎吾師乎𩐎萬物而不爲戾澤及萬世而不爲仁長於上古而不爲壽覆載天地刻彫衆形而不爲巧此之謂天樂故曰知天樂者其生也天行其死也物化靜而與陰同德動而與陽同波故知天樂者無天怨無人非無物累無鬼責故曰其動也天其靜也地一心定而王天下其鬼不崇其魂不疲一心定而萬物服言以虚靜推於天地通於萬物此之謂天樂天樂者聖人之心以畜天下也夫帝王之德以天地爲宗以道德爲主以無爲爲常無爲也則用天下而有餘有爲也則爲天下用而不足故古之人貴夫無爲也上無爲也下亦無爲也是下與上同德下與上同德則不臣下有爲也上亦有爲也是上與下同道上與下同道則不主上必無爲而用天下下必有爲爲天下用此不易之道也故古之王天下者知雖落天地不自慮也辯雖彫萬物不自說也能雖窮海内不自爲也天不産而萬物化地不長而萬物育帝王無爲而天下功故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地此乘天地馳萬物而用人羣之道也本在於上末在於下要在於主詳在於臣三軍五兵之運德之末也賞罰利害五刑之辟教之末也禮法度數刑名比詳治之末也鍾鼓之音羽旄之容樂之末也哭泣衰絰隆殺之服哀之末也此五末者須精神之運心術之動然後從之者也末學者古人有之而非所以先也君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從夫尊卑先後天地之行也故聖人取象焉天尊地卑神明之位也春夏先秋冬後四時之序也萬物化作萌區有狀盛衰之殺變化之流也夫天地至神而有尊卑先後之序而況人道乎宗廟尚親朝廷尚尊郷黨尚齒行事尚賢大道之序也語道而非其序者非道也語道而非其道者安取道是故古之明大道者先明天而道德次之道德已明而仁義次之仁義已明而分守次之分守已明而刑名次之刑名已明而因任次之因任己明而原省次之原省已明而是非次之是非已明而賞罰次之賞罰已明而愚知處宜貴賤履位仁賢不肖襲情必分其能必由其名以此事上以此畜下以此治物以此修身知謀不用必歸其天此之謂太平治之至也故書曰有刑有名刑名者古人有之而非所以先也古之語大道者五變而刑名可舉九變而賞罰可言也驟而語刑名不知其本也驟而語賞罰不知其始也到道而言迕道而說者人之所治也安能治人驟而語刑名賞罰此有知治之具非知治之道可用於天下不足以用天下此之謂辯士一曲之人也禮法度數刑名比詳古人有之此下之所以事上非上之所以畜下也昔者舜問於堯曰天王之用心何如堯曰吾不敖無告不廢窮民苦死者嘉孺子而哀婦人此吾所以用心已舜曰美則美矣而未大也堯曰然則何如舜曰天德而出寧日月照而四時行若晝夜之有經雲行而雨施矣堯曰膠膠擾擾乎子天之合也我人之合也夫天地者古之所大也而黄帝堯舜之所共美也故古之王天下者奚爲哉天地而已矣孔子西藏書於周室子路謀曰由聞周之徵藏史有老聃者免而歸居夫子欲藏書則試往因焉孔子曰善往見老聃而老聃不許於是緒十二經以說老聃中其說曰大謾願聞其要孔子曰要在仁義老聃曰請問仁義人之性邪孔子曰然君子不仁則不成不義則不生仁義眞人之性也又將奚爲矣老聃曰請問何謂仁義孔子曰中心物愷兼愛無私此仁義之情也老聃曰噫幾乎後言夫兼愛不亦迂乎無私焉乃私也夫子若欲使天下無失其牧乎則天地固有常矣日月固有明矣星辰固有列矣禽獸固有群矣樹木固有立矣夫子亦放德而行循道而趨已至矣又何偈偈乎揭仁義若擊鼓而求亡子焉意夫子亂人之性也士成綺見老子而問曰吾聞夫子聖人也吾固不辭遠道而來願見百舍重趼而不敢息今吾觀子非聖人也鼠壤有餘蔬而棄妹不仁也生熟不盡於前而積斂無崖老子漠然不應士成綺明日復見曰昔者吾有刺於子今吾心正郤矣何故也老子曰夫巧知神聖之人吾自以爲脱焉昔者子呼我牛也而謂之牛呼我馬也而謂之馬荀有其實人與之名而弗受再受其殃吾服也恒服吾非以服有服士成綺鴈行避影履行遂進而問修身若何老子曰而容崖然而目衝然而顙頯然而口闞然而狀義然似擊馬而止也動而持發也機察而審知巧而覩於泰凡以爲不信邊境有人焉其名爲竊夫子曰夫道於大不終於小不遺故萬物備廣廣乎其無不容也淵乎其不可測也形德仁義神之末也非至人孰能定之夫至人有世不亦大乎而不足以爲之累天下奮棅而不與之偕審乎無假而不與利遷極物之眞能守其本故外天地遣萬物而神未嘗有所困也通乎道合乎德退仁義賔禮樂至人之心有所定矣世之所貴道者書也書不過語語有貴也語之所貴者意也意有所隨意之所隨者不可以言傳也而世因貴言傳書世雖貴之哉猶不足貴也爲其貴非其貴也故視而可見者形與色也聽而可聞者名與聲也悲夫世人以形色名聲爲足以得彼之情夫形色名聲果不足以得彼之情則知者不言言者不知而世豈識之哉桓公讀書於堂上輪扁斲輪於堂下釋椎鑿而上問桓公曰敢問公之所讀者何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟魄已夫桓公曰寡人讀書輪人安得議乎有說則可無說則死輪扁曰臣也以臣之事觀之斲輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斲輪古之人與其不可傳也死矣然則君之所讀者古人之糟魄已矣外篇天運第十四天其運乎地其處乎日月其爭於所乎孰主張是孰維綱是孰居無事推而行是意者其有機緘而不得己邪意者其運轉而不能自止邪雲者爲雨乎雨者爲雲乎孰隆弛是孰居無事淫樂而勸是風起北方一西一東有上仿徨孰嘘吸是孰居無事而披拂是敢問何故巫咸祒曰來吾語汝天有六極五常帝王順之則治逆之由凶九洛之事治成德備監照下土天下載之此謂上皇商大宰蕩問仁於莊子莊子曰虎狼仁也曰何謂也莊子曰父子相親何謂不仁曰請問至仁莊子曰至仁無親大宰曰蕩聞之無親則不愛不愛則不孝謂至仁不孝可乎莊子曰不然夫至仁尚矣孝固不足以言之此非遇孝之言也不及孝之言也夫南行者至於郢北面而不見冥山是何也則去之遠也故曰以敬孝易以愛孝難以愛孝易而忘親難忘親易使親忘我難使親忘我易兼忘天下難兼忘天下易使天下兼忘我難夫德遺堯舜而不爲也利澤施於萬世天下莫知也豈直太息而言仁孝乎哉夫孝悌仁義忠信貞廉此皆自勉以役其德者也不足多也故曰至貴國爵并焉至富國財并焉至願名譽并焉是以道不渝北門成問於黄帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩默默乃不自得帝曰汝殆其然哉吾奏之以人徽之以天行之以禮義建之以太清四時迭起萬物循生一盛一衰文武倫經一清一濁陰陽調和流光其聲蟄蟲始作吾驚之以雷霆其卒無尾其始無首一死一生一僨一起所常無窮而一不可待汝故懼也吾又奏之以陰陽之和燭之以日月之明其聲能短能長能柔能剛變化齊一不主故常在谷滿谷在阬滿阬塗郤守神以物爲量其聲揮綽其名高明是故鬼神守其幽日月星辰行其紀吾止之於有窮流之於無止子欲慮之而不能知也望之而不能見也逐之而不能及也儻然立於四虚之道倚於槁梧而吟目知窮乎所欲見力屈乎所欲逐吾旣不及已矣形充空虚乃至委蛇汝委蛇故怠吾又奏之以無怠之聲調之以自然之命故若混逐叢生林樂而無形布揮而不曳幽昏而無聲動於無方居於窈冥或謂之死或謂之生或謂之實或謂之榮行流散徙不主常聲世疑之稽於聖人聖也者達於情而遂於命也天機不張而五官皆備此之謂天樂無言而心悦故有焱氏爲之頌曰聽之不聞其聲視之不見其形充滿天地苞裹六極汝欲聽之而無接焉而故惑也樂也者始於懼懼故祟吾又次之以怠怠故遁卒之於惑惑故愚愚故道道可載而與之俱也孔子西遊於衛顔淵問師金曰以夫子之行爲奚如師金曰惜乎而夫子其窮哉顔淵曰何也師金曰夫芻狗之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而爨之而已將復取而盛以篋衍巾以文繡遊居寢卧其下彼不得夢必且數眯焉今而夫子亦取先生已陳芻狗取弟子遊居寢卧其下故伐樹於宋削迹於衛窮於商周是非其夢邪圍於陳蔡之間七日不火食死生相與鄰是非其昧邪夫水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸則没世不行尋常古今非水陸與周魯非舟車與今蘄行周於魯是猶推舟於陸也勞而無功身必有殃彼未知夫無方之傳應物而不窮者也且子獨不見夫桔橰者乎引之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人故夫三皇五帝之禮義法度不矜於同而矜於治故譬三皇五帝之禮義法度其猶相梨橘柚邪其味相反而皆可於口故禮義法度者應時而變者也今取猨狙而衣以周公之服彼必齕齧挽裂盡去而後慊觀古今之異猶猨狙之異乎周公也故西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美矉而不知矉之所以美惜乎而夫子其窮哉孔子行年五十有一而不聞道乃南之沛見老聃老聃曰子來乎吾聞子北方之賢者也子亦得道乎孔子曰未得也老子曰子惡乎求之哉曰吾求之於度數五年而未得老子曰子又惡乎求之哉曰吾求之於陰陽十有二年而未得老子曰然使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以告人則人莫不告其兄弟使道而可以與人則人莫不與其子孫然而不可者無他也中無主而不止外無正而不行由中出者不受於外聖人不出由外入者無主於中聖人不隱名公器也不可多取仁義先生之蘧廬也止可以一宿而不可乆處覯而多責古之至人假道於仁託宿於義以遊道遥之墟食於荀簡之田立於不貸之圃逍遥無爲也荀簡易養也不貸無出也古者謂是采眞之遊以富爲是者不能讓禄以顯爲是者不能讓名親權者不能與人柄操之則慄舍之則悲而一無所鑒以闚其所不休者是天之戮民也怨恩取與諫教生殺八者正之器也唯循大變無所湮者爲能用之故曰正者正也其心以爲不然者天門弗開矣孔子見老聃而語仁義老聃曰夫播穅眯曰則天地四方易位矣蚊虻噆膚則通昔不寐矣夫仁義憯然乃憤吾心亂莫大焉吾子使天下無失其朴吾子亦放風而動總德而立矣又奚傑然若負建鼓而求亡子者邪夫鵠不日浴而白鳥不日黔而黑黑白之朴不足以爲辯名譽之觀不足以爲廣泉涸魚相與處於陸相呴以濕相濡以沫不若相忘於江湖孔子見老聃歸三曰不談弟子問曰夫子見老聃亦將何規哉孔子曰吾乃今於是乎見龍龍合而成體散而成章乘乎雲氣而養乎陰陽予口張而不能嗋予又何規老聃哉子貢曰然則人固有尸居而龍見雷聲而淵默發動如天地者乎賜亦可得而觀乎遂以孔子聲見老聃老聃方將倨堂而應徵曰予年運而往矣子將何以戒我乎子貢曰夫三王五帝之治天下不同其係聲名一也而先生獨以爲非聖人如何哉老聃曰小子少進子何以謂不同對曰堯授舜舜授禹禹用力而湯用兵文王順紂而不敢逆武王逆紂而不肯順故曰不同老聃曰小子少進余語汝三皇五帝之治天下黄帝之治天下使民心一民有其親死不哭而民不非也堯之治天下使民心親民有爲其親殺其殺而民不非也舜之治天下使民心競民孕婦十月生子子生五月而能言不至乎孩而始誰則人始有夭矣禹之治天下使民心變人有心而兵有順殺盜非殺人自爲種而天下耳是以天下大駭儒墨皆起其作始有倫而今乎婦女何言哉余語汝三皇五帝之治天下名曰治之而亂莫甚焉三皇之知上悖日月之明下睽山川之精中墮四時之施其知憯於𧓽蠆之尾鮮規之獸莫得安其性命之情者而猶自以爲聖人不可恥乎其無恥也子貢蹴蹴然立不安孔子謂老聃曰丘治詩書禮樂易春秋六經自以爲乆矣孰知其故矣以奸者七十二君論先王之道而明周召之迹一君無所鉤用甚矣夫人之難說也道之難明邪老子曰幸矣子之不過治世之君也夫六經先王之陳迹也豈其所以迹哉今子之所言猶迹也夫迹履之所出而迹豈履哉夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應於下風而風化類自爲雌雄故風化性不可易命不可變時不可止道不可壅荀得於道無自而不可失焉者無自而可孔子不出三月復見曰丘得之矣爲鵲孺魚傳沫細要者化有弟而兄啼乆矣夫丘不與化爲人不與化爲人安能化人老子曰可丘得之矣外篇刻意第十五刻意尚行離世異俗高論怨誹爲亢而已矣此山谷之士非世之人枯稿赴淵者之所好也語仁義忠信恭儉推讓爲修而已矣此平世之士教誨之人遊居學者之所好也語大功立大名禮君臣正上下爲治而已矣此朝廷之士尊主强國之人致功井兼者之所好也就藪澤處間曠釣魚間處無爲而已矣此江海之士避世之人間暇者之所好也吹呴呼吸吐故納新熊經鳥申爲壽而已矣此導引之士養形之人彭祖壽考者之所好也若夫不刻意而高無仁義而修無功名而治無江海而間不導引而壽無不忘也無不有也澹然無極而衆美從之此天地之道聖人之德也故曰夫恬惔寂寞虚無無爲此天地之平而道德之質也故曰聖人休休焉則平易矣平易則恬惔矣平易恬惔則憂患不能入邪氣不能襲故其德全而神不虧故曰聖人之生也天行其死也物化靜而與陰同德動而與陽同波不爲福先不爲禍始感而後應迫而後動不得已而後起去知與故循天之理故無天灾無物累無人非無鬼責其生若浮其死若休不思慮不豫謀光矣而不耀信矣而不期其寢不夢其覺無憂其神純粹其魂不罷虚無恬惔乃合天德故曰悲樂者德之邪喜怒者道之過好惡者德之失故心不憂樂德之至也一而不變靜之至也無所於忤虚之至也不與物交淡之至也無所於逆粹之至也故曰形勞而不休則弊精用而不已則勞勞則竭水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也故曰純粹而不雜靜一而不變淡而無爲動而以天行此養神之道也夫有干越之劍者柙而藏之不敢用也寳之至也精神四達並流無所不極上際於天下蟠於地化育萬物不可爲象其名爲同帝純素之道唯神是守守而勿失與神爲一一之精通合于天倫野語有之曰衆人重利廉士重名賢士尚志聖人貴精故素也者謂其無所與雜也純也者謂其不虧其神也能體純素謂之眞人外篇繕性第十六繕性於俗俗學以求復其初滑欲於俗思以求致其明謂之蔽蒙之民古之治道者以恬養知生而無以知爲也謂之以知養恬知與恬交相養而和理出其性夫德和也道理也德無不容仁也道無不理義也義明而物親忠也中純實而反乎情樂也信行容體而順乎文禮也禮樂徧行則天下亂矣彼正而蒙己德德則不冒冒則物必失其性也古之人在混芒之中與一世而得澹漠焉當是時也陰陽和靜鬼神不擾四時得節萬物不傷群生不夭人雖有知無所用之此之謂至一當是時也莫之爲而常自然逮德下衰及燧人伏義始爲天下是故順而不一德又下衰及神農黄帝始爲天下是故安而不順德又下衰及唐虞始爲天下興治化之流𣻏淳散朴離道以善險德以行然後去性而從於心心與心識知而不足以定天下然後附之以文益之以博文滅質博溺心然後民始惑亂無以反其性情而復其初由是觀之世喪道矣道喪世矣世與道交相喪也道之人何由興乎世世亦何由興乎道哉道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣隱故不自隱古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也當時命而大行乎天下則反一無迹不當時命而大窮乎天下則深根寧極而待此存身之道也古之行身者不以辯飾知不以知窮天下不以知窮德危然處其所而反其性已又何爲哉道固不小行德固不小識小識傷德小行傷道故曰正己而已矣樂全之謂得志古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣今之所謂得志者軒冕之謂也軒冕在身非性命也物之儻來寄也寄之其來不可圍其去不可止故不爲軒冕肆志不爲窮約趨俗其樂彼與此同故無憂而已矣今寄去則不樂由是觀之雖樂未嘗不荒也故曰喪己於物失性於俗者謂之倒置之民外篇秋水第十七秋水時至百川灌河涇流之大雨涘渚涯之間不辯牛馬於是焉河伯欣然自喜以天下之美爲盡在己順流而東行至於北海東面而視不見水端於是焉河伯始旋其面目望洋向若而歎曰野語有之曰聞道百以爲莫已若者我之謂也且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我覩子之難窮也吾非至於子之門則殆矣吾長見笑於大方之家北海若曰井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也今爾出於涯涘觀於大海乃知爾醜爾將可與語大埋矣天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虚春秋不變水旱不知此其過江河之流不可爲量數而吾未嘗以此自多者自以比形於天地而受氣於陰陽吾在天地之間猶小石小木之在大山也方存乎見少又奚以自多計四海之在天地之間也不似礨空之在大澤乎計中國之在海内不似稊米之在太倉乎號物之數謂之萬人處一焉人卒九州穀食之所生舟車之所通人處一焉此其比萬物也不似豪末之在於馬體乎五帝之所連三王之所爭仁人之所憂任士之所勞盡此矣伯夷辭之以爲名仲尼語之以爲博此其自多也不似爾向之自多於水乎河伯曰然則吾大天地而小豪末可乎北海若曰否夫物量無窮時無止分無常終始無故是故大知觀於遠近故小而不寡大而不多知量無窮證曏今故故遥而不悶掇而不跂知時無止察乎盈虚故得而不喜失而不憂知分之無常也明乎坦塗故生而不悅死而不禍知終始之不可故也計人之所知不若其所不知其生之時不若未生之時以其至小求窮其至大之域是故迷亂而不能自得也由此觀之又何以知豪末之足以定至細之倪又何以知天地之足以窮至大之域河伯曰世之議者皆曰至精無形至大不可圍是信情乎北海若曰夫自細視大者不盡自大視細者不明夫精小之微也垺大之殷也故異便此勢之有也夫精粗者期於有形者也無形者數之所不能分也不可圍者數之所不能窮也可以言論者物之粗也可以意致者物之精也言之所不能論意之所不能察致者不期精粗焉是故大人之行不出乎害人不多仁恩動不爲利不賤門隸貨財弗爭不多辭讓事焉不借人不多食乎力不賤貪汙行殊乎俗不多辟異爲在從衆不賤佞謟世之爵禄不足以爲勸戮恥不足以爲辱知是非之不可爲分細大之不可爲倪聞曰道人不聞至德不得大人無已約分之至也河伯曰若物之外若物之内惡至而倪貴賤惡至而倪小大北海若曰以道觀之物無貴賤以物觀之自貴而相賤以俗觀之貴賤不在已以差觀之因其所大而大之則萬物莫不大因其所小而小之則萬物莫不小知天地之爲稊米也知豪末之爲丘山也則差數覩矣以功觀之因其所有而有之則萬物莫不有因其所無而無之則萬物莫不無知東西之相反而不可以相無則功分定矣以趣觀之因其所然而然之則萬物莫不然因其所非而非之則萬物莫不非知堯桀之自然而相非則趣操覩矣昔者堯舜讓以帝之噲讓而絶湯武爭而王白公爭而滅由此觀之爭讓之禮堯桀之行貴賤有時未可以爲常也梁麗可以衝城而不可以窒宂言殊器也騏驥驊騮一日而馳千里捕鼠不如狸狌言殊技也鴟鵂夜撮蚤察豪末畫出瞋目而不見丘山言殊性也故曰蓋師是而無非師治而無亂乎是未明天地之理萬物之情者也是猶師天而無地師陰而無陽其不可行明矣然且語而不舍非愚則誣也帝王殊禪三代殊繼差其時逆其俗者謂之篡夫當其時順其俗者謂之義之徒默默乎河伯汝惡知貴賤之門小大之家河伯曰然則我何爲乎何不爲乎吾辭受趣舍吾終奈何北海若曰以道觀之何貴何賤是謂反衍無拘而志與道大蹇何少何多是謂謝施無一而行與道參差嚴乎若國之有君其無私德繇繇乎若祭之有社其無私福汎汎乎其若四方之無窮其無所畛域兼懷萬物其孰承翼是謂無方萬物一齊孰短孰長道無終始物有死生不恃其成一虚一滿不位乎其形年不可舉時不可止消息盈虚終則有始是所以語大義之方論萬物之理也物之生也若驟若馳無動而不變無時而不移何爲乎何不爲平夫固將自化河伯曰然則何貴於道邪北海若曰知道者必達於理達於埋者必明於權明於權者不以物害己至德者火弗能熱水弗能溺寒暑弗能害禽獸弗能賊非謂其薄之也言察乎安危寧於禍福謹於去就莫之能害也故曰天在内人在外德在乎天知天人之行本乎天位乎得蹢䠱而屈伸反要而語極曰何謂天何謂人北海若曰牛馬四足是謂天落馬首穿牛鼻是謂人故曰無以人滅天無以故滅命無以得殉名謹守而勿失是謂反其眞䕫憐蚿蚿憐蛇蛇憐風風憐目目憐心夔謂蚿曰吾以一足踸踔而行予無如矣今子之使萬足獨奈何蚿曰不然子不見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也今子動吾天機而不知其所以然蚿謂蛇曰吾以衆足而行而不及子之無足何也蛇曰夫天機之所動何可易邪吾安用足哉蛇謂風曰予動吾脊脅而行則有似也今子蓬蓬然起於北海蓬蓬然入於南海而似無有何也風曰然子蓬蓬然起於北海而入於南海也然而指我則勝我䠓我亦勝我雖然夫折大木蜚大屋者唯我能也故以衆小不勝爲大勝也爲大勝者唯聖人能之孔子遊於匡宋人圍之數匝而弦歌不輟子路入見曰何夫子之娛也孔子曰來吾語汝我諱窮久矣而不免命也求通久矣而不得時也當堯舜而天下無窮人非知得也當桀紂而天下無通人非知失也時勢適然夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也由處矣吾命有所制矣無幾何將甲者進辭曰以爲陽虎也故圍之今非也請辭而退公孫龍問於魏牟曰龍少學先王之道長而明仁義之行合同異離堅白然不然可不可困百家之知窮衆曰之辯吾自以爲至達已今吾聞莊子之言汒焉異之不知論之不及與知之弗若與今吾無所開吾喙敢問其方公子牟隱机大息仰天而笑曰子獨不聞夫塪井之蛙乎謂東海之鼈曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接腋持頤蹶泥則没足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨踦塪井之樂此亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右膝已縶矣於是逡巡而却告之海曰夫千里之遠不足以舉其大千仞之高不足以極其深禹之時十年九潦而水弗爲加益湯之時八年七旱而崖不爲加損夫不爲頃乆推移不以多少進退者此亦東海之大樂也於是塪井之蛙聞之適適然驚規規然自失也且夫知不知是非之境而猶欲觀於莊子之言是猶使蚉負山商距馳河也必不勝任矣且夫知不知論極妙之言而自適一時之利者是非塪井之蛙與且彼方跐黄泉而登大皇無南無北爽然四解淪於不測無東無西始於玄冥反於大通子乃規規然而求之以察索之以辯是眞用管闚夭用錐指地也不亦小乎子往矣且子獨不聞夫壽陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳今子不去將忘子之故失子之業公孫龍口呿而不合舌舉而不下乃逸而走莊子釣於濮水楚王使大夫二人往先焉曰願以境内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死爲留骨而貴乎寧其生而曳尾於塗中乎二大夫曰寧生而曳尾於塗中莊子曰往矣吾將曳尾於塗中惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日三夜莊子往見之曰南方有鳥其名鵷鷄子知之乎夫鵷鶵發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是䲭得腐鼠鵷鶵過之仰而視之曰嚇今子欲以子之梁國而嚇我邪莊子與惠子遊於濠梁之上莊子曰儵魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本子曰汝安知魚樂云者旣已知吾知之而問我我知之濠上也外篇至樂第十八天下有至樂無有哉有可以活身者無有哉今奚爲奚據奚避奚處奚就奚去奚樂奚惡夫天下之所尊者富貴壽善也所樂者身安厚味美服好色音聲也所下者貧賤夭惡也所苦者身不得安逸口不得厚味形不得美服目不得好色耳不得音聲若不得者則大憂以懼其爲形也亦愚哉夫富者苦身疾作多積財而不得盡用其爲形也亦外矣夫貴者夜以繼日思慮善否其爲形也亦疏矣人之生也與憂俱生壽者惽惽乆憂不死何之苦也其爲形也亦遠矣烈士爲天下見善矣未足以活身吾未知善之誠善邪誠不善邪若以爲善矣不足活身以爲不善矣足以活人故曰忠諫不聽蹲循弗爭故夫子胥爭之以殘其形不爭名亦不成誠有善無有哉今俗之所爲與其所樂吾又未知樂之果樂邪果不樂邪吾觀夫俗之所樂舉群趣者誙誙然如將不得已而皆曰樂者吾未之樂也亦未之不樂也果有樂無有哉吾以無爲誠樂矣又俗之所大苦也故曰至樂無樂至譽無譽天下是非果未可定也雖然無爲可以定是非至樂活身唯無爲幾存請嘗試言之天無爲以之清地無爲以之寧故爾無爲相合萬物皆化芒乎芴乎而無從出乎芴乎芒乎而無有象乎萬物職職皆從無爲殖故曰天地無爲也而無不爲也人也孰能得無爲哉莊子妻死惠子弔之莊子則方箕踞鼓盆而歌惠子曰與人居長子老身死不哭亦足矣又鼓盆而歌不亦甚乎莊子曰不然是其始死也我獨何能無樂然察其始而本無生非徒無生也而本無形非徒無形也而本無氣雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與爲春秋冬夏四時行也人且偃然寢於巨室而我噭噭然隨而哭之自以爲不通乎命故止也攴離叔與滑介叔觀於冥伯之丘崑崙之虚黄帝之所休俄而柳生其左肘其意蹷蹷然惡之支離叔曰子惡之乎滑介叔曰亡予何惡生者假借也假之而生生者塵垢也死生爲晝夜且吾與子觀化而化及我我又何惡焉莊子之楚見空髑髏饒然有形撽以馬捶因而問之曰夫子貪生失理而爲此乎將子有亡國之事斧鉞之誅而爲此乎將子有不善之行愧遺父母妻子之醜而爲此乎將子有凍餒之患而爲此乎將子之春秋故及此乎於是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辯士諸子所言皆生人之累也死則無此矣子欲聞死之說乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事從然以天地爲春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形爲子骨肉肌膚反子父母妻子間里知識子欲之乎髑髏深矉蹙頞曰吾安能棄南面王樂而復爲人間之勞乎顔淵東之齊孔子有憂色子貢下席而問曰小子敢問回東之齊夫子有憂色何邪孔子曰善哉汝問昔者管子有言丘甚善之曰褚小者不可以懷大綆短者不可以汲深夫若是者以爲命有所成而形有所適也夫不可損益吾恐回與齊侯言堯舜黄帝之道而重以燧人神農之言彼將内求於己而不得不得則惑人惑則死且汝獨不聞邪昔者海鳥止於魯郊魯侯御而觴之子廟奏九韶以爲樂具太牢以爲膳鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死此以己養養鳥也非以鳥養養爲也夫以鳥養養鳥者宜栖之深林遊之壇陸浮之江湖食之鰌䱔隨行列而止委蛇而處彼唯人言之惡聞奚以夫譊譊爲乎咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒聞之相與還而觀之魚處水而生人處水而死彼必相與異其好惡故異也故先聖不一其能不同其事名止於實義設於適是之謂條達而福持列子行食於道從見百歲髑髏攓蓬而指之曰唯予與汝知而未嘗死未嘗生也汝果養乎予果歡乎種有幾得水則爲㡭得水土之際則爲鼃蠙之衣生於陵屯則爲陵舄陵舄得鬱棲則爲烏足烏足之根爲蠐螬其葉爲胡蝶胡蝶胥也化而爲蟲生於竈下其狀若脱其名爲鴝掇鴝掇千日爲鳥其名爲乾餘骨乾餘骨之沫爲斯彌斯彌爲食醯頤輅生乎食醯黄軦生乎九猷瞀芮生乎腐蠸羊奚比乎不箰乆竹生青寧青寧生程程生馬馬生人人又反入於機萬物皆出於機皆入於機南華眞經卷之三
