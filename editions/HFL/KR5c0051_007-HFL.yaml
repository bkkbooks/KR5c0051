body:
  text: 外篇山木第二十莊子行於山中見大木枝葉盛茂伐木者止其旁而不取也問其故曰無所可用莊子曰此木以不材得終其天年夫子出於山舍於故人之家故人喜命竪子殺鴈而烹之竪子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生將何處莊子笑曰周將處夫材與不材之間材與不材之間似之而非也故未免乎累若夫乘道德而浮遊則不然無譽無訾一龍一蛇與時俱化而無肯專爲一上一下以和爲量浮遊乎萬物之祖物物而不物於物則胡可得而累邪此神農黄帝之法則也若夫萬物之情人倫之傳則不然合則離成則毁廉則挫尊則議有爲則虧賢則謀不肖則欺故可得而必乎哉悲夫弟子志之其唯道德之鄕乎市南宜僚見魯侯魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先王之道修先君之業吾敬鬼尊賢親而行之無須史離居然不免於患吾是以憂市南子曰君之除患之術淺矣夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥䟽於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮爲之灾也今魯國獨非君之皮邪吾願君刳形去皮灑心去欲而遊於無人之野南越有邑焉名爲建德之國其民愚而朴少私而寡欲知作而不知藏與而不求其報不知義之所適不知禮之所將猖狂妄行乃蹈乎大方其生可樂其死可葬吾願君去國捐俗與道相輔而行君曰彼其道遠而險又有江山我無舟車奈何市南子曰君無形倨無留居以爲君車君曰彼其道幽遠而無人吾誰與爲鄰吾無糧我無食安得而至焉市南子曰少君之費寡君之欲雖無糧而乃足君其涉於江而浮於海望之而不見其崖愈往而不知其所窮送君者皆自崖而反君自此遠矣故有人者累見有於人者憂故堯非有人非見有於人也吾願去君之累除君之憂而獨與道遊於大莫之國方舟而濟於河有虚舡來觸舟雖有褊心之人不怒有一人在其上則呼張歙之一呼而不聞再呼而不聞於是三呼邪則必以惡聲隨之向也不怒而今也怒向也虚而今也實人能虚己以遊世其孰能害之北宫奢爲衛靈公賦斂以爲鍾爲壇乎郭門之外三月而成土下之縣王子慶忌見而問焉曰子何術之設奢曰一之間無敢設也奢聞之旣彫旣琢復歸於朴侗乎其無識儻乎其怠疑萃乎芒乎其送往而迎來來者勿禁往者勿止從其强梁隨其曲傳因其自窮故朝夕賦斂而毫毛不挫而況有大塗者乎孔子圍於陳蔡之間七日不火食太公任往弔之曰子幾死乎曰然子惡死乎曰然任曰子嘗言不死之道東海有鳥焉其名曰意怠其爲鳥也翂翂翐翐而似無能引援而飛迫脅而棲進不敢爲前退不敢爲後食不敢先嘗必取其緒是故其行列不斥而外人卒不得害是以免於患直木先伐甘井先竭子其意者飾知以驚愚修身以明汙昭昭乎如揭日月而行故不免也昔吾聞之大成之人曰自伐者無功功成者隳名成者虧孰能去功與名而還與衆人道流而不明居得行而不名處純純常常乃比於狂削迹捐勢不爲功名是故無責於人人亦無責焉至人不聞子何喜哉孔子曰善哉辭其交遊去其弟子逃於大澤衣裘褐食杼栗入獸不亂群入鳥不亂行鳥獸不惡而況人乎孔子問子桑雩曰吾再逐於魯伐樹於宋削迹於衛窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與子桑雩曰子獨不聞假人之亡與林回棄千金之璧負赤子而趨或曰爲其布與赤子之布寡矣爲其累與赤子之累多矣棄千金之璧負赤子而趨何也林回曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦遠矣且君子之交淡若水小人之交甘若醴君子淡以親小人甘以絶彼無故以合者則無故以離孔子曰敬聞命矣徐行翔佯而歸絶學捐書弟子無挹於前其愛益加進異日桑雩又曰舜之將死眞冷禹曰汝戒之哉形莫若縁情莫若率縁則不離率則不勞不離不勞則不求文以待形不求文以待形固不待物莊子衣大布而補之正縻係履而過魏王魏王曰何先生之憊邪莊子曰貧也非憊也士有道德不能行憊也衣弊履穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬蔓其枝而王長其間雖羿逄蒙不能睥睨也及其得柘棘枳枸之間也危行側視振動悼慄此筋骨非有加急而不柔也處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得邪此比干之見剖心徵也夫孔子窮於陳蔡之間七日不火食左據槁木右擊槁枝而歌猋氏之風有其具而無其數有其聲而無宫角木聲與人聲犁然有當於人之心顔回端拱還目而窺之仲尼恐其廣己而造大也愛己而造哀也曰回無受天損易無受人益難無始而非卒也人與天一也夫今之歌者其誰乎回曰敢問無受天損易仲尼曰飢渴寒暑窮桎不行天地之行也運物之泄也言與之偕逝之謂也爲人臣者不敢去之執臣之道猶若是而況乎所以待天乎何謂無受人益難仲尼曰始用四達爵禄並至而不窮物之所利乃非己也吾命其在外者也君子不爲盜賢人不爲竊吾若取之何哉故曰島莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走其畏人也而襲諸人間社稷存焉爾何謂無始而非卒仲尼曰化其萬物而不知其禪之者焉知其所終焉知其所始正而待之而已耳何謂人與天一邪仲尼曰有人天也有天亦天也人之不能有天性也聖人晏然體逝而終矣莊周遊乎雕陵之樊覩一異鵲自南方來者翼廣七尺目大運寸感周之顙而集於栗林莊周曰此何鳥哉翼殷不逝目大不覩褰裳躍步執彈而留之覩一蟬方得美蔭而忘其身螳蜋執翳而搏之見得而忘其形異鵲從而利之見利而忘其眞莊周怵然曰噫物固相累二類相召也捐彈而反走虞人逐而誶之莊周反入三月不庭蘭且從而問之夫子何爲頃間甚不庭乎莊周曰吾守形而忘身觀於濁水而迷於清淵且吾聞諸夫子曰入其俗從其俗今吾遊於雕陵而忘吾身異鵲感吾顙遊於栗林而忘眞栗林虞人以吾爲戮吾所以不庭也陽子之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也陽子曰弟子記之行賢而去自賢之行安往而不愛哉外篇田子方第二十一田子方侍坐於魏丈侯數稱谿工文侯曰谿工子之師邪子方曰非也無擇之里人也稱道數當故無擇稱之文侯曰然則子無師邪子方曰有曰子之師誰邪子方曰東郭順子文侯曰然則夫子何故未嘗稱之子方曰其爲人也眞人貌而天虚縁而葆眞清而容物物無道正容以悟之使人之意也消無擇何足以稱之子方出文侯儻然終日不言召前立臣而語之曰遠矣全德之君子始吾以聖知之言仁義之行爲至矣吾聞子方之師吾形解而不欲動口鉗而不欲言吾所學者眞土梗耳夫魏眞爲我累耳温伯雪子適齊舍魯魯人有請見之者温伯雪子曰不可吾聞中國之君子明乎禮義而陋於知人心吾不欲見也至於齊反舍於魯是人也又請見温伯雪子曰往也蘄見我今也又蘄見我是必有以振我也出而見客入而歎明日見客又入而歎其僕曰每見之客也必入而歎何邪曰吾固告子矣中國之民明乎禮義而陋乎知人心昔之見我者進退一成規一成矩從容一若龍一若虎其諫我也似子其道我也似父是以歎也仲尼見之而不言子路曰吾子欲見温伯雪子乆矣見之而不言何邪仲尼曰若夫人者目擊而道存矣亦不可以容聲矣顔淵問於仲尼曰夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而回瞠若乎後矣夫子曰回何謂邪曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辯亦辯也夫子馳亦馳也夫子言道回亦言道也及奔逸絶塵而回瞠若乎後者夫子不言而信不比而周無器而民蹈乎前而不知所以然而已矣仲尼曰惡可不察與夫哀莫大於心死而人死亦次之日出東方而入於西極萬物莫不比方有目有趾者待是而後成功是出則存是入則亡萬物亦然有待也而死有待也而生吾一受其成形而不化以待盡效物而動日夜無隙而不知其所終薰然其成形知命不能規乎其前丘以是日徂吾終身與汝交一臂而失之可不哀與汝殆著乎吾所以著也彼已盡矣而汝求之以爲有是求馬於唐肆也吾服汝也甚忘汝服吾也亦甚忘雖然汝奚患焉雖忘乎故吾吾有不忘者存孔子見老聃老聃新沐方將被髮而乾慹然似非人孔子便而待之少焉見曰丘也眩與其信然與向者先生形體掘若槁木似遺物離人而立於獨也老聃曰吾遊心於物之初孔子曰何謂邪曰心困焉而不能知口辟焉而不能言嘗爲汝議乎其將至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉或爲之紀而莫見其形消息滿虚一晦一明日改月化日有所爲而莫見其功生有所乎萌死有所乎歸始終相反乎無端而莫知乎其所窮非是也且孰爲之宗孔子曰請問遊是老聃曰夫得是至美至樂也得至美而遊乎至樂謂之至人孔子曰願聞其方曰草食之獸不疾易藪水生之蟲不疾易水行少變而不失其大常也喜怒哀樂不入於胸次夫天下也者萬物之所一也得其所一而同焉則四支百體將爲塵垢而死生終始將爲晝夜而莫之能滑而況得喪禍福之所介乎棄隸者若棄泥塗知身貴於隸也貴在於我而不失於變且萬化而未始有極也夫孰足以患心已爲道者解乎此孔子曰夫子德配天地而猶假至言以修心古之君子孰能脱焉老聃曰不然夫水之於汋也無爲而才自然矣至人之於德也不修而物不能離焉若天之自高地之自厚日月之自明夫何修焉孔子出以告顔回曰丘之於道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也莊山見魯哀公哀公曰魯多儒士少爲先生方者莊子曰魯少儒哀公曰舉魯國而儒服何謂少乎莊子曰周聞之儒者冠圜冠者知天時履方履者知地形緩佩玦者事至而斷君子有其道者未必爲其服也爲其服者未必知其道也公固以爲不然何不號於國中曰無此道而爲此服者其罪死於是哀公號之五日而魯國無敢儒服者獨有一丈夫儒服而立乎公門公即召而問以國事千轉萬變而不窮莊子曰以魯國而儒者一人耳可謂多乎百里奚爵禄不入於心故飯牛而牛肥使秦穆公忘其賤與之政也有虞氏死生不入於心故足以動人宋元君將畫圖衆史皆至受揖而立舐筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣槃礴贏君曰可矣是眞畫者也文王觀於臧見一丈夫釣而其釣莫釣非持其釣有釣者也常釣也文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之無天也於是旦而屬之大夫曰昔者寡人夢見良人黑色而𩑺乘駁馬而偏朱蹄號曰寓而政於臧丈人庶幾乎民有廖乎諸大夫蹴然曰先君王也文王曰然則卜之諸大夫曰先君之命王其無他又何卜焉遂迎臧丈人而授之政典法無更偏令無出三年文王觀於國則列士壞植散群長官者不成德螤斛不敢入於四境列士壞植散群則尚同也長官者不成德則同務也螤斛不敢入於四境則諸侯無二心也文王於是焉以爲大師北面而問曰政可以及天下乎臧丈人昧然而不應泛然而辭朝令而夜遁終身無聞顔淵問於仲尼曰文王其猶未邪又何以夢爲乎仲尼曰默汝無言夫文王盡之也而又何論刺焉彼直以循斯須也列御寇爲伯昏無人射引之盈貫措杯水其肘上發之適矢復沓方矢復寓當是時猶象人也伯昏無人曰是射之射也非不射之射也嘗與汝登高山履危石臨百仞之淵若能射乎於是無人遂登高山履危石臨百仞之淵背逡巡足二分垂在外揖御寇而進之御寇伏地汗流至踵伯昏無人曰夫至人者上闚青天下潜黄泉揮斥八極神氣不變今汝怵然有恂目之志爾於中也殆矣夫肩吾問於孫叔敖曰子三爲令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨柰何孫叔敖曰吾何以過人哉吾以其來不可却也其去不可止也吾以爲得失之非我也而無憂色而已矣我何以過人哉且不知其在彼乎其在我乎其在彼邪亡乎我在我邪亡乎彼方將躊躇方將四顧何暇至乎人貴人賤哉仲尼聞之曰古之眞人知者不得說美人不得濫盜人不得劫伏戲黄帝不得友死生亦大矣而無變乎己况爵禄乎若然者其神經乎大山而無介入乎淵泉而不濡處卑細而不憊充滿天地旣以與人己愈有楚王與凡君坐少焉楚王左右曰凡亡者三凡君曰凡之亡也不足以喪吾存夫凡之亡不足以喪吾存則楚之存不足以存存由是觀之則凡未始亡而楚未始存也外篇知北遊第二十二知北遊於玄水之上登隱弅之丘而適遭無爲謂焉知謂無爲謂曰予欲有問乎若何思何慮則知道何處何服則安道何從何道則得道三問而無爲謂不答也非不答不知答也知不得問反於白水之南登狐闋之上而覩狂屈焉知以之言也問乎狂屈狂屈曰唉予知之將語若中欲言而忘其所欲言知不得問反於帝宫見黄帝而問焉黄帝曰無思無慮始知道無處無服始安道無從無道始得道知問黄帝曰我與若知之彼與彼不知也其孰是耶黄帝曰彼無爲謂眞是也狂屈似之我與汝終不近也夫知者不言言者不知故聖人行不言之教道不可致德不可至仁可爲也義可虧也禮相僞也故曰失道而後德失德而後仁失仁而後義失義而後禮禮者道之華而亂之首也故曰爲道者日損損之又損之以至於無爲無爲而無不爲也今已爲物也欲復歸根不亦難乎其易也其唯大人乎生者死之徒死者生之始孰知其紀人之生氣之聚也聚則爲生散則爲死若死生爲徒吾又何患故萬物一也是其所美者爲神奇其所惡者爲臭腐臭腐復化爲神奇神奇復化爲臭腐故曰通天下一氣耳聖人故貴一知謂黄帝曰吾問無爲謂無爲謂不應我非不我應不知應我也吾問狂屈狂屈中欲告我而不我告非不我告中欲告而忘之也今予問乎若若知之奚故不近黄帝曰彼其眞是也以其不知也此其似之也以其忘之也予與若終不近也以其知之也狂屈聞之以黄帝爲知言天地有大美而不言四時有明法而不議萬物有成理而不說聖人者原天地之美而達萬物之理是故至人無爲大聖不作觀於天地之謂也今彼神明至精與彼百化物已死生方圓莫知其根也扁然而萬物自古以固存六合爲巨未離其内秋豪爲小侍之在體天下莫不沈浮終身不故陰陽四時運行各得其序惛然若亡而存油然不形而神萬物畜而不知此之謂本根可以觀於天矣齧缺問道乎被衣被衣曰若正汝形一汝視天和將至攝汝知一汝度神將來舍德將爲汝美道將爲汝居汝瞳焉如新生之犢而無求其故言未卒齧缺睡寐被衣大悅行歌而去之曰形若槁骸心若死灰眞其實知不以故自持媒媒晦晦無心而不可與謀彼何人哉舜問乎丞曰道可得而有乎曰汝身非汝有也汝何得有夫道舜曰吾身非吾有也孰有之哉曰是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也孫子非汝有是天地之委蜕也故行不知所往處不知所持食不知所味天地之彊陽氣也又胡可得而有邪孔子問於老聃曰今日晏間敢問至道老聃曰汝齋戒疏淪而心澡雪而精神掊擊而知夫道窅然難言哉將爲汝言其崖略夫昭昭生於冥冥有倫生於無形精神生於道形本生於精而萬物以形相生故九竅者胎生八竅者卵生其來無迹其往無崖無門無房四達之皇皇也邀於此者四枝彊思慮恂達耳目聰明其用心不勞其應物無方天不得不高地不得不廣日月不得不行萬物不得不昌此其道與且夫博之不必知辯之不必慧聖人以斷之矣若夫益之而不加益損之而不加損者聖人之所保也淵淵乎其若海巍巍乎其終則復始也運量萬物而不匱則君子之道彼其外與萬物皆往資焉而不匱此其道與中國有人焉非陰非陽處於天地之間直且爲人將反於宗自本觀之生者喑醷物也雖有壽夭相去幾何須臾之說也奚足以爲堯桀之是非果蓏有理人倫雖難所以相齒聖人遭之而不違過之而不守調而應之德也偶而應之道也帝之所與王之所起也人生天地之間若白駒之過郤忽然而已注然勃然莫不出焉油然漻然莫不入焉已化而生又化而死生物哀之人類悲之解其天弢墮其天𧙍紛乎宛乎魂魄將往乃身從之乃大歸乎不形之形形之不形是人之所同知也非將至之所務也此衆人之所同論也彼至則不論論則不至明見無值辯不若默道不可聞聞不若塞此之謂大得東郭子問於莊子曰所謂道惡乎在莊子曰無所不在東郭子曰期而後可莊子曰在螻蟻曰何其下邪曰在稊稗曰何其愈下邪曰在瓦甓曰何其愈甚邪曰在屎溺東郭子不應莊子曰夫子之問也固不及質正獲之問於監市履狶也每下愈況汝唯莫必無乎逃物至道若是大言亦然周徧咸三者異名同實其指一也嘗相與游乎無何有之宫同合而論無所終窮乎嘗相與無爲乎澹而靜乎漠而清乎調而間乎寥已吾志無往焉而不知其所至去而來而不知其所止吾已往來焉而不知其所終仿徨乎嗎閎大知入焉而不知其所窮物物者與物無際而物有際者所謂物際者也不際之際際之不際者也謂盈虚衰殺彼爲盈虚非盈虚彼爲衰殺非衰殺彼爲本末非本末彼爲積散非積散也妸荷甘與神農同學於老龍吉神農隱几闔户晝瞑妸荷甘日中多户而入曰老龍死矣神農隱几擁杖而起嚗然放杖而笑曰天知予僻陋慢訑故棄予而死已矣夫子無所發予之狂言而死矣夫弇堈弔聞之曰夫體道者天下之君子所擊焉今於道秋豪之端萬分未得處一焉而猶知藏其狂言而死又況夫體道者乎視之無形聽之無聲於人之論者謂之㝠㝠所以論道而非道也於是泰清問乎無窮曰子知道乎無窮曰吾不知又問乎無爲無爲曰吾知道曰子之知道亦有數乎曰有曰其數若何無爲曰吾知道之可以貴可以賤可以約可以散此吾所以知道之數也泰清以之言也問乎無始曰若是則無窮之弗知與無爲之知孰是而孰非乎無始曰不知深矣知之淺矣弗知内矣知之外矣於是泰清中而歎曰弗知乃知乎知乃不知乎孰知不知之知無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也知形形之不形乎道不當名無始曰有問道而應之者不知道也雖問道者亦未聞道道無問問無應無問問之是問窮也無應應之是無内也以無内待問窮若是者外不觀乎宇宙内不知乎大初是以不過乎崑崙不遊乎太虚光曜問乎無有曰夫子有乎其無有乎光曜不得問而孰視其狀貌窅然空然終日視之而不見聽之而不聞搏之而不得也光曜曰至矣其孰能至此乎予能有無矣而未能無無也及爲無有矣何從至此哉大馬之捶鉤者年八十矣而不失豪芒大馬曰子巧與有道與曰臣有守也臣之年二十而好捶鉤於物無視也非鉤無察也是用之者假不用者也以長得其用而況乎無不用者乎物孰不資焉冉求問於仲尼曰未有天地可知邪仲尼曰可古猶今也冉求失問而退明日復見曰昔者吾問未有天地可知乎夫子曰可古猶今也昔日吾照然今日吾昧然敢問何謂也仲尼曰昔之昭然也神者先受之今之昧然也且又爲不神者求邪無古無今無始無終未有子孫而有子孫可乎冉求未對仲尼曰已矣未應矣不以生生死不以死死生死生有待邪皆有所一體有先天地生者物邪物物者非物物出不得先物也猶其有物也無已聖人之愛人也終無已者亦乃取於是者也顔淵問乎仲尼曰回嘗聞諸夫子曰無有所將無有所迎回敢問其遊仲尼曰古之人外化而内不化今之人内化而外不化與物化者一不化者也安化安不化安與之相靡必與之莫多狶韋氏之囿黄帝之圃有虞氏之宫湯武之室君子之人若儒墨者師故以是非相𩐎也而況今之人乎聖人處物不傷物不傷物者物亦不能傷也唯無所傷者爲能與人相將迎山林與臯壤與使我欣欣然而樂與樂未畢也哀又繼之哀樂之來吾不能禦其去弗能止悲夫世人直爲物逆旅耳夫知遇而不知所不遇知能能而不能所不能無知無能者固人之所不免也夫務免乎人之所不免者豈不亦悲哉至言去言至爲去爲齊知之所知則淺矣
