  - {type: variant, offset: 15595, length: 3, content: 來自然, ZTDZ: 帝爲鯈北海之帝爲忽中央之帝爲渾沌鯈與忽時相與遇於渾沌之地渾沌待之甚善鯈與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨}
  - {type: page-break, offset: 15595, content: '', id: KR5c0051_SJB_001-110581a}
  - {type: punctuation, offset: 15596, content: /, id: KR5c0051_krp_001-bkkpn1651}
  - {type: variant, offset: 15599, length: 1, content: 迹, ZTDZ: 有嘗試鑿之日鑿一竅七日而渾沌死外篇駢拇第八駢拇枝指出乎性哉而侈於德附贅縣疣出乎形哉而侈於性多方乎仁義而用之者列於五臟哉而非道德之正也是故駢於足者連無用之肉也枝於手者樹無用之指也多方駢枝於五臟之情者淫僻於仁義之行而多方於聰明之用也是故駢於明者亂五色淫文章青黄黼黻之煌煌非乎而離朱是已多於聰者亂五聲淫六律金石絲竹黄鍾大吕之聲非乎而師曠是已枝於仁者擢德塞性以收名聲使天下簧鼓以奉不及之法非乎而曾史是已駢於辯者纍瓦結繩竄句遊心於堅白同異之間而敝跬譽無用之言非乎而揚墨是已故}
  - {type: punctuation, offset: 15600, content: ), id: KR5c0051_krp_001-bkkpn1652}
  - {type: variant, offset: 15601, length: 56, content: 之謂葆光任其自明故其光不弊也葆光音保崔云若有若無謂之葆光故昔者堯問於舜曰我欲伐宗膾胥敖南靣而不釋然其故何也於安任, ZTDZ: 皆多駢旁枝}
