  - {type: variant, offset: 17098, length: 0, content: '', HFL: 萬事畢無心得而鬼神服夫子曰夫道覆載萬物者也洋洋乎大哉}
  - {type: variant, offset: 17099, length: 0, content: '', HFL: 子}
  - {type: variant, offset: 17100, length: 5, content: 與焉二者俱, HFL: 可}
  - {type: variant, offset: 17107, length: 0, content: '', HFL: 刳心焉無爲爲之之謂天無爲言之之謂德愛人利物之謂仁不同同之之謂大行不崖異之謂寬有萬不同之謂富故執德之謂紀德成之謂立循於道之謂備不以物挫志之謂完君子明於此十者則韜乎其事心之大也沛乎其爲萬物逝也若然者藏金於山藏珠於淵不利貨財不近貴富不樂壽不哀夭不榮通不醜窮不拘一世之利以爲己私分不以王天下爲己處顯顯則明萬物一府死生同狀夫子曰夫道淵乎其居也漻乎其清也金石不得無以鳴故金石有聲不考不鳴萬物孰能定之夫王德之人素逝而恥通於事立之本原而知通於神故其德廣其心之出有物採之故形非道不生生非德不明存形窮生立德明道非王德者邪蕩蕩乎忽然出勃然動而萬物從之乎此謂王德之人視乎㝠㝠聽乎無聲冥冥之中獨見曉焉無聲之中獨聞和焉故深之又深而能物焉神之又神而能精焉故其與萬物接也至無而供其求時騁而要其宿大小長短脩遠黄帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其玄珠使知索之而不得使離朱索之而不得使喫詬索之而不得也乃使象罔象罔得之黄帝曰異哉象罔乃可以得之乎堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣堯問於許由曰齧缺可以配天乎吾藉王倪以要之許由曰殆哉圾于天下齧缺之爲人也聰明叡知給數以敏其性過人而又乃以人受天彼審乎禁過而不知過之所由生與之配天乎彼且乘人而無天方且本身而異形方且尊知而火馳方且爲緒使方且爲物絯方且四顧而物應方且應衆宜方且與物化而未始有恒夫何足以配天乎雖然有族有祖可以爲衆父而不可以爲衆父父治亂之率也北面之禍也南面之賊也堯觀乎華華對人曰嘻聖人請祝聖人使聖人壽堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰壽富多男子人之所欲也汝獨不欲何邪堯曰多男子則多懼富則多事壽則多辱是三者非所以養德也故辭封人曰始也我以汝爲聖人邪今然君子也天生萬民必授之職多男子而授之職則何懼之有富而使人分之則何事之有夫聖人鶉居而鷇食鳥行而無彰天下有道則與物皆昌天下無道則脩德就間千歲厭世去而上僊乘彼白雲至于帝郷三患莫至身常無殃則何辱之有封人去之堯隨之曰請問封人曰退已堯治天下伯成子高立爲諸侯堯授舜舜授禹伯成子高辭爲諸侯而耕禹往見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立爲諸侯堯授舜舜授予而吾子辭爲諸侯而耕敢問其故何也子高曰昔堯治天下不賞而民勸不罰而民畏今子賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣夫子闔行邪無落吾事俋俋乎耕而不顧泰初有無無有無名一之所起有一而未形物得以生謂之德未形者有分且然無間謂之命留動而生物物成生理謂之形形體保神各有儀則謂之性性脩反德德至同於初同乃虚虚乃大合喙鳴喙鳴合與天地爲合其合緡緡若愚若昏是謂玄德同乎大順夫子向于老聃曰有人治道若相放可不可然不然辨者有言曰離堅白若縣寓若是則可謂聖人乎老聃曰是胥易技係勞形怵心者也執狸之狗成思猨狙之便自山林來丘予告若而所不能聞與而所不能言凡有首有趾無心無耳者衆有形者與無形無狀而皆存者盡無其動止也其死生也其廢起也此又非其所以也有治在人忘乎物忘乎天其名爲忘己忘己之人是之謂入於天蔣閶葂見季徹曰魯君謂葂也曰請受教辭不獲命旣已告矣未知中否請嘗薦之吾謂魯君曰必服恭儉拔出公忠之屬而無阿私民孰不敢輯季徹局局然笑曰若夫子之言於帝王之德猶螳蜋之怒臂以當車轍則必不勝任矣且若是則其自爲處危其觀臺多物將往投迹者衆蔣閶葂覤覤然驚曰葂也汒若於夫子之所言矣雖然願先生之言其風也季徹曰大聖之治天下也摇蕩民心使之成教易俗舉滅其賊心而皆進其獨志若性之自}
