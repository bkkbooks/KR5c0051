  - {type: variant, offset: 11383, length: 1, content: 厭, ZTDZ: 良人不以善言爲賢而況爲大乎夫爲大不足以爲大而況爲德乎夫大備矣莫若天地然奚求焉而大備矣知大備者無求無失無棄不以物易己也反己而不窮循古而不摩大人之誠子綦有八子陳諸前召九方歅曰爲我相吾子孰爲祥九方歅曰梱也爲祥子綦瞿然喜曰奚若曰梱也將與國君同食以終其身子綦索然出涕曰吾子何爲以至於是極也九方歅曰夫與國君同食澤及三族而況父母乎今夫子聞之而泣是禦福也子則祥矣父則不祥子綦曰歅汝何足以識之而梱祥邪盡於酒肉入於鼻口矣而何足以知其所自來吾未嘗爲牧而牂生於奥未嘗好田而鶉生於宎若勿怪何邪吾所與吾子遊者遊於天地吾與之邀樂於天吾與之邀食於地吾不與之爲事不與之爲謀不與之爲怪吾與之乘天地之誠而不以物與之相攖吾與之一委蛇而不與之爲事所宜今也然有世俗之償焉凡有怪徵者必有怪行殆乎非我與吾子之罪幾天與之也吾是以泣也無幾何而使梱之於燕盜得之於道全而鬻之則難不若刖之則易於是乎刖而鬻之於齊適當渠公之街然身食肉而終齧缺遇許由曰子將奚之曰將逃堯曰奚謂邪曰夫堯畜畜然仁吾恐其爲天下笑後世其人與人相食與夫民不難聚也愛之則親利之則至譽之則勸致其所惡則散愛利出乎仁義捐仁義者寡利仁義者衆夫仁義之行唯且無誠且假夫禽貪者器是以一人之斷制利天下譬之猶一覕也夫堯知賢人之利天下也而不知其賊天下也夫唯外乎賢者知之矣有暖姝者有濡需者有卷婁者所謂暖姝者學一先生之言則暖暖姝姝而私自悅也自以爲足矣而未知未始有物也是以謂暖姝者也濡需者豕蝨是也擇疏鬛自以爲廣宫大囿奎蹄曲隈乳間股脚自以爲安室利處不知屠者之一旦鼓臂布草操煙火而己與豕俱焦也此以域進此以域退此其所謂濡需者也卷婁者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悦之故三徙成都至鄧之墟而十有萬家堯聞舜之賢舉之童土之地曰冀得其來之澤舜舉乎童土之地年齒長矣聰明衰矣而不得休歸所謂卷婁者也是以神人惡衆至衆至則不比不比則不利也故無所甚親無所甚疏抱德煬和以順天下此謂眞人於蟻棄知於魚得計於羊棄意以目視目以耳聽耳以心復心若然者其平也繩其變也循古之眞人以天待之不以人入天古之眞人得之也生失之也死得之也死失之也生藥也其實堇也桔梗也雞壅也豕零也是時爲帝者也何可勝言勾踐也以甲楯三千棲於會稽唯種也能知亡之所以存唯種也不知其身之所以愁故曰䲭目有所適鶴脛有所節解之也悲故曰風之過河也有損焉日之過河也有損焉請只風與日相與守河而河以爲未始其攖也恃源而往者也故水之守土也審影之守人也審物之守物也審故目之於明也殆耳之於聰也殆心之於殉也殆凡能其於府也殆殆之成也不給改禍之長也兹萃其反也縁功其果也待乆而人以爲己寳不亦悲乎故有亡國戮民無已不知問是也故足之於地也踐雖踐恃其所不蹍而後善博也人之於知也少雖少恃其所不知而後知天之所謂也知大一知大陰知大目知大均知大方知大信知大定至矣大一通之大陰解之大目視之大均縁之大方體之大信稽之大定持之盡有天循有照宜有樞始有彼則其解之也似不解之者其知之也似不知之也不知而後知之其問之也不可以有崖而不可以無崖頡滑有實古今不代而不可以虧則可不謂有大揚搉乎闔不亦問是已奚惑然爲以不惑解惑復於不惑是尚大不惑雜篇則陽第二十五則陽游於楚夷節言之於王王未之見夷節歸彭陽見王果曰夫子何不譚我於王王果曰我不若公閲休彭陽曰公閲休奚爲者邪曰冬則擉鼈于江夏則休乎山樊有過而問者曰此予宅也夫夷節已不能而況我乎吾又不若夷節夫夷節之爲人也無德而有知不自許以之神其交固顛冥乎富貴之地非相助以德相助消也夫凍者假衣於春暍者反冬乎冷風夫楚王之爲人也形尊而嚴其於罪也無赦如虎非夫佞人正德其孰能撓焉故聖人其窮也使家人忘其貧其達也使王公忘爵禄而化卑其於物也與之爲娱矣其於人也樂物之通也保己焉故或不言而飲人以和與人並立而使人化父子之宜彼其乎歸居而一間其所施其於外人心者若是其遠也故曰待公閲休聖人達綢繆周盡一體矣而不知其然性也復命摇作而以天爲師人則從而命之也憂乎知而所行恒無幾時其有止也若之何生而美者人與之鑑不告則不知其美於人也若知之若不知之若聞之若不聞之其可喜也終無已人之好之亦無已性也聖人之愛人也人與之名不告則不知其愛人也若知之若不知之若聞之若不聞之其愛人也終無已人之安之亦無已性也舊國舊都望之暢然雖使丘陵草木之緡入之者十九猶之暢然况見見聞聞者也以十仞之臺縣衆間者也冉相氏得其環中以隨成與物無終無始無幾無時日與物化者一不化者也闔嘗舍之夫師天而不得師天與物皆殉其以爲事也若之何夫聖人未始有天未始有人未始有始未始有物與世偕行而不替所行之備而不洫其合之也若之何湯得其司御門尹登恒爲之傳之從師而不囿得其隨成爲之司其名之名嬴法得其兩見仲尼之盡慮爲之傳之容成民曰除日無歲無内無外魏瑩與田侯牟約田侯牟背之魏瑩怒將使人刺之犀首聞而恥之曰君爲萬乘之君也而以匹夫從讎衍請受甲二十萬爲君攻之虜其人民係其牛馬使其君内熱發於背然後拔其國忌也出走然後抶其背折其脊季子聞而恥之曰築十仞之城城者旣十仞矣}
