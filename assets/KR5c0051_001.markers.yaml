  - {type: variant, offset: 5440, length: 1, content: 同, ZTDZ: 乎有虞氏不及泰氏有虞氏其猶臧仁以要人亦得人矣而未始出於非人泰氏其卧徐徐其覺于于一以己爲馬一以己爲牛其知情信其德甚眞而未始入於非人肩吾見狂接輿狂接輿曰日中始何以語汝肩吾曰告我君人者以己出經式義度人孰敢不聽而化諸狂接輿曰}
