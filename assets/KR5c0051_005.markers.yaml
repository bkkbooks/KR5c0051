  - {type: variant, offset: 17743, length: 2, content: 經卷, HFL: 人外篇繕性}
  - {type: variant, offset: 17746, length: 1, content: 五, HFL: 十六繕性於俗俗學以求復其初滑欲於俗思以求致其明謂之蔽蒙之民古之治道者以恬養知生而無以知爲也謂之以知養恬知與恬交相養而和理出其性夫德和也道理也德無不容仁也道無不理義也義明而物親忠也中純實而反乎情樂也信行容體而順乎文禮也禮樂徧行則天下亂矣彼正而蒙己德德則不冒冒則物必失其性也古之人在混芒之中與一世而得澹漠焉當是時也陰陽和靜鬼神不擾四時得節萬物不傷群生不夭人雖有知無所用之此之謂至一當是時也莫之爲而常自然逮德下衰及燧人伏義始爲天下是故順而不一德又下衰及神農黄帝始爲天下是故安而不順德又下衰及唐虞始爲天下興治化之流𣻏淳散朴離道以善險德以行然後去性而從於心心與心識知而不足以定天下然後附之以文益之以博文滅質博溺心然後民始惑亂無以反其性情而復其初由是觀之世喪道矣道喪世矣世與道交相喪也道之人何由興乎世世亦何由興乎道哉道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣隱故不自隱古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也當時命而大行乎天下則反一無迹不當時命而大窮乎天下則深根寧極而待此存身之道也古之行身者不以辯飾知不以知窮天下不以知窮德危然處其所而反其性已又何爲哉道固不小行德固不小識小識傷德小行傷道故曰正己而已矣樂全之謂得志古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣今之所謂得志者軒冕之謂也軒冕在身非性命也物之儻來寄也寄之其來不可圍其去不可止故不爲軒冕肆志不爲窮約趨俗其樂彼與此同故無憂而已矣今寄去則不樂由是觀之雖樂未嘗不荒也故曰喪己}
