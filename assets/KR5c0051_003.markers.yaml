  - {type: line-break, offset: 249, content: '', id: KR5c0051_SBCK_003-1b04}
  - {type: variant, offset: 257, length: 0, content: '', ZTDZ: 夫子出於山舍於故人之家故人喜命竪子殺鴈而烹之竪子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生將何處莊子笑曰周將處夫材與不材之間材與不材之間似之而非也故未免乎累若夫乘道德而浮遊則不然無譽無訾一龍一蛇與時俱化而無肯專爲一上一下以和爲量浮遊乎萬物之祖物物}
  - {type: variant, offset: 259, length: 1, content: 中, ZTDZ: 物於物則胡可得而累邪此神農黄帝之法則也若夫萬物之情人倫之傳則不然合則離成則毁廉則挫尊則議有爲則虧賢則謀不肖則欺故可得而必乎哉悲夫弟子志之其唯}
  - {type: variant, offset: 261, length: 1, content: 夭, ZTDZ: 德之鄕乎市南宜僚見魯侯魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先王之道修先君之業吾敬鬼尊賢親而行之無須史離居然不免於患吾是以憂市南子曰君之除患之術淺矣夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥䟽於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮爲之灾也今魯國獨非君之皮邪吾願君刳形去皮灑心去欲而遊於無人之野南越有邑焉名爲建德之國其民愚而朴少私而寡欲知作而不知藏與而不求其報不知義之所適不知禮之所將猖狂妄行乃蹈乎大方其生可樂其死可葬吾願君去國捐俗與道相輔而行君曰彼其道遠而險又有江山我無舟車奈何市南子曰君無形倨無留居以爲君車君曰彼其道幽遠而無人吾誰與爲鄰吾無糧我無食安得而至焉市南子曰少君之費寡君之欲雖無糧而乃足君其涉於江而浮於海望之而不見其崖愈往而不知其所窮送君}
  - {type: page-break, offset: 261, content: '', id: KR5c0051_SJB_003-110602c}
  - {type: variant, offset: 263, length: 0, content: '', ZTDZ: 皆自崖而反君自此遠矣故有人者累見有於人者憂故堯非有人非見有於人也吾願去君之累除君之憂而獨與道遊於大莫之國方舟而濟於河有虚舡來觸舟雖有褊心之人不怒有一人在其上則呼張歙之一呼而不聞再呼而不聞於}
  - {type: page-break, offset: 263, content: '', id: KR5c0051_SJB_003-110603a}
  - {type: variant, offset: 264, length: 0, content: '', ZTDZ: 三呼邪則必以惡聲隨之向也不怒而今也怒向也虚而今也實人能虚己以遊世其孰能害之北宫奢爲衛靈公賦斂以爲鍾爲壇乎郭門之外三月而成土下之縣王子慶忌見而問焉曰子何術之設奢曰一之間無敢設也奢聞之旣彫旣琢復歸於朴侗乎其無識儻乎其怠疑萃乎芒乎其送往而迎來來者勿禁往者勿止從其强梁隨其曲傳因其自窮故朝夕賦斂而毫毛不挫而況有大塗者乎孔子圍於陳蔡之間七日不火食太公任往弔之曰子幾死乎曰然子惡死乎曰然任曰子嘗言不死之道東海有鳥焉其名曰意怠其爲鳥也翂翂翐翐而似無能引援而飛迫脅而棲進不敢爲前退不敢爲後食不敢先嘗必取其緒是故其行列不斥而外人卒不得害是以免於患直木先伐甘井先竭子其意者飾}
  - {type: variant, offset: 265, length: 0, content: '', ZTDZ: 以驚愚修身以明汙昭昭乎如揭日月而行故不免也昔吾聞}
  - {type: page-break, offset: 265, content: '', id: KR5c0051_SJB_003-110603b}
  - {type: 'kr:newline', offset: 266, content: '

      ', id: KR5c0051_krp_003-bkkkrnewl13}
  - {type: line-break, offset: 266, content: '', id: KR5c0051_SBCK_003-1b05}
  - {type: variant, offset: 266, length: 1, content: 盛, ZTDZ: 大成之人曰自伐者無功功成者隳名成者虧孰能去功與名而還與衆人道流而不明居得行而不名處純純常常乃比於狂削迹捐勢不爲功名是故無責於人人亦無責焉至人不聞子何喜哉孔子曰善哉辭其交遊去其弟子逃於大澤衣裘褐食杼栗入獸不亂群入鳥不亂行鳥獸不惡而況人乎孔子問子桑雩曰吾再逐於魯伐樹於宋削迹於衛窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與子桑雩曰子獨不聞假人之亡與林回棄千金之璧負赤子而趨或曰爲其布與赤子之布寡矣爲其累與赤子之累多矣棄千金之璧負赤子而趨何也林回曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦遠矣且君子之交淡若水小人之交甘若醴君子淡以親小人甘以絶彼無故以合者則無故以離孔子曰敬聞命矣徐行翔佯而歸絶學捐書弟子無挹於前其愛益加進異日桑雩又曰舜之將死眞冷禹曰汝戒之哉形莫若縁情莫若率縁則不離率則不勞不離不勞則不求文以待形不求文以待形固不待物莊子衣大布而補之正縻係履而過魏王魏王曰何先生之憊邪莊子曰貧也非憊也士有道德不能行憊也衣弊履穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬蔓其枝而王長其間雖羿逄蒙不能睥睨也及其得柘棘枳枸之間也危行側視振動悼慄此筋骨非有加急而不柔也處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得邪此比干之見剖心徵也夫孔子窮於陳蔡之間七日不火食左據槁木右擊槁枝而歌猋氏之風有其具而無其數有其聲而無宫角木聲與人聲犁然有當於人之心顔回端拱還目而窺之仲尼恐其廣己而造大也愛己而造哀也曰回無受天損易無受人益難無始而非卒也人與天一也夫今之歌者其誰乎回曰敢問無受天損易仲尼曰飢渴寒暑窮桎不行天地之行也運物之泄也言與之偕逝之謂也爲人臣者不敢去之執臣之道猶若是而況乎所以待天乎何謂無受人益難仲尼曰始用四達爵禄並至而不窮物之所利乃非己也吾命其在外者也君子不爲盜賢人不爲竊吾若取之何哉故曰島莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走其畏人也而襲諸人間社稷存焉爾何謂無始而非卒仲尼曰化其萬物而不知其禪之者焉知其所終焉知其所始正而待之而已耳何謂人與天一邪仲尼曰有人天也有天亦天}
  - {type: page-break, offset: 266, content: '', id: KR5c0051_SJB_003-110603c}
  - {type: page-break, offset: 266, content: '', id: KR5c0051_SJB_003-110604a}
  - {type: punctuation, offset: 268, content: (, id: KR5c0051_krp_003-bkkpn28}
  - {type: variant, offset: 270, length: 1, content: 生, ZTDZ: 不能有天性}
  - {type: variant, offset: 272, length: 2, content: 形雖, ZTDZ: 聖人晏然體逝而終矣莊周遊乎雕陵之樊覩一異鵲自南方來者翼廣}
  - {type: variant, offset: 276, length: 0, content: '', ZTDZ: 目大運寸感周之顙}
  - {type: variant, offset: 277, length: 4, content: 五常必具, ZTDZ: 集於栗林莊周曰此何鳥哉翼殷不逝目大不覩褰裳躍步執彈而留之覩一蟬方得美蔭而忘其身螳蜋執翳而搏之見得而忘其形異鵲從而利之見利而忘其眞莊周怵然曰噫物固相累二類相召也捐彈而反走虞人逐而誶之莊周反入三月不庭蘭且從而問之夫子何爲頃間甚不庭乎莊周曰吾守形而忘身觀於濁水而迷於清淵且吾聞諸夫子曰入其俗從其俗今吾遊於雕陵而忘吾身異鵲感吾顙遊於栗林而忘眞栗林虞人以吾爲戮吾所以不庭也陽子之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其}
  - {type: page-break, offset: 277, content: '', id: KR5c0051_SJB_003-110604b}
  - {type: variant, offset: 282, length: 3, content: 雖區區, ZTDZ: 逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也陽子曰弟子記}
  - {type: punctuation, offset: 283, content: /, id: KR5c0051_krp_003-bkkpn29}
  - {type: variant, offset: 286, length: 3, content: 身乃舉, ZTDZ: 行賢而去自賢之行安往而不愛哉外篇田子方第二十一田子方侍坐於魏丈侯數稱谿工文侯曰谿工子之師邪子方曰非也無擇之里人也稱道數當故無擇稱之文侯曰然則子無師邪子方曰有曰子之師誰邪子方曰東郭順子文侯曰然則夫子何故未嘗稱之子方曰其爲人也眞人貌而}
  - {type: variant, offset: 290, length: 1, content: 地, ZTDZ: 虚縁而葆眞清而容物物無道正容}
  - {type: variant, offset: 292, length: 1, content: 奉, ZTDZ: 悟}
  - {type: variant, offset: 294, length: 6, content: 故天地萬物凡, ZTDZ: 使人之意也消無擇何足以稱之子方出文侯儻然終日不言召前立臣而語之曰遠矣全德之君子始吾以聖知之言仁義之行爲至矣吾聞子方之師吾形解而不欲動口鉗而不欲言吾}
  - {type: page-break, offset: 294, content: '', id: KR5c0051_SJB_003-110604c}
