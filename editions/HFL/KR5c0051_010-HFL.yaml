front:
  text: 第三十昔趙文王喜劍劍士夾門而客三千餘人日夜相擊於前死傷者歲百餘人好之不厭如是三年國衰諸侯謀之太子悝患之募左右曰孰能說王之意止劍士者賜之千金左右曰莊子當能太子乃使人以千金奉莊子莊子弗受與使者俱往見太子曰太子何以教周賜周千金太子曰聞夫子明聖謹奉千金以幣從者夫子弗受悝尚何敢言莊子曰聞太子所欲用周者欲絶王之喜好也使臣上說大王而逆王意下不當太子則身刑而死周尚安所事金乎使臣上說大王下當太子趙國何求而不得也太子曰然吾王所見唯劍士也莊子曰諾周善爲劍太子曰然吾王所見劍士皆蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難王乃悅之今夫子必儒服而見王事必大逆莊子曰請治劍服治劍服三日乃見太子太子乃與見王王脱白刃待之莊子入殿門不趨見王不拜王曰子欲何以教寡人使太子先曰臣聞大王喜劍故以劍見王王曰子之劍何能禁制曰臣之劍十步一人千里不留行王大悦之曰天下無敵矣莊子曰夫爲劍者示之以虚開之以利後之以發先之以至願得試之王曰夫子休就舍待命令設戲請夫子王乃校劍士七日死傷者六十餘人得五六人使奉劍於殿下乃召莊子王曰今日試使士敦劍莊子曰望之乆矣王曰夫子所御杖長短何如曰臣之所奉皆可然臣有三劍唯王所用請先言而後試王曰願聞三劍曰有天子劍有諸侯劍有庶人劍王曰天子之劍何如曰天子之劍以燕谿石城爲鋒齊岱爲鍔晋魏爲脊周宋爲鐔韓魏爲鋏包以四夷裹以四時繞以渤海帶以常山制以五行論以刑德開以陰陽持以春夏行以秋冬此劍直之無前舉之無上案之無下運之無旁上决浮云下絶地紀此劍一用匡諸侯天下服矣此天子之劍也文王芒然自失曰諸侯之劍何如曰諸侯之劍以知勇士爲鋒以清廉士爲鍔以賢良士爲脊以忠勝士爲鐔以豪傑士爲鋏此劍直之亦無前舉之亦無上案之亦無下運之亦無旁上法圓天以順三光下法方地以順四時中知民意以安四鄕此劍一用如雷霆之震也四封之内無不賔服而聽從君命者矣此諸侯之劍也王曰庶人之劍何如曰庶人之劍蓬頭突鬢垂冠曼胡之纓短後之衣瞋目而語難相擊於前上斬頸領下决肝肺此庶人之劍無異於鬭雞一旦命已絶矣無所用於國事今大王有天子之位而好庶人之劍臣竊爲大王薄之王乃牽而上殿宰人上食王三環之莊子曰大王安坐定氣劍事已畢奏矣於是文王不出宫三月劍士皆服斃其處也
