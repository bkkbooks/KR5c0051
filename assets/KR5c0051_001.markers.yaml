  - {type: variant, offset: 14565, length: 996, content: 謂之一矣且得無言乎夫名謂生於不明者也物或不能自明其一而以此逐彼故謂一以正之旣謂之一即是有言矣一與言爲二二與一爲三自此以往巧歷不能得而況其凡乎夫以言言一而一非言也則一與言爲二矣一旣一矣言又二之有一有二得不謂之三乎夫以一言言一猶乃成三況尋其支流凡物殊稱雖有善數莫之能紀也故一之者與彼未殊而忘一者無言而自一稱尺證反數色主反故自無適有以至於三而況自有適有乎夫一無言也而有言則至三況尋其末數其可窮乎無適焉因是已各止於其所能乃最是也夫道未始有封宜然無不在也夫道未始有封崔云齊物七章此連上章而班固在外篇言未始有常彼此言之故是非無定主爲是而有畛也道無封故萬物得恣其分域爲于僞反畛徐之忍反郭李音眞謂封域畛陌也請言其畛有左有右各異便也有左有右崔本作有在宥也便婢靣反有倫有義物物有理事事有宜有倫有義崔本作有論有議有分有辯羣分而別也分如字注同別彼列反下皆同有競有爭並逐曰競對辯曰争争争闘之争注同此之謂八德略而判之有此八德六合之外聖人存而不論夫六合之外謂萬物性分之表耳夫物之性表雖有理存焉而非性分之內則未嘗以感聖人也故聖人未嘗論之若論之則是引萬物使學其所不能也故不論其外而八畛同於自得也六合之內聖人論而不議陳其性而安之春秋經世先王之志聖人議而不辯順其成迹而擬乎至當之極不執其所是以非衆人也故分也者有不分也辯也者有不辯也夫物物自分事事自別而欲由已以分別之者不見彼之自別也分如是下及注同曰何也聖人懷之以不辨爲懷耳聖人無懷衆人辯之以相示也故曰辯也者有不見也不見彼之自辨故辨已所知以示之夫大道不稱付之自稱無所稱謂稱尺證反注同大辯不言已自別也大仁不仁無愛而自存也大廉不嗛夫至足者物之去來非我也故無所容其嗛盈嗛郭欺簟反徐音謙大勇不忮無往而不順故能無險而不往忮徐之䜴反又音䜴李之移反害也李云徤也道昭而不道以此明彼彼此倶失矣昭音照言辯而不及不能及其自分仁常而不成物無常愛而常愛必不周廉清而不信激然廉清貪名者耳非眞廉也勇忮而不成忮逆之勇天下共疾之無敢舉足之地也五者园而幾向方矣此五者皆以有爲傷當者也不能上乎本性而求外無巳大外不可求而求之譬猶以圓學方以魚慕烏耳雖希翼鸞鳳擬規日月此愈近彼愈逺實學彌得而性彌失故齊物而徧尚之累去矣园崔音刓徐五丸反司馬云圎也郭音團幾徐其衣反向方本亦作嚮音同下皆放此近附近之近逺于萬反故知止其所不知至矣所不知者皆性分之外也故止於所知之內而至也孰知不言之辯不道之道若有能知此之謂天府浩然都任之也注焉而不滿酌焉而不竭, ZTDZ: ''}
