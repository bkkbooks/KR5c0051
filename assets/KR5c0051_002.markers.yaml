  - {type: variant, offset: 14294, length: 304, content: 爲一貫者解其桎梏其可乎欲以直理冥之兾其無迹貫古亂反無趾曰天刑之安可解今仲尼非不冥也顧自然之理行則影從言則嚮隨夫順物則名迹斯立而順物者非爲名也非爲名則至矣而終不免乎名則孰能解之哉故名者影嚮也影嚮者形聲之桎梏也明斯理也則名迹可遺名迹可遺則尚彼可絶尚彼可絶則性命可全矣嚮許文反本又作向下同魯哀公問於仲尼曰衛有惡人焉曰哀駘它惡醜也惡人惡貌醜駘音牽徐又音殆它徒何反李云哀駘醜貌它其名丈夫與之處者思而不能去也婦人見之請於父母曰與人爲妻寧爲夫子妾者數十而未止也未嘗有聞其唱者也常和人而已矣無君人之位以濟乎人之死明物不由權而往和戶匪反下同無聚祿以望人之腹明非求食而往又以惡駭天下明不以形美故往駭胡皆反崔本作賳和而不唱非招而致, ZTDZ: 困百家}
