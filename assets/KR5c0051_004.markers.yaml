  - {type: variant, offset: 13068, length: 155, content: 由腐儒守迹故致斯禍不思迹反一而方復攘臂用迹以治迹可謂無愧而不知耻之甚也殊死如字廣雅云殊斷也司馬云决也一云誅也字林云死也文同又云漢令曰蠻夷長有罪當殊之崔本作殀也枕之鴆反桁戸剛反司馬云㫢長械也楊向音楊崔云械錮頸及挳者皆曰桁楊離力氏反又力智反丘氏反又丘䜴反攘如羊反桎之實反梏古毒反意如字又音醫愧崔本作䁛腐音輔復扶又反, HFL: ''}
  - {type: variant, offset: 13069, length: 548, content: 腐儒守迹故致斯禍不思迹反一而方復攘臂用迹以治迹可謂無愧而不知耻之甚也殊死如字廣雅云殊斷也司馬云决也一云誅也字林云死也文同又云漢令曰蠻夷長有罪當殊之崔本作殀也枕之鴆反桁戸剛反司馬云㫢長械也楊向音楊崔云械錮頸及挳者皆曰桁楊離力氏反又力智反丘氏反又丘䜴反攘如羊反桎之實反梏古毒反意如字又音醫愧崔本作䁛腐音輔復扶又反吾未知聖知之不爲桁楊椄槢也仁義之不爲桎梏鑿枘也桁楊以接槢爲管而桎梏以鑿枘爲用聖知仁義者逺於罪之迹也迹逺罪則民思尚之尚之則矯詐生焉矯詐生而禦奸之噐不具者未之有也故弃所向則矯詐不作矯詐不作則桁楊桎梏廢矣何鑿枘椄槢之爲哉椄李如字向徐音妾郭慈接反槢郭李音習徐徒余反司馬云椄槢械者音息節反崔本作云讀爲牒或作謂字椄槢桎梏梁也淮南曰大者爲柱梁小者爲椄槢也鑿在洛反又在報反衲人銳反向本作內音同三蒼云柱頭枘也鑿頭厠木如柱頭枘逺力萬反下同禦魚吕反本作御音同焉知曾史之不爲桀跖嚆矢也嚆矢矢之猛者言曾史爲桀跖之利用也焉於䖍反嗃矢許本亦作嗃向云嚆矢矢之鳴者也朴云嚆大呼也崔本作蒿云蕭蒿可以爲箭或作矯矯揉也崔本此下更有有無之相生也則甚曾史與桀跖皆有無也又惡得無相轂也凡二十四字故曰絶聖棄知而天下大治去其所以攖也治直吏反去起吕反黃帝立爲天子十九年令行天下聞廣成子在於空同之上故往見之曰我聞吾子逹於至道敢問至道之精吾欲取, ZTDZ: ''}
