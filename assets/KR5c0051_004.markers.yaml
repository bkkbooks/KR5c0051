  - {type: variant, offset: 24, length: 7, content: 名篇駢拇枝指出, ZTDZ: 每成功柰何哉其載焉終矜爾宋元君夜半而夢人被髮闚阿門曰予自宰路之淵予爲清江使河伯之所漁者余且得予元君覺使人占之曰此神龜也君曰魚者有余且}
  - {type: punctuation, offset: 26, content: ), id: KR5c0051_krp_004-bkkpn3}
