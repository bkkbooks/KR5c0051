      ', id: KR5c0051_krp_004-bkkkrnewl87}
  - {type: line-break, offset: 2063, content: '', id: KR5c0051_SBCK_004-5b06}
  - {type: punctuation, offset: 2063, content: (, id: KR5c0051_krp_004-bkkpn187}
  - {type: variant, offset: 2064, length: 3, content: 常然任, ZTDZ: 天下也時祀盡敬}
  - {type: 'kr:non-cjk', offset: 2069, content: ⬤, id: KR5c0051_krp_004-bkkkrnonc30}
  - {type: variant, offset: 2069, length: 0, content: '', ZTDZ: 祈喜其於人也忠信盡治而無求焉樂與政爲政樂與治爲治不以人之壤自成也不以人之卑自高也不以遭峙自利也今周見殷之亂而遽爲政上謀而下行貨阻兵而保威割牲而盟以爲信揚行以悅衆殺伐以要利是推亂以易暴也吾聞古之士遭治世不避其任遇亂世不爲荀存今天下闇周德衰其並乎周以塗吾身也不如避之以絜吾行二子北至於首陽之山遂餓而死焉若伯夷叔齊者其於富貴也荀可得已}
  - {type: page-break, offset: 2069, content: '', id: KR5c0051_SJB_004-110622c}
  - {type: variant, offset: 2070, length: 3, content: 泯然自, ZTDZ: 必不賴高節戾行獨樂其志不事於世此二士之節也雜篇盜跖第二十九孔子與柳下季爲友柳下季之弟名曰盜跖盜跖從卒九千人橫行天下侵暴諸侯穴室樞户驅人牛馬取人婦女貪}
  - {type: variant, offset: 2074, length: 0, content: '', ZTDZ: 忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之孔子謂柳下季曰夫爲人父者必能詔其子爲人兄者必能教其弟若父不能詔其子兄不能教其弟則無貴父子兄弟之親矣今先生世之才士也弟爲盜跖爲天下害}
  - {type: variant, offset: 2075, length: 0, content: '', ZTDZ: 弗能教也丘竊爲先生羞之丘請爲先生往說之柳下季曰先生言爲人父者必能詔其子爲人兄者必能教其弟若子}
  - {type: variant, offset: 2076, length: 2, content: 自覺, ZTDZ: 聽父之詔弟不受兄之教雖今先生之辯將柰之何哉且跖之爲人}
