body:
  text: 郭象子玄注陸德明音義莊子內篇養生主第三夫生以養存則養生者理之極也若乃養過其極以養傷生非養生之主也音義曰養生以此為主也吾生也有涯所稟之分各有極也涯本又作崖魚佳反而知也無涯夫舉重輕而神氣自若此力之所限也而尚名好勝者雖復絶膂猶未足以慊其願此知之無涯也故知之為名生於失當而滅於冥極冥極者任其至分而無豪銖之加是故雖萬鈞苟當其所能則忽然不知重之在身雖應萬機泯然不覺事之在巳此養生之主也知音智注下同好呼報反勝升證反復扶又反下皆同膂音旅慊苦簟反足也以有涯隨無涯殆已以有限之性尋無極之知安得而不困哉殆巳向云疲困之謂已而為知者殆而已矣已困於知而不知止又為知以救之斯養而傷之者真大殆也為善無近名為惡無近刑善惡而居中任萬物之自為悶然與至當為一故刑名逺已而全理在身也近附近之近下同悶亡本反又音門逺于萬反緣督以為經順中以為常也緣督以為經李云緣順也督中也經常也郭崔同可以保身可以全生可以養親養親以適養羊尚反注同可以盡年苟得中而冥度則事事無不可也夫養生非求過分蓋全理盡年而已矣庖丁為文惠君解牛手之所解肩之所足之所履之所踦砉然嚮然奏刀騞然莫不中音合於桑林之舞乃中經首之會言其因便施巧無不間解盡理之甚既適牛理又合音節庖丁崔本作胞同白交反庖人丁其名也管子有屠牛坦一朝解九牛力可剃毛為于偽反文惠君崔司馬云梁惠王也徐於綺反向偃彼反徐又於佇反李音妖踦徐居彼反向魚彼反李云刺也砉然向呼鵙反徐許賜反崔音畫又古鵙反李又呼歷反司馬云皮骨相離聲嚮然許丈反郭許亮反本或無然字奏如字崔云聞也騞呼反徐許臂反向他亦反又音麥崔云音近聲大於砉也中丁仲反下皆同桑林司馬云湯樂名崔云宋舞樂名案即左傳舞師題以旌夏是也經首向司馬云咸池樂章也崔云樂章名也或云奏樂名便婢靣反解音蟹文惠君曰嘻善哉技蓋至此乎庖丁釋刀對曰臣之所好者道也進乎技矣直道理於技耳所好者非技也嘻徐音熙李云歎聲也技具綺反下同好呼報反注同始臣之解牛之時所見無非牛者未能見其理間三年之後未嘗見全牛也但見其理間也方今之時臣以神遇而不以目視暗與理會神遇向云暗與理會謂之神遇官知止而神欲行司察之官廢縱心而順理官知如字崔云官知謂有所掌在也向音智專所司察而後動謂之官智而神欲行如字向云從手放意無心而得謂之神欲依乎天理不橫截也批大郤有際之處因而批之令離批備結反一音鋪迷反字林云擊也父迷父節二反郤徐去逆反郭音郤崔李云間也處昌慮反令力呈反下同離力智反導大節解空就導令殊導音道注同苦管反又苦天反崔郭司馬云空也向音空解戶買反因其固然刀不妄加技經肯綮之未嘗技之妙也常遊刃於空未嘗經槩於微礙也技本或作猗其綺反徐音技肯徐苦等反文作肯字林同口乃反云著骨肉也一曰骨無肉也崔云許叔重曰骨間肉肯肯著也綮苦挺反崔向徐並音啓李烏係反又一音罄司馬云猶結處也槩古代反礙五代反而況大軱乎軱戾大骨衄刀刃也大軱音孤向云軱戾大骨也崔云槃結骨衄女六反良庖歲更刀割也不中其理間也良庖司馬云良善也割司馬云以刀割肉故歲歲更作崔云歲一易刀猶堪割也族庖月更刀折也中骨而折刀也族庖司馬云族離也崔云族衆也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎硎砥石也硎音刑磨石也崔本作形云新所受形也砥音脂又之履反尚書傳云砥細於礪皆磨石也彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎雖然每至於族吾見其難為交錯聚結為族怵然為戒視為止不復屬目於他物也為于偽反下皆同行為遲徐其手也動刀甚微謋然巳解得其宜則用力少謋化百反徐又許百反解音蟹下皆同如土委地理解而無刀迹若聚土也提刀而立為之四顧為之躊躇滿志逸足容豫自得之謂提徐徒稽反躊直留反躇直於反善刀而藏之拭刀而韜之也善刀善猶拭也拭音式韜他刀反文惠君曰善哉吾聞庖丁之言得養生焉以刀可養故知生亦可養公文軒見右師而驚曰是何人也惡乎介也介偏刖之名公文軒司馬云姓公文氏名軒宋人也右師司馬云宋人也簡文云官名惡音烏介音戒一音兀司馬云刖也向郭云偏刖也崔本作兀又作云斷足也刖音月又五刮反天與其人與知之所無奈何天也犯其所知人也天與其人與並音餘又皆如字司馬云為天命為人事也曰天也非人也天之生是使獨也偏刖曰獨夫師一家之知而不能兩存其足則是知其無所奈何若以右師之知而必求兩全則心神內困而形骸外弊矣豈直偏刖而巳哉獨司馬云一足曰獨知音智下之知同人之貌有與也兩足共行曰有與有與之貌末有疑其非命也以是知其天也非人也以有與者命也故知獨者亦非我也是以逹生之情者不務生之所無所為逹命之情者不務命之所無奈何也全其自然而巳澤雉十步一啄百步一飮不蘄畜乎樊中蘄求也樊所以籠雉也夫俯仰乎天地之間逍遙乎自得之場固養生之妙處也又何求於入籠而服養哉啄陟角反蘄音祈求也樊中音煩李云藩也所以籠雉也向郭同崔以為園中也處昌慮反神雖王不善也夫始乎適而未嘗不適者適也雖心神長王志氣盈豫而自放於清曠之地忽然不覺善之為善也王于况反注同長丁亮反又直良反老聃死秦失弔之三號而出人弔亦弔人號亦號老聃吐藍反司馬云老子也宋本又作佚各依字讀亦皆音逸號戶羔反注同弟子曰非夫子之友邪怪其不倚戶觀化乃至三號也於綺反曰然然則弔焉若此可乎曰然至人無情與衆號耳故若斯可也始也吾以為其人也而今非也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其母彼其所以會之必有不蘄言而言不蘄哭而哭者嫌其先物施惠不在理上往故致此甚愛也少詩照反先悉薦反又如字上往一本往作住是遁天倍情忘其所受天性所受各有本分不可逃亦不可加遁天徒遜反又作遁倍音裴加也又布對反本又作背古者謂之遁天之刑感物太深不止於當遁天者也將馳鶩於憂樂之境雖楚戮未加而性情巳困庸非刑哉大深音泰樂音洛下文注同適來夫子時也時自生也適去夫子順也理當死也安時而處順哀樂不能入也夫哀樂生於失得也今玄通合變之士無時而不安無順而不處冥然與造化為一則無往而非我矣將何得何失孰死孰生哉故任其所受而哀樂無所錯其間矣錯七路反古者謂是帝之縣解以有係者為縣則無係者縣解也縣解而性命之情得矣此養生之要也縣音玄解音蟹注同崔云以生為縣以死為解指窮於為薪火傳也窮盡也為薪猶前薪也前薪以指指盡前薪之理故火傳而不滅心得納養之中故命續而不絶明夫養生乃生之所以生也指窮於為薪如字絶句為猶前也傳直專反注同也傳者相傳繼續也崔云薪火爝火也傳延也中丁仲反不知其盡也夫時不再來今不一停故人之生也一息一得耳向息非今息故納養而命續前火非後火故為薪而火傳火傳而命續由夫養得其極也世豈知其盡而更生哉莊子內篇人間世第四與人羣者不得離人然人間之變故丗丗異宜唯無心而不自用者為能隨變所適而不荷其纍也音義曰此人間見事丗所常行者也離力智反荷胡我反又音何纍力偽反顔回見仲尼請行曰奚之曰將之衛曰奚為焉曰回聞衛君其年壯其行獨不與民同欲也顔回孔子弟子姓顔名回字子淵魯人也衛君司馬云衛莊公蒯瞶也案左傳衛莊公以魯哀十五年冬始入國時顔回巳死不得為莊公蓋是世公輒也行下孟反獨崔云自專也向云與人異也輕用其國夫君人者動必乘人一怒則伏尸流血一喜則軒冕塞路人雜則多多則擾擾則憂憂而不救若夫不得其人則雖百醫守病適足致疑而不能一愈也古之至人先存諸已而後存諸人有其具然後可以接物也所存於巳者未定何暇至於暴人之所行不虛心以應物而役思以犯難故知其所存於巳者未定也夫唯外其知以養真妙當於羣才功名歸物而患慮逺身然後可以至於暴人之所行也思息嗣反逺于萬反重意記大學君子有諸巳而后求諸人無諸巳而后非諸人所藏乎身不恕而能喻諸人者未之有也且若亦知夫德之所蕩而知之所為出乎哉德蕩乎名知出乎爭德之所以流蕩者矜名故也知之所以橫出者爭善故也雖復桀跖其所矜惜無非名善也知音智下及注同為于偽反爭善此及下爭名二字依字讀復扶又反下皆同桀跖之石反桀夏王也跖盜跖也名也者相軋也知也者爭之器也二者凶器非所以盡行也夫名知者世之所用也而名起則相軋知用則爭興故遺名知而後行可盡也軋徐於八反又側列反李云折也崔云天也亦作軋崔又云或作禮相賔禮也且德厚信矼未逹人氣名聞不爭未逹人心而強以仁義繩墨之言術暴人之前者是以人惡有其美也夫投人夜光鮮不案劒者未逹故也今回之德信與其不爭之名彼所未逹也而強以仁義凖繩於彼彼將謂回欲毀人以自成也是故至人不役志以經丗而虛心以應物誠信著於天地不爭暢於萬物然後萬物歸懷天地不逆故德音發而天下響會景行彰而六合俱應而後始可以經寒暑涉治亂而不與逆鱗忤也矼徐江若反崔音控簡文云慤實貌強其兩反注同惡有烏路反下惡不肖及注云崔本作育云賣也鮮息淺反治直吏反忤音誤命之曰災人災人者人必反災之適不信受則謂與巳爭名而反害之災音災下皆同若殆為人災夫且苟為恱賢而惡不肖惡用而求有以異苟能恱賢惡愚聞義而服便為明君也苟為明君則不苦無賢臣汝往亦不足復奇如其不爾往必受害故以有心而往無往而可無心而應其應自來則無往而不可也夫音符肖音徐蘇呌反似也惡用音烏若唯無詔王公必將乘人而其捷汝唯有寂然不言耳言則王公必乘人以君人之勢而角其捷辨以距諌飾非也唯郭如字一音唯癸反詔絶句詔告也言也崔本作詻音額云逆擊曰詻王公必將乘人絶句而鬪其捷在接反崔讀若唯無詻王公絶句必將乘人而鬪絶句捷作接其接引續也而目將熒之其言辨捷使人眼眩熒戶扄反向崔本作營音熒眩玄遍反而色將平之不能復自異於彼也口將營之自救解不暇容將形之心且成之乃且釋巳以從彼也容將形之謂擎跽也是以火救火以水救水名之曰益多適不能救乃更足以成彼之盛順始無窮尋常守故未肯變也若殆以不信厚言必死於暴人之前矣未信而諌雖厚為害且昔者桀殺龍逢紂殺王子比干是皆修其身以下傴拊人之民以下拂其上者也居下而任上之憂比干非其事也龍逢夏桀之賢臣王子比干殷紂之叔父下遐嫁反傴紆甫反拊徐向音撫李云傴拊謂憐愛之也崔云猶嘔詬謂養也拂符弗反崔云違也又勞弗反故其君因其修以擠之是好名者也不欲令臣有勝君之名也擠徐子計反又子禮反司馬云毒也一云陷也方言云滅也簡文云排也好呼報反令力呈反昔者堯攻叢枝胥敖禹攻有扈國為虛厲身為刑戮其用兵不止其求實無已是皆求名實者也而獨不聞之乎夫暴君非徒求恣其欲乃復求名但所求者非其道耳叢才公反扈音戶司馬云國名在始平郡案即今京兆鄠縣也虛厲如字又音墟李云居宅無人曰虛死而無後為厲名實者聖人之所不能勝也而況若乎惜名貪欲之君雖復堯為不能勝化也故與衆攻之而汝乃欲空手而往化之以道哉雖然若必有以也嘗以語我來顔回曰端而虛正其形而虛其心也語魚豫反下同勉而一言遜而不二也則可乎曰惡惡可言未可也惡惡皆音烏下同夫以陽為充孔揚言衛君亢陽之性充張於內而甚揚於外強禦之至也采色不定喜怒無常常人之所不違莫之敢逆因案人之所感以求容與其心夫頑強之甚人以快事感已巳陵藉而乃抑挫之以求從容自放而遂其侈心也挫子臥反從七容反名之曰日漸之德不成而況大德乎言乃少多無回降之勝也將執而不化故守其本意也外合而內不訾其庸詎可乎外合而內不訾即向之端虛而勉一耳言此未足以化之訾向徐音紫崔云毀也然則我內而外曲成而上比顔回更此三條也上時掌反下同內者與天為徒與天為徒者知天子之與已皆天之所子而獨以已言蘄乎而人善之蘄乎而人不善之邪物無貴賤得生一也故善與不善付之公當耳一無所求於人也蘄音祈若然者人謂之童子是之謂與天為徒依乎天理推己性命若嬰兒之直往也外曲者與人之為徒也擎跽曲拳人臣之禮也人皆為之吾敢不為邪為人之所為者人亦無疵焉是之謂與人為徙外形委曲隨人事之所當為也擎徐其驚反跽徐其里反文云長跪也拳音權疵才斯反成而上比者與古為徒成於今而比於古也其言雖教謫之實也雖是常教有諷責之旨謫直革反諷非鳳反古之有也非吾有也若然者雖不為病直於古故無以病我也是之謂與古為徒若是則可乎仲尼曰惡惡可大多政法而不諜當理無二而張三條以政之與事不冥也大音泰徐勑佐反崔本作太諜徐徒叶反向吐頰反李云安也崔云間諜也雖固亦無罪雖未弘大亦且不見咎責雖然止是耳矣夫胡可以及化罪則無矣化則未也猶師心者也挾三術以適彼非無心而付之天下也挾戶牒反顔回曰吾無以進矣敢問其方仲尼曰齋吾將語若有而為之其易邪夫有其心而為之者誠未易也曰齋本亦作齊同則皆反下同易以豉反後皆同向崔云輕易也易之者暭天不宜以有為為易未見其宜也暭徐胡老反向云暭天自然也顔回曰回之家貧唯不飮酒不茹葷者數月矣若此則可以為齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰若一志去異端而任獨也茹徐音汝食也葷徐許云反數色主反夫起吕反下同無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物者也遺耳目去心意而符氣性之自得此虛以待物者也唯道集虛虛者心齋也虛其心則至道集於懷也顔回曰回之未始得使實自回也未使心齋故有其身未始得使絶句崔讀至實字絶句得使之也未始有回也既得心齋之使則無其身可謂虛乎夫子曰盡矣吾語若若能入遊其樊而無感其名放心自得之場當於實而止入則鳴不入則止譬之宫啇應而無心故曰鳴也夫無心而應者任彼耳不強應也強其文也無門無毒使物自若無門者也付天下之自安無毒者也毒治也毒如字治也崔本作每云貪也一宅而寓於不得巳不得巳者理之必然者也體至一之宅而會乎必然之無也而寓崔本作如愚則幾矣埋盡於斯絶迹易無行地難不行則易欲行而不踐地不可能也無為則易欲為而不傷性不可得也無絶句向崔皆以無字屬下句為人使易以偽為天使難以偽視聽之所得者粗故易欺也至於自然之報細故難偽也則失真少者不全亦少失真多者不全亦多失得之報未有不當其分者也而欲違天為偽不亦難乎粗音粗聞以有翼飛者矣未聞以無翼飛者也聞以有知知者矣未聞以無知知者也言必有其具乃能其事今無至虛之宅無由有化物之實也知知上音智下如字下句同瞻彼闋者虛室生白夫視有若無虛室者也虛室而純白獨生矣闋徐苦穴反司馬云空也虛室生白崔云白者日光所照也司馬云室比喻心心能空虛則純白獨生也祥止止夫吉祥之所集者至虛至靜也夫且不止是之謂坐馳若夫不止於當不會於極此為以應坐之日而馳騖不息也故外敵未至而內巳困矣豈能化物哉夫徇耳目內通而外於心知神將來舍而況人乎夫使耳目閉而自然得者心知之用外矣故將任性直通無往不冥尚無幽昧之責而况人間之纍乎徇辭後反徐辭倫反李云使也知音智注同是萬物之化也禹舜之所紐也伏羲几蘧之所行終而況散焉者乎言物無貴賤未有不由心知耳目以自通者也故出之所謂知者豈欲知而知哉所謂見者豈謂見而見哉若夫知見可以欲為而得者則欲賢可以得賢為聖可以得聖乎固不可矣而世不知知之自知因欲為知以知之不見見之自見因欲為見以見之不知生之自生又將為生以生之故見目而求離婁之明見耳而責師曠之聰故心神奔馳於內耳目竭喪於外身處不適則與物不冥矣不冥矣而能合乎人間之變應乎世世之節者未之有也紐徐女酒反崔云系而行之曰紐簡文云紐本也戲本又作羲亦作犧同許宜反即大曍三皇之始也凡蘧其居反向云古之帝王也李云上古帝王散悉旦反李云放也崔云德不及聖王為散聰本作喪息浪反葉公子高將使於齊問於仲尼曰王使諸梁也甚重重其使欲有所求也葉音攝子高楚大夫為葉縣尹僣稱公姓沈名諸梁字子高將使所吏反不待使及注同齊之待使者蓋將甚敬而不急恐直空報其敬而不肯急應其求也匹夫猶未可動也而況諸侯乎吾甚栗之子嘗語諸梁也曰凡事若小若大寡不道以歡成夫事無小大少有不言以成為歡者耳此仲尼之所曾告諸梁也栗音栗李云懼也語魚據反下同事若不成則必有人道之患夫以成為歡者不成則怒矣此楚王之所不能免也事若成則必有隂陽之患人患雖去然喜懼戰於胸中固巳結氷炭於五藏矣藏才浪反若成若不成而後無患者唯有德者能之成敗若任之於彼而莫足以患心者唯有德者乎吾食也執粗而不臧爨無欲清之人對火而不思涼明其所饌儉薄也執衆家本並然簡文作熱粗音粗又才古反臧作郎反善也絶句一音才郎反句至㸑字爨七亂反清七性反字宜從青從凊者假借也清涼也之人言爨火為食而不思清涼明火微而食宜儉薄饌士戀反今吾朝受命而夕飮冰我其內與所饌儉薄而內飮氷者誠憂事之難非美食之為與音餘下㥀與同內向云食美食者必內熱吾未至乎事之情而既有隂陽之患矣事若不成必有人道之患是兩也事未成則唯恐不成耳若果不成則恐懼結於內而刑網羅於外也恐丘勇反為人臣者不足以任之子其有以語我來仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心自然結固不可解也任而林反又而鳩反臣之事君義也無適而非君也無所逃於天地之間千人聚不以一人為主不亂則散故多賢不可以多君無賢不可以無君此天人之道必至之宜是之謂大戒若君可逃而親可解則不足戒也是以夫事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命德之至也知不可奈何者命也而安之則無哀無樂何易施之有哉故冥然以所遇為命而不施心於其間泯然與至當為一而無休戚於其中雖事凡人猶無往而不適而况君親乎樂音洛注下同施如字崔以䜴反云移也為人臣子者固有所不得已行事之情而忘其身事有必至理固常通故任之則事濟事濟而身不存者未之有也又何用心於其身哉何暇至於恱生而惡死夫子其行可矣理無不通故當任所遇而直前耳若乃信道不篤而恱惡存懷不能與至當俱往而謀生慮死未見能成其事者也惡烏路反下皆同丘請復以所聞凡交近則必相靡以信近者得接故以其信驗親相靡服也復扶又反下注同遠則必忠之以言遙以言傳意也傳丈專反下文并注同言必或傳之夫傳兩喜兩怒之言天下之難者也夫喜怒之言若過其實傳之者宜使兩不失中故未易也怒如字注同本又作下同易以豉反下文注皆同夫兩喜必多溢美之言兩怒必多溢惡之言溢過也喜怒之言常過其當也凡溢之妄嫌非彼言以傳者妄作妄則其信之也莫莫然疑之莫則傳言者殃就傳過言似於誕妄受者有疑則傳言者橫以輕重為罪也故法言曰傳其常情無傳其溢言則幾乎全雖聞臨時之過言而勿傳也必稱其常情而要其誠致則近於全也要一遙反近附近之近且以巧力者始乎陽本共好戲好呼報反常卒乎隂欲勝情至潛興害彼泰至則多竒巧不復循理大至音泰本亦作泰徐敕佐反下同巧如字又苦孝反以禮飮酒者始乎治尊卑有別旅酬有次治直吏反別彼列反計反故法言曰無遷令傳彼實也無勸成任其自成過度益也益則非任實遷令勸成殆事此事之危殆美成在久美成者任其時化譬之種植不可一朝成惡成不及改彼之所惡而勸強成之則悔敗尋至惡烏路反強其丈反下欲強同可不愼與且夫乘物以遊心物以為意也託不得巳以養中至矣任理之必然者中庸之符全矣斯接物之至也何作為報也當任齊所報之實何為為齊作意於其間哉為為上如字下于偽反莫若為致命此其難者直為致命最易所以喜怒施心故難也顔闔將傳衛靈公大子而問於蘧伯玉曰有人於此其德天殺與之為無方則危吾國與之為有方則危吾身夫小人之性引之制則憎巳縱其無度則亂顔闔胡臘反向崔本作蓋魯之賢人隱者衛靈公左傳云名元太子音泰司馬云蒯聵也蘧其居反伯玉名瑗衛大夫天殺如字謂如天殺物也徐所列反無方李云方道也其知適足以知人之過而不知其所以過不知民過之由巳故罪責於民而不自改其知音智若然者吾奈之何蘧伯玉曰善哉問乎戒之愼之正女身哉反覆與會俱所以為正身女音汝為無町畦亦與之為無町畦彼且為無崖亦與之為無崖逹之入於無疵不小立圭角以逆其鱗也嬰兒李云喻無意也崔云喻驕遊也町徒頂反畦戶圭反李云町畦畔垺也無畔垀無威儀也崔云喻守節崖司馬云不顧法也無疵似移反病也汝不知夫螳蜋乎怒其臂以當車轍不知其不勝任也是其才之美者也夫螳蜋之怒臂非不美也以當車轍顧非敵耳今知之所無奈何而欲強當其任即螳蜋之怒臂也勝音升戒之愼之積伐而美者以犯之幾矣積汝之才伐汝之美以犯此人危殆之道汝不知夫養虎者乎不敢以生物與之為其殺之之怒也恐其因有殺心而遂怒也為于偽反下同不敢以全物與之為其決之之怒也方使虎自齧分之則因用力而怒矣分如字時其飢飽逹其怒心知其所以怒而順之虎之與人異而媚養巳者順也故其殺者逆也順理則異生愛逆節則至親交兵夫愛馬者以筐盛矢以蜄盛溺矢溺至賤而以寶器盛之愛馬之至也盛矢音成下及注同矢或作屎同蜄徐市軫反蛤溺徒弔反適有蚉虻僕緣僕僕然羣著馬蚉音文本或作同虻孟庚反僕緣普木反徐敷木反向云僕僕然蚉虻緣馬稠穊之貌崔音如字云僕御著直略反而拊之不時雖救其患而掩馬之不意拊李音撫又音付一音附崔本作府音拊則缺銜毀首碎胸掩其不備故驚而至此意有所至而愛有所亡可不愼邪意至除患率然拊之以致毀碎失其所以愛矣故當世接物逆順之際不可不愼也率踈律反本或作卒七忽反匠石之齊至乎曲轅見櫟社樹其大蔽牛潔之百圍其高臨山十仞而後有枝其可以為舟者旁十數觀者如市匠伯不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何邪曰已矣勿言之矣散木也以為舟則沈以為棺槨則速腐以為器則速毀以為門戶則液樠以為柱則蠧是不材之木也無所可用故能若是之壽不在可用之數故曰散木曲轅音司馬云曲轅曲道也崔云道名櫟力狄反李云木名一云采也蔽牛必世反李云牛挂其旁而不見潔向徐戶結皮徐又虎結反約束也百圍李云徑入為圍蓋十丈也十仭小爾雅云四尺曰仞案七尺曰仞崔本作千仞或云八尺曰仞旁十數所具反崔云旁旁枝也觀古奐反又音官匠伯伯匠石字也崔本亦作石輟丁劣反厭於艷反又於蟾反散悉但反徐悉旦反下同速如字向崔本作數向所椂反下同腐扶甫反夜音亦樠亡言反向李莫于反郭武半反司馬云液津液也樠謂脂出樠樠然也崔云黑液出也蠧丁故反匠石歸櫟社見夢曰女將惡乎比豫哉若將比豫於文木邪凡可用之木為文木見胡薦反女音汝惡音烏下同夫柤梨橘柚果蓏之屬實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道天自掊擊於世俗者也物莫不若是物皆以自用傷柤側加反橘均必反柚由救反徐以救反蓏徐力果反泄徐思列反崔云泄同若如字崔本作枯棓普口反徐方垢反且豫求無所可用久矣幾死乃今得之數有睥睨巳者唯今匠石明之耳幾音祈又音機下同數音朔普係反變五係反為豫大用積無用乃為濟生之大用使豫也而有用且得有此大也邪若有用久見伐且也若與豫也皆物也奈何哉其相物也而幾死之散人又惡知散木以戲匠石而幾死之絶句向同一讀連下散人為句崔同匠石覺而診其夢弟子曰趣取無用則為社何邪猶嫌其以為社自榮不趣取於無用而已覺古孝反診徐直信反司馬向云診占夢也曰密若無言彼亦直焉社自來耳非此木求之為社也以為不知巳者詬厲也言此木乃以社為不知巳而見辱病也豈榮之哉詬李云呼豆反徐音垢厲如字司馬云詬辱也厲病也不為社者且幾有翦乎本自以無用為用則雖不為社亦終不近於翦伐之害幾音機或音祈翦乎子淺反崔本作前于近附近之近下同且也彼其所保與衆異彼以無保為保而衆以有保為保而以義喻之不亦逺乎利人長物禁民為非社之義也夫無用者泊然不為而羣才自用用者各得其敘而不與焉此無用之所以全也汝以社譽之無緣近也譽音餘注同長丁兩反泊步各反與音餘南伯子綦遊乎商之丘見大木焉有異結駟千乘隱將芘其所藾其枝所隂可以隱芘千乘南伯李云即南郭也伯長也商之丘司馬云今梁國睢陽縣是也乘繩證反隱崔云傷於熱也芘本亦作疵徐甫至反又悲位反崔本作芘云芘也藾音賴崔木作賴向云蔭也可以隱芘千乘也李同隂於鴆反子綦曰此何木也哉此必有異材夫仰而視其細枝則拳曲而不可以為棟梁俯而視其大根則軸解而不可以為棺槨咶其葉則口爛而為傷嗅之則使人狂酲三日而不巳子綦曰此果不材之木也以至於此其大也嗟乎神人以此不材天王不材於百官故百官御其事而明者為之視聰者為之聽知者為之謀勇者為之扞夫何為哉玄默而巳而羣材不失其當則不材乃材之所至賴也故天下樂推而不厭乘萬物而無害也夫音符仰而向崔本作從而拳本亦作卷音權軸直竹反解李云如衣軸之直解也咶食反嗅崔云嗅許救反狂酲音呈李云狂如酲也病酒曰酲為之于偽反下為之皆同宋有荆氏者冝楸柏桑其拱把而上者求狙猴之杙者斬之三圍四圍求高名之麗者斬之七圍八圍貴人冨商之家求樿傍者斬之故未終其天年而中道之夭於斧斤此材之患也有材者未能無惜也荆氏司馬云地名也一曰里名冝揪拍桑崔云荆氏之地宜此三木李云三木文木也拱恭勇反把百推反司馬云兩手曰拱一手曰把上時掌反狙七餘反猴音侯杙以職反又羊植反郭具羊反司馬作扒音八李云欲以栖戲狙猴也崔本作拔音跋云栁也三圍崔云圍環八尺為一圍嚴如字又音禮司馬云小船也又屋隱也禪本亦作擅音膳傍薄剛反崔云禪傍棺也司馬云棺之全一邊者謂之禪傍故解之以牛之白顙者與豚之亢鼻者與人有痔病者不可以適河巫祝解除棄此三者必妙選騂具然後敢用解徐古賣反又佳買反注同向古邂反顙息黨反司馬云額也亢司馬云高也額折故鼻高崔云仰也痔徐直里反司馬隱創也適河司馬云謂沈人於河察也騂恤管反此皆巫祝以知之矣巫祝於此亦知不材者全所以為不祥也此乃神人之所以為大祥也夫全生者天下之所謂祥也巫祝以不材為不祥而弗用也彼乃以不祥全生乃大祥也神人者無心而順物者也故天下之所謂大祥神人不逆支離疏者頥隱於齊肩高於頂會撮指天五管在上兩髀為脅挫針治繲足以糊口鼓策播精足以食十人上徴武士則支離攘臂於其間恃其無用故不自竄匿支離疏司馬云形體支離不全貌疏其名也頥以之反頂如字本作項亦如字司馬云言曲頸縮也淮南曰脊管高於頂也會古外反徐古活反向音活撮子列反向徐子活反崔云會撮項推也指天司馬云會撮髻也古者髻在項中脊曲頭低故髻指天也向云兩肩竦而上會撮然也管崔本作管在上李云管腧也五藏之腧皆在上也髀本又作脾同音陛徐又甫婢反崔云僂人腹在髀裏也脅許劫反司馬云脊曲髀腎故與肩並也挫徐子臥反郭租禾反崔云案也針執金反司馬云挫針縫衣也繲佳賣反司馬云浣衣也向同崔作音線糊徐音胡李云食也崔云字或作互或作䬯鼓莢革反徐又音頰司馬云鼓簸也小箕也策崔云鼓策揲鑽也播精如字一音所字則當作數精司馬云簡米曰精崔云播精卦占兆也鼓策播精言賣食音嗣攘如羊反臂于其間如字司馬云間裏也崔本作攘臂於其開云開門中也匿女力反上有大役則支離以有常疾不受功不任作役故上與病者粟則受三鍾與十束薪役則不與賜則受之三鍾司馬云斛斛四斗曰鍾與音豫夫支離其形者猶足以養其身終其天年又況支離其德者乎神人無用於物而物各得自用歸功名於羣才與物冥而無迹故免人間之害處常美之實此支離其德也孔子適楚楚狂接輿遊其門曰鳳兮鳳兮何如德之衰也當順時直前盡乎會通之宜耳世之衰盛篾然不足覺故曰何如來世不可待往世不可追也趣當盡臨時之宜耳天下有道聖人成焉天下無道聖人生焉付之自爾而理自生成生成非我也豈為治亂易節哉治自求成故遺成而不敗亂自求生故忘生而不死為于偽反治直吏反下同方今之時僅免刑焉不瞻前顧後而盡當今之會冥然與時世為一而後妙當可全刑名可免僅音覲福輕乎羽莫之知載足能行而放之手能執而任之聽耳之所聞視目之所見知止其所不知能止其所不能用其自用為其自為恣其性內而無纎芥於分外此無為之至易也無為而性命不全者未之有也性命全而非福者理未聞也故夫福者即向之所謂全耳非假物也豈有寄鴻毛之重哉率性而動動不過分天下之至易也舉其自舉載其自載天下之至輕也然知以無崖傷性心以欲惡蕩真故乃釋此無為之至易而知彼有為之至難棄夫自舉之至輕而取夫載彼之至重此世之常患也易以䜴反下同知音知惡烏路反禍重乎地莫之知避舉其性內則雖萬鈞而不覺其重也外物之雖重不盈緇銖有不勝任者矣為內福也故福至輕為外禍也故禍至重禍至重而莫之知避此世之大迷也知避舊本作置云置也勝音升已乎巳乎臨人以德殆乎殆乎畫地而趨夫畫地而使人循之其迹不可掩矣有其巳而臨物與物不冥矣故大人不明我以耀彼而任彼之自明不德我以臨人而付人之自得故能彌貫萬物而玄同彼我泯然與天下為一而內外同福也畫音迷陽迷陽無傷吾行迷陽猶亡陽也亡陽任獨不蕩於外則吾行全矣天下皆全其吾則凡稱吾者莫不皆全也迷陽司馬云迷陽伏陽也言詐狂吾行禍重乎地莫之知避舉其性內則雖萬鈞而不覺其重也外物之雖重不盈緇銖有不勝任者矣為內福也故福至輕為外禍也故禍至重禍至重而莫之知避此世之大迷也知避舊本作置云置也勝音升已乎巳乎臨人以德殆乎殆乎畫地而趨夫畫地而使人循之其迹不可掩矣有其巳而臨物與物不冥矣故大人不明我以耀彼而任彼之自明不德我以臨人而付人之自得故能彌貫萬物而玄同彼我泯然與天下為一而內外同福也畫音迷陽迷陽無傷吾行迷陽猶亡陽也亡陽任獨不蕩於外則吾行全矣天下皆全其吾則凡稱吾者莫不皆全也迷陽司馬云迷陽伏陽也言詐狂吾行禍重乎地莫之知避舉其性內則雖萬鈞而不覺其重也外物之雖重不盈緇銖有不勝任者矣為內福也故福至輕為外禍也故禍至重禍至重而莫之知避此世之大迷也知避舊本作置云置也勝音升已乎巳乎臨人以德殆乎殆乎畫地而趨夫畫地而使人循之其迹不可掩矣有其巳而臨物與物不冥矣故大人不明我以耀彼而任彼之自明不德我以臨人而付人之自得故能彌貫萬物而玄同彼我泯然與天下為一而內外同福也畫音迷陽迷陽無傷吾行迷陽猶亡陽也亡陽任獨不蕩於外則吾行全矣天下皆全其吾則凡稱吾者莫不皆全也迷陽司馬云迷陽伏陽也言詐狂吾行郤曲無傷吾足曲成其行各自足矣郤曲去逆反字書作只廣雅云只曲也山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也有用則與彼為功無用則自全其生夫割肌膚以為天下者天下之所知也使百姓不失其自全而彼我俱適者俯然不覺妙之在身也山木自冦也膏火自煎也煎子然反司馬云木生斧柄還自伐膏起火還自消崔云山有木故火焚也俯亡本反莊子內篇德充符第五德充於內應物於外外內玄合信若符命而遺其形骸也音義曰崔云此遺形棄知以德實之驗也魯有兀者王駘從之遊者與仲尼相若弟子多少敵孔子兀五忽反又音界李云刖是曰兀案篆書兀分字相似王駘音臺徐又音殆人姓名也從如字李才用反下同相若若如也弟子如夫子多少也常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯立不教坐不議虛而往實而歸各自得而足也常季或云孔子弟子立不坐教不議司馬云立不教授坐不議論固有不言之教無形而心成者邪怪其形殘而心乃充足也夫心之全也遺身形忘五藏忽然獨往而天下莫能離藏才浪反下同是何人也仲尼曰夫子聖人也丘也直後而未往耳丘將以為師而況不若丘者乎奚假魯國丘將引天下而與從之夫神全心具則體與物冥與物冥者天下之所不能逺奚但一國而巳哉丘也直後而未往耳李云自在衆人後未得往師之耳逺子萬反常季曰彼兀者也而王先生其與庸亦逺矣若然者其用心也獨若之何仲尼曰死生亦大矣人雖曰變然死生之變變之大也王于況反李云勝也崔云君長也其與庸亦逺矣與凡庸異也崔云庸常人也而不得與之變彼與變俱故生死不變於彼雖天地覆墜亦將不與之遺斯順之也覆芳服反墜本又作隊直反李云天地猶不能變巳況生死也審乎無假明性命之固當而不與物遷任物之自遷命物之化以化為命而無怪忤忤五故反本亦作逆下同而守其宗也不離至當之極離力智反常季曰何謂也仲尼曰自其異者視之肝膽楚越也恬苦之性殊則美惡之情皆膽烏路反膽丁敢反下同背音惡自其同者視之萬物皆一也雖所美不同而同有所美各美其所美則萬物一美也各是其所是則天下一是也夫因奚所異而異之則天下莫不異而浩然大觀者官天地府萬物知異之不足異故因其所同而同之則天下莫不皆同又知同之不足有故因其所無而無之則是非美惡莫不皆無矣夫是我而非彼美巳而惡人自中知以下至于昆蟲莫不皆然然此明乎我而不明乎彼者爾若夫玄通泯合之士因天下以明天下天下無曰我非也即明天下之無非無曰彼是也即明天下之無是無是無非混而為一故能乘變任化忤物而不惜中知音智又體之反夫若然者且不知耳目之所宜宜生於不宜者也無美無惡則無不宜無不宜故亡其宜也而遊心乎德之和都亡宜故無不任也都任之而不得者未之有也無不得而不和者亦未聞也故放心於天地之間蕩然無不當而擴然無不適也物視其所一而不見其所喪視喪其足猶遺土也體夫極數之妙心故能無物而不同無物而不同則死生變化無往而非我矣故生為我時死為我順時為我聚順為我散聚散雖異而我皆我之則生故我耳未始有得死亦我也未始有喪夫死生之變猶以為一既觀其一則然無係玄同彼我以死生為寤寐以形骸為逆旅去生如脫屣斷足如遺土吾未見足以纓茀其心也喪息浪反下及注同始鋭反又音恱脫屣九具反本亦作屣所買反斷丁管反常季曰彼為已以其知嫌王駘未能忘知而自存為于偽反得其心以其心嫌未能遺心而自得得其常心物何為最之哉夫得其常心平往者也嫌其不能平往而與物過常故使物就之最徂會反徐采會反下注同司馬云聚也仲尼曰人莫鑑於流水而鑑於止水夫止水之致鑑者非為止以求鑑也故王駘之聚衆衆自歸之豈引物使從巳鑑古暫反流水崔本作沫水云沫或作流唯止能止衆止動而為之則不能居衆物之止受命於地唯松柏獨也在冬夏靑靑夫松柏特稟自然之鍾氣故能為衆木之傑耳非能為而得之也受命於天唯舜獨也正言特受自然之正氣者至希也下首則唯為松柏上首則唯有聖人故凡不正者皆來求正耳若物皆有青全則無貴於松柏人各自正則無羡於大聖而趣之幸能正生以正衆生幸自能正耳非為正以正之夫保始之徵不懼之實勇士一人雄入於九軍將求名而能自要者而猶若是非能遺名而無不任保始之徴李云徴成也終始可保成也九軍崔李云天子六軍諸侯三軍通為九軍也簡文云兵書以攻九天九地故謂之九軍要一遙反而況官天地府萬物冥然無不體也寓六骸所謂逆旅六骸崔云手足首身也象耳目人用耳目亦用耳目非須耳目一知之所知而心未嘗死者乎知與變化俱則無往而不冥此知之一者也心與死生順則無時而非生此心之未嘗死也彼且擇日而登假人則從是也以不失會為擇耳斯人無擇也任其天行而時動者也故假借之人由此而最之耳且如字徐子余反下同假又古雅反借也徐音遐讀連上句人字向下彼且何肯以物為事乎其恬漠故全也申徒嘉兀者也而與鄭子産同師於伯昏無人子産謂申徒嘉曰我先出則子止子先出則我止羞與刖者並行申徒嘉李云申徒氏嘉名無人離篇作瞀人刖音月又五亂反其明日又與合堂同席而坐子産謂申徒嘉曰我先出則子止子先出則我止今我將出子可以止乎其未邪質而問之欲使必不並已且子見執政而不違子齊執政乎常以執政自多故直云子齊執政便謂足以明其不遜申徒嘉曰先生之門固有執政焉如此哉此論德之處非計位也處昌慮反子而子之執政而後人者也其矜在位欲處物先音恱注同聞之曰鑑明則塵垢不止止則不明也久與賢人處則無過今子之所取大者先生也而猶出言若是不亦過乎事明師而鄙吝之心猶未去乃真過也子産曰子既若是矣若是形殘猶與堯爭善計子之德不足以自反邪言不自顧省而欲輕蔑在位與有德者並計子之德故不足以形殘之過爭善如字申徒嘉曰自狀其過以不當亡者衆多自陳其過狀以已為不當亡者衆也不狀其過以不當存者寡默然為過自以為應死者少也知不可奈何而安之若命唯有德者能之遊於羿之彀中中央者中地也然而不中者命也羿古之善射者弓矢所及為彀中夫利害相攻則天下皆羿也自不遺身忘知與物同波者皆遊於羿之彀中耳雖張毅之出單豹之處猶未免於中地則中與不中唯在命耳而區區者各有其所遇而不知命之自爾故免乎弓矢之害者自以為巧欣然多巳及至不免則自恨其謬而志傷神辱斯未能逹命之情者也夫我之生也非我之所生也則一生之內百年之中其坐起行止動靜趣舍性情知能凡所有者凡所無者凡所為者凡所遇者皆非我也理自爾耳而橫生休戚乎其中斯又逆自然而失者也知如字又音智羿音詣徐胡係反善射人唐夏有之乃云有窮之君夏者也彀音遘張弓也中如字央於良反又於倉反中地丁仲反下不中注中地中與不中同單音善人以其全足吾更貌曰子無乃稱巳悟則厭其多言也蹴子六反稱如字舉也又尺證反魯有兀者叔山無趾踵見仲尼踵頻也叔山無趾音止李云叔山字無足趾踵朱勇反向郭云頻也崔云無趾故踵行見賢遍反仲尼曰子不謹前既犯患若是矣雖今來何及矣無趾曰吾唯不知務而輕用吾身吾是以亡足人之生也理自生矣直莫之為而任其目生斯重其身而知務者也若乃忘其自生謹而矜之斯輕用其身而不知務也故五藏相攻於內而手足殘傷於外也子不謹前絶句一讀以謹字絶句今吾來也猶有尊足者存刖一足未足以虧其德明夫形骸者逆旅也吾是以務全之也去其於謹任其自王斯務全也去吕反夫天無不覆地無不載天不為覆故能常覆地不為載故能常載使天地而為覆載則有時而息矣使舟能沈而為人浮則有時而沒矣故物為焉則未足以終其生也為丁偽反下不為而為皆同吾以夫子為天地安知夫子之猶若是也責其不謹不及天地也孔子曰丘則矣夫子胡不入乎請講以所聞無趾出聞所聞而出全其無為也孔子曰弟子勉之夫無趾兀者也猶務學以復前行之惡而況全德之人乎全德者生便忘生行下孟反無趾語老聃曰孔丘之於至人其未邪彼何賔賔以學子為怪其方復學於老聃語魚據反賔賔司馬云恭貌張云猶賢賢也崔云有所親踈也簡文云好名貌彼且蘄以諔詭幻怪之名聞不知至人之以是為巳桎梏邪夫無心者人學亦學然古之學者為巳今之學者為人其弊也遂至乎為人之所為矣夫師人以自得者率其常然者也舍巳效人而逐物於外者求乎非常之名者也夫非常之名乃常之所生也故學者非為幻怪也幻怪之生必由於學禮者非為華薄也而華薄之興必由於禮斯必然之理至人之所無奈何故以為巳之桎梏蘄音祈諔尺叔反詭九委反李云諔詭奇異也幻滑辨反亦作幼桎之實反郭真一反木在足也梏古毒反木在手也為已于偽反下者為人同舍音捨老聃曰胡不直使彼以死生為一條以可不可為一貫者解其桎梏其可乎欲以直理冥之兾其無迹貫古亂反無趾曰天刑之安可解今仲尼非不冥也顧自然之理行則影從言則嚮隨夫順物則名迹斯立而順物者非為名也非為名則至矣而終不免乎名則孰能解之哉故名者影嚮也影嚮者形聲之桎梏也明斯理也則名迹可遺名迹可遺則尚彼可絶尚彼可絶則性命可全矣嚮許文反本又作向下同魯哀公問於仲尼曰衛有惡人焉曰哀駘它惡醜也惡人惡貌醜駘音牽徐又音殆它徒何反李云哀駘醜貌它其名丈夫與之處者思而不能去也婦人見之請於父母曰與人為妻寧為夫子妾者數十而未止也未嘗有聞其唱者也常和人而已矣無君人之位以濟乎人之死明物不由權而往和戶匪反下同無聚祿以望人之腹明非求食而往又以惡駭天下明不以形美故往駭胡皆反崔本作賳和而不唱非招而致之知不出醜乎卒授之國無幾何也去寡人而行寡人恤焉若有亡也若無與樂是國也是何人者也仲尼曰丘也嘗使於楚矣適見子食於其死母者食乳也醜李云醜慙也崔云愧也幾居豈反樂音洛嘗使於楚矣使音所吏反本亦作遊本又直云嘗於楚矣本又作豚徒門反食音飮邑錦反注同舊如字簡文同少焉眴若皆棄之而走不見已焉爾不得焉爾夫生者以才德為死而才德去矣故生者以失而走也故含德之厚比於赤子無往而不為之赤子也則天下莫之害斯得而明巳故也情苟使扶又反章末注同崔本作不得復使矣云不復入直也形全猶足以為爾採擇嬪御及燕爾新婚本以形好為意者也故形之全也無以降至尊之情回貞女之操也好呼報反而況全德之人乎德全而物愛之冝矣今哀駘它未言而信無功而親使人授巳國唯恐其不受也是必才全而德不形者也哀公曰何謂才全仲尼曰死生存亡窮逹貧富賢與不肖毀譽飢渴寒暑是事之變命之行也其理故當不可逃也故人之生也非誤生也生之所有非妄有也天地雖大萬物雖多然吾之所遇適在於是則雖天地神明國家聖賢絶力至知而弗能違也故凡所不遇弗能遇也其所遇弗能不遇也凡所不為弗能違也其所為弗能不為也故付之而自當矣譽音餘日夜相代乎前夫命行事變不舍晝夜推之不去留之不停故才全者隨所遇而任之舍音捨而知不能規乎其始者也夫始非知之所規而故非情之所留是以知命之必行事之必變者豈於終規始在新戀故哉雖有至知而弗能規也逝者之往吾奈之何哉故不足以滑和苟知性命之固當則雖死性窮逹千變萬化淡然自若而和理在身矣滑音骨淡徒暫反不可入於靈府靈府者精神之宅也夫至足者不以憂患經神若皮外而過去使之和豫通而不失於兊苟使和性不滑靈府間豫則雖涉乎至變不失其兊然也兊徒外反李云恱也間音間使日夜無郤泯然常任之郤去逆反李云間也而與物為春羣生之所賴也是接而生時於心者也順四時而俱化司馬云接至道而和氣在心也李云接萬物而施生順四時而俱作是之謂才全何謂德不形曰平者水停之盛也天下之平莫盛於停水也其可以為法也無情至平故天下取正焉內保之而外不蕩也內保其明外無情為玄鑒洞照與物無私故能全其平而行其法也為于為反德者成和之修也事得以成物得以和謂之德也德不形者物不能離也無事不成無物不和此德之不形也是以天下樂推而不厭離力智反哀公異日以告閔子曰始也吾以南靣而君天下執民之紀而憂其死吾自以為至通矣今吾聞至人之言恐吾無其實輕用吾身而亡吾國吾與孔丘非君臣也德友而巳矣聞德元之風者雖復哀公猶欲遺形骸忘貴賤也閔子孔子弟子閔子騫也闉支離無脤衛靈公靈公之而視全人其脰肩肩甕盎大癭齊桓公桓公之而視全人其脰肩肩偏情一往則醜者更好而好者更醜也闉音因郭烏年反音企郭其逆反支離無脤徐市軫反又音脣司馬云闉曲豉企也闉支離言腳常曲行體不正卷縮也無脤名也崔云闉者也支離傴者也脤脣同簡文云行也脤脣也衛始鋭反又如字下齊桓同之音恱下之同脰音豆頸也肩肩胡田反又胡恩反李云小貌崔云猶玄玄也簡文云直貌甕烏送反郭於寵反盎烏葬反郭於兩反李云甕盎大癭貌崔同大癭一領反文云瘤也故德有所長而形有所忘其德長於順物則物忘其醜長於逆物則物忘其好人不忘其所忘而忘其所不忘此謂誠忘生則愛之死則棄之故德者世之所不忘也形者理之所不存也故夫忘形者非忘地不忘形而忘德者乃誠忘也故聖人有所遊遊於自得之放之而無不至者才德全也而知為孽約為膠德為接工為啇此四者自然相生其理巳具知音智下同孽魚列反司馬云智慧生妖孽約為膠司馬云約束而後有如膠漆崔云約誓所以為膠固德為接司馬云散德以接物也工為商司馬云工巧而商賈起聖人不謀惡用知不斫惡用膠無喪惡用德不貨惡用商自然巳具故聖人無所用其巳也惡音烏下同斫陟角反喪息浪反四者天鬻也天鬻也者天食也言自然而稟之鬻音育養也食音嗣亦如字既受食於天又惡用人既稟之自然其理巳足則雖沈思以免難或明戒以避禍物無妄然皆天地之會至理所趣必自思之非我思也必自不思非我不思也或思而免之或思而不免或不思而免之或不思而不免凡此皆非我也又奚為哉任之而自至也食如字又音嗣沈思息嗣反亦如字難乃旦反有人之形視其形貌若人無人之情掘若稿木之枝掘其勿反稿苦老反有人之形故羣於人聚羣分自然之道分如字無人之情故是非不得於身無情故付之於物也乎小哉所以屬於人也形貌若人眇亡小反簡文云陋也謷乎大哉獨成其天無情故浩然無不任無不任者有情之所未能也故無情而獨成天也謷五羔反徐五報反簡文云放也今取遨遊義也獨成其天如字崔本天字作大云同於人所以為小情合於天所以為大惠子謂莊子曰人故無情乎莊子曰然惠子曰人而無情何以謂之人莊子曰道與之貌天與之形惡得不謂之人人之生也非情之所生也生之所知豈情之所知哉故有情於為離曠而弗能也然離曠以無情而聰明矣有情以為賢聖而弗能也然賢聖以無情而賢聖也豈直賢聖絶逺而離曠難慕哉雖下愚聾瞽及雞鳴狗吠豈有情於為之亦終不能也不問逺之與近雖去巳一分顔孔之際終莫之得也是以之萬物反取諸身耳目不能以易任成功手足不能以代司致業故嬰兒之始生也不以目求乳不以耳向明不以足操物不以手求行豈百骸無定司形貌無素主而專由情以制之哉惡音烏下惡得同吠扶廢反分如字操七刀反惠子曰既謂之人惡得無情未解形貌之非情也解音蟹莊子曰是非吾所謂情也以是非為情則無是無非無好無惡者雖有形貌直是人耳情將安吾所謂無情者言人之不以好惡內傷其身任當而直前者非情也常因自然而不益生也止於當也惠子曰不益生何以有其身未明生之自生理之自足莊子曰道與之貌天與之形生理巳自足於形貌之中但任之則身存無以好惡內傷其身夫好惡之情非所以益生秪足以傷身以其生之有分也好惡呼報反下烏路反注同秪音支今子外乎子之神勞乎子之精倚樹而吟據稿梧而瞑夫神不休於性分之內則外矣精不止於自生之極則勞矣故行則倚樹而吟坐則據梧而睡言有情者之自困也倚於綺反稿苦老反梧音吾暝音眠崔云據琴而睡也睡垂臂反天選子之形子以堅白鳴言凡子所為外神勞精倚樹據梧且吟且睡情世之所謂情也而云天選明夫情者非情之所生而况他哉故雖萬物萬形云為趣舍皆在無情中來又何用情於其間哉選宣轉反舊思緩反南華真經卷第二
