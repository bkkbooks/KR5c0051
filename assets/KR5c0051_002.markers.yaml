  - {type: variant, offset: 7, length: 247, content: 明音義莊子內篇養生主第三夫生以養存則養生者理之極也若乃養過其極以養傷生非養生之主也音義曰養生以此爲主也吾生也有涯所禀之分各有極也涯本又作崖魚佳反而知也無涯夫舉重輕而神氣自若此力之所限也而尚名好勝者雖復絶膂猶未足以慊其願此知之無涯也故知之爲名生於失當而滅於冥極冥極者任其至分而無豪銖之加是故雖萬鈞苟當其所能則忽然不知重之在身雖應萬機泯然不覺事之在巳此養生之主也知音智注下同好呼報反勝升證反復扶又反下皆同膂音旅慊苦簟反足也以有涯隨無涯殆已以有限之性尋無極之知安得而不困哉殆巳向云疲困之謂已而爲知者殆, ZTDZ: ''}
