body:
  text: 外篇馬蹄第九馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之眞性也雖有義臺路寢無所用之及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皁棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飾之患而後有鞭筴之威而馬之死者已過半矣陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者中鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也吾意善治天下者不然彼民有常性織而衣耕而食是謂同德一而不黨命曰天放故至德之世其行填填其視顛顛當是時也山無蹊隧澤無舟梁萬物群生連屬其鄕禽獸成群草木遂長是故禽獸可係羈而遊鳥鵲之巢可攀援而闚夫至德之世同與禽獸居族與萬物並惡乎知君子小人哉同乎無知其德不離同乎無欲是謂素樸素樸而民性得矣及至聖人蹩躠爲仁踶跂爲義而天下始疑矣澶漫爲樂摘僻爲禮而天下始分矣故純樸不殘孰爲犧樽白玉不毁孰爲珪璋道德不廢安取仁義性情不離安用禮樂五色不亂孰爲文采五聲不亂孰應六律夫殘樸以爲器工匠之罪也毁道德以爲仁義聖人之過也夫馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬知已此矣夫加之以衡扼齊之以月題而馬知介倪闉扼鷙曼詭銜竊轡故馬之知而能至盜者伯樂之罪也夫赫胥氏之時民居不知所爲行不知所之含哺而熙鼓腹而遊民能已此矣及至聖人屈折禮樂以匡天下之形縣跂仁義以慰天下之心而民乃始踶跂好知爭歸於利不可止也此亦聖人之過也外篇胠篋第十將爲胠篋探囊發匱之盜而爲守備則必攝緘滕固扃鐍此世俗之所謂知也然而巨盜至則負匱揭篋擔囊而趨唯恐緘縢扃鐍之不固也然則向之所謂知者不乃爲大盜積者也故嘗試論之世俗之所謂知者有不爲大盜積者乎所謂聖者有不爲大盜守者乎何以知其然邪昔者齊國鄰邑相望雞狗之音相聞罔罟之所布來耨之所刺方三千餘里闔四境之内所以立宗廟社稷治邑屋州閶鄕曲者曷嘗不法聖人哉然而田成子一旦殺齊君而盜其國所盜者豈獨其國邪並與其聖知之法而盜之故田成子有乎盜賊之名而身處堯舜之安小國不敢非大國不敢誅十二世有齊國則是不乃竊齊國並與其聖知之法以守其盜賊之身乎嘗試論之世俗之所謂至知者有不爲大盜積者乎所謂至聖者有不爲大盜守者乎何以知其然邪昔者龍逄斬比干剖萇弘肔子胥靡故四子之賢而身不免乎戮故跖之徒問於跖曰盜亦有道乎跖曰何適而無有道邪夫妄意室中之藏聖也入先勇也出後義也知可否知也分均仁也五者不備而能成大盜者天下未之有也由是觀之善人不得聖人之道不立跖不得聖人之道不行天下之善人少而不善人多則聖人之利天下也少而害天下也多故曰脣竭則齒寒魯酒薄而邯鄲圍聖人生而大盜起掊擊聖人縱舍盜賊而天下始治矣夫川竭而谷虚丘夷而淵實聖人已死則大盜不起天下平而無故矣聖人不死大盜不止雖重聖人而治天下則是重利盜跖也爲之斗斛以量之則并與斗斛而竊之爲之權衡以稱之則並與權衡而竊之爲之符璽以信之則並與符璽而竊之爲之仁義以矯之則并與仁義而竊之何以知其然邪彼竊鉤者誅竊國者爲諸侯諸侯之門而仁義存焉則是非竊仁義聖知邪故逐於大盜揭諸侯竊仁義并斗斛權衡符璽之利者雖有軒冕之賞弗能勸斧鉞之威弗能禁此重利盜跖而使不可禁者是乃聖人之過也故曰魚不可脱於淵國之利器不可以示人彼聖人者天下之利器也非所以明天下也故絶聖棄知大盜乃止摘玉毁珠小盜不起焚符破璽而民朴鄙掊斗折衡而民不爭殫殘天下之聖法而民始可與論議擢亂六律鑠絶竽瑟塞瞽曠之耳而天下始人舍其聰矣滅文章散五采膠離朱之目而天下始人舍其明矣毁絶鉤繩而棄規矩攦工倕之指而天下始人有其巧矣故曰大巧若拙削曾史之行鉗揚墨之口攘棄仁義而天下之德始玄同矣彼人含其明則天下不鑠矣人舍其聰則天下不累矣人含其知則天下不惑矣人含其德則天下不僻矣彼曾史楊墨師曠工倕離朱者皆外立其德而以爚亂天下者也法之所無用也子獨不知至德之世乎昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏戲氏神農氏當是時也民結繩而用之甘其食美其服樂其俗安其居鄰國相望雞狗之音相聞民至老死而不相往來若此之時則至治已今遂至使民延頸舉踵曰某所有賢者赢糧而趣之則内棄其親而外去其主之事足跡接乎諸侯之境車軌結乎千里之外則是上好知之過也上誠好知而無道則天下大亂矣何以知其然邪夫弓弩畢弋機變之知多則鳥亂於上矣鉤餌罔罟罾笱之知多則魚亂於水矣削格羅落置罘不知多則獸亂於澤矣知詐漸毒頡滑堅白解垢同異之變多則俗惑於辯矣故天下每每大亂罪在於好知故天下皆知求其所不知而莫知求其所已知者皆知非其所不善而莫知非其所已善者是以大亂故上悖日月之明下爍山川之精中墮四時之施喘耎之蟲肖翹之物莫不失其性甚矣夫好知之亂天下也自三代以下者是已舍夫種種之民而悦夫役役之佞釋夫恬惔無爲而悅夫哼哼之意啍啍已亂天下矣外篇在宥第十一聞在宥天下不聞治天下也在之也者恐天下之淫其性也宥之也者恐天下之遷其德也天下不淫其性不遷其德有治天下者哉昔堯之治天下也使天下欣欣焉人樂其性是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愉也夫不恬不愉非德也非德也而可長乆者天下無之人大喜邪毗於陽大怒邪毗於陰陰陽並毗四時不至寒暑之和不成其反傷人之形乎使人喜怒失位居處無常思慮不自得中道不成章於是乎天下始喬詰卓鷙而後有盜跖曾史之行故舉天下以賞其善者不足舉天下以罰其惡者不給故天下之大不足以賞罰自三代以下者匈匈焉終以賞罰爲事彼何暇安其性命之情哉而且悅明邪是淫於色也悅聰邪是淫於聲也悅仁邪是亂於德也悦義邪是悖於理也悦禮邪是相於技也悅樂邪是相於淫也悦聖邪是相於藝也悅知邪是相於疵也天下將安其性命之情之八者存可也亡可也天下將不安其性命之情之八者乃始臠卷聯拳傖囊而亂天下也而天下乃始尊之惜之甚矣天下之惑也豈直過也而去之邪乃齋戒以言之跪坐以進之鼓歌以舞之吾若是何哉故君子不得已而臨蒞天下莫若無爲無爲也而後安其性命之情故貴以身於爲天下則可以託天下愛以身於爲天下則可以寄天下故君子荀能無解其五藏無擢其聰明尸居而龍見淵默而雷聲神動而天隨從容無爲而萬物炊累焉吾又何暇治天下哉崔瞿問於老聃曰不治天下安臧人心老聃曰汝愼無攖人心人心排下而進上上下囚殺淖約柔乎剛彊廉劌彫琢其熱焦火其寒凝冰其疾俛仰之間而再撫四海之外其居也淵而靜其動也縣而天僨驕而不可係者其唯人心乎昔者黄帝始以仁義攖人之心堯舜於是乎股無胈脛無毛以養天下之形愁其其五藏以爲仁義矜其血氣以規法度然猶有不勝也堯於是放讙兜於崇山投三苗於三峗流共工於幽都此不勝天下也夫施及三王而天下大駭矣下有桀跖上有曾史而儒墨畢起於是乎喜怒相疑愚知相欺善否相非誕信相譏而天下衰矣大德不同而性命爛漫矣天下好知而百姓求竭矣於是乎釿鋸制焉繩墨殺焉椎鑿决焉天下脊脊大亂罪在攖人心故賢者伏處大山堪巖之下而萬乘之君憂慄乎廟堂之上今世殊死者相枕也桁楊者相推也刑戮者相望也而儒墨乃始離跂攘臂乎桎梏之間意甚矣哉其無愧而不知恥也甚矣吾未知聖知之不爲桁楊椄槢也仁義之不爲桎梏鑿枘也焉知曾史之不爲桀跖嚆矢也故曰絶聖棄知而天下大治黄帝立爲天子十九年令行天下聞廣成子在於空同之上故往見之曰我聞吾子達於至道敢問至道之精吾欲取天地之精以佐五穀以養民人吾又欲官陰陽以遂群生爲之奈何廣成子曰而所欲問者物之質也而所欲官者物之殘也自而治天下雲氣不待族而雨草木不待黄而落日月之光益以荒矣而佞人之心翦翦者又奚足以語至道黄帝退捐天下築特室席白茅閒居三月復往邀之廣成子南首而卧黄帝順下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長乆廣成子蹷然而起曰善哉問乎來吾語汝至道至道之精窈窈㝠㝠至道之極昏昏默默無視無聽抱神以靜形將自正必靜必清無勞汝形無摇汝精乃可以長生目無所見耳無所聞心無所知汝神將守形形乃長生愼汝内閑汝外多知爲敗我爲汝遂於大明之上矣至彼至陽之原也爲汝入於窈㝠之門矣至彼至陰之原也天地有官陰陽有藏愼守汝身物將自壯我守其一以處其和故我修身千二百歲矣吾形未常衰黄帝再拜稽首曰廣成子之謂天矣廣成子曰來余語汝彼其物無窮而人皆以爲終彼其物無測而人皆以爲極得吾道者上爲皇而下爲王失吾道者上見光而下爲土今夫百昌皆生於土而反於土故余將去汝入無窮之門以遊無極之野吾與日月參光吾與天地爲常當我緡乎遠我昬乎人其盡死而我獨存乎雲將東遊過扶摇之枝而適遭鴻蒙鴻蒙方將拊髀爵躍而遊雲將見之倘然止贄然立曰叟何人邪叟何爲此鴻蒙拊髀爵躍不輟對雲將曰遊雲將曰朕願有問也鴻蒙仰而視雲將曰吁雲將曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育群生爲之奈何鴻蒙拊髀爵躍掉頭曰吾弗知吾弗知雲將不得問又三年東遊過有宋之野而適遭鴻蒙雲將大喜行趨而進曰天忘朕邪天忘朕邪再拜稽首願聞於鴻蒙鴻蒙曰浮遊不知所求猖狂不知所往遊者鞅掌以觀無妄朕又何知雲將曰朕也自以爲猖狂而民隨予所往朕也不得已於民今則民之放也願聞一言鴻蒙曰亂天之經道物之情玄天弗成解獸之群而爲皆夜鳴灾及草木禍及昆蟲噫治人之過也雲將曰然則吾奈何鴻蒙曰噫毒哉僊僊乎歸矣雲將曰吾遇天難願聞一言鴻蒙曰噫心養汝徒處無爲而物自化墮爾形體吐爾聰明倫與物忘大同乎澤溟解心釋神莫然無魂萬物云云各復其根各復其根而不知渾渾沌沌終身不離若彼知之乃是離之無問其名無闚其情物固自生雲將曰天降朕以德示朕以默躬身求之乃今也得再拜稽首起辭而行世俗之人皆喜人之同乎己而惡人之異於己也同於己而欲之異於己而不欲者以出乎衆爲心也夫以出乎衆爲心者曷常出乎衆哉因衆以寧所聞不如衆技衆矣而欲爲人之國者此攬乎三王之利而不見其患者也此以人之國僥倖也幾何僥倖而不喪人之國乎其存人之國也無萬分之一而喪人之國也一不成而萬有餘喪矣悲夫有土者之不知也夫有土者有大物也有大物者不可以物物而不物故能物物明乎物物者之非物也豈獨治天下百姓而已哉出入六合遊乎九州獨往獨來是謂獨有獨有之人是之謂至貴大人之教若形之於影聲之於響有問而應之盡其所懷爲天下配處乎無響行乎無方挈汝適復之撓撓以遊無端出入無旁與日無始頌論形軀合乎大同大同而無己無己惡乎得有有覩有者昔之君子覩無者天地之友賤而不可不任者物也卑而不可不因者民也匿而不可不爲者事也麤而不可不陳者法也遠而不可不居者義也親而不可不廣者仁也節而不可不積者禮也中而不可不高者德也一而不可不易者道也神而不可不爲者天也故聖人觀於天而不助成於德而不累出於道而不謀會於仁而不恃薄於義而不積應於禮而不諱接於事而不讓齊於法而不亂恃於民而不輕因於物而不去物者莫足爲也而不可不爲不明於天者不純於德不通於道者無自而可不明於道者悲夫何謂道有天道有人道無爲而尊者天道也有爲而累者人道也主者天道也臣者人道也天道之與人道也相去遠矣不可不察也南華眞經卷之二南華眞經卷之三貞四外篇天地第十二天地雖大其化均也萬物雖多其治一也人卒雖衆其主君也君原於德而成於天故曰玄古之君天下無爲也天德而已矣以道觀言而天下之君正以道觀分而君臣之義明以道觀能而天下之官治以道汎觀而萬物之應備故通於天地者德也行於萬物者道也上治人者事也能有所藝者技也技兼於事事兼於義義兼於德德兼於道道兼於天故曰古之畜天下者無欲而天下足無爲而萬物化淵靜而百姓定記曰通於一而萬事畢無心得而鬼神服夫子曰夫道覆載萬物者也洋洋乎大哉君子不可以不刳心焉無爲爲之之謂天無爲言之之謂德愛人利物之謂仁不同同之之謂大行不崖異之謂寬有萬不同之謂富故執德之謂紀德成之謂立循於道之謂備不以物挫志之謂完君子明於此十者則韜乎其事心之大也沛乎其爲萬物逝也若然者藏金於山藏珠於淵不利貨財不近貴富不樂壽不哀夭不榮通不醜窮不拘一世之利以爲己私分不以王天下爲己處顯顯則明萬物一府死生同狀夫子曰夫道淵乎其居也漻乎其清也金石不得無以鳴故金石有聲不考不鳴萬物孰能定之夫王德之人素逝而恥通於事立之本原而知通於神故其德廣其心之出有物採之故形非道不生生非德不明存形窮生立德明道非王德者邪蕩蕩乎忽然出勃然動而萬物從之乎此謂王德之人視乎㝠㝠聽乎無聲冥冥之中獨見曉焉無聲之中獨聞和焉故深之又深而能物焉神之又神而能精焉故其與萬物接也至無而供其求時騁而要其宿大小長短脩遠黄帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其玄珠使知索之而不得使離朱索之而不得使喫詬索之而不得也乃使象罔象罔得之黄帝曰異哉象罔乃可以得之乎堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣堯問於許由曰齧缺可以配天乎吾藉王倪以要之許由曰殆哉圾于天下齧缺之爲人也聰明叡知給數以敏其性過人而又乃以人受天彼審乎禁過而不知過之所由生與之配天乎彼且乘人而無天方且本身而異形方且尊知而火馳方且爲緒使方且爲物絯方且四顧而物應方且應衆宜方且與物化而未始有恒夫何足以配天乎雖然有族有祖可以爲衆父而不可以爲衆父父治亂之率也北面之禍也南面之賊也堯觀乎華華對人曰嘻聖人請祝聖人使聖人壽堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰壽富多男子人之所欲也汝獨不欲何邪堯曰多男子則多懼富則多事壽則多辱是三者非所以養德也故辭封人曰始也我以汝爲聖人邪今然君子也天生萬民必授之職多男子而授之職則何懼之有富而使人分之則何事之有夫聖人鶉居而鷇食鳥行而無彰天下有道則與物皆昌天下無道則脩德就間千歲厭世去而上僊乘彼白雲至于帝郷三患莫至身常無殃則何辱之有封人去之堯隨之曰請問封人曰退已堯治天下伯成子高立爲諸侯堯授舜舜授禹伯成子高辭爲諸侯而耕禹往見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立爲諸侯堯授舜舜授予而吾子辭爲諸侯而耕敢問其故何也子高曰昔堯治天下不賞而民勸不罰而民畏今子賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣夫子闔行邪無落吾事俋俋乎耕而不顧泰初有無無有無名一之所起有一而未形物得以生謂之德未形者有分且然無間謂之命留動而生物物成生理謂之形形體保神各有儀則謂之性性脩反德德至同於初同乃虚虚乃大合喙鳴喙鳴合與天地爲合其合緡緡若愚若昏是謂玄德同乎大順夫子向于老聃曰有人治道若相放可不可然不然辨者有言曰離堅白若縣寓若是則可謂聖人乎老聃曰是胥易技係勞形怵心者也執狸之狗成思猨狙之便自山林來丘予告若而所不能聞與而所不能言凡有首有趾無心無耳者衆有形者與無形無狀而皆存者盡無其動止也其死生也其廢起也此又非其所以也有治在人忘乎物忘乎天其名爲忘己忘己之人是之謂入於天蔣閶葂見季徹曰魯君謂葂也曰請受教辭不獲命旣已告矣未知中否請嘗薦之吾謂魯君曰必服恭儉拔出公忠之屬而無阿私民孰不敢輯季徹局局然笑曰若夫子之言於帝王之德猶螳蜋之怒臂以當車轍則必不勝任矣且若是則其自爲處危其觀臺多物將往投迹者衆蔣閶葂覤覤然驚曰葂也汒若於夫子之所言矣雖然願先生之言其風也季徹曰大聖之治天下也摇蕩民心使之成教易俗舉滅其賊心而皆進其獨志若性之自爲而民不知其所由然若然者豈兄堯舜之教民溟涬然弟之哉欲同乎德而心居矣子貢南遊於楚反於晋過漢陰見一丈人方將爲圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎爲圃者仰而視之曰奈何曰鑿木爲機後重前輕挈水若抽數如泆湯其名爲橰爲圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不爲也子貢瞞然慚俯而不對有間爲圃者曰子奚爲者邪曰孔丘之徒也爲圃者曰子非夫博學以擬聖於于以蓋衆獨弦哀歌以賣名聲於天下者乎汝方將忘汝神氣墮汝形骸而庶幾乎而身之不能治而何暇治天下乎子往矣無乏吾事子貢卑陬失色頊頊然不自得行三十里而後俞其弟子曰向之人何爲者邪夫子何故見之變容失色終日不自反邪曰始吾以爲天下一人耳不知復有夫人也吾聞之夫子事求可功求成用力少見功多者聖人之道今徒不然執道者德全德全者形全形全者神全神全者聖人之道也託生與民並行而不知其所之汒乎淳備哉功利機巧必忘夫人之心若夫人者非其志不之非其心不爲雖以天下譽之得其所謂謷然不顧以天下非之失其所謂儻然不受天下之非譽無益損焉是謂全德之人哉我之謂風波之民反於魯以告孔子孔子曰彼假脩渾沌氏之術者也識其一不知其二治其内而不治其外夫明白入素無爲復朴體性抱神以遊世俗之間者汝將固驚邪且渾沌氏之術予與汝何足以識之哉諄芒將東之大壑適遇苑風於東海之濱苑風曰子將奚之曰將之大壑曰奚爲焉曰夫大壑之爲物也注焉而不滿酌焉而不竭吾將遊焉苑風曰夫子無意于橫目之民乎願聞聖治諄芒曰聖治乎官施而不失其宜拔舉而不失其能畢見其情事而行其所爲行言自爲而天下化手撓顧指四方之民莫不俱至此之謂聖治願聞德人曰德人者居無思行無慮不藏是非美惡四海之内共利之之爲悅共給之之爲安怊乎若嬰兒之失其母也儻乎若行而失其道也財用有餘而不知其所自來飲食取足而不知其所從此謂德人之容願聞神人曰上神乘光與形滅亡此謂照曠致命盡情天地樂而萬事銷亡萬物復情此之謂混冥門無鬼與赤張滿稽觀於武王之師赤張滿稽曰不及有虞氏乎故離此患也門無鬼曰天下均治而有虞氏治之邪其亂而後治之與赤張滿稽曰天下均治之爲願而何計以有虞氏爲有虞氏之藥瘍也秃而施髢病而求醫孝子操藥以脩慈父其色燋然聖人羞之至德之世不尚賢不使能上如標枝民如野鹿端正而不知以爲義相愛而不知以爲仁實而不知以爲忠當而不知以爲信蠢動而相使不以爲賜是故行而無迹事而無傳孝子不諛其親忠臣不謟其君臣子之盛也親之所言而然所行而善則世俗謂之不肖子君之所言而然所行而善則世俗謂之不肖臣而未知此其必然邪世俗之所謂然而然之所謂善而善之則不謂之導諛之人也然則俗故嚴於親而尊於君邪謂己導人則勃然作色謂己諛人則怫然作色而終身導人也終身諛人也合譬飾辭聚衆也是終始本末不相坐垂衣裳設采色動客貌以媚一世而不自謂導諛與夫人之爲徒通是非而不自謂衆人愚之至也知其愚者非大愚也知其惑者非大惑也大惑者終身不解大愚者終身不靈三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者勝也而今也以天下惑予雖有祈嚮不可得也不亦悲乎大聲不入於里耳折揚皇華則嗑然而笑是故高言不止於衆人之心至言不出俗言勝也以二垂踵惑而所適不得矣而今也以天下惑予雖有祈嚮其庸可得邪知其不可得也而强之又一惑也故莫若釋之而不推不推誰其比憂厲之人夜半生其子遽取火而視之汲汲然唯恐其似己也百年之木破爲犧樽青黄而文之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也跖與曾史行義有間矣然其失性均也且夫失性有五一曰五色亂目使目不明二曰五聲亂耳使耳不聰三曰五臭薰鼻困惾中顙四曰五味濁口使口厲爽五曰趣舍滑心使性飛揚此五者皆生之害也而楊墨乃始離跂自以爲得非吾所謂得也夫得者困可以爲得乎則鳩鴞之在於籠也亦可以爲得矣且夫趣舍聲色以柴其内皮弁鷸冠搢笏紳脩以約其外内支盈於柴栅外重纏繳睆睆然在纏繳之中而自以爲得則是罪人交臂歷指而虎豹在於囊檻亦可以爲得矣外篇天道第十三天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海内服明於天通於聖六通四辟於帝王之德者其自爲也昧然無不靜者矣聖人之靜也非曰靜也善故靜也萬物無足以鐃心者故靜也水靜則明燭鬚眉平中准大匠取法焉水靜猶明而況精神聖人之心靜乎天地之鑒也萬物之鏡也夫虚靜恬淡寂漠無爲者天地之平而道德之至故帝王聖人休焉休則虚虚則實實者倫矣虚則靜靜則動動則得矣靜則無爲無爲也則任事者責矣無爲則俞俞俞俞者憂患不能處年壽長矣夫虚靜恬淡寂漠無爲者萬物之本也明此以南卿堯之爲君也明此以北面舜之爲臣也以此處上帝王天子之德也以此處下玄聖素王之道也以此退居而間游江海山林之士服以此進爲而撫世則功大名顯而天下一也靜而聖動而王無爲也而尊樸素而天下莫能與之爭美夫明白於天地之德者此之謂大本大宗與天和者也所以均調天下與人和者也與人和者謂之人樂與天和者謂之天樂莊子曰吾師乎吾師乎𩐎萬物而不爲戾澤及萬世而不爲仁長於上古而不爲壽覆載天地刻彫衆形而不爲巧此之謂天樂故曰知天樂者其生也天行其死也物化靜而與陰同德動而與陽同波故知天樂
