  - {type: variant, offset: 17111, length: 0, content: '', HFL: 行三十里而後俞其弟子曰向之人何爲者邪夫子何故見之變容失色終日不自反邪曰始吾以爲天下一人耳不知復有夫人也吾聞之夫子事求可功求成用力少見功多者聖人之道今徒不然執道者德全德全者形全形全者神全神全者聖人之道也託生與民並行而不知其所之汒乎淳備哉功利機巧必忘夫人之心若夫人者非其志不之非其心不爲雖以天下譽之得其所謂謷然不顧以天下非之失其所謂儻然不受天下之非譽無益損焉是謂全德之人哉我之謂風波之民反於魯以告孔子孔子曰彼假脩渾沌氏之術者也識其一不知其二治其内而不治其外夫明白入素無爲復朴體性抱神以遊世俗之間者汝將固驚邪且渾沌氏之術予與汝何足以識之哉諄芒將東之大壑適遇苑風於東海之濱苑風曰子將奚之曰將之大壑曰奚爲焉曰夫大壑之爲物也注焉而不滿酌焉而不竭吾將遊焉苑風曰夫子無意于橫目之民乎願聞聖治諄芒曰聖治乎官施而不失其宜拔舉而不失其能畢見其情事而行其所爲行言自爲而天下化手撓顧指四方之民莫不俱至此之謂聖治願聞德人曰德人者居無思行無慮不藏是非美惡四海之内共利之之爲悅共給之之爲安怊乎若嬰兒之失其母也儻乎若行而失其道也財用有餘而不知其所自來飲食取足而不知其所從此謂德人之容願聞神人曰上神乘光與形滅亡此謂照曠致命盡情天地樂而萬事銷亡萬物復情此之謂混冥門無鬼與赤張滿稽觀於武王之師赤張滿稽曰不及有虞氏乎故離此患也門無鬼曰天下均治而有虞氏治之邪其亂而後治之與赤張滿稽曰天下均治之爲願而何計以有虞氏爲有虞氏之藥瘍也秃而施髢病而求醫孝子操藥以脩慈父其色燋然聖人羞之至德之世不尚賢不使能上如標枝民如野鹿端正而不知以爲義相愛而不知以爲仁實而不知以爲忠當而不知以爲信蠢動而相使不以爲賜是故行而無迹事而無傳孝子不諛其親忠臣不謟其君臣子之盛也親之所言而然所行而善}
  - {type: page-break, offset: 17111, content: '', id: KR5c0051_HFL_003-007a, image: hfl/0350/0350-073.png}
  - {type: page-break, offset: 17111, content: '', id: KR5c0051_HFL_003-007b, image: hfl/0350/0350-074.png}
  - {type: page-break, offset: 17111, content: '', id: KR5c0051_HFL_003-008a, image: hfl/0350/0350-075.png}
