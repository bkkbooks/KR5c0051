  - {type: variant, offset: 10353, length: 144, content: 乃結反徐李乃協反崔音捻云忘貌簡文云疲病困之狀好呼報反下同人謂之不死奚益言其實與死同其形化其心與之然可不謂大哀乎言其心形並馳困而不反比於凡人所哀則此眞哀之大也然凡人未嘗以此爲哀則凡所哀者不足哀也人之生也固若是芒乎其我獨芒而人亦有不芒者乎凡此上事皆不知所以然而然故曰芒也今夫知者皆不知所以知而, ZTDZ: 後列子}
