  - {type: variant, offset: 301, length: 0, content: '', ZTDZ: 學者眞土梗耳夫魏眞爲我累耳温伯雪子適齊舍魯魯人}
  - {type: variant, offset: 302, length: 0, content: '', ZTDZ: 請見之}
  - {type: variant, offset: 303, length: 0, content: '', ZTDZ: 温伯雪子曰}
  - {type: variant, offset: 305, length: 0, content: '', ZTDZ: 吾聞中國之君子明乎禮義而陋於知人心吾不欲見也至於齊反舍於魯是人也又請見温伯雪子曰往也蘄見我今也又蘄見我是必有以振我也出而見客入而歎明日見客又入而歎其僕曰每見之客也必入而歎何邪曰吾固告子矣中國之民明乎禮義而陋乎知人心昔之見我者進退}
  - {type: variant, offset: 306, length: 1, content: 日, ZTDZ: 成規一成矩從容一若龍一若虎其諫我也似子其道我也似父是以歎也仲尼見之}
  - {type: variant, offset: 308, length: 1, content: 相, ZTDZ: 不言子路曰吾子欲見温伯雪子乆矣見之而不言何邪仲尼曰若夫人者目擊而道存矣亦不可以容聲矣顔淵問於仲尼曰夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而回瞠若乎後矣夫子曰回何謂邪曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辯亦辯也夫子馳亦馳也夫子言道回亦言道也及奔逸絶塵而回瞠若乎後者夫子不言而信不比而周}
  - {type: page-break, offset: 308, content: '', id: KR5c0051_SJB_003-110605a}
  - {type: variant, offset: 310, length: 31, content: 也一物不具則生者無由得生一理不至則天年無縁得終然身之所有者知或, ZTDZ: 器而民蹈乎前而}
