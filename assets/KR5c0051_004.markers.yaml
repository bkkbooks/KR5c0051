  - {type: variant, offset: 3939, length: 2160, content: 馬之眞性非辭鞌而惡乗但無羡於榮華義許冝反又如字徐音儀崔本同一本作義臺崔云羲臺猶靈臺也路寢路正也大也崔云路寢正室惡烏路反及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皁棧馬之死者十二三矣有意治之則不治矣治之爲善斯不善也伯樂音洛下同伯樂姓孫名陽善馭馬石氏星經云伯樂天星名主典天馬孫陽善馭故以爲名剔敕整反字林云剃也徐詩赤反向崔本作鬄向音郝雒音洛司馬云燒謂燒鐡以爍之剔謂翦其毛刻謂削其甲雒謂羈雒其頭也羈居宜反廣雅云勒也馽丁邑反徐丁力反絆也李音述本亦作馽非也馽之樹反司馬向崔本並作䋶向云馬氏音竦崔云絆前兩足也編必然反皁才老反櫪也一云槽也崔云馬閑也棧士板反徐在簡反又士諌反編木作似牀日棧以禦温也崔云木棚也治直吏反飢之渴之馳之驟之整之齊之前有橛飾之患而後有鞭筴之威而馬之死者已過半矣夫善御者將以盡其能也盡能在於自任而乃走作驅歩求其過能之用故有不堪而多死焉若乃任駑之力適遲疾之分雖則足迹接乎八荒之表而衆馬之性全矣而或者聞任馬之性乃謂放而不乗聞無爲之風遂云行不如臥何其生而不返哉斯失乎莊生之㫖逺矣驟士救反橛向徐其月反司馬云衘也崔云鑣也飾徐音式司馬云排衘也謂加飾於馬鑣也鞭必然反筴革反杜注左傳云馬檛也檛竹反陶者曰我善治埴圎者中規方者中矩匠人者我善治木曲者中鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也世以任自然而不加巧者爲不善於治也揉曲爲直厲駑習能爲規矩以矯拂其性使死而後巳乃謂之善治也不亦過乎陶道刀反謂窑也窑音戈消反埴徐時力反崔云土也司馬云埴土可以爲陶器尚書傳云土黏曰埴釋名云埴膱也膱音之食反中丁仲反下皆同應對之應後不音者放此揉汝久反矯居兆反拂房弗反吾意善治天下者不然以不治治之乃善治也彼民有常性織而衣耕而食是謂同德夫民之德小異而大同故性之不可去者衣食也事之不可廢者耕織也此天下之所同而爲本者也守斯道者無爲之至也去羗吕反一而不黨命曰天放放之而自一耳非黨也故謂之天放放如字崔本作牧云養也故至德之世其行塡塡其視顚顚此自足於內無所求及之貌塡塡徐音田又徒偃反質重貌崔云重遲也一云詳徐貌淮南作莫莫顚顚丁田反崔云專一也淮南作溟溟當是時也山無蹊隧澤無舟梁不求非望之利故止於一家而足蹊徐音兮李云治天下者不然以不治治之乃善治也彼民有常性織而衣耕而食是謂同德夫民之德小異而大同故性之不可去者衣食也事之不可廢者耕織也此天下之所同而爲本者也守斯道者無爲之至也去羗吕反一而不黨命曰天放放之而自一耳非黨也故謂之天放放如字崔本作牧云養也故至德之世其行塡塡其視顚顚此自足於內無所求及之貌塡塡徐音田又徒偃反質重貌崔云重遲也一云詳徐貌淮南作莫莫顚顚丁田反崔云專一也淮南作溟溟當是時也山無蹊隧澤無舟梁不求非望之利故止於一家而足蹊徐音兮李云徑也隧徐音遂崔云道也萬物羣生連屬其鄕混芒而同得也則與一世而淡漠焉豈國異而家殊也連屬其鄕王云旣無國異家殊故其鄕連屬混胡本反芒莫剛反淡徒暫反漠音莫禽獸成羣草木遂長足性而止無呑夷之欲故物全長丁丈反又直良反吞敕恩反又音夭是故禽獸可係羈而遊鳥鵲之巢可攀援而闚與物無害故物馴也攀本又作扳普班反援音廣雅云牽也引也闚去規反馴似遵反或音純夫至德之世同與禽獸居族與萬物並惡乎知君子小人哉同乎無知其德不離知則離道以善也惡音烏離力智反注皆同同乎無欲是謂素樸欲則離性以飾也樸普剥反素樸而民性得矣無煩乎知欲也重意老三章常使民無知無欲及至聖人聖人者民得性之迹耳非所以迹也此云及至聖人猶云及至其迹也蹩躠爲仁踶跂爲義而天下始疑矣澶漫爲樂摘僻爲禮而天下始分矣夫聖迹旣彰則仁義不眞而禮樂離性徒得形表而巳矣有聖人即有斯弊吾若是何哉蹩歩結反向崔本作弊音同躠本又作薛悉結反向崔本作殺音同又音素反踶直氏反向同崔音緹跂丘氏反一音吕氏反崔音枝李云蹩躠踶皆用心爲仁義之貌澶本又作澶徒旦反又吐旦反向崔本作但音憚漫武半反向崔本作曼音同李云澶漫猶縱逸也崔云但曼也一云澶漫牽引也摘敕歷反又渉革反辟匹壁反向音檗徐敷歷反李父歷反本或作僻音同李云紏擿邪辟而爲禮也一音婦赤反法也崔云擿辟多節分如字下分皆同故純樸不殘孰爲犧樽白玉不毀孰爲珪璋道德不廢安取仁義性情不離安用禮樂五色不亂孰爲文采五聲不亂孰應六律凡此皆變樸爲華弃本崇末於其天素有殘廢矣世雖貴之非其貴也犧尊音羲尊或作樽司馬云畫犧牛象以飾樽也王肅云刻爲牛頭鄭玄云畫鳳凰羽飾尊婆娑然也音先河反珪璋音章李云皆器名也銳上方下曰珪半珪曰璋情性不離如字別離也夫殘樸以爲器工匠之罪也毀道德以爲仁義聖人之過也工匠則有規矩之制聖人則有可尚之迹夫馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬知已此矣御其眞知乗其自陸則萬里之路可致而羣馬之性不失頸領也居郢反又祁盈反靡如字李云摩也一云愛也踶大計反又徒反又徒祁反李云踶謂也廣雅字韻聲並同通俗文云小謂之踶知李音智下同夫加之以衡扼齊之以月題而馬知介倪闉扼鷙曼詭銜竊轡故馬之知而能至盗者伯樂之罪也馬性不同而齊求其用故有力竭而熊作者扼於革反衡轅前横木縛軛者也扼又馬頸者也月題徒兮反司馬崔云馬額上當顱如月形者也介徐古八反倪徐五圭反郭五第反李云介倪猶脾倪也崔云介出俾倪也闉音因鷙徐敕二反郭音躓曼武半反郭武諌反李云闉曲也鷙抵也曼突也崔云闉扼鷙曼距扼頓遲也司馬云言曲頸於扼以抵突也一云鷙曼旁出也詭九彼反銜口中勒也或云詭銜吐出銜也竊轡齧轡也崔云詭銜竊轡戾銜撅盗艱轡也熊吐代反夫赫胥氏之時民居不知所, ZTDZ: ''}
