front:
  text: 外篇駢拇第八駢拇枝指出乎性哉而侈於德附贅縣疣出乎形哉而侈於性多方乎仁義而用之者列於五臟哉而非道德之正也是故駢於足者連無用之肉也枝於手者樹無用之指也多方駢枝於五臟之情者淫僻於仁義之行而多方於聰明之用也是故駢於明者亂五色淫文章青黄黼黻之煌煌非乎而離朱是已多於聰者亂五聲淫六律金石絲竹黄鍾大吕之聲非乎而師曠是已枝於仁者擢德塞性以收名聲使天下簧鼓以奉不及之法非乎而曾史是已駢於辯者纍瓦結繩竄句遊心於堅白同異之間而敝跬譽無用之言非乎而揚墨是已故此皆多駢旁枝之道非天下之至正也彼正正者不失其性命之情故合者不爲駢而枝者不爲跂長者不爲有餘短者不爲不足是故鳧脛雖短續之則憂鶴脛雖長斷之則悲故性長非所斷性短非所續無所去憂也意仁義其非人情乎彼仁人何其多憂也且夫駢於拇者决之則泣枝於手者齕之則啼二者或有餘於數或不足於數其於憂一也今世之仁人蒿目而憂世之患不仁之人决性命之情而饕貴富故意仁義其非人情乎自三代以下者天下何其囂囂也且夫待鉤繩規矩而正者是削其性也待繩約膠漆而固者是侵其德也屈折禮樂呴俞仁義以慰天下之心者此失其常然也天下有常然常然者曲者不以鉤直者不以繩圓者不以規方者不以矩附離不以膠漆約束不以纏索故天下誘然皆生而不知其所以生同焉皆得而不知其所以得故古今不二不可虧也則仁義又奚連連如膠漆纏索而遊乎道德之間爲哉使天下惑也夫小惑易方大惑易性何以知其然邪自虞氏招仁義以撓天下也天下莫不奔命於仁義是非以仁義易其性與故嘗試論之自三代以下者天下莫不以物易其性矣小人則以身殉利士則以身殉名大夫則以身殉家聖人則以身殉天下故此數子者事業不同名聲異號其於傷性以身爲殉一也臧與穀二人相與牧羊而俱亡其羊問臧奚事則挾筴讀書問穀奚事則博塞以遊二人者事業不同其於亡羊均也伯夷死名於首陽之下盜跖死利於東陵之上二人者所死不同其於殘生傷性均也奚必伯夷之是而盜跖之非乎天下盡殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人其殉一也則有君子焉有小人焉若其殘生損性則盜跖亦伯夷已又惡取君子小人於其間哉且夫屬其性乎仁義者雖通如曾史非吾所謂臧也屬其性於五味雖通如俞兒非吾所謂臧也屬其性乎五聲雖通如師曠非吾所謂聰也屬其性乎五色雖通如離朱非吾所謂明也吾所謂臧者非仁義之謂也臧於其德而已矣吾所謂臧者非所謂仁義之謂也任其性命之情而已矣吾所謂聰者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣夫不自見而見彼不自得而得彼者是得人之得而不自得其得者也適人之適而不自適其適者也夫適人之適而不自適其適雖盜跖與伯夷是同爲淫僻也余愧乎道德是以上不敢爲仁義之操而下不敢爲淫僻之行也
