  - {type: variant, offset: 16475, length: 410, content: 可不任者物也卑而不可不因者民也因其性而任之則治反其性而凌之則亂夫民物之所以卑而賤者不能因任故也是以任賤者貴因卑者尊此必然之符也治直吏反匿而不可不爲者事也夫事藏於彼故匿也彼各自爲故不可不爲但當因任耳匿女力反麤而不可不陳者法也法者妙事之迹也安可以迹麄而不陳妙事哉逺而不可不居者義也當乃居之所以爲逺親而不可不廣者仁也親則苦偏故廣乃仁耳節而不可不積者禮也夫禮節者患於係一故物物體之則積而周矣中而不可不高者德也事之下者雖中非德中而不可不高者德也中者順也順其性而高也一而不可不易者道也事之難者雖一非道况不一哉易以䜴反下注同神而不可不爲者天也執意不爲雖神非天况不神哉故聖人觀於天而不助順自爲而巳成於德而不累自然與高會也出於道而不謀不謀而一所以爲易會於仁而不恃恃則不廣薄於義而不積率性居逺非積也應於禮而不諱自然應禮非由忌諱接於事而不辭事以理接能否自任應動而動無所辭讓應憶升反齊於法而不亂御粗以妙故不亂也恃於民而不輕恃其自爲耳不輕用也因於, ZTDZ: 得逐萬}
