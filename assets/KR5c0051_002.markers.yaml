  - {type: variant, offset: 16492, length: 180, content: 反取諸身耳目不能以易任成功手足不能以代司致業故嬰兒之始生也不以目求乳不以耳向明不以足操物不以手求行豈百骸無定司形貌無素主而專由情以制之哉惡音烏下惡得同吠扶廢反分如字操七刀反惠子曰旣謂之人惡得無情未解形貌之非情也解音蟹莊子曰是非吾所謂情也以是非爲情則無是無非無好無惡者雖有形貌直是人耳情將安吾所謂無情者言人之不以好惡內傷其身任當而直前者非情也常因自然而不益生也止, ZTDZ: 皆出}
