  - {type: variant, offset: 3470, length: 6, content: 自生斯乃不生, ZTDZ: 可知邪仲尼曰可古猶今也冉求失問而退明日復見曰昔者吾問未有天地可知乎夫子曰可古猶今也昔日吾照然今日吾昧然敢問何謂也仲尼曰昔}
  - {type: variant, offset: 3477, length: 1, content: 生, ZTDZ: 昭然}
  - {type: variant, offset: 3479, length: 3, content: 故夫人, ZTDZ: 神者先受}
  - {type: variant, offset: 3483, length: 6, content: 果不足以神而, ZTDZ: 今之昧然也且又爲}
  - {type: punctuation, offset: 3487, content: /, id: KR5c0051_krp_003-bkkpn453}
  - {type: variant, offset: 3491, length: 2, content: 則神, ZTDZ: 者求邪無古無今無始無終未有子孫而有子孫可乎冉求未對仲尼曰已}
  - {type: variant, offset: 3494, length: 3, content: 功何足, ZTDZ: 未應矣不以生生死不以死死生死生}
  - {type: variant, offset: 3498, length: 23, content: 事何足恃哉在太極之先而不爲高在六極之下而不爲深, ZTDZ: 待邪皆有所一體有}
