  - {type: variant, offset: 11274, length: 440, content: 論語曰伯夷叔齊餓于首陽之下不言其死也而此云死焉亦欲明其守餓以終未必餓死也此篇大意以起高讓逺退之風故其風者雖貪冐之人乗天衢入紫庭猶時然中路而歎况其凢乎故夷許之徒足以當稷契對伊吕矣夫居山谷而弘天下者雖不俱爲聖佐不猶高於埃塵者乎其事雖難爲然其風少弊故可遺也曰夷許之弊安在曰許由之弊使人飾讓以求進遂至乎之噲也伯夷之風使虐之君得賜其毒而莫之敢亢也尹吕之弊使天下貪冐之雄敢行簒逆唯聖人無迹故無弊也以伊吕爲聖人之迹則伯夷叔齊亦聖人之迹也以伯夷叔齊非聖人之迹邪則伊吕之事亦非聖矣夫聖人因物之自行故無迹然則所謂聖者我本無迹故物得其迹迹得而強名聖則聖者乃無迹之名也支義反冐亡北反或亡報反下同契息列反噲音快簒初患又唐云或曰讓王之篇其章多重生而務光二三子自投于水何也荅曰莊書之興存乎反本反本之由先乎去䇿是以明讓王之一篇標傲世之逸志旨在不降以厲俗無厚身以全生所以時有重生之辭者亦歸弃榮之意耳深於塵務之爲弊也其次者雖復投粥保身而巳其全身尚高而超俗自逸寕投身於清泠終不屈於世累也此舊集音有柳復録之於義無當也莊子, HFL: ''}
