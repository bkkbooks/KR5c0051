  - {type: line-break, offset: 11567, content: '', id: KR5c0051_SBCK_002-32a03}
  - {type: variant, offset: 11567, length: 1, content: 師, ZTDZ: 不然者天門弗開矣孔子見老聃}
  - {type: variant, offset: 11569, length: 1, content: 況, ZTDZ: 語仁義老聃曰夫播穅眯曰則天地四方易位矣蚊虻噆膚則通昔不寐矣夫仁義憯然乃憤吾心亂莫大焉吾子使天下無失其朴吾子亦放風而動總德而立矣又奚傑然若負建鼓而求亡子者邪夫鵠不日浴而白鳥不日黔而黑黑白之朴不足以爲辯名譽之觀不足以爲廣泉涸魚相與處於陸相呴以濕相濡以沫}
  - {type: variant, offset: 11572, length: 1, content: 丘, ZTDZ: 相忘於江湖孔子見老聃歸三曰不談弟子問曰夫子見老聃亦將何規哉孔子曰吾乃今於是乎見龍龍合而成體散而成章乘乎雲氣而養乎陰陽予口張而不能嗋予又何規老聃哉子貢曰然則人固有尸居而龍見雷聲而淵默發動如天地}
  - {type: variant, offset: 11575, length: 5, content: 奚假魯國丘, ZTDZ: 賜亦可得而觀乎遂以孔子聲見老聃老聃方}
  - {type: variant, offset: 11581, length: 1, content: 引, ZTDZ: 倨堂而應徵曰予年運而往矣子將何以戒我乎子貢曰夫三王五帝之治}
  - {type: page-break, offset: 11581, content: '', id: KR5c0051_SJB_002-110593c}
