  - {type: variant, offset: 10409, length: 1122, content: 知彼有爲之至難弃夫自舉之至輕而取夫載彼之至重此世之常患也易以䜴反下同知音知惡烏路反禍重乎地莫之知避舉其性内則雖萬鈞而不覺其重也外物之雖重不盈緇銖有不勝任者矣爲内福也故福至輕爲外禍也故禍至重禍至重而莫之知避此世之大迷也知避舊本作寘云置也勝音升已乎巳乎臨人以德殆乎殆乎畫地而趨夫畫地而使人循之其迹不可掩矣有其巳而臨物與物不冥矣故大人不明我以耀彼而任彼之自明不德我以臨人而付人之自得故能彌貫萬物而玄同彼我泯然與天下爲一而內外同福也畫音迷陽迷陽無傷吾行迷陽猶亡陽也亡陽任獨不蕩於外則吾行全矣天下皆全其吾則凡稱吾者莫不皆全也迷陽司馬云迷陽伏陽也言詐狂吾行禍重乎地莫之知避舉其性内則雖萬鈞而不覺其重也外物之雖重不盈緇銖有不勝任者矣爲内福也故福至輕爲外禍也故禍至重禍至重而莫之知避此世之大迷也知避舊本作寘云置也勝音升已乎巳乎臨人以德殆乎殆乎畫地而趨夫畫地而使人循之其迹不可掩矣有其巳而臨物與物不冥矣故大人不明我以耀彼而任彼之自明不德我以臨人而付人之自得故能彌貫萬物而玄同彼我泯然與天下爲一而內外同福也畫音迷陽迷陽無傷吾行迷陽猶亡陽也亡陽任獨不蕩於外則吾行全矣天下皆全其吾則凡稱吾者莫不皆全也迷陽司馬云迷陽伏陽也言詐狂吾行禍重乎地莫之知避舉其性内則雖萬鈞而不覺其重也外物之雖重不盈緇銖有不勝任者矣爲内福也故福至輕爲外禍也故禍至重禍至重而莫之知避此世之大迷也知避舊本作寘云置也勝音升已乎巳乎臨人以德殆乎殆乎畫地而趨夫畫地而使人循之其迹不可掩矣有其巳而臨物與物不冥矣故大人不明我以耀彼而任彼之自明不德我以臨人而付人之自得故能彌貫萬物而玄同彼我泯然與天下爲一而內外同福也畫音迷陽迷陽無傷吾行迷陽猶亡陽也亡陽任獨不蕩於外則吾行全矣天下皆全其吾則凡稱吾者莫不皆全也迷陽司馬云迷陽伏陽也言詐狂吾行郤曲無傷吾足曲成其行各自足矣郤曲去逆反字書作只廣雅云只曲也山木自㓂也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也有用則與彼爲功無用則自全其生夫割肌膚以爲天下者天下之所知也使百姓不失其自全而彼我倶適者俛然不覺妙之在身也山木自冦也膏火自煎也煎子然反司馬云木生斧柄還自伐膏起火還自消崔云山有木故火焚也俛亡本反莊子內篇德充符第五德充於內應物於外外內玄合信若符命而遺其形骸也音義曰崔云此遺形弃知以德實之驗也魯有兀者王駘從之遊者與仲尼相若弟子多少敵孔子兀五忽反又音界李云刖是曰兀案篆書兀分字相似王駘音臺徐又音殆人姓名也從如字李才用反下同相若若如也弟子如夫子多少也常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯立不敎坐不議虚而往實而歸各自得而足也常季或云孔子弟子立不坐敎不議司馬云立不敎授坐不議論固有不言之教無形而心成者邪怪其形殘而心乃充足也夫心之全也遺身形忘五藏忽然獨往, ZTDZ: 尊樸素}
