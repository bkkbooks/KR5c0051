  - {type: variant, offset: 14607, length: 887, content: 國無幾何也去寡人而行寡人䘏焉若有亡也若無與樂是國也是何人者也仲尼曰丘也嘗使於楚矣適見子食於其死母者食乳也醜李云醜慙也崔云愧也幾居豈反樂音洛嘗使於楚矣使音所吏反本亦作遊本又直云嘗於楚矣本又作豚徒門反食音飮邑錦反注同舊如字簡文同少焉眴若皆棄之而走不見已焉爾不得焉爾夫生者以才德爲死而才德去矣故生者以失而走也故含德之厚比於赤子無往而不爲之赤子也則天下莫之害斯得而明巳故也情苟使扶又反章末注同崔本作不得復使矣云不復入直也形全猶足以爲爾採擇嬪御及燕爾新婚本以形好爲意者也故形之全也無以降至尊之情回貞女之操也好呼報反而況全德之人乎德全而物愛之冝矣今哀駘它未言而信無功而親使人授巳國唯恐其不受也是必才全而德不形者也哀公曰何謂才全仲尼曰死生存亡窮逹貧富賢與不肖毀譽飢渇寒暑是事之變命之行也其理故當不可逃也故人之生也非誤生也生之所有非妄有也天地雖大萬物雖多然吾之所遇適在於是則雖天地神明國家聖賢絶力至知而弗能違也故凡所不遇弗能遇也其所遇弗能不遇也凡所不爲弗能違也其所爲弗能不爲也故付之而自當矣譽音餘日夜相代乎前夫命行事變不舎晝夜推之不去留之不停故才全者隨所遇而任之舎音捨而知不能規乎其始者也夫始非知之所規而故非情之所留是以知命之必行事之必變者豈於終規始在新戀故哉雖有至知而弗能規也逝者之往吾柰之何哉故不足以滑和苟知性命之固當則雖死性窮逹千變萬化淡然自若而和理在身矣滑音骨淡徒蹔反不可入於靈府靈府者精神之宅也夫至足者不以憂患經神若皮外而過去使之和豫通而不失於兊苟使和性不滑靈府間豫則雖渉乎至變不失其兊然也兊徒外反李云恱也間音閑使日夜無郤泯然常任之郤去逆反李云閑也而與物爲春羣生之所頼也是接而生時於心者也順四時而倶化司馬云接至道而和氣在心也李云接萬物而施生順四時而倶作是之謂才全何謂德不形曰平者水停之盛也天下之平莫盛於停水也其可以爲法也無情至平故天下取正焉內保之而外不蕩也內保其明外無情爲玄鍳洞照與物無私故能全其平而行其法也爲于爲反德者成和之脩也事得以成物得以和謂之德也德不形者物不能離也無事不成無物不和此德之不形也是以天下樂推而不厭離力智反哀公異日以告閔子曰始也吾以南靣而君天下執民之紀而憂其死, ZTDZ: 辯}
