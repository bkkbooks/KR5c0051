  - {type: variant, offset: 8545, length: 1, content: 魚, ZTDZ: 無爲小人反殉而天無爲君子從天之埋若枉若直相而天極面觀四方與時消息若是若非執而圓機獨成而意與道徘徊無轉而行無成而義將失而所爲無赴而富無殉而成將棄而天比干剖心子胥抉眼忠之禍也直躬證父尾生溺死信之患也鮑子立乾申子}
