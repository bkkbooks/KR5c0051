  - {type: variant, offset: 9842, length: 783, content: 畢射曰弋弩牙曰機知音智下及注并下知詐皆同餌如志反罾音曾笱音鉤釣鉤也餌魚餌也廣雅云謂罔魚網也爾雅云婦之笱謂之罶削七妙反格古百反李云削格所以施羅網也子斜反罘本又作罦音浮爾雅云鳥罟謂之羅兎罟謂之罝罬謂之罦孚覆車也郭璞云今飜車也知詐漸毒頡滑堅白解垢同異之變多則俗惑於辯矣上之所多者下不能安其少也性少而以逐多則迷也漸毒李云漸漬之毒不覺深也崔云漸毒猶深害頡戸結反滑子八反頡滑謂難料理也崔云纒屈也李云骨滑稽也一云頡滑不正之語也解苦懈反垢苦豆反司馬崔云解垢隔角也或云詭曲之辭故天下毎毎大亂罪在於好知故天下皆知求其所不知而莫知求其所已知者不求所知而求所不知此乃巳效人而不止其分也毎毎李云猶皆昏也舎音捨下文同皆知非其所不善而莫知非其所已善者善其所善争尚之所由生也是以大亂故上悖日月之明下爍山川之精中墮四時之施惴耎之蟲肖翹之物莫不失其性甚矣夫好知之亂天下也夫吉㐫悔吝生於動也而知之所動誠能揺蕩天地運御羣生故君人者胡可以不忘其知哉悖李郭云必內反又音佩司馬云薄食也樂失約反崔云消也司馬云崩竭也崔向本作櫟同徐音藥墮許規反毀也施始䜴反惴本亦作端又作喘川兖反向音揣耎耳轉反崔云蠉動蟲也一云揣耎謂無足蟲肖翹音消下音祁饒反崔云肖翹植物也李云翾飛之属自三代以下者是已舍夫種種之機而恱夫役役之佞釋夫恬淡無爲而恱夫啍啍之意啍啍已亂天下矣啍啍以巳誨人也種種向章勇反李云謹慤貌一云淳厚也音恱下同役役李云貌一云有爲人也恬徒謙反惔徒暫反徐大敢反啍啍李之閏反又之純反郭音惇下同司馬云少智貌徐許彭反又許剛反向本作啍音亨崔本上句作啍啍少知而芒也一云啍啍壯徤之貌莊子外篇在宥第十一音義曰以義名篇聞在宥天下不聞治天下也宥使自在則治治之則亂也人之生也直莫之蕩則性命不過欲惡不爽在上者不能無爲上之所爲而民皆赴之故有誘慕好欲而民性矣故所貴聖王者非貴其能治也貴其無爲而任物之自爲也宥音又㝟也則治直吏反下治亂同惡烏路反好呼報反在之也者恐, ZTDZ: 受}
