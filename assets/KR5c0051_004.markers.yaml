  - {type: variant, offset: 15276, length: 417, content: 用傷則養心者其唯不用心乎汝徒處無爲而物自化墮爾形體吐爾聦明倫與物理與物皆不以存懷而闇付自然則無爲而自化矣墮音許規反大同乎涬溟與物無際涬戸項反又音幸溟亡頃反司馬云涬溟自然氣也解心釋神莫然無魂坐亡任獨萬物云云各復其根各復其根而不知不知而復乃眞復也渾渾沌沌終身不離渾沌無知而任其自復乃能終身不離其本也渾戸本反沌徒本反離力智反下及注皆同若彼知之乃是離之知而復知與復矣無問其名無闚其情物故自生闚問則失其自生也雲將曰天降朕以德示朕以黙躬身求之乃今也得知而不黙常自失也再拜稽首起辭而行世俗之人皆喜人之同乎己而惡人之異於已也同於已而欲之異於已而不欲者以出乎衆爲心也心欲出羣爲衆携也惡烏路反夫以出乎衆爲心者曷常出乎衆哉衆皆以出爲心故所以爲衆人也若我亦欲出乎衆則與衆無異而不能相出矣夫衆皆以相出爲心而我獨無往而不同乃大殊於衆而爲衆主也因衆以寧所聞不如衆技衆矣吾一人之所聞不如衆技多故因衆則寧也若不因衆則衆之千萬皆我敵也因衆以寧所聞因衆人之所聞見委而任之則, ZTDZ: 此}
