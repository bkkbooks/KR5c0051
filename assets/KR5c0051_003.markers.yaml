  - {type: variant, offset: 3585, length: 3, content: 高卑稱, ZTDZ: 厚民民之於利甚勤子有殺父臣有殺君正晝爲盜日中穴阫吾語汝大亂之本必生于堯舜之間其末存乎千世之後千世之後其必有人與人相食者}
  - {type: punctuation, offset: 3589, content: /, id: KR5c0051_krp_003-bkkpn462}
  - {type: variant, offset: 3589, length: 2, content: 内外, ZTDZ: 南榮趎蹴然正坐曰若趎之年者已長矣將惡乎託業以及此言邪庚桑子曰全汝形抱汝生}
  - {type: substitution, offset: 3589, original: 内, replacement: 內, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20757}}
  - {type: variant, offset: 3592, length: 0, content: '', ZTDZ: 使汝思慮營營若此三年則可以及此言也南榮趎曰目之與形吾}
  - {type: variant, offset: 3593, length: 1, content: 至, ZTDZ: 知其異也而盲}
  - {type: variant, offset: 3596, length: 5, content: 得以表裏名, ZTDZ: 能自見耳之與形吾不知其異}
