  - {type: variant, offset: 22215, length: 8, content: 二十八葉十行愴傖, ZTDZ: 僨驕而不可係者其唯人心乎昔者黄帝始以仁義攖人之心堯舜於是乎股無胈脛無毛以養天下之形愁其其五藏以爲仁義矜其血氣以規法度然猶有不勝也堯於是放讙兜於崇山投}
