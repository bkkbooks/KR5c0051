  - {type: variant, offset: 8674, length: 36, content: 賤其所寳則不加刑而自息也擿持赤反義與擲字同崔云猶投弃之也郭都革反李云刻也, HFL: ''}
  - {type: substitution, offset: 8677, original: 寳, replacement: 寶, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16794}}
  - {type: variant, offset: 8683, length: 70, content: 自息也擿持赤反義與擲字同崔云猶投弃之也郭都革反李云刻也焚符破璽而民朴鄙除矯詐之所頼者則無以行其姦巧掊斗折衡而民不爭夫小平乃大不平之所用也殫殘, ZTDZ: 笑}
