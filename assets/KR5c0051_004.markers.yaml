  - {type: variant, offset: 8630, length: 0, content: '', ZTDZ: 者唯爲之使神者徵之夫明之不勝神也乆矣而愚者恃其所見入於人其功外也不亦悲乎雜篇天下第三十三天下之治方術者多矣皆以其有爲不可加矣古之所謂道術者果惡乎在曰無乎不在曰神何由降明何由出聖有所生王有所成皆原於一不離於宗謂之天人不離於精謂之神人不離於眞謂之至人以天爲宗以德爲本以道爲門兆於變化謂之聖人以仁爲恩以義爲理以禮爲行以樂爲和薰然慈仁謂之君子以法爲分以名爲表以參爲驗以稽爲決其數一二三四是也百官以此相齒以事爲常以衣食爲主蕃息蓄藏老弱孤寡爲意皆有以養民之理也古之人其備乎配神明醇天地育萬物和天下澤及百姓明於本數係於末度六通四闢小大精粗其運無乎不在其明而在數度者舊法世傳之史尚多有之其在於詩書禮樂者鄒魯之士搢紳先生多能明之詩以道志書以道事禮以道行樂以道和易以道陰陽春秋以道名分其數散於天下而設於中國者百家之學時或稱而道之天下大亂賢聖不明道德不一天下多得一察焉以自好譬如耳曰鼻口皆有所明不能相通猶百家衆技也皆有所長時有所用雖然不該不偏一曲之士也判天地之美析萬物之理察古人之全寡能備於天地之美稱神明之容是故内聖外王之道闇而不明鬱而不發天下之人各爲其所欲焉以自爲方悲夫百家往而不反必不合矣後世之學者不幸不見天地之純古人之大體道術將爲天下裂不侈於後世不靡於萬物不暉於數度以繩墨自矯而備世之急古之道術有在於是者墨翟禽滑釐聞其風而悦之爲之太過已之大循作爲非樂命之曰節用生不歌死無服墨子氾愛兼利而非鬭其道不怒又好學而博不異不與先王同毁古之禮樂黄帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟雍之樂武王周公作武古之喪禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重今墨子獨生不歌死不服桐棺三寸而無槨以爲法式以此教人恐不愛人以此自行固不愛己末敗墨子道雖然歌而非歌哭而非哭樂而非樂是果類乎其生也勤其死也薄其道大觳使人憂使人悲其行難爲也恐其不可以爲聖人之道反天下之心天下不堪墨子雖獨能任柰天下何離於天下其去王也遠矣墨子稱道曰昔者禹之湮洪水决江河而通四夷九州也名川三百支川三千小者無數禹親自操橐耜而九雜天下之川腓無肢脛無毛沐甚雨櫛疾風置萬國禹大聖也而形勞}
  - {type: page-break, offset: 8630, content: '', id: KR5c0051_SJB_004-110630a}
  - {type: page-break, offset: 8630, content: '', id: KR5c0051_SJB_004-110630b}
  - {type: page-break, offset: 8630, content: '', id: KR5c0051_SJB_004-110630c}
  - {type: punctuation, offset: 8633, content: (, id: KR5c0051_krp_004-bkkpn792}
  - {type: variant, offset: 8633, length: 12, content: 示利器於天下所以資其盗賊, HFL: ''}
  - {type: variant, offset: 8633, length: 3, content: 示利器, ZTDZ: 如此使後世之墨者多以裘褐爲衣以跂蹻爲服日夜不休以自苦爲極曰不能如此非禹之道也不足謂墨相里勤之弟子五侯之徒南方之墨者苦獲已齒鄧陵子之屬俱誦墨經而倍譎不同相謂别墨以堅白同異之辯相訾以觭偶不仵之辭相應以巨子爲聖人皆願爲之尸冀得爲其後世至今不决墨翟禽滑釐之意則是其行則非也將使後世之墨者必自苦以腓無肢脛無毛相進而已矣亂之上也治之下也雖然墨子眞天下之好也將求之不得也雖枯槁不舍也才士也夫不累於俗不飾於物不荀於人不忮於衆願天下之安寧以活民命人我之養畢足而止以此白心古之道術有在於是者宋鈃尹文聞其風而悅之作爲華山之冠以自表接萬物以别宥爲始語心之容命之曰心之行以聏合驩以調海内請欲置之以爲主見侮不辱救民之鬭禁攻寢兵救世之戰以此周行天下上說下教雖天下不取强聒而不舍者也故曰上下見厭而强見也雖然其爲人太多其自爲太少曰請欲固置五升之飯足矣先生恐不得飽弟子雖飢不忘天下日夜不休曰我必得活哉圖傲乎救世之士哉曰君子不爲苛察不以身假物以爲無益}
  - {type: page-break, offset: 8633, content: '', id: KR5c0051_SJB_004-110631a}
  - {type: punctuation, offset: 8639, content: /, id: KR5c0051_krp_004-bkkpn793}
  - {type: variant, offset: 8639, length: 0, content: '', ZTDZ: 者明之不如已也以禁攻寢兵爲外以情欲寡淺爲内其小大精粗其行適至是而止公而不黨易而無私决然無主趣物而不兩不顧於慮不謀於知於物無擇與之俱往古之道術有在於是者彭蒙田駢愼到聞其風而悅之齊萬物以爲首曰天能覆之而不能載之地能載之而不能覆之大道能包之而不能辯之知萬物皆有}
  - {type: variant, offset: 8640, length: 5, content: 以資其盗賊, ZTDZ: 可皆有所不可}
  - {type: substitution, offset: 8643, original: 盗, replacement: 盜, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19616}}
