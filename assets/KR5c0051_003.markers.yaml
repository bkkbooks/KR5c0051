  - {type: variant, offset: 3567, length: 0, content: '', ZTDZ: 隱其軀而㜸狐爲之祥且夫尊賢授能先善與利自古堯舜以然而況畏壘之民乎夫子亦聽矣庚桑子曰小子來夫函車之獸介而離山則}
  - {type: variant, offset: 3568, length: 1, content: 在, ZTDZ: 免于罔罟之患吞舟之魚碭}
  - {type: variant, offset: 3570, length: 4, content: 所在皆無, ZTDZ: 失水則蟻能苦之故鳥獸不厭高魚鼈不厭深夫全其形生之人藏其身}
