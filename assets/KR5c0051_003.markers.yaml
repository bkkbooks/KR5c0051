  - {type: variant, offset: 6448, length: 9, content: 人人耳人耳唯願爲人, ZTDZ: 威}
  - {type: punctuation, offset: 6449, content: (, id: KR5c0051_krp_003-bkkpn730}
  - {type: variant, offset: 6449, length: 81, content: 人耳人耳唯願爲人也亦猶金之踊躍世皆知金之不祥而不能任其自化夫變化之道靡所不遇今一遇人形豈故爲哉生非故爲時自生耳矜而有之不亦妄乎且如字徐子餘反鏌音莫鋣以嗟反鏌鋣劒名, HFL: ''}
  - {type: substitution, offset: 6455, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 6458, length: 358, content: 亦猶金之踊躍世皆知金之不祥而不能任其自化夫變化之道靡所不遇今一遇人形豈故爲哉生非故爲時自生耳矜而有之不亦妄乎且如字徐子餘反鏌音莫鋣以嗟反鏌鋣劒名今一以天地爲大鑪以造化爲大冶往而不可哉人皆知金之有係爲不祥故明巳之無異於金則所係之情可解可解則無不可也鑢劣奴反於音烏解如字下同成然寐蘧然覺寐寤自若不以死生累心成然如寐崔同李云成然縣解之貌本或作成音盛簡文云當作城本又作晎呼括反視高貌本亦作俄然蘧然李音渠崔本作據又其據反遽然句形之貌覺古孝反向崔本此下更有發然汀出一句云無係則侓液通也崔本作衛利通不以化爲人也子桑戸孟子反子琴張三人相與友曰孰能相與於無相與相爲於無相爲夫體天地冥而化者雖手足異任五藏殊管未嘗相與而百節同和斯相與於無相與也未嘗相爲而表裏俱濟斯相爲於無相爲也若乃役其心志以恤手足運其股肱以營五藏則相營愈篤而外內愈困矣故, ZTDZ: ''}
