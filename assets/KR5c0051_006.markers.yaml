  - {type: variant, offset: 13025, length: 578, content: 此言一氣而萬形有變化而無死生也得水則爲㡭此古絶字徐音絶今讀音繼司馬本作繼云萬物雖有兆朕得水上氣乃相繼而生也本或作斷又作續斷得水土之際則爲鼃戸蝸反蠙歩田反徐我賢反郭父因反又音賔李婢軨反之衣司馬云言物根在水土際布在水中就水上視不見抄之可得如張緜在水中楚人謂之鼃蠙之衣生於陵屯司馬音徒門反云阜也郭音純則爲陵舄音昔司馬云言物因水成而陸産生於陵屯化作車前改名陵舄也一名澤舄隨燥溼變也然不知其祖言物化無常形也人之死也亦或化爲草木草木之精或化爲人也陵馬得鬰栖則爲烏足司馬云鬰栖蟲名烏足草名生水邉也言鬰栖在陵舄之中則化爲烏足也李云鬰栖糞壤也言陵舄在糞化爲烏足也烏足之根爲蠐音齊螬音曹司馬本作螬䗲云蝎也其葉爲胡蝶音牒司馬云胡蝶蛺蝶也草化爲蟲蟲化爲草夫始有極胡蝶胥也一名胥也化而爲蟲生放竈下司馬云得氣而生也其狀若脫它括反司馬音恱云新出皮恱好也鴝其倶反掇丁活反乾音干沫音末李云口中汁也斯彌李云蟲也食如字司馬本作蝕醯許反李音濠司馬云蝕醯若酒上蠛蠓也蠛音眠結反蠓音無孔反頥以之反輅音路一音洛黃軦音况徐李休往反司馬云頥輅黃軦皆蟲名九猷音由李云九宜爲乆乆老也猷蟲名也瞀莫豆反又莫住反又亡角反芮如銳反徐如悅反腐音輔蠸音權郭音歡司馬云亦蟲名也爾雅云一名守一名忿䑕也羊奚比毗志反箰息尹反司馬云羊奚草名根似蕪菁與乆竹比合而爲物皆生於非也青寧司馬云蟲名青寧生程李云未聞程生馬馬生人俗本多誤故具録之, HFL: ''}
