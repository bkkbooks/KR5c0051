front:
  text: 眞人其寢不夢其覺無憂其食不甘其息深深眞人之息以踵衆人之息以喉屈服者其嗌言若哇其嗜欲深者其天機淺古之眞人不知悅生不知惡死其出不訢其入不距翛然而往翛然而來而已矣不忘其所始不求其所終受而喜之忘而復之是之謂不以心捐道不以人助天是之謂眞人若然者其心志其容寂其顙頯凄然似秋煖然似春喜怒通四時與物有宜而莫知其極故聖人之用兵也亡國而不失人心利澤施乎萬世不爲愛人故樂通物非聖人也有親非仁也天時非賢也利害不通非君子也行名失已非士也亡身不眞非役人也若狐不偕務光伯夷叔齊箕子胥餘紀他申徒狄是役人之役適人之適而不自適其適者也古之眞人其狀義而不朋若不足而不承與乎其觚而不竪也張乎其虚而不華也邴邴乎其似喜乎崔乎其不得已乎滀乎進我色也與乎止我德也厲乎其似世乎謷乎其未可制也連乎其似好閉也悗乎忘其言也以刑爲體以禮爲翼以知爲時以德爲循以刑爲體者綽乎其殺也以禮爲翼者所以行於世也以知爲時者不得已於事也以德爲循者言其與有足者至於丘也而人眞以爲勤行者也故其好之也一其弗好之也一其一也一其不一也一其一與天爲徒其不一與人爲徒天與人不相勝也是之謂眞人死生命也其有夜旦之常天也人之有所不得與皆物之情也彼特以天爲父而身猶愛之而沉其卓乎人特以有君爲愈乎已而身猶死之而況其眞乎泉涸魚相與處於陸相呴以濕相濡以沫不如相忘於江湖與其譽堯而非桀也不如兩忘而化其道夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以喜吾死也夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也藏小大有宜猶有所遯若夫藏天下於天下而不得所遯是怕物之大情也特犯人之形而猶喜之若人之形者萬化之未始有極也其爲樂可勝計邪故聖人將遊於物之所不得遯而皆存善夭善老善始善終人猶效之又況萬物之所係而一化之所待乎夫道有情有信無爲無形可傳而不可受可得而不可見自本自根未有天地自古以固存神鬼神帝生天生地在太極之先而不爲高在六極之下而不爲深先天地生而不爲乆長於上古而不爲老狶韋氏得之以挈天地伏犧氏得之以襲氣母維斗得之終古不忒日月得之終古不息堪坏得之以襲崑崙馮夷得之以遊大川肩吾得之以處太山黄帝得之以登雲天顓頊得之以處玄宫禺强得之立乎北極西王母得之坐乎少廣莫知其始莫知其終彭祖得之上及有虞下及五伯傳說得之以相武丁奄有天下乘東維騎箕尾而比於列星南伯子葵問乎女偊曰子之年長矣而色若孺子何也曰吾聞道矣南伯子葵曰道可得學耶曰惡惡可子非其人也夫卜梁倚有聖人之才而無聖人之道我有聖人之道而無聖人之才吾欲以教之庶幾其果爲聖人乎不然以聖人之道告聖人之才亦易矣吾猶守而告之叁日而後能外天下已外天下矣吾又守之七日而後能外物已外物矣吾又守之九日而後能外生已外生矣而後能朝徹朝徹而後能見獨見獨而後有無古今無古今而後能入於不死不生殺生者不死生生者不生其爲物無不將也無不迎也無不毁也無不成也其名爲攖寧攖寧也者攖而後成者也南伯子葵曰子獨惡乎聞之曰聞諸副墨之子副墨之子聞諸洛誦之孫洛誦之孫聞之瞻明瞻明聞之聶許聶許聞之需役需役聞之於謳於謳聞之玄冥玄冥聞之參寥參寥聞之疑始子祀子輿子犁子來四人相與語曰孰能以無爲首以生爲脊以死爲尻孰知死生存亡之一體者吾與之友矣四人相視而笑莫逆於心遂相與爲友俄而子輿有病子祀往問之曰偉哉夫造物者將以子爲此拘拘也曲僂發背上有五管順隱於齊肩高於頂句贅指天陰陽之氣有沴其心閒而無事跰𨇤而鑑于井曰嗟乎夫造物者又將以予爲此拘拘也子祀曰汝惡之乎曰亡予何惡浸假而化予之左臂以爲雞予因以求時夜浸假而化予之右臂以爲彈予因以求鴞炙浸假而化予之尻以爲輪以神爲馬予因而乘之豈更駕哉且夫得者時也失者順也安時而處順哀樂不能入也此古之所謂縣解也而不能自解者物有結之且夫物不勝天久矣吾又何惡焉俄而子來有病喘喘然將死其妻子環而泣之犁徃問之曰叱避無恒化倚其户與之語曰偉哉造化又將奚以汝爲將奚以汝適以汝爲鼠肝乎以汝爲蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅於父母彼近吾死而我不聽我則捍矣彼何罪焉夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也今之大冶鑄金金踴躍曰我且必爲鏌鋣大冶必以爲不祥之金今一犯人之形而曰人耳人耳夫造化者必以爲不祥之人今一以天地爲大鑪以造化爲大冶惡乎往而不可哉成然寐蘧然覺子桑户孟子反子琴張三人相與友曰孰能相與於與相與相爲於無相爲孰能登天遊霧撓挑無極相忘以生無所終窮二人相視而笑莫逆於心遂相與友莫然有間而子桑户死未葬孔子聞之使子貢往待事焉或編曲或鼓琴相和而歌曰嗟來桑户乎嗟來桑户乎而已反其眞而我猶爲人猗子貢趨而進曰敢問臨尸而歌禮乎二人相視而笑曰是惡知禮意子貢反以告孔子曰彼何人者邪脩行無有而外其形骸臨尸而歌顔色不變無以命之彼何人者邪孔子曰彼遊方之外者也而丘遊方之内者也外内不相及而丘使汝往弔之丘則陋矣彼方且與造物者爲人而遊乎天地之一氣彼以生爲附贅縣疣以死爲决疣潰癰夫若然者又惡知死生先後之所在假於異物託於同體忘其肝膽遺其耳目反覆終始不知端倪芒然彷徨乎塵垢之外逍遥乎無爲之業彼又惡能憒憒然爲世俗之禮以觀衆人之耳目哉子貢曰然則夫子何方之依曰丘天之戮民也雖然吾與汝共之子貢曰敢問其方孔子曰魚相造乎水人相造乎道相造乎水者穿池而養給相造乎道者無事而生定故曰魚相忘乎江湖人相忘乎道術子貢曰敢問畸人曰畸人者畸於人而侔於天故曰天之小人人之君子人之君子天之小人也顔回問仲尼曰孟孫才其母死哭泣無涕中心不感居喪不哀無是三者以善喪蓋魯國固有無其實而得其名者乎回壹怪之仲尼曰夫孟孫氏盡之矣進於知矣唯簡之而不得夫已有所簡矣孟孫氏不知所以生不知所以死不知就先不知就後若化爲物以待其所不知之化已乎且方將化惡知不化哉方將不化惡知已化哉吾特與汝其夢未始覺者邪且彼有駭形而無損心有旦宅而無情死孟孫氏特覺人哭亦哭是自其所以乃且也相與吾之耳矣庸詎知吾所謂吾之乎且汝夢爲鳥而厲乎天夢爲魚而没於淵不識今之言者其覺者乎其夢者乎造適不及笑獻笑不及排安排而去化乃入於寥天一意而子見許由許由曰堯何以資汝意而子曰堯謂我汝必躬服仁義而明言是非許由曰而奚來爲軹夫堯旣已黥汝以仁義而劓汝以是非矣汝將何以遊夫遥蕩恣瞧轉徒之塗乎意而子曰雖然吾願遊於其藩許由曰不然夫盲者無以與乎眉目顔色之好瞽者無以與乎青黄黼黻之觀意而子曰夫無莊之失其美據梁之失其力黄帝之亡其知皆在鑪錘之間耳庸詎知夫造物者之不息我黥而補我劓使我乘成以隨先生邪許由曰噫未可知也我爲汝言其大略吾師乎吾師乎𩐎萬物而不爲義澤及萬世而不爲仁長於上古而不爲老覆載天地刻彫衆形而不爲巧此所遊已顔回曰回益矣仲尼曰何謂也曰回忘仁義矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也它日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹴然曰何謂坐忘顔回曰墮肢體黜聰明離形去知同於大通此謂坐忘仲尼曰同則無好也化則無常也而果其賢乎丘也請從而後也子輿與子桑友而淋雨十日子輿曰子桑殆病矣裹飯而往食之至子桑之門則若歌若哭鼓琴曰父邪母邪天乎人乎有不任其聲而趨舉其詩焉子輿入曰子之歌詩何故若是曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其爲之者而不得也然而至此極者命也夫
