  - {type: variant, offset: 11378, length: 5, content: 任人之自爲, HFL: ''}
  - {type: variant, offset: 11378, length: 1, content: 任, ZTDZ: 絜廉善士也其於不己若者不比之又一聞人之過終身不忘使之治國上且鉤乎君下且逆乎民其得罪於君也將弗乆矣公曰然則孰可對曰勿已則隰朋可其爲人也上忘而下畔愧不若黄帝而哀不己若者以德分人謂之聖以財分人謂之賢以賢臨人未有得人者也以賢下人未有不得人者也其於國有不聞也其於家有不見也勿已則隰朋可吴王浮于江登乎狙之山衆狙見之恂然棄而走逃於深蓁有一狙焉委蛇攫搔見巧乎王王射之敏給搏捷矢王命相者趨射之狙執死顧謂其友顔不疑曰之狙也伐其巧恃其便以敖予以至此殛也戒之哉嗟乎無以汝色驕人哉顔不疑歸而師董梧以鋤其色去樂辭顯三年而國人稱之南伯子綦隱几而坐仰天而嘘顔成子入見曰夫子物之尤也形固可使若槁骸心固可使若死灰乎曰吾嘗居山穴之中矣當是時也田禾一覩我而齊國之衆三賀之我必先之彼故知之我必賣之彼故鬻之若我而不有之彼惡得而知之若我而不賣之彼惡得而鬻之嗟乎我悲}
