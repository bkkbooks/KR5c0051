  - {type: variant, offset: 2589, length: 139, content: 夫鶉居而鷇食鳥行而無章者何惜而不殉哉故與世常冥唯變所適其迹則殉世之迹也所遇者或時有槃夷秃脛之變其迹則傷性之迹也然而雖揮斥入極而神氣無變手足槃夷而居形者不擾則奚殉哉無狥也故乃不殉其所殉而迹與世同殉也殉辭俊反徐辭倫反司馬云營也崔云殺身從之曰殉鶉音純又音敦鷇口豆反秃吐木反揮音輝斥音赤, HFL: ''}
