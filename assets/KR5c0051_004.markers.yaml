  - {type: variant, offset: 8590, length: 0, content: '', ZTDZ: 造物者之報人也不報其人而報其人之天彼故使彼夫人以己爲有以異於人以賤其親齊人之井飲者相捽也故日今之世皆緩也自是有德者以不知也而況有道者乎古者謂之遁天之刑}
