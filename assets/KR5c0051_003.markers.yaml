  - {type: variant, offset: 13351, length: 307, content: 危反蛇以支反委蛇至順之貌不知其誰何汎然無所係也因以爲弟靡因以爲波流故逃也變化頽靡世事波流無往而不因也夫至人一耳然應世變而時動故相者無所措其目自失而走此明應帝王者無方也爲弟徐音頽文回反靡弟靡不窮之貌崔云猶遜伏也波流如字崔本作波隨云常隨從之然後列子自以爲未始學而歸三年不出爲其妻爨食豕如食人忘貴賤也爲于僞反爨七判反食音嗣下同於事無與親唯所遇耳雕復朴去華取實竹角反復符六反塊然獨以其形立外飾去也塊徐苦怪反又苦對反紛而封哉雖動而眞不散也紛芳云反崔云亂貌封崔本作戎云封戎散亂也一以是終使物各自終無爲名尸因物則物各自當其名也無爲謀府使物各自謀也無爲事任付物使各自任無爲知主無心則物各自主其知也知音智註同體盡無窮因天下之自爲故馳, ZTDZ: ''}
