  - {type: variant, offset: 0, length: 7901, content: 南華眞經卷第五郭象子玄註陸德明音義莊子外篇天地第十二音義曰以事名篇天地雖大其化均也均於不爲而自化也天地釋名云天顯也高顯在上也又坦也坦然高逺也地底也其體低下載萬物也體統云天地者元氣之所生萬物之祖也易云元氣分清輕上爲天濁重下爲地萬物雖多其治一也一以自得爲治治直吏反註同下官治并註亦同人卒雖衆其主君也天下異心無心者主也卒尊忽反君原於德而成於天以德爲原無物不得得者自得故得而不謝所以成天原原本也故曰玄古之君天下無爲也天德而已矣任自然之運動以道觀言而天下之君正無爲者自然爲君非邪也邪似嗟反本又作爲以道觀分而君臣之義明各當其分則無爲位上有爲位下也以道觀能而天下之官治官各當其所能則治矣以道汎觀而萬物之應備無爲也則天下各以其無爲應之故通於天地者德也萬物莫不皆得則天地通行於萬物者道也道不塞其所由則萬物自得其行矣上治人者事也使人人自得其事能有所藝者技也技者萬物之末用也技其綺反註下同技兼於事事兼於義義兼於德德兼於道道兼於天夫本末之相兼猶手臂之相包故一身和則百節皆適天道順則本末俱暢故曰古之畜天下者無欲而天下足無爲而萬物化淵靜而百姓定記曰通於一而萬事畢無心得而神服一無爲而羣理都舉記書名也云老子所作夫子曰夫道覆載萬物者也洋洋乎大哉君子不可以不刳心焉有心則累其自然故當刳而去之夫子司馬云莊子也一云老子也此兩夫子曰元嘉本皆爲別章崔本亦爾覆芳冨反洋洋音羊又音詳刳口吳反又口侯反崔本作軒云寛恱之貌去起吕反無爲爲之之謂天不爲此爲而此爲自爲乃天道無爲言之之謂德不爲此言而此言自言乃眞德愛人利物之謂仁此任其性命之情也不同同之之謂大萬物萬形各止其分不引彼以同我乃成大耳行不崖異之謂寛玄同彼我則萬物自容故有餘有萬不同之謂冨我無不同故能獨有斯萬故執德之謂紀德者人之綱要德成之謂立非德而成者不可謂立循於道之謂備夫道非偏物也循音旬或作脩不以物挫志之謂完內自得也挫竹卧反君子明於此十者則韜乎其事心之大也心大故事無不容也韜吐刀反廣雅云載也沛乎其爲萬物逝也德澤滂沛任萬物之自往也沛普貝反字林云流也逝崔本逝作啓云開也滂普旁反若然者藏金於山藏珠於淵不貴難得之物不利貨財乃能忘我况貨財乎不近貴冨自來耳心常去之逺也近附近之近不樂壽不哀夭所謂縣解樂音洛縣解上音玄下音蟹不榮通不醜窮忘壽夭於胸中况窮通之間哉不拘一世之利以爲已私分皆委之萬物也不以王天下爲巳處顯忽然不覺榮之在身王于况反下王德並同顯則明不顯則黙而巳萬物一府死生同狀蛻然無所在也蛻始銳反又音帨夫子曰夫道淵乎其居也漻乎其淸也金石不得無以鳴聲由寂彰漻李良由反徐力蕭反廣雅下巧反云清貌故金石有聲不考不鳴因以喻體道者物感而後應也萬物孰能定之應感無方夫王德之人素逝而恥通於事任素而往耳非好通於事也好呼報反立之本原而知通於神本立而知不逆知音智註同故其德廣任素通神而後彌廣其心之出有物採之物採之而後出耳非先物而唱也故形非道不生生非德不明存形窮生立德明道非王德者邪蕩蕩乎忽然出勃然動而萬物從之乎此謂王德之人忽勃皆無心而應之貌動出無心故萬物從之斯蕩蕩矣故能存形窮生立德明道而成王德也視乎冥冥聽乎無聲冥冥之中獨見曉焉無聲之中獨聞和焉若夫視聽而不之於寂則有闇昧而不和也故深之又深而能物焉窮其原而後能物物神之又神反司馬云喫詬多力也乃使象㒺象㒺得之黃帝曰異哉象㒺乃可以得之乎明得眞者非用心也象罔然即眞也堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰衣堯問於許由曰齧缺可以配天乎謂爲天子倪徐五反音披吾藉王倪以要之欲因其師以要而使之要一遥反注同許由曰殆哉圾乎天下圾危也圾本又作岌五急反又五合反郭李云危也齧缺之爲人也聦明叡知給數以敏其性過人聦敏過人則使人之屢傷於人也數音朔而又乃以人受天用知以求復其自然彼審乎禁過而不知過之所由生夫過生於聦知而又後知以禁之其過彌甚矣故曰無過在去知不在於強禁去起吕反強其文反與之配天乎彼且乘人而無天若與之天下彼且遂使後世任知而失眞方且本身而異形夫以萬物爲本則羣變可一而異形可同斯迹也將遂使後世由已以制物則萬物乖矣且如字凡言方且者言方將有所爲也方且尊知而火馳賢者當位於前則知見尊於後奔競而火馳也方且爲緒使將興後世事役之端方且爲物絯將遂使後世拘牽而制物絯徐戸隔反廣雅公才反云束也與郭義同今用廣雅音方且四顧而物應將遂使後世麾以動物令應工務令力呈反方且應衆宜將遂使後世不能忘善而利仁以應冝也方且與物化將遂使後世與物相逐而不能自得於內而未始有恒此皆盡當時之宜也然今日受其德而明日承其弊矣故曰未始有恒夫何足以配天乎雖然有族有祖其事可得而祖效可以爲衆父而不可以爲衆父父衆父父者所以迹也治亂之率也言非但治主乃爲亂率治直吏反注同率色反注同又色律反北靣之禍也夫桀紂非能殺賢臣乃頼聖知之迹以禍之南靣之賊也田恒非能殺君乃資仁義以賊之殺音試本又作弑音同堯觀乎華華封人曰嘻聖人請祝聖人使聖人壽堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰壽富多男子人之所欲也女獨不欲何邪堯曰多男子則多懼富則多事壽則多辱是三者非所以養德也故辭封人曰始也我以女爲聖人邪今然君子也天生萬民必授之職多男子而授之職則何懼之有物皆得所而志定也華胡化反又胡花反司馬云地名也封人司馬云守封疆人也嘻音熈祝之又反又州六反女音汝後同富而使人分之則何事之有寄之天下故無事也夫聖人鶉居無意而其安也鶉音淳居鶉居謂無常處也又云如鶉之居猶言野處而鷇食仰物而足鷇口豆反食爾雅云主哺鷇鷇食者言仰物而足也鳥行而無彰率性而動非常迹也天下有道則與物皆昌猖狂行而自大方也天下無道則脩德就間雖湯武之事苟順天應人未爲不間也故無爲而無不爲者非不間也間音閑注同千歲厭世去而上僊夫至人極壽命之長任窮理之變其生也天行其死也物化故云厭世而上僊也僊音仙乗彼白雲至于帝鄕氣之散無不之三患莫至身常無殃則何辱之有封人去之堯隨之曰請問封人曰退已堯治天下伯成子高立爲諸侯堯授舜舜授禹伯成子高辭爲諸侯而耕禹往見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立爲諸侯堯授舜舜授予而吾子辭爲諸侯而耕敢問其故何也子高曰昔堯治天下不賞而民勸不罰而民畏今子賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣夫子闔行邪無落吾事俋俋乎耕而不顧夫禹時三聖相承治成德備功美漸去故史籍無所載仲尼不能間是以雖有天下而不與焉斯乃有而無之也故考其時而禹爲最優計其人則雖三聖故一堯耳時無聖人故天下之心俄然歸啓夫至公而居當者付天下於百姓取與之非巳故失之不求得之不辭忽然而往侗然而來是以受非毀於廉節之士而名列於三王未足怪也莊子因斯以明堯之弊弊起於堯而釁成於禹况後世之無聖乎逺迹於子高便棄而不治將以絶聖而反一遺知而寧極耳其實則未聞也夫莊子之言不可以一詰或以黃帝之迹秃堯舜之脛豈獨貴堯而賤禹哉故當遺其所而錄其絶聖棄知之意焉伯成子高通變經云老子從此天地闢以來吾身一壬三百變後世得道伯成子高是也闔本亦作盍胡臘反落猶發也俋俋徐於執反徐直立反李云耕貌一云耕人行貌又音秩又於十反字林云勇壯貌治直吏反間間厠之間與音預同音洞又音同泰初有無無有無名無有故無所名泰初易云氣之始也一之所起有一而未形一者有之至妙者也至妙故未有物理之形耳夫一之所起起於至一非起於無也然莊子之所以屢稱無合於喙鳴喙丁豆反又充芮喜穢二反喙鳴合與天地爲合天地亦無心而自動其合緡緡若愚若昬坐忘而自合耳非照察以合之緡咸巾反是謂玄德同乎大順德玄而所順者大矣夫子問于老聃曰有人治道若相放可不可然不然若相放效強以不可爲可不然爲然斯矯其性情也夫子仲尼也相放甫狂反注同本亦作方如字又甫往反強其兩反辯者有言曰離堅白若縣㝢言其高顯易見縣音玄㝢音字司馬云辯明白若縣室在人前也易以䜴反若是則可謂聖人乎老聃曰是胥易技係勞形心者也執留之狗成思猨狙之便自山林來言此皆失其常然也技其綺反執留如字本又作留音同一本作狸亦如字司馬云狸竹䑕也一云執留之狗謂有能故留係成愁思也猨音狙七徐反便婢靣反徐扶靣反司馬云言便捷見捕丘予告若而所不能聞與而所不能言凡有首有趾無心無耳者衆首趾猶始終也無心無耳言其自化有形者與無形無狀而皆存者盡無言有形者善變不能與無形無狀者並存也故善治道者不以故自持也將順日新之化而巳其動止也其死生也其廢起也此又非其所以也此言動止死生盛衰廢興未始有恒皆自然而然非其所用而然故放之而自得也有治在人不在乎主自用忘乎物忘乎天其名爲忘巳天物皆忘非獨忘巳復何所有哉復扶又反忘已之人是之謂入於天人之所不能忘者巳也巳猶忘之又奚識哉斯乃不識不知而冥於自然將閭葂見季徹曰魯君謂葂也曰請受教辭不獲命旣已告矣未知中否請嘗薦之吾謂魯君曰必服恭儉抜出公忠之屬而無阿私民孰敢不輯季徹局局然曰若夫子之言於帝王之德猶螳蜋之怒臂以當車軼則必不勝任矣必服恭儉非忘儉而儉也抜出公忠非忘忠而忠也故雖無阿私而不足以勝矯詐之任也將一本作蔣閭萬於反葂字亦作莬音免又音晚郭音同蔣閭莬人姓名也一云姓蔣閭名葂或云姓蔣名閭葂也季徹人姓名也蓋季氏之族魯君或云定公中丁仲反輯音集爾雅曰和也又側立反郭思魚反局局其玉反一云大之貌螳蜋音堂郎軼音轍勝音升注同且若是則其自爲處危其觀臺此皆自處高顯若臺觀之可覩也處其據反本又作處觀古亂反注同多物將往將使物不止於本性之分而矯自多以附之投迹者衆亢足投迹不安其本歩也蔣閭葂覤覤然驚曰葂也汒若於夫子之所言矣雖然願先生之言其風也季徹曰大聖之治天下也搖蕩民心使之成教易俗舉滅其賊心而皆進其獨志若性之自爲而民不知其所由然夫志各有趣不可相效也故因其自揺而揺之則雖揺而非爲也因其自蕩而蕩之則雖蕩而非動也故其賊心自㓕獨志自進教成俗易悶然無迹履性自爲而不知所由皆云我自然矣舉皆也覤許逆反又生責反或云驚懼之貌汒本或作芒武剛反郭武蕩反悶音門若然者豈兄堯舜之教民溟涬然弟之哉溟涬甚貴之謂也不肯多謝堯舜而推之爲兄也兄元嘉本作足溟亡頂反涬戸頂反欲同乎德而心居矣居者不逐於外也心不居則德不同也子貢南遊於楚反於過漢隂見一丈人方將爲圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎爲圃者卬而視之曰奈何曰鑿木爲機後重前輕挈水若抽數如泆湯其名爲橰爲圃者忿然作色而曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不爲也夫用時之所用者乃純備也斯人欲脩純備而抱一守古失其㫖也圃布戸反又音布園也李云菜曰圃畦戸圭反李云呼中曰畦文云五十畒曰畦隧音遂李云道也甕鳥送反字林作瓮搰苦骨反徐李苦滑反郭忽滑反用力貌一音胡没反械戶戒反字林作械李云器械也浸子鴆反司馬云灌也卬音抑本又作仰挈口節反抽敕留反李云引也司馬崔本作流數所角反徐所錄反泆湯音逸本或作溢李云疾速如湯沸溢也司馬本作佚蕩亦言其往來數疾如佚蕩佚蕩唐佚也橰本又作橋或作臯同音羔徐居橋反司馬李云桔橰也吾師謂老子也子貢瞞然慙俯而不對有間爲圃者曰子奚爲者邪曰孔丘之徒也爲圃者曰子非夫博學以擬聖於于以蓋衆獨弦哀歌以賣名聲於天下者乎汝方將忘汝神氣墮汝形骸而庶幾乎不忘不墮則無庶幾之道瞞武版反又亡安反字林云目皆平貌李天典反慙貌一音門又亡于反司馬本作撫音武崔本作撫於于並如字本或作於吁音同司馬云夸誕貌一云行仁恩之貌蓋司馬本作善墮許規反而身之不能治而何暇治天下乎子往矣無乏吾事子貢卑陬失色頊頊然不自得行三十里而後愈其弟子曰向之人何爲者邪夫子何故見之變容失色終日不自反邪曰始吾以爲天下一人耳謂孔子也乏廢也陬走侯反徐側留反李云卑陬愧懼貌一云顔色不自得也頊頊本又作旭旭許玉反李云自失貌向許亮反本又作郷音同後倣此不知復有夫人也吾聞之夫子事求可功求成用力少見功多者聖人之道聖人之道即用百姓之心耳復扶又反夫音符下夫人同今徒不然執道者德全德全者形全形全者神全神全者聖人之道也託生與民並行而不知其所之汒乎淳備哉功利機巧必忘夫人之心此乃聖王之道非夫人也子貢聞其假脩之而服之未知純白者之同乎世也汒莫剛反心或作道若夫人者非其志不之非其心不爲雖以天下譽之得其所謂謷然不顧以天下非之失其所謂儻然不受天下之非譽無益損焉是謂全德之人哉我之謂風波之民此宋榮子之徒未足以爲全德子貢之迷没於此人即若列子之心醉於季咸也譽音餘下同謷五羔反司馬本作謷儻本亦作精司馬本作㒉同勑蕩反郭此更反反於魯以吿孔子孔子曰彼假脩渾沌氏之術者也以其背今向古修爲世事故知其非眞渾沌也渾胡本反沌徒本反背音佩識其一不知其二徒識修古抱灌之朴而不知因時任物之易也易以䜴反治其內而不治其外夫眞渾沌都不治也豈以外內爲異而偏有所治哉夫明白入素無爲復朴體性抱神以遊世俗之間者汝將固驚邪此眞渾沌也故與世同波而不自失則雖遊於世俗而泯然無迹豈必使汝驚哉且渾沌氏之術予與汝何足以識之哉在彼爲彼在此爲此渾沌玄同孰識之哉所識者常識其迹耳諄芒將東之大壑適遇風於東海之濱風曰子將奚之曰將之大壑曰奚爲焉曰夫大壑之爲物也注焉而不滿酌焉而不竭吾將遊焉風曰夫子無意于橫目之民乎願聞聖治諄芒曰聖治乎官施而不失其冝抜舉而不失其能畢見其情事而行其所爲皆因而任之諄郭之倫反又述倫反芒本或作汒武剛反李云望之諄諄察之芒芒故曰諄芒一云姓名也或云霧氣也壑火各反李云大壑東海也風本亦作宛徐於阮反李云小貌謂遊世俗也一云風姓名一云扶搖大風也濵音賓酌一本作取橫目之民李云倮虫之屬欲令其治之也聞本或依司馬云作問下同治直吏反下皆同施始支反又始智反司馬云施政布教各得其宜行言自爲而天下化使物爲之則不化也手撓顧指四方之民莫不俱至此之謂聖治言其指麾顧眄而民各至其性也任其自爲故手撓而小反又而了反司馬云動也一云謂指麾四方也顧指如字向云顧指者言指麾顧盻而治也或音頥本亦作頥以之反謂舉頥指麾也願聞德人曰德人者居無思行無慮率自然耳不藏是非美惡無是非於胷中而任之天下惡烏路反四海之內共利之之謂恱共給之之爲安無自私之懷也怊乎若嬰兒之失其母也儻乎若行而失其道也財用有餘而不知其所自來飮食取足而不知其所從此謂德人之容德者神人迹也故曰容怊音超字林云悵也徐尺遥反郭音條儻敕黨反司馬本作容牟凶反或云依注當作客願聞神人願聞所以迹也曰上神乗光與形㓕亡乗光者乃無光此謂照曠無我而任物空虚無所攘者非闇塞也致命盡情天地樂而萬事銷亡情盡命至天地樂矣事不妨樂斯無事矣樂音洛注同銷徐音消萬物復情此之謂混冥情復而混冥無迹也混胡本反門無與赤張滿稽觀於武王之師赤張滿稽曰不及有虞氏乎故離此患也門無曰天下均治而有虞氏治之邪其亂而後治之與言二聖俱以亂故治之則揖讓之與用師直是時異耳未有勝於其間也門無司馬本作無畏云門姓無畏字也滿本或作蒲稽古奚反李云門赤張氏也無滿稽名也治直吏反下及注均治並同與音餘本又作邪赤張滿稽曰天下均治之爲願而何計以有虞氏爲均治則願各足矣復何爲計有虞氏之德而推以爲君哉許無之言是也復扶又反下章注同有虞氏之藥瘍也天下皆患創亂故求虞氏之藥瘍音羊李云頭創也言創以喻亂求虞氏薬治之司馬云疵瘍也創良反秃而施髢病而求醫孝子操藥以脩慈父其色燋然聖人羞之明治天下者非以爲榮秃吐木反髢大細反司馬云髲也又吐帝反郭音毛李云髦髮也操七刀反燋將遙反又音撨至德之世不尙賢賢當其位非尚之也不使能能者自爲非使之也上如標枝出物上而不自高也標方小反徐方遥方又方妙反言樹標之枝無心在上也民如野鹿放而自得也端正而不知以爲義相愛而不知以爲仁實而不知以爲忠當而不知以爲信率性自然非由知也蠢動而相使不以爲賜用其自動故動而不謝蠢郭處允反動也是故行而無迹王能任其自行故無迹也事而無傳各止其分故不傳敎於彼也傳文專反孝子不䛕其親忠臣不諂其君臣子之盛也親之所言而然所行而善則世俗謂之不肖子君之所言而然所行而善則世俗謂之不肖臣而未知此其必然邪此直違俗而從君親故俗謂不肖耳未知至當正在何許䛕羊朱反郭貽附反諂敕檢反肖音世俗之所謂然而然之所謂善而善之則不謂之道䛕之人也然則俗故嚴於親而尊於君邪言俗不爲尊嚴於君親而從俗俗不謂之諂明尊嚴不足以服物則服物者更在於從俗也是以聖人未甞獨異於世必與時消息故在皇爲皇在王爲王豈有背俗而用我哉之道音導下同背音佩謂已道人則勃然作色謂已䛕人則怫然作色世俗遂以多同爲正故謂之道䛕則作色不受勃歩忽反謂巳䛕人本多作衆人下同司馬云衆人凡人也怫符弗反郭敷謂反而終身道人也終身䛕人也亦不問道理期於相善耳合譬飾辭聚衆也是終始本末不相坐夫合譬飾辭應受道䛕之罪而世復以此得人以此聚衆亦爲從俗者不見罪坐也坐才臥反注同垂衣裳設采色動容貌以媚一世而不自謂道䛕與夫人之爲徒通是非而不自謂衆人愚之至也世皆至愚乃更不可不從夫音符知其愚者非大愚也知其惑者非大惑也大惑者終身不解大愚者終身不靈夫聖人道同而帝王殊迹者誠世俗之惑不可解故隨而任之解音蟹又佳買反不靈本又作無靈司馬云靈曉也三人行而一人惑所適者猶可致也惑者少也二人惑則勞而不至惑者勝也而今也以適不得矣各自信據故不知所之以二缶鍾應作垂鍾應作踵言垂脚空中必不得有之適也司馬本作二垂鍾云鍾注意也適司馬云至也而今也以天下惑予雖有祈嚮其庸可得邪知其不可得也而強之又一惑也故莫若釋之而不推即而同之強其丈反下注同不推誰其比憂趣令得當時之適不強推之令解也則相與無憂於一世矣比毗至反司馬本作鼻云始也令力呈反下同解音蟹厲之人夜半生其子遽取火而視之汲汲然唯恐其似巳也厲惡人也言天下皆不願爲惡及其爲惡或迫於苛役或迷而失性耳然迷者自思復而厲者自思善故我無爲而天下自化厲音頼又如字遽巨據反本或作蘧音同汲音急苛音何百年之木破爲犧樽靑黃而文之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也跖與曾史行義有間矣然其失性均也且夫失性有五一曰五色亂目使目不明二曰五聲亂耳使耳不聦三曰五臭薫鼻困惾中顙四曰五味濁口使口厲爽五曰趣舍滑心使性飛揚此五者皆生之害也而楊墨乃始離自以爲得非吾所謂得也夫得者困可以爲得乎則鳩鴞之在於籠也亦可以爲得矣且夫趣舍聲色以柴其內皮弁鷸冠搢笏紳脩以約其外內支盈於柴柵外重纆繳睆睆然在纆繳之中而自以爲得則是罪人交臂歷指而虎豹在於囊檻亦可以爲得矣犧音羲又素河反斷徒亂反下同本或作故困如字本或作悃音同惾子公反郭音俊又素奏反李云困惾猶刻賊不通也中丁仲反顙桑蕩反濁本又作噣音同滑李音骨本亦作噣離力智反丘䜴反鷸尹必反徐音述本又作音同鳥名也一名翠似燕紺色出鬱林取其羽毛以飾冠笏音忽紳音申帶也柵楚格反郭音策重直龍反纆音墨繳音灼郭古弔反睆睆環版反李云窮視貌一云眠目貌交臂歷指司馬云交臂反縛也歷指猶歷樓貌檻戸覽反莊子外篇天道第十三音義曰以義名篇天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海內服此三者皆恣物之性而無所牽滯也積謂滯積不通明於天通於聖六通四辟於帝王之德者其自爲也昧然無不靜者矣任其自爲故雖六通四辟而無傷於静也六通謂六氣隂陽風晦明四辟毗赤反謂四方開也昧音妹聖人之靜也非曰靜也善故靜也善之乃静則有時而動也萬物無足以鐃心者故靜也斯乃自得也鐃乃孝反又女交反一音而小反水靜則明燭鬚眉平中准大匠取法焉水靜猶明而況精神聖人之心靜乎天地之鑒也萬物之鏡也夫有其具而任其自爲故所照無不洞明中丁仲反大匠或云天子也夫虚靜恬淡寂漠無爲者天地之平而道德之至凡不平不至者生於有爲淡徒暫反故帝王聖人休焉未甞動也休則虚虚則實實者倫矣倫理也虚則靜靜則動動則得矣不失其所以動靜則無爲無爲也則任事者責矣夫無爲也則羣才萬品各任其事而自當其責矣故曰巍巍乎舜禹之有天下而不與焉此之謂也巍魚歸反與音預無爲則俞俞俞俞者憂患不能處年壽長矣俞俞然從容自得之貌俞俞羊朱反廣雅云喜也又音喻從七容反夫虚靜恬淡寂漠無爲者萬物之本也尋其本皆在不爲中來明此以南鄕堯之爲君也明此以北靣舜之爲臣也以此處上帝王天子之德也以此處下玄聖素王之道也此皆無爲之至也有其道爲天下所歸而無其爵者所謂素王自貴也鄕許亮反本亦作嚮王于况反注同以此退居而間游江海山林之士服以此進爲而撫世則功大名顯而天下一也此又其次也故退則巢許之流進則伊望之倫也夫無爲之體大矣天下何所不爲哉故主上不爲宰之任則伊吕静而司尹矣宰不爲百官之所執則百官静而御事, HFL: ''}
