  - {type: voice, offset: 7308, length: 20, name: note, id: n154}
  - {type: variant, offset: 7310, length: 0, content: '', ZTDZ: 其所從此謂德人之容願聞神人曰上神乘光與形滅亡此謂照曠致命盡情天地樂而萬事銷亡萬物復情此之謂混冥門無鬼與赤張滿稽觀於武王之師赤張滿稽曰不及有虞氏乎故離此患也門無鬼曰天下均治而有虞氏治之邪其亂而後治之與赤張滿稽曰天下均治之爲願而何計以有虞氏爲有虞氏之藥瘍也秃而施髢病而求醫孝子操藥以脩慈父其色燋然聖人羞之至德之世不尚賢不使能上如標枝}
  - {type: page-break, offset: 7310, content: '', id: KR5c0051_SJB_002-110588c}
  - {type: variant, offset: 7311, length: 1, content: 過, ZTDZ: 如野鹿端正而不知以爲義相愛而不知以爲仁實而不知以爲忠當而不知以爲信蠢動而相使不以爲賜是故行而無迹事而無傳孝子不諛其親忠臣不謟其君臣子}
  - {type: variant, offset: 7313, length: 2, content: 由巳, ZTDZ: 盛也親之所言而然所行而善則世俗謂之不肖子君之所言而然所行而善則世俗謂之不肖臣而未知此其必然邪世俗之所謂然而然之所謂善而善之則不謂之導諛之人也然則俗}
  - {type: punctuation, offset: 7315, content: /, id: KR5c0051_krp_002-bkkpn921}
  - {type: variant, offset: 7316, length: 2, content: 罪責, ZTDZ: 嚴}
  - {type: variant, offset: 7319, length: 1, content: 民, ZTDZ: 親而尊於君邪謂己導人則勃然作色謂己諛人則怫然作色而終身導人也終身諛人也合譬飾辭聚衆也是終始本末不相坐垂衣裳設采色動客貌以媚一世}
  - {type: page-break, offset: 7319, content: '', id: KR5c0051_SJB_002-110589a}
