  - {type: variant, offset: 8629, length: 0, content: '', ZTDZ: 視民也爲後世慮不若休之難治也施於人而不忘非天布也商賈不齒雖以事齒之神者弗齒爲外刑者金與木也爲内刑者動與過也宵人之離外刑者金木訊之離内刑者陰陽食之夫免乎外内之刑者唯眞人能之孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深情故有貌願而益有長若不肖有順儂而達有堅而縵有緩而釬故其就義若渴者其去義若熱故君子達使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色九徵至不肖人得矣正考父一命而傴再命而僂三命而俯循墻而走孰敢不軌如而夫者一命而吕鉅再命而於車上舞三命而名諸父孰協唐許賊莫大乎德有心而心有眼及其有眼也而内視内視而敗矣凶德有五中德爲首何謂中德中德也者有以自好也而吡其所不爲者也窮有八極達有三必形有六府美髯長大壯麗勇敢八者俱過人也因以是窮縁循偃俠困畏不若人三者俱通達知慧外通勇敢多怨仁義多責達生之情者傀達於知者肖達大命者隨達小命者遭人有見宋王者錫車十乘以其十乘驕穉莊子莊子曰河上有家貧恃緯蕭而食者其子没於淵得千金之珠其父謂其子曰取石來鍛之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子爲𩐎粉夫或騁於莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽而入於太廟雖欲爲孤犢其可得乎莊子將死弟子欲厚葬之莊子曰吾以天地爲棺槨以曰月爲連璧星辰爲珠璣萬物爲齎送吾葬具豈不備邪何以加此弟子曰吾恐烏鳶之食夫子也莊子曰在天爲烏鳶食在下爲螻蟻食奪彼與此何其偏也以不平平其平也不平以不徵徵其徵也不徵}
