  - {type: variant, offset: 9511, length: 840, content: 任之而理自至矣相爲于僞反下未爲同若有眞宰而特不得其眹萬物萬情趣舎不同有若眞宰使之然也起索眞宰之眹迹而亦終不得則明物皆自然無使物然也特崔云特辭也眹李除忍反兆也趣舎七喻反字或作取下音捨或音赦下皆放此索所百反可行已信今夫行者信已可得行也而不見其形不見所以得行之形有情而無形情當其物故形不別見也當丁浪反不皆同見賢遍反百骸九竅六藏賅而存焉付之自然而莫不皆存也骸戸皆反六藏才浪反案心肺肝脾腎謂之五藏大小腸膀胱三焦謂之六府身别有九藏氣天地人天以候頭角之氣人候耳目之氣地候口齒之氣三部各有天地人三三而九神藏五形藏四故九今此云六藏未見所岀賅徐古來反司馬云備也小爾雅同簡文云兼也吾誰與爲親直自存耳汝皆之乎其有私焉皆之則是有所私也有私則不能賅而存矣故不而自存不爲而自生也皆音注同今本多即作恱字後皆放此如是皆有爲臣妾乎若皆私之則志過其分上下相冒而莫爲臣妾矣臣妾之才而不安臣妾之任則失矣故知君臣上下手足外內乃天理自然豈直人之所爲哉其臣妾不足以相治乎夫臣妾但各當其分耳未爲不足以相治也相治也者若手足耳目四支百體各有所司而更相御用也更音庚其遞相爲君臣乎夫時之所賢者爲君才不應世者爲臣若天之自高地之自卑首自在上足自居下豈有遞哉雖無錯於當而必自當也遞音弟徐又音第應應謂之應錯七索反下同其有眞君存焉任之而自爾則非僞也如求得其情與不得無益損乎其眞凡得眞性用其自爲者雖復皂猶不顧毀譽而自安其業故知與不知皆自若也若乃開希幸之路以下冒上物䘮其眞人忘其本則毀譽之間俯仰失錯也復扶又反下同譽音餘䘮息浪反一受其成形不亡以待盡言物各有分故知者守知以待終而愚者抱愚以至死豈有能中易其性者也與物相刃相靡其行盡如馳而莫之能止不亦悲乎羣品云云逆順相交各信其偏見而恣其所行莫能自反此比衆人之所悲者亦可悲矣而衆人未嘗以此爲悲者性然故也物各性然又何物足悲哉終身役役而不見其成功夫物情無極知足者鮮故得此不止復逐於彼皆疲役終身未厭其志死而後巳故其成功者無時可見也骸息淺反薾然疲役而不知其所歸可不哀邪凡物各以所好役其形骸至于疲困然不知所以好此之歸趣云何, ZTDZ: 逃}
