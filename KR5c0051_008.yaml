body:
  text: 郭象子玄注陸德明音義莊子雜篇庚桑楚第二十三音義曰以人名篇老聃之役有庚桑楚者偏得老聃之道以北居畏壘之山其臣之畫然知者去之其妾之挈然仁者遠之畫然飾知挈然矜仁老聃之役司馬云役學徒弟子也廣雅云役使也庚桑楚司馬云楚名庚桑姓也太史公書作亢桑偏向音篇畏本或作崴又作猥同烏罪反向於反壘崔本作纍同力罪反向良裴反李云崴壘山名也或云在魯又云在梁州畫音獲知音智注同挈本又作契同苦計反向云知也又苦結反廣雅云提也遠于萬反司馬云言人以仁智為臣妾庚桑悉棄仁智也擁腫之與居擁腫朴也擁於勇反腫章勇反本亦作踵鞅掌之為使鞅掌自得鞅於丈反崔云擁腫無知貌鞅掌不仁意向云二句朴纍之謂司馬云皆醜貌也居三年畏壘大壤畏壘之民相與言曰庚桑子之始來吾灑然異之異其棄智而任愚壤而掌反本又作穰崔本同又如羊反廣雅云豐也灑素殄反又悉禮反崔李云驚貌向蘇狼反今吾日計之而不足歲計之而有餘夫與四時俱者無近功日計之而不足向云無旦夕小利也歲計之而有餘向云順時而大穰也庶幾其聖人乎子胡不相與尸而祝之社而稷之乎庚桑子聞之南面而不釋然弟子異之庚桑子曰弟子何異於豫夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉天道巳行矣夫春秋生成皆得自然之道故不為也正得秋而萬寶成天地以萬物為寶至秋而成也元嘉本作萬寶大道巳行矣本或作天道吾聞至人尸居環堵之室而百姓倡狂不知所如往直自往耳非由知也環如字廣雅云圓也堵丁魯反司馬云一丈曰堵環堵者靣各一丈言小也今以畏壘之細民而竊竊焉欲爼豆豫于賢人之間我其杓之人邪不欲為物標杓爼側吕反崔云爼豆食我於衆人間杓郭音的又匹么反又音弔廣雅云樹末也王云斯由已為人凖的也向云馬氏作魡音的標必遙反一音必小反吾是以不釋於老聃之言聃云功成事遂而百姓皆謂我自爾今畏壘反此故不釋然弟子曰不然夫尋常之溝巨魚無所還其體而鯢鰌為之制步仞之丘陵巨獸無所隱其軀而孽狐為之祥弟子謂大人必有豐祿也尋常之溝八尺曰尋倍尋曰常尋常之溝則周禮洫澮之廣深也洫廣深八尺澮廣二尋深二仞也還音旋回也崔本作逮鯢五兮反鰌音秋為之制廣雅云制折也謂小魚得曲折也王云制謂擅之也鯢鰌專制於小溝也步仞六尺為步七尺曰仞廣一步高一仞也孔安國云八尺曰仞小爾雅云四尺曰仞孽魚竭反狐為之祥李云祥怪也狐狸喜為妖孽言各有冝不失則大人有豐祿也王云野狐依之作妖祥也崔云蠱狐以小丘為善也祥善也且夫尊賢授能先善與利自古堯舜以然而况畏壘之民乎夫子亦聽矣庚桑子曰小子來夫函車之獸介而離山則不免于罔罟之患吞舟之魚碭而失水則蟻能苦之故鳥獸不厭高魚鱉不厭深去利遠害乃全函音含車之獸李云獸大如車也一云大容車介音戒廣雅云獨也又古反一本作分謂分張也元嘉本同離力智反下注同吞敕恩反又音天碭而失水徒浪反謂碭溢而失水也崔本作去水陸居也蟻魚綺反苦如字向云馬氏作最又作窮夫全其形生之人藏其身也不厭深眇而巳矣嬰身於利祿則粗而淺彌小反粗七奴反後皆同且夫二子者又何足以稱揚哉二子謂堯舜二子向崔郭皆云堯舜也是其於辨也將妄鑿垣墻而殖蓬蒿也將令後世妄行穿鑿而殖穢亂也蓬蒲空反令力呈反簡髮而櫛數米而炊理錐刀之末也而櫛莊筆反又作扻亦作楖皆同郭音節徐側兾反數色主反炊昌垂反向云理於小利也竊竊乎又何足以濟世哉混然一之無所治為乃濟竊如字司馬云細語也一云計校之貌崔本作察察舉賢則民相軋將戾拂其性以待其所尚軋烏反向音乙拂符弗反任知則民相盜真不足而以知繼之則偽矣偽以求生非盜如何知音智注同之數物者不足以厚民民之於利甚勤子有殺父臣有殺君正晝為盜日中穴阫無所復顧殺音試本又作弒下同阫普回反向音裴云阫墻也言無所畏忌吾語汝大亂之本必生于堯舜之間其末存乎千世之後千世之後其必有人與人相食者也堯舜遺其迹飾偽播其後以致斯弊語羔據反女音汝後皆放此南榮趎蹴然正坐曰趎之年者巳長矣將惡乎託業以及此言邪庚桑子曰全汝形守其分也南榮趎昌于反向音疇一音紹俱反徐直俱反又敕俱反又處由反李云庚桑弟子也漢書古今人表作南榮疇或作儔又作壽淮南作南榮幬云敕蹻趹步百舍不休亦作疇蹴子六反長丁丈反惡音烏分扶問反後以意求之抱汝生無乎其生之外也無使汝思慮營營此三年則可以及此言也南榮趎曰目之與形吾不知其異也而盲者不能自見耳之與形吾不知其異也而聾者不能自聞心之與形吾不知其異也而狂者不能自得目與目耳與耳心與心其形相似而所能不同茍有不同則不可強相法效也思息吏反下同強其丈反下章可強同形之與形亦辟矣未有閉之辟婢亦反開也崔云相著也音必亦反而物或間之邪欲相求而不能相得兩形雖開而不能相得將有間也間間厠之間注同今謂趎曰全汝形抱汝生勿使汝思慮營營趎勉聞道逹耳矣早聞形隔故難化也勉崔向云勉強也本或作晚逹耳崔向云僅逹於耳未徹入於心也庚桑子曰辭盡矣曰奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣雞之與雞其德非不同也有能與不能者其才固有巨小也今吾才小不足以化子子胡不南見老子南榮趎贏糧七日七夜至老子之所老子曰子自楚之所來乎南榮趎曰唯老子曰子何與人皆來之衆也挾三言而來故奔蜂孚恭反司馬云奔蜂小蜂也一云士蜂藿蠋音蜀司馬云豆藿中大青蟲也越雞司馬向云小雞也或云荆雞也伏扶又反鵠本亦作鶴同戶各反一音戶沃反卵力管反魯雞向云大雞也今蜀雞也贏音盈案方言贏儋也齊楚陳宋之間謂之贏一音果唯惟癸反挾音協南榮趎懼然顧其後老子曰子不知吾所謂乎南榮趎俯而慙仰而歎曰今者吾忘吾答因失吾問老子曰何謂也南榮趎曰不知乎人謂我朱愚知乎反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我巳我安逃此而可此三言者之所患也願因楚而問之老子曰向吾見眉睫之間吾因以得汝矣今汝又言而信之規規然若喪父母揭竿而求諸海也汝亡人哉惘惘乎汝欲反汝情性而無由入可憐哉南榮趎請入就舍召其所好去其所惡十日自愁復見老子老子曰汝目灑濯孰哉鬱鬱乎然而其中津津乎猶有惡也夫外韄者不可繁而捉將內揵內韄者不可繆而捉將外揵揵揵也耳目外也心術內也夫全形抱生莫忘其心術遺其耳目乃聲色韄於外則心術塞於內欲惡韄於內則耳目喪於外固必無得無失而後為通也懼向紀具反本又作戄音同又况縛反吾問元嘉本問作聞向本又作嚮同睫音接釋名云目毛也規規李云失神貌一云細小貌喪息浪反注同揭其列其謁二反竿音干求諸海向云言以短小之物欲測深大之域也女亡人崔云喪亡性情之人也好呼報反去起吕反惡烏路反注同復扶又反濯丈角反鬱鬱崔云孰灑貌津津如字崔本作律律云惡貌有惡李云惡計未盡也獲向音霍崔云恢廓也又如字本亦作韄音獲又乙虢反又烏邈反又音羈李云縳也三蒼云佩刀靶韋也捉徐側角反崔作促云迫促也揵郭其輦反徐其偃反也向云間也又音蹇下同繆莫侯反又音稠結也崔向云綢繆也外內韄者道德不能持而况放道而行者乎偏韄由不可况外內俱韄乎將耳目眩惑於外而心術流蕩於內雖繁手以執之綢繆以持之弗能止也放如字向方往反云依也南榮趎曰里人有病里人問之病者能言其病然其病病者猶未病也趎之聞大道譬猶飮藥以加病也趎願聞衛生之經而巳矣老子曰衛生之經能抱一乎不離其性加如字元嘉本作如病崔本作駕云加也衛生李云防衛其生令合道也能勿失乎還自得也能無筮而知凶乎當則吉過則凶無所也當丁浪反後放此能止乎止於分也能巳乎無追故迹能舍諸人而求諸巳乎全我而不效彼舍音捨下同能翛然乎無停迹也翛音蕭徐始六反又音育崔本作隨云順也能侗然乎無節礙也侗本又作洞大董反又音慟向敕動反云直而無纍之謂三蒼云殼直貌崔同字林云大也礙五代反能兒子乎兒子終日嘷而嗌不嗄和之至也任聲之自出不由於喜怒嗥戶羔反本又作號音同而嗌音益崔云喉也司馬云咽也李音厄謂噎也一本作而不嗌案如李音有不字嗄於邁反本又作嚘徐音憂司馬云楚人謂啼極無聲為嗄崔本作喝云啞也終日握而手不掜共其德也任手之自握非獨得也握李云捲手曰握掜五禮反向音藝崔云也廣雅云捉也共其如字崔云一也終日視而目不瞚偏不在外也任目之自見非係於色也瞚字又作同音舜動也本或作瞋莫經反偏徐音篇行不知所之任足之自然則是至乎謂巳便可得此言而至邪攖於營反徐又音軀廣雅云亂也崔云猶貫也曰未也吾固告汝曰能兒子乎非以此言為不至也但能聞而學者非自至耳茍不自至則雖聞至言適可以為經胡可得至哉故學者不至至者不學也兒子動不知所為行不知所之身稿木之枝而心死是者禍亦不至福亦不來禍福無有惡有人災也禍福生於失得人災由於愛惡今稿木死無情之至則愛惡失得無自而來稿苦老反惡有音烏愛惡烏路反下同宇泰定者發乎天光夫德與泰然而定則其所發者天光耳非人耀宇泰定王云宇器宇也謂器宇間泰則靜定也發乎天光者人見其人天光自發則人見其人物見其物物各自見而不見彼所以泰然而定也人有修者乃今有恆人而修人則自得矣所以常泰有恆者人舍之天助之常泰故能反居我宅而自然獲也人之所舍謂之天民天之所助謂之天子出則天子處則天民此二者俱以泰然而自得之非為而得之也學者學其所不能學也行者行其所不能行也辨者辨其所不能辨也凡所能者雖行非為雖習非學雖言非辨學者學其所不能學也言人皆欲學其所不能知凡所能者故是能於所能夫能於所能者則雖習非習也知止乎其所不能知至矣所不能知不可強知故止斯至也有不即是者天鈞敗之意雖欲為為者必敗理終不能敗邁反或作則元嘉本作則備物以將形因其自備而順其成形備具也將順也藏不虞以生心心自生耳非虞而出之虞者億度之謂度待洛反敬中以逹彼理自逹彼耳非慢中而敬外是而萬惡至者皆天也天理自有窮通而非人也有為而致惡者乃是人不足以滑成安之命故其成不滑滑音骨不可內於靈臺靈臺者心也清暢故憂患不能入靈臺案謂心有靈智能任持也許愼云人心以上氣所往來也靈臺者有持有持者謂不動於物耳其實非持而不知其所持知其所持則持之而不可持者也持則失也不見其誠巳而發此妄發作不見其誠已而發謂不自照其內而外馳也每發而不當發而不由巳誠何由而當每發而不當丁浪反爾雅云每雖也謂雖有發動不中當業入而不舍事不居其分內每更為失發由已誠乃為得也為不善乎顯明之中者人得而誅之為不善乎幽間之中者得而誅之明乎人明乎者然後能獨行幽顯無愧於心則獨行而不懼間音閉劵內者行乎無名劵分也夫遊於分內者行不由於名劵字又作卷徐音勸劵分符問反下同崔云劵分明也則宜方云反劵外者志乎期費有益無益期欲損巳以為物也期費芳貴反下同廣雅云期卒也費耗也言存分外而不止者卒有所費耗也為于偽反行乎無名者唯庸有光本有斯光因而用之志乎期費者唯賈人也雖巳所無猶借彼而販賣也賈音古人見其跂猶之魁然夫期費者人巳見其跂矣而猶自以為安人見其跂猶之魁苦回反安也一云主也然謂衆人巳見其跂求分外而猶自安可羞愧之甚也與物窮者物入焉窮謂終始與物且者其身之不能容焉能容人且謂劵外而者跂者不立焉能自容不能自容焉能容人人不容則去也物且且始也焉於虔反注同不能容人者無親無親者盡人身且不能容則雖已非已况能有親乎故盡是他人兵莫憯于志鏌鎁為下夫志之所攖樵火疑水故其為兵甚於劒戟也憯七坎反廣雅云痛也元嘉本作潛鏌音莫鎁也嗟反鏌鎁良劒名冦莫大於隂陽無所逃於天地之間非隂陽賊之心則使之也心使氣則隂陽徴結於五藏而所在皆隂陽也故不可逃藏才浪反後皆放此道通其分也其成也毀也成毀無常分而道皆通分符問反注及下皆同一音方云反所惡乎分者其分也以備不守其分而求備焉所以惡分也惡烏路反下及注皆同所以惡乎備者其有以備本分不備而有以求備所以惡備也其本分素備豈惡之哉故出而不反見其不反守其分內則其死不久故出而不反謂情識外馳而不反觀於內也見其王云永淪危殆資死之術巳行及之故曰見也出而得是謂得死不出而無得乃得生出而得是謂得死情識外馳以為得者是曰得死耳非理也滅而有實之一也巳滅其性矣雖有斯生何異於滅而有實之一也廣雅云滅殄也盡也實塞也既殄塞純朴之道而外馳澆薄之境雖復行尸於世與何别故云一也以有形者象無形者而定矣雖有斯形茍能曠然無懷則生全而形定也出無本欻然自生非有本入無竅欻然自死非有根出無本入無竅苦弔反出生也入死也本始也竅孔也所以知有形纍於無形者以其出入無本竅故也欻訓勿反有實而無乎處有長而無乎本剽有所出而無竅者有實言出者自有實耳其所出無根竅以出之處昌據反下注同長丁丈反增也又如字下注同剽本亦作摽同甫小反崔云未也李抪遙反徐又敷遙反下同所出夫生必有所出也而無此明所出是無也既是無矣何能有所出邪竅者有實既言有竅竅必有實求實不得竅亦無也有實而無乎處者宇也宇者有四方上下而四方上下未有窮處有實而無乎處者宇也三蒼云四方上下為宇宇雖有實而無定處可求也有長而無本剽者宙也宙者有古今之長而古今之長無極有長而無本剽者宙也三蒼云往古來今曰宙説文曰舟輿所極覆為宙長猶增也本始也宙雖有增長亦不知其始末所至者也有乎生有乎死有乎出有乎入入出而無見其形死生出入皆欻然自爾無所由故無所見其形是謂天門天門者萬物之都名也謂之天門猶云衆妙之門也天門者無有也萬物出乎無有死生出入皆欻然自爾未有為之者也然則聚散隱顯故有出入之名徒有名耳竟無出入門其安在乎故以無為門以無為門則無門也有不能以有為有夫有之未生以何為生乎故必自有耳豈有之所能有乎必出乎無有此所以明有之不能為有而自有耳非謂無能為有也無能為有何謂無乎而無有一無有一無有則遂無矣無者遂無則有自欻生明矣聖人藏乎是任其自生而不生生古之人其知有所至矣惡乎至有以為未始有物者至矣盡矣弗可以加矣其次以為有物矣將以生為喪也喪其散而之乎聚也惡音烏喪息浪反注同以死為反也還融液也液音亦是以分已雖欲均之然巳分矣分方云反注同其次曰始無有既而有生生俄而死以無有為首以生為體以死為尻孰知有無死生之一守者吾與之為友是三者雖異公族也或有而無之或有而一之或分而齊之故謂三也此三者雖有盡與不盡然俱能無是非於胸中故謂之公族為尻苦羔反昭景也著戴也甲氏也著封也非一也此四之移已著於言前矣雖然不可知者也不言其移則其移不可知故試言也臘者之有胲可散而不可散也物各有用臘力闔反音毗司馬云牛百葉也本或作音昆獐也胲古來反足大指也崔云備也案臘者大祭備物而殽有胲此雖從散禮應具不可散棄也觀室者周於寢廟又適其偃焉偃謂屏厠偃於晚反司馬郭皆云屏厠也又於建反屏步定反又必領反下同為是舉移是寢廟則以饗燕屏則則以偃溲當其偃溲則寢廟之是移於屏厠矣故是非之移一彼一此誰能常之故至人因而乘之則均耳為于偽反溲所留反請嘗言移是是以生為本物之變化無時非生生則所在皆本也以知為師所知雖異而各師其知因以乘是非乘是非者無是非也果有名實物之名實果各自有因以已為質質主也物各謂巳是足以為是非之主使人以為巳節人皆謂巳是故莫通因以死償節當其所守非真脫也償常亮反廣雅云償報也復也案謂殺身以成名節成而身死故曰以死償節若然者以用為知以不用為愚以徹為名以窮為辱不能隨所遇而安之知音智移是今之人也玄古之人無是無非何移之有是蜩與學鳩同於同也同共是其所同蜩音條其本或作鸒音同蹍市人之足則辭以放驁稱巳脫誤以謝之蹍女展反司馬李云陷也廣雅云履也驁五報反廣雅云妄也兄則以嫗言嫗詡之無所辭謝嫗於禹反注同詡况所反大親則巳矣明恕素足故曰至禮有不人不人者視人巳視人巳則不相辭謝斯乃禮之至也至義不物各得其宜則物皆我也至知不謀謀而後知非自然知至仁無親譬之五藏未曽相親而仁已至也曾才能反至信辟金金玉者小信之質耳至信則除矣辟必領反除也又婢亦反徹志之勃解心之謬去德之纍逹道之塞貴冨顯嚴名利六者勃志也容動色理氣意六者謬心也惡欲喜怒哀樂六者纍德也去就取與知能六者塞道也此四六者不蕩胸中則正正則靜靜則明明則虛虛則無為而無不為也蕩動也勃本又作悖同必妹反謬如字一本作繆亡侯反亦音謬六起吕反惡烏路反樂音洛纍古尉反後注同知音智蕩本亦作蕩徒黨反又徒良反又生良反道者德之欽也生者德之光也性者生之質也性之動謂之為以性自動故稱為耳此乃真為非有為也光一本作張為之偽謂之人者唯全人能之工於天即俍於人矣謂之全人全人則聖人也俍音良崔云良工也又音良唯蟲能蟲唯蟲能天能還守蟲即是能天唯蟲一本唯作雖下句亦爾言蟲自能為蟲者天也全人惡天惡人之天而况吾天乎人乎都不知而任之斯而謂工乎天惡天烏路反下同一雀適羿羿必得之威也威以取物物必逃之威崔本作或以天下為之籠則雀無所逃天下之物各有所好所好各得則逃將安在籠力東反好呼報反下及注同是故湯以胞人籠伊尹秦穆公以五羊之皮籠百里奚是故非以其所好籠之而可得者無有也介者拸畫外非譽也畫所以飾容貌也則者之貌既以虧殘則不復以好醜在攘故拸而棄之胞本又作庖白交反籠伊尹伊尹好厨故用為庖人籠百里奚百里奚好秦而拘於宛故秦穆公以五羊皮贈之於楚也或云百里好五色皮裘故因其所好也介音界又云刖也又古正反廣雅云獨也崔本作瓦移晝敕紙反又音他久與反本亦作移司馬云畫飾容之具無是故不復愛之一云移離也崔云移畫不拘法度也復扶六反胥靡登高而不懼遺死生也無賴於生故不畏死胥靡司馬云刑徒人也一云癃人也崔云腐刑也夫復謵不餽而忘人不識人之所惜復音服徐扶又反謵音習餽其愧反廣雅云遺也一音愧元嘉本作愧忘人復者溫復之謂也謵玩也夫人玩習者雖復小事皆所至惜今溫復人之所習既得之矣而不還歸以饋遺之此至愚不獲人之所習者也無復相為之情故曰忘人忘人因以為天人矣無人之情則自然為天人故敬之而不喜侮之而不怒者唯同乎天和者為然彼形殘胥靡而猶同乎天和况天和之自然乎侮亡甫反出怒不怒則怒出於不怒矣出為無為則為出於無為矣此故是無不能生有有不能為生之意也欲靜則平氣欲神則順心有為也欲當則緣於不得已不得巳之聖人之道平氣則靜理足順心則神功至緣於不得巳則所為皆當故聖人以斯為道豈求無為於恍惚之外哉莊子雜篇徐無第二十四音義曰以人名篇徐無因女商見魏武侯武侯勞之曰先生病矣苦於山林之勞故乃肯見於寡人徐無曰我則勞於君君有何勞於我君將盈欲長好惡則性命之情病矣君將黜欲掔好惡則耳目病矣欲好惡內外無可徐無緡山人魏之隱士也司馬本作緡山人徐無女商人名也李云無女商並魏幸臣武侯名擊文侯之子治安邑勞之力報反唯山林之勞一字如字餘并下章並力報反盈時志反下注同長丁丈反好呼報反下注下章同惡烏路反下注下章同黜敕律反退也本又作出音同司馬本作出掔苦田反又口間反爾雅云固也崔云引去也司馬云牽也我將勞君君有何勞於我武侯超然不對不説其言超然司馬云猶悵然也説音恱下文大説同少焉徐無曰嘗語君吾相狗也下之質執飽而止是狸德也中之質若視日上之質亡其一吾相狗又不吾相馬也吾相馬直者中繩曲者中鉤方者中矩圓者中規是國馬也而未天下馬也天下馬有成材若恤若失若喪其一若是者超軼絶塵不知其所武侯大説而夫真人之言何遜哉唯物所好之可也語魚據反相息亮反下皆同下之質一本無質字執飽而止司馬以執字絶句云放下之能執禽也狸德謂貪如狐狸也視日音示司馬本作視云視日瞻逺也亡其一一身也謂精神不動無其身也直者中繩丁仲反下皆同司馬云直謂馬齒曲謂背上方謂頭圓謂目成材字亦作才言自然巳足不須教習也恤音恤失音逸司馬本作佚李云恤失皆驚竦若飛也喪息浪反下章注同其一言喪其耦也軼李音逸徐徒列反崔云徹也廣雅云過也徐無出女商曰先生獨何以吾君乎吾所以説吾君者橫之則以詩書禮樂從之則以金板六韜奉事而大有功者不可為數而吾君未嘗啓齒是直樂鴳以鐘鼓耳故愁如字又始鋭反下皆同司馬作恱從子容反板本亦作版薄版反又如字六韜吐刀反司馬崔云金版六韜皆周書篇名或曰祕韯也本又作六韜謂太公六韜文武虎豹龍大也樂音洛章末同鴳一諌反今先生何以吾君使吾君説此乎徐無曰吾直告之吾相狗馬耳女商曰是乎曰子不聞夫越之流人乎去國數日見其所知而喜各思其本性之所好君説音悅越之流人越遠也司馬云流人有罪自流徒者也數所主反去國旬月見所嘗見於國中者喜及期年也見似人者而喜矣不亦去人滋久思人滋深乎各得其所好則無思無思則忘其所以喜也期音基夫逃虛空者藜藋柱乎鼪鼬之徑踉位其空聞人足音跫然而喜矣而况乎昆弟親戚之謦咳其側者乎得所至樂則大恱也逃司馬本作巡也虛空司馬云故懷家處為空虛也藜力西反藋徒弔反本或作同柱誅矩反司馬云塞也鼪音生又音姓鼬由救反徑本亦作徑司馬云徑道也本又作迹元嘉本作迭徐音逸崔云迭迹良位其空司馬云良良人謂巡虛者也位其空謂處虛空之間也良或作踉音同跫然郭巨恭反李曲恭反又曲勇反陳也徐苦江反又按扁反司馬云喜貌崔云行人之聲而喜李云喻武侯之無人君之德而處在防衛之間雖臨朝僑厲愈非其意及得其所思猶逃之間人音安能不跫然改貌釋然而喜也謦苦頂反又音罄咳苦愛反一音器李云謦咳喻言也但呼聞所好猶大恱况骨肉之情歡之至也久矣夫莫以真人之言謦咳吾君之側乎所以未嘗啓齒也夫真人之言所以得吾君性也始得之而喜久得之則忘夫音扶後放此徐無見武侯武侯曰先生居山林食芧栗厭蔥韭以賔寡人久矣夫今老邪其欲干酒肉之味邪其寡人亦有社稷之福邪徐無曰無生於貧賤未嘗敢飮食君之酒肉將來勞君也君曰何哉奚勞寡人曰勞君之神與形武侯曰何謂邪徐無曰天地之養也一不以為君而恣之無極食芧音序又食汝反本亦作芧粟韭音久或非下作者非也賔必刃反本或作擯司馬云擯棄也又必人反李云賔客也干李云干求也社稷之福邪李云謂善言嘉謀可以利社稷也登高不可以為長居下不可以為短君獨為萬乘之主以苦一國之民以養耳目鼻口如此違天地之平也乘繩證反夫神者不自許也物與之耳不自許司馬云許與也夫神者好和而惡姦與物共者和也私自許者姦也夫姦病也故勞之唯君所病之何也武侯曰欲見先生久矣吾欲愛民而為義偃兵其可乎徐無曰不可愛民害民之始也愛民之迹為民所尚尚之為愛愛巳偽也姦病王云姦者以正從邪也謂病也所病之何也李云服而無對也或云養違天地獨恣其欲自許不損於神而以姦為病故不知所以以此為病何為乎偃息也為義偃兵造兵之本也為義則名彰名彰則競興競興則喪其真矣父子君臣懷情相欺雖欲偃兵其可得乎君自此為之則殆不成從無為為之乃成耳凡成美惡器也美成於前則偽生於後故戌美者乃惡器也君雖為仁義幾且偽哉民將以偽繼之耳未肯為真也形固造形仁義有形固偽形必作成固有伐成則顯也變固外戰失其常然成固有伐變固外戰王云成功在已亦衆所不與欲無有伐其可得乎夫偽生形造又伐焉非本所圖之變也既有偽伐得無戰乎君亦必無盛鶴列於麗譙之間鶴列陳兵也麗譙高樓也鶴列李云謂兵如鶴之列行司馬云鶴列鍾鼓也麗如字又力智反力支反譙本亦作嶕在逍反司馬郭李皆云麗譙樓觀名也案謂華麗而嶕嶢無徒於錙壇之官步兵曰徒但不當為義愛民耳亦無為盛兵走馬無徒司馬云徒步也錙壇徐側其反錙壇壇名無藏逆於得得中有逆則失耳藏一本作藏司馬本同逆於得司馬本作德李云凡非理而貪貪得而居之此藏逆於德內者也孰有貪得而可以德不失哉固冝無藏而捨之又云謂有貪則逆道也無以巧勝人守其朴而朴各有所能則平無以謀勝人率其真知而知各有所長則均無以戰勝人以道應物物服而無勝名夫殺人之士民兼人之土地以養吾私與吾神者其戰不知孰善勝之惡乎在不知以何為善則雖尅非已勝惡音烏下同君若勿巳矣修胸中之誠以應天地之情而勿攖未能巳則莫若修巳之誠攖一營反又一盈反夫民死巳脫矣君將惡乎用夫偃兵哉甲兵無所陳非偃也脫音奪黃帝將見大隗乎具茨之山方明為御昌宇驂乘張謵朋前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問塗聖者名也名生而物迷矣雖欲之乎大隗其可得乎大隗五罪反司馬崔本作泰隗或云大司神名也一云大道也具茨一本作次同祀咨反又音資司馬本作疚山名也司馬云在滎陽密縣東今名泰隗山宇音禹驂乘繩證反驂乘車右也謵音習元嘉本作謂崔同扅舒氏反崔本作㢋本亦作朋蒲登反徐扶恆反前馬司馬云二人先馬導也閽音昏滑音骨稽音雞後車司馬云二人從車後襄城之野李云地名七聖黃帝一方明二昌宇三張若四謂朋五昆閽六滑稽七也適遇牧馬童子問塗焉曰知具茨之山乎曰然知大隗之所存乎曰然黃帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下小童曰夫為天下者亦若此而巳矣又奚事焉各自則無事矣無事乃可以為天下也豫少而自遊於六合之內豫適有瞀病有長者教豫曰乘日之車而遊於襄城之野日出而遊日入而息少詩召反瞀莫豆反郭音務李云風眩貌司馬云瞀讀日謂眩也長丁丈反乘日之車司馬云以日為車也元嘉本車作居今豫病少痊豫又且復遊於六合之外夫為天下亦此而巳豫又奚事焉夫為天下莫過自放任自放任矣物亦奚攖焉故我無為而民自化痊七全反李云除也復扶又反黃帝曰夫為天下者則誠非吾子之事事由氏作雖然請問為天下令民自得必有道也小童辭黃帝又問小童曰夫為天下者亦奚以異乎牧馬者哉亦去其害馬者而巳矣馬以過分為害去起吕反下注同黃帝再拜稽首稱天師而退師夫天然而去其過公則大隗至也知士無思慮之變則不樂辨士無談説之序則不樂察士無凌誶之事則不樂皆囿於物者也不能自得於內而樂物於外故各以所樂囿之則萬物不召而自來非強之也知音智樂音洛下不樂及注同察士李云察職也凌李云謂相凌轢誶音信廣稚云問也又音崇又音峻一本作囿有音又強其夾反招世之士興朝中民之士榮官筋力之士矜難勇敢之士奮患兵革之士樂戰枯稿之士名法律之士廣治禮樂之士敬容仁義之士貴際士之不同此故當之者不可易其方朝直遙反中民李云善治民也難乃旦反稿苦老反後章同名積久也王云枯稿一生以為娛其所寢唯名而已治直吏反貴際謂盟會事農夫無草萊之事則不比商賈無市井之事則不比能同則事同所以比比毗志反下同賈音古庶人有旦暮之業則勸業得其志故勸百工有器械之巧則壯事非其巧則惰則壯李云壯猶疾也惰徒卧反錢財不積則貪者憂物得所耆而樂也所耆時志反樂音洛權不尤則夸者悲物之徒樂變權生於事變遭時有所用不能無為也凡此諸士用各有時時用則不能自巳也苟不遭時則雖欲自用其可得乎故貴賤無常此皆順比於歲不物於易者也士之所能各有其極四時之不可易耳故當其時物順其倫次則各有用矣是以順歲則時序易性則不物物而不物非毀如何馳其形性潛之萬物終身不反悲夫不守一家之能而之夫萬方以要時利故有匍匐而歸者所以悲也要一遙反匍音扶又音蒲匐音服又蒲北反莊子曰射者非前期而中謂之善射天下皆羿也可乎不期而中謂誤中者也非善射也謂謬中為善射是則天下皆可謂之羿可乎言不可也中丁仲反注同惠子曰可莊子曰天下非有公是也而各是其所是天下皆堯也可乎謂謬中者羿也則私自是者亦可謂堯矣莊子以此明妄中者非羿而自是者非堯惠子曰可莊子曰然則儒墨楊秉四與夫子為五果孰是邪皆堯也則五子何為復相非乎或者魯遽者邪其弟子曰我得夫子之道矣吾能冬㸑鼎而夏造氷矣魯遽曰是直以陽召陽以隂召隂非吾所謂道也吾示子乎吾道於是乎為之調瑟廢一於堂廢一於室鼓宮宫動鼓角角動音律同矣俱亦以陽召陽而橫自以為是魯遽音渠又其豦反季云魯遽人姓名也一云周初時人爨七亂反又七端反為于偽反廢置也夫或改調一弦於五音無當也隨調而改調徒弔反注皆同當丁浪反合也鼓之二十五弦皆動無聲則無以相動有聲則非同不應今改此一弦而二十五弦皆改其以急緩為調也未始異於聲而音之君巳魯遽以此夸其弟子然亦以同應同耳未獨能為其事也且是者邪五子各私所見而是其所是然亦無異於魯遽之夸其弟子而未能相出也惠子曰令夫儒墨楊秉且方與我以辨相排以辭相鎮以聲而未始吾非也則奚矣未始吾非者各自是也惠子使欲以此為至拂抾弗反莊子曰齊人蹢子於宋者其命閽也不以完投之異國使門者守之出便與子不保其全此齊人之不慈也然亦自以為是故為之蹢呈亦反投也司馬云齊人憎其子蹢之宋使門者守之令形不全自以為是其求鈃鍾也以束乃反以愛鍾器為是束恐其破傷鈃鍾音刑徐戶挺反又字林云鈃以小鍾而長頸又云似壺而大以束郭云恐其破傷案此言賤子貴鈃自以為是也其求唐子也而未始出域有遺矣唐失也失亡其子而不能逺索遺其氣而亦未始自非人之自是有斯謬矣唐子謂失亡子也遺遺亡也亡其種故也惠施畔道而存皆猶齊人逺子而束也索所百反夫楚人而蹢閽者俱止而不能自投於高地也夜半於無人之時而與舟人鬬未始離於岑而足以造於怨也岑岸也夜半獨上人船未離岸巳共人鬪言齊楚二人所行此而未嘗自以為非今五子自是豈異斯哉而與舟人鬪司馬云夜上人船人必擠已於水也擠排也離力智反注同岑土金反徐在林反又語審反謂崖岸也上尺掌反莊子送葬過惠子之墓顧謂從者曰郢人堊慢其鼻端蠅翼使匠石斫之匠石運斤成風聽而斫之瞑目恣手從才用反郢人以井反楚都也漢書音義作優人服虔云優人吉之善塗塈者施廣領大袖以仰塗而領袖不汚有小飛泥洖著其鼻因令匠石揮斤而斫之優音溫韋昭乃回反惡烏路反慢本亦作漫郭莫于反徐莫旦反李云猶塗也盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斫之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與言之矣非夫不動之質忘言之對則雖至言妙斫而無所用之為寡于偽反管仲有病桓公問之曰仲父之病病矣可不謂云至于大病則寡人惡乎屬國而可管仲曰公誰欲與公曰鮑叔牙曰不可其為人潔廉善士也其於不已若者不比之又一聞人之過終身不忘使之治國上且鉤乎君下且逆乎民其得罪於君也將弗久矣公曰然則孰可對曰勿已則隰朋可其為人也上忘而下畔高而不亢大病謂死也惡音烏屬音燭與如字又音餘鉤反也亦作拘音同又音俱上忘而下畔言在上不自高於下無背者也愧不皇帝而哀不已若者故無棄人以德分人謂之聖以財分人謂之賢以賢臨人未有得人者也以賢下人未有不得人者也其於國有不聞也其於家有不見也勿巳則隰朋可皆聞見則事鍾於己而群下無所措手足故遺之可也未能盡遺故僅可也下遐嫁反僅其靳反吳王浮于江登乎狙之山衆狙見之恂然棄而走逃於深蓁有一狙焉委蛇攫見巧乎王王射之敏給敏疾也給續括也狙七徐反恂音舜徐音荀又思俊反司馬云遽也蓁徐仕巾反一音側市反委於危反蛇餘支反攫具反徐居碧反三蒼云也郭又七假反司馬云本作攫本又作搔素報反徐本作七活反司馬本作條見賢遍反巧如字或苦孝反崔本作攻射良亦反下同捷矢捷速也矢往雖速而狙猶能音博王命相者趨射之狙執死王顧謂其友顔不疑曰之狙也伐其巧恃其便以敖豫以至此殛也戒之哉嗟乎無以汝色驕人哉顔不疑歸而師董梧以其色去樂辭顯三年而國人稱之稱其忘巧遺色而任夫素朴相者息亮反司馬云佐王獵者也趨音促急也執死司馬云見執而死也之狙也之猶是也本或作是便婢面反敖司馬本作悻云狼也董梧有道者也師其德以鋤色士居反本亦作鋤去起呂反南伯子綦隱几而坐仰天而噓顔成子入見曰夫子物之尤也形固可使稿骸心固可使死乎曰吾嘗居山穴之中矣當是時也田禾一覩我而齊國之衆三賀之以得見子綦為榮隱於靳反噓音虛見賢遍反夫物之尤也音符一本作夫子則如字山穴之中司馬本同李云齊南山穴也一本作之口田禾齊君也尊德故國人慶之我必先之彼故知之我必賣之彼故鬻之我而不有之彼惡得而知之若我而不賣之彼惡得而鬻之嗟乎我悲人之自喪者吾又悲夫悲人者吾又悲夫悲人之悲者其後而日遠矣子綦知夫為之不足以救彼而適足以傷我故以不悲悲之則其悲稍去而泊然無心枯稿其形所以為日逺矣鬻羊六反惡音烏下同喪息浪反泊步各反仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言巳古之言者必於會同觴音商李云酒器之總名也孫叔敖案左傳孫叔敖是楚莊王相孔子未生哀公十六年仲尼卒後白公為亂宜僚未嘗仕楚又宣十二年傳楚有熊相冝僚則與叔敖同時去孔子甚逺蓋言也曰丘也聞不言之言矣未之嘗言聖人無言其所言者百姓之言耳故曰不言之言茍以言為不言則雖言出於口故為未之嘗言於此乎言之今將於此言於無言市南宜僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵此二子息訟以默泊自若而兵難自解難乃旦反注同解音蟹注同司馬云宜僚楚之勇士也善弄丸楚白公勝將作亂殺令子尹子西期石乞曰市南有熊宜僚者得之可以當五百人乃往告之不許也承之以劒不動弄丸如故曰吾亦不泄子白公遂殺子西子期歎息兩家而巳宜僚不預其患甘寢秉羽如字又音翮司馬本作云讀曰翮或作趐雩舞者之所執崔本作翼郢人投兵司馬云言叔敖願安寢恬卧以養德於廟堂之上折衝於千里之外敵國不敢犯郢人投兵無所攻伐也郢楚都也丘願有喙三尺苟所言非巳則雖終身言故為未嘗言耳是以有喙三尺未足稱長凡人閉口未是不言喙許穢反又丁豆反或昌鋭反三尺言長也司馬云喙息也宜僚弄丸而弭難叔敖除備以折衝丘亦有願有歎息其三尺三尺首劒彼之謂不道之道彼謂二子此之謂不言之辨此謂仲尼彼之謂此之謂司馬云彼謂甘寢此謂弄丸故德總乎道之所一道之所容者雖無方然總其大歸莫過於自得故一也總音揔而言休乎知之所不知至矣言止其分非至如何道之所一者德不能同也各自得耳非相同也而道一也不能同一本作相同知之所不能知者辨不能舉也非其分故不能舉名若儒墨而凶矣夫儒墨欲同所不能同舉所不能舉故凶故海不辭東流大之至也明受之無所辭所以成大聖人并包天地澤及天下而不知其誰氏泛然都任是故生無爵有而無之死無諡諡所以名功功不在巳故雖諡而非巳有實不聚令萬物各知足名不立功非已為故名歸於物此之謂大人若為而有之則小矣狗不以善吠為良人不以善言為賢賢出於性非言所為善吠伐廢反司馬云不别客主而吠不止善言司馬云失本逐未而言不止也而况為大乎夫大愈不可為而得夫為大不足以為大而况為德乎唯自然乃德耳夫大備矣莫若天地然奚求焉而大備矣天地大備非求之也知大備者無求無失無棄不以物易已也知其自備者不舍巳而求物故無求無失無棄也舍音捨反巳而不窮反守我理我理自通循古而不摩順常性而自至耳非摩拭循古而不摩一本作磨王云摩消滅也雖常通物而不失及巳雖理於今常循於古之道焉自古及今其名不摩滅也拭音式大人之誠不為而自得故曰誠子綦有八子陳諸前召九方歅曰為我相吾子孰為祥九方歅曰梱也為祥子綦瞿然喜曰奚曰梱也將與國君同食以終其身子綦索然出涕曰吾子何為以至於是極也九方歅曰夫與國君同食澤及三族而况於父母乎今夫子聞之而泣是禦福也子則祥矣父則不祥子綦曰歅汝何足以識之而梱祥邪盡於酒肉入於鼻口矣而何足以知其所自來吾未嘗為牧而牂生於奧未嘗好田而鶉生於宎勿怪何邪夫所以怪出於不意故也九方歅音因李烏雞反又音煙善相馬人淮南子作九方皋為我于偽反相息亮反梱音困又口本反子綦子名瞿然紀具反司馬云喜貌本亦作爨吁縳反字林云大視貌李云驚視貌索然悉各反又色白反司馬云涕下貌禦魚吕反距也逆也嘗如字本或作曾才能反牂子郎反爾雅云牝羊也奧烏報反西南隅未地也一曰豕牢也好呼報反宎字又作烏弔反徐烏了反司馬云東北隅也一云東南隅鶉火地生鶉也一云窟也郭徒忽反字林穴下反吾所與吾子遊者遊於天地不有所為天地司馬本地作泊云亂也崔本同吾與之邀樂於天吾與之邀食於地隨所遇於天地耳邀遇也邀古堯反樂音洛吾不與之為事不與之為謀不與之為怪怪異也循常任性脫然自爾吾與之乘天地之誠而不以物與之相櫻斯不為也吾與之一委蛇而不與之為事所宜斯順耳無擇也今也然有世俗之償焉夫有功於物物乃報之吾不為功而償之何也償時亮反又音賞凡有怪徴者必有怪行殆乎非我與吾子之罪幾天與之也今無怪行而有怪徴故知其天命也行下孟反注同吾以是泣也夫為而然者勿為則已矣不為而自至則不可奈何也故泣之無幾何而使梱之於燕盜得之於道全而鬻之則難不刖之則易全恐其逃故不如刖之易售也幾居豈反燕音煙鬻之音育絶句本作鬻之難刖音月又五刮反易以豉反注同售受又反於是刖而鬻之於齊適當渠公之街然身食肉而終齧缺遇許由曰子將奚之曰將逃堯曰奚謂邪曰夫堯畜畜然仁吾恐其為天下後世其人與人相食與仁者爭尚之原故也渠公或云渠公齊之富室為街正買梱自代終身食肉至死一云渠公屠者與梱君臣同食肉也街音佳一本作術然身食肉終本或作身肉食者誤畜畜許六反郭他六反李云行仁貌王云恤愛勤勞之貌人與如宇人相食與音餘言將馳走於仁義不復營農飢則相食夫民不難聚也愛之則親利之則至譽之則勸致其所惡則散愛利出乎仁義仁義者寡利仁義者衆夫仁義之行唯且無誠仁義既行將偽以為之譽音餘惡烏路反行下孟反且假夫禽貪者器仁義可見則夫貪者將假斯器以其志且假夫禽貪者器司馬云禽之貪者殺害無極仁義貪者傷害無窮是以一人之斷制利天下夫仁義各出其情則其斷正不制乎一人譬之猶一覕也覕割也萬物萬形而以一劑割之則有傷也覕郭薄結反向芳舌反司馬云暫見貌又甫蒞反又普結反又初栗反劑子隨反夫堯知賢人之利天下也而不知其賊天下也夫唯外乎賢者知之矣外賢則賢不偽有暖姝者有濡需者有卷婁者所謂暖姝者學一先生之言則暖暖姝姝而私自也自以為足矣而未知未始有物也意盡形教豈知我之獨化於玄冥之竟哉暖吁爰反又吁晚反柔貌姝昌朱反妖貌濡音儒又音如安也需音須濡需謂偷安須之頃卷音權婁音縷卷婁猶拘攣也音恱竟音境是以謂暖姝者也濡需者豕蝨是也擇疏鬛自以廣宫大囿奎蹄曲隈乳間股腳自以為安室利處不知屠者之一旦鼓臂布草操煙火而巳與豕俱焦也此以域進此以域退此其所謂濡需者也非有通變藐世之才而偷安乎一時之利者皆豕蝨者也蝨音瑟奎苦圭反本亦作睽曲隈鳥回反向云股間也暖室奴緩反又虛爰反一本作安室操七曹反卷婁者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓恱之故三徙成都至鄧之虛而十有萬家堯聞舜之賢舉之童土之地曰兾得其來之澤舜舉乎童土之地年齒長矣聰明衰矣而不得休歸所謂卷婁者也聖人之形不異凡人故耳目之用衰也至於精神則始終常全耳若少則未成及長而衰則聖人之聖曾不崇朝可乎羊肉不慕蟻魚綺反李云年長心勞無愛樂之志是猶羊肉不慕蟻也羶設然反行下孟反鄧向云邑名之虛音墟本又作墟童土如字又音社向云童土也無草木地長丁丈反注同少詩召反是以神人惡衆至衆自至耳非好而致之惡烏路反好呼報反衆至則不比不比則不利也明舜之所以有天下蓋於不得巳耳豈比而利之比毗至反下注同故無所甚親無所甚踈抱德煬和以順天下此謂真人於蟻棄知於魚得計於羊棄意於民則澤於舜則形勞煬郭音羊徐餘亮反和李云煬炙也為和氣所炙知音智於蟻棄知於魚得計於羊棄意司馬云蟻得水則死魚得水則生羊得水則病一云真人無羶故不致蟻是蟻棄知也共處相忘之大道無沾濡之德是魚得計也羊無羶行而不致蟻是羊棄意也以目視目以耳聽耳以心復心此三音未能無其耳目心意也然者其平也繩未能去繩而自平去起吕反其變也循未能絶迹而玄會古之真人以天待之居無事以待事事斯得不以人入天以有事求無事事愈荒古之真人得之也生失之也死得之也死失之也生死生得失各隨其所居耳於生為得於死或復為失未始有常也復訣又反藥也其實堇也桔梗也雞也豕零也是時為帝者也何可勝言當其所須則無賤非其時則無貴容賤有時誰能常也堇音謹郭音覲徐音靳司馬云烏頭也治風冷痺桔音結本亦作結梗古猛反司馬云桔梗治心腹血瘀瘕痺雞徐於容反本或作壅音同司馬云即雞頭也名芡與藕子合為散服之延年豕零司馬本作豕囊云名豬苓根似豬卵可以治渴案四者皆藥草名是時為帝者也司馬云藥草有時迭相為帝謂其王相休廢藥各得所用也勝音升句踐也以甲楯三千棲於會稽唯種也能知亡之所以存唯種也不知其身之所以愁故曰鴟目有所適鶴脛有所節解之也悲各適其一時之用不能靡所不可則有時而失有時而失故有時而悲矣解去也句音鉤楯純尹反徐音尹棲音西李云登山曰棲會古外反稽音雞種章勇反越大夫名也吳越春秋云姓文字少禽所以存本又作可以存言知越雖亡可以存也鴟尺夷反脛刑定反解佳買反司馬云去也一音懈故曰風之過河也有損焉日之過河也有損焉有形者自然相與為纍唯外夫形者磨之而不磷有損有形自然相纍世能纍物物能纍人故大夫種所以不免也磷鄰鎮反請只風與日相與守河而河以為未始其攖也實巳損矣而不自覺恃源而往者也所以不覺非不損也恃源往也恃本亦作恃源而注者也水由源注雖遇風曰不能損也道成其性雖在於世不能移也故水之守土也審影之守人也審物之守物也審無意則止於分所以為審故目之於明也殆耳之於聰也殆心之於殉也殆有意則無崖故殆凡能其於府也殆殆之成也不給改所以貴其無能而任其天然禍之長也兹萃萃聚也苟不能忘知則禍之長也多端矣長丁丈反注同莘所巾反李云多也本又作萃其反也緣功反守其性則其功不作而成其果也待久欲速則不果而人以為巳寶不亦悲乎已寶謂有其知能故有亡國戮民無巳皆有其身之禍不知問是也不知問禍之所由由乎有心而修心以救禍也故足之於地也踐雖踐恃其所不蹍而後善博也人之知也少雖少恃其所不知而後知天之所謂也夫忘天地遺萬物然後蜩翼可得而知也况欲知天之所謂而可以不無其心哉恃其所不蹍女展反李云一足常不往故能行廣逺也知大一知大隂知大目知大均知大方知大信知大定至矣大一通之道也大隂解之用其分內則萬事無滯也解音蟹下同又佳買反大目視之用萬物之自見亦犬目也大均緣之因其本性令各自得則大均也令力呈反下同大方體之體之使各得其分則萬方俱得所以為大方也大信稽之命之所期無令越逸斯大信也大定持之真不撓則自定故持之以大定斯不持也撓乃孝反盡有天夫物未有無自然者也循有照循之則明無所作也冥有樞至理有極但當冥之則得其樞要也樞尺朱反始有彼始有之者彼也故我述而不作則其解之也似不解之者天解任彼則彼自解解之無功故似不解其知之也似不知之也用彼知也不知而後知之我不知則彼知自用彼知自用則天下莫不皆知也其問之也不可以有崖應物宜而無方而不可以無崖各以其分頡滑有實萬物雖頡滑不同而物物各自有實也頡徐下結反滑乎八反向云頡滑謂錯亂也古今不代各自有故不可相代而不可以虧宜各盡其分也則可不謂有大揚榷乎榷而揚之有大限也揚榷音角又可學反三蒼云榷敵也許慎云揚榷粗略法度王云榷略而揚顯之也闔不亦問是已奚惑然為問其大榷則物有至分故忘巳恁物之理可得而知也奚為而惑此也以不惑解惑復於不惑是尚大不惑夫惑不可解故尚大不惑愚之至也是以聖人從而任之所以皇王殊迹隨世為名也解佳買反蟹同復音服又扶六反莊子雜篇則陽第二十五音義曰以人各篇則陽遊於楚夷節言之於王王未之見夷節歸彭陽見王果曰夫子何不談我於王王果曰我不公閲休彭陽曰公閲休奚為者邪曰冬則擉鱉于江夏則休乎山樊有過而問者曰此豫宅也言此者以抑彭陽之進趨則陽司馬云名則陽字彭陽也一云姓彭名則陽周初人也夷節楚臣王果司馬云楚賢人談音談本亦作談李云也郭徒堪反徐徒暗反公閲休隱士也閲音悅擉初角反又敕角反司馬云刺也郭音觸徐下六反一音捉樊音煩李云傍也司馬云隂也廣雅云邉也豫宅司馬云以隱居山隂自顯也夫夷節巳不能而况我乎吾又不夷節夫夷節之為人也無德而有知不自許以之神其交固顛冥乎冨貴之地言巳不夷節之好冨貴能交結意盡形名任知以干上也知音智注同顛冥音眠司馬云顛冥猶迷惑也言其交結人主情馳冨貴非相以德相消也茍進故德薄而名消夫凍者假衣於春暍者反冬乎冷風言巳順四時之施不能赴彭陽之意暍音謁字林云傷暑也施始豉反下同夫楚王之為人也形尊而嚴其於罪也無赦如虎非夫佞人正德其孰能橈焉故聖人其窮也使家人忘其貧淡然無欲樂足於所遇不以侈靡為貴而以道德為榮故其家人不識貧之可苦能橈乃孝反又呼毛反王云惟正德以至道服之佞人以才辨奪之故能泥橈之也淡徒暫反其逹也使王公忘爵祿而化卑輕爵祿而重道德超然坐忘不覺榮之在身故使王公失其所以為高而化卑居高而以卑為本也本或作而化卑於人也其於物也與之為誤矣不以為物自苦其於人也樂物之通而保巳焉通彼而不喪我喪息浪反故或不言而飮人以和人各自得斯飲和矣豈待言哉飲於鴆反與人並立而使人化望其風而靡之父子之宜彼其乎歸居使彼父父子子各歸其所而一間其所施其所施同天地之德故間靜而不二間音間其於人心者若是其逺也故曰待公閲休欲其釋楚王而從閲休將以靜泰之風鎮其動心也聖人逹綢繆所謂玄通綢直周反繆亡侯反綢繆猶纒綿也又云深奧也周盡一體矣無內外而皆洞照周盡一體所鑒綢繆精粗洞盡故言周盡一體一體天也而不知其然性也不知其然而自然者非性如何復命搖作而以天為師搖者自搖作者自作莫不復命而師其天然也復命搖作搖動也萬物動作生長各有天然則是復其命也人則從而命之也此非赴名而高其迹師性而動其迹自高故人不能下其名也命名也憂乎知而所行無幾時其有止也之何任知其行則憂患相繼知音智幾居豈反時其有止也之何王云憂乎智謂有為者以形智不至為憂也不知用智必喪喪而更以不智為憂及其智之所行有弊無濟故其憂患相接無須停息故曰恆無幾時其有止也不能遺智去憂非可憂如何生而美者人與之鑑不告則不知其美於人也鑑鏡也鑑物無私故人美之今夫鑑者豈知鑑而鑑邪生而可鑑則人謂之鑑耳人不相告則莫知其美於人譬之聖人人與之名則不知其美於人生便有見物之美而為無心人與作名言鏡耳故人美之不相告即莫知其美於人若知之不知之聞之不聞之其可喜也終無巳夫鑑之可喜由其無情不問知與不知聞與不聞來即鑑之故終無巳鑑由聞知則有時而廢也人之好之亦無巳性也性所不好豈能久照好呼報反注同聖人之愛人也人與之名不告則不知其愛人也聖人無愛鏡耳然而事濟於物故人與之名人不相告則莫知其愛人也知之不知之聞之不聞之其愛人也終無巳蕩然以百姓為芻狗而道合於愛人故能無已愛人由乎聞知則有時而衰也人之安之亦無巳性也性之所安故能久舊國舊都望之暢然得舊猶暢然况得性乎暢然喜恱貌雖使丘陵草木之緡緡合也緡民忍反徐音昏司馬云盛也入之者十九猶之暢然况見見聞聞者也見所嘗見聞所嘗聞而猶暢然况體其體用其性也十九謂見十識九也見見聞聞見所見聞所聞以十仞之臺縣衆間者也衆之所習雖危猶間况聖人之無危縣音玄間音間注同元嘉本作間冉相氏得其環中以隨成冉相氏古之聖王也居空以隨物物自成冉相息亮反注同與物無終無始無曰皆殉也所行行備而物我無傷故無壞敗也湯得其司御門尹登恆為之傅之委之百官而不與焉門尹登恆向云門尹官名登人名為于偽反下同傅音付下同與音預從師而不囿任其自聚非囿之也縱其自散非解之也得其隨成為之司其名司御之屬亦能隨物之自成也而湯得之所以名於物而功不在巳之名嬴法得其兩見名法者巳過之迹而非適足也故曰嬴然無心者治於羣司則其名迹並見於彼嬴音盈法得其兩見賢遍反注同得其隨成之道以司其名名實法立故得兩見猶人鑑之相得也治直吏反仲尼之盡慮為之傅之仲尼曰天下何思何慮慮巳盡矣有纎芥之慮豈得寂然不動應感無窮以輔萬物之自然也容成氏曰除日無歲今所以有歲而存日者為有死生故也無死無生則歲日之計除也容成老于師也無內無外無彼我則無內外也魏瑩與田侯牟約田侯牟背之魏瑩怒將使人刺之犀首聞而耻之曰君為萬乘之君也而以匹夫從讎請受甲二十萬為君攻之虜其人民係其牛馬使其君內發於背然後拔其國忌也出走然後抶其背折其脊季子聞而耻之曰築十仞之城城者既十仞矣則又壞之此胥靡之所苦也今兵不起七年矣此王之基也亂人不可聽也華子聞而醜之曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也君曰然則何曰君求其道而巳矣惠子明之而見戴人戴人曰有所謂蝸者君知之乎曰然蝸至微而有兩角魏瑩郭本作瑩音罃磨之瑩今本多作罃乙耕反司馬云魏惠王也與田侯一本作田侯牟司馬云田侯齊威王也名牟桓公子案史記威王名囚不名牟約徐於妙反又如字司馬云約誓在惠王二十六年背音佩刺七賜反犀首魏官名也司馬云今虎牙將軍公孫為此官元嘉本作齒首乘繩證反為君于偽反下請為君同忌也出走忌畏而走或言圍之也元嘉本忌作亡抶敕一反三蒼云擊也郭云秩又豬栗反折之舌反季子魏臣壞音怪華子亦魏臣也惠子惠施也見賢遍反下同戴人梁國賢人惠施薦之於魏王蝸音郭音戈李云蝸蟲有兩角俗謂之蝸牛三蒼云小牛螺也云俗各黃犢有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反誠知所爭者此之細也則天下無爭矣數色主反北如字又音佩軍走曰北君曰噫其虛言與曰臣請為君實之君以意在四方上下有窮乎君曰無窮曰知遊心於無窮而反在通逹之國人迹所及為通逹謂今四海之內也噫於其反與音餘存亡乎君曰然今自以四海為大然計在無窮之中有無也曰通逹之中有魏於魏中有梁於梁中有王王與蠻氏有辨乎君曰無辨王與蠻氏俱有限之物耳有限則不問大小俱不得與無窮者計也雖復天地共在無窮之中皆蔑如也况魏中之梁梁中之王而足爭哉復扶又反客出而君惝然有亡也自悼所爭者細惝音敞字林云惘也又吐蕩反客出惠子見君曰客大人也聖人不足以當之惠子曰夫吹管也猶有嗃也吹劒首者吷而巳矣堯舜人之所譽也道堯舜於戴人之前譬猶一吷也曽不足聞管音管本亦作管嗃許交反管聲也玉篇呼洛反又呼教反廣雅云鳴也劒首司馬云謂劒環頭小孔也吷音血又呼恱反司馬云吷然如風過譽音餘孔子之楚舍於蟻丘之漿其鄰有夫妻臣妾登極者子路曰是稯稯何為者邪仲尼曰是聖人僕也是自埋於民與民同蟻丘魚綺反李云蟻丘山名漿李云賣漿家司馬云謂逆旅舍以菰蔣草覆之也登極司馬云極屋楝也升之以觀也一云極平頭屋也稯音揔字亦作揔李云聚貌又作稷一本作稷初力反聖人僕謂懷聖德而隱僕也司馬本僕作朴謂聖人壞朴自藏於畔進不榮華退不枯稿藏於畔王云修田農之業是隱藏於壠畔其聲銷損其名也銷音消司馬云小也損本亦作損其志無窮規是生也其口雖言其心未嘗言所言者皆世言方且與世違而心不屑與之俱心與世異不屑屑潔也不潔世也本或作肯是陸沈者也人中隱者譬無水而沈也陸沈司馬云當顯而反隱如無水而沈也是其市南宜僚邪子路請往召之孔子曰巳矣彼知丘之著於巳也著明也知丘之適楚也以丘為必使楚王之召巳也彼且以丘為佞人也夫若然者其於佞人也羞聞其言而况親見其身乎而何以為存不如舍之以從其志子路往視之其室虛矣果逃去也長梧封人問子牢曰君為政焉勿鹵莽治民焉勿滅裂鹵莽滅裂輕脫末略不盡其分長梧地名封人守封疆之人子牢司馬云即琴牢孔子弟子鹵音魯莽莫古反又如字滅裂猶短草也李云謂不熟也司馬云鹵莽猶粗粗也謂淺耕稀種也滅裂斷其草也昔豫為禾耕而鹵莽之則其實亦鹵莽而報豫藝而滅裂之其實亦滅裂而報豫豫來年變齊深其耕而熟耰之功盡其分無所不至藝音云除草也亦齊才細反司馬如字云變更也謂變更所法也齊同也耰音憂司馬云鋤也廣雅云推也字林云摩田器也其禾繁以滋豫終年厭飱莊子聞之曰今人之治其形理其心多有似封人之所謂遁其天離其性滅其情亡其神以衆為夫遁離滅亡以衆為之所致也各致其極則何患也飱音孫本又作飱離力智反下同衆為如字王云凡事所可為者也遁離滅亡皆猶衆為衆為所謂鹵莽也司馬本作為偽故鹵莽其性者欲惡之孽為性萑葦萑葦害禾稷欲惡傷正性惡烏洛反注並同孽魚列反萑音丸葦葦干反蘆也蒹葭始萌以扶吾形形扶踈則神氣傷蒹古恬反廉也葭音加亦蘆也尋擢吾性以欲惡引性不止於當並潰漏發不擇所出漂疽疥癕內溲膏是也此鹵莽之報也故治性者安可以不齊其至分潰回內反漏發李云謂精氣散泄上潰下漏不擇所出也漂本亦作瘭徐敷妙反又匹招反一音必招反疽七餘反瘭疽謂病瘡膿出也疥音界溲本或作瘦所求反司馬云謂虛勞人尿上生肥白沫也皆為利欲感動失其正氣不如深耕熟耰之有實齊才細反又如字柏矩學於老聃曰請之天下遊老聃曰巳矣天下猶是也又請之老聃曰汝將何始曰始於齊至齊見辜人焉推而強之解朝服而幕之號天而哭之曰子乎子乎天下有大災子獨先離之曰莫為盜莫為殺人殺人大災謂自此以下事大災既有則雖戒以莫為其可得已乎柏矩有道之人辜罪也李云謂應死人也元嘉本作幸人強其良反字亦作強朝古遙反莫音幕司馬云覆也號戶刀反災音哉離著也榮辱立然後覩所病各自得則無榮辱得失紛紜故榮辱立榮辱立則夸其所謂辱而其所謂榮矣奔馳乎夸跂之間非病如何貨財聚然後覩所爭以知足為冨將何爭乎今立人之所病聚人之所爭窮困人之身使無休時欲無至此得乎上有所好則下不能安其本分好呼報反古之君人者以得為在民以失為在巳君莫之失則民自得矣以正為在民以枉為在已君莫之枉則民自正故一形有失其形者退而自責夫物之形性何為而失哉皆由人君撓之以至斯患耳故自責今則不然匿為物而愚不識反其性匿也用其性顯也故為物所顯則皆識匿女力反愚一本作遇不識反物性而強令識之大為難而罪不敢為物所易則皆敢大為難而罪不敢王云凡所施為者皆用物之所能則莫不易而敢矣而故大為艱難令出不能物有不敢者則因罪之易以豉反重為任而罰不勝輕其所任則皆勝勝音萬物有乎生而莫見其根有乎出而莫見其門無根無門忽爾自然故莫見也唯無其生亡其出者為能覩其門而惻其根也人皆尊其知之所知而莫知恃其知之所不知而後知可不謂大疑乎我所不知物有知之者矣故用物之知則無所不知獨任我知知其寡矣今不恃物以知而自尊其知則物不告我非大疑如何巳乎巳乎且無所逃不能用彼則身無地此則所謂然與然乎自謂然者天下未之然也與音餘又如字然乎言未然仲尼問於大史大韜伯常蹇狶韋曰夫衛靈公飮酒湛樂不聽國家之政田獵畢弋不應諸侯之際其所以為靈公者何邪大韜曰是因是也靈即是無道之諡也太史音泰韜吐刀反人名伯常蹇起虔反人名狶本亦作俙同虛豈反又音希郭音郗李音熙韋李云狶韋者太史官名湛丁南反樂之久也李常反樂音洛應應對之應諸侯之際司馬云盟會之事伯常騫曰夫靈公有妻三人同濫而浴男女同浴此無禮也同濫徐明暫反或力暫反浴器也史鰌奉御而進所搏幣而扶翼以鰌為賢而奉御之勞故幣而扶翼之使其不得終禮此其所以為肅賢也幣者奉御之物史鰌音秋司馬云史魚也音博弊郭作弊帛也徐扶世反司馬音蔽云引衣裳自蔽扶翼司馬云謂公及浴女相扶翼自隱也此殊郭義其慢彼之甚也見賢人此其肅也是其所以為靈公也欲以肅賢其私慢靈有二義亦可謂善故仲尼問焉狶韋曰夫靈公也死葬於故墓不吉葬於沙丘而吉掘之數仞得石槨焉洗而視之有銘焉曰不馮其子靈公奪而里之夫靈公之為靈也久矣子謂蒯聵也言不馮其子靈公將奪女處也夫物皆先有其命故來事可知也是以凡所為者不得不為凡所不為者不可得為而愚者以為之在巳不亦妄乎故墓一本作大墓沙丘地名掘其月反又其勿反數所主反洗西禮反馮音憑其子靈公郭讀絶句司馬以其子字絶句云言子孫不足可憑故使公得此處為冡也奪而里而汝也里居處也一本作奪而埋之蒯起怪反瞶五怪反蒯瞶衛莊公名女音汝處昌慮反之二人何足以識之徒識巳然之見事耳未知巳然之出於自然也見賢遍反少知問於大公調曰何謂丘里之言大公調曰丘里者合十姓百名而以為風俗也合異以為同散同以為異令指馬之百體而不得馬而馬係於前者立其百體而謂之馬也是故丘山積卑而為高江河合水而為大大人合并而為公無私於天下則天下之風一也大公音泰下同丘里李云四井為邑四邑為丘五家為鄰五鄰為里古者鄰里井邑士風不同猶今鄉曲各自有方俗而物不齊同十姓百名一姓為十人十姓為百名則有異有同故合散以定之卑如字又音婢合水一本作合流合并而為公合羣小之稱以為至公之一也是以自外入者有主而不執由中出者有正而不距自外入者大人之化也由中出者民物之性也性各得正故民無違心化必至公故主無所執所以能合丘里而并天下一萬物而夷羣異也四時殊氣天不賜故歲成殊氣自有故能常有本無之而由天賜則有時而廢賜與也五官殊職君不私故國治殊職自有其才故任之耳非私而與之治直吏反文武大人不賜故德備文者自文武者自武非大人所賜也由賜而能則有時而闕矣豈唯文武凡性皆然萬物殊理道不私故無名無名故無為無為而無不為名止於實故無為實各自為故無不為時有終始世有變化故無心者斯順禍福淳淳流行反覆淳淳如字王云流動流貌覆芳服反至有所拂者而有而期曰萬物者以數之多者號而讀之也夫有數之物猶不止於萬况無數之數謂道而足邪讀李云讀猶也是故天地者形之大者也隂陽者氣之大者也道者為之公物得以通通物無私而強字之曰道強巨丈反因其大以號而讀之則可也所謂道可道也巳有之矣乃將得比哉名已有矣故乃將無可得而比邪則若以斯辨譬猶狗馬其不及逺矣今名之辨無不及逺矣故謂道猶未足也必在乎無名無言之域而後至焉雖有名故莫之比也少知曰四方之內六合之此物之所有皆物之所有自然而然耳非無能有之也隨序謂變化相隨有次序也序或作原一本作享橋運之相使橋運謂相橋代頓至次序以相通理橋運以相制使也言之所盡知之所至極物而巳物表無所復有故言知不過極物也復扶又反覩道之人不隨其所廢不原其所起廢起皆自爾無所原隨也此議之所止極於自爾故無所議少知曰季真之莫為接子之或使二家之議孰正於其情孰遍於其理季真曰道莫為也接子曰道或使或使者有使物之功也季真接子李云二賢人遍音遍徐音篇大公調曰故求之於言意之表而後至焉未生不可忌突然自生制不由我我不能禁巳死不可徂忽然自死吾不能違可徂一本作阻死生非遠也理不可覩近於身中猶莫見其自爾而欲憂之或之使莫之為疑之所假此二者世所至疑也吾觀之本其往無窮吾求之末其來無止無窮無止言之無也與物同理物理無窮故其言無窮然後與物同理也或使莫為言之本也與物終始恆不為而自使然也道不可有有不可無道故不能使有而有者常自然也道之為名所假而行物所由而行故假名之曰道或使莫為在物一曲夫胡為於大方舉一隅便可知言而足則終日言而盡道求道於言意之表則足言而不足則終日言而盡物不能忘言而存意則不足道物之極言默不足以載夫道物之極常莫為而自爾不在言與不言非言非默議其有極極於自爾非言默而議也南華真經卷第八
