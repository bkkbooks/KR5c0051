  - {type: variant, offset: 6204, length: 905, content: 無窮哉宋人宋今梁國睢陽縣殷後微子所封資章甫李云資貨也章甫殷冠也以冠爲貨越今㑹稽山隂縣斷丁管反李徒短反司馬本作敦云敦斷也四子司馬李云王倪齧缺衣許由汾水徐扶云反郭方聞反案汾水出太原今莊生寓言也司馬崔本作盆水窅然徐烏子反郭武駢反李云窅然猶悵然䘮息浪反注同冥亡丁反竟音境本亦作境惠子謂莊子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以爲瓢則落無所容非不呺然大也吾爲其無用而掊之莊子曰夫子固拙於用大矣宋人有善爲不手之藥者世世以洴澼絖爲事其藥能令手不拘坼故常漂絮於水中也惠子司馬云姓惠名施爲梁相魏王司馬云梁惠王也按魏自河東遷大梁故謂之魏或謂之梁也貽徐音怡郭與志反遺也瓠徐音護種章勇反實五石司馬云實中容五石盛音成剖普口反瓢毗遥反徐扶堯反則戸郭反司馬音護下同落簡文云落猶廓落也司馬云布護也落零落也言其形平而淺受水則零落而容也呺本亦作号徐許橋反李云号然虚大貌崔作簡文同吾爲于僞反棓徐方垢迄司馬云擊要也手愧悲反徐舉倫反李居危反向云坸坼也司馬云文拆如文也又云如縮也洴徐扶經反澼普歷反徐敷歷反郭李恪歷反澼聲絖音曠小爾稚云絮細者謂之絖李云洴澼絖者漂絮於水上絖絮也令力呈反不拘紀于反依字宜作跔紀于求于二反周書云天寒足跔是也折勑白反漂四妙反韋昭云以水擊絮爲漂文作敝豐市反又四例反絮胥慮反客聞之請買其方百金聚族而謀曰我世世爲洴澼絖不過數金今一朝而鬻技百金請與之客得之以吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之能不手一也或以封或不免於洴澼絖則所用之異也今子有五石之瓠何不慮以爲大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫蓬非直逹者也此章言物各有宜苟得其宜安往而不逍遥也百金李云金方寸重一斤爲一金百金百斤也數色主反鬻音育司馬云賣也技本或作竭彼反始銳反又如字難乃旦反將子匠反敗必邁反大樽本亦作尊司馬云樽如酒器縛之於身浮於江湖可以自渡慮猶結綴也案所謂舟蓬向云蓬者短不暢曲土之謂惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之匠者不顧今子之言大而無用衆所同去也莊子曰子獨不見狸狌乎卑身而伏以候敖者東西跳梁不避高下中於機辟死於罔罟今夫牛其大若垂天之雲此能爲大矣而不能執䑕今子有大樹患其無用何不樹之於, ZTDZ: ''}
