  - {type: page-break, offset: 11557, content: '', id: KR5c0051_SJB_002-110591c}
  - {type: page-break, offset: 11557, content: '', id: KR5c0051_SJB_002-110592a}
  - {type: variant, offset: 11558, length: 0, content: '', ZTDZ: 太息而言仁孝乎哉夫孝悌仁義忠信貞廉此皆自勉以役其德者也不足多也故曰至貴國爵并焉至富國財并焉至願名譽并焉是以道不渝北門成問於黄帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩默默乃不自得帝曰汝殆其然哉吾奏之以人徽之以天行之以禮義建之以太清四時迭起萬物循生一盛一衰文武倫經一清一濁陰陽調和流光其聲蟄蟲始作吾驚之以雷霆其卒無尾其始無首一死一生一僨一起所常無窮而一不可待汝故懼也吾又奏之以陰陽之和燭之以日月之明其聲能短能長能柔能剛變化齊一不主故常在谷滿谷在阬滿阬塗郤守神以物爲量其聲揮綽其名高明是故鬼神守其幽日月星辰行其紀吾止之於有窮流之於無止子欲慮之而不能知也望之而不能見也逐之而不能及也儻然立於四虚之道倚於槁梧而吟目知窮乎所欲見力屈乎所欲逐吾旣不及已矣形充空虚乃至委蛇汝委蛇故怠吾又奏之以無怠之聲調之以自然之命故若混逐叢生林樂而無形布揮而不曳幽昏而無聲動於無方居於窈冥或謂之死或謂之生或謂之實或謂之榮行流散徙不主常聲世疑之稽於聖人聖也者達於情而遂於命也天機不張而五官皆備此之謂天樂無言而心悦故有焱氏爲之頌曰聽之不聞其聲視之不見其形充滿天地苞裹六極汝欲聽之而無接焉而故惑也樂也者始於懼懼故祟吾又次之以怠怠故遁卒之於惑惑故愚愚故道道可載而與之俱也孔子西遊於衛顔淵問師金曰以夫子之行爲奚如師金曰惜乎而夫子其窮哉顔淵曰何也師金曰夫芻狗之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘇者取而爨之而已將復取而盛以篋衍巾以文繡遊居寢卧其下彼不得夢必且數眯焉今而夫子亦取先生已陳芻狗取弟子遊居寢卧其下故伐樹於宋削迹於衛窮於商周是非其夢邪圍於陳蔡之間七日不火食死生相與鄰是非其昧邪夫水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸則没世不行尋常古今非水陸與周魯非舟車與今蘄行周於魯是猶推舟於陸也勞而無功身必有殃彼未知夫無方之傳應物而不窮者也且子獨不見夫桔橰者乎引之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人故夫三皇五帝之禮義法度不矜於同而矜於治故譬三皇五帝之禮義法度其猶相梨橘柚邪其味相反而皆可於口故禮義法度者應時而變者也今取猨狙而衣以周公之服彼必齕齧挽裂盡去而}
  - {type: page-break, offset: 11558, content: '', id: KR5c0051_SJB_002-110592b}
  - {type: page-break, offset: 11558, content: '', id: KR5c0051_SJB_002-110592c}
  - {type: variant, offset: 11559, length: 0, content: '', ZTDZ: 慊觀古今之異猶猨狙之異乎周公也故西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美矉而不知矉之所以美惜乎而夫子其窮哉孔子行年五十有一而不聞道乃南之沛見老聃老聃曰子來乎吾聞子北方之賢者也子亦得道乎孔子曰未得也老子曰子惡乎求之哉曰吾求之於度數五年}
  - {type: page-break, offset: 11559, content: '', id: KR5c0051_SJB_002-110593a}
  - {type: variant, offset: 11561, length: 4, content: 往耳丘將, ZTDZ: 得老子曰子又惡乎求之哉曰吾求之於陰陽十有二年而未得老子曰然使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以告人則人莫不告其兄弟使道而可以與人則人莫不與其子孫然而不可者無他也中無主而不止外無正而不行由中出者不受於外聖人不出由外入者無主於中聖人不隱名公器也不可多取仁義先生之蘧廬也止可以一宿而不可乆處覯而多責古之至人假道於仁託宿於義以遊道遥之墟食於荀簡之田立於不貸之圃逍遥無爲也荀簡易養也不貸無出也古者謂是采眞之遊以富爲是者不能讓禄以顯爲是者不能讓名親權者不能與人柄操之則慄舍之則悲而一無所鑒以闚其所不休者是天之戮民也怨恩取與諫教生殺八者正之器也唯循大變無所湮者爲能用之故曰正者正也其心}
  - {type: page-break, offset: 11561, content: '', id: KR5c0051_SJB_002-110593b}
