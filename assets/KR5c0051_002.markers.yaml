  - {type: variant, offset: 4512, length: 606, content: 然者雖不爲病直於古故無以病我也是之謂與古爲徒若是則可乎仲尼曰惡惡可大多政法而不諜當理無二而張三條以政之與事不冥也大音㤗徐勑佐反崔本作太諜徐徒叶反向吐頰反李云安也崔云間諜也雖固亦無罪雖未弘大亦且不見咎責雖然止是耳矣夫胡可以及化罪則無矣化則未也猶師心者也挾三術以適彼非無心而付之天下也挾戸牒反顔回曰吾無以進矣敢問其方仲尼曰齋吾將語若有而爲之其易邪夫有其心而爲之者誠未易也曰齋本亦作齊同則皆反下同易以豉反後皆同向崔云輕易也易之者暭天不宜以有爲爲易未見其宜也暭徐胡老反向云暭天自然也顔回曰回之家貧唯不飮酒不茹葷者數月矣若此則可以爲齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰若一志去異端而任獨也茹徐音汝食也葷徐許云反數色主反夫起吕反下同無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虚而待物者也遺耳目去心意而符氣性之自得此虚以待物者也唯道集虚虚者心齋也虚其心則至道集於懷也顔回曰回之未始得使實自回也未使心齋故有其身未始得使絶句崔讀至實字絶句得使之也未始有回也旣得心齋之使則無其身可謂虚乎夫子曰盡矣吾語若若能入遊其樊而無感其名放心自得之場當於實而止入則鳴不入則止譬之宫啇應而無心故曰鳴也夫無心而應者任彼耳不強應也強其文也無門無毒使物自若無門者也付天下之自安無毒者也毒治也毒如字治也崔本作毎云貪也一宅而寓於不得巳不得巳者理之必然者也體至一之宅而㑹乎必然之無也而寓崔本作如愚則幾矣埋盡於斯絶迹易無行地難不行則易欲, ZTDZ: ''}
