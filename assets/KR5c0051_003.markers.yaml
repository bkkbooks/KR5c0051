  - {type: variant, offset: 12120, length: 719, content: 日新而無方而遊於無有者也與萬物爲體則所遊者虚也不能物則迕物不睱何睱遊虚哉鄭有神巫曰季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆弃而走不憙自聞死日也神巫曰季咸李云女曰巫男曰覡季咸名不憙許忌反列子見之而心醉歸以告壺子曰始吾以夫子之道爲至矣則又有至焉者矣謂季咸之至又過於夫子心醉向云迷感於其道也壺子司馬云名林鄭人列子師壺子曰吾與汝旣其文未旣其實而固得道與衆雌而無雄而又奚焉言列子之未懷道也旣其文李云旣盡也與音餘衆雌而無雄而又奚夘焉司馬云言汝受訓未熟故未成若衆雌無雄則無也而以道與世亢必信夫故使人得而相汝未懷道則有心有心而亢其一方以必信於世故可得而相之亢苦浪反必信崔力純反相息亮反注下同嘗試與來以予示之明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣吾見怪焉見濕焉列子入泣涕沾以告壺子壼子曰鄕吾示之以地文萌乎不震不正萌然不動亦不自正與枯木同其不華濕均於寂魄此乃至人無感之時也夫至人其動也天其静也地其行也水流其止也淵黙淵黙之與水流天行之與地止其於不爲而自爾一也今季咸見其尸居而坐忘即謂之將死覩其神動而天隨因謂之有生誠應不以心而理自玄符與變化升降而以世爲量然後足爲物主而順時無極故非相者所測耳此應帝王之大意也示之本亦作視崔云示視之也嘻徐音熈郭許意反數所主反鄕許亮反本作曏亦作向同崔本作康云向也地文與士同也崔云文猶理也不震不正並如字崔本作不誫不止云如動不動也應應對之應後同是殆見吾杜德機也德機不發曰杜吾杜德機崔云塞吾德之機嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣全然有生矣吾見其杜權矣權機也今乃自覺昨日之所見見其杜權故謂之將死瘳丑留反列子入以吿壺子壺子曰鄕吾示之以天壤天壤之中覆載之功見矣比之地文不猶乎此應感之容, ZTDZ: 甚}
