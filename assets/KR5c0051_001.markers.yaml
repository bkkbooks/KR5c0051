  - {type: line-break, offset: 22114, content: '', id: KR5c0051_SBCK_001-5b04}
  - {type: indent, offset: 22114, content: 　　　　　　　　　　　, id: KR5c0051_krp_001-bkkind22}
  - {type: variant, offset: 22114, length: 3, content: 郭象注, ZTDZ: 將爲胠篋探囊發匱之盜而爲守備則必攝緘滕固扃鐍此世俗之所謂知也然而巨盜至則負匱揭篋擔囊而趨唯恐緘縢扃鐍之不固也然則向之所謂知者不乃爲大盜積者也故嘗試論之世俗之所謂知者有不爲大盜積者乎所謂聖者有不爲大盜守者乎何以知其然邪昔者齊國鄰邑相望雞狗之音相聞罔罟之所布來耨之所刺方三千餘里闔四境之内所以立宗廟社稷治邑屋州閶鄕曲者曷嘗不法聖人哉然而田成子一旦殺齊君而盜其國所盜者豈獨其國邪並與其聖知之法而盜之故田成子有乎盜賊之名而身處堯舜之安小國不敢非大國不敢誅}
  - {type: 'kr:newline', offset: 22117, content: '

      ', id: KR5c0051_krp_001-bkkkrnewl956}
  - {type: line-break, offset: 22117, content: '', id: KR5c0051_SBCK_001-5b05}
  - {type: punctuation, offset: 22117, content: (, id: KR5c0051_krp_001-bkkpn2804}
  - {type: variant, offset: 22118, length: 0, content: '', ZTDZ: 二世有齊國則是不乃竊齊國並與其聖知之法以守其盜賊之身乎嘗試論之世俗之所謂至知者有不爲大盜積者乎所謂至聖者有不爲大盜守者乎何以知其然邪昔者龍逄斬比干剖萇弘肔子胥靡故四子之賢而身不免乎戮故跖之徒問於跖曰盜亦有道乎跖曰何適而無有道邪夫妄意室中之藏聖也入先勇也出後義也知可否知也分均仁也五者不備而能成大盜者天下未之有也由是觀之善人不得聖人之道不立跖不得聖人之道不行天下之善人少而不善人多則聖人之利天下也少而害天下也多故曰脣竭則齒寒魯酒薄而邯鄲圍聖人生而大盜起掊擊聖人縱舍盜賊而天下始治矣夫川竭而谷虚丘夷而淵實聖人已死則大盜不起天下平而無故矣聖人不死大盜不止雖重聖人而治天下則是重利盜跖也爲之斗斛以量之則并與斗斛而竊之爲之權衡以稱之則並與權衡而竊之爲之符璽以信之則並與符璽而竊之爲之仁義以矯之則并與仁義而竊之何以知其然邪彼竊鉤者誅竊國者爲諸侯諸侯之門而仁義存焉則是非竊仁義聖知邪故逐於大盜揭諸侯竊仁義并斗斛權衡符璽之利者雖有軒冕之賞弗能勸斧鉞之威弗能禁此重利盜跖而使不可禁者是乃聖人之過也故曰魚不可脱於淵國之利器不可以示人彼聖人者天下之利器也非所以明天下也故絶聖棄知大盜乃止摘玉毁珠小盜不起焚符破璽而民朴鄙掊斗折衡而民不爭殫殘天下之聖法而民始可與論議擢亂}
  - {type: page-break, offset: 22118, content: '', id: KR5c0051_SJB_001-110583a}
  - {type: page-break, offset: 22118, content: '', id: KR5c0051_SJB_001-110583b}
  - {type: variant, offset: 22119, length: 1, content: 葉, ZTDZ: 律鑠絶竽瑟塞瞽曠之耳而天下始人舍其聰矣滅文章散五采膠離朱之目而天下始人舍其明矣毁絶鉤繩而棄規矩攦工倕之指而天下始人有其巧矣故曰大巧若拙削曾史之行鉗揚墨之口攘棄仁義而天下之德始玄同矣彼人含其明則天下不鑠矣人舍其聰則天下不累矣人含其知則天下不惑矣人含其德則天下不僻矣彼曾史楊墨師曠工倕離朱者皆外立其德而以爚亂天下者也法之所無用也子獨不知至德之世乎昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏戲氏神農氏當是時也民結繩而用之甘其食美其服樂其俗安其居鄰國相望雞狗之音相聞民至老死而不相往來若此之時則至治已今遂至使民延頸舉踵曰某所有賢者赢糧而趣之則内棄其親而外去其主之事足跡接乎諸侯之境車軌結乎千里之外則是上好知之過也上誠好知而無道則天下大亂矣何以知其然邪夫弓弩畢弋機變之知多則鳥亂於上矣鉤餌罔罟罾笱之知多則魚亂於水矣削格羅落置罘不知多則獸亂於澤矣知詐漸毒頡滑堅白解垢同異之變多則俗惑於辯矣故天下每每大亂罪在於好知故天下皆知求其所不知而莫知求其所已知者皆知非其所不善而莫知非其所已善者是以大亂故上悖日月之明下爍山川之精中墮四時之施喘耎之蟲肖翹之物莫不失其性甚矣夫好知之亂天下也自}
  - {type: page-break, offset: 22119, content: '', id: KR5c0051_SJB_001-110583c}
