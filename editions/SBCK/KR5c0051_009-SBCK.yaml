body:
  text: 郭象子玄註陸德明音義莊子雜篇外物第二十六音義曰以義名篇外物不可必故龍逢誅比干戮箕子狂惡來死桀紂亡善惡之所致俱不可必也外物王云夫忘懷於我者固無對於天下然後外物無所用必焉乃有所執爲者諒亦無時而妙矣人主莫不欲其臣之忠而忠未必信故伍貟流于江萇弘死于蜀藏其血三年而化爲碧精誠之至化爲碧吕氏春秋藏其血三年化爲碧玉人親莫不欲其子之孝而孝未必愛故孝巳憂而曾參悲是以至人無心而應物唯變所適孝巳李云殷高宗之太子曾參李云曾參至孝爲父所憎嘗見絶糧而後蘇木與木相摩則然金與火相守則流隂陽錯行則天地大絯於是乎有雷有霆水中有火乃焚大槐所謂錯行該音駭又音該又胡待反水中有火乃焚大槐司馬云水中有火謂電也焚謂霹靂時燒大也有甚憂兩䧟而無所逃茍不能忘形則隨形所遭而䧟於憂樂左右無冝也兩䧟司馬云兩謂心與瞻也䧟破也畏雷霆甚憂心膽破䧟也樂音洛螴蜳不得成矜之愈重則所在爲難莫知所守故不得成螴郭音陳又楮允反徐敕盡反蜳郭音惇又柱允反徐敕轉反李餘准反司馬云螴蜳讀曰冲融言怖畏之氣冲融兩溢不安定也心縣於天地之間所希者高而闊也縣音玄慰暋沈屯非清夷平暢也慰暋武巾反李音昬又音泯慰鬰也暋悶也沈屯張倫反司馬云沈深也屯難也利害相摩生火甚多内故也衆人焚和衆人而遺利則和利害存懷則其和焚也月固不勝火大而闇則多累小而明則知分於是乎有僓然而道盡唯僓然無矜遺形自得道乃盡也僓音頽又乎懷反郭云順也莊周家貧故徃貸粟於監河侯監河侯曰諾我將得邑金將貸子三百金可乎莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何爲者邪對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾哉且南遊吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾失我常與我無所處吾得斗升之水然活耳君乃言此曾不如早索我於枯魚之肆此言當理無小茍其不當雖大何益貸音特或一音他得反河侯古衘反作魏文侯將貸他代反呼火故反鮒音附廣雅云鰿也鰿音迹波臣司馬云謂波蕩之臣激古狄反索所白反枯魚李云猶乾魚也任公子爲大鉤巨緇五十犗以爲餌蹲乎㑹稽投竿東海旦旦而釣期年不得魚巳而大魚食之牽巨鉤䤾没而下騖揚而奮鬐白波山海水震蕩聲侔神憚赫千里任公子得魚離而腊之自制河以東蒼梧巳北莫不厭魚者巳而後世輇才諷之徒皆驚而相告也夫揭竿累趣灌瀆守鯢鮒其於得大魚難矣飾小以干縣令其於大逹亦逺矣是以未嘗聞任氏之風俗其不可與經於世亦逺矣此言志趣不同故經世之宜小大各有所適也任如字下同李云任國名鉤本作釣巨緇司馬云大黒綸也搳郭占邁反云犍牛也徐音界文云騬也司馬云犠牛也騬音繩犍紀言反餌音二蹲音存㑹古外反稽古反㑹稽山名今爲郡也期年本亦作朞同音基言必乆其事後乃能感也錎音䧟字林猶䧟字也鶩音務一本作驚鬐徐求夷反李音須憚徒旦反赫火百反千里言千里皆懼魚司馬云大魚名海神也或云若魚猶言此魚腊音昔制河諸設反依字應作浙漢書音義音逝河亦江也北人名水皆曰河浙江今在餘杭郡後漢以爲吳㑹分界司馬云浙江今在㑹稽錢塘輇七全反又硯專反又音權李云輇量人也本或作軨軨小也本又或作輕諷力鳯反揭其列其謁二反竿累劣彼反謂次足不得並足也本亦作累司馬云力追反云綸也趣本又作趨同七須反灌瀆司馬云漑瀆之瀆鯢五兮反鮒音附又音蒲本又作蒲李云鯢鮒皆小魚也儒以詩禮發家大儒臚傳曰東方作矣事之何小儒曰未解裙口中有珠詩固有之曰青青之麥生於陵陂生不布施死何含珠爲接其壓其顪儒以金椎控其頥徐别其頰無傷口中珠詩禮者先王之陳迹也苟非其人道不虚行故夫儒者乃有用之爲姦則迹不足恃也臚力於反一音盧蘇林注漢書云上傳語告下曰臚臚猶行也傳治戀反又丈蓴反向云從上語下曰臚傳一音張戀反遽也東方作矣司馬云謂日出也而朱反青青之麥司馬云此逸詩刺死人也陂彼宜反施始豉反壓本亦作擪同乃協反郭於琰反又敕頰反字林云擪一指按也顪本亦作歲許穢反司馬云頥下毛也椎直追反控江反別彼列反老萊子之弟子出薪遇仲尼反以告曰有人於彼脩上而趍下長上而促下也老萊子楚人也出薪出採薪也趍下音促李云下短也末僂而後耳耳却近後而上僂末僂李云末上謂頭前也又謂背膂也後耳司馬云耳却後近附近之近視營四海視之儡然似營他人事者視營四海夫勞形役智以應世務失其自然者也故堯有亢龍之喻舜有卷僂之談周公之走狼仲尼比之逸狗豈不或信哉儡律悲反舊魚反又魚威反不知其誰氏之子老萊子曰是丘也召而來仲尼至曰丘去汝躬矜與汝容知斯爲君子矣謂仲尼能遺形去知故以爲君子去起吕反注同而本又作女躬矜爲身矜修善行容知音智謂節智爲容好仲尼揖而退受其言也蹙然改容而問曰業可得進乎設問之令老萊明其不可進蹙子六反業可得進乎問可行仁義於世乎令力成反老萊子曰夫不忍一世之傷而鷔萬世之患一世爲之則其迹萬世爲患故不可輕也鷔本亦作敖同五報反下同下或作驁抑固窶邪亡其略弗及邪直任之則民性不簍而皆自有略無弗及之事也窶其矩反惠以歡爲驁終身之醜惠之而歡者無惠則醜矣然惠不可長故一惠終身醜也中民之行進焉耳言其易進則不可妄惠之行下孟反易以豉反相引以名相結以隱隱括進之謂也相結以隱李云隱病患也雖相引以名聲是相結以病患與其譽堯而非桀不如兩忘而閉其所譽閉者閉塞譽堯音餘閉一本文註並作門反無非傷也動無非邪也順之則全靜之則正反無非傷反逆於理動無非邪似嗟反動矜於是也聖人躊躇以興事以每成功事不逺本故其功毎成躊音疇躇直居反以興事以每成功毎者每有成功也躊躇者從容也從容興事雖有成功聖人不存猶致敝迹流毒百世况動矜善行而載之不已乎逺于萬反柰何哉其載焉終矜爾矜不可載故遺而弗有也宋元君夜半而夢人髪闚阿門曰予自宰路之淵予爲清江使河伯之所漁者余且得予元君使人占之曰此神也君曰漁者有余且乎左右曰有君曰令余且㑹朝明日余且朝君曰漁何得對曰且之網得白焉箕圓五尺君曰獻若之至君再欲殺之再欲活之心疑卜之曰殺以卜吉乃刳七十二鑚而無遺筴仲尼曰神能見夢於元君而不能避余且之網知能七十二鑚而無遺筴不能避刳腸之患如是則知有所困神有所不及也神知之不足恃也如是夫唯静然居其所能而不營於外者爲全宋元君李云元公也案元公名佐平公之子阿門司馬云阿屋曲簷也宰路李云淵名所居爲如字又于僞反使所吏反漁音魚余音預且子餘反姓余名且也覺古孝反令力成反朝直遥反下同刳口反鑚左端反又左亂反筴初革反見賢遍反知音智下及注同知有所困一本作知有所不周雖有至知萬人謀之不用其知而用衆謀知音智下註皆同魚不畏網而畏鵜鶘網無情故得魚鵜徒反鶘鵜鶘水鳥也一名海河去小知而大知明小知自私大知任物去起吕反下註同去善而自善矣去善則善無所慕善無所慕則善者不矯而自善也矯居表反嬰兒生無石師而能言與能言者處也汎然無習而自能者非而學彼也石師石者匠名也謂無人爲師匠教之者也一本作所師又作碩師惠子謂莊子曰子言無用莊子曰知無用而始可與言用矣夫地非不廣且大也人之所用容足耳然則厠足而墊之致黃泉人尚有用乎惠子曰無用莊子曰然則無用之爲用也亦明矣聖應其内當事而發巳言其外以暢事情情暢則事通外明則内用相湏之理然也厠音側又音測墊丁念反司馬崔云下也本又作塹七念反掘也致至也本又作至莊子曰人有能遊且得不遊乎人而不能遊且得遊乎性之所能不得不爲也性所不能不得強爲故聖人唯莫之制則同焉皆得而不知所以得也強其丈反夫流遁之志决絶之行噫其非至知厚德之任與非至厚則莫能任其志行而信其殊能也行下孟反註同興音餘覆墜而不反火馳而不顧人之所好不避是非死生以之墜直反好呼報反雖相與爲君臣時也易世而無以相賤所以爲人齊同故曰至人不留行焉唯所遇而因之故能與化俱夫尊古而卑今學者之流也古無所尊今無所卑而學者尊古而卑今失其原矣且以狶韋氏之流觀今之世夫孰能不波隨時因物乃平泯也狶虚豈反不波波高下貌唯至人乃能遊於世而不僻當時應務所在爲正僻匹亦反順人而不失已本無我我何失焉彼教不學教因彼徃故非學也承意不彼彼意自然故承而用之則夫萬物各至其我目徹爲明耳徹爲聦鼻徹爲鸇口徹爲甘心徹爲知知徹爲德凡道不欲壅壅則哽哽而不止則跈當通而塞則理有不泄而相騰踐也鸇舒延反哽庚猛反塞也跈女展反廣雅云履也止也本或作蹍同跈則衆害生生起也物之有知者恃息凡根生者無知亦作恃息也其不殷非天之罪殷當也夫息不由知由知然後失當失當而後不通故知恃息息不恃知也然知欲之用制之由人非不得巳之符也殷如字一音於靳反天之穿之日夜無降通理有常運人則顧塞其竇無性任天竇乃開竇音豆胞有重閬閬空曠也胞普交反腹中貽重直龍反閬音浪心有天遊遊不係也室無空虛則婦姑勃豀爭處也勃豀音奚勃爭也豀空也司馬去勃豀反戾也無空虚以容其私則反戾共闘爭也心無天遊則六鑿相攘攘逆鑿在報反相攘如羊反司馬云謂六情攘奪大林丘山之善於人也亦神者不勝自然之理有物而通也德溢乎名夫名高則利深故脩德者過其當名溢乎夫禁則名美於德謀稽乎誸兹急也急而後考其謀誸音賢郭音玄向本作弦云堅正也知出乎爭平徃則無用知柴生乎守柴塞也柴積也官事果乎衆宜衆之所宜者不一故官事立也春雨日時草木怒生銚鎒於是乎始脩夫事物之生皆有由銚七遥反削也能有所穿削也又他尭反鎒乃豆反似鋤田具也草木之到植者過半而不知其然夫事由理發故不覺到植時力反又音值立也本亦作置司馬云鋤㧞反之更生者曰到植靜然可以補病非不病也皆可以休老非不老也子斯反徐子智反本亦作揃子淺反三蒼云揃猶翦也玉篇云滅也本亦作搣音滅又武齊反字林云也音千米反寧可以止遽非不遽也雖然是勞者之務也非佚者之所未嘗過而問焉是猶有勞故佚者超然不顧佚音逸聖人之所以駴天下神人未嘗過而問焉神人即聖人也聖言其外神言其内駴戸楷反王云謂改百姓之視聽也徐音戒謂上不問下也賢人所以駴世聖人未嘗過而問焉君子所以駴國賢人未嘗過而問焉小人所以合時君子未嘗過而問焉趨歩各有分高下各有等演門有親死者以善毀爵爲官師其黨人毀而死者半慕賞而孝去真逺矣斯尚賢之過也演門以善反宋城門名堯與許由天下許由逃之湯與務光務光怒之紀他聞之帥弟子而踆於水諸侯弔之三年申徒狄因以踣河其波蕩傷性遂至於此他徒何反踆音存字林云古蹲字徐七旬反又音尊窽音又音科司馬云水名弔之司馬云恐其自沈故弔之踣徐芳附反普豆反字林云僵也李云頓也郭薄杯反荃者所以在魚得魚而忘荃蹄者所以在兎得兎而忘蹄言者所以在意得意而忘言吾安得夫忘言之人而與之言哉至於兩聖無意乃都無所言也荃七全反崔音孫香草也可以餌魚或云積柴水中使魚依而食焉一云魚笱也蹄大兮反兎罥也又云兎弶也係其脚故云蹄也罥音古縣反弶音巨亮反得夫音符莊子雜篇寓言第二十七音義曰以義名篇寓言十九之他人則十言而九見信寓言十九寓也以人不信巳故託之他人十言而九見信也重言十七世之所重則十言而七見信重言謂爲人所重者之言也巵言日出和以天倪夫巵滿則傾空則仰非持故也况之於言因物隨變唯彼之從故曰日出日出謂日新也日新則盡其自然之分自然之分盡則和也巵言字又作巵音支字略云巵圓酒器也李起宜反王云夫巵器滿即傾空則仰隨物而變非執一守故者也施之於言而隨人從變巳無常主者也司馬云謂支離無首尾言也倪音崖徐音詣寓言十九藉外論之言出於巳俗多不受故借外耳肩吾連叔之皆所借也藉李云因也親父不爲其子媒親父譽之不非其父者也父之譽子誠多不信然時有信者輒以常嫌見疑故借外論也譽之音餘注同非吾罪也人之罪也巳雖信而懐常疑者猶不受之彼人則信之人之聽有斯累也與巳同則應不與巳同則反互相非也同於已爲是之異於巳爲非之三異同處而二異訟其所取是必於不訟者俱異耳而獨信其所是非借外如何重言十七所以已言也是爲艾以其艾故俗共重之雖使言不借外猶十信其七艾五盖反年先矣而無經緯本末以期年者是非先也年在物先耳其餘本末無以待人則非所以先也期待也人而無以先人無人道也人而無人道是之謂陳人直是陳乆之人耳而俗便共信之此俗之所以爲安故而習常巵言日出和以天倪因以曼所以窮年夫自然有分而是非無主無主則曼矣誰能定之哉故曠然無懐因而任之所以各終其天年曼衍以戰反不言則齊齊與言不齊言與齊不齊也付之與物而就用其言則彼此是非居然自齊不能因彼而立言以齊之則我與萬物復不齊耳復不扶又反下同故曰無言言彼所言故雖有言而我竟不言也言無言終身言未甞不言雖出吾口皆彼言耳終身不言未嘗不言據出我口有自也而可有自也而不可有自也而然有自也而不然惡乎然然於然惡乎不然不然於不然惡乎可可於可惡乎不可不可於不可自由也由彼我之情偏故有可不可惡乎音烏下同物固有所然物固有所可各自然各自可無物不然無物不可綂而言之則無可無不可無可無不可而至也非巵言日出和以天倪孰得其乆夫唯言隨物制而任其天然之分者能無天落萬物皆種也以不同形相禪雖變化相代原其氣則一種章勇反始卒環於今爲始者於昨已復爲卒也莫得其倫理自爾故莫得是謂天均天均者天倪也夫均齊者豈妄哉皆天然之分莊子謂惠子曰孔子行年六十而六十化與時俱也始時所是卒而非之時變則俗情亦變乗物以遊心者豈異於俗哉未知今之所謂是之非五十九非也變者不停是不可常惠子曰孔子勤志服知也謂孔子勤志服膺而後知非能任其自化也此明惠子不及聖人之韻逺矣莊子曰孔子謝之矣而其未之甞言謝變化之自爾非知力之所爲故隨時任物而不造言也孔子云夫受才乎大本復靈以生役其才知而不復其本靈則生亡矣知音智鳴而當律言而當法鳴者律之所生言者法之所出而法律者衆之所爲聖人就用之耳故無不當而未之甞言未之甞爲也利義陳乎前而好惡是非直服人之口而巳矣服用也我無言也我之所言直用人之口耳好惡是非利義之陳未始出吾口也好呼報反註同惡烏露反注同使人乃以心服而不敢蘁立定天下之定口所以宣心故用衆人之口則衆人之心用矣我順衆心則衆心信矣誰敢逆立哉吾因天下之自定而定之又何爲乎蘁音悟又五各反逆也已乎巳乎吾且不得及彼乎因而乗之故無不及曾子再仕而心再化曰吾及親仕三釡而心樂後仕三千鍾不洎吾心悲洎及也三釡小爾雅云六斗四升曰釡樂音洛下注同洎其器反弟子問于仲尼曰若參者可謂無所縣其罪乎縣係也謂參仕以爲親無係禄之罪也參所金反縣其音玄下同縣係也心再化於禄所存者親也雖係禄而無係於罪也爲于僞反曰旣巳縣矣係於禄以養也養羊尚反下同夫無所縣者可以有哀乎夫養親以適不問其具能無係則不以貴賤經懐而平和怡暢盡色養之冝矣彼視三釡三千鍾如觀雀蚊虻相過乎前也彼謂無係也夫無係者視榮禄蚊虻鳥雀之在前而過去耳豈有哀樂於其間哉觀本亦作鸛同古亂反蚊音文虻孟庚反司馬云觀雀飛疾與蚊相過忽然不覺也王云鸛蚊取大小相縣以喻三釡三千鍾之多少元嘉本作如鸛蚊無虻字顔成子游謂東郭子綦曰自吾聞子之言一年而野外權利也綦音其二年而從不自專也三年而通通彼我也四年而物與物同也五年而來自得也六年而入外形骸也七年而天成無所復爲復扶又反八年而不知死不知生所遇皆適而安九年而大妙妙善也善惡同故無徃而不此言乆聞道知天之自然將忽然自忘則穢累日去以至於盡耳力帶反生有爲死也生而有爲則䘮其生䘮息浪反勸公以其死也有自也自由也由有爲故死由私其生故有爲今所以勸公者以其死之由私耳而生陽也無自也夫生之陽遂以其絶迹無爲而忽然獨爾非由有也而果然乎惡乎其所適惡乎其所不適然而果然故無適無不適而後皆適皆適而至也惡音烏下同天有歷數地有人據吾惡乎求之皆巳自足莫知其所終之何其無命也理必自終不由於知非命如何莫知其所始之何其有命也不知其所以然而然謂之命似有意也故又遣命之名以明其自爾而後命理全也有以相應也之何其無邪理必有應若有神靈以致也無以相應也若之何其有邪理自相應相應不由於故也則雖相應而無靈也衆罔兩問於景曰向也俯而今也仰向也括而今也髮向也坐而今也起向也行而今也止何也景曰捜捜也奚稍問也動運自爾無所稍問景音影又如字本或作影括古活反司馬云謂括髮也皮反捜本又作同素口反又素刀反又音蕭向云動貌予有而不知其所以自爾故不知所以予蜩甲也蛇蛻也似之而非也影似形而非形蜩甲音條司馬云條甲蟬蛻皮也蛻音又吐卧反又始銳反火與日吾屯也隂與夜吾代也彼吾所以有待邪而况乎以有待者乎推而極之則今之所謂有待者率至於無待而獨化之理彰矣屯徒門反聚也彼來則我與之來彼徃則我與之徃彼強陽則我與之強陽強陽者又何以有問乎直自強陽運動相隨徃來耳無意不可問也陽子居南之沛老聃西遊於秦邀於郊至於梁而遇老子老子中道仰天而歎曰始以汝爲可教今不可也陽子居不荅至舎進盥漱巾櫛脫屨戸外行而前曰向者弟子欲請夫子夫子行不間是以不敢今間矣請問其故老子曰而睢睢盱盱而誰與居睢睢盱盱跋扈之貌人將畏難而䟽逺陽子居姓陽名戎字子居沛音貝邀古尭反要也遇也王篇云求也抄也遮也盥音管小爾雅云喿也西也漱所又反櫛莊乙反閒音閑下同一音如字睢郭呼維反徐許圭反盱香于反又許吳反又音虚廣雅云睢睢盱盱元氣也而汝也言汝與元氣合德去其矜驕誰復能同此心解異郭義跋歩末反難乃旦反逺于邉反大白辱盛德不足陽子居蹵然變容曰敬聞命矣其徃也舎者迎將其家公執席妻執巾櫛舎者避席煬者避竈尊形自異故憚而避之也蹵子六反家公李云主人公也云讀舎者迎將其家爲句煬羊尚反反又音羊向反炊也其反也舎者與之爭席矣去其夸矜故也去起吕反莊子雜篇讓王第二十八音義曰以事名篇尭以天下讓許由許由不受又讓於子州支父子州支父曰以我爲天子猶之可也雖然我適有幽憂之病方且治之未暇治天下也支父音甫李云支父字也即支伯也幽憂之病王云謂其病深固也夫天下至重也而不以害其生又况他物乎唯無以天下爲者可以託天下也舜讓天下於子州支伯子州支伯曰予適有幽憂之病方且治之未暇治天下也故天下大器也而不以易生此有道者之所以異乎俗者也舜以天下讓善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種形足以勞動秋收歛身足以休食日出而作日入而息逍遙於天地之間而心意自得吾何以天下爲哉善卷眷勉反居阮反又音眷李云姓善名卷衣於旣反下同悲夫子之不知余也遂不受於是去而入深山莫知其處處昌慮反舜以天下讓其友石戸之農石戸之農曰捲捲乎后之爲人葆力之士也石戸本亦作后農李云石戸地名農農人也捲捲音權郭音眷用力貌葆音保字亦作保以舜之德爲未至也於是夫妻戴攜子以入於海終身不反也以入於海司馬云凡言入者皆居於州島之上與其曲隈中也大王亶父居邠狄人攻之大音泰下同亶丁但反父音甫下同邠筆貧反徐甫巾反事之以皮帛而不受事之以犬馬而不受事之以珠玉而不受狄人之所求者土地也大王亶父曰與人之兄居而殺其弟與人之父居而殺其子吾不忍也子皆勉居矣爲吾臣與爲狄人臣奚以異且吾聞之不以所用養害所養因杖筴而去之民相連而從之遂成國於岐山之下不以所用養害所養而所以養人也今爭以殺人是以地害人也人爲地養故不以地故害人也杖直亮反筴初革反連力展反司馬云連讀曰輦岐其冝反或作而支反夫大王亶父可謂能尊生矣能尊生者雖貴冨不以養傷身雖貧賤不以利累形今世之人居高官尊爵者皆重失之見利輕亡其身豈不惑哉不以養傷身不以利累形王云冨貴有養而不以昧養傷身貧賤無利而不以求利累形也越人三世弑其君王子捜患之逃乎丹穴而越國無君求王子捜不得從之丹穴王子捜不肯出越人薫之以艾乗以王輿弑音試王子捜素羔反又悉遘反又邀構反李云王子名淮南子作翳丹穴爾雅云南戴日爲丹穴艾古盖反王輿一本作玉輿王子捜援綏登車仰天而呼曰君乎君乎獨不可以舎我乎王子捜非惡爲君也惡爲君之患也王子捜者可謂不以國傷生矣此固越人之所欲得爲君也援音爰呼火故反本或作欵舎音捨非惡烏路反下及下章眞惡同韓魏相與爭侵地子華子見昭僖侯有憂色子華子司馬云魏人也昭僖侯司馬云韓侯子華子曰今使天下書銘於君之前書之言曰左手攫之則右手廢右手攫之則左手廢然而攫之者必有天下君能攫之乎攫俱碧反俱縳反又史號反李云取也廢李云弃也司馬云病也一云攫者援書銘廢者斬右手昭僖侯曰寡人不攫也子華子曰甚善自是觀之兩臂重於天下也身亦重於兩臂韓之輕於天下亦遠矣今之所爭者其輕於韓又逺君固愁身傷生以憂戚不得也其輕於韓又逺絶句僖侯曰善哉教寡人者衆矣未嘗得聞此言也子華子可謂知輕重矣魯君聞顔闔得道之人也使人以幣先焉魯君一本作魯侯李云哀公也顔闔守陋閭苴布之衣而自飯牛苴音麤徐七餘反李云有子麻也本或作麤非也飯符晚反魯君之使者至顔闔自對之使者曰此顔闔之家與顔闔對曰此闔之家也使者致幣顔闔對曰恐聽者謬而遺使者罪不若審之使所吏反下及下章同與音餘遺唯季反下皆同使者還反審之復來求之則不得巳故若顔闔者眞惡冨貴也故曰道之眞以治身其緒餘以爲國家其土苴以治天下由此觀之帝王之功聖人之餘事也非所以完身養生也復音服或音扶又反下章皆同緒餘並如字徐上音奢下以嗟反司馬李云緒者殘也謂殘餘也土敕雅反又片賈行賈二反又音如字苴側雅反又知雅反司馬云土苴如糞草也李云土苴糟魄也皆不眞物也一云土苴無心之貌今世俗之君子多危身棄生以殉物豈不悲哉凡聖人之動作也必察其所以之與其所以爲必察其所以之王云聖人眞以持身餘以爲國故其動作必察之焉所以之者謂德所加之方也所爲者謂所以待物也動作於此不必察也今且有人於此以隨侯之珠彈千仞之雀世必之是何也則其所用者重而所要者輕也夫生者豈特隨侯之重哉要一遥反子列子窮容貌有飢色客有言之於鄭子陽者曰列禦冦盖有好之士也居君之國而窮君無乃爲不好士乎子陽鄭相好呼報反鄭子陽即令官遺之粟子列子見使者再拜而辭令力呈反使者去子列子入其妻望之而拊心曰妾聞爲有道者之妻子皆得佚樂今有飢色君過而遺先生食先生不受豈不命邪拊徐音撫佚音逸樂音洛過古卧反本亦作遇子列子謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽難乃旦反下章同殺子陽子陽嚴酷罪者無赦舎人折弓畏子陽怒責因國人逐猘狗而殺子陽楚昭王失國屠羊說走而從於昭王楚昭王名軫平王子音恱或如字昭王反國將賞從者及屠羊屠羊說曰大王失國失屠羊大王反國亦反屠羊臣之爵禄已復矣又何賞之言王曰強之屠羊說曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見之屠羊曰楚國之法必有重賞大功而後得見今臣之知不足以存國而勇不足以死寇吳軍入郢越畏難而避寇非故隨大王也今大王欲廢法毀約而見說此非臣之所以聞天下也從才用反強其丈反見賢遍反知音智郢以井反約如字徐於妙反見如字亦賢遍反王謂司馬子綦曰屠羊居處卑賤而陳義甚高子綦爲我延之以三旌之位爲于爲反三旌三公位也司馬本作三珪云謂諸侯之三卿皆執珪者屠羊曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之禄吾知其冨於屠羊之利也然豈可以貪爵禄而使吾君有妄施之名乎不敢當願復反吾屠羊之肆遂不受也原憲居魯環堵之室茨以生草蓬戸不完桑以爲樞而甕牖二室以爲塞上漏下濕匡坐而弦施如字又始豉反茨徐疾私反李云盖屋也蓬戸織蓬爲戸桑以爲樞尺朱反司馬云屈桑條爲戸樞也甕牖音酉司馬云破甕爲牖二室司馬云夫妻各一室下葛反郭音葛字或作塞悉代反司馬云以褐衣塞牖也匡坐而弦司馬云匡正也案弦謂弦歌子貢乗大馬中紺而表素軒車不容巷徃見原憲原憲華冠縰履杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色原憲曰夫希世而行比周而友學以爲人敎以爲已仁義之慝輿馬之飾憲不忍爲也中紺古暗反李云紺爲中衣加素爲表華冠胡化反以華木皮爲冠縰履所反或所買反本或作縱并下曵縰同三蒼解詁作躧云躡也聲或作屣韋昭蘇反通俗文云不著跟曰屣司馬本作踐李云縰履謂履無跟也王云體之能躡舉而曵之也履或作屨杖藜以藜爲杖也司馬本作扶杖也應門自對門也嘻許其反逡七旬反希世而行司馬云希望也所行常顧世譽而動故曰希世而行比毗志反爲人于僞反下爲已同教人以巳學當爲已教當爲人今反不然也仁義之慝吐得反惡也司馬云謂依託仁義爲姦惡曾子居衛緼無表顔色腫噲手足胼胝緼紵粉反司馬云謂麻緼爲絮論語云衣敝緼是也腫本亦作踵章勇反噲古外反徐古活反司馬云腫噲剥錯也王云盈虚不常之貌胼薄田反胝竹尼反三日不舉火十年不製衣正冠而纓絶捉衿而肘見納屨而踵決肘竹九反見賢遍反曵縰而歌商頌聲滿天地出金石天子不得臣諸侯不得友故養志者忘形養形者忘利致道者忘心矣孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畞足以給飦粥郭内之田十畒足以爲絲麻鼓琴足以自娛所學夫子之道者足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自累也審自得者失之而不懼行脩於内者無位而不作丘誦之乆矣今於回而後見之是丘之得也飦之然反字或作饘廣雅云糜也一云紀言反家語云厚粥一音干謂干餅粥之六反又音育樂音洛愀七小反徐在九反又七了反子了反又資酉反李音秋又遥反一本作欣行下孟反作在路反爾雅云慙也又音昨中山公子牟謂瞻子曰身在江海之上心居心乎魏闕之下柰何公子牟司馬云魏之公子封中山名牟瞻子賢人也淮南作詹魏闕淮南作騩司馬本同云騩讀曰魏象魏觀闕人君門也言心存榮貴許愼云天子兩觀也瞻子曰重生重生則利輕重生李云重存生之道者則名利輕輕則易絶矣此人身居江海心貪榮利故以此戒之中山公子牟曰雖知之未能勝也勝音升下同瞻子曰不能自勝則從神無惡乎不能自勝則從絶句一讀至神字絶句惡如字又烏路反乎絶句一讀連下不能自勝爲句不能自勝而強不從者此之謂重傷之人無壽矣重直用反下同魏牟萬乗之公子曰其隱巖穴也難爲於布衣之士雖未至乎道可謂有其意矣乗繩證反孔子窮於陳蔡之間七日不火食藜不糝顔色甚憊而弦歌於室不火食元嘉本無火字糝素感反憊皮拜反顔回擇菜子路子貢相與言曰夫子再逐於魯削迹於衛伐於宋窮於商周圍於陳蔡殺夫子者無罪藉夫子者無禁弦歌鼓琴未嘗絶音君子之無耻也此乎伐於宋孔子之宋與弟子習禮大下宋司徒魋欲殺孔子伐其孔子遂行藉毀也又云陵藉也一云鑿也或云係也顔回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而來吾語之子路子貢入子路曰如此者可謂窮矣喟聲愧反又苦怪反語魚據反孔子曰是何言也君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之爲故内省而不窮於道臨難而不失其德天寒旣至霜雪旣降吾是以知松栢之茂也陳蔡之隘於丘其幸乎難乃旦反隘音厄又於懈反孔子削然反琴而弦歌子路扢然執干而舞削如字李云反琴聲亦作梢音消扢許訖反又巨乙反魚乙反李云奮舞貌司馬云喜貌執干干楯也子貢曰吾不知天之高也地之下也古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通爲寒暑風之序矣樂音洛下同故許由娛於頴陽而共伯得乎共首虞於頴陽廣雅云虞安也安於頴陽一本作娛娛樂也共伯音恭下同得乎共首司馬云共伯名和脩其行好賢人諸侯皆以爲賢周厲王之難天子矌絶諸侯皆請以爲天子共伯不聽即于王位十四年大旱屋焚于太陽兆曰厲王爲祟召公乃立宣王共伯復歸于宗逍遥得意共山之首共丘山今在河内共縣西魯連子云共伯後歸于國得意共山之首紀年云共伯和即于王位孟康註漢書古今人表以爲人爲三公本或作丘首舜以天下讓其友北人無擇北人無擇曰異哉后之爲人也居於畎畒之中而遊堯之門不若是而巳又欲以其辱行漫我吾羞見之因自投清泠之淵孔子曰土志於仁者有殺身以成仁無求生以害仁夫志尚清遐高風邈世與夫貪利没命者故有天地之降也畎古犬反畒司馬云壟上曰畒壟中曰畎行下孟反下章同曼武課受徐武畔反下章同泠音零淵山海經云在江南一云在南陽郡西崿山下湯將伐桀因卞隨而謀卞隨曰非吾事也湯曰孰可曰吾不知也湯又因瞀光而謀瞀光曰非吾事也湯曰孰可曰吾不知也湯曰伊尹何如曰強力忍垢吾不知其他也瞀音務又莫亘反本或作務強力李云徂兵須力忍垢司馬云垢辱也李云弑君須忍垢也湯遂與伊尹謀伐桀剋之以讓卞隨卞隨辭曰后之伐桀也謀乎我必以我爲賊也勝桀而讓我必以我爲貪也吾生乎亂世而無道之人再來漫我以其辱行吾不忍數聞也乃自投椆水而死數音朔椆水直留反本又作桐水徐音同又徒董反又音封本又作椆司馬本作洞云洞水在頴陽一云在范陽郡界湯又讓瞀光曰知者謀之武者遂之仁者居之古之道也吾子胡不立乎瞀光辭曰廢上非義也殺民非仁也人犯其難我享其利非廉也知音智難乃旦反吾聞之曰非其義者不受其禄無道之世不踐其土况尊我乎吾不忍乆見也乃石而自沈於廬水說曰如卞隨務光者其視天下也六合外人所不能察也斯則謬矣夫輕天下者不得有所重也苟無所重則無死地矣以天下爲六合之外故當付之堯舜湯武耳淡然無係故汎然從衆得失無槩於懷何自投之爲哉二子者可以爲殉名慕高矣未可謂外天下也廬水音閭司馬本作盧木在遼東西界一云在北平郡界淡徒暫反槩古代反昔周之興有士二人處於竹曰伯夷叔齊二人相謂曰吾聞西方有人似有道者試徃觀焉竹司馬云竹國在遼西令支縣界伯夷叔齊其君之二子也令音郎定反文音巨移反至於陽武王聞之使叔旦徃見之與之盟曰加冨二等就官一列血牲而埋之血牲一本作殺牲司馬本作血之以牲二人相視而曰嘻異哉此非吾所謂道也昔者神農之有天下也時祀盡敬而不祈喜其於人也忠信盡治而無求焉嘻許其反一音於其反喜如字徐許記反治直吏反樂與政爲政樂與治爲治不以人之壞自成也不以人之卑自高也不以遭時自利也今周見殷之亂而遽爲政上謀而下行貨阻兵而保威割牲而盟以爲信揚行以說衆殺伐以要利是推亂以易也揚行下孟反吾行房行同說音恱要一遥反吾聞古之士遭治世不避其任遇亂世不爲茍存今天下闇周德衰其並乎周以塗吾身也不如避之以絜吾行二子北至於首陽之山遂餓而死焉伯夷叔齊者其於冨貴也苟可得巳則必不頼高節戾行獨樂其志不事於世此二士之節也論語曰伯夷叔齊餓于首陽之下不言其死也而此云死焉亦欲明其守餓以終未必餓死也此篇大意以起高讓逺退之風故其風者雖貪冐之人乗天衢入紫庭猶時然中路而歎况其凢乎故夷許之徒足以當稷契對伊吕矣夫居山谷而弘天下者雖不俱爲聖佐不猶高於埃塵者乎其事雖難爲然其風少弊故可遺也曰夷許之弊安在曰許由之弊使人飾讓以求進遂至乎之噲也伯夷之風使虐之君得賜其毒而莫之敢亢也尹吕之弊使天下貪冐之雄敢行簒逆唯聖人無迹故無弊也以伊吕爲聖人之迹則伯夷叔齊亦聖人之迹也以伯夷叔齊非聖人之迹邪則伊吕之事亦非聖矣夫聖人因物之自行故無迹然則所謂聖者我本無迹故物得其迹迹得而強名聖則聖者乃無迹之名也支義反冐亡北反或亡報反下同契息列反噲音快簒初患又唐云或曰讓王之篇其章多重生而務光二三子自投于水何也荅曰莊書之興存乎反本反本之由先乎去䇿是以明讓王之一篇標傲世之逸志旨在不降以厲俗無厚身以全生所以時有重生之辭者亦歸弃榮之意耳深於塵務之爲弊也其次者雖復投粥保身而巳其全身尚高而超俗自逸寕投身於清泠終不屈於世累也此舊集音有柳復録之於義無當也莊子雜篇盗跖第二十九音義曰以人名篇孔子與柳下季爲友柳下季之弟名曰盗跖盗跖從卒九千人橫行天下侵諸侯穴室樞戶驅人牛馬取人婦女貪得忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之孔子與柳下季爲友柳下惠姓展名獲字季禽一云字子禽居柳下而施德惠一云惠謚也一云柳下邑名案左傳云展禽是魯僖公時人至孔子生八十餘年至子路之死百五六十歲不得爲友是言也盗跖之石反李竒註漢書云跖秦之大盗也從才用反卒尊忽反下同樞戶尺未反徐苦于反司馬云破人戸樞而取物也入保鄭注禮記曰小城曰保孔子謂柳下季曰夫爲人父者必能詔其子爲人兄者必能教其弟父不能詔其子兄不能教其弟則無貴父子兄弟之親矣今先生世之才士也弟爲盗跖爲天下害而弗能教也丘竊爲先生羞之丘請爲先生徃之柳下季曰先生言爲人父者必能詔其子爲人兄者必能教其弟若子不聽父之詔弟不受兄之教雖今先生之辯將柰之何哉且跖之爲人也心如涌泉意如飄風強足以拒敵辯足以飾非順其心則喜逆其心則怒易辱人以言先生必無徃孔子不聽顔回爲馭子貢爲右徃見盗跖盗跖乃方休卒徒大山之陽膾人肝而餔之詔如字教也竊爲干僞反下請爲爲我竊爲使爲皆同說始銳反飄婢遥反徐扶遥反易以豉反大山音太膾古外反餔布吳反徐甫吳反字林云日申時食也孔子下車而前見謁者曰魯人孔丘聞將軍高義敬再拜謁者謁者入通盗跖聞之大怒目如明星髪上指冠曰此夫魯國之巧僞人孔丘非邪爲我告之爾作言造語妄稱文武上時掌反夫音符又如字冠枝木之冠帶死牛之脅冠古亂反枝木之冠如字司馬云冠多華飾如木之枝繁帶死牛之脅許刼反司馬云取牛皮爲大革帶多辭繆說不耕而食不織而衣揺脣鼔舌擅生是非以迷天下之主使天下學士不反其本妄作孝弟而儌倖於封侯冨貴者也繆音謬弟音弟本亦作悌儌古堯反子之罪大極重疾走歸不然我將以子肝益晝餔之膳孔子復通曰丘得幸於季願望履幕下復扶又反下同願望履幕下司馬本幕作綦云言視不敢望跖靣望履結而還也謁者復通盗跖曰使來前孔子趨而進避席反走再拜盗跖盗跖大怒兩展其足案劒瞋目聲如乳虎曰丘來前所言順吾意則生逆吾心則死反走小却行也瞋赤眞反徐赤夷反廣雅云張也乳如反孔子曰丘聞之凡天下有三德生而長大美好無少長貴賤見而皆之此上德也知維天地能辯諸物此中德也勇悍果敢聚衆率兵此下德也凡人有此一德者足以南靣稱矣今將軍兼此三者身長八尺二寸靣目有光脣如激丹齒如齊貝音中黃鍾而名曰盗跖丘竊爲將軍耻不取焉少詩照反長丁丈反音恱下同知音智悍戸旦反激丹古歷反司馬云明也齊貝一本作具中丁仲反將軍有意聽臣臣請南使吳越北使齊魯東使宋衛西使楚使爲將軍造大城數百里立數十萬戸之邑尊將軍爲諸侯與天下更始罷兵休卒收養昆弟共祭先祖此聖人才士之行而天下之願也使所吏反下三字同數所主反下同罷如字徐扶彼反共音㳟行下孟反下同盗跖大怒曰丘來前夫可規以利而可諌以言者皆愚陋恒民之謂耳今長大美好人見而說之者此吾父母之遺德也丘雖不吾譽吾獨不自知邪且吾聞之好靣譽人者亦好背而毀之今丘告我以大城衆民是欲規我以利而恒民畜我也安可長乆也城之大者莫大乎天下矣堯舜有天下子孫無置錐之地湯武立爲天子而後世絶滅非以其利大故邪恒民一本作順民後亦爾譽音餘下同好呼報反下同背音佩下同且吾聞之古者禽獸多而人民少於是民皆巢居以避之晝拾橡栗暮栖木上故命之曰有巢氏之民古者民不知衣服夏多積薪冬則煬之故命之曰知生之民神農之世卧則居居起則于于民知其母不知其父與麋鹿共處耕而食織而衣無有相害之心此至德之隆也然而黃帝不能致德與尤戰於涿鹿之野流血百里橡音象煬羊亮反尤神農時諸侯始造兵者也神農之後第八帝曰榆罔世尤氏強與榆罔爭王逐榆罔榆罔與黃帝合謀擊殺尤漢書音義云尤古之天子一曰庶人貪者涿鹿音卓本又作濁司馬云涿鹿地名故城今在上谷郡西南八十里也堯舜作立羣臣湯放其主武王殺紂自是之後以強陵弱以衆寡湯武以來皆亂人之徒也殺音弑下同今子脩文武之道掌天下之辯以教後世縫衣淺帶矯言僞行以迷惑天下之主而欲求冨貴焉盗莫大於子天下何故不謂子爲盗丘而乃謂我爲盗跖摓本又作縫扶㳟反徐扶公反音馮淺帶縫帶使淺俠矯紀表反子以甘辭子路而使從之使子路去其危冠解其長劒而受教於子天下皆曰孔丘能止禁非始銳反又如字去起吕反危冠李云危高也子路好勇冠似雄雞形背豭斗用表已勇也其卒之也子路欲殺衛君而事不成身菹於衛東門之上是子教之不至也卒子恤反菹莊居反子自謂才士聖人邪則再逐於魯削跡於衛窮於齊圍於陳蔡不容身於天下子教子路菹此患上無以爲身下無以爲人子之道豈足貴邪世之所高莫黃帝黃帝尚不能全德而戰涿鹿之野流血百里堯不慈舜不孝禹偏枯湯放其主武王伐紂文王拘羑里此六子者世之所高也孰論之皆以利惑其眞而強反其情性其行乃甚可羞也以爲于僞反下同堯不慈不授子也文王囚羑里紂之二十年囚文王強其丈反羞如字本又作惡烏路反世之所謂賢士伯夷叔齊辭竹之君而餓死於首陽之山骨肉不葬鮑焦飾行非世抱木而死申徒狄諌而不聽石自投於河爲魚鼈所食石自投於河申徒狄將投於河崔喜止之曰吾聞聖人曰士民父母濡足故不救溺人可乎申徒狄曰不然昔桀殺龍逢紂殺比干而亡天下吳殺子胥陳殺泄治而滅其國非聖人不仁不用故也遂沈河而死介子推至忠也自割其股以食文公文公後背之子推怒而去抱木而燔死食音嗣燔音煩燒也尾生與女子期於梁下女子不來水至不去抱梁柱而死此四者無異於磔犬流豕操瓢而乞者皆離名輕死不念本養壽命者也尾生一本作㣲生戰國䇿作尾生高高誘以爲魯人磔竹客反廣雅云張也操七曹反瓢俾揺反乞者李云言上四人不得其死猶猪狗乞兒流轉溝中者也乞或作走離力智反念本本或作卒世之所謂忠臣者莫王子比干伍子胥子胥沈江比干剖心此二子者世謂忠臣也然卒爲天下剖普口反自上觀之至于子胥比干皆不足貴也丘之所以說我者告我以事則我不能知也告我以人事者不過此矣皆吾所聞知也今吾告子以人之情目欲視色耳欲聽聲口欲察味志氣欲盈如字又始銳反人上壽百歲中壽八十下壽六十除病瘦死䘮憂患其中開口而者一月之中不過四五日而巳矣天與地無窮人死者有時操有時之具而託於無窮之間忽然無異騏驥之馳過也上壽音受又如字下同瘦色又反不能說其志意養其壽命者皆非通道者也丘之所言皆吾之所棄也亟去走歸無復言之子之道狂狂汲汲詐巧虚僞事也非可以全眞也奚足論哉說音悅亟紀力反急也本或作極復扶又反狂狂如字又居况反汲汲本亦作伋音急又音及巧苦好反又如字孔子再拜趨走出門上車執轡三失目芒然無見色死據軾低頭不能出氣上時掌反三息暫反又如字芒莫則反歸到魯東門外適遇柳下季柳下季曰今者闕然數日不見車馬有行色得微徃見跖邪孔子仰天而歎曰然柳下季曰跖得無逆汝意前乎孔子曰然丘所謂無病而自灸也疾走料虎頭編虎須幾不免虎口哉此篇明因衆之所欲亡而亡之雖王紂可去也不因衆而獨用巳雖盗跖不可御也行如字灸乆又反料音聊編音鞭又蒲顯反徐扶顯反本或作編音同須一本作料頭編虎須㡬音祈去起吕反子張問於滿茍得曰盍不爲行滿茍得人姓名盍胡臘反爲行下孟反下注同盍何不也勸何不爲德行無行則不信不信則不任不任則不利故觀之名計之利而義眞是也棄名利反之於心則夫士之爲行不可一日不爲乎滿茍得曰無耻者冨多信者顯夫名利之大者幾在無耻而信故觀之名計之利而信眞是也棄名利反之於心則夫士之爲行抱其天乎子張曰昔者桀紂貴爲天子富有天下今謂臧聚曰汝行如桀紂則有怍色有不服之心者小人所賤也仲尼墨翟窮爲匹夫今爲宰相曰子行如仲尼墨翟則變容易色稱不足者士誠貴也臧聚司馬云謂臧獲盗濫竊聚之人怍音昨宰相息亮反下相而同故爲天子未必貴也窮爲匹夫未必賤也貴賤之分在行之美惡滿苟得曰小盗者狗大盗者爲諸侯諸侯之門義士存焉昔者桓公小白殺兄入嫂而管仲爲臣田成子常殺君竊國而孔子受幣論則賤之行則下之則是言行之情悖戰於胷中也不亦拂乎嫂先早反司馬云以嫂爲室家臣或作相殺申志反論力頓反悖布内反拂扶弗反故書曰孰惡孰美成者爲首不成者爲尾子張曰子不爲行即將䟽戚無倫貴賤無義長㓜無序五紀六位將何以爲别乎滿茍得曰堯殺長子舜流母弟䟽戚有倫乎湯放桀武王殺紂貴賤有義乎王季爲適周公殺兄長㓜有序乎儒者僞辭墨者兼愛五紀六位將有别乎長丁丈反五紀司馬云歲月日星辰歷數六位君臣父子夫婦别彼列反下同堯殺長子崔云堯殺長子考監明舜流母弟弟謂象也流放也孟子云舜封象於有不得有爲於其國天子使吏治其國而納其貢稅焉故謂之放也適丁歷反且子正爲名我正爲利名利之實不順於理不於道且子正爲名假設之辭也爲音于爲反下爲利同本亦作鑑同吾日與子訟於無約曰小人殉財君子殉名其所以變其情易其性則異矣乃至於棄其所爲而殉其所不爲則一也日人實反約如字徐於妙反故曰無爲小人反殉而天無爲君子從天之理枉直相而天極靣觀四方與時消息是非執而圓機獨成而意與道徘徊無轉而行無成而義將失而所爲無赴而富無徇而成將棄而天比干剖心子胥抉眼忠之禍也直躬證父尾生溺死信之患也鮑子立乾勝子不自理廉之害也孔子不見母匡子不見父義之失也此上世之所傳下世之所語以爲士者正其言必其行故服其殃離其患也此章言尚行則行矯貴士則七僞故蔑行賤士以全其内然後行高而士貴耳抉眼烏穴反鮑子立乾司馬云鮑子名焦周末人汙時君不仕探而食子貢見之謂曰何爲不仕食禄荅曰無可士者子貢曰汗時君不食其禄惡其政不踐其土今子惡其君處其土食其何志行之相違乎鮑焦遂弃其而餓死韓詩外傳同又云槁洛水之上也勝子不自理一本理作俚本又作申子自理或云謂申徒狄抱甕之河也古本作申子不自理謂申生也孔子不見母李云未聞匡子不見父司馬云匡子名章齊人諌其父爲父所逐終身不見父案此事見孟子傳丈專反無足問於知和曰人卒未有不興名就利者彼富則人歸之歸則下之下則貴之夫見下貴者所以長生安體樂意之道也今子獨無意焉知不足邪意知而力不能行邪故推正不志邪知和曰今夫此人以爲與巳同時而生同郷而處者以爲夫絶俗過世之士焉是專無主正所以覽古今之時是非之分也與俗化無足一本作無知則下遐嫁反下同樂意音洛下同知不音智下知謀同故推正不忘邪忘或作妄言君臣但推尋正道不忘故不用富貴邪爲智力不足故不用邪過世之士焉言人心易動但人與賢人俱生便自謂過於世人况親自爲富貴者乎世去至重棄至尊以爲其所爲也此其所以論長生安體樂意之道不亦逺乎慘怛之疾恬愉之安不於體惕之恐欣懽之喜不於心慘七感反怛丹曷反恐丘勇反知爲爲而不知所以爲是以貴爲天子富有天下而不免於患也無足曰夫富之於人無所不利窮美究埶至人之所不得逮聖人之所不能及窮猶盡也䆒埶音勢本亦作一音藝䆒竟也俠人之勇力而以爲威強秉人之知謀以爲明察因人之德以爲賢良非享國而嚴君父俠音協且夫聲色滋味權勢之於人心不待學而樂之體不待象而安之夫欲惡避就固不待師此人之性也天下雖非我孰能辭之惡烏路反知和曰知者之爲故動以百姓不違其度是以足而不爭無以爲故不求不足故求之爭四處而不自以爲貪有餘故辭之棄天下而不自以爲廉廉貪之實非以迫外也反之度爲天子而不以貴驕人富有天下而不以財戲人計其患慮其反以爲害於性故辭而不受也非以要名譽也要一遥反堯舜爲帝而雍非仁天下也不以美害生也善卷許由得帝而不受非虚辭讓也不以事害巳此皆就其利辭其害而天下稱賢焉則可以有之彼非以興名譽也無足曰必持其名苦體絶甘約養以持生則亦乆病長阨而不死者也阨音厄又烏賣反知和曰平爲福有餘爲害者物莫不然而財其甚者也今冨人耳營鍾鼓筦籥之聲口嗛於芻豢醪醴之味以感其意遺忘其業可謂亂矣筦音管本亦作管籥音藥一本筦籥作壎箎嗛苦簟反醪力刀反侅溺於馮氣若負重行而上也可謂苦矣侅徐音礙五代反又戸該反飲食至咽爲侅一云徧也馮氣馮音憤憤滿也下同言憤畜不通之氣也上時掌反貪財而取慰貪權而取竭静居則溺體澤則馮可謂疾矣慰亦作畏爲欲富就利故滿若堵耳而不知避且溤而不舎可謂辱矣財積而無用服膺而不舎滿心戚醮求益而不止可謂憂矣舎音捨下同戚醮在遥反李云顦顇也又音子妙反内則疑刦請之賊外則畏寇盗之害内周樓疏外不敢獨行可謂畏矣刦許業反又曲業反内周樓䟽李云重樓内匝䟽軒外通謂設備守具此六者天下之至害也皆遺忘而不知察及其患至求盡性竭財單以反一日之無故而不可得也單音丹本或作蘄音祈故觀之名則不見求之利則不得繚意絶體而爭此不亦惑乎此章言知足者常足繚音了又魯弔反理也南華眞經卷第九
