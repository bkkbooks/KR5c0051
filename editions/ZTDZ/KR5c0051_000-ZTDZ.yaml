body:
  text: 內篇逍遥遊第一北冥有魚其名爲鯤鯤之大不知其幾千里也化而爲鳥其名爲鵬鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南冥南冥者天池也齊諧者志怪者也諧之言曰鵬之徙於南冥也水擊三千里搏扶摇而上者九萬里去以六月息者也野馬也塵埃也生物之以息相吹也天之蒼蒼其正色邪其遠而無所至極邪其視下也亦若是則已矣且夫水之積也不厚則其負大舟也無力覆杯水於坳堂之上則芥爲之舟置杯焉則膠水淺而舟大也風之積也不厚則其負大翼也無力故九萬里則風斯在下矣而後乃今培風背負青天而莫之夭閼者而後乃今將圖南蜩與鷽鳩笑之曰我决起而飛槍榆枋時則不至而控於地而已矣奚以之九萬里而南爲適莽蒼者三飡而反腹猶果然適百里者宿舂糧適千里者三月聚糧之二蟲又何知小知不及大知小年不及大年奚以知其然也朝菌不知晦朔蟪蛄不知春秋此小年也楚之南有冥靈者以五百歲爲春五百歲爲秋上古有大椿者以八千歲爲春八千歲爲秋而彭祖乃今以乆持聞衆人匹之不亦悲乎湯之問棘也是已窮髮之北有冥海者天池也有魚焉其廣數千里未有知其脩者其名爲鯤有烏焉其名爲鵬背若太山翼若垂天之雲搏扶摇羊角而上者九萬里絶雲氣負青天然後圖南且適南溟也斥鷃笑之曰彼且奚適也我騰躍而上不過數仞而下翱翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辯也故夫知效一官行比一鄕德合一君而徵一國者其自視也亦若此矣而宋榮子猶然笑之且舉世而譽之而不加勸舉世而非之而不加沮定乎内外之分辯乎榮辱之境斯已矣彼其於世未數數然也雖然猶有未樹也夫列子御風而行泠然善也旬有五日而後反彼於致福者未數數然也此雖免乎行有所待者也若夫乘天地之正而御六氣之辯以遊無窮者彼且惡乎待哉故曰至人無己神人無功聖人無名堯讓天下於許由曰日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎夫子立而天下治而我猶尸之吾自視缺然請致天下許由曰子治天下天下旣已治也而我猶代子吾將爲名乎名者實之賔也吾將爲賔乎鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹歸休乎君予無所用天下爲庖人雖不治庖尸祝不越樽俎而代之矣肩吾問於連叔曰吾聞言於接輿大而無當往而不反吾驚怖其言猶河漢而無極也大有逕庭不近人情焉連叔曰其言謂何哉曰藐姑射之山有神人居焉肌膚若冰雪綽約若處子不食五穀吸風飲露乘云氣御飛龍而遊乎四海之外其神凝使物不疵癘而年穀熟吾以是狂而不信也連叔曰然瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲豈唯形骸有聾盲哉夫知亦有之是其言也猶時女也之人也之德也將旁礴萬物以爲一世蘄乎亂孰弊弊焉以天下爲事之人也物莫之傷大浸稽天而不溺大旱金石流土山焦而不熱是其塵垢粃糠將猶陶鑄堯舜者也孰肯以物爲事宋人資章甫而適諸越越人斷髮文身無所用之堯治天下之民平海内之政往見四子藐姑射之山汾水之陽窅然喪其天下焉惠子謂莊子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以爲瓢則瓠落無所容非不呺然大也吾爲其無用而掊之莊子曰夫子固拙於用大矣宋人有善爲不龜手之藥者世世以洴澼絖爲事客聞之請買其方百金聚族而謀曰我世世爲洴澼絖不過數金今一朝而鬻技百金請與之客得之以說吴王越有難吴王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也今子有五石之瓠何不慮以爲大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧今子之言大而無用衆所同去也莊子曰子獨不見狸狌乎卑身而伏以候敖者東西跳梁不避高下中於機辟死於罔罟今夫斄牛其大若垂天之雲此能爲大矣而不能執鼠今子有大樹患其無用何不樹之於無何有之鄕廣漠之野仿徨乎無爲其側逍遥乎寢卧其下不夫斤斧物無害者無所可用安所困苦哉内篇齊物論第二南郭子綦隱几而坐仰天而嘘嗒焉似喪其耦顔成子游立侍乎前曰何居乎形固可使如槁木而心固可使如死灰乎今之隱几者非昔之隱几者也子綦曰偃不亦善乎而問之也今者吾喪我汝知之乎汝聞人籟而未聞地籟汝聞地籟而未聞天籟夫子游曰敢問其方子綦曰夫大塊噫氣其名爲風是唯無作作則萬竅怒呺而獨不聞之翏翏乎山林之畏佳大木百圍之竅穴似鼻似口似耳似枅似圈似臼似洼者似污者激者謫者叱者吸者叫者譹者宎者咬者前者唱于而隨者唱喁冷風則小和飄風則大和厲風濟則衆竅爲虚而獨不見之調調之刁刁乎子游曰地籟則衆竅是已人籟則比竹是已敢問天籟子綦曰夫吹萬不同而使其自己也咸其自取怒者其誰邪大知閑閑小知間間大言炎炎小言詹詹其寐也魂交其覺也形開與接爲構日以心鬥縵者窖者密者小恐惴惴大恐縵縵其發若機栝其司是非之謂也其留如詛盟其守勝之謂也其殺如秋冬以言其日消也其溺之所爲之不可使復之也其厭也如緘以言其老洫也近死之心莫使復陽也喜怒哀樂慮歎變𢟯姚佚啓態樂出虚蒸成菌日夜相代乎前而莫知其所萌已乎已乎旦暮得此其所由以生乎非彼無我非我無所取是亦近矣而不知其所爲使若有眞宰而特不得其眹可行己信而不見其形有情而無形百骸九竅六臟賅而存焉吾誰與爲親汝皆悦之乎其有私焉如是皆有爲臣妾乎其臣妾不足以相治乎其遞相爲君臣乎其有眞君存焉如求得其情與不得無益損乎其眞一受其成形不亡以待盡與物相刃相靡非行盡如馳而莫之能止不亦悲乎終身役役而不見其成功苶然疲役而不知其所歸可不哀邪人謂之不死奚益其形化其心與之然可不謂大哀乎人之生也固若是芒乎其我獨芒而人亦有不芒者乎夫隨其成心而師之誰獨且無師乎奚必知代而心自取者有之愚者與有焉未成乎心而有是非是今日適越而昔至也是以無有爲有無有爲有雖有神禹且不能知吾獨且奈何哉夫言非吹也言者有言其所言者持未定也果有言邪其未嘗有言邪其以爲異於鷇音亦有辯乎其無辯乎道惡乎隱而有眞僞言惡乎隱而有是非道惡乎往而不存言惡乎存而不可道隱於小成言隱於榮華故有儒墨之是非以是其所非而非其所是欲是其所非而非其所是則莫若以明物無非彼物無非是自彼則不見自知則知之故曰彼出於是是亦因彼彼是方生之說也雖然方生方死方死方生方可方不可方不可方可因是因非因非因是是以聖人不由而照之于天亦因是也是亦彼也彼亦是也彼亦一是非此亦一是非果且有彼是乎哉果且無彼是乎哉彼是莫得其偶謂之道樞樞始得其環中以應無窮是亦一無窮非亦一無窮也故曰莫若以明以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也天地一指也萬物一馬也可乎可不可乎不可道行之而成物謂之而然惡乎然然於然惡乎不然不然於不然物固有所然物固有所可無物不然無物不可故爲是舉蓬與楹厲與西施恢悅憰怪道通爲一其分也成也其成也毁也凡物無成與毁復通爲一唯達者知通爲一爲是不用而寓諸庸庸也者用也用也者通也通也者得也適得而幾矣因是已已而不知其然謂之道勞神明爲一而不知其同也謂之朝三何謂朝三曰狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆悦名實未虧而喜怒爲用亦因是也是以聖人和之以是非而休乎天均是之謂兩行古之人其知有所至矣惡乎至有以爲未始有物者至矣盡矣不可以加矣其次以爲有物矣而未始有封也其次以爲有封焉而未始有是非也是非之彰也道之所以虧也道之所以虧愛之所以成果且有成與虧乎哉果且無成與虧乎哉有成與虧故昭氏之鼓琴也無成與虧故昭氏之不鼓琴也昭文之鼓琴也師曠之枝策也惠子之據梧也三子之知幾乎皆其盛者也故載之末年唯其好之也以異於彼其好之也欲以明之彼非所明而明之故以堅白之昧終而其子又以文之綸終終身無成若是而可謂成乎雖我亦成也若是而不可謂成乎物與我無成也是故滑疑之耀聖人之所圖也爲是不用而寓諸庸此之謂以明今且有言於此不知其與是類乎其與是不類乎類與不類相與爲類則與彼無以異矣雖然請嘗言之有始也者有未始有始也者有未始有夫未始有始也者有有也者有無也者有未始有無也者有未始有大未始有無也者俄而有無矣而未知有無之果孰有孰無也今我則已有謂矣而未知吾所謂之其果有謂乎其果無謂乎天下莫大於秋毫之末而太山爲小莫壽乎殤子而彭祖爲夭天地與我並生而萬物與我爲一旣已爲一矣且得有言乎旣已謂之一矣且得無言乎一與言爲二二與一爲三自此以往巧歷不能得而況其凡乎故自無適有以至於三而況自有適有乎無適焉因是已夫道未始有封言未始有常爲是而有畛也請言其畛有左有右有倫有義有分有辯有競有爭此之謂八德六合之外聖人存而不論六合之内聖人論而不議春秋經世先王之志聖人議而不辯故分也者有不分也辯也者有不辯也曰何也聖人懷之衆人辯之以相示也故曰辯也者有不見也夫大道不稱大辯不言大仁不仁大廉不嗛大勇不忮道照而不道言辯而不及仁常而不成廉清而不信勇忮而不成五者園而幾向方矣故知止其所不知至矣孰知不言之辯不道之道若有能知此之謂天府注焉而不滿酌焉而不竭而不知其所由來此之謂葆光故昔者堯問於舜曰我欲伐宗膾胥敖南面而不釋然其故何也舜曰夫三子者猶存乎蓬艾之間若不釋然何哉昔者十日並出萬物皆照而況德之進乎日者乎齧缺間乎王倪曰子知物之所同是乎曰吾惡乎知之子知子之所不知邪曰吾惡乎知之然則物無知邪曰吾惡乎知之雖然嘗試言之庸詎知吾所謂知之非不知邪庸詎知吾所謂不知之非知邪且吾嘗試問乎汝民濕寢則腰疾偏死鰌然乎哉木處則惴慄恂懼猨猴然乎哉三者孰知正處民食芻豢麋鹿食薦蝍蛆甘帶䲭鴉耆鼠四者孰知正味猨猵狙以爲雌麋與鹿交鰌與魚游毛嬙麗姬人之所美也魚見之深入鳥見之高飛麋鹿見之决驟四者孰知天下之正色哉自我觀之仁義之端是非之塗樊然殽亂吾惡能知其辯齧缺曰子不知利害則至人固不知利害乎王倪曰至人神矣大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚若然者乘雲氣騎日月而遊乎四海之外死生無變於已而况利害之端乎瞿鵲子問乎長梧子曰吾聞諸夫子聖人不從事於務不就利不違害不喜求不縁道無謂有謂有謂無謂而遊乎塵垢之外夫子以爲孟浪之言而我以爲妙道之行也吾子以爲奚若長梧子曰是黄帝之所聽瑩也而丘也何足以知之且汝亦大早計見卯而求時夜見彈而求鴞炙子嘗爲汝妄言之汝以妄聽之奚旁日月挾宇宙爲其脗合置其滑涽以隸相尊衆人役役聖人愚芚參萬歲而一成純萬物盡然而以是相藴子惡乎知悦生之非惑邪予惡乎知惡死之非弱喪而不知歸者邪麗之姬艾封人之子也晋國之始得之也涕泣沾襟及其至於王所與王同匡牀食芻豢而後悔其泣也予惡乎知夫死者不悔其始之蘄生乎夢飲酒者且而哭泣夢哭泣者旦而田獵方其夢也不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也而愚者自以爲覺竊竊然知之君乎牧乎固哉丘也與汝皆夢也予謂汝夢亦夢也是其言也其名爲弟詭萬世之後而一遇大聖知其解者是旦暮遇之也旣使我與若辯矣若勝我我不若勝若果是也我果非也邪我勝若若不吾勝我果是也而果非也邪其或是也其或非也邪其俱是也其俱非也邪我與若不能相知也則人固受其黮闇吾誰使正之使同乎若者正之旣與若同矣惡能正之使同乎我者正之旣同乎我矣惡能正之使同乎我與若者正之旣異乎我與若矣惡能正之使異乎我與若者正之旣同乎我與若矣惡能正之然則我與若與人俱不能相知也而待彼也邪何謂和之以天倪曰是不是然不然是若果是也則是之異乎不是也亦無辯然若果然也則然之異乎不然也亦無辯化聲之相待若其不相待和之以天倪因之以曼衍所以窮年也忘年忘義振於無竟故寓諸無竟罔兩問景曰曩子行今子止曩子坐今子起何其無特操與景曰吾有待而然者邪吾所待又有待而然者邪吾待蛇蚹蜩冀邪惡識所以然惡識所以不然昔者莊周夢爲胡蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢爲胡蝶與胡蝶之夢爲周與周與胡蝶則必有分矣此之謂物化内篇養生主第三吾生也有涯而知也無涯以有涯隨無涯殆已已而爲知者殆而已矣爲善無近名爲惡無近刑縁督以爲經可以保身可以全生可以養親可以盡年庖丁爲文惠君解牛手之所觸肩之所倚足之所履膝之所踦砉然嚮然奏刀駱然莫不中音合於桑林之舞乃中經首之會文惠君曰譆善哉技蓋至此乎庖丁釋刀對曰臣之所好者道也進乎技矣始臣之解牛之時所見無非牛者三年之後未嘗見全牛也方今之時臣以神遇而不以目視官知止而神欲行依乎天理批大郤導大窾因其固然技經肯綮之未嘗而況大軱乎良庖歲更刀割也族庖月更刀折也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎雖然每至於族吾見其難爲怵然爲戒視爲止行爲遲動刀甚微謋然已解如土委地提刀而立爲之四顧爲之躊躇滿志善刀而藏之文惠君曰善哉吾聞庖丁之言得養生焉公文軒見右師而驚曰是何人也惡乎介也天與其人與曰天也非人也天之生是使獨也人之貌有與也以是知其天也非人也澤雉十步一啄百步一飲不蘄畜乎樊中神雖王不善也老聃死秦失弔之三號而出弟子曰非夫子之友邪曰然然則弔焉若此可乎曰然始也吾以爲其人也而今非也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其母彼其所以會之必有不蘄言而言不蘄哭而哭者是遁天倍情忘其所受古者謂之遁天之刑適來夫子時也適去夫子順也安時而處順哀樂不能入也古者謂是帝之縣解指窮於爲薪火傅也不知其盡也内篇人間世第四顔回見仲尼請行曰奚之曰將之衛曰奚爲焉曰回聞衛君其年壯其行獨輕用其國而不見其過輕用民死死者以國量乎澤若蕉民其無如矣回嘗聞之夫子曰治國去之亂國就之醫門多疾願以所聞思其則庶幾其國有廖乎仲尼曰譆若殆往而刑耳夫道不欲雜雜則多多則擾擾則憂憂而不救古之至人先存諸己而後存諸人所存於已者未定何暇至於暴人之所行且若亦知夫德之所蕩而知之所爲出乎哉德蕩乎名知出乎爭名也者相軋也知也者爭之器也二者凶器非所以盡行也且德厚信矼未達人氣名聞不爭未達人心而彊以仁義繩墨之言術暴人之前者是以人惡有其美也命之曰菑人菑人者人必反菑之若殆爲人菑夫且荀爲悅賢而惡不肖惡用而求有以異若唯無詔王公必將乘人而鬥其捷而目將熒之而色將平之口將管之容將形之心且成之是以火救火以水救水名之曰益多順始無窮若殆以不信厚言必死於暴人之前矣且昔者桀殺關龍逄紂殺王子比干是皆修其身以下傴拊人之民以下拂其上者也故其君因其修以擠之是好名者也昔者堯攻叢枝胥敖禹功有扈國爲虚厲身爲刑戮其用兵不止其求實無已是皆求名實者也而獨不聞之乎名實者聖人之所不能勝也而況若乎雖然若必有以也嘗以語我來顔回曰端而虚勉而一則可乎曰惡惡可夫以陽爲充孔揚采色不定常人之所不違因案人之所感以求容與其心名之曰日漸之德不成而況大德乎將執而不化外合而内不訾其庸詎可乎然則我内直而外曲成而上比内直者與天爲徒與天爲徒者知天子之與己皆天之所子而獨以己言蘄乎而人善之蘄乎而人不善之邪若然者人謂之童子是之謂與天爲徒外曲者與人之爲徒也擎跽曲拳人臣之禮也人皆爲之吾敢不爲邪爲人之所爲者人亦無疵焉是之謂與人爲徒成而上比者與古爲徒其言雖教謫之實也古之有也非吾有也若然者雖直而不病是之謂與古爲徒若是則可乎仲尼曰惡惡可大多政法而不諜雖固亦無罪雖然止是耳矣夫胡可以及化猶師心者也顔回曰吾無以進矣敢問其方仲尼曰齋吾將語若有而爲之其易邪易之者皥天不宜顔回曰回之家貧唯不飲酒不菇葷者數月矣若此則可以爲齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣者也虚而待物者也唯道集虚虚者心齋也顔回曰回之未始得使實自回也得使之也未始有回也可謂虚乎夫子曰盡矣吾語若若能入遊其樊而無感其名入則鳴不入則止無門無毒一宅而寓於不得已則幾矣絶迹易無行地難爲人使易以僞爲天使難以僞聞以有翼飛者矣未聞以無翼飛者也聞以有知知者矣未聞以無知知者也瞻彼闋者虚室生白吉祥止止夫且不止是之謂坐馳夫徇耳目内通而外於心知鬼神將來舍而況人乎是萬物之化也禹舜之所紐也伏羲几蘧之所行終而況散焉者乎葉公子高將使於齊問於仲尼曰王使諸梁也甚重齊之待使者蓋將甚敬而不急匹夫猶未可動也而況諸侯乎吾甚慄之子嘗語諸梁也曰凡事若小若大寡不道以歡成事若不成則必有人道之患事若成則必有陰陽之患若成若不成而後無患者唯有德者能之吾食也執粗而不臧爨無欲清之人今吾朝受命而夕飲冰我其内熱與吾未至乎事之情而旣有陰陽之患矣事若不成必有人道之患是兩也爲人臣者不足以任之子其有以語我來仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心臣之事君義也無適而非君也無所迯於天地之間是之謂大戒是以夫事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命德之至也爲人臣子者固有所不得已行事之情而忘其身何暇至於悅生而惡死夫子其行可矣丘請復以所聞凡交近則必相靡以信遠則必忠之以言言必或傳之夫傳兩喜兩怒之言天下之難者也夫兩喜必多溢美之言兩怒必多溢惡之言凡溢之類妄妄則其信之也莫莫則傳言者殃故法言曰傳其常情無傳其溢言則幾乎全且以巧鬥力者始乎陽常卒乎陰泰至則多奇巧以禮飲酒者始乎治常卒乎亂泰至則多奇樂凡事亦然始乎諒常卒乎鄙其作始也簡其將畢也必巨言者風波也行者實喪也夫風波易以動實喪易以危故忿設無由巧言偏辭獸死不擇音氣息茀然於是並生心厲剋核太至則必有不肖之心應之而不知其然也荀爲不知其然也孰知其所終故法言曰無遷令無勸成過度益也遷令勸成殆事美成在乆惡成不及改可不愼與且夫乘物以遊心託不得已以養中至矣何作爲報也莫若爲致命此其難者顔闔將傳衛靈公太子而問於蘧伯玉曰有人於此其德天殺與之爲無方則危吾國與之爲有方則危吾身其知適足以知人之過而不知其所以過若然者吾奈之何蘧伯玉曰善哉問乎戒之愼之正汝身哉形莫若就心莫若和雖然之二者有患就不欲入和不欲出形就而入且爲顛爲滅爲崩爲蹶心和而出且爲聲爲名爲妖爲孽彼且爲嬰兒亦與之爲嬰兒彼且爲無町畦亦與之爲無町畦彼且爲無崖亦與之爲無崖達之入於無疵汝不知夫螳蜋乎怒其臂以當車轍不知其不勝任也是其才之美者也戒之愼之積伐而美者以犯之幾矣汝不知夫養虎者乎不敢以生物與之爲其殺之之怒也不敢以全物與之爲其决之之怒也時其饑飽達其怒心虎之與人異類而媚養己者順也故其殺者逆也夫愛馬者以筐盛矢以蜄盛溺適有蚊虻僕縁而拊之不時則缺銜毁首碎胸意有所至而愛有所亡可不愼邪匠石之齊至于曲轅見櫟社樹其大蔽牛絜之百圍其高臨山十仞而後有枝其可以爲舟者旁十數觀者如市匠伯不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此之美也先生不肯視行不輟何邪曰已矣勿言之矣散木也以爲舟則沈以爲棺槨則速腐以爲器則速毁以爲門户則滚樠以爲樹則蠹是不材之木也無所可用故能若是之壽匠石歸櫟社見夢曰汝將惡乎比予哉若將比予於文木邪夫柤梨橘柚果蓏之屬實熟則剥則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭自掊擊於世俗者也物莫不若是且予求無所可用乆矣幾死乃今得之爲予大用使子也而有用且得有此大也邪且也若與予也皆物也柰何哉其相物也而幾死之散人又惡知散木匠石覺而診其夢弟子曰趣取無用則爲社何邪曰密若無言彼亦直寄焉以爲不知己者詬厲也不爲社者且幾有翦乎且也彼其所保與衆異而以義譽之不亦遠乎南伯子綦遊乎商之丘見大木焉有異結駟千乘隱將芘其所藾子綦曰此何木也哉此必有異材夫仰而視其細枝則拳曲而不可以爲棟梁俯而視其大根則軸解而不可以爲棺槨咶其葉則口爛而爲傷嗅之則使人狂醒三日而不已子綦曰此果不材之木也以至於此其大也嗟乎神人以此不材宋有荆氏者宜楸柏桑其拱把而上者求狙猴之杙者斬之三圍四圍求高名之麗者斬之七圍八圍貴人富商之家求禪傍者斬之故未終其天年而中道夭於斧斤此材之患也故解之以牛之白顙者與豚之亢鼻者與人有痔病者不可以適河此皆巫祝以知之矣所以爲不祥也此乃神人之所以爲大祥也支離疏者顧隱於齊肩高於頂會撮指天五管在上兩髀爲脅挫鍼治繲足以餬口鼓筴播精足以食十人上徵武士則支離攘臂於其間上有大後則支離以有常疾不受功上與病者栗則受三鍾與十束薪夫支離其形者猶足以養其身終其天年又況支離其德者乎孔子適楚楚狂接輿遊其門曰鳳兮鳳兮何如德之衰也來世不可待往世不可追也天下有道聖人成焉天下無道聖人生焉方今之時僅免刑焉福輕乎羽莫之知載禍重乎地莫之知避已乎已乎臨人以德殆乎殆乎畫地而趨迷陽迷陽無傷吾行吾行郤曲無傷吾足山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也內篇德充符第五魯有兀者王駘從之遊者與仲尼相若常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯立不教坐不議虚而往實而歸固有不言之教無形而心成者邪是何人也仲尼曰夫子聖人也丘也直後而未往耳丘將以爲師而況不若丘者乎奚假魯國丘將引天下而與從之常季曰彼兀者也而王先生其與庸亦遠矣若然者其用心也獨若之何仲尼曰死生亦大矣而不得與之變雖天地覆墜亦將不與之遺審乎無假而不與物遷命物之化而守其宗也常季曰何謂也仲尼曰自其異者視之肝膽楚越也自其同者視之萬物皆一也夫若然者且不知耳目之所宜而遊心乎德之和物視其所一而不見其所喪視喪其足猶遺士也常季曰彼爲己以其知得其心以其心得其常心物何爲最之哉仲尼曰人莫鑑於流水而鑑於止水唯止能止衆止受命於地唯松栢獨也在冬夏青青受命於天唯舜獨也正幸能正生以正衆生夫保始之徵不懼之實勇士一人雄入於九軍將求名而能自要者而猶若是而況官天地府萬物直寓六骸象耳目一知之所知而心未嘗死者乎彼且擇日而登假人則從是也彼且何肯以物爲事乎申徒嘉兀者也而與鄭子産同師於伯昏無人子産謂申徒嘉曰我先出則子止子先出則我止其明日又與合堂同席而坐子産謂申徒嘉曰我先出則子止子先出則我止今我將出子可以止乎其未邪且子見執政而不違子齊執政乎申徒嘉曰先生之門固有執政焉如此哉子而悦子之執政而後人者也聞之曰鑑明則塵垢不止止則不明也乆與賢人處則無過乎今子之所取大者先生也而猶出言若是不亦過乎子産曰子旣若是矣猶與堯爭善計子之德不足以自反邪申徒嘉曰自狀其過以不當亡者衆不狀其過以不當存者寡知不可柰何而安之若命唯有德者能之遊於羿之彀中中央者中地也然而不中者命也人以其全足笑吾不全足者衆矣我怫然而怒而適先生之所則廢然而反不知先生之洗我以善邪吾與夫子遊十九年矣而未嘗知吾兀者也今子與我遊於形骸之内而子索我於形骸之外不亦過乎子産蹴然改容更貌曰子無乃稱魯有兀者叔山無趾踵見仲尼仲尼曰子不謹前旣犯患若是矣雖今來何及矣無趾曰吾唯不知務而輕用吾身吾是以亡足今吾來也猶有尊足者存吾是以務全之也夫天無不覆地無不載吾以夫子爲天地安知夫子之猶若是也孔子曰丘則陋矣夫子胡不入乎請講以所聞無趾出孔子曰弟子勉之夫無趾兀者也猶務學以復補前行之惡而沉全德之人乎無趾語老聃曰孔丘之於至人其末邪彼何賔賔以學子爲彼且蘄以諔詭幻怪之名聞不知至人之以是爲己桎梏邪老聃曰胡不直使彼以死生爲一條以可不可爲一貫者解其桎梏其可乎無趾曰天刑之安可解魯哀公問於仲尼曰衛有惡人焉曰哀駘它丈夫與之處者思而不能去也婦人見之請於父母曰與爲人妻寧爲夫子妾者十數而未止也未嘗有聞其唱者也常和人而已矣無君人之位以濟乎人之死無聚禄以望人之腹又以惡駭天下和而不唱知不出乎四域且而雌雄合乎前是必有異乎人者也寡人召而觀之果以惡駭天下與寡人處不至以月數而寡人有意乎其爲人也不至乎期年而寡人信之國無宰寡人傳國焉悶然而後應汜若而辭寡人醜乎卒授之國無幾何也去寡人而行寡人卹焉若有亡也若無與樂是國也是何人者也仲尼曰丘也嘗使於楚矣適見豚子食於其死母者少焉胸若皆棄之而走不見己焉爾不得類焉爾所愛其母者非愛其形也愛使其形者也戰而死者其人之葬也不以翣資刖者之屨無爲愛之皆無其本矣爲天子之諸御不爪翦不穿耳取妻者止於外不得復使形全猶足以爲爾而況全德之人乎今哀駘它未言而信無功而親使人授己國唯恐其不受也是必才全而德不形者也哀公曰何謂才全仲尼曰死生存亡窮達貧富賢與不肖毁譽飢渴寒暑是事之變命之行也日夜相代乎前而知不能規乎其始者也故不足以滑和不可入於靈府使之和豫通而不失於兊使曰夜無郤而與物爲春是接而生時乎心者也是之謂才全何謂德不形曰平者水停之盛也其可以爲法也内保之而外不蕩也德者成和之修也德不形者物不能離也哀公異日以告閔子曰始也吾以南面而君天下執民之紀而憂其死吾自以爲至通矣今吾聞至人之言恐吾無其實輕用吾身而亡其國吾與孔丘非君臣也德友而已矣闉跤支離無脤說衛靈公靈公悦之而視全人其脰肩肩甕㼜太癭說齊桓公桓公悅之而視全人其脰肩肩故德有所長而形有所忘人不忘其所忘而忘其所不忘此謂誠忘故聖人有所遊而知爲孽約爲膠德爲接工爲商聖人不謀惡用知不斲惡用膠無喪惡用德不貨惡用商四者天鬻也天鬻者天食也旣受食於天又惡用人有人之形無人之情有人之形故群於人無人之情故是非不得於身眇乎小哉所以屬於人也謷乎大哉獨成其天惠子謂莊子曰人故無情乎莊子曰然惠子曰人而無情何以謂之人莊子曰道與之貌天與之形惡得不謂之人惠子曰旣謂之人惡得無情莊子曰是非吾所謂情也吾所謂無情者言人之不以好惡内傷其身常因自然而不益生也惠子曰不益生何以有其身莊子曰道與之貌天與之形無以好惡内傷其身今子外乎子之神勞乎子之精倚樹而吟據槁梧而瞑天選子之形子以堅白鳴南華眞經卷之一
