  - {type: variant, offset: 17109, length: 0, content: '', HFL: 民不知其所由然若然者豈兄堯舜之教民溟涬然弟之哉欲同乎德而心居矣子貢南遊於楚反於晋過漢陰見一丈人方將爲圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎爲圃者仰而視之曰奈何曰鑿木爲機後重前輕挈水若抽數如泆湯其名爲橰爲圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不爲也子貢瞞然慚俯而不對有間爲圃者曰子奚爲者邪曰孔丘之徒也爲圃者曰子非夫博學以擬聖於于以蓋衆獨弦哀歌以賣名聲於天下者乎汝方將忘汝神氣墮汝形骸而庶幾乎而身之不能治而何暇治天下乎子往矣無乏吾事子貢卑陬失色頊頊然不}
