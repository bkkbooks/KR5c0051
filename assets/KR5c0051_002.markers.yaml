  - {type: line-break, offset: 11584, content: '', id: KR5c0051_SBCK_002-32a04}
  - {type: variant, offset: 11584, length: 0, content: '', ZTDZ: 不同其係聲名一也而先生獨以爲非聖人如何哉老聃曰小子少進子何以謂不同對曰堯授舜舜授禹禹用力而湯用兵文王順紂而不敢逆武王逆紂而不肯順故曰不同老聃曰小子少進余語汝三皇五帝之治天下黄帝之治天下使民心一民有其親死不哭而民不非也堯之治天下使民心親民有爲其親殺其殺而民不非也舜之治天下使民心競民孕婦十月生子子生五月而能言不至乎孩而始誰則人始有夭矣禹之治天下使民心變人有心而兵有順殺盜非殺人自爲種而天下耳是以天下大駭儒墨皆起其作始有倫而今乎婦女何言哉余語汝三皇五帝之治天下名曰治之而亂莫甚焉三皇之知上悖日月之明下睽山川之精中墮四時之施其知憯於𧓽蠆之尾鮮規之獸莫得安其性命之情者而猶自以爲聖人不可恥乎其無恥也子貢蹴蹴然立不安孔子謂老聃曰丘治詩書禮樂易春秋六經自以爲乆矣孰知其故矣以奸者七十二君論先王之道而明周召之迹一君無所鉤用甚矣夫人之難說也道之難明邪老子曰幸矣子之不過治世之君也夫六經先王之陳迹也豈其所以迹哉今子之所言猶迹也夫迹履之所出而迹豈履哉夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應於下風而風化類自爲雌雄故風化性不可易命不可變時不可止道不可壅荀得於道無自而不可失焉者無自而可孔子不出三月復見曰丘得之矣爲鵲孺魚傳沫細要者化有弟而兄啼乆矣夫丘不與化爲人不與化爲人安能化人老子曰可丘得之矣外篇刻意第十五刻意尚行離世異俗高論怨誹爲亢而已矣此山谷之士非世之人枯稿赴淵者之所好也語仁義忠信恭儉推讓爲修而已矣此平世之士教誨之人遊居學者之所好也語大功立大名禮君臣正上下爲治而已矣此朝廷之士尊主强國之人致功井兼者之所好也就藪澤處間曠釣魚間處無爲而已矣此江海之士避世之人間暇者之所好也吹呴呼吸吐故納新熊經鳥申爲壽而已矣此導引之士養形之人彭祖壽考者之所好也若夫不刻意而高無仁義而修無功名而治無江海而間不導引而壽無不忘也無不有也澹然無極而衆美從之此天地之道聖人之德也故曰夫恬惔寂寞虚無無爲此天地之平而道德之質也故曰聖人休休焉則平易矣平易則恬惔矣平易恬惔則憂患不能入邪氣不能襲故其德全而神不虧故曰聖人之生也天行其死也物化靜}
  - {type: page-break, offset: 11584, content: '', id: KR5c0051_SJB_002-110594a}
  - {type: page-break, offset: 11584, content: '', id: KR5c0051_SJB_002-110594b}
  - {type: variant, offset: 11586, length: 1, content: 從, ZTDZ: 陰同德動而與陽同波不爲福先不爲禍始感而後應迫而後動不得已而後起去知與故循天}
  - {type: punctuation, offset: 11588, content: (, id: KR5c0051_krp_002-bkkpn1353}
  - {type: variant, offset: 11588, length: 1, content: 夫, ZTDZ: 理故無天灾無物累無人非無鬼責其生若浮其死若休不思慮不豫謀光矣而不耀信矣而不期其寢不夢其覺無憂其}
  - {type: voice, offset: 11588, length: 53, name: note, id: n211}
  - {type: variant, offset: 11590, length: 1, content: 全, ZTDZ: 純粹其魂不罷虚無恬惔乃合天德故曰悲樂者德之邪喜怒者道之過好惡者德之失故}
  - {type: variant, offset: 11592, length: 3, content: 具則體, ZTDZ: 不憂樂德之至也一而不變靜之至也無所於忤虚之至也不}
  - {type: page-break, offset: 11592, content: '', id: KR5c0051_SJB_002-110594c}
  - {type: variant, offset: 11597, length: 4, content: 冥與物冥, ZTDZ: 交淡之至也無所於逆粹之至也故曰形勞而不休則弊精用而不已則勞勞則竭水之性不雜則清莫動則平鬱閉而不流亦不能清天德之象也故曰純粹而不雜靜一而不變淡而無爲動而以天行此養神之道也夫有干越之劍}
  - {type: punctuation, offset: 11601, content: /, id: KR5c0051_krp_002-bkkpn1354}
  - {type: variant, offset: 11602, length: 0, content: '', ZTDZ: 柙而藏之不敢用也寳之至也精神四達並流無所不極上際於}
  - {type: variant, offset: 11604, length: 0, content: '', ZTDZ: 蟠於地化育萬物不可爲象其名爲同帝純素之道唯神是守守而勿失與神爲一一之精通合于天倫野語有之曰衆人重利廉士重名賢士尚志聖人貴精故素也者謂其無所與雜也純也者謂其不虧其神也能體純素謂之眞人外篇繕性第十六繕性於俗俗學以求復其初滑欲於俗思以求致其明謂之蔽蒙之民古之治道者以恬養知生而無以知爲也謂之以知養恬知與恬交相養而和理出其性夫德和也道理也德無不容仁也道無不理義也義明而物親忠也中純實而反乎情樂也信行容體而順乎文禮也禮樂徧行則天下亂矣彼正而蒙己德德則不冒冒則物必失其性也古之人在混芒之中與一世而得澹漠焉當是時也陰陽和靜鬼神不擾四時得節萬物不傷群生不夭人雖有知無所用之此之謂至一當是時也莫之爲而常自然逮德下衰及燧人伏義始爲天下是故順而不一德又下衰及神農黄帝始爲天下是故安而不順德又下衰及唐虞始爲天下興治化之流𣻏淳散朴離道以善險德以行然後去性而從於心心與心識知而不足以定天下然後附之以文益之以博文滅質博溺心然後民始惑亂無以反其性情而復其初由是觀之世喪道矣道喪世矣世與道交相喪也道之人何由興乎世世亦何由興乎道哉道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣隱故不自隱古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也當時命而大行乎天下則反一無迹不當時命而大窮乎天下則深根寧極而待此存身之道也古之行身者不以辯飾知不以知窮天下不以知窮德危然處其所而反其性已又何爲哉道固不小行德固不小識小識傷德小行傷道故曰正己而已矣樂全之謂得志古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣今之所謂得志者軒冕之謂也軒冕在身非性命也物之儻來寄也寄之其來不可圍其去不可止故不爲軒冕肆志不爲窮約趨俗其樂彼與此同故無憂而已矣今寄去則不樂由是觀之雖樂未嘗不荒也故曰喪己於物失性於俗者謂之倒置之民外篇秋水第十七秋水時至百川灌河涇流之大雨涘渚涯之間不辯牛馬於是焉河伯欣然自喜以天下之美爲盡在己順流而東行至於北海東面而視不見水端於是焉河伯始旋其面目望洋向若而歎曰野語有之曰聞道百以爲莫已若者我之謂也且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我覩子之難窮也吾非至於子之門則殆矣吾長見笑於大方之家北海若曰井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也今爾出於涯涘觀於大海乃知爾醜爾將可與語大埋矣天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虚春秋不變水旱不知此其過江河之流不可爲量數而吾未嘗以此自多者自以比形於天地而受氣於陰陽吾在天地之間猶小石小木之在大山也方存乎見少又奚以自多計四海之在天地之間也不似礨空之在大澤乎計中國之在海内不似稊米之在太倉乎號物之數謂之萬人處一焉人卒九州穀食之所生舟車之所通人處一焉此其比萬物也不似豪末之在於馬體乎五帝之所連三王之所爭仁人之所憂任士之所勞盡此矣伯夷辭之以爲名仲尼語之以爲博此其自多也不似爾向之自多於水乎河伯曰然則吾大天地而小豪末可乎北海若曰否夫物量無窮時無止分無常終始無故是故大知觀於遠近故小而不寡大而不多知量無窮證曏今故故遥而不悶掇而不跂知時無止察乎盈虚故得而不喜失而不憂知分之無常也明乎坦塗故生而不悅死而不禍知終始之不可故也計人之所知不若其所不知其生之時不若未生之時以其至小求窮其至大之域是故迷亂而不能自得也由此觀之又何以知豪末之足以定至細之倪又何以知天地之足以窮至大之域河伯曰世之議者皆曰至精無形至大不可圍是信情乎北海若曰夫自細視大者不盡自大視細者不明夫精小之微也垺大之殷也故異便此勢之有也夫精粗者期於有形者也無形者數}
