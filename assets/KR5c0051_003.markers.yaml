  - {type: variant, offset: 11739, length: 231, content: 人也李云敏疾如嚮也簡文云如嚮應聲之疾故是強梁之貌物徹䟽明司馬云物事也徹通也事能通而開明也崔云無物不逹無物不明勌其眷反胥如字司馬云䟽也簡文云相也易音亦崔以豉反相輕易也簡文同技徐其綺反簡文云藝也係如字崔本作繫或云作繫簡文云音繫勑律反且也虎豹之文來田猨狙之便執之狗來藉如是者可比明王乎此皆以其文章技能係累其身非渉虚以御乎無方也來田李云虎豹以皮有文章見獵也田獵也猨音狙七餘反便毗肩反舊扶靣反音來李音狸崔云旄牛也藉司馬云藉繩也由捷見結縳也崔云藉繫也陽子居蹵然曰敢問明王之治, ZTDZ: ''}
