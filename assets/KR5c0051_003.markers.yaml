  - {type: variant, offset: 3780, length: 705, content: 道無能也此言得之於道乃所以明其自得耳自得耳道不能使之得也我之未得又不能爲得也然則凡得之者外不資於道內不由於已掘然自得而獨化也夫生之難也猶獨化而自得之矣旣得其生又何患於生之不得而爲之哉故爲生果不足以全生以其生之不由於已爲也而爲之則傷其眞生也狶韋氏許豈反郭禇伊反李音豕司馬云上古帝王名挈徐苦結反郭苦係反司馬云要也得天地要也崔云成也伏戲音羲崔本作伏戲氏襲氣母司馬襲入也氣母兀氣之母也崔云取元氣之本維斗李云北斗所以爲天之綱維終古崔云終古久也鄭玄注周禮云終古猶言常也忒它得反差也崔本作代堪坏徐扶眉反郭孚坏反崔作邳司馬云堪坏神名人靣獸形淮南作欽崐崘崐或作岷同音昆下力門反崐崘山名馮夷司馬云清泠傅曰華隂僮鄕隄伯人也服八石得水仙是爲河伯一云以八月庚子浴於河而溺死一云渡河溺死大川河也崔本作泰川肩吾司馬云山神不死至孔子時大山泰又如字黃帝崔云得道而上天也顓音專頊許玉反玄宫李云顓頊帝高陽氏玄宫北方宫也月令曰其帝顓頊其神玄冥禺強音虞郭語龍反司馬云山海經曰北海之渚有神人靣鳥身珥兩青蛇踐兩赤蛇名禺強崔云大荒經曰北海之神名曰禺強靈爲之使歸藏曰昔穆王子筮卦於禺強案海外經云北方禺強黒身手足乗兩龍郭璞以爲水神人靣鳥身簡文云北海神也一名禺京是黃帝之孫也西王母山海經云狀如人狗尾逢頭戴勝善哨居洵水之涯漢武內傳云西王母與上元夫人降帝美容貌神仙人也少廣司馬云穴名崔云山名或西方空界之名彭祖解見逍遙篇崔云壽七百歲或以爲仙不死相息亮反武丁至列星司馬云傅殷相也武丁殷王高宗也東維箕斗之間天漢津之東維也星經曰一星在尾上言其乗東維騎箕尾之間也崔云傳死其精神乗東維託龍角乃列今尾上有傳星崔本此下更有其生無父母死登遐三年而形遯此言神之無能名者也凢二十二字掘其勿反, HFL: ''}
  - {type: variant, offset: 3784, length: 6, content: 此言得之於道, ZTDZ: 是}
  - {type: variant, offset: 3792, length: 0, content: '', ZTDZ: 謂冰解凍釋者夫至人者相與交食乎地而交樂乎天不}
  - {type: variant, offset: 3793, length: 1, content: 明, ZTDZ: 人物利害相攖不相與爲怪不相與爲謀不相與爲事翛然而往侗然而來是謂衛生之經已曰然則是至乎曰未也吾固告汝曰能兒子乎兒子動不知所爲行不知所之身若槁木之枝而心若死灰若是者禍亦不至福亦不來禍福無有惡有人灾也宇泰定者發乎天光發乎天光者人見}
