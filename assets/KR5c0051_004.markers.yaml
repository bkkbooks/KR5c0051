  - {type: variant, offset: 13822, length: 478, content: 至道敢問治身柰何而可以長久廣成子蹷然而起曰善哉問乎人皆自修而不治天下則天下治矣故善之也雲氣不待族而司馬云族聚也未聚而言澤少草木不待黃而落司馬云言殺氣多也爾雅云落死也益以崔本作蓋以佞如字郭音寧翦翦如字郭司馬云善辨也一云佞貌李云淺短貌或云狹小之貌恱全反間音閑下註同復扶又反邀古堯反要也首音狩蹷其月反又音厥驚而起也治直吏反來吾語女至道至道之精窈窈冥冥至道之極昏昏黙黙窈冥昏黙皆了無也夫莊老之所以屢稱無者何哉民生物者無物而物自生耳自生耳非爲生也又何有爲於巳生乎語魚據反下同女音汝後放此窈烏了反無視無聽抱神以靜形將自正忘視而自見聽而自聞則神不擾而形不邪也邪似嗟反必靜必清無勞女形無搖女精乃可以長生任其自動故間静而不天也目無所見耳無所聞心無所知女神將守形形乃長生此皆率性而動故長生也愼女內全其眞也閉女外守其分也多知爲敗知無崖故敗我爲女遂於大明之上矣至彼至陽之原也爲女入於窈冥之門矣至彼至隂之原也夫極隂陽之原乃遂於大明之上入於窈冥之門也爲于僞反下同天地有官隂陽有藏但當任之愼守女身物將自壯我守其一以處其和故我脩身千二百歲矣吾形未常衰取於盡性命之極極長生之致耳身不天乃能及, ZTDZ: ''}
