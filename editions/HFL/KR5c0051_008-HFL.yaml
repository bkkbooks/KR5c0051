body:
  text: 雜篇徐無鬼第二十四徐無鬼因女商見魏武侯武侯勞之曰先生病矣苦於山林之勞故乃肯見於寡人徐無鬼曰我則勞於君君有何勞於我君將盈嗜欲長好惡則性命之情病矣君將黜嗜欲掔好惡則耳目病矣我將勞君君有何勞於我武侯超然不對少焉徐無鬼曰嘗語君吾相狗也下之質執飽而止是狸德也中之質若視曰上之質若亡其一吾相狗又不若吾相馬也吾相馬直者中繩曲者中鉤方者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若卹若失若喪其一若是者超軼絶塵不知其所武侯大悅而笑徐無鬼出女商曰先生獨何以說吾君乎吾所以說吾君者橫說之則以詩書禮樂從說之則以金板六弢奉事而大有功者不可爲數而吾君未嘗啓齒今先生何以說吾君使吾君悅若此乎徐無鬼曰吾直告之吾相狗馬耳女商曰若是乎曰子不聞夫越之流人乎去國數日見其所知而喜去國旬月見所嘗見於國中者喜及期年也見似人者而喜矣不亦去人滋乆思人滋深乎夫逃虚空者藜藋柱乎鼪鼬之逕踉位其空聞人足音跫然而喜矣又況乎昆弟親戚之謦欬其側者乎乆矣夫莫以眞人之言謦欬吾君之側乎徐無鬼見武侯武侯曰先生居山林食芧栗厭葱韭以賔寡人乆矣夫今老邪其欲干酒肉之味邪其寡人亦有社稷之福邪徐無鬼曰無鬼生於貧賤未嘗敢飲食君之酒肉將來勞君也君曰何哉奚勞寡人曰勞君之神與形武侯曰何謂邪徐無鬼曰天地之養也一登高不可以爲長居下不可以爲短君獨爲萬乘之主以苦一國之民以養耳目鼻口夫神者不自許也夫神者好和而惡姦夫姦病也故勞之唯君所病之何也武侯曰欲見先生乆矣吾欲愛民而爲義偃兵其可乎徐無鬼曰不可愛民害民之始也爲義偃兵造兵之本也君自此爲之則殆不成凡成美惡器也君雖爲仁義幾且僞哉形固造形成固有伐變固外戰君亦必無盛鶴列於麗譙之間無徒驥於錙壇之宫無藏逆於得無以巧勝人無以謀勝人無以戰勝人夫殺人之士民兼人之土地以養吾私與吾神者其戰不知孰善勝之惡乎在君若勿已矣修胸中之誠以應天地之情而勿攖夫民死已脱矣君將惡乎用夫偃兵哉黄帝將見大隗乎具茨之山方明爲御昌㝢驂乘張若謵朋前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問塗適遇牧馬童子問塗焉曰若知具茨之山乎曰然若知大隗之所存乎曰然黄帝曰異哉小童非徒知具茨之山又知大隗之所存請問爲天下小童曰夫爲天下者亦若此而已矣又奚事焉予少而自遊於六合之内予適有瞀病有長者教予曰若乘日之車而遊於襄城之野今予病少痊予又且復遊於六合之外夫爲天下亦若此而已予又奚事焉黄帝曰夫爲天下者則誠非吾子之事雖然請問爲天下小童辭黄帝又問小童曰夫爲天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣黄帝再拜稽首稱天師而退知士無思慮之變則不樂辯士無談說之序則不樂察士無凌誶之事則不樂皆囿於物者也招世之士與朝中民之士榮官筋力之士矜難勇敢之士奮患兵革之士樂戰祜槁之士宿名法律之士廣治禮教之士敬容仁義之士貴際農夫無草萊之事則不比商賈無市井之事則不比庶人有旦暮之業則勸百工有器械之巧則壯錢財不積則貪者憂權勢不尤則夸者悲勢物之徒樂變遭時有所用不能無爲也此皆順比於歲不物於易者也馳其形性潜之萬物終身不反悲夫莊子曰射者非前期而中謂之善射天下皆羿也可乎惠子曰可莊子曰天下非有公是也而各是其所是天下皆堯也可乎惠子曰可莊子曰然則儒墨楊秉四與夫子爲五果孰是邪或者若魯遽者邪其弟子曰我得夫子之道矣吾能冬爨鼎而夏造冰矣魯遽曰是直以陽召陽以陰召陰非吾所謂道也吾示子乎吾道於是爲之調瑟廢一於堂廢一於室鼓宫宫動鼓角角動音律同矣夫或改調一絃於五音無當也鼓之二十五絃皆動未始異於聲而音之君已且若是者邪惠子曰今夫儒墨楊秉且方與我以辯相拂以辭相鎭以聲而未始吾非也則奚若矣莊子曰齊人蹢子於宋者其命閽也不以完其求鈃鍾也以束縛其求唐子也而未始出域有遺類矣夫楚人寄而蹢閽者夜半於無人之時而與舟人鬭未始離於岑而足以造於怨也莊子送葬過惠子之墓顧謂從者曰郢人堊漫其鼻端若蠅翼使匠石斲之匠石運斤成風聽而斲之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試爲寡人爲之匠石曰臣則嘗能斲之雖然臣之質死乆矣自夫子之死也吾無以爲質矣吾無與言之矣管仲有病桓公問之曰仲父之病病矣可不謂云至於大病則寡人惡乎屬國而可管仲曰公誰欲與公曰鮑叔牙曰不可其爲人絜廉善士也其於不己若者不比之又一聞人之過終身不忘使之治國上且鉤乎君下且逆乎民其得罪於君也將弗乆矣公曰然則孰可對曰勿已則隰朋可其爲人也上忘而下畔愧不若黄帝而哀不己若者以德分人謂之聖以財分人謂之賢以賢臨人未有得人者也以賢下人未有不得人者也其於國有不聞也其於家有不見也勿已則隰朋可吴王浮于江登乎狙之山衆狙見之恂然棄而走逃於深蓁有一狙焉委蛇攫搔見巧乎王王射之敏給搏捷矢王命相者趨射之狙執死顧謂其友顔不疑曰之狙也伐其巧恃其便以敖予以至此殛也戒之哉嗟乎無以汝色驕人哉顔不疑歸而師董梧以鋤其色去樂辭顯三年而國人稱之南伯子綦隱几而坐仰天而嘘顔成子入見曰夫子物之尤也形固可使若槁骸心固可使若死灰乎曰吾嘗居山穴之中矣當是時也田禾一覩我而齊國之衆三賀之我必先之彼故知之我必賣之彼故鬻之若我而不有之彼惡得而知之若我而不賣之彼惡得而鬻之嗟乎我悲人之自喪者吾又悲夫悲人之悲者其後而日遠矣仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言已曰丘也聞不言之言矣未之嘗言於此乎言之市南宜僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵丘願有喙三尺彼之謂不道之道此之謂不言之辯故德總乎道之所一而言休乎知之所不知至矣道之所一者德不能同也知之所不能知者辯不能舉也名若儒墨而凶矣故海不辭東流大之至也聖人並包天地澤及天下而不知其誰氏是故生無爵死無謚實不聚名不立此之謂大人狗不以善吠爲良人不以善言爲賢而況爲大乎夫爲大不足以爲大而況爲德乎夫大備矣莫若天地然奚求焉而大備矣知大備者無求無失無棄不以物易己也反己而不窮循古而不摩大人之誠子綦有八子陳諸前召九方歅曰爲我相吾子孰爲祥九方歅曰梱也爲祥子綦瞿然喜曰奚若曰梱也將與國君同食以終其身子綦索然出涕曰吾子何爲以至於是極也九方歅曰夫與國君同食澤及三族而況父母乎今夫子聞之而泣是禦福也子則祥矣父則不祥子綦曰歅汝何足以識之而梱祥邪盡於酒肉入於鼻口矣而何足以知其所自來吾未嘗爲牧而牂生於奥未嘗好田而鶉生於宎若勿怪何邪吾所與吾子遊者遊於天地吾與之邀樂於天吾與之邀食於地吾不與之爲事不與之爲謀不與之爲怪吾與之乘天地之誠而不以物與之相攖吾與之一委蛇而不與之爲事所宜今也然有世俗之償焉凡有怪徵者必有怪行殆乎非我與吾子之罪幾天與之也吾是以泣也無幾何而使梱之於燕盜得之於道全而鬻之則難不若刖之則易於是乎刖而鬻之於齊適當渠公之街然身食肉而終齧缺遇許由曰子將奚之曰將逃堯曰奚謂邪曰夫堯畜畜然仁吾恐其爲天下笑後世其人與人相食與夫民不難聚也愛之則親利之則至譽之則勸致其所惡則散愛利出乎仁義捐仁義者寡利仁義者衆夫仁義之行唯且無誠且假夫禽貪者器是以一人之斷制利天下譬之猶一覕也夫堯知賢人之利天下也而不知其賊天下也夫唯外乎賢者知之矣有暖姝者有濡需者有卷婁者所謂暖姝者學一先生之言則暖暖姝姝而私自悅也自以爲足矣而未知未始有物也是以謂暖姝者也濡需者豕蝨是也擇疏鬛自以爲廣宫大囿奎蹄曲隈乳間股脚自以爲安室利處不知屠者之一旦鼓臂布草操煙火而己與豕俱焦也此以域進此以域退此其所謂濡需者也卷婁者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悦之故三徙成都至鄧之墟而十有萬家堯聞舜之賢舉之童土之地曰冀得其來之澤舜舉乎童土之地年齒長矣聰明衰矣而不得休歸所謂卷婁者也是以神人惡衆至衆至則不比不比則不利也故無所甚親無所甚疏抱德煬和以順天下此謂眞人於蟻棄知於魚得計於羊棄意以目視目以耳聽耳以心復心若然者其平也繩其變也循古之眞人以天待之不以人入天古之眞人得之也生失之也死得之也死失之也生藥也其實堇也桔梗也雞壅也豕零也是時爲帝者也何可勝言勾踐也以甲楯三千棲於會稽唯種也能知亡之所以存唯種也不知其身之所以愁故曰䲭目有所適鶴脛有所節解之也悲故曰風之過河也有損焉日之過河也有損焉請只風與日相與守河而河以爲未始其攖也恃源而往者也故水之守土也審影之守人也審物之守物也審故目之於明也殆耳之於聰也殆心之於殉也殆凡能其於府也殆殆之成也不給改禍之長也兹萃其反也縁功其果也待乆而人以爲己寳不亦悲乎故有亡國戮民無已不知問是也故足之於地也踐雖踐恃其所不蹍而後善博也人之於知也少雖少恃其所不知而後知天之所謂也知大一知大陰知大目知大均知大方知大信知大定至矣大一通之大陰解之大目視之大均縁之大方體之大信稽之大定持之盡有天循有照宜有樞始有彼則其解之也似不解之者其知之也似不知之也不知而後知之其問之也不可以有崖而不可以無崖頡滑有實古今不代而不可以虧則可不謂有大揚搉乎闔不亦問是已奚惑然爲以不惑解惑復於不惑是尚大不惑雜篇則陽第二十五則陽游於楚夷節言之於王王未之見夷節歸彭陽見王果曰夫子何不譚我於王王果曰我不若公閲休彭陽曰公閲休奚爲者邪曰冬則擉鼈于江夏則休乎山樊有過而問者曰此予宅也夫夷節已不能而況我乎吾又不若夷節夫夷節之爲人也無德而有知不自許以之神其交固顛冥乎富貴之地非相助以德相助消也夫凍者假衣於春暍者反冬乎冷風夫楚王之爲人也形尊而嚴其於罪也無赦如虎非夫佞人正德其孰能撓焉故聖人其窮也使家人忘其貧其達也使王公忘爵禄而化卑其於物也與之爲娱矣其於人也樂物之通也保己焉故或不言而飲人以和與人並立而使人化父子之宜彼其乎歸居而一間其所施其於外人心者若是其遠也故曰待公閲休聖人達綢繆周盡一體矣而不知其然性也復命摇作而以天爲師人則從而命之也憂乎知而所行恒無幾時其有止也若之何生而美者人與之鑑不告則不知其美於人也若知之若不知之若聞之若不聞之其可喜也終無已人之好之亦無已性也聖人之愛人也人與之名不告則不知其愛人也若知之若不知之若聞之若不聞之其愛人也終無已人之安之亦無已性也舊國舊都望之暢然雖使丘陵草木之緡入之者十九猶之暢然况見見聞聞者也以十仞之臺縣衆間者也冉相氏得其環中以隨成與物無終無始無幾無時日與物化者一不化者也闔嘗舍之夫師天而不得師天與物皆殉其以爲事也若之何夫聖人未始有天未始有人未始有始未始有物與世偕行而不替所行之備而不洫其合之也若之何湯得其司御門尹登恒爲之傳之從師而不囿得其隨成爲之司其名之名嬴法得其兩見仲尼之盡慮爲之傳之容成民曰除日無歲無内無外魏瑩與田侯牟約田侯牟背之魏瑩怒將使人刺之犀首聞而恥之曰君爲萬乘之君也而以匹夫從讎衍請受甲二十萬爲君攻之虜其人民係其牛馬使其君内熱發於背然後拔其國忌也出走然後抶其背折其脊季子聞而恥之曰築十仞之城城者旣十仞矣則又壞之此胥靡之所苦也今兵不起七年矣此王之基也衍亂人不可聽也華子聞而醜之曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也君曰然則若何曰君求其道而已矣惠子聞之而見戴晋人晋人曰有所謂蝸者君知之乎曰然有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反君曰噫其虚言與曰臣請爲君實之君以意在四方上下有窮乎君曰無窮曰知遊心於無窮而反在通達之國若存若亡乎君曰然曰通達之中有魏於魏中有梁於梁中有王王與蠻氏有辯乎君曰無辯客出而君倘然若有亡也客出惠子見君曰客大人也聖人不足以當之惠子曰夫吹管也猶有嗃也吹劍首者吷而已矣堯舜人之所譽也道堯舜於戴晋人之前譬猶一吷也孔子之楚舍於蟻丘之漿其鄰有夫妻臣妾登極者子路曰是稯稯何爲者邪仲尼曰是聖人僕也是自埋於民自藏於畔其聲銷其志無窮其口雖言其心未嘗言方且與世違而心不屑與之俱是陸沈者也是其市南宜僚邪子路請往召之孔子曰已矣彼知丘之著於己也知丘之適楚也以丘爲必使楚王之召己也彼且以丘爲佞人也夫若然者其於佞人也羞聞其言而況親見其身乎而何以爲存子路往視之其室虚矣長梧封人問子牢曰君爲政焉勿鹵莽治民焉勿滅裂昔予爲禾耕而鹵莽之則其實亦鹵莽而報予芸而滅裂之其實亦滅裂而報予予來年變齊深其耕而熱耰之其禾蘩以滋予終年厭飱莊子聞之曰今人之治其形理其心多有似封人之所謂遁其天離其性滅其情亡其神以衆爲故鹵莽其性者欲惡之孽爲性萑葦蒹葭始萌以扶吾形尋擢吾性並潰漏發不擇所出漂疽疥癕内熱溲膏是也栢矩學於老聃曰請之天下遊老聃曰已矣天下猶是也又請之老聃曰汝將何始曰始於齊至齊見辜人焉推而彊之解朝服而幕之號天而哭之曰子乎子乎天下有大菑子獨先離之曰莫爲盜莫爲殺人榮辱立然後覩所病皆財聚然後覩所爭今立人之所病聚人之所爭窮困人之身使無休時欲無至此得乎古之君人者以得爲在民以失爲在己以正爲在民以枉爲在己故一形有失其形者退而自責今則不然匿爲物而愚不識大爲難而罪不敢重爲任而罰不勝遠其塗而誅不至民知力竭則以僞繼之日出多僞士民安取不僞夫力不足則僞知不足則欺財不足則盜盜竊之行於誰責而可乎籧伯玉行年六十而六十化未嘗不始於是之而卒詘之以非也未知今之所謂是之非五十九非也萬物有乎生而莫見其根有乎出而莫見其門人皆尊其知之所知而莫知恃其知之所不知而後知可不謂大疑乎已乎已乎且無所逃此所謂然與然乎仲尼問於太史大弢伯常騫狶韋曰夫衛靈公飲酒湛樂不聽國家之政田獵畢弋不應諸侯之際其所以爲靈公者何邪大弢曰是因是也伯常騫曰夫靈公有妻三人同濫而浴史鰌奉御而進所搏幣而扶冀其慢若彼之甚也見賢人若此其肅也是其所以爲靈公也狶韋曰夫靈公也死卜塟於故墓不吉卜塟於沙丘而吉掘之數仞得石槨焉洗而視之有銘焉曰不馮其子靈公奪而埋之夫靈公之爲靈也乆矣之二人何足以識之少知問於太公調曰何謂丘里之言太公調曰丘里者合十姓百名而以爲風俗也合異以爲同散同以爲異今指馬之百體而不得馬而馬係於前者立其百體而謂之馬也是故丘山積卑而爲高江河合水而爲大大人合并而爲公是以自外入者有主而不執由中出者有正而不距四時殊氣天不賜故歲成五官殊職君不私故國治文武大人不賜故德備萬物殊理道不私故無名無名故無爲無爲而無不爲時有終始世有變化禍福淳淳至有所拂者而有所宜自殉殊面有所正者有所差比于大澤百財皆度觀乎大山木石同壇此之謂丘里之言少知曰然則謂之道足乎太公調曰不然今計物之數不止於萬物而期曰萬物者以數之多者號而讀之也是故天地者形之大者也陰陽者氣之大者也道者爲之公因其大以號而讀之則可也已有之矣乃將得比哉則若以斯辯譬猶狗馬其不及遠矣少知曰四方之内六合之裏萬物之所生惡起太公調曰陰陽相照相蓋相治四時相代相生相殺欲惡去就於是橋起雌雄片合於是庸有安危相易禍福相生緩急相摩聚散以成此名實之可紀精之可志也隨序之相理橋運之相使窮則反終則始此物之所有言之所盡知之所至極物而已覩道之人不隨其所廢不原其所起此議之所止少知曰委眞之莫爲接子之或使二家之議孰正於其情孰徧於其理太公調曰雞鳴狗吠是人之所知雖有大知不能以言讀其所自化又不能以意其所將爲斯而析之精至於無倫大至於不可圍或之使莫之爲未免於物而終以爲過或使則實莫爲則虚有名有實是物之居無名無實在物之虚可言可意言而愈疏未生不可忌已死不可阻死生非遠也埋不可覩或之使莫之爲疑之所假吾觀之本其往無窮吾求之末其來無止無窮無止言之無也與物同埋或使莫爲言之本也與物終始道不可有有不可無道之爲名所假而行或使莫爲在物一曲夫胡爲於大方言而足則終日言而盡道言而不足則終日言而盡物道物之極言默不足以載非言非默議有所極南華眞經卷之四南華眞經卷之五貞六
