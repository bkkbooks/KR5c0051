  - {type: variant, offset: 8592, length: 6, content: 者誠能絶聖棄, ZTDZ: 安其所安不安其所不安衆人安其所不安不安其所安莊子曰知道易勿言難}
  - {type: variant, offset: 8600, length: 0, content: '', ZTDZ: 不言所以之天也知而言之所以之人也古之人天而不人朱泙漫學屠龍於支離益單千金之家三年技成而無所用其巧聖人以必不必故無兵衆人以不必必之故多兵順於兵故行有求兵恃之則亡小夫之知不離苞苴竿牘敝精神乎蹇淺而欲兼濟導物太一形虚若是者迷惑於宇宙形累不知大初彼至人者歸精神乎無始而甘暝乎無何有之郷水流乎無形發泄乎太清悲哉乎汝爲知在毫毛而不知大寧宋人有曹商者爲宋王使秦其往也得車數乘王悦之益車百乘}
  - {type: variant, offset: 8601, length: 8, content: 冥物極物極各冥則, ZTDZ: 於宋見莊子曰夫處窮閶阨巷困窘織履槁項黄馘者商之所短也一悟萬乘之主而從車百乘者商之所長也莊子曰秦王有病召醫破癕潰痤者得車一乘舐痔者得車五乘所治愈下得車愈多子豈治}
