  - {type: variant, offset: 22281, length: 4, content: 憂慄廟堂, ZTDZ: 今世殊死者相枕也桁楊者相推也刑戮者相望也而儒墨乃始離跂攘臂乎桎梏之間意甚矣哉其無愧而不知恥也甚矣吾未知聖知之不爲桁楊椄槢也仁義之不爲桎梏鑿枘也焉知曾史之不爲桀跖嚆矢也故曰絶聖棄知而天下大治黄帝立爲天子十九年令行天下聞廣成子在於空同}
  - {type: substitution, offset: 22282, original: 慄, replacement: 栗, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-17105}}
