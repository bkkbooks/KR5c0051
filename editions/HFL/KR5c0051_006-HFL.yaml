seq: 6
front:
  text: 於物失性於俗者謂之倒置之民
  hash: sha256:556a49a74dd9b13f80d9e8737b2c527ee753342449d61e3c73b195eea1dbbc73
body:
  text: 外篇秋水第十七秋水時至百川灌河涇流之大雨涘渚涯之間不辯牛馬於是焉河伯欣然自喜以天下之美爲盡在己順流而東行至於北海東面而視不見水端於是焉河伯始旋其面目望洋向若而歎曰野語有之曰聞道百以爲莫已若者我之謂也且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我覩子之難窮也吾非至於子之門則殆矣吾長見笑於大方之家北海若曰井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也今爾出於涯涘觀於大海乃知爾醜爾將可與語大埋矣天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虚春秋不變水旱不知此其過江河之流不可爲量數而吾未嘗以此自多者自以比形於天地而受氣於陰陽吾在天地之間猶小石小木之在大山也方存乎見少又奚以自多計四海之在天地之間也不似礨空之在大澤乎計中國之在海内不似稊米之在太倉乎號物之數謂之萬人處一焉人卒九州穀食之所生舟車之所通人處一焉此其比萬物也不似豪末之在於馬體乎五帝之所連三王之所爭仁人之所憂任士之所勞盡此矣伯夷辭之以爲名仲尼語之以爲博此其自多也不似爾向之自多於水乎河伯曰然則吾大天地而小豪末可乎北海若曰否夫物量無窮時無止分無常終始無故是故大知觀於遠近故小而不寡大而不多知量無窮證曏今故故遥而不悶掇而不跂知時無止察乎盈虚故得而不喜失而不憂知分之無常也明乎坦塗故生而不悅死而不禍知終始之不可故也計人之所知不若其所不知其生之時不若未生之時以其至小求窮其至大之域是故迷亂而不能自得也由此觀之又何以知豪末之足以定至細之倪又何以知天地之足以窮至大之域河伯曰世之議者皆曰至精無形至大不可圍是信情乎北海若曰夫自細視大者不盡自大視細者不明夫精小之微也垺大之殷也故異便此勢之有也夫精粗者期於有形者也無形者數之所不能分也不可圍者數之所不能窮也可以言論者物之粗也可以意致者物之精也言之所不能論意之所不能察致者不期精粗焉是故大人之行不出乎害人不多仁恩動不爲利不賤門隸貨財弗爭不多辭讓事焉不借人不多食乎力不賤貪汙行殊乎俗不多辟異爲在從衆不賤佞謟世之爵禄不足以爲勸戮恥不足以爲辱知是非之不可爲分細大之不可爲倪聞曰道人不聞至德不得大人無已約分之至也河伯曰若物之外若物之内惡至而倪貴賤惡至而倪小大北海若曰以道觀之物無貴賤以物觀之自貴而相賤以俗觀之貴賤不在已以差觀之因其所大而大之則萬物莫不大因其所小而小之則萬物莫不小知天地之爲稊米也知豪末之爲丘山也則差數覩矣以功觀之因其所有而有之則萬物莫不有因其所無而無之則萬物莫不無知東西之相反而不可以相無則功分定矣以趣觀之因其所然而然之則萬物莫不然因其所非而非之則萬物莫不非知堯桀之自然而相非則趣操覩矣昔者堯舜讓以帝之噲讓而絶湯武爭而王白公爭而滅由此觀之爭讓之禮堯桀之行貴賤有時未可以爲常也梁麗可以衝城而不可以窒宂言殊器也騏驥驊騮一日而馳千里捕鼠不如狸狌言殊技也鴟鵂夜撮蚤察豪末畫出瞋目而不見丘山言殊性也故曰蓋師是而無非師治而無亂乎是未明天地之理萬物之情者也是猶師天而無地師陰而無陽其不可行明矣然且語而不舍非愚則誣也帝王殊禪三代殊繼差其時逆其俗者謂之篡夫當其時順其俗者謂之義之徒默默乎河伯汝惡知貴賤之門小大之家河伯曰然則我何爲乎何不爲乎吾辭受趣舍吾終奈何北海若曰以道觀之何貴何賤是謂反衍無拘而志與道大蹇何少何多是謂謝施無一而行與道參差嚴乎若國之有君其無私德繇繇乎若祭之有社其無私福汎汎乎其若四方之無窮其無所畛域兼懷萬物其孰承翼是謂無方萬物一齊孰短孰長道無終始物有死生不恃其成一虚一滿不位乎其形年不可舉時不可止消息盈虚終則有始是所以語大義之方論萬物之理也物之生也若驟若馳無動而不變無時而不移何爲乎何不爲平夫固將自化河伯曰然則何貴於道邪北海若曰知道者必達於理達於埋者必明於權明於權者不以物害己至德者火弗能熱水弗能溺寒暑弗能害禽獸弗能賊非謂其薄之也言察乎安危寧於禍福謹於去就莫之能害也故曰天在内人在外德在乎天知天人之行本乎天位乎得蹢䠱而屈伸反要而語極曰何謂天何謂人北海若曰牛馬四足是謂天落馬首穿牛鼻是謂人故曰無以人滅天無以故滅命無以得殉名謹守而勿失是謂反其眞䕫憐蚿蚿憐蛇蛇憐風風憐目目憐心夔謂蚿曰吾以一足踸踔而行予無如矣今子之使萬足獨奈何蚿曰不然子不見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也今子動吾天機而不知其所以然蚿謂蛇曰吾以衆足而行而不及子之無足何也蛇曰夫天機之所動何可易邪吾安用足哉蛇謂風曰予動吾脊脅而行則有似也今子蓬蓬然起於北海蓬蓬然入於南海而似無有何也風曰然子蓬蓬然起於北海而入於南海也然而指我則勝我䠓我亦勝我雖然夫折大木蜚大屋者唯我能也故以衆小不勝爲大勝也爲大勝者唯聖人能之孔子遊於匡宋人圍之數匝而弦歌不輟子路入見曰何夫子之娛也孔子曰來吾語汝我諱窮久矣而不免命也求通久矣而不得時也當堯舜而天下無窮人非知得也當桀紂而天下無通人非知失也時勢適然夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也由處矣吾命有所制矣無幾何將甲者進辭曰以爲陽虎也故圍之今非也請辭而退公孫龍問於魏牟曰龍少學先王之道長而明仁義之行合同異離堅白然不然可不可困百家之知窮衆曰之辯吾自以爲至達已今吾聞莊子之言汒焉異之不知論之不及與知之弗若與今吾無所開吾喙敢問其方公子牟隱机大息仰天而笑曰子獨不聞夫塪井之蛙乎謂東海之鼈曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接腋持頤蹶泥則没足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨踦塪井之樂此亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右膝已縶矣於是逡巡而却告之海曰夫千里之遠不足以舉其大千仞之高不足以極其深禹之時十年九潦而水弗爲加益湯之時八年七旱而崖不爲加損夫不爲頃乆推移不以多少進退者此亦東海之大樂也於是塪井之蛙聞之適適然驚規規然自失也且夫知不知是非之境而猶欲觀於莊子之言是猶使蚉負山商距馳河也必不勝任矣且夫知不知論極妙之言而自適一時之利者是非塪井之蛙與且彼方跐黄泉而登大皇無南無北爽然四解淪於不測無東無西始於玄冥反於大通子乃規規然而求之以察索之以辯是眞用管闚夭用錐指地也不亦小乎子往矣且子獨不聞夫壽陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳今子不去將忘子之故失子之業公孫龍口呿而不合舌舉而不下乃逸而走莊子釣於濮水楚王使大夫二人往先焉曰願以境内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死爲留骨而貴乎寧其生而曳尾於塗中乎二大夫曰寧生而曳尾於塗中莊子曰往矣吾將曳尾於塗中惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日三夜莊子往見之曰南方有鳥其名鵷鷄子知之乎夫鵷鶵發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是䲭得腐鼠鵷鶵過之仰而視之曰嚇今子欲以子之梁國而嚇我邪莊子與惠子遊於濠梁之上莊子曰儵魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本子曰汝安知魚樂云者旣已知吾知之而問我我知之濠上也外篇至樂第十八天下有至樂無有哉有可以活身者無有哉今奚爲奚據奚避奚處奚就奚去奚樂奚惡夫天下之所尊者富貴壽善也所樂者身安厚味美服好色音聲也所下者貧賤夭惡也所苦者身不得安逸口不得厚味形不得美服目不得好色耳不得音聲若不得者則大憂以懼其爲形也亦愚哉夫富者苦身疾作多積財而不得盡用其爲形也亦外矣夫貴者夜以繼日思慮善否其爲形也亦疏矣人之生也與憂俱生壽者惽惽乆憂不死何之苦也其爲形也亦遠矣烈士爲天下見善矣未足以活身吾未知善之誠善邪誠不善邪若以爲善矣不足活身以爲不善矣足以活人故曰忠諫不聽蹲循弗爭故夫子胥爭之以殘其形不爭名亦不成誠有善無有哉今俗之所爲與其所樂吾又未知樂之果樂邪果不樂邪吾觀夫俗之所樂舉群趣者誙誙然如將不得已而皆曰樂者吾未之樂也亦未之不樂也果有樂無有哉吾以無爲誠樂矣又俗之所大苦也故曰至樂無樂至譽無譽天下是非果未可定也雖然無爲可以定是非至樂活身唯無爲幾存請嘗試言之天無爲以之清地無爲以之寧故爾無爲相合萬物皆化芒乎芴乎而無從出乎芴乎芒乎而無有象乎萬物職職皆從無爲殖故曰天地無爲也而無不爲也人也孰能得無爲哉莊子妻死惠子弔之莊子則方箕踞鼓盆而歌惠子曰與人居長子老身死不哭亦足矣又鼓盆而歌不亦甚乎莊子曰不然是其始死也我獨何能無樂然察其始而本無生非徒無生也而本無形非徒無形也而本無氣雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與爲春秋冬夏四時行也人且偃然寢於巨室而我噭噭然隨而哭之自以爲不通乎命故止也攴離叔與滑介叔觀於冥伯之丘崑崙之虚黄帝之所休俄而柳生其左肘其意蹷蹷然惡之支離叔曰子惡之乎滑介叔曰亡予何惡生者假借也假之而生生者塵垢也死生爲晝夜且吾與子觀化而化及我我又何惡焉莊子之楚見空髑髏饒然有形撽以馬捶因而問之曰夫子貪生失理而爲此乎將子有亡國之事斧鉞之誅而爲此乎將子有不善之行愧遺父母妻子之醜而爲此乎將子有凍餒之患而爲此乎將子之春秋故及此乎於是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辯士諸子所言皆生人之累也死則無此矣子欲聞死之說乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事從然以天地爲春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形爲子骨肉肌膚反子父母妻子間里知識子欲之乎髑髏深矉蹙頞曰吾安能棄南面王樂而復爲人間之勞乎顔淵東之齊孔子有憂色子貢下席而問曰小子敢問回東之齊夫子有憂色何邪孔子曰善哉汝問昔者管子有言丘甚善之曰褚小者不可以懷大綆短者不可以汲深夫若是者以爲命有所成而形有所適也夫不可損益吾恐回與齊侯言堯舜黄帝之道而重以燧人神農之言彼將内求於己而不得不得則惑人惑則死且汝獨不聞邪昔者海鳥止於魯郊魯侯御而觴之子廟奏九韶以爲樂具太牢以爲膳鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死此以己養養鳥也非以鳥養養爲也夫以鳥養養鳥者宜栖之深林遊之壇陸浮之江湖食之鰌䱔隨行列而止委蛇而處彼唯人言之惡聞奚以夫譊譊爲乎咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒聞之相與還而觀之魚處水而生人處水而死彼必相與異其好惡故異也故先聖不一其能不同其事名止於實義設於適是之謂條達而福持列子行食於道從見百歲髑髏攓蓬而指之曰唯予與汝知而未嘗死未嘗生也汝果養乎予果歡乎種有幾得水則爲㡭得水土之際則爲鼃蠙之衣生於陵屯則爲陵舄陵舄得鬱棲則爲烏足烏足之根爲蠐螬其葉爲胡蝶胡蝶胥也化而爲蟲生於竈下其狀若脱其名爲鴝掇鴝掇千日爲鳥其名爲乾餘骨乾餘骨之沫爲斯彌斯彌爲食醯頤輅生乎食醯黄軦生乎九猷瞀芮生乎腐蠸羊奚比乎不箰乆竹生青寧青寧生程程生馬馬生人人又反入於機萬物皆出於機皆入於機南華眞經卷之三南華眞經卷之四貞五外篇達
