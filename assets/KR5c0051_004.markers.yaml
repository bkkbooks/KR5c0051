  - {type: variant, offset: 14339, length: 4, content: 天無爲也, HFL: ''}
  - {type: variant, offset: 14339, length: 905, content: 天無爲也廣成子曰來余語女彼其物無窮而人皆以爲終彼其物無測而人皆以爲極徒見其一變也得吾道者上爲皇而下爲王皇王之稱隨世之上下耳其於得通變之道以應無窮一也稱尺證反失吾道者上見光而下爲土失無窮之道則自信於一變而不得均同上下故俯仰異心今夫百昌皆生於土而反於土故余將去女土無心者也生於無心故當反守無心而獨往也百昌司馬云猶百物也入無窮之門以遊無極之野與化俱也吾與日月參光吾與天地爲常都任之也當我緡乎逺我昬乎物之去來皆不覺也當如字緡武巾反郭音泯泯合也逺于萬反昏如字暗也司馬云緡昏並無心之謂也人其盡死而我獨存乎以死主爲一體則無往而非存雲將東遊過扶搖之枝而適遭鴻鴻方將拊脾雀躍而遊雲將見之倘然止䞇然立曰叟何人邪叟何爲此鴻拊脾雀躍不輟對雲將曰遊雲將曰朕願有問也鴻仰而視雲將曰吁雲將曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育羣生爲之柰何鴻拊脾雀躍掉頭曰吾弗知吾弗知雲將不得問又三年東遊過有宋之野而適遭鴻雲將大喜行趨而進曰天忘朕邪天忘朕邪再拜稽首願聞於鴻鴻曰浮遊不知所求而自得所求也雲將子匠反下同李云雲主帥也扶搖扶亦作夫李云扶搖神木也生東海一云風也鴻如字司馬云自然元氣也一云海上氣也拊孚甫反一音甫脛本又作髀音陛徐甫婢反又甫娣反崔本又作爵同將略反躍司馬云雀躍若雀浴也一云如爵之跳躍也倘尺掌反又云吐郎反李云吐黨反司馬云欲貌李云自失貌䞇之二反又猪立反又魚列反李云不動貌叟本又作素口反郭䟽溝反司馬云長者稱輟丁劣反李云止也吁况于反亦作呼結如字崔本作綰音結掉徒弔反宋如字國名也本作宗者非猖狂不知所往而自得所往也遊者鞅掌以觀無夫內足者舉目皆自正也鞅掌於丈反毛詩傳云鞅掌失容也今此言自得而正也朕又何知以斯而已也雲將曰朕也自以爲猖狂而民隨予所往朕也不得已於民今則民之放也夫乗物非爲迹而迹自彰猖狂非招民而民自往故爲民所放效而不得巳也放方往反效也注同願聞一言鴻曰亂天下之經逆物之情玄天弗成若夫順物性而不治則情不逆而經不亂玄黙成而自然得也解獸之羣而鳥皆夜鳴離其所以静也災及草木禍及止蟲皆坐而受害也止蟲如字本亦作昆虫崔本作止虫坐才臥反意治人之過也夫有治之迹亂之所由生也意音醫本又作噫下皆同雲將曰然則吾柰何鴻曰意毒哉言治人之過深僊僊乎歸矣僊僊坐起之貌嫌, ZTDZ: 惠施}
