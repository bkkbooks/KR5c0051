body:
  text: 郭象子玄註陸德明音義莊子外篇逹生第十九音義曰以義名篇逹生之情者不務生之所無以爲生之所無以爲者分外物也逹生逹暢也通也廣雅云生出也逹命之情者不務知之所無奈何知之所無奈何者命表事也養形必先之物物有餘而形不養者有之矣知止其分物稱其生生斯足矣有餘則傷也稱尺證反有生必先無離形形不離而生亡者有之矣守形大甚故生亡也離力智反下同大音泰生之來不能却其去不能止非我所制則無爲有懷於其間悲夫世之人以爲養形足以存生故彌養之而彌失之而養形果不足以存生養之彌厚則死地彌至則世奚足爲哉莫放而任之雖不足爲而不可不爲者其爲不免矣性分各自爲者皆在至理中來故不可免也是以善養生者從而任之夫欲免爲形者莫如棄世棄世則無累無累則正平正平則與彼更生更生則幾矣更生者日新之謂也付之日新則性命盡矣幾徐其依反事奚足棄而生奚足遺棄事則形不勞遺生則精不虧所以遺棄之夫形全精復與天爲一俱不爲也天地者萬物之父母也無所偏爲故能子萬物合則成體散則成始所在皆成無常處處昌慮反形精不虧是謂能移與化俱也精而又精反以相天還輔其自然也相息亮反子列子問尹曰至人潜行不窒其心虚故能御羣實尹李云令尹喜也窒珍悉反蹈火不行乎萬物之上而不慄至適故無不可耳非物徃可之蹈徒報反請問何以至於此尹曰是純氣之守也非知巧果敢之列居予語女凡有貌象聲色者皆物也物何以相遠唯無心者獨遠耳知音智列音例本或作所語魚據反女音汝後同逺于萬反夫奚足以至乎先是色而巳同是形色之物耳未足以相先也則物之造乎不形而止乎無所化常遊於極夫得是而窮之者物焉得而止焉夫至極者非物所制焉於䖍反彼將處乎不淫之度止於所受之分而藏乎無端之紀冥然與變化日新遊乎萬物之所終始終始者物之極壹其性飾則二矣養其氣不以心使之合其德不以物離性以通乎物之所造萬物皆造於自爾夫是者其天守全其神無郤物奚自入焉夫醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也乗亦不知也墜亦不知也死生驚懼不入乎其胷中是故物而不慴彼得全於酒而猶是醉故失其所知耳非自然無心者也郤去逆反墜字或作隊同直反後皆同乗音繩又繩證反音悟郭音愕爾雅云忤也郭註云謂干觸慴之渉反懼也李郭音習而況得全於天乎聖人藏於天故莫之能傷也不闚性分之外故曰藏復讎者不折鏌干夫干將鏌鎁雖與讎爲用然報讎者不事折之以其無心鏌音莫本亦作莫干李云鏌耶干將皆古之利劒名吳越春秋云吳王闔閶使干將造劒劒有二狀一曰干將二曰鏌鎁鏌鎁干將妻名也雖有忮心者不怨飄瓦飄落之瓦雖復中人人莫之怨者由其無情忮之豉反郭李音支害也字書云狠也飄匹遥反郭李云落也復扶又反下章同中丁仲反是以天下平均凡不平者由有情故無攻戰之亂無殺戮之刑者由此道也無情之道大矣不開人之天而開天之天不慮而知天也知而後感開人也然則開天者性之動也開人者知之用也開天者德生性動者遇物而當足則忘餘斯德生也開人者賊生知用者從感而求勸而不巳斯賊生也不厭其天不忽於人任其天性而動則人理亦自全矣厭李於反徐於瞻反民幾乎以其眞民之所患僞之所生常在於知用不在於性動也幾音機或音祈仲尼適楚出於林中見痀僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月累丸二而不墜則失者錙銖累二丸於竿頭是用手之停審也其承蜩所失者不過錙銖之間也痀郭於禹反李徐居具反又其禹反僂郭音縷李徐良付反承一本作美蜩音條蟬也掇丁活反拾也五六月司馬曰黏蟬時也累劣彼反下同司馬云謂累之於竿頭也錙側其反銖音殊累三而不墜則失者十一所失愈少累五而不墜猶掇之也停審之至故乃無所復失吾處身也厥株拘吾執臂也槁木之枝不動之至厥本或作橛同其月反株音誅拘其俱反郭音俱李云厥豎也豎株拘也槁苦老反雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何爲而不得遺彼故得此孔子顧謂弟子曰用志不分乃凝於神其痀僂丈人之謂乎顔淵問仲尼曰吾甞濟乎觴深之淵津人操舟神吾問焉曰操舟可學邪曰可善游者數能言物雖有性亦須數習而後能耳分如字操七曹反下章同數音朔註下同乃夫没人則未嘗見舟而便操之也没人謂能鶩没於水底鶩音木鴨也吾問焉而不吾告敢問何謂也仲尼曰善游者數能忘水也習以成性遂自然乃夫没人之未甞見舟而便操之也彼視淵陵視舟之覆猶其車却也視淵陵故視舟之覆於淵猶車之却退於坂也覆芳服反註下同猶其車却也元嘉本無車字覆却萬方陳乎前而不得入其舎覆却雖多而猶不以經懷以其性便故也惡徃而不暇所遇皆閒暇也惡音烏閒音閑以瓦注者巧以鉤注者憚以黃金注者殙所要愈重則其心愈矜也注之反李云擊也憚徒丹反又音丹又丈旦反忌惡也一曰難也殙武典反又音昏又音門本亦作殙說文云殙矜也元嘉本作昏要一遥反其巧一也而有所矜則重外也凡外重者内拙夫欲養生全内者其唯無所矜重也田開之見周威公威公曰吾聞祝腎學生學生者務中適田開之李云開之其名也周威公崔本作周威公竈祝腎上之六反下市軫反字又作緊音同本或作賢學生司馬云學養生之道也中丁仲反下章注而中適同吾子與祝腎遊亦何聞焉田開之曰開之操㧞篲以侍門庭亦何聞於夫子威公曰田子無讓寡人願聞之開之曰聞之夫子曰善養生者牧羊然視其後者而鞭之威公曰何謂也田開之曰魯有單豹者岩居而水飮不與民共利行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之有張毅者高門縣薄無不走也行年四十而有内之病以死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者也夫守一方之事至於過理者不及於㑹通之適也鞭其後者去其不及也吾子與祝腎遊司馬本以吾子屬上句更云子與祝腎遊操七曹反㧞蒲末反徐甫末反李云把也篲似歲反徐以醉反郭予稅反李尋志反信醉反或蘇忽反帚也亦何聞於夫子絶句鞭如字崔本作云匿也視其羸痩在後者匿著牢中養之也單豹音善李云單豹隱人姓名也水飮元嘉本作飮水縣音玄薄司馬云簾也無不走也司馬云走至也言無不至門奉貴冨也李云走徃也去起吕反仲尼曰無入而藏藏旣内矣而又入之此過於入也無出而陽陽旣外矣而又出之此過於出也柴立其中央槁木之無心而中適是立也三者得其名必極名極而實當也夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎人之所取畏者祍席之上飮食之間而不知爲之戒者過也十殺一耳使大畏之至於色欲之害動皆之死地而莫不冐之斯過之甚也畏塗司馬云阻險道可畏懼者也卒子忽反知音智祍而甚反徐而鴆反李云卧衣也鄭注禮記云卧席也動皆之死地一本無地字冐音墨祝宗人玄端以臨牢筴說彘曰汝奚惡死吾將三月㹖汝十日戒三日齊藉白茅加汝肩尻乎彫爼之上則汝爲之乎爲彘謀曰不如食以糠糟而錯之牢筴之中自爲謀則茍生有軒冕之尊死得於腞楯之上聚僂之中則爲之爲彘謀則去之自爲謀則取之所異彘者何也欲瞻則身亡理常俱耳不間人獸也筴初革反李云牢豕室也筴木欄也說如字又始銳反彘直例反本亦作承惡烏路反㹖音患司馬云養也本亦作犧齊側皆反後章同藉在夜反又在亦反尻苦羔反爼莊吕反晝飾之爼也爲彘于僞反下自爲爲彘同食音嗣穅音康糟音遭錯七故反置也又如字本又作措腞直轉反又敕轉反楯食凖反徐敕荀反司馬云腞猶篆云腞猶篆也楯猶案也聚僂力主反司馬云聚僂器名也今冡壙中注爲之一云聚僂棺椁也一云聚當作菆才官反僂當作蔞力乆反謂殯於菆塗蔞翣之中桓公田於澤管仲御見焉公撫管仲之手曰仲父何見對曰臣無所見公反誒詒爲病數日不出齊士有皇子告敖者曰公則自傷惡能傷公夫忿滀之氣散而不反則爲不足上而不下則使人善怒下而不上則使人善忘不上不下中身當心則爲病桓公曰然則有乎曰有沈有竈有䯻戶内之煩壤雷霆處之東北方之下者倍阿鮭蠪躍之西北方之下者則泆陽處之水有罔象丘有崒山有䕫野有彷徨澤有委蛇公曰請問委蛇之狀何如皇子曰委蛇其大如轂其長如轅紫衣而朱冠其爲物也惡聞雷車之聲則捧其首而立見之者殆乎霸桓公辴然而曰此寡人之所見者也於是正衣冠與之坐不終日而不知病之去也此章言憂來而累生者不明也患去而性得者逹理也去反一本作公反誒於代反郭音熈說文云可惡之辭也李呼該反一音哀詒吐代反郭音怡李音臺司馬云懈倦貌李云誒詒失魂魄也數日所主反司馬本作數月皇子告敖如字司馬云皇姓告敖字齊之賢士也惡音烏忿拂粉反李房粉反滀敕六反之氣散而不反則爲不足李云忿滿也滀結聚也精神有逆則隂陽結於内魂魄散於外故曰不足上音時掌反下同而不下則使人善怒下而不上則使人善忘忘尚反李云陽散隂凝故怒隂發陽伏故忘也不上不下中丁仲反身當心則爲病李云上下不和則隂陽爭而攻心精神主故病也沈有履司馬本作沈有漏云沈水汙也漏神名竈有髻音結徐胡節反郭音詰李音吉司馬云䯻竈神着赤衣狀如美女霆音庭又音挺又徒復反倍音裴徐扶來反鮭本亦作蛙戸媧反徐胡佳反蠪音聾又音龍躍之司馬云陪阿神名也鮭蠪狀如小兒長一尺四寸黒衣赤幘大冠帶劒持㦸泆音逸司馬云泆陽豹頭馬尾一作狗頭一云神名也㒺象如字司馬本作無傷云狀如小兒赤黒色赤大耳長臂一云水神名崒本又作莘所巾反又音臻司馬云狀如狗有角文身五采䕫求反司馬云狀如鼔而一足方音傍本亦作彷同皇本亦作徨同司馬云彷徨狀如蛇兩頭五采文委於危反又如字朱冠司馬本作俞冠云俞國之冠也其制似螺惡聞烏路反捧芳勇反首司馬本同一本作手辴敕引反徐敕一反又敕私反司馬云貌李云大貌紀渻子爲王養鷄十日而問雞巳乎曰未也方虚憍而恃氣十日又問曰未也猶應嚮景十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者巳無變矣望之似木雞矣其德全矣異雞無敢應者反走矣此章言養之以至於全者猶無敵於外况自全乎紀渻所景反徐所幸反人姓名也一本作消爲于僞反王司馬云齊王也虚憍居喬反又巨消反李云高也司馬云高仰頭也應應對之應下同嚮許丈反本亦作響景於領反又如字李云應響鳴顧景行孔子觀於吕梁縣水三十仞流沬四十里黿鼉魚鼈之所不能游也見一丈夫游之以爲有苦而欲死也使弟子並流而拯之數百歩而出髪行歌而游於塘下孔子從而問焉曰吾以子爲察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齊俱入與汨偕出磨翁而旋入者齊也回伏而湧出者汨也吕梁司馬云河水有石絶處也今西河離石西有此縣絶世謂之黃梁淮南子曰古者龍門未鑿河出孟門之上也縣音玄仞音刄七尺曰仞沫音末黿音元鼉徒多反或音檀鼈字又作鱉必滅反苦如字司馬云病也拯拯救之拯數所主反皮反行歌司馬本作行道云常行之道也長丁丈反下同齊司馬云齊回水如磨齊也汨胡忽反司馬云涌波也從水之道而不爲私焉任水而不任巳此吾所以蹈之也孔子曰何謂始乎故長乎性成乎命曰吾生於陵而安於陵故也長於水而安於水性也不知吾所以然而然命也此章言人有偏能得其所能而任之則天下無難矣用夫無難以渉乎生生之道何徃而不通也梓慶削木爲鐻鐻成見者驚猶神不似人所作也梓音子慶李云魯大匠也梓官名慶其名也鐻音據司馬云樂器也似夾鍾魯侯見而問焉曰子何術以爲焉對曰臣工人何術之有雖然有一焉臣將爲鐻未甞敢以耗氣也必齊以靜心齊三日而不敢懷慶賞爵禄齊五日不敢懷非譽巧拙齊七日輙然忘吾有四枝形體也當是時也無公朝視公朝無則跂慕之心絶矣耗呼報反司馬云損也氣李云氣耗則心動心動則神不專也譽音餘輙丁協反輙然不動貌朝直遥反注同其巧專而外骨消性外之事去也骨消如字本亦作滑消然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然則巳必取材中者也見賢遍反中丁仲反則以天合天不離其自然也器之所以疑神者其是與盡因物之妙故乃疑是神所作耳與音餘東野稷以御見莊公進退中繩左右旋中規莊公以爲文弗過也使之鉤百而反顔闔遇之入見曰稷之馬將敗公密而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗斯明至當之不可過也東野稷李云東野姓稷名也司馬云孫卿作東野畢見賢遍反下同莊公李云魯莊公也或云内篇曰顔闔將轉衛靈公太子問於蘧伯玉則不與魯莊同時當是衛莊公中丁仲反下同文弗過也司馬云謂過織組之文也使之鉤百而反司馬云稷自矜其能圎而驅之如鉤復迹百反而不知止闔戸臘反元嘉本作廅崔同工倕旋而蓋規矩指與物化而不以心稽故其靈臺一而不桎雖工倕之巧猶任規矩此言因物之易也倕音垂又音睡旋而蓋矩指與物化而不以心稽音雞司馬本矩作瞿云工倕尭工巧人也旋圓也瞿句也倕工巧任規以見爲圓覆蓋其句指不以施度也是與物化之不以心稽留也桎之實反司馬云閡也易音以豉反忘足屨之適也忘要帶之適也百體皆適則都忘其身也屨九住反要一遥反知忘是非心之適也是非生於不適耳不内變不外從事㑹之適也所遇而安故無所變從也始乎適而未嘗不適者忘適之適也識適者猶未適也有孫休者踵門而詫子扁慶子曰休居郷不見謂不脩臨難不見謂不勇然而田原不遇歲事君不遇世賔於郷里逐於州部則胡罪乎天哉休惡遇此命也扁子曰子獨不聞夫至人之自行邪忘其肝膽遺其耳目闇付自然也踵章勇反司馬云至也詫敕駕反又呼駕反郭都駕反司馬云告也李本作託云屬也扁慶子音篇又符殄反李云扁姓慶子字也難乃旦反賔必刃反惡音烏下同芒然彷徨乎塵垢之外凡非眞性皆塵垢也芒武剛反彷徨元嘉本作房皇音同逍遥乎無事之業凡自爲者皆無事之業也是謂爲而不恃率性自爲耳非恃而爲之長而不宰任其自長耳非宰而長之長丁丈反註同今汝飾知以驚愚脩身以明汙昭昭乎揭日月而行也汝得全而形軀具而九竅無中道夭於聾盲跛蹇而比於人數亦幸矣又何暇乎天之怨哉子徃矣孫子出扁子入坐有間仰天而歎弟子問曰先生何爲歎乎扁子曰向者休來吾告之以至人之德吾恐其驚而遂至於惑也弟子曰不然孫子之所言是邪先生之所言非邪非固不能惑是孫子所言非邪先生所言是邪彼固惑而來矣又奚罪焉扁子曰不然昔者有鳥止於魯郊魯君說之爲具太牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飮食此之謂以已養養鳥也夫以鳥養養鳥者冝棲之深林浮之江湖食之以委蛇則平陸而巳矣各有所便也知音智汙音烏揭其列反又其謁反竅苦弔反跛彼我反蹇紀輦反又紀偃反徐其偃反比如字又毗志反說音恱爲于僞反奏九韶元嘉本作奏韶武樂音洛下同食之音嗣委於危反蛇如字李云大鳥吞蛇司馬云委蛇泥鰌今休欵啓寡聞之民也吾告以至人之德譬之若載鼷以車馬樂鴳以鍾鼓也彼又惡能無驚乎哉此章言善養生者各任性分之適而至矣欵啓李云欵空也啓開也如空之開所見小也鼷音兮字亦作鴳音晏莊子外篇山木第二十音義曰舉事以名篇莊子行於山中見大木枝葉盛茂伐木者止其旁而不取也問其故曰無所可用莊子曰此木以不材得終其天年夫子出於山舎於故人之家故人喜命豎子殺鴈而烹之豎子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生將何處莊子曰周將處夫材與不材之間似之而非也故未免乎累設將處此耳以此未免於累竟不處山中釋名云山産也産生物也文云山宣也謂能宣散氣生萬物也大木釋名云木冐也冐地而産也字林云木衆之揔名白虎通云木踊也夫如字夫子謂莊子本或卽作夫子豎市主反烹普彭反煑也若夫乗道德而浮遊則不然無譽無訾一龍一蛇與時俱化而無肯專爲一上一下以和爲量浮遊乎萬物之祖物物而不物於物則胡可得而累邪此神農黃帝之法則也故莊子亦處焉譽音干訾音紫毀也徐音疵上如字又時掌反量音亮若夫萬物之情人倫之傳則不然合則離成則毀廉則挫尊則議有爲則虧賢則謀不肖則欺胡可得而必乎哉悲夫弟子志之其唯道德之鄕乎不可必故待之不可以一方也唯與時俱化者爲能渉變而常通耳傳直專反司馬云事願可傳行也坐子卧反本亦作挫同郷如字一音許亮反市南宜僚見魯侯魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先王之道脩先君之業吾敬尊賢親而行之無須離居然不免於患吾是以憂市南子曰君之除患之術淺矣有其身而矜其國故雖憂懷萬端尊賢尚行而患慮愈深矣市南宜僚了蕭反徐力遥反司馬云熊宜僚也居市南因爲號也李云姓熊名宜僚案左傳云市南有熊宜僚楚人也無須離力智反絶句崔本無離字居然崔讀以居字連上句行下孟反夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥䟽於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮爲之灾也令魯國獨非君之皮邪吾願君刳形去皮洒心去欲而遊於無人之野欲令無其身忘其國而任其自化也豐司馬云大也胥䟽如字司馬云胥須也䟽菜也李云胥相也謂相望䟽草也辟婢亦反刳音枯廣雅云暑也去皮起吕反云欲去欲音同洒先典反本亦作洗音同欲如字徐音慾令力呈反章未同南越有邑焉名爲建德之國之南越取其去魯之逺也其民愚而朴少私而寡欲知作而不知藏與而不求其報不知義之所適不知禮之所將猖狂妄行乃蹈乎大方各恣其本歩而人人自蹈其方則萬方得矣不亦大乎其生可樂其死可葬言可終始處之樂音洛吾願君去國俗與道相輔而行所謂去國捐俗謂蕩除其胷中也君曰彼其道遠而險又有江山我無舟車柰何眞謂欲使之南越市南子曰君無形倨形倨躓礙之謂無形倨音據司馬云無倨傲其形躓之質反又知吏反礙五代反無留居留居滯守之謂無留居司馬云無留安其居以爲君車形與物夷心與物化斯物以自載也君曰彼其道幽逺而無人吾誰與爲鄰吾無糧我無食安得而至焉市南子曰少君之費寡君之欲雖無糧而乃足所謂知足則無所不足也我二本作餓君其渉於江而浮於海望之而不見其崖愈徃而不知其所窮絶情欲之逺也送君者皆自崖而反君欲絶則民各反守其分君自此遠矣超然獨立於萬物之上也故有人者累有人者有之以爲巳私也見有於人者憂見有於人者爲人所役用也故堯非有人非見有於人也雖有天下皆之百官委之萬物而不與焉斯非有人也因民任物而不役巳斯非見有於人也與音預吾願去君之累除君之憂而獨與道遊於大莫之國欲令蕩然無有國之懷大莫莫無也方舟而濟於河有虚舩來觸舟雖有惼心之人不怒有一人在其上則呼張歙之一呼而不聞再呼而不聞於是三呼邪則必以惡聲隨之向也不怒而今也怒向也虚而今也實人能虚巳以遊世其孰能害之世雖變其於虚巳以免害一也方舟司馬云方並也惼必善反爾雅云急呼火故反下同張歙許及反徐許輙反郭踈獵反張開也歙歛也北宫奢爲衛靈公賦歛以爲鍾爲壇乎郭門之外三月而成上下之縣王子慶忌見而問焉曰子何術之設奢曰一之間無敢設也泊然抱一耳非敢假設以益事也北宫奢李云衛大夫北宫因以爲號奢其名也爲衛于僞反歛力艶反爲壇但丹反李云祭也禱之故爲壇也上下之縣音玄司馬云八音備爲縣而聲高下王慶忌李云王族也慶忌周大夫也怪其簡故問之泊歩各反奢聞之旣雕旣琢復歸於朴還用其本性也侗乎其無識任其純朴而巳侗吐東勑動二反無知皃字林云大皃一音慟儻乎其怠疑無所趣也儻音敕蕩反萃乎芒乎其送徃而迎來無所欣萃在醉反芒莫郎反音悅來者勿禁徃者勿止任彼也從其彊梁順乎衆也彊梁多力也隨其曲傅無所係也曲傅音附司馬謂曲附巳者隨之也本或作傳張戀反因其自窮用其不得不爾故朝夕賦歛而毫毛不挫當故無損挫音子卧反而况有大塗者乎㤗然無執用天下之自爲斯大通之塗也故曰經之營之不日成之孔子圍於陳蔡之間七日不火食大公任徃弔之曰子幾死乎曰然子惡死乎曰然自同厷好惡耳聖人無好惡也大音㤗任如字李云大公大夫稱任其名幾音祈又音機惡烏路反注及下同好呼報反章内同任曰予嘗言不死之道東海有鳥焉名曰意怠其爲鳥也翂翂翐翐而似無能引援而飛迫脅而棲旣大舒緩又心無常係翂音紛字或作昐翐音秩徐音族字或作昳司馬云翂翂翐翐舒遲皃一云飛不高皃李云羽翼聲迫脅而棲李云不敢獨棲迫脅在衆鳥中足容身而辟害之至也進不敢爲前退不敢爲後常從容處中從七容反食不敢先嘗必取其緒其於隨物而巳緒次緒也是故其行列不斥與羣俱也行戸剛反下亂行同斥音尺而外人卒不得害是以免於患患害生於役知以奔兢卒子恤反終也又七忽反直木先伐甘井先竭才之害也子其意者飾知以驚愚脩身以明汙昭昭乎如揭日月而行故不免也夫察焉小異則與衆爲迕矣混然大同則無獨異於世矣故夫昭昭者乃冥冥之迹也將言以遺迹故因陳蔡以託患知音智汗音烏揭其列其謂二反迕五故反昔吾聞之大成之人曰自伐者無功功成者墮名成者虧恃功名以爲巳成者未之嘗全墮許規反孰能去功與名而還與衆人功自衆成故還之去起吕反道流而不明昧然而自行耳居得行而不名處彼皆居然自得此行耳非由名而後處之行如字又下孟反注同純純常常乃比於狂無心而動故也削迹不爲功名功自彼成故不在我而名迹皆去是故無責於人人亦無責焉恣情任彼故彼各自當其責也至人不聞子何喜哉寂泊無懷乃至人也泊歩各反孔子曰善哉辭其交遊去其弟子逃於大澤衣裘食杼栗取於棄人間之好也衣於旣反戸割反杼食汝反又音序入獸不亂羣入鳥不亂行草木之無心故爲鳥獸所不畏鳥獸不惡而况人乎盖言以極推至誠之信任乎物而無受害之地也孔子問子桑虖曰吾再逐於魯伐樹於宋削迹於衞窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與子桑雽曰子獨不聞假人之亡與林回棄千金之壁負赤子而趨或曰爲其布與赤子之布寡矣布謂匹帛也桑雽音戸本又作音于李云桑姓雽其名隱人也或云姓桑名隱伐樹於衛一本作伐樹於宋削迹於衛數所主反何與音餘下放此假古雅反李云國名林回司馬云殷之逃民之姓名爲如字下同又皆于僞反布謂貨財也爲其累與赤子之累多矣棄千金之璧負赤子而趨何也林回曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦遠矣且君子之交淡水小人之交甘醴君子淡以親去利故淡道合故親也淡如字又徒暫反小人甘以絶飾利故甘利不可常故有時而絶也彼無故以合者則無故以離夫無故而自合者天屬也合不由故則故不足以離之也然則有故而合必有故而離矣孔子曰敬聞命矣徐行翔佯而歸絶學捐書弟子無挹於前其愛益加進去飾任素故也無挹音揖李云無所執持也去起吕反異日桑雽又曰舜之將死眞冷禹曰汝戒之哉形莫縁情莫率因形率情不矯之以利也眞司馬本作直冷音零與司馬云冷曉也謂以真道曉語禹也冷或爲命又作令命尤敎也縁則不離率則不勞刑不假故常全情不矯故常逸不離不勞則不求文以待形任朴而直前也不求文以待形固不待物朴素而足莊子衣大布而之正緳係履而過魏王魏王曰何先生之憊邪莊子曰貧也非憊也士有道德不能行憊也衣弊履穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬蔓其枝而王長其間雖羿蓬不能眄睨也遭時得地則申其長枝故雖古之善射莫之能害衣於旣反大布司馬云麤布也緳賢節反又苦結反司馬云帶也係履李云履穿故係過古禾反魏王司馬云惠王也憊皮拜反又薄計反司馬本作病勝音騰本亦作騰柟音南木名舊歷敢反蔓音萬郭武半反王徃况反司馬本作徃長丁亮反本又作張音同司馬直良反云兩枝相去長遠也羿音詣或戸係反蓬符恭反徐扶公反司馬云羿古之善射者蓬羿之弟子眄莫練反舊莫顯反本或作睥普計反睨音詣郭五岑反李云邪視也枝其綺反及其得柘枳枸之間也危行側視振動悼慓此筋骨非有加急而不柔也處不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得邪此比干之見剖心徴也夫勢不便而強爲之則受戮矣柘章夜反析吉氏反又音枸音矩悼如字又直弔反便婢面反注同相息亮反見賢遍反強上聲下同孔子窮於陳蔡之間七日不火食左據槁木右擊槁枝而歌焱氏之風有其具而無其數有其聲而無宫角木聲與人聲犂然有當於人之心顔回端拱還目而窺之仲尼恐其廣已而造大也愛巳而造哀也曰回無受天損易唯安之故易槁苦老反下同焱氏必遥反古之無爲帝王也犂然力兮反又力之反司馬云犂然猶栗然當丁浪反還音旋窺徐起規反造司馬云造適也易以豉反註下同無受人益難物之倘來不可禁禦無始而非卒也於今爲始者於昨爲卒則所謂始者即是卒矣言變化之無窮人與天一也皆自然夫今之歌者其誰乎任其自爾則歌者非我也回曰敢問無受天損易仲尼曰飢渴寒暑窮桎不行天地之行也運物之泄也不可逃也桎之實反運司馬云動也泄息列反司馬云發也徐以世反言與偕之偕之謂也所謂不識不知而順帝之則也言我也爲人臣者不敢去之執臣之道猶是而况乎所以待天乎所在皆安不以損爲損斯待天而不受其損也何謂無受人益難仲尼曰始用四逹感應旁通爲四逹爵禄並至而不窮旁通故可以御高大也物之所利乃非巳也非已求而取之吾命有在外者也人之生必外有接物之命非如瓦石止於形質而巳君子不爲盗賢人不爲竊吾取之何哉盗竊者私取之謂也今賢人君子之致爵禄非私取也受之而巳故曰鳥莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走避禍之速知音智鷾音意鴯音而或云鷾鴯燕也目之所不冝處昌吕反言不可止處目巳羅絡知之故弃之也其畏人也而襲諸人間未有自䟽外於人而人存之者也畏人而入於人間此鳥之所以稱知也社稷存焉爾况之至人則玄同天下故天下樂推而不厭相與社而稷之斯無受人益之所以爲難也何謂無始而非卒仲尼曰化其萬物而不知其禪之者莫覺其變禪市戰反司馬云授予也焉知其所終焉知其所始正而待之而巳耳日夜相代未始有極故正而待之無所爲懷也焉於䖍反下同何謂人與天一邪仲尼曰有人天也有天亦也凡所謂天皆明不爲而自然人之不能有天性也言自然則自然矣人安能故有此自然哉自然耳故曰性聖人晏然體逝而終矣晏然無矜而體與變俱也莊周遊乎雕陵之樊覩一異鵲自南方來者翼廣七尺目大運寸感周之顙而集於栗林莊周曰此何鳥哉翼殷不逝目大不覩蹇裳躩歩執彈而留之覩一蟬方得美䕃而忘其身螳蜋執翳而搏之見得而忘其形執木葉以自翳於蟬而忘其形之見乎異鵲也雕徐音彫本亦作彫陵之彫樊音煩司馬云雕陵陵名樊藩也謂遊栗園藩籬之內也樊或作埜埜古野字廣光浪反運寸司馬云可回一寸也感周之顙息蕩反李云感觸也翼殷不逝目大不覩司馬云殷大也曲折曰逝李云翼大逝難目大視希故不見人蹇起䖍反躩李驅碧反徐九縳反司馬云疾行也案即論語云足躩如也彈徒旦反留力救反司馬云留伺其便也螳音堂蜋音郎執翳於計反司馬云執草以自翳也搏郭音博徐音付見乎賢遍反異鵲從而利之見利而忘其眞目能覩翼能逝此鳥之真性也今見利故忘之真司馬云真身也莊周然曰噫物固相累相爲利者恒相爲累敕律反二相召也夫有欲於物者物亦有欲之捐彈而反走虞人逐而誶之誶問之也誶本又作訊音信問也司馬云以周爲盜栗也莊周反入三月不庭藺且從而問之夫子何爲頃間甚不庭乎莊周曰吾守形而忘身夫身在人間世有夷險推夷易之形於此世而不度此世之所宜斯守形而忘身者也三月不庭一本作三日司馬云不出坐庭中三月藺力信反一本作簡且子餘反司馬云藺且莊子弟子易以豉反度直洛反觀於濁水而迷於清淵見彼而不明即因彼以自見幾忘反鑒之道也見賢遍反且吾聞諸夫子曰入其俗從其俗不違其禁令也今吾遊於雕陵而忘吾身異鵲感吾顙遊於栗林而忘真栗林虞人以吾爲戮吾所以不庭也以見問爲戮夫莊子推平於天下故每言以出意乃毀仲尼賤老聃上掊擊乎三皇下痛病其一身也掊普口反陽子之宋於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也陽子曰弟子記之行賢而去自賢之行安徃而不愛哉言自賢之道無時而可陽子司馬云陽朱也去起吕反行下孟反莊子外篇田子方第二十一音義曰以人名篇田子方侍坐於魏文侯數稱谿工文侯曰谿工子之師邪子方曰非也無擇之里人也稱道數當故無擇稱之文侯曰然則子無師邪子方曰有曰子之師誰邪子方曰東郭順子文侯曰然則夫子何故未嘗稱之子方曰其爲人也眞無假也田子方李云魏文侯師也名無擇數稱角反又所主反下同谿音溪又音司馬本作雞工李云谿工賢人也人貌而天雖貌與人同而獨任自然虚縁而葆真虚而順物故真不失葆音保本亦作保清而容物夫清者患於大潔今清而容物與天同也大音泰物無道正容以悟之使人之意也消曠然清虚正巳而巳而物邪自消邪似嗟反無擇何足以稱之子方出文侯儻然終日不言召前立臣而語之曰遠矣全德之君子始吾以聖知之言仁義之行爲至矣吾聞子方之師吾形解而不欲動口鉗而不欲言自覺其近儻然敕蕩反司馬云失志貌語魚據反知音智行下孟反解戸買反鉗其炎反徐其嚴反吾所學者真土梗耳非眞物也直如字本亦作真下句同元嘉本此作眞下句作直土梗更猛反司馬云土梗土人也遭雨則壞夫魏眞爲我累耳知至貴者以人爵爲累也温伯雪子適齊舎於魯魯人有請見之者温伯雪子曰不可吾聞中國之君子明乎禮義而陋於知人心吾不欲見也至於齊反舎於魯是人也又請見温伯雪子曰徃也蘄見我今也又蘄見我是必有以振我也出而見客入而歎明曰見客又入而歎其僕曰毎見之客也必入而歎何邪曰吾固告子矣中國之民明乎禮義而陋乎知人心昔之見我者進退一成規一成矩從容一若龍一若虎槃辟其歩逶蛇其迹温伯雪子李云南國賢人也蘄音祈從七容反辟婢亦反遺如字本又作逶於危反蛇以支反其諫我也似子其道我也似父禮義之弊有斯飾也道音導是以歎也仲尼見之而不言巳知其心矣子路曰吾子欲見温伯雪子乆矣見之而不言何邪仲尼曰若夫人者目擊而道存矣亦不可以容聲矣目裁徃意巳逹無所容其德音也夫音符目擊而道存矣司馬云見其目動而神實巳著也擊動也顔淵問於仲尼曰夫子歩亦歩夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而回瞠若乎後矣夫子曰回何謂邪曰夫子歩亦歩也夫子言亦言也夫子趨亦趨也夫子辯亦辯也夫子馳亦馳也夫子言道回亦言道也及奔逸絶塵而回瞠乎後者夫子不言而信不比而周無器而民滔乎前而不知所以然而巳矣仲尼曰惡可不察與夫哀莫大於心死而人死亦次之夫心以死爲死乃更速其死其死之速由哀以自䘮也無哀則巳有哀則心死者乃哀之大也奔逸司馬本逸作敵瞠敕庚反又丑郎反字林云直視貌一音斜視又行下孟反器剛志反滔乎前吐刀反謂無人君之器滔聚其前也馳直而反惡音烏與音餘下哀與同䘮息浪反下章同日出東方而入於西極萬物莫不比方皆可見也有目有趾者待是而後成功目成見功足成行功也是出則存是入則亡直以不見爲亡耳竟不亡萬物亦然有待也而死有待也而生待隱謂之死待顯謂之生竟無死生也吾一受其成形而不化以待盡夫有不得變而爲無故一受成形則化盡無期也效物而動自無心也日夜無恒化新也而不知其所終不以死爲死也薫然其成形薫然自成又奚爲哉薰許云反知命不能規乎其前丘以是日徂不係於前與變俱徃故曰徂徂如字司馬本作疽云病也吾終身與女交一臂而失之可不哀與夫變化不可執而留也故雖執臂相守而不能令停若哀死者則此亦可哀也今人未甞以此爲哀奚獨哀死邪令力呈反下章注同女音汝女殆著乎吾所以著也彼巳盡矣而女求之以爲有是求馬於唐肆也唐肆非停馬處也言求向者之有不可復得也人之生馬之過肆耳恒無駐湏新故之相續不舎晝夜也著見也言女殆見吾所以見者耳吾所以見者日新也故巳盡矣女安得有之殆著乎吾所以著也郭著音張慮反注同又一音張略反司馬云吾所以著者外化也女殆庻於此耳吾一不化者則非女所及也是求馬於唐肆也郭云唐肆非停馬處也李同又云唐亭也司馬本作廣肆云廣庭也求馬於市肆廣庭非其所也處昌慮反復扶又反舎音捨吾服女也甚忘服者思存之謂也甚忘謂過去之速也言女去忽然思之恒欲不及女服吾也亦甚忘俱爾耳不問賢之與聖未有得停者雖然女奚患焉雖忘乎故吾吾有不忘者存不忘者存謂繼之以日新也雖忘故吾而新吾巳至未始非吾吾何患焉故能離俗絶塵而與物無不㝠也離力智反下章又同孔子見老聃老聃新沐方將髪而乾慹然似非人寂泊之至皮反乾本或作干慹乃牒反又丁立反司馬云不動貌說文云怖也泊歩各反孔子便而待之少焉見曰丘也眩與其信然與向者先生形體掘槁木似遺物離人而立於獨也無其心身而後外物去也待或作侍見賢遍反眩玄遍反與音餘下同掘徐音屈槁苦老反老聃曰吾遊於物之初初未有而歘有故遊於物初然後明有物之不爲而自有也欵訓弗反孔子曰何謂邪曰心困焉而不能知口辟焉而不能言欲令仲尼必求之於言意之表也辟必亦反司馬云辟卷不開也又婢亦反徐敷赤反嘗爲女議乎其將試議隂陽以擬向之無形耳未之敢必爲于僞反至隂肅肅至陽赫赫肅肅出乎天赫赫發乎地言其交也兩者交通成和而物生焉或爲之紀而莫見其形莫見爲紀之形明其自爾消息滿虚一晦一明日改月化日有所爲未甞守故而莫見其功自爾故無功生有所乎萌萌於未聚也死有所乎歸歸於散也始終相反乎無端而莫知乎其所窮所謂迎之不見其首隨之不見其後非是也且孰爲之宗孔子曰請問遊是老聃曰夫得是至美至樂也得至美而遊乎至樂謂之至人至美無美至樂無樂故也且如字舊子餘反樂音洛下及注同孔子曰願聞其方曰草食之獸不疾易藪水生之蟲不疾易水行小變而不失其大常也死生亦小變也行下孟反又如字喜怒哀樂不入於胷次知其小變而不失大常故次李中也夫天下也者萬物之所一也得其所一而同焉則四支百體將爲塵垢而死生終始將爲晝夜而莫之能滑而况得䘮禍福之所介乎愈不足患滑古没反介音界棄隷者棄泥塗知身貴於也知身之貴於故弃之遺土耳茍知死生之變所在皆我則貴者常在也貴在於我而不失於變所貴者我也而我與變俱故無失也且萬化而未始有極也夫孰足以患心巳爲道者解乎此所謂縣解解戸買反注同孔子曰夫子德配天地而猶偃至言以脩心古之君子孰能脫焉老聃曰不然夫水之於汋也無爲而才自然矣至人之於德也不脩而物不能離焉若天之自高地之自厚日月之自明夫何脩焉不脩不爲而自得也汋音灼又上反李以略反李云取也孔子出以告顔回曰丘之於道也其猶醯雞與醯雞者甕中之蠛蠓醯雞許西反司馬云酒上蠛蠓也甕烏弄反蠛亡結反蠓元孔反微夫子之發吾覆也吾不知天地之大全也比吾全於老聃猶甕中之與天地矣莊子見魯哀公哀公曰魯多儒士少爲先生方者莊子曰魯少儒哀公曰舉魯國而儒服何謂少乎莊子曰周聞之儒者冠圜冠者知天時履句屨者知地形緩佩玦者事至而斷君子有其道者未必爲其服也爲其服者未必知其道也公固以爲不然何不號於國中曰無此道而爲此服者其罪死於是哀公號之五日而魯國無敢儒服者獨有一丈夫儒服而立乎公門公即召而問以國事千轉萬變而不窮莊子曰以魯國而儒者一人耳可謂多乎德充於内者不脩飾於外見賢遍反亦如字魯哀公司馬云莊子與魏惠王齊威王同時在哀公後百二十年冠古亂反圜音圓句音矩徐其俱反李云方也屨徐居具反緩戸管反司馬本作綬玦古穴反斷丁亂反號號令也百里奚爵禄不入於心故飯牛而牛肥使秦穆公忘其賤與之政也有虞氏死生不入於心故足以動人内自得者外事全也飯煩晚反忘其賤謂忘其飯牛之賤也宋元君將畫圖衆史皆至受揖而立䑛筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舎公使人視之則解衣般礴臝君曰可矣是眞畫者也内足者神間而意定受揖而立司馬云受命揖而立也䑛本或作䑛食反儃儃吐但反徐音但李云舒閒之貌般字又作褩礴傍各反徐敷各反司馬云般礴謂箕坐也臝本又作羸同力果反司馬云將畫故解衣見形間音閑文王觀於臧見一丈夫釣而其釣莫釣聊以卒歲文王觀於臧李云臧地名也司馬本作文王微服而觀於臧夫本或作人非持其釣有釣者也竟無所求常釣也不以得失經意其於假釣而巳文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之無天也於是旦而屬之夫夫曰昔者寡人夢見良人黒色而乗駁馬而偏朱蹄號曰寓而政於臧丈人庻幾乎民有瘳乎諸大夫蹵然曰先君王也文王曰然則之諸大夫曰先君之命王其無它又何焉遂迎臧丈人而授之政典法無更偏令無出三年文王觀於國則列士壞植散羣長官者不成德螤斛不敢入於四竟列士壞植散羣則尚同也所謂和其光同其塵屬音燭夫夫皆方于反司馬云夫夫大夫也一云夫夫古讀爲大夫而占反郭李而兼反又而衘反駁角反偏朱蹄李云一蹄偏赤也瘳赦留反鷲子六反本或作耿在乆七小二反先君王司馬云言先君王靈神之所致令本或作命王其無它司馬云無違命壞音怪下同植音值散羣司馬云植行列也散羣言不養徒衆也一云植者疆界頭造屋以待諫者也長丁丈反下同官者不成德司馬云不利功名也斔斛音李云六斛四斗曰螤司馬本作螤斞云螤讀曰終斞讀曰竟音境下同長官者不成德則同務也潔然自成則與衆務異也螤斛不敢入於四竟則諸侯無二心也天下相信故能同律度量衡也文王於是焉以爲大師北面而問曰政可以及天下乎臧丈人昧然而不應泛然而辭朝令而夜遁終身無聞爲功者非巳故功成而身不得不退事遂而名不得不去名去身退乃可以及天下也太音泰昧音妹泛徐敷甸反遁徐困反顔淵問於仲尼曰文王其猶未邪又何以夢爲乎仲尼曰黙女無言夫文王盡之也任諸大夫而不自任斯盡之也而又何論刺焉彼直以循斯須也斯須者百姓之情當悟未悟之頃故文王循而發之以合其大情也刺七賜反列御冦爲伯昬無人射引之盈貫盈貫謂溢鏑也爲于僞反盈貫古亂反司馬云鏑也鏑丁歷反措杯水其肘上左手如拒右手如附技右手放發而左手不知故可措之杯水也措七故反肘竹九反柜音矩本亦作矩同發之適矢復沓矢去也箭適去復歃沓也適丁歷反復扶又反下及注同歃色洽反方矢復寓箭方去未至的巳復杯於肘上言其敏捷之妙也當是時猶象人也不動之至伯昏無人曰是射之射非不射之射也嘗與汝登高山履危石臨百仞之淵若能射乎於是無人遂登高山履危石臨百仞之淵背逡巡足二分垂在外揖御冦而進之御寇伏地汗流至踵伯昬無人曰夫至人者上闚靑天下潜黃泉揮斥八極神氣不變揮斥猶縱放也夫德充於内則神滿於外無遠近幽深所在皆明故審安危之機而泊然自得也逡七旬反汗戸旦反揮音揮斥音尺李音託郭云揮斥猶放縱今女然有恂目之志爾於中也殆矣夫不能明至分故有惧有惧而所䘮多矣豈唯射乎敕律反恂李又作眴音荀爾雅云恂慄也目之志恂謂眩也欲以眩恱人之目故也中丁仲反又如字中精神也䘮息浪反後章同肩吾問於孫叔敖曰子三爲令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨奈何孫叔敖曰吾何以過人哉吾以其來不可却也其去不可止也吾以爲得失之非我也而無憂色而巳矣我何以過人哉且不知其在彼乎其在我乎其在彼邪亡乎我在我邪亡乎彼矌然無係玄同彼我則在彼非獨亡在我非獨存也栩况甫反方將躊躇方將四顧何暇至乎人貴人賤哉躊躇四顧謂無可無不可躊直留反躇直於反仲尼聞之曰古之眞人知者不得美人不得濫盗人不得刦伏戲黃帝不得友伏戲黃帝者功號耳非所以功者也故况功號於所以功相去遠矣故其名不足以友於人也刦居業反元嘉本作却戲音羲死生亦大矣而無變乎巳況爵禄乎然者其神經乎大山而無介入乎淵泉而不濡處卑細而不憊充滿天地旣以與人巳愈有割肌膚以爲天下者彼我俱失也使人人自得而巳者與人而不損於巳也其神明充滿天地故所在皆可所在皆可故不損巳爲物而放於自得之地也大山音泰介音界憊皮拜反以爲于僞反下同楚王與凡君坐少焉楚王左右曰凡亡者三言有三亡徴也凡君如字司馬云凡國名在汲郡共縣按左傳凡周公之後也隱七年天王使凡伯來聘俗本此後有孔子窮於陳蔡及孔子謂顔回二章與讓王篇同衆家並於讓王篇音之檢此二章無郭註似如重出古本皆無謂無者是也凡君曰凡之亡也不足以䘮吾存遺凡故也夫凡之亡不足以䘮吾存則楚之存不足以存存夫遺之者不以亡爲亡則存亦不足以爲存矣曠然無矜乃常存也由是觀之則凡未始亡而楚未始存也存亡更在於心之所措耳天下竟無存亡莊子外篇知北遊第二十二音義曰以義名篇知北遊於玄水之上登隱弅之丘而適遭無爲謂焉知謂無爲謂曰予欲有問乎何思何慮則知道何處何服則安道何從何道則得道三問而無爲謂不荅也非不荅不知荅也知不得問反於白水之南登狐闋之上而睹狂屈焉知以之言也問乎狂屈狂屈曰唉予知之將語中欲言而忘其所欲言知不得問反於帝宮見黃帝而問焉黃帝曰無思無慮始知道無處無服始安道無從無道始得道知問黃帝曰我與知之彼與彼不知也其孰是耶黃帝曰彼無爲謂眞是也狂屈似之我與汝終不近也夫知者不言言者不知故聖人行不言之教任其自行期不言之教也知北遊音智又如字於玄水之上李云玄水水名司馬崔本上作北隱弅符文反又音紛又符紛反李云隱出弅起丘貌白水水名狐闋苦穴反司馬李云狐闋丘名睹丁古反狂屈求勿反徐又其述反司馬向崔本作詘李云狂屈侜張似人而非也以之言司馬云之是也唉哀在反徐烏來反李音熈云應聲語魚據反不近附近之近下同道不可致道在自然非可言致者也德不可至不失德故稱德稱德而不至也仁可爲也義可虧也禮相僞也故曰失道而後德失德而後仁失仁而後義失義而後禮禮者道之華而亂之首也禮有常則故矯效之所由生也故曰爲道者日損損華僞也損之又損之以至於無爲無爲而無不爲也華去而朴全則雖爲而非爲也今巳爲物也物失其所故有爲物欲復歸根不亦難乎其易也其唯大人乎其歸根之易者唯大人耳大人體合變化故化物不難易以豉反注同生也死之徒知變化之道者不以爲易死也生之始孰知其紀更相爲始則未知孰死孰生也更音庚人之生氣之聚也聚則爲生散則爲死俱是聚也俱是散也若死生爲徒吾又何患患生於異故萬物一也是其所美者爲神竒其所惡者爲臭腐臭腐復化爲神竒神竒復化爲臭腐故曰通天下一氣耳各以所美爲神竒所惡爲臭腐耳然彼之所美我之所惡也我之所美彼或惡之故通共神竒通共臭腐耳死生彼我豈殊哉惡烏路反註同復扶又反下同聖人故貴一知謂黃帝曰吾問無爲謂無爲謂不應我非不我應不知應我也吾問狂屈狂屈中欲告我而不我告非不我告中欲告而忘之也今予問乎知之奚故不近黃帝曰彼其眞是也以其不知也此其似之也以其忘之也予與終不近也以其知之也狂屈聞之以黃帝爲知言明夫自然者非言知之所得故當昧乎無言之地是以先舉不言之標而後明於黃帝則夫自然之物槩乎可得而見也標必遥反天地有大美而不言四時有明法而不議萬物有成理而不說此孔子之所以云予欲無言大美謂覆載之美也聖人者原天地之美而逹萬物之理是故至人無爲任其自爲而巳大聖不作唯因任也觀於天地之謂也觀其形容象其物冝與天地不異今彼神明至精與彼百化百化自化而神明不奪物巳死生方圓莫知其根也夫死者已自死生者巳自生圓者巳自圓方者巳自方未有爲其根者故莫知扁然而萬物自古以固存豈待爲之而後存焉扁音篇又音幡六合爲巨未離其内計六合在無極之中則陋矣離力智反其内謂不能出自化也秋豪爲小待之成體秋毫雖小非無亦無以容其質天下莫不沈浮終身不故日新也隂陽四時運行各得其序不待爲之惛然亡而存昭然存則亡矣惛音昏又音泯油然不形而神挈然有形則不神油音由謂無所給惜也萬物畜而不知此之謂本根畜之而不得其本性之根故不知其所以畜也畜本亦作滀同勑六反注同可以觀於天矣與天同觀齧缺問道乎衣衣曰正汝形一汝視天和將至攝汝知一汝度神將來舎德將爲汝美道將爲汝居汝朣焉如新生之犢而無求其故言未卒齧缺睡寐衣大行歌而去之曰形槁骸心死眞其實知不以故自持與變俱也衣音披本亦作披瞳救紅反郭絳反李云未有知貌齧缺睡寐體向所畏其視聽以寐耳受道速故衣喜也音恱槁苦老反媒媒晦晦無心而不可與謀彼何人哉獨化者也媒音妹又武朋反晦音誨李云媒媒晦貌舜問乎丞曰道可得而有乎曰汝身非汝有也汝何得有夫道夫身者非汝所能有也塊然而自有耳身非汝所有而况無哉丞如字李云舜師也一云古有四輔前疑後丞盖官名夫音符塊苦對反舜曰吾身非吾有也孰有之哉曰是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也身是汝有者則美惡死生當制之由汝今氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成耳非汝有也委司馬云委積也孫子非汝有是天地之委蛻也氣自委結而蟬蛻也蛻吐卧反又音恱又敕外反又始銳反又始劣反故行不知所徃處不知所持食不知所味皆在自爾中來故不知也天地之彊陽氣也又胡可得而有邪彊陽猶運動耳明斯道也庻可以遺身而忘生也天地之強陽氣也郭云強陽猶運動耳案言天地尚運動况氣聚之生何可得執而留也孔子問於老聃曰今日晏間敢問至道老聃曰汝齊戒䟽而心澡雪而精神掊擊而知夫道窅然難言哉將爲汝言其崖略夫昭昭生於冥冥有倫生於無形精神生於道皆所以明其獨生而無所資借晏於諌反徐於顯反又於見反間音閑齊側皆反音藥或云漬也掊普口反徐方垢反知音智窅烏丁反爲于僞反無形謂太初也形本生於精皆由精以至粗形本生於精謂常道也而萬物以形相生故九竅者胎生八竅者卵生言萬物雖以形相生亦皆自然耳故胎卵不能易種而生明神氣之不可爲也竅苦弔反卵力管反種章勇反其來無迹其徃無崖無門無房四逹之皇皇也夫率自然之性遊無迹之塗者放形骸於天地之間精神於八方之表是以無門無房四逹皇皇逍遥六合與化偕行也邀於此者四枝彊思慮恂逹耳目聦明其用心不勞其應物無方人生而遇此道則天性全而精神定邀古堯反思息嗣反恂音荀天不得不高地不得不廣日月不得不行萬物不得不昌此其道與言此皆不得不然而自然耳非道能使然也天不得不高謂不得一道不能爲高也與音餘下皆同且夫博之不必知辯之不必慧聖人以斷之矣斷棄知慧而付之自然也博之不必知博觀異書爲博斷端管反註同若夫益之而不加益損之而不加損者聖人之所保也使各保其正分而巳故無用知慧爲也淵淵乎其海容恣無量魏魏乎其終則復始也與化俱者乃積無窮之紀可謂魏魏魏魏魚威反復扶又反運量萬物而不匱用物而不役巳故不匱也運量音亮萬物而不匱求位反謂使物自動物物各足量也則君子之道彼其外與各取於身而足萬物皆徃資焉而不匱此其道與還用物故我不匱此明道之贍物在於不贍不贍而物自得故曰此其道與言至道之無功無功乃足稱道也贍渉艶反下同中國有人焉非隂非陽無所偏名處於天地之間直且爲人敖然自放所遇而安了無功名且如字舊子餘反將反於宗不逐末也自本觀之生者喑醷物也直聚氣也喑音䕃郭音闇李音飮一音於感反醷於界反郭於感反李音意一音他感反李郭皆云喑醷聚氣貌雖有壽夭相去幾何須之也奚足以爲堯桀之是非死生猶未足殊况壽夭之間哉幾居豈反果蓏有理物無不理但當順之蓏徐力果反人倫雖難所以相齒人倫有知慧之變故難也然其知慧自相齒耳但當從而任之聖人遭之而不違順所遇也過之而不守宜過而過調而應之德也偶而應之道也調偶和合之謂也帝之所興王之所起也如斯而巳人生天地之間白駒之過郤忽然而巳乃不足惜白駒或云日也卻去逆反本亦作孔也注然勃然莫不出焉油然漻然莫不入焉出入者變化之謂耳言天下未有不變也勃歩忽反油音由漻音流李音礫巳化而生又化而死俱是化也生物哀之死物不哀人悲之死不悲解其天弢墮其天獨脫也天弢敕刀反字林云弓衣也墮許規反陳筆反紛乎宛乎變化煙煴宛於阮反絪音因本亦作烟音因緼於云反本亦作煴音同魂魄將徃乃身從之乃大歸乎無爲用心於其間也不形之形形之不形不形形乃成若形之則敗其形矣敗邁反是人之所同曰何其愈下邪曰在瓦甓曰何其愈甚邪曰在屎溺東郭子不應莊子曰夫子之問也固不及質舉其標質言無所不在而方復怪此斯不及質也螻力侯反蟻魚綺反稊大西反本又作稊稗歩計反本又作稗蒲賣反李云稊稗二草名甓本又作礕歩歷反屎尸旨反舊詩百反本或作矢溺乃弔反正獲之問於監市履狶也毎下愈況狶大豕也夫監市之履豕以知其肥瘦者愈履其難肥之處愈知豕肥之要今問道之所在而每况之於下賤則明道之不逃於物也必矣正獲之問於監古衘反市履狶虚豈反毎下愈况李云正亭卒也其名也監市又魁也狶大豕也履踐也夫市魁履豕履其股脚狶難肥處故知豕肥耳問道亦况下賤則知道也痩色救反處音遽汝唯莫必無乎逃物必謂無之逃物則道不周矣道而不周則未足以爲道至道是大言亦然明道不逃物周徧咸三者異名同實其指一也甞相與遊乎無何有之官同合而論無所終窮乎遊有則不能周徧咸也故同合而論之然後知道之無不在知道之無不在然後能曠然無懷而遊彼無窮也徧音遍甞相與無爲乎澹而靜乎漠而清乎調而間乎此皆無爲故也澹徒暫反間音閑寥巳吾志寥然空虚謂物際者也物有際故毎相與不能㝠然眞所謂際者也不際之際際之不際者也不際者雖有物物之名直明物之自物耳物物者竟無物也際其安在乎謂盈虚衰殺彼爲盈虚非盈虚彼爲衰殺非衰殺彼爲本末非本末彼爲積散非積散也旣明物物者無物又明物之不能自物則爲之者誰乎哉皆忽然而自爾也殺色界反徐所例反下同妸荷甘與神農同學於老龍吉神農隱几闔戸晝瞑妸荷甘日中奓戸而入曰老龍死矣神農隱几擁杖而起嚗然放杖而起而悟夫死之不足驚故還放杖而也妸於河反荷音河本或作苛老龍吉李云懷道人也隱於靳反下同闔戸臘反瞑音眠奓郭處野反又音奢徐都嫁反又處夜反司馬云開也嚗音剶又孚邈反又孚貌反李云放杖聲也投杖本亦作放杖曰天知予僻陋慢訑故棄予而死巳矣夫子無所發予之狂言而死矣夫自肩吾巳下皆以至言爲狂而不信也故非老龍連叔之徒莫足與言也僻匹亦反慢武半反徐無見反郭如字訑徒旦反徐徒見反郭音但夫音符弇堈弔聞之曰夫體道者天下之君子所繫焉言體道者人之宗主弇音奄堈音剛弔李云弇堈體道人弔其名繫焉謂爲物所歸投也今於道秋豪之端萬分未得處一焉秋豪之端細矣又未得其萬分之一而猶知藏其狂言而死又况夫體道者乎明夫至道非言之所得也唯在乎自得耳視之無形聽之無聲於人之論者謂之冥冥所以論道而非道也冥冥而猶復非道明道之無名也復扶又反於是泰清問乎無窮曰子知道乎無窮曰吾不知又問乎無爲無爲曰吾知道曰子之知道亦有數乎曰有曰其數何無爲曰吾知道之可以貴可以賤可以約可以散此吾所以知道之數也泰淸以之言也問乎無始曰是則無窮之弗知與無爲之知孰是而孰非乎無始曰不知深矣知之淺矣弗知內矣知之外矣於是泰淸中而歎曰弗知乃知乎知乃不知乎孰知不知之知凡得之不由於知乃㝠也與無爲之知並如字中崔本作卬無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也故黙成乎不聞不見之域而後至焉知形形之不形乎形自形耳形形者竟無物也道不當名有道名而竟無物故名之不能當也無始曰有問道而應之者不知道也雖問道者亦未聞道不知故問問之而應則非道也不應則非問者所得故雖問之亦終不聞也道無問問無應絶學去教而歸於自然之意也去起吕反無問問之是問窮也所謂責空無應應之是無内也實無而假有以應者外矣以無内待問窮是者外不觀乎宇宙内不知乎大初是以不過乎崐崘不遊乎大虚夫婪落天地遊虚渉逺以入乎㝠㝠者不應而巳矣大初音泰婪力男反光曜問乎無有曰夫子有乎其無有乎光曜不得問而孰視其狀貌窅然空然終日視之而不見聽之而不聞摶之而不得也光曜曰至矣其孰能至此乎予能有無矣而未能無無也及爲無有矣何從至此哉此皆絶學之意也於道絶之則夫學者乃在根本中來矣故學之善者其唯不學乎窅烏了反摶音博大馬之捶鉤者年八十矣而不失豪芒玷捶鉤之輕重而無豪芒之差也捶郭音丁果反徐之累反李之睡反大馬司馬也司馬郭云捶者玷捶鉤之輕重而不失之豪芒也或云江東三魏之間人皆謂鍜爲捶音字亦同郭失之今不從此也玷丁恬反大馬曰子巧與有道與曰臣有守也臣之年二十而好捶鉤於物無視也非鉤無察也是用之者假不用者也以長得其用而况乎無不用者乎物孰不資焉都無懷則物來皆應與音餘下同好呼報反長丁丈反冉求問於仲尼曰未有天地可知邪仲尼曰可古猶今也言天地常存乃無未有之時冉求失問而退明日復見曰昔者吾問未有天地可知乎夫子曰可古猶今也昔日吾昭然今日吾昧然敢問何謂也仲尼曰昔之昭然也神者先受之虚心以待命斯神受也復扶又反見賢遍反今之昧然也且又爲不神者求邪思求更致不了爲于僞反無古無今無始無終非唯無不得化而爲有也有亦不得化而爲無矣是以夫有之爲物雖千變萬化而不得一爲無也不得一爲無故自古無未有之時而常存也未有子孫而有子孫可乎言世世無極言其要有由不得無故而有傳世故有子孫不得無子而有孫也如是天地不得先無而今有也冉求未對仲尼曰已矣未應矣不以生生死夫死者獨化而死耳非夫生者生此死也不以死死生死者亦獨化而生耳死生有待邪獨化而足皆有所一體死與生各自成體有先天地生者物邪物物者非物物出不得先物也猶其有物也猶其有物也無巳誰得先物者乎哉吾以隂陽爲先物而隂陽者即所謂物耳誰又先隂陽者乎吾以自然爲先之而自然即物之自爾耳吾以至道爲先之矣而至道者乃至無也旣以無矣又奚爲先然則先物者誰乎哉而猶有物無已明物之自然非有使然也有先悉薦反下及注同聖人之愛人也終無巳者亦乃取於是者也取於自爾故恩流百代而不廢也顔淵問乎仲尼曰回嘗聞諸夫子曰無有所將無有所迎回敢問其遊仲尼曰古之人外化而内不化以心順形而形自化今之人内化而外不化以心使形與物化者一不化者也常無心故一不化一不化乃能與物化耳安化安不化化與不化皆任彼耳斯無心也安與之相靡直無心而恣其自化耳非將迎夫務免乎人之所不免者豈不亦悲哉至言去言至爲去爲皆自得也齊知之所知則淺矣夫由知而後得者假學者耳故淺也齊才細反又如字南華眞經卷第七
