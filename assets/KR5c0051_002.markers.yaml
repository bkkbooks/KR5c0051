  - {type: variant, offset: 13456, length: 0, content: '', ZTDZ: 是猶師天而無地師陰而無陽其不可行明矣然且語而不舍非愚則誣也帝王殊禪三代殊繼差其時逆其俗者謂之篡}
  - {type: variant, offset: 13457, length: 0, content: '', ZTDZ: 當其時順其俗者謂之義之徒默默乎河伯汝惡知貴賤之門小大之家河伯曰然則}
  - {type: variant, offset: 13458, length: 0, content: '', ZTDZ: 何爲乎何不爲乎吾辭受趣舍吾終奈何北海若曰以道觀之何貴何賤是謂反衍無拘而志與道大蹇何少何多是謂謝施無一而行與道參差嚴乎若國之有君其無私德繇繇乎若祭之有社其無私福汎汎乎其若四方之無窮其無所畛域兼懷萬物其孰承翼是謂無方萬物一齊孰短孰長道無終始物有死生不恃其成一虚一滿不位乎其形年不可舉時不可止消息盈虚終則有始是所以語大義之方論萬物之理也物}
  - {type: punctuation, offset: 13459, content: /, id: KR5c0051_krp_002-bkkpn1586}
  - {type: variant, offset: 13461, length: 0, content: '', ZTDZ: 若驟若馳無動而不變無時而不移何爲乎何不爲平夫固將自化河伯曰然則何貴於道邪北海若曰知道者必達於理達於埋者必明於權明於權者不以物害己至德者火弗能熱水弗能溺寒暑弗能害禽獸弗能賊}
  - {type: page-break, offset: 13461, content: '', id: KR5c0051_SJB_002-110597a}
  - {type: variant, offset: 13462, length: 1, content: 我, ZTDZ: 謂其薄}
  - {type: variant, offset: 13464, length: 2, content: 所生, ZTDZ: ''}
  - {type: variant, offset: 13467, length: 1, content: 則, ZTDZ: 言察乎安危寧於禍福謹於去就莫之能害也故曰天在内人在外德在乎天知天人之行本乎天位乎得蹢䠱而屈伸反要而語極曰何謂天何謂人北海若曰牛馬四足是謂天落馬首穿牛鼻是謂人故曰無以人滅天無以故滅命無以得殉名謹守而勿失是謂反其眞䕫憐蚿蚿憐蛇蛇憐風風憐目目憐心夔謂蚿曰吾以}
  - {type: variant, offset: 13469, length: 1, content: 生, ZTDZ: 足踸踔而行予無如矣今子}
  - {type: variant, offset: 13471, length: 54, content: 內百年之中其坐起行止動静趣舎性情知能凡所有者凡所無者凡所爲者凡所遇者皆非我也理自爾耳而横生休戚乎其中斯又逆自, ZTDZ: 使萬足獨奈何蚿曰不}
