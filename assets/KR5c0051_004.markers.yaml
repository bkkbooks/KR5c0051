  - {type: variant, offset: 16111, length: 362, content: 人是之謂至貴夫與衆玄同非求貴於衆而衆人不能不貴斯至貴也若乃信其偏見而以獨異爲心則雖同於一致故是俗中之一物耳非獨有者也未能獨有而欲饕竊軒冕冐取非分衆豈歸之也哉故非至貴也饕吐刀反冐亡報反又亡北反大人之教若形之於影聲之於嚮百姓之心形聲也大人之教影嚮也大人之於天下何心哉猶影嚮之隨形聲耳嚮許丈反本又作響注及下同有問而應之盡其所懷使物之所懷各得自盡也爲天下配問者爲主應故爲配處乎無嚮寂以待物行乎無方隨物轉化挈汝適復之撓撓撓撓自動也提挈萬物使復歸自動之性即無爲之至也挈苦結反廣雅云持也撓而小反以遊無端與化倶故無端出入無旁玄同無表與日無始與日新俱故無始也頌論形軀合乎大同其形容與天地無異大同而無巳有巳則不能大同也無巳惡乎得有有天下之難無者巳也巳旣無矣則羣有不足復有之惡音烏復扶又反覩有者昔之君子能美其名者耳覩無者天地之友覩無則任其獨生也賤, ZTDZ: 才駘蕩}
