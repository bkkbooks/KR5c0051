  - {type: line-break, offset: 22052, content: '', id: KR5c0051_SBCK_001-5a12}
  - {type: indent, offset: 22052, content: 　　　　　　　　　　, id: KR5c0051_krp_001-bkkind21}
  - {type: variant, offset: 22052, length: 3, content: 郭象注, ZTDZ: 馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之眞性也雖有義臺路寢無所用之及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皁棧馬之死者}
  - {type: 'kr:newline', offset: 22055, content: '

      ', id: KR5c0051_krp_001-bkkkrnewl950}
  - {type: line-break, offset: 22055, content: '', id: KR5c0051_SBCK_001-5a13}
  - {type: punctuation, offset: 22055, content: (, id: KR5c0051_krp_001-bkkpn2785}
  - {type: variant, offset: 22056, length: 0, content: '', ZTDZ: 二三矣飢之渴之馳之驟之整之齊之前有橛飾之患而後有鞭筴之威而馬之死者已過半矣陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者中鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也吾意善治天下者不然彼民有常性織而衣耕而食是謂同德}
  - {type: variant, offset: 22057, length: 3, content: 葉十四, ZTDZ: 而不黨命曰天放故至德之世其}
  - {type: variant, offset: 22061, length: 1, content: 注, ZTDZ: 填填其視顛顛當是時也山無蹊隧澤無舟梁萬物群}
  - {type: page-break, offset: 22061, content: '', id: KR5c0051_SJB_001-110582b}
  - {type: punctuation, offset: 22062, content: ), id: KR5c0051_krp_001-bkkpn2786}
  - {type: variant, offset: 22063, length: 0, content: '', ZTDZ: 連屬其鄕禽獸成群草木遂長是故禽獸可係羈}
  - {type: punctuation, offset: 22064, content: (, id: KR5c0051_krp_001-bkkpn2787}
  - {type: variant, offset: 22064, length: 1, content: 徃, ZTDZ: 遊鳥鵲之巢可攀援}
  - {type: substitution, offset: 22064, original: 徃, replacement: 往, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16735}}
  - {type: punctuation, offset: 22066, content: /, id: KR5c0051_krp_001-bkkpn2788}
  - {type: variant, offset: 22066, length: 4, content: 十三葉二, ZTDZ: 闚夫至德之世同與禽獸居族與萬物並惡乎知君子小人哉同乎無知其德不離同乎無欲是謂素樸素樸而民性得矣及至聖人蹩躠爲仁踶跂爲義而天下始疑矣澶漫爲樂摘僻爲禮而天下始分矣故純樸不殘孰爲犧樽白玉不毁孰爲珪璋道德不廢安取仁義性情不離安用禮樂五色不亂孰爲文采五聲不亂孰應六律夫殘樸以爲器工匠之罪也毁道德以爲仁義聖人之過也夫馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬知已此矣夫加之以衡扼齊之以月題而馬知介倪闉扼鷙曼詭銜竊轡故馬之知而能至盜者伯樂之罪也夫赫胥氏之時民居不知所爲}
  - {type: variant, offset: 22071, length: 1, content: 注, ZTDZ: 不知所之含哺}
  - {type: punctuation, offset: 22072, content: ), id: KR5c0051_krp_001-bkkpn2789}
  - {type: variant, offset: 22073, length: 2, content: 家殊, ZTDZ: 熙鼓腹而遊民能已此矣及至聖人屈折禮樂以匡天下之形縣跂仁義以慰天下之心而民乃始踶跂好知爭歸於利不可止}
  - {type: punctuation, offset: 22076, content: (, id: KR5c0051_krp_001-bkkpn2790}
  - {type: variant, offset: 22076, length: 0, content: '', ZTDZ: 此亦聖人之過}
  - {type: variant, offset: 22077, length: 31, content: 作哉注夫聖迹既彰無夫字注形表而已矣無矣字十四葉七行注雖訛唯莊子, ZTDZ: ''}
