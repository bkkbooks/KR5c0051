  - {type: variant, offset: 8547, length: 2, content: 可脫, ZTDZ: 自理廉之害也孔子不見母匡子不見父義之失也此上世之所傳下世之所語以爲士者正其言必其行故服其殃離其患也無足問}
  - {type: variant, offset: 8548, length: 1, content: 脫, HFL: 脱}
  - {type: variant, offset: 8550, length: 1, content: 淵, ZTDZ: 知和曰人卒未有不與名就利者彼富則人歸之歸則下之下則貴之夫見下貴者所以長生安體樂意之道也今子獨無意焉知不足邪意知而力不能行邪故推正不忘邪知和曰今夫此人以爲與己同時而生同郷而處者以爲夫絶俗過世之士焉是專無主正所以覽古今之時是非之分也與俗化世去至重棄至尊以爲其所爲也此其所以論長生安體樂意之道不亦遠乎慘怛之疾恬愉之安不監於體怵惕之恐欣歡之喜不監於心知爲爲而不知所以爲是以貴爲天子富有天下而不免於患也無足曰夫富之於人無所不利窮美究勢至人之所不得逮賢人之所不能及俠人之勇力而以爲威强秉人之知謀以爲明察因人之德以爲賢良非享}
  - {type: page-break, offset: 8550, content: '', id: KR5c0051_SJB_004-110625b}
  - {type: variant, offset: 8552, length: 0, content: '', ZTDZ: 而嚴若君父且夫聲色滋味權勢}
  - {type: variant, offset: 8553, length: 0, content: '', ZTDZ: 於人心不待學而樂之體不侍象而安之夫欲惡避就固不待師此人之性也天下雖非我孰能辭之知和曰知者之爲故動以百姓不違其度是以足而不爭無以爲故不求不足故求之爭四處而不自以爲貪有餘故辭之棄天下而不自以爲廉廉貪之實非以迫外也及監之度勢爲天子而不以貴驕人富有天下而不以財戲人計其患慮其反以爲害於性故辭而不受也非以要名譽也堯舜爲帝而雍非仁天下也不以美害生也善卷許由得帝而不受非虚辭讓也不以事害己也此皆就其}
  - {type: variant, offset: 8554, length: 2, content: 器不, ZTDZ: 辭其害而天下稱賢焉則}
  - {type: variant, offset: 8558, length: 19, content: 示人魚失淵則爲人禽利器明則爲盗資故不可, HFL: ''}
  - {type: variant, offset: 8558, length: 1, content: 示, ZTDZ: 有之彼非以與名譽也無足曰必持其名苦體絶甘約養以持生則亦乆病長阨而不死者也知和曰平爲福有餘爲害者物莫不然而財其甚者也今富}
  - {type: punctuation, offset: 8560, content: (, id: KR5c0051_krp_004-bkkpn778}
  - {type: variant, offset: 8560, length: 3, content: 魚失淵, ZTDZ: 耳營鐘鼓管籥之聲口嗛於芻豢醪醴之味以感其意遺忘其業可謂亂矣侅溺於馮氣若負重行而上也可謂苦矣貪財而取慰貪權而取竭靜居}
