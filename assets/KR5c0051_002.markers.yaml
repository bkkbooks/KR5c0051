  - {type: line-break, offset: 16329, content: '', id: KR5c0051_SBCK_002-45b04}
  - {type: variant, offset: 16331, length: 1, content: 謂, ZTDZ: 弔之莊子則方箕踞鼓盆而歌惠子曰與人居長子老身死不哭亦足矣又鼓盆而歌不亦甚乎}
  - {type: variant, offset: 16335, length: 0, content: '', ZTDZ: 不然是其始死也我獨何能無樂然察其始而本無生非徒無生也而本無形非徒無形也而本無氣雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與爲春秋冬夏四時行也}
  - {type: variant, offset: 16336, length: 0, content: '', ZTDZ: 且偃然寢於巨室而我噭噭然隨而哭之自以爲不通乎命}
  - {type: variant, offset: 16337, length: 0, content: '', ZTDZ: 止也攴離叔與滑介叔觀於冥伯之丘崑崙之虚黄帝之所休俄而柳生其左肘其意蹷蹷然惡之支離叔曰子惡之乎滑介叔曰亡予何惡生者假借也假之而生生者塵垢也死生爲晝夜且吾與子觀化而化及我我又何惡焉莊子之楚見空髑髏饒然有形撽以馬捶因而問之曰夫子貪生失理而爲此乎將子有亡國之事斧鉞之誅而爲此乎將子有不善之行愧遺父母妻子之醜而爲此乎將子有凍餒之患而爲此乎將子之春秋故及此乎於是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辯士諸子所言皆生人之累也死則}
  - {type: page-break, offset: 16337, content: '', id: KR5c0051_SJB_002-110599a}
  - {type: variant, offset: 16338, length: 1, content: 情, ZTDZ: 此矣子欲聞死之說}
  - {type: variant, offset: 16344, length: 1, content: 惠, ZTDZ: 髑髏曰死無君於上無臣於下亦無四時之事從然以天地爲春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形爲子骨肉肌膚反子父母妻子間里知識子欲之乎髑髏深矉蹙頞曰吾安能棄南面王樂而復爲人間之勞乎顔淵東之齊孔子有憂色子貢下席而問曰小子敢問回東之齊夫子有憂色何邪孔}
  - {type: 'kr:newline', offset: 16346, content: '

      ', id: KR5c0051_krp_002-bkkkrnewl722}
  - {type: line-break, offset: 16346, content: '', id: KR5c0051_SBCK_002-45b05}
  - {type: variant, offset: 16347, length: 0, content: '', ZTDZ: 善哉汝問昔者管子有言丘甚善之曰褚小者不可以懷大綆短者不可以汲深夫若是者以爲命有所成而形有所適也夫不可損益吾恐回與齊侯言堯舜黄帝之道而重以燧}
  - {type: page-break, offset: 16347, content: '', id: KR5c0051_SJB_002-110599b}
  - {type: variant, offset: 16348, length: 0, content: '', ZTDZ: 神農之言彼將内求於己}
  - {type: variant, offset: 16349, length: 19, content: 無情何以謂之人莊子曰道與之貌天與之形惡, ZTDZ: 不}
  - {type: 'kr:newline', offset: 16363, content: '

      ', id: KR5c0051_krp_002-bkkkrnewl723}
  - {type: line-break, offset: 16363, content: '', id: KR5c0051_SBCK_002-45b06}
  - {type: variant, offset: 16370, length: 0, content: '', ZTDZ: 得則惑人惑則死且汝獨不聞邪昔者海鳥止於魯郊魯侯御而觴之子廟奏九韶以爲樂具太牢以爲膳鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死此以己養養鳥也非以鳥養養爲也夫以鳥養養鳥者宜栖之深林遊之壇陸浮之江湖食之鰌䱔隨行列而止委蛇而處彼唯人言之惡聞奚以夫譊譊爲乎咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒聞之相與還而觀之魚處水而生人處水而死彼必相與異其好惡故異也故先聖不一其能不同其事名止於實義設於適是之}
  - {type: variant, offset: 16371, length: 0, content: '', ZTDZ: 條達而福持列子行食於道從見百歲髑髏攓蓬而指}
  - {type: variant, offset: 16372, length: 0, content: '', ZTDZ: 曰唯予與汝知而未嘗死未嘗生也汝果養乎予果歡乎種有幾得水則爲㡭得水土之際則爲鼃蠙之衣生於陵屯則爲陵舄陵舄得鬱棲則爲烏足烏足之根爲蠐螬其葉爲胡蝶胡蝶胥也化而爲蟲生於竈下其狀若脱其名爲鴝掇鴝掇千日爲鳥其名爲乾餘骨乾餘骨之沫爲斯彌斯彌爲食醯頤輅生乎食醯黄軦生乎九猷瞀芮生乎腐蠸羊奚比乎不箰乆竹生青寧青寧生程程生馬馬生}
  - {type: page-break, offset: 16372, content: '', id: KR5c0051_SJB_002-110599c}
  - {type: punctuation, offset: 16373, content: (, id: KR5c0051_krp_002-bkkpn1929}
  - {type: voice, offset: 16373, length: 205, name: note, id: n301}
  - {type: variant, offset: 16374, length: 22, content: 之生也非情之所生也生之所知豈情之所知哉故有情, ZTDZ: 又反入}
