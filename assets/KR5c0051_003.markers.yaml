  - {type: variant, offset: 5024, length: 401, content: 所繫著也攖寧也者攖而後成者也物縈而獨不縈則敗矣故縈而任之則莫不曲成矣南伯子葵曰子獨惡乎聞之曰聞諸副墨之子副墨之子聞諸洛誦之孫洛誦之孫聞之瞻明瞻明聞之聶許聶許聞之需役需役聞之於謳於謳聞之玄冥玄冥者所以名無而非無副墨李云可以副貳玄墨也崔云此巳下皆古人姓名或寓之耳無其人洛誦李云誦通也苞洛無所不通也瞻明音占李云神明洞徹也聶許徐乃攝反李云許與也攝而保之無所施與也需役徐音須李音儒云儒弱爲役也王云需待也役亭毒也於音烏又如字謳徐烏侯反李香于反云謳煦也欲化之貌王云謳歌謡也玄冥李云強名曰玄視之冥然向郭云所名無而非無也玄冥聞之參寥夫階名以至無者必得無於名表故雖玄冥猶未極而又推寄於參寥亦玄之又玄也參七南反寥徐力彫反李云參高也高邈寥曠不可名也參寥聞之疑始夫自然之理有積習而成者蓋階近以至逺研粗以至精故乃七重而後無之名九重而後疑無是始也疑始李云又疑無是始則始非無名也粗七胡反重直龍反下同子祀子輿子犂子來四人相與語曰孰能以無, ZTDZ: ''}
