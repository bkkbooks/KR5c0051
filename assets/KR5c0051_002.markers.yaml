  - {type: variant, offset: 3912, length: 463, content: 夫暴君非徒求恣其欲乃復求名但所求者非其道耳叢才公反扈音戸司馬云國名在始平郡案即今京兆鄠縣也虚厲如字又音墟李云居宅無人曰虚死而無後爲厲名實者聖人之所不能勝也而況若乎惜名貪欲之君雖復堯爲不能勝化也故與衆攻之而汝乃欲空手而往化之以道哉雖然若必有以也嘗以語我來顔回曰端而虚正其形而虚其心也語魚豫反下同勉而一言遜而不二也則可乎曰惡惡可言未可也惡惡皆音烏下同夫以陽爲充孔揚言衛君亢陽之性充張於內而甚揚於外強禦之至也采色不定喜怒無常常人之所不違莫之敢逆因案人之所感以求容與其心夫頑強之甚人以快事感已巳陵藉而乃抑挫之以求從容自放而遂其侈心也挫子臥反從七容反名之曰日漸之德不成而況大德乎言乃少多無回降之勝也將執而不化故守其本意也外合而內不訾其庸詎可乎外合而內不訾即向之端虚而勉一耳言此未足以化之訾向徐音紫崔云毀也然則我內而外曲成而上比顔回更此三條也上時掌反下同內者與天爲徒與天爲徒者知天子之與已皆天之所子而獨以已言蘄乎而人善之蘄乎而人不善之邪物無貴賤得生一也故善與不善付之公當耳一無所求於人也蘄音祈若然者人謂之童子是之謂與天爲徒依乎天理推己性命, ZTDZ: ''}
