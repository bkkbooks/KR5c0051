body:
  text: 郭象子玄註陸德明音義莊子雜篇劔第三十音義曰以事名篇昔趙文王喜劔劔士夾門而客三千餘人日夜相擊於前死傷者歳百餘人好之不厭如是三年國衰諸侯謀之趙文王司馬云惠文王也名何武靈王子後莊子三百五十年洞紀云周赧王十七年趙惠文王之元年一云案長歷推惠文王與莊子相值恐彪之言誤喜許紀反下同夾郭李音協又古治反好呼報反下同厭於塩反又於反太子悝患之募左右曰孰能王之意止劔士者賜之千金左右曰莊子當能悝苦回反太子名募音慕又音務如字解也又音恱太子乃使人以千金奉莊子莊子弗受與使者俱往見太子曰太子何以敎周賜周千金太子曰聞夫子明聖謹奉千金以幣從者夫子弗受悝尚何敢言使所吏反幣從才用反一本作以幣從軍莊子曰聞太子所欲用周者欲絶王之喜好也使臣上大王而逆王意下不當太子則身刑而死周尚安所事金乎使臣上大王下當太子趙國何求而不得也太子曰然吾王所見唯劔士也莊子曰諾周善爲劔太子曰然吾王所見劔士皆蓬頭突垂冠曼胡之纓短後之衣瞋目而語難王乃之今夫子必儒服而見王事必大逆如字又始銳反下同蓬歩公反本或作鑝司馬蓬頭謂著兠鍪也有毛故如蓬必刄反司馬本作賔云賔讀爲垂冠將欲闘故冠低傾也曼胡莫干反司馬云曼胡之纓謂麄纓無文理也短後之衣爲便於事也瞋赤夷赤眞二反語難如字艱難也勇士憤氣積於心胷言不流利也又乃旦反旣怒而語爲人所畏難司馬云相擊也乃音恱下大同莊子曰請治劔服治劔服三日乃見太子太子乃與見王王脫白刄待之莊子入殿門不趨見王不拜與見賢遍反下劒見同又如字脫一本作同士活反王曰子欲何以敎寡人使太子先曰臣聞大王喜劒故以劔見王王曰子之劔何能禁制曰臣之劔十歩一人千里不留行王大之曰天下無敵矣千里不留行司馬云十歩與一人相擊輙殺之故千里不留於行也莊子曰夫爲劒者示之以虚開之以利後之以發先之以至願得試之王曰夫子休就舎待命令設戯請夫子王乃校劒士七日死傷者六十餘人得五六人使奉劒於殿下乃召莊子王曰今日試使士敦劒校司馬云考校取其勝者也校本或作敎敦如字司馬云敦斷也試使用劒相擊斷截也一音丁回反莊子曰望之乆矣王曰夫子所御杖長短何如曰臣之所奉皆可杖直亮反所奉司馬本作所奏然臣有三劒唯王所用請先言而後試王曰願聞三劒曰有天子劒有諸侯劒有庻人劒王曰天子之劒何如曰天子之劒以燕谿石城爲鋒齊岱爲鍔燕音煙燕谿地名在燕國石城在塞外鍔五各反司馬云劒刃也一云劒稜也魏爲脊周宋爲鐔鐔音淫三蒼云徒感反劒口也徐徒南反又徒各反謂劒鐶也司馬云劒珥也韓魏爲夾爲夾古協反司馬云把也一本作鋏同一云鐔從稜向背鋏從稜向刃也包以四夷裹以四時褁音果繞以渤海帶以常山制以五行論以刑德開以隂陽持以春夏行以秋冬行以秋冬隨天道以行止也此劔直之無前舉之無上案之無下運之無旁上決浮雲下絶地紀此劔一用匡諸侯天下服矣此天子之劔也文王芒然自失芒莫剛反曰諸侯之劔何如曰諸侯之劔以知勇士爲鋒以清廉士爲鍔以賢良士爲脊以忠勝士爲鐔以豪傑士爲夾此劔直之亦無前舉之亦無上案之亦無下運之亦無旁上法圓天以順三光下法方地以順四時中知民意以安四郷此劔一用如雷霆之震也四封之内無不賔服而聽從君命者矣此諸侯之劔也王曰庻人之劔何如曰庻人之劔蓬頭突垂冠曼胡之纓短後之衣瞋目而語難相擊於前上斬頸領下決肝肺此庻人之劔無異於闘雞一旦命巳絶矣無所用於國事今大王有天子之位而好庶人之劒臣爲大王薄之肺芳廢反爲干僞反王乃牽而上殿宰人上食王三環之上時掌反下同三環如字又音患繞也聞義而愧繞饌三周不能坐食莊子曰大王安坐定氣劒事已畢奏矣於是文王不出宫三月劒士皆服斃其處也斃婢世反司馬云忿不見禮皆自殺也莊子雜篇漁父第三十一音義曰以人名篇孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子弦歌鼓琴奏曲未半緇帷司馬云黒林名也本或作惟杏壇司馬云澤中高處也李云壇名有漁父者下船而來須眉交白髮榆行原以上距陸而止左手據右手持頥以聽曲終有漁父者音甫取魚父也一云是范蠡元嘉本作有漁者父則如字須眉本亦作鬚眉交如字李云俱也一本作皎榆音遥又音俞又楮由反謂垂手衣内而行也李音投投揮也又士田反面世反李音芮上時掌反距李云距至也而招子貢子路二人俱對客指孔子曰彼何爲者也子路對曰魯之君子也客問其族子路對曰族孔氏客曰孔氏者何治也子路未應子貢對曰孔氏者性服忠信身行仁義飾禮樂選人倫上以忠於世主下以化於齊民將以利天下此孔氏之所治也飾如子本又作音敕化齊民李云齊等也許慎云齊等之民也如淳云齊民猶平民元嘉本作化於齊民後向如無於字又問曰有土之君與子貢曰非也侯王之佐與子貢曰非也客乃而還行言曰仁則仁矣恐不免其身苦心勞形以危其貞嗚呼逺哉其分於道也與音餘下同危或作爲分如字本又作介音界司馬云離也子貢還報孔子孔子推琴而起曰其聖人與乃下求之至於澤畔方將杖挐而引其船顧見孔子還郷而立孔子反走再拜而進杖直亮反挐女房反司馬云橈也音饒郷香亮反或作嚮同客曰子將何求孔子曰曩者先生有緒言而去丘不肖未知所謂待於下風幸聞咳唾之音以卒相丘也緒言猶先言也待或作待咳苦代反唾吐卧反相息亮反客曰嘻甚矣子之好學也孔子再拜而起曰丘少而脩學以至于今六十九歲矣無所得聞至敎敢不虚心嘻香其反好呼報反下同少詩召反下同客曰同相從同聲相應固天之理也吾請釋吾之所有而經子之所以經營也司馬云經理也子之所以者人事也天子諸侯大夫庶人此四者自正治之美也四者離位而亂莫大焉官治其職人憂其事乃無所陵治直吏反下官事不治同故田荒室露衣食不足徴賦不屬妻妾不和長少無序庶人之憂也屬音烛長丁丈反後過皆同能不勝任官事不治行不清白羣下荒怠功美不有爵禄不持大夫之憂也勝音升行下孟反廷無忠臣國家昬亂國技不巧貢職不美春秋後倫不順天子諸侯之憂也枝其試反職或作賦春秋後倫朝覲不及等比也隂陽不和寒暑不時以傷庶物諸侯暴亂擅相攘伐以賤民人禮樂不節財用窮匱人倫不飭百姓淫亂天子有司之憂也飭音敕今子旣上無君侯有司之而下無大臣職事之官而擅飾禮樂選人倫以化齊民不泰多事乎泰本又作大音同徐敕佐反後同且人有八疵事有四患不可不察也非其事而事之謂之摠疵祀知反摠李云謂也莫之顧而進之謂之佞希意道言謂之諂道音導不擇是非而言謂之䛕好言人之惡謂之讒析交離親謂之賊稱譽詐僞以敗惡人謂之慝譽音餘敗蒲邁反惡人烏路反下同慝他得反不擇善否兩容頰適偷拔其所欲謂之險否悲美反惡也又方九反兩容頰適善惡皆容顔皃調適也頰或顔字此八疵者外以亂人内以傷身君子不友明君不臣所謂四患者好經大事變更易常以挂功名謂之叨挂音卦别也又音圭叨吐刀反專知擅事侵人自用謂之貪見過不更聞諌愈甚謂之狠狠胡墾反人同於巳則可不同於巳雖善不善謂之矜此四患也能去八疵無行四患而始可敎巳孔子愀然而歎再拜而起曰丘再逐於魯削迹於衛伐於宋圍於陳蔡丘不知所失而離此四謗者何也去起吕反愀在力反又七小反客悽然變容曰甚矣子之難悟也人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影不離身自以爲尚遲疾走不休絶力而死不知處隂以休影處靜以息迹愚亦甚矣子審仁義之間察同異之際觀動靜之變適受與之度理好惡之情和喜怒之節而幾於不免矣悟魚據反下同本或作悟數音朔離力智反謹脩而身愼守其眞還以物與人則無所累矣今不脩之身而求之人不亦外乎孔子愀然曰請問何謂眞客曰眞者精誠之至也不精不誠不能動人故強哭者雖悲不哀強怒者雖嚴不威強親者雖不和眞悲無聲而哀眞怒未發而威眞親未而和眞在内者神動於外是所以貴眞也其用於人理也事親則慈孝事君則忠貞飮酒則歡樂處䘮則悲哀強其丈反下同樂音洛下同忠貞以功爲主飮酒以樂爲主處䘮以哀爲主事親以適爲主功成之美無一其迹矣事親以適不論所以矣飮酒以樂不選其具矣處喪以哀無問其禮矣禮者世俗之所爲也眞者所以受於天也自然不可易也故聖人法天貴眞不拘於俗愚者反此不能法天而恤於人不知貴眞禄禄而受變於俗故不足惜哉子之蚤湛於僞而晚聞大道也禄禄如字又音緑謂形見爲禮也司馬云録領録也蚤音早字亦作早湛丁南反下同孔子又再拜而起曰今者丘得遇也天幸然先生不羞而比之服役而身教之敢問舎所在請因受業而卒學大道得過也謂得過失也過或作遇比如字謂親見比欲也又毗志反客曰吾聞之可與徃者與之至於妙道不可與徃者不知其道愼勿與之身乃無咎子勉之吾去子矣吾去子矣乃刺船而去延縁葦間刺七亦反顔淵還車子路授綏孔子不顧待水波定不聞挐音而後敢乗波定李云謂戰如波也案謂船行故水波去逺則波定子路旁車而問曰由得爲役乆矣未嘗見夫子遇人如此其威也萬乗之主千乗之君見夫子未甞不分庭伉禮夫子猶有倨傲之容今漁父杖挐逆立而夫子曲要磬折言拜而應得無太甚乎門人皆怪夫子矣漁父何以得此乎旁歩浪反乗繩證反下同倨音據傲五報反要一遥反折之設反孔子伏軾而歎曰甚矣由之難化也湛於禮義有間矣而樸鄙之心至今未去湛或作其進吾語汝夫遇長不敬失禮也見賢不尊不仁也彼非至仁不能下人下人不精不得其眞故長傷身惜哉不仁之於人也禍莫大焉而由獨擅之下遐嫁反下及注同且道者萬物之所由也庶物失之者死得之者生爲事逆之則敗順之則成故道之所在聖人尊之今漁父之於道可謂有矣吾敢不敬乎此篇言無江海而間者能下江海之士也夫孔子之所放任豈直漁父而巳哉將周流六虚旁通無外蠢動之咸得盡其所懷而窮理致命固所以爲至人之道也間音閑如兖反莊子雜篇列御寇第三十二音義曰以人名篇或無别字列御寇之齊中道而反遇伯昬瞀人伯昬瞀人曰奚方而反瞀音茂又音務奚方李云方道也曰吾驚焉曰惡乎驚吾驚焉李云見人感巳即違道故驚也惡音烏曰吾嘗食於十賣漿之家子祥反本亦作漿司馬云讀曰漿十家並賣漿也而五先饋言其敬巳五先饋饋遺也謂十家中五家先見遺王云皆先饋進於巳伯昏瞀人曰是則汝何爲驚巳曰夫内誠不解外自矜飾解音解司馬音懈形諜成光舉動便僻而成光儀也形諜徒協反說文云間也成光司馬云形諜於成光華也僻婢亦反以外鎮人心其内實不足以服物使人輕乎貴老鎮物由乎内實則使人貴老之情篤也貴老謂重禦冦過於老人而其所患言以美形動物則所患亂生也子反亂也夫人特爲食之貨多餘之贏其爲利也薄其爲權也輕而猶若食權輕利薄可無求於人食音嗣贏音盈而况於萬乗之主乎身勞於國而知盡於事彼將任我以事而效我以功吾是以驚伯昬瞀人曰善哉觀乎汝處巳人將保汝矣苟不遺形則所在見保保者聚守之謂也乗繩證反效如字本又作校古孝反保汝司馬云保附也無幾何而徃則戸外之屨滿矣伯昬瞀人北面而立敦杖蹙之乎頥立有間不言而出賔者以告列子列子提屨跣而走曁乎門曰先生旣來曾不發藥乎曰已矣吾固告汝曰人將保汝果保汝矣非汝能使人保汝而汝不能使人無保汝也任平而化則無感無求無感無求乃不相保幾居豈反敦音頓司馬云豎也蹙子六反賔者本亦作儐同必刃反謂通客之人跣先典反曁其噐反發如字司馬本作廢公置也而焉用之感豫出異也先物施惠惠不因彼豫出則異也焉於䖍反必且有感揺而本才又無謂也必將有感則與本性動也搖而本才一本才作性又無謂也動揺本才以致求者又非道德之謂也與汝遊者又莫汝告也彼所小言盡人毒也細巧入人爲小言小言言不入道故曰小言人毒以其多患故曰人毒莫覺莫悟何相孰也巧者勞而知者憂無能者無所求食而遨遊汎若不繫之舟虚而遨遊者也夫無其能者唯聖人耳過此以下至於昆蟲未有自忘其能而任衆人者也莫覺莫悟何相孰也彼不敢告汝汝又不自覺何其相孰哉王云小言爲毒曾無告語也孰誰也謂誰相親愛者既無告語此不相親愛之至也知音智食而一本作飽食而遨本又作敖五刀反下同汎孚劒反鄭人緩也呻吟裘氏之地呻吟吟詠之謂緩司馬云緩名也呻音申謂吟詠學問之聲也崔云呻誦也本或作呻吟裘地名崔云裘儒服也之地崔本作之地蛇云地蛇者山田荼種也祗三年而緩爲儒祗適也祗音支李云適也言適三年而成也司馬云巨移反謂神祗祐之也河潤九里澤及三族使其弟墨儒墨相與辯其父翟翟緩弟名河潤九里河從乾位來乾陽數九也使其弟墨謂使緩弟翟成墨也十年而緩自殺其父夢之曰使而子爲墨者予也闔胡嘗視其良旣爲秋栢之實矣緩怨其父之助弟故感激自殺死而見夢謂巳旣能自化爲儒又化弟令墨弟由巳化而不能順巳巳以良師而便怨死精誠之至故爲秋栢之實闔胡甞視其良闔語也胡何也良者良人謂緩也言何不試視緩墓上巳化爲秋栢之實良或作浪音浪也見賢遍反令力呈反夫造物者之報人也不報其人而報其人之天自此巳下莊子辝也夫積習之功爲報報其性不報其爲也然則學習之功成性而巳豈爲之哉彼故使彼彼有彼性故使習彼夫人以巳爲有以異於人以賤其親言緩自美其儒謂巳能有積學之功不知其性之自然也夫有功以賤物者不避其親也無其身以平性者貴賤不失其倫也齊人之井飮者相捽也故曰今之世皆緩也夫穿井所以通泉吟詠所以通性也無泉亦無所穿無性則無所詠而世皆忘其泉性之自然徒識穿詠之末功因欲矜而有之不亦妄乎相捽于骨反言穿井之人爲巳有造泉之功而捽飮者不知泉之天然也喻緩不知翟天然之墨而忿之捽一音子晦反自是有德者以不知也而况有道者乎觀緩之謬以爲學父故能任其自爾而知故無僞乎其間也知音智注同父本或作乆古者謂之遁天之刑仍自然之能以爲巳功者逃天者也故刑戮及之仍而證反本又作認同聖人安其所安不安其所不安夫聖人無安無不安順百姓之心也衆人安其所不安不安其所安所安相與異故所以爲衆人也莊子曰知道易勿言難知而不言所以之天也知而言之所以之人也古之人天而不人知雖落天地未甞開言以引物也應其至分而巳易以豉反知雖音智應如字當也朱泙漫學屠龍於支離益單千金之家三年技成而無所用其巧事在於適無貴於逺功泙李音平郭敷音反徐敷耕反漫朱旦反又未干反司馬云朱平漫支离益皆人姓名屠音徒單音丹盡也千金之家如字本亦作賈又作賈皆音嫁三絶句崔云用千金者三也又本作三年則上句至家絶技其綺反聖人以必不必故無兵理雖必然猶不必之斯至順矣兵其安有衆人以不必必之故多兵理雖未必抑而必之各必其所見則乖逆生順於兵故行有求物各順徃則足足則無求順於兵順或作慎兵恃之則亡不得巳而用之以恬惔爲上者未之亡也恬徒謙反惔徒暫反本亦作淡小夫之知不離苞苴竿牘苞苴以遺竿牘以問遺問之具小知所殉知音智註及下爲知同離力智反苞苴子餘反司馬云苞苴有苞裹也竿音干牘音獨司馬云謂竹簡爲書以相問遺脩意氣也遺唯李反下同敝精神乎蹇淺昬於小務所得者淺敝郭婢世反一音必世反而欲兼濟道物太一形虚是者迷惑于宇宙形累不知太初小夫之知而欲兼濟導物經虚渉逺志大神敝形爲之累則迷惑而失致也導音道註同彼至人者歸精神乎無始而甘冥乎無何有之鄉水流乎無形發泄乎太清泊然無爲而任其天行也冥如字本亦作又音眠泄息列反徐以世反泊歩各反悲哉乎汝爲知在豪毛爲知所得者細悲哉乎一本作悲哉悲哉而不知大寧任性大寧而至宋人有曹商者爲宋王使秦其徃也得車數乗王之益車百乗反於宋見莊子曰夫處窮閭阨巷困窘織屨槁項黃馘者商之所短也一悟萬乘之主而從車百乗者商之所長也莊子曰秦王有病召醫破癕潰痤者得車一乗䑛痔者得車五乗所治愈下得車愈多子豈治其痔邪何得車之多也子行矣夫事下然後功高功高然後禄重故高逺活淡者遺榮也爲于僞反宋王司馬云偃王也使所吏反數所主反乗繩證反下同說音恱扼於解反窘與愪反又巨韻反搞苦老反又祛矯反本亦作矯居表反項李云頸項羸痩皃司馬云頭槁立也黃馘古獲反徐况壁反爾雅云獲也司馬云謂靣黃熟也秦王司馬云惠王也痤徂禾反䑛字又作食反痔治紀反愈李亦作俞同魯哀公問乎顔闔曰吾以仲尼爲貞幹國其有瘳乎曰殆哉汲乎仲尼汲危也夫至人以民靜爲安今一爲貞幹則遺高迹於萬世令飾競於仁義而雕畫其毛彩百姓旣危至人亦無以爲安瘳敕由反汲魚及反又五脂反危也令力呈反下同方且飾羽而畫凡言方且皆謂後世從事飾畫非任真也從事華辭以支爲㫖將令後世之從事者無實而意趣橫出也忍性以視民而不知不信後世人君將慕仲尼之遐軌而遂忍性自矯僞以臨民上下相習遂不自知也視音示下同受乎心宰乎神夫何足以上民今以上民則後世百姓非直外形從之而巳乃以心神受而用之不能復自得於體中也復扶又反彼宜女與彼百姓也女哀公也彼與女各自有所宜相效則失真此即今之見驗與音餘又如字下順與同見賢遍反予頥與效彼非所以養巳也誤而可矣正不可也今使民離實學僞非所以視民也爲後世慮不休之明不謂當時也離力智反難治也治之則僞故聖人不治也施於人而不忘非天布也布而識之非芻狗萬物也施如豉反下注同識如字又申志反商賈不齒况士君子乎賈音古雖以士齒之神者弗齒要能施惠故於事不得不齒以其不忘故心神忽之此百姓之大情也爲外刑者金與木也金謂刀鋸斧木謂捶楚桎梏鋸音據音越捶之蘂反桎之實反梏古毒反爲内刑者動與過也静而當則内外無刑宵人之離外刑者金木訙之不由明垣之者謂之宵人宵人王云非明正之徒謂之宵夜之人也訙本又作訊音信問也離内刑者隂陽食之動而過分則性氣傷於内金木訊於外也夫免乎外内之刑者唯眞人能之自非其人未有能止其分者故必外内受刑但不問耳孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深情故有貌愿而益有長不肖有順懁而逹者有堅而縵有緩而釬言人情貌之反有如此者愿音願廣雅云謹慤也長丁丈反不肖外似長者内不似也有順王作愼懁音儇又許㳂反徐音絹三蒼云腹急也王云堅辨也外慎堅辨嘗務質訥縵武坐反又武諌反李云内堅實外如縵也釬胡旦反又音干急也一云情皃相反故其就義若渴者其去義若但爲難知耳未爲殊無迹故君子逺使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其節醉之以酒而觀其則雜之以處而觀其色九徴至不肖人得矣君子易觀不肖難明然視其所以觀其所由察其所安捜之有塗亦可知也卒寸忽反知音智側不正也一云謂醉者喜傾側冠也王云側謂凡爲不正也側或作則易以豉反捜所求反正考父一命而傴再命而僂三命而俯循牆而走孰敢不言人不敢以不之事侮之正考父音甫宋湣公之玄孫弗父何之曾孫傴紅矩反僂力矩反三命公士一命大夫再命卿三命如而夫者一命而吕鉅再命而於車上儛三命而名諸父孰恊唐許而夫謂凡夫也唐謂堯許謂許由也言而夫與考父者誰同於唐許之事也而夫郭云凡夫也吕鉅矯皃孰協唐許恊同也唐唐堯許許由皆崇讓者也言考父與而夫誰同於唐許也賊莫大乎德有心有心於爲德非眞德也夫眞德者忽然自得而不知所以德也而心有睫率心爲德猶之可耳役心於眉睫之間則僞巳甚矣睫音接及其有睫也而内視内視而敗矣乃欲探射幽隱以有爲事則心與事俱敗矣射食亦反凶德有五中德爲首何謂中德中德也者有以自好也而吡其所不爲者也吡訾也夫自是而非彼則攻之者非一故爲凶首也中無自好之情則恣萬物之所是所是各不自失則天下皆思奉之矣好呼報反注同吡匹爾反又芳爾反訾子爾反皆思奉之矣本或作皆畢事也窮有八極逹有三必形有六府美髯長大壯麗勇敢八者俱過人也因以是窮窮於受役也然天下未曾窮於所短而恒以所長自困髯人反曾才能反縁循偃佒困畏不人三者俱通逹縁循杖物而行者也偃佒不能俯執者也困畏怯弱者也此三者旣不以事見任乃將接佐之故必逹也偃佒於丈反本亦作央同偃佒守分歸一也杖守亮反知慧外通通外則以無涯傷其内也知音智勇動多怨怯而靜乃厚其身耳乃厚其身耳元嘉本厚作後一本作乃後恒無怨也仁義多則天下皆望其愛然愛之則有不周矣故多責逹生之情者傀傀然大恬解之皃傀郭徐呼懷反字林公回反云偉也解音蟹逹於知者肖肖失散也知音智肖音消逹大命者隨泯然與化俱也逹小命者遭毎在節上住乃悟也人有見宋王者錫車十乗以其十乗驕穉莊子莊子曰河上有家貧恃緯蕭而食者其子没於淵得千金之珠其父謂其子曰取石來鍜之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子爲粉夫夫取富貴必順乎民望也挾竒乗天衢以嬰人主之心者明君之所不受也故如有所譽必有所試於斯民不違僉曰舉之以合萬夫之望者此三代所以直道而行之也乗繩證反下同驕穉直吏反又池夷反李云自驕而穉莊子也緯蕭如字緯織也蕭荻蒿也織蕭以爲畚而賣之本或作葦音同鍜丁亂反謂槌破之重直龍反驪龍力馳反驪龍黒龍也頷戸感反子反夫音符挾戸牒反僉七潜反或聘於莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻叔及其牽而入於太廟雖欲爲犢其可得乎樂生者畏犧而辝聘髑髏聞生而臏此死生之情異而各自當也使所吏反衣於旣反食音嗣芻音初俱反蒭草也叔大豆也大廟音太髑音獨髏音樓矉毗人反子六反莊子將死弟子欲厚葬之莊子曰吾以天地爲棺槨以日月爲連璧星辰爲珠璣萬物爲齎送吾葬具豈不備邪何以加此弟子曰吾恐烏鳶之食夫子也莊子曰在上爲烏鳶食在下爲螻蟻食奪彼與此何其偏也以不平平其平也不平以一家之平平萬物未任萬物之自平也璣音祈又音機一音其旣反齎音資本又作濟子詣反鳶以全反螻音樓蟻魚綺反以不徴徴其徴也不徴徴應也不因萬物之自應而欲以其所見應之則必有不合矣明者唯爲之使夫執其所見受使多矣安能使物哉神者徴之唯任神然後能至順故無徃不應也夫明之不勝神也乆矣明之所及不過於形骸也至順則無逺近幽深皆各自得而愚者恃其所見入於人其功外也不亦悲乎夫至順則用發於彼而功藏於物恃其所見執其自是雖欲入人其功之外也莊子雜篇天下第三十三音義曰以義名篇天下之治方術者多矣皆以其有爲不可加矣爲其所有爲則眞爲也爲其眞爲則無僞矣又何加焉古之所謂道術者果惡乎在曰無乎不在曰神何由降明何由出神明由事感而後降出惡音烏聖有所生王有所成皆原於一使物各復其根抱一而巳無飾於外斯聖王所以生成也不離於宗謂之天人不離於精謂之神人不離於真謂之至人以天爲宗以德爲本以道爲門兆於變化謂之聖人凡此四名一人耳所不言之異不離力智反下注不離離性下章離於同兆本或作逃以仁爲恩以義爲理以禮爲行以樂爲和薫然慈仁謂之君子此四名之粗迹而賢人君子之所服膺也行下孟反章内同薰然許云反温和貌崔云以慈仁爲馨聞也粗七奴反卷内皆同以法爲分以名爲表以參爲驗以稽爲决其數一二三四是也百官以此相齒以事爲常以衣食爲主蕃息畜藏老弱寡爲意皆有以養民之理也民理旣然故聖賢不逆參本又作操同七曹反宜也稽音雞考也蕃音煩畜敕六反又許六反藏如字又才浪反古之人其備乎古之人即向之四名也配神明醇天地育萬物和天下澤及百姓明於本數係於末度本數明故末不離醇順倫反六通四辟小大精粗其運無乎不在所以爲備辟婢亦反本又作闢其明而在數度者舊法世傳之史尚多有之其在數度而可明者雖多有之巳䟽外也其在於詩書禮樂者鄒魯之士搢紳先生多能明之能明其迹耳豈所以迹哉鄒莊由反孔子父所封邑詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分其數散於天下而設於中國者百家之學時或稱而道之皆道古人之陳迹耳尚復不能常稱道志音導下以道皆同分扶問反復扶又反下章不復同天下大亂用其迹而無統故也賢聖不明能明其迹又未易也易以豉反道德不一百家穿鑿天下多得一各信其偏見而不能都舉得一偏得一術察焉以自好夫聖人綂百姓之大情而因爲之制故百姓情於所綂而自忘其好惡故與一世而得淡漠焉亂則反之人恣其近好家用典法故國異政家殊俗好呼報反註及下同惡烏路反淡本又作澹徒暫反漠音莫譬如耳目鼻口皆有所明不能相通猶有家衆技也皆有所長時有所用所長不同不得常用技其綺反雖然不該不徧一曲之士也故未足備任也徧音遍判天地之美析萬物之理各用其一曲故析判察古人之全寡能備於天地之美稱神明之容况一曲者乎稱尺登反下章同是故内聖外王之道闇而不明鬰而不發全人難遇故也天下之人各爲其所欲焉以自爲方悲夫百家徃而不反必不合矣後世之學者不幸不見天地之純古人之大體大體各歸根抱一則天地之純也道術將爲天下裂裂分離也道術流弊遂各奮其方或以主物則物離性以從其上而性命䘮矣䘮矣如字本或作䘮息浪反不侈於後世不靡於萬物不暉於數度勤儉則瘁故不暉也侈尺反又尺氏反暉如字崔本作渾瘁在醉反以繩墨自矯矯厲也矯居表反而備世之急勤而儉則財有餘而急有備古之道術有在於是者墨翟禽滑聞其風而之爲之大過巳之大順不復度衆所能也墨翟宋大夫尚儉素滑音骨又戸八反力之反又音熈禽滑墨翟弟子也不順五帝三王之樂嫌其奢音悅下注同後聞風而皆同大過音太舊敕佑反後大過大多大少放此順或作循度徒各反作爲非樂命之曰節用生不歌死無服墨子汜愛兼利而非鬬夫物不足則以闘爲是今墨子令百姓皆動儉各有餘故以闘爲非也非樂節用墨子二篇名汜敖劒反化同巳儉爲汜愛兼利令力呈反下同其道不怒但自刻也又好學而博不異旣自以爲是則欲令萬物皆同乎巳也不與先王同先王則恣其羣異然後同焉皆得而不知所以得也毀古之禮樂嫌其侈靡黃帝有咸池堯有太章舜有大韶禹有大夏湯有大濩文王有辟雍之樂武王周公作武古之䘮禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重今墨子獨生不歌死不服桐棺三寸而無槨以爲法式以此教人恐不愛人以此自行固不物皆以任力稱情爲愛今以勤儉爲法而爲之大過雖欲饒天下更非所以爲愛也夏戸雅反音護辟音壁作武武樂名重直龍反下同未敗墨子道但非道德敗或作毀墨子是一家之正故不可以爲敗也崔云未壞其道雖然歌而非歌哭而非哭樂而非樂是果乎雖獨成墨而不萬物之情非歌生應歌而墨以歌爲非也樂而音洛下及注同其生也勤其死也薄其道大觳觳無潤也觳郭苦角反徐戸角反郭李皆云無也使人憂使人悲其行難爲也恐其不可以爲聖人之道夫聖人之道恱以使民民得性之所樂則恱恱則天下無難矣行下孟反下注以成其行同反天下之心天下不堪墨子雖獨能任柰天下何離於天下其去王也逺矣王者必合天下之懽心而與物俱徃也任音壬墨子稱道曰昔者禹之湮洪水决江河而通四夷九州也名山三百支川三千小者無數禹親自操橐耜而九雜天下之川腓無胈脛無毛沭甚風櫛疾置萬國禹大聖也而形勞天下也如此墨子徒見禹之形勞耳未覩其性之適也湮洪水音因又音煙塞也没也握地而决之海使之由地下也引禹之儉同巳之道支川本或作支流操七曹反槀舊古考反崔郭音託字則應作橐崔云囊也司馬云盛士噐也耜音似釋名耜似也似齒㫁物三蒼云耒頭鐡也崔云棰也司馬盛水器也九音鳩本亦作鳩聚也雜本或作籴音同崔云所治非一故曰雜也腓音肥又符畏反胈歩葛反又再物反又符盖反脛刑定反甚如字崔本甚作湛音櫛側筆反使後世之墨者多以裘爲衣以跋蹻爲服日夜不休以自苦爲極謂自苦爲盡理之法戸葛反跋其逆反蹻紀略反李云麻曰屩木曰屐屐與跂同屩與蹻同一云鞋也一音居王反以籍鞋下也曰不能如此非禹之道也不足謂墨非其時而守其道所以爲墨也相里勤之弟子五侯之徒南方之墨者苦獲巳齒鄧陵子之屬俱誦墨經而倍譎不同相謂别墨必其各守所見則所在無通故於墨之中又相與别也相息亮反里勤司馬云墨師也姓相里名勤苦獲巳齒李云二人姓字也倍郭音佩又裴罪反譎古穴反崔云决也以堅白同異之辯相訾以觭偶不仵之辭相應以巨子爲聖人巨子最能辯其所是以成其行訾音紫觭紀宜反又音仵音誤徐音五仵同也巨子向崔本作鉅向云墨家號其道理成者爲鉅子儒家之碩儒皆願爲之尸尸者主也兾得爲其後世至今不决爲欲係巨子之業也墨翟禽滑之意則是意在不侈靡而備世之急斯所以爲是其行則非也爲之大過故也將我之養畢足而止不敢望有餘也以此白心古之道術有在於是者宋鈃尹文聞其風而恱之作爲華山之冠以自表華山上下均平白心崔云明白其心也白或作任鈃音刑徐胡冷反郭音堅尹文崔云齊宣王時人著書一篇華山之冠華山上下均平作冠象之表巳心均平也接萬物以别宥爲始不欲令相犯錯别彼列反又如字宥爲始始首也崔云以别善惡宥不及也語心之容命之曰心之行以聏合驩以調海内強以其道聏令合調令和也聏崔音而郭音鉺司馬云色厚貌崔郭王云和也聏和萬物物各則歡矣一云調也合驩以道化物和而調之合意則歡強其丈反下皆同令合力呈反下同請欲置之以爲主二子請得此者立以爲物主也見侮不辱其於以活民爲急也救民之禁攻寢兵救世之戰所謂聏調以此周行天下上下教雖天下不取強聒而不舎者也聏調之理然也音恱又如字下教上謂國主也恱上之教下也一云猶教也上教教下也聒古活反謂強聒其耳而語之也故曰上下見厭而強見也所謂不辱厭於反徐於瞻反雖然其爲人太多其自爲太少不因其自化而強以慰之則其功太重也爲于僞反下自爲同曰請欲固置五升之飯足矣斯明自爲之太少也先生恐不得飽弟子雖飢不忘天下宋鈃尹文稱天下爲先生自稱爲弟子也日夜不休曰我必得活哉謂民亦當報巳也圖傲乎救世之士哉揮斥高大之貌傲五報反曰君子不爲苛察務寛恕也苛音河一本作茍不以身假物必自出其力也以爲無益於天下者明之不如巳也所以爲救世之士也以禁攻寢兵爲外以情欲寡淺爲内其小大精粗其行適至是而止未能經虚渉曠行下孟反又如字公而不當易而無私决然無主各自任也不當丁浪反崔本作黨云至公無黨也易以反趣物而不兩物得所趣故一不顧於慮不謀於知於物無擇與之俱徃古之道術有在於是者彭田駢愼到聞其風而恱之齊萬物以爲首曰天能覆之而不能載之地能載之而不能覆之大道能包之而不能辯之知萬物皆有所可有所不可故曰選則不徧都用乃周於知音智下棄知同田駢薄田反齊人也游稷下著書十五篇慎子云名廣徧音遍敎則不至任其性乃至不至一本作不王道則無遺者矣是故愼到棄知去巳而縁不得巳泠汰於物以爲道理泠汰猶聽放也遺如字本又作貴去起吕反章内注同泠音零汰音泰徐徒盖反一云泠汰猶沙汰也謂沙汰使之泠然也皆泠汰之歸於一以此爲道理也或音裔又音替曰知不知將薄知而後鄰傷之者也謂知力淺不知任其自然故薄之而又鄰傷焉謑髁無任而天下之尚賢也不肯當其任而任夫衆人衆人各自能則無爲橫復尚賢也謑胡啓反又音奚又苦迷反文云耻也後行曵而後徃所謂縁於不得巳飄風之還羽之旋磨石之隧全而無非動靜無過未嘗有罪是何故夫無知之物無建已之患無用知之累動靜不離於理是以終身無譽患生於譽譽生於有建飄婢遥反一音必遥反爾雅云回風爲飄還音旋一音環磨末佐反又如字石之隧音遂回也徐絶句一讀至全字絶句全而無非磨石所剴麄細全在人其德全無見非真時言其無心也不離力智反故曰至於無知之物而巳無用賢聖唯聖人然後能去知與故循天之理故愚知處宜貴賤當而恱之建之以常無有夫無有何所能建建之以常無有則明有物之自建也澹徒暫反尹令尹喜也或云尹喜字公度老聃他甘反即老子也爲喜著書十九篇主之以太一自天地以反羣物皆各自得而巳不兼他飾斯非主之以太一邪以濡弱謙下爲表以空虚不毀萬物爲實尹曰在已無居物來則應應而不藏故功隨物去濡如朱反一音儒下遐嫁反形物自著不自是而委萬物故物形各自彰著其動水其靜鏡其應響常無情也響許丈反芴乎亡寂乎淸同焉者和得焉者失嘗全有餘付萬物使各自守故不患其守巋然而有餘獨立自足之謂巋去軌反又去反本或作魏其行身也徐而不費因民所利而行之隨四時而成之常與道理俱故無疾無費也費芳味反無爲也而巧巧者有爲以傷神器之自成故無爲者因其自生任其自成萬物各得自爲蜘蛛猶能結網則人人自有所能矣無貴於工倕也蜘音知蛛音誅倕音垂人皆求福巳獨曲全委順至理則常全故無所求福福巳足曰茍免於咎隨物故物不得咎也以深爲根理根爲太初之極不可謂之淺也大音泰以約爲紀去甚泰也去起吕反曰堅則毀矣夫至順則雖金石無堅也迕逆則雖水氣無耎也至順則全迕逆則毀斯正理也迕五故反無耎如兖反本或作濡音同銳則挫矣進躁無崖爲銳挫作卧反常寛容於物各守其分則自容有餘也不削於人全其性也可謂至極尹老聃乎古之博大眞人哉芴漠無形變化無常隨物也芴元嘉本作寂漠音莫死與生與天地並與神明徃與任化也死與音餘下同芒乎何之忽乎何適無意趣也芒乎莫剛反下同萬物畢羅莫足以歸故都任置古之道術有在於是者莊周聞其風而恱之以謬悠之荒唐之言無端崖之辭時恣縱而不儻不以觭見之也不急欲使物見其意謬悠謂忘於情實者也荒唐謂廣大無域畔者也儻丁蕩反徐敕宜反觭音羇徐起宜反以天下爲沈濁不可與莊語累於形名以莊語爲狂而不信故不與也莊語並如字郭云莊莊周也一云莊端正也一本作莊側亮反大也以巵言爲曼以重言爲眞以寓言爲廣獨與天地精神徃來而不敖倪於萬物其言通至理正當萬物之性命也巵音支敖五報反倪音詣不譴是非巳無是非故恣物而行譴遣戰反以與世俗處形羣於物其書雖瑋而連犿無傷也還與物合故無傷也瓌古回反瓌瑋竒特也連犿本亦作抃同芳反又音權又敷晚反云皆宛轉貌一云相從之貌謂與物相從不違故無傷也其辭雖參差而諔詭可觀不唯應當時之務故參差參初林反註同差初宜反下同諔尺叔反彼其充實不可以巳多所有也上與造物者遊而下與外死生無終始者爲友其於本也弘大而辟深閎而肆其於宗也可謂稠適而上遂矣雖然其應於化而解於物也其理不竭其來不蛻芒乎昧乎未之盡者莊子通以平意說已與他人無異也案其辭明爲汪汪然禹拜昌言亦何嫌乎此也而辟婢亦反閎音宏稠音調本亦作調蛻音恱徐始銳反又敕外反汪烏黃反惠施多方其書五車其道舛駁其言也不中惠施施惠子名車尺蛇反又音居舛川兖反徐尺允反駁角反中丁仲反厤物之意厤古歷字本亦作歷物之意分别歷說之曰至大無外謂之大一至小無内謂之小一司馬云無外不可一無内不可分故謂之一也天下所謂大小皆非形所謂一二非至名也至形無形至名無名無厚不可積也其大千里司馬云物言形爲有形之外爲無無形與有相爲表裏故形物之厚盡於無厚無厚與有同一體也其有厚大者其無厚亦大高因廣立有因無積則其可積因不可積者苟其可積何但千里乎天與地卑山與澤平卑如字又音婢李云以地比天則地卑於天宇宙之髙則天地皆卑天地皆卑則山與澤平矣日方中方睨物方生方死睨音詣李云睨側視也謂日方中而景巳復昊謂景方昃而無巳復没謂光方没而明巳復升凡中昃之與升没轉樞循環自相與爲前後始終無别則存亡死生與之何殊也大同而與小同異此之謂小同異萬物畢同畢異此之謂大同異同體異分故曰小同異死生禍福寒暑晝夜動靜變化衆辨莫同異之至也衆異同於一物同之至也則萬物之同異一矣堅白無不合無不離也火含隂水含陽火中之隂異於水水中之陽異於火然則水異於水火異於火至異異所同至同同所異故曰大同異南方無窮而有窮司馬云四方無窮也李云四方無窮故無四方上下皆不能處其窮㑹有窮耳一云知四方之無窮是以無無窮無窮也形不盡形色不盡色形與色相盡也知不窮知物不窮物知與物相盡也獨言南方舉一隅也今日適越而昔來智之適物物之適智形有所止智有所行智有所守形有所從故形智徃來相爲逆旅也鑒以鑒影而鑒亦有影兩鑒相鑒則重影無窮萬物入於一智而智無間萬物入於一物而物無联天在心中則身在天外心在天内則天在心外也逺而思親者徃也病而思親者來也智在物爲物物在智爲智司馬云彼日猶此日則見此猶見彼也彼猶此見則吳與越人交相見矣連環可解也司馬云夫物盡於形形盡之外則非物也連環所貫貫於無環非貫於環也兩環不相貫則雖連環故可解也我知天之中央燕之北越之南是也司馬云燕之去越有數而南北之逺無窮由無窮觀有數則燕越之間未始有分也天下無方故所在爲中循環無端故所行爲始也汜愛萬物天地一體也汜芳劒反李云日月可觀而目不可見愛出於身而所愛在物天地爲首足萬物爲五藏故肝膽之别合於一人一人之别合於一體也惠施以此爲大觀於天下而曉辯者天下之辯者相與樂之觀古亂反於天下所謂自以爲最也辯字林云辯惠也樂音洛卵有毛司馬云胎卵之生必有毛羽鷄伏鵠卵卵不爲鷄則生於鵠也毛氣成毛羽氣成羽雖胎卵未生而毛羽之性已著矣故鳶肩蜂眉感之分也龍顔虎喙威靈之氣也神以引明氣以成質質之所剋如戸牖明暗之懸以晝夜性相近習相逺則性之明遠有習於生雞三足司馬云鷄兩足所以行而非動也故行由足發動由神御今雞雖兩足須神而行故曰三足也郢有天下郢楚都也在江陵北七十里李云九州之内於宇宙之中未萬中之一分也故舉天下者以喻盡而名大夫非大若各指其所有而言其未足雖郢方千里亦可有天下也犬可以爲羊司馬云各以名物而非物也犬羊之名非犬羊也非羊可以名爲羊則犬可以名羊鄭人謂玉未理者曰璞周人謂䑕腊者亦曰璞故形在於物名在於人馬有卵李云形之所託名之所皆假耳非眞也故犬羊無定名胎卵無定形故鳥可以有胎馬可以有卵也一云小異者大同犬羊之與胎卵無分於鳥馬也丁子有尾李云夫萬物無定形形無定稱在上爲首在下爲尾世人謂右行曲波爲尾今丁子二字雖左行曲波亦是尾也火不熱司馬云木生於水火生於木木以水火以木光金寒於水而熱於火而寒相兼無窮水火之性有盡謂火水寒是偏舉也偏舉則水火寒可也一云猶金木加於人有楚痛楚痛發於人而金木非楚痛也如處水之鳥火生之蟲則火不也山出口司馬云形聲氣色合而成物律吕以聲兼形玄黃以色兼質呼於一山一山皆應一山之聲入於耳形與聲並行是山猶有口也輪不蹍地蹍本又作跈女展反司馬云地平輪圓則輪之所行者跡也目不見司馬云水中視魚必先見水光中視物必先見光魚之濡鱗非曝鱗異於曝鱗則視濡也光之曜形異於不則視見於形非見形也目不夜見非暗晝見非明有假也所以見者明也目不假光而後明無以見光故目之於物未嘗有見也指不至至不絶司馬云夫指之取物不能自至要假物故至也然假物由指不絶也一云指之取火以針刺䑕以錐故假於物指是不至也長於蛇司馬云蛇形雖長而命不久形雖短而命甚長矩不方規不可以爲圎司馬云矩雖爲方而非方規雖爲圓而非圓譬繩爲直而非直也鑿不圍枘鑿在各反枘如銳反司馬云鑿枘異質合爲一形鑿積於枘則鑿枘異圍鑿枘異圍是不相圍也飛鳥之景未嘗動也景音影司馬云鳥之蔽光猶魚之蔽水魚動蔽水而水不動鳥動影生影有光亡亡非徃生非來墨子曰影不徙也鏃矢之疾而有不行不止之時鏃子木反郭音族徐朱角反三蒼云矢鏑也則無母稱立則母名去也母甞爲駒之母故駒未嘗有母也本亦無此句一尺一本無一字捶章蘂反日取其半萬世不竭司馬云捶扙也其可析其一常存故曰萬世不竭辯者以此與惠施相應終身無窮桓團公孫龍辯者之徒桓團李云人姓名徐徒凢反飾人之心易人之意能勝人之口不能服人之心辯者之囿也有音又惠施日以其知與人之辯特與天下之辯者爲怪此其柢也柢丁計反然惠施之口談自以爲最賢曰天地其壯乎施存雄而無術天地其壯乎司馬云惠施唯以天地爲壯於巳也施存雄而無術司馬云意在勝人而無道理之術南方有人焉曰黃繚問天地所以不墜不䧟風雷霆之故人本或作畸同紀宜反李云異也繚音了本而小反云賢人也墜直反霆音廷又音挺惠施不辭而應不慮而對徧爲萬物而不休多而無巳猶以爲寡益之以怪徧音遍爲萬于僞反以反人爲實而欲以勝人爲名是以與衆不適也弱於德強於物其塗隩矣隩烏報反又李云深也謂其道深由天地之道觀惠施之能其猶一蚉一䖟之勞者也其於物也何庸蚉音文䖟孟庚反夫充一尚可曰愈貴道幾矣愈貴李云自謂所慕愈貴近於道也惠施不能以此自寧散於萬物而不厭卒以善辯爲名惜乎惠施之才駘蕩而不得逐萬物而不反是窮響以聲形與影競走也悲夫昔吾未覧莊子甞聞論者爭夫尺棰連環之意而皆云莊生之言遂以莊生爲辨者之流案此篇較評諸子至於此章則曰其道舛駁其言不中乃知道聽塗之傷實也吾意亦謂無經國體致眞所謂無用之談也然膏梁之子均之戯豫或倦於典言而能辯名祈理以宣其氣以係其思流於後世使性不邪淫不猶賢於博奕者故存而不論以貽好事也駘李音殆蕩殆者放也故蕩不得也夫音符論者力困反較音角評音病中丁仲反倦本亦作勌同思息嗣反邪以嗟反好事呼報反子玄之註論其大體眞可謂得莊生之旨矣郭生前歎膏梁之余亦晚覩貴遊之妄談斯所謂異代同風何可復言也或曰莊惠標濠梁之契發郢匠之模而云其書五車其言不中何也豈契郢匠褒國寢斤而相非之言如此之甚者也荅曰夫不失欲極有教之肆神明其言者豈得不善其辭而盡其喻乎莊生振徽音於七篇列斯文於世重言盡渉玄之路從事展有辭之叙雖談無貴辨而教無虚唱然其文易覧其趣難窺造懐而未逹者有過理之嫌祛斯之弊故大舉惠子之云辯也南華眞經卷第十
