  - {type: variant, offset: 16583, length: 0, content: '', ZTDZ: 不失其性命之情故合者不爲駢而枝者不爲跂長者不爲有餘短者不爲不足是故鳧脛雖短續之則憂鶴脛雖長斷之則悲故性長非所斷性短非所續無所去憂也意仁義其非人情乎彼仁人何其多憂也且夫駢於拇者决之則泣枝於手者齕之則啼二者或有餘於數或不足於數其於憂一也今世之仁人蒿目而憂世之患不仁之人决性命之情而饕貴富故意仁義其非人情乎自三代}
