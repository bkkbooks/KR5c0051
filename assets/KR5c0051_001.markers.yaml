  - {type: variant, offset: 10498, length: 2474, content: 知矣生者不知所以生而自生矣萬物雖異至於生不由知則未有不同者也故天下莫不芒也芒莫剛反又音亡芒芒昧也簡文云芒同也夫隨其成心而師之誰獨且無師乎夫心之足以制一身之用者謂之成心人自師其成心則人各自有師矣人各自有師故付之而自當奚必知代而心自取者有之愚者與有焉夫以成代不成非知也心自得耳故愚者亦師其成心未肯用其所謂短而舎其所謂長者也與音豫舎音捨字亦作捨下同未成乎心而有是非是今日適越而昔至也今日適越昨日何由至哉未成乎心是非何由生哉明夫是非者羣品之所不能無故至人兩順之昔至崔云昔夕也向云昔者昨日之謂也是以無有爲有無有爲有雖有神禹且不能知吾獨且柰何哉理無是非而或者以爲有此以無有爲有也或心已成雖聖人不能解故付之自若而不強知也強其丈反夫言非吹也言者有言各有所故異於吹吹如字又叱瑞反崔云吹猶籟也其所言者特未定也我以爲是而彼以爲非彼之所是我又非之故未定也未定也者由彼我之情偏果有言邪以爲有言邪然未足以有所定其未嘗有言邪以爲無言邪則㩀巳已有言其以爲異於鷇音亦有辯乎其無辯乎夫言與鷇音其致一也有辯無辯誠未可定也天下之情不必同而所言不能異故是非紛紜莫知所定鷇苦豆反李音殻司馬云鳥子欲出者也道惡乎隱而有眞僞言惡乎隱而有是非道焉不在言何隱蔽而有眞僞是非之名紛然而起惡音烏下皆同眞僞一本作眞詭崔本作眞然烏於䖍反道惡乎往而不存皆存言惡乎存而不可皆可道隱於小成言隱於榮華夫小成榮華自隱於道而道不可隱則眞僞是非者行於榮華而止於實當見於小成而滅於大全也當丁浪反後可以意求不復重出見賢遍反故有儒墨之是非以是其所非而非其所是儒墨更相是非而天下皆儒墨也故百家並起各私所見而未始出其方也更音庚欲是其所非而非其所是則莫若以明夫有是有非者儒墨之所是也無是無非者儒墨之所非也今欲是儒墨之所非而非儒墨之所是者乃欲明無是無非也欲明無是無非則莫若還以儒墨反覆相明反覆相明則所是者非是而所非者非非矣非非則無非非是則無是覆芳服反下同物無非彼物無非是物皆自是故無非是物皆相彼故無非彼無非彼則天下無是矣無非是則天下無彼矣無彼無是所以玄同也自彼則不見自知則知之故曰彼出於是是亦因彼夫物之偏也皆不見彼之所見而獨自知其所知自知其所知則自以爲是自以爲是則以彼爲非矣故曰彼出於是是亦因彼彼是相因而生者也彼是方生之也雖然方生方死方死方生方可方不可方不可方可因是因非因非因是夫死生之變猶春秋冬夏四時行耳故生死之狀雖異其於各安所遇一也今生者方自謂生爲生而死者方自謂生爲死則無生矣生者方自謂死爲死而死者方自謂死爲生則無死矣無生無死無可無不可故儒墨之辨吾所不能同也至於各冥其分吾所不能異也是以聖人不由而照之于天亦因是也夫懷豁者因天下之是非而自無是非也故不由是非之而是非無患不當者直明其天然而無所奪故也是亦彼也我亦爲彼所彼彼亦是也彼亦自以爲是彼亦一是非此亦一是非此亦自是而非彼彼亦自是而非此此與彼各有一是一非於體中也果且有彼是乎哉果且無彼是乎哉今欲謂彼爲彼而彼復自是欲謂是爲是而是復爲彼所彼故彼是有無未果定也復扶又反下同彼是莫得其偶謂之道樞偶對也彼是相對而聖人兩順之故無心者與物冥而未嘗有對於天下也此居其樞要而會其玄極以應夫無方也樞尺朱反樞要也應應對之應前注同後可以意求不復重音樞始得其環中以應無窮夫是非反覆相尋無窮故謂之環環中空矣今以是非爲環而得其中者無是無非也無是無非故能應夫是非是非無窮故應亦無窮是亦一無窮非亦一無窮也天下莫不自是而莫不相非故一是一非兩行無窮唯渉空得中者曠然無懷乗之以遊也故曰莫若以明以指喻指之非指不若以非指喻指之非指也以馬喻馬之非馬不若以非馬喻馬之非馬也天地一指也萬物一馬也夫自是而非彼彼我之常情也故以我指喻彼指則指於我指獨爲非指矣此以指喻指之非指也若覆以彼指還喻我指則我指於彼指復爲非指矣此以非指喻指之非指也將明無是無非莫若反覆相喻反覆相喻則彼之與我旣同於自是又均於相非均於相非則天下無是同於自是則天下無非何以明其然邪是若果是則天下不得復有非之者也非若果非亦不得復有是之者也今是非無主紛然殽亂明此區區者各信其偏見而同於二致耳仰觀俯察莫不皆然是以至人知天地一指也萬物一馬也故浩然大寧而天地萬物各當其分同於自得而無是無非也天地一指也萬物一馬也崔云指百體之一體馬萬物之一物浩戶老反可乎可可於巳者即謂之可不可乎不可不可於巳者即謂之不可道行之而成無不成也物謂之而然無不然也惡乎然然於然惡乎不然不然於不然物固有所然物固有所可各然其所然各可其所可無物不然無物不可故爲是舉莛與楹厲與西施恢恑憰怪道通爲一夫莛横而楹縱厲醜而西施好所謂齊者豈必齊形狀同䂓矩哉故舉縱横好醜恢恑憰怪各然其所然各可其所可則形雖萬殊而性同得故曰道通爲一也無物不然無物不可崔本此下更有可於可而不可於不可不可於不可而可於可爲于僞反下爲是皆同莛徐音庭李音挺司馬云屋梁也楹音盈司馬云屋柱也厲如字惡也李音賴司馬云病西施司馬云夏也案勾踐所獻吳王美女也恢徐苦回反大也郭苦虺反簡文本作弔恑九委反徐九彼反李云戾也橘怪音决李云橘也怪異也縱本亦作從形容反其分也成也夫物或此以爲散而彼以爲成分如字其成也毀也我之所謂成而彼或謂之毀凡物無成與毀復通爲一夫成毀者生於自見而不見彼也故無成與毀猶無是與非也復扶又反唯逹者知通爲一爲是不用而寓諸庸庸也者用也用也者通也通也者得也夫逹者無滯於一方故忽然自忘而當於自用自用者莫不條暢而自得也適得而幾矣幾盡也至理盡於自得也幾音機盡也下同徐具衣反因是已逹者因而不作已而不知其然謂之道夫逹者之因是豈知因爲善而因之哉不知所以因而自因耳故謂之道也謂之道向郭絶句崔讀謂之道勞云因自然是道之功也勞神明爲一而不知其同也謂之朝三何謂朝三曰狙公賦芧曰朝三而莫四衆狙皆怒曰然則朝四而莫三衆狙皆恱名實未虧而喜怒爲用亦因是也夫逹者之於一豈勞神哉若勞神明於爲一不足賴也與彼不一者無以異矣亦同衆狙之或因所好而自是也狙公七徐反又緇慮反司馬云狙公典狙官也崔云養猨狙者也李云老狙也廣雅云狙獮猴芧音序徐食汝反李音予司馬云橡子也朝三莫四司馬云朝三升莫四升也好呼報反下文皆同是以聖人和之以是非而休乎天鈞莫之偏任故付之自均而止也鈞本又作均崔云鈞陶鈞也是之謂兩行任天下之是非古之人其知有所至矣惡乎至有, ZTDZ: ''}
