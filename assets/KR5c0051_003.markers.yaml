  - {type: variant, offset: 6043, length: 386, content: 之哉俄而子來有病喘喘然將死其妻子環而泣之犁往問之曰叱避無怛化夫死生猶寤寐耳於理當寐不願人驚之將化而叱無爲怛之也喘喘川轉反又尺軟反崔本作惴惴環如字徐音患李云繞也叱昌失反怛才逹反崔本作靼音怛案怛驚也鄭玄注周禮考工記不能驚怛是也倚其戸與之語曰偉哉造化又將奚以汝爲將奚以汝適以汝爲䑕肝乎以汝爲蟲臂乎子來曰父母於子東西南北唯命之從隂陽於人不翅於父母自古或有能違父母之命者未有能違隂陽之變而距晝夜之節者也倚於綺反䑕肝向云委弃土壤而巳王云取微蔑至賤臂亦作腸崔本同翅徐詩知反彼近吾死而我不聽我則悍矣彼何罪焉死生猶晝夜耳未足爲逺也時當死亦非所禁而橫有不聽之則適足捍逆於理以速其死其死之速由於我悍非死之罪也彼謂死耳在生故以死爲彼彼近如字悍本亦作捍胡旦反又音于文云持抵也夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也理常俱也今大冶鑄金金踊躍曰我且必爲鏌鋣大冶必以爲不祥之金今一犯, ZTDZ: ''}
