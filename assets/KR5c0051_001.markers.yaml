  - {type: variant, offset: 15659, length: 269, content: 未弘故聽朝而不怡也將寄明齊一之理於大聖故發自怪之問以起對也膾徐古外反胥息徐反華胥國敖徐五高反司馬云宗膾胥敖三國名也崔云宗一也膾二也胥敖三也朝直遥反舜曰夫三子者猶存乎蓬艾之間夫物之所安無陋也則蓬艾乃三子之妙處也處昌慮反若不釋然何哉昔者十日並出萬物皆照夫重明登天六合倶照無有蓬艾而不光也重直龍反皮反而況德之進乎日者乎夫日月雖無私於照猶有所不及德則無不得也而今欲奪蓬艾之願而伐使從巳於至道豈弘哉故不釋然神解耳若乃物暢其性各安其所安無逺近幽深付之自若皆得其極則彼無不當而我無不怡也解音蟹齧缺問乎王倪曰子知物之所同是乎曰吾惡乎知之所同未必是所異不獨, ZTDZ: ''}
