body:
  text: 外篇達生第十九達生之情者不務生之所無以爲達命之情者不務知之所無奈何養形必先之以物物有餘而形不養者有之矣有生必先無離形形不離而生亡者有之矣生之來不能却其去不能止悲夫世之人以爲養形足以存生而養形果不足以存生則世奚足爲哉雖不足爲而不可不爲者其爲不免矣夫欲免爲形者莫如弃世棄世則無累無累則正平正平則與彼更生更生則幾矣事奚足弃而生奚足遺弃事則形不勞遺生則精不虧夫形全精復與天爲一天地者萬物之父母也合則成體散則成始形精不虧是謂能移精而又精反以相天子列子問關尹曰至人潜行不窒蹈火不熱行乎萬物之上而不慄請問何以至於此關尹曰是純氣之守也非知巧果敢之列居予語汝凡有貌象聲色者皆物也物與物何以相遠夫奚足以至乎先是色而已則物之造乎不形而止乎無所化夫得是而窮之者物焉得而止焉彼將處乎不淫之度而藏乎無端之紀遊乎萬物之所終始壹其性養其氣合其德以通乎物之所造夫若是者其天守全其神無郤物奚自入焉夫醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也乘亦不知也墜亦不知也死生驚懼不入乎其胸中是故選物而不慴彼得全於酒而猶若是而沉得全於天乎聖人藏於天故莫之能傷也復讎者不折鏌干雖有忮心者不怨飄瓦是以天下均平故無攻戰之亂無殺戮之刑者由此道也不開人之天而開天之天開天者德生開人者賊生不厭其天不忽於人民幾乎以其眞仲尼適楚出於林中見痀僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月累丸二而不墜則失者錙銖累三而不墜則失者十一累五而不墜猶掇之也吾處身也若橛株拘吾執臂也若槁木之技雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何爲而不得孔子顧謂弟子曰用志不分乃凝於神其痀僂文人之謂乎顔淵問仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學邪曰可善游者數能若乃夫没人則未嘗見舟而便操之也吾問焉而不吾告敢問何謂也仲尼曰善游者數能忘水也若乃夫没人之未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車却也覆却萬方陳乎前而不得入其舍惡往而不暇以瓦注者巧以鉤注者憚以黄金注者殙其巧一也而有所矜則重外也凡外重者内拙田開之見周威公威公曰吾聞祝腎學生吾子與祝腎遊亦何聞焉田開之曰閑之操拔篲以侍門庭亦何聞於夫子威公曰田子無讓寡人願聞之開之曰聞之夫子曰善養生者若牧羊然視其後者而鞭之威公曰何謂也田開之曰魯有單豹者巖居而水飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之有張毅者高門縣薄無不走也行年四十而有内熱之病以死豹養其内而虎食其外毅養其外而病攻其内此二子者皆不鞭其後者也仲尼曰無入而藏無出而陽柴立其中央三者若得其名必極夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎人之所取畏者袵席之上飲食之間而不知爲之戒者過也祝宗人玄端以臨牢筴說彘曰汝奚惡死吾將三月㹖汝十日戒三日齊藉白茅加汝肩尻乎彫俎之上則汝爲之乎爲彘謀曰不如食以糠糟而錯之牢筴之中自爲謀則荀生有軒冕之尊死得於腞楯之上聚僂之中則爲之爲彘謀則去之自爲謀則取之所異彘者何也桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父何見對曰臣無所見公反誒詒爲病數日不出齊士有里子告敖者曰公則自傷鬼惡能傷公夫忿滀之氣散而不反則爲不足上而不下則使人善怒下而不上則使人善忘不上不下中身當心則爲病桓公曰然則有鬼乎曰有沈有履竈有髻户内之煩壤雷霆處之東北方之下者倍阿鮭蠪躍之西北方之下者則泆陽處之水有罔象丘有崒山有夔野有方皇澤有委蛇公曰請問委蛇之狀何如皇子曰委蛇其大如轂其長如轅紫衣而朱冠其爲物也惡聞雷車之聲則捧其首而立見之者殆乎霸桓公辴然而笑曰此寡人之所見者也於是正衣冠與之坐不終日而不知病之去也紀渻子爲王養鬭雞十日而問雞已乎曰未也方虚憍而恃氣十日又問曰未也猶應嚮景十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者已無變矣望之似木雞矣其德全矣異雞無敢應者反走矣孔子觀於吕梁縣水三十仞流沫四十里黿鼉魚鼈之所不能游也見一丈夫游之以爲有苦而欲死也使弟子並流而拯之數百步而出被髮行歌而游於塘下孔子從而問焉曰吾以子爲鬼察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齊俱入與汩偕出從水之道而不爲私焉此吾所以蹈之也孔子曰何謂始乎故長乎性成乎命曰吾生於陵而安於陵故也長於水而安於水性也不知吾所以然而然命也梓慶削木爲鐻鐻成見者驚猶鬼神魯侯見而問焉曰子何術以爲焉對曰臣工人何術之有雖然有一焉臣將爲鐻未嘗敢以耗氣也必齊以靜心齊三日而不敢懷慶賞爵禄齊五日不敢懷非譽巧拙齊七日輒然忘吾有四枝形體也當是時也無公朝其巧專而外滑消然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然則已則以天合天器之所以疑神者其是與東野稷以御見莊公進退中繩左右旋中規莊公以爲文弗過也使之鉤百而反顔闔遇之人見曰稷之馬將敗公密而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗工倕旋而蓋規矩指與物化而不以心稽故其靈臺一而不桎忘足履之適也忘要帶之適也知忘是非心之適也不内變不外從事會之適也始乎適而未嘗不適者忘適之適也有孫休者踵門而詫子扁慶子曰休居鄕不見謂不修臨難不見謂不勇然而田原不遇歲事君不遇世賔於鄕里逐於州部則胡罪乎天哉休惡遇此命也扁子曰子獨不聞夫至人之自行邪忘其肝膽遺其耳目芒然彷徨乎塵垢之外逍遥乎無事之業是謂爲而不恃長而不宰今汝飾知以驚愚修身以明汙昭昭乎若揭日月而行也汝得全而形軀具而九竅無中道天於聾盲跛蹇而比於人數亦幸矣又何暇乎天之怨哉子往矣孫子出扁子入坐有間仰天而歎弟子問曰先生何爲歎乎扁子曰向者休來吾告之以至人之德吾恐其驚而遂至於惑也弟子曰不然孫子之所言是邪先生之所言非邪非固不能惑是孫子所言非邪先生所言是邪彼固惑而來矣又奚罪焉扁子曰不然昔者有爲止於魯郊魯君悦之爲具太牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己養養鳥也若夫以鳥養養鳥者宜棲之深林浮之江湖食之以委蛇則平陸而已矣今休款啓寡聞之民也吾告以至人之德譬之若載鼷以車馬樂鴳以鐘鼓也彼又惡能無驚乎哉外篇山木第二十莊子行於山中見大木枝葉盛茂伐木者止其旁而不取也問其故曰無所可用莊子曰此木以不材得終其天年夫子出於山舍於故人之家故人喜命竪子殺鴈而烹之竪子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生將何處莊子笑曰周將處夫材與不材之間材與不材之間似之而非也故未免乎累若夫乘道德而浮遊則不然無譽無訾一龍一蛇與時俱化而無肯專爲一上一下以和爲量浮遊乎萬物之祖物物而不物於物則胡可得而累邪此神農黄帝之法則也若夫萬物之情人倫之傳則不然合則離成則毁廉則挫尊則議有爲則虧賢則謀不肖則欺故可得而必乎哉悲夫弟子志之其唯道德之鄕乎市南宜僚見魯侯魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先王之道修先君之業吾敬鬼尊賢親而行之無須史離居然不免於患吾是以憂市南子曰君之除患之術淺矣夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥䟽於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮爲之灾也今魯國獨非君之皮邪吾願君刳形去皮灑心去欲而遊於無人之野南越有邑焉名爲建德之國其民愚而朴少私而寡欲知作而不知藏與而不求其報不知義之所適不知禮之所將猖狂妄行乃蹈乎大方其生可樂其死可葬吾願君去國捐俗與道相輔而行君曰彼其道遠而險又有江山我無舟車奈何市南子曰君無形倨無留居以爲君車君曰彼其道幽遠而無人吾誰與爲鄰吾無糧我無食安得而至焉市南子曰少君之費寡君之欲雖無糧而乃足君其涉於江而浮於海望之而不見其崖愈往而不知其所窮送君者皆自崖而反君自此遠矣故有人者累見有於人者憂故堯非有人非見有於人也吾願去君之累除君之憂而獨與道遊於大莫之國方舟而濟於河有虚舡來觸舟雖有褊心之人不怒有一人在其上則呼張歙之一呼而不聞再呼而不聞於是三呼邪則必以惡聲隨之向也不怒而今也怒向也虚而今也實人能虚己以遊世其孰能害之北宫奢爲衛靈公賦斂以爲鍾爲壇乎郭門之外三月而成土下之縣王子慶忌見而問焉曰子何術之設奢曰一之間無敢設也奢聞之旣彫旣琢復歸於朴侗乎其無識儻乎其怠疑萃乎芒乎其送往而迎來來者勿禁往者勿止從其强梁隨其曲傳因其自窮故朝夕賦斂而毫毛不挫而況有大塗者乎孔子圍於陳蔡之間七日不火食太公任往弔之曰子幾死乎曰然子惡死乎曰然任曰子嘗言不死之道東海有鳥焉其名曰意怠其爲鳥也翂翂翐翐而似無能引援而飛迫脅而棲進不敢爲前退不敢爲後食不敢先嘗必取其緒是故其行列不斥而外人卒不得害是以免於患直木先伐甘井先竭子其意者飾知以驚愚修身以明汙昭昭乎如揭日月而行故不免也昔吾聞之大成之人曰自伐者無功功成者隳名成者虧孰能去功與名而還與衆人道流而不明居得行而不名處純純常常乃比於狂削迹捐勢不爲功名是故無責於人人亦無責焉至人不聞子何喜哉孔子曰善哉辭其交遊去其弟子逃於大澤衣裘褐食杼栗入獸不亂群入鳥不亂行鳥獸不惡而況人乎孔子問子桑雩曰吾再逐於魯伐樹於宋削迹於衛窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與子桑雩曰子獨不聞假人之亡與林回棄千金之璧負赤子而趨或曰爲其布與赤子之布寡矣爲其累與赤子之累多矣棄千金之璧負赤子而趨何也林回曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦遠矣且君子之交淡若水小人之交甘若醴君子淡以親小人甘以絶彼無故以合者則無故以離孔子曰敬聞命矣徐行翔佯而歸絶學捐書弟子無挹於前其愛益加進異日桑雩又曰舜之將死眞冷禹曰汝戒之哉形莫若縁情莫若率縁則不離率則不勞不離不勞則不求文以待形不求文以待形固不待物莊子衣大布而補之正縻係履而過魏王魏王曰何先生之憊邪莊子曰貧也非憊也士有道德不能行憊也衣弊履穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬蔓其枝而王長其間雖羿逄蒙不能睥睨也及其得柘棘枳枸之間也危行側視振動悼慄此筋骨非有加急而不柔也處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得邪此比干之見剖心徵也夫孔子窮於陳蔡之間七日不火食左據槁木右擊槁枝而歌猋氏之風有其具而無其數有其聲而無宫角木聲與人聲犁然有當於人之心顔回端拱還目而窺之仲尼恐其廣己而造大也愛己而造哀也曰回無受天損易無受人益難無始而非卒也人與天一也夫今之歌者其誰乎回曰敢問無受天損易仲尼曰飢渴寒暑窮桎不行天地之行也運物之泄也言與之偕逝之謂也爲人臣者不敢去之執臣之道猶若是而況乎所以待天乎何謂無受人益難仲尼曰始用四達爵禄並至而不窮物之所利乃非己也吾命其在外者也君子不爲盜賢人不爲竊吾若取之何哉故曰島莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走其畏人也而襲諸人間社稷存焉爾何謂無始而非卒仲尼曰化其萬物而不知其禪之者焉知其所終焉知其所始正而待之而已耳何謂人與天一邪仲尼曰有人天也有天亦天也人之不能有天性也聖人晏然體逝而終矣莊周遊乎雕陵之樊覩一異鵲自南方來者翼廣七尺目大運寸感周之顙而集於栗林莊周曰此何鳥哉翼殷不逝目大不覩褰裳躍步執彈而留之覩一蟬方得美蔭而忘其身螳蜋執翳而搏之見得而忘其形異鵲從而利之見利而忘其眞莊周怵然曰噫物固相累二類相召也捐彈而反走虞人逐而誶之莊周反入三月不庭蘭且從而問之夫子何爲頃間甚不庭乎莊周曰吾守形而忘身觀於濁水而迷於清淵且吾聞諸夫子曰入其俗從其俗今吾遊於雕陵而忘吾身異鵲感吾顙遊於栗林而忘眞栗林虞人以吾爲戮吾所以不庭也陽子之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也陽子曰弟子記之行賢而去自賢之行安往而不愛哉外篇田子方第二十一田子方侍坐於魏丈侯數稱谿工文侯曰谿工子之師邪子方曰非也無擇之里人也稱道數當故無擇稱之文侯曰然則子無師邪子方曰有曰子之師誰邪子方曰東郭順子文侯曰然則夫子何故未嘗稱之子方曰其爲人也眞人貌而天虚縁而葆眞清而容物物無道正容以悟之使人之意也消無擇何足以稱之子方出文侯儻然終日不言召前立臣而語之曰遠矣全德之君子始吾以聖知之言仁義之行爲至矣吾聞子方之師吾形解而不欲動口鉗而不欲言吾所學者眞土梗耳夫魏眞爲我累耳温伯雪子適齊舍魯魯人有請見之者温伯雪子曰不可吾聞中國之君子明乎禮義而陋於知人心吾不欲見也至於齊反舍於魯是人也又請見温伯雪子曰往也蘄見我今也又蘄見我是必有以振我也出而見客入而歎明日見客又入而歎其僕曰每見之客也必入而歎何邪曰吾固告子矣中國之民明乎禮義而陋乎知人心昔之見我者進退一成規一成矩從容一若龍一若虎其諫我也似子其道我也似父是以歎也仲尼見之而不言子路曰吾子欲見温伯雪子乆矣見之而不言何邪仲尼曰若夫人者目擊而道存矣亦不可以容聲矣顔淵問於仲尼曰夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而回瞠若乎後矣夫子曰回何謂邪曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辯亦辯也夫子馳亦馳也夫子言道回亦言道也及奔逸絶塵而回瞠若乎後者夫子不言而信不比而周無器而民蹈乎前而不知所以然而已矣仲尼曰惡可不察與夫哀莫大於心死而人死亦次之日出東方而入於西極萬物莫不比方有目有趾者待是而後成功是出則存是入則亡萬物亦然有待也而死有待也而生吾一受其成形而不化以待盡效物而動日夜無隙而不知其所終薰然其成形知命不能規乎其前丘以是日徂吾終身與汝交一臂而失之可不哀與汝殆著乎吾所以著也彼已盡矣而汝求之以爲有是求馬於唐肆也吾服汝也甚忘汝服吾也亦甚忘雖然汝奚患焉雖忘乎故吾吾有不忘者存孔子見老聃老聃新沐方將被髮而乾慹然似非人孔子便而待之少焉見曰丘也眩與其信然與向者先生形體掘若槁木似遺物離人而立於獨也老聃曰吾遊心於物之初孔子曰何謂邪曰心困焉而不能知口辟焉而不能言嘗爲汝議乎其將至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉或爲之紀而莫見其形消息滿虚一晦一明日改月化日有所爲而莫見其功生有所乎萌死有所乎歸始終相反乎無端而莫知乎其所窮非是也且孰爲之宗孔子曰請問遊是老聃曰夫得是至美至樂也得至美而遊乎至樂謂之至人孔子曰願聞其方曰草食之獸不疾易藪水生之蟲不疾易水行少變而不失其大常也喜怒哀樂不入於胸次夫天下也者萬物之所一也得其所一而同焉則四支百體將爲塵垢而死生終始將爲晝夜而莫之能滑而況得喪禍福之所介乎棄隸者若棄泥塗知身貴於隸也貴在於我而不失於變且萬化而未始有極也夫孰足以患心已爲道者解乎此孔子曰夫子德配天地而猶假至言以修心古之君子孰能脱焉老聃曰不然夫水之於汋也無爲而才自然矣至人之於德也不修而物不能離焉若天之自高地之自厚日月之自明夫何修焉孔子出以告顔回曰丘之於道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也莊山見魯哀公哀公曰魯多儒士少爲先生方者莊子曰魯少儒哀公曰舉魯國而儒服何謂少乎莊子曰周聞之儒者冠圜冠者知天時履方履者知地形緩佩玦者事至而斷君子有其道者未必爲其服也爲其服者未必知其道也公固以爲不然何不號於國中曰無此道而爲此服者其罪死於是哀公號之五日而魯國無敢儒服者獨有一丈夫儒服而立乎公門公即召而問以國事千轉萬變而不窮莊子曰以魯國而儒者一人耳可謂多乎百里奚爵禄不入於心故飯牛而牛肥使秦穆公忘其賤與之政也有虞氏死生不入於心故足以動人宋元君將畫圖衆史皆至受揖而立舐筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣槃礴贏君曰可矣是眞畫者也文王觀於臧見一丈夫釣而其釣莫釣非持其釣有釣者也常釣也文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之無天也於是旦而屬之大夫曰昔者寡人夢見良人黑色而𩑺乘駁馬而偏朱蹄號曰寓而政於臧丈人庶幾乎民有廖乎諸大夫蹴然曰先君王也文王曰然則卜之諸大夫曰先君之命王其無他又何卜焉遂迎臧丈人而授之政典法無更偏令無出三年文王觀於國則列士壞植散群長官者不成德螤斛不敢入於四境列士壞植散群則尚同也長官者不成德則同務也螤斛不敢入於四境則諸侯無二心也文王於是焉以爲大師北面而問曰政可以及天下乎臧丈人昧然而不應泛然而辭朝令而夜遁終身無聞顔淵問於仲尼曰文王其猶未邪又何以夢爲乎仲尼曰默汝無言夫文王盡之也而又何論刺焉彼直以循斯須也列御寇爲伯昏無人射引之盈貫措杯水其肘上發之適矢復沓方矢復寓當是時猶象人也伯昏無人曰是射之射也非不射之射也嘗與汝登高山履危石臨百仞之淵若能射乎於是無人遂登高山履危石臨百仞之淵背逡巡足二分垂在外揖御寇而進之御寇伏地汗流至踵伯昏無人曰夫至人者上闚青天下潜黄泉揮斥八極神氣不變今汝怵然有恂目之志爾於中也殆矣夫肩吾問於孫叔敖曰子三爲令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨柰何孫叔敖曰吾何以過人哉吾以其來不可却也其去不可止也吾以爲得失之非我也而無憂色而已矣我何以過人哉且不知其在彼乎其在我乎其在彼邪亡乎我在我邪亡乎彼方將躊躇方將四顧何暇至乎人貴人賤哉仲尼聞之曰古之眞人知者不得說美人不得濫盜人不得劫伏戲黄帝不得友死生亦大矣而無變乎己况爵禄乎若然者其神經乎大山而無介入乎淵泉而不濡處卑細而不憊充滿天地旣以與人己愈有楚王與凡君坐少焉楚王左右曰凡亡者三凡君曰凡之亡也不足以喪吾存夫凡之亡不足以喪吾存則楚之存不足以存存由是觀之則凡未始亡而楚未始存也外篇知北遊第二十二知北遊於玄水之上登隱弅之丘而適遭無爲謂焉知謂無爲謂曰予欲有問乎若何思何慮則知道何處何服則安道何從何道則得道三問而無爲謂不答也非不答不知答也知不得問反於白水之南登狐闋之上而覩狂屈焉知以之言也問乎狂屈狂屈曰唉予知之將語若中欲言而忘其所欲言知不得問反於帝宫見黄帝而問焉黄帝曰無思無慮始知道無處無服始安道無從無道始得道知問黄帝曰我與若知之彼與彼不知也其孰是耶黄帝曰彼無爲謂眞是也狂屈似之我與汝終不近也夫知者不言言者不知故聖人行不言之教道不可致德不可至仁可爲也義可虧也禮相僞也故曰失道而後德失德而後仁失仁而後義失義而後禮禮者道之華而亂之首也故曰爲道者日損損之又損之以至於無爲無爲而無不爲也今已爲物也欲復歸根不亦難乎其易也其唯大人乎生者死之徒死者生之始孰知其紀人之生氣之聚也聚則爲生散則爲死若死生爲徒吾又何患故萬物一也是其所美者爲神奇其所惡者爲臭腐臭腐復化爲神奇神奇復化爲臭腐故曰通天下一氣耳聖人故貴一知謂黄帝曰吾問無爲謂無爲謂不應我非不我應不知應我也吾問狂屈狂屈中欲告我而不我告非不我告中欲告而忘之也今予問乎若若知之奚故不近黄帝曰彼其眞是也以其不知也此其似之也以其忘之也予與若終不近也以其知之也狂屈聞之以黄帝爲知言天地有大美而不言四時有明法而不議萬物有成理而不說聖人者原天地之美而達萬物之理是故至人無爲大聖不作觀於天地之謂也今彼神明至精與彼百化物已死生方圓莫知其根也扁然而萬物自古以固存六合爲巨未離其内秋豪爲小侍之在體天下莫不沈浮終身不故陰陽四時運行各得其序惛然若亡而存油然不形而神萬物畜而不知此之謂本根可以觀於天矣齧缺問道乎被衣被衣曰若正汝形一汝視天和將至攝汝知一汝度神將來舍德將爲汝美道將爲汝居汝瞳焉如新生之犢而無求其故言未卒齧缺睡寐被衣大悅行歌而去之曰形若槁骸心若死灰眞其實知不以故自持媒媒晦晦無心而不可與謀彼何人哉舜問乎丞曰道可得而有乎曰汝身非汝有也汝何得有夫道舜曰吾身非吾有也孰有之哉曰是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也孫子非汝有是天地之委蜕也故行不知所往處不知所持食不知所味天地之彊陽氣也又胡可得而有邪孔子問於老聃曰今日晏間敢問至道老聃曰汝齋戒疏淪而心澡雪而精神掊擊而知夫道窅然難言哉將爲汝言其崖略夫昭昭生於冥冥有倫生於無形精神生於道形本生於精而萬物以形相生故九竅者胎生八竅者卵生其來無迹其往無崖無門無房四達之皇皇也邀於此者四枝彊思慮恂達耳目聰明其用心不勞其應物無方天不得不高地不得不廣日月不得不行萬物不得不昌此其道與且夫博之不必知辯之不必慧聖人以斷之矣若夫益之而不加益損之而不加損者聖人之所保也淵淵乎其若海巍巍乎其終則復始也運量萬物而不匱則君子之道彼其外與萬物皆往資焉而不匱此其道與中國有人焉非陰非陽處於天地之間直且爲人將反於宗自本觀之生者喑醷物也雖有壽夭相去幾何須臾之說也奚足以爲堯桀之是非果蓏有理人倫雖難所以相齒聖人遭之而不違過之而不守調而應之德也偶而應之道也帝之所與王之所起也人生天地之間若白駒之過郤忽然而已注然勃然莫不出焉油然漻然莫不入焉已化而生又化而死生物哀之人類悲之解其天弢墮其天𧙍紛乎宛乎魂魄將往乃身從之乃大歸乎不形之形形之不形是人之所同知也非將至之所務也此衆人之所同論也彼至則不論論則不至明見無值辯不若默道不可聞聞不若塞此之謂大得東郭子問於莊子曰所謂道惡乎在莊子曰無所不在東郭子曰期而後可莊子曰在螻蟻曰何其下邪曰在稊稗曰何其愈下邪曰在瓦甓曰何其愈甚邪曰在屎溺東郭子不應莊子曰夫子之問也固不及質正獲之問於監市履狶也每下愈況汝唯莫必無乎逃物至道若是大言亦然周徧咸三者異名同實其指一也嘗相與游乎無何有之宫同合而論無所終窮乎嘗相與無爲乎澹而靜乎漠而清乎調而間乎寥已吾志無往焉而不知其所至去而來而不知其所止吾已往來焉而不知其所終仿徨乎嗎閎大知入焉而不知其所窮物物者與物無際而物有際者所謂物際者也不際之際際之不際者也謂盈虚衰殺彼爲盈虚非盈虚彼爲衰殺非衰殺彼爲本末非本末彼爲積散非積散也妸荷甘與神農同學於老龍吉神農隱几闔户晝瞑妸荷甘日中多户而入曰老龍死矣神農隱几擁杖而起嚗然放杖而笑曰天知予僻陋慢訑故棄予而死已矣夫子無所發予之狂言而死矣夫弇堈弔聞之曰夫體道者天下之君子所擊焉今於道秋豪之端萬分未得處一焉而猶知藏其狂言而死又況夫體道者乎視之無形聽之無聲於人之論者謂之㝠㝠所以論道而非道也於是泰清問乎無窮曰子知道乎無窮曰吾不知又問乎無爲無爲曰吾知道曰子之知道亦有數乎曰有曰其數若何無爲曰吾知道之可以貴可以賤可以約可以散此吾所以知道之數也泰清以之言也問乎無始曰若是則無窮之弗知與無爲之知孰是而孰非乎無始曰不知深矣知之淺矣弗知内矣知之外矣於是泰清中而歎曰弗知乃知乎知乃不知乎孰知不知之知無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也知形形之不形乎道不當名無始曰有問道而應之者不知道也雖問道者亦未聞道道無問問無應無問問之是問窮也無應應之是無内也以無内待問窮若是者外不觀乎宇宙内不知乎大初是以不過乎崑崙不遊乎太虚光曜問乎無有曰夫子有乎其無有乎光曜不得問而孰視其狀貌窅然空然終日視之而不見聽之而不聞搏之而不得也光曜曰至矣其孰能至此乎予能有無矣而未能無無也及爲無有矣何從至此哉大馬之捶鉤者年八十矣而不失豪芒大馬曰子巧與有道與曰臣有守也臣之年二十而好捶鉤於物無視也非鉤無察也是用之者假不用者也以長得其用而況乎無不用者乎物孰不資焉冉求問於仲尼曰未有天地可知邪仲尼曰可古猶今也冉求失問而退明日復見曰昔者吾問未有天地可知乎夫子曰可古猶今也昔日吾照然今日吾昧然敢問何謂也仲尼曰昔之昭然也神者先受之今之昧然也且又爲不神者求邪無古無今無始無終未有子孫而有子孫可乎冉求未對仲尼曰已矣未應矣不以生生死不以死死生死生有待邪皆有所一體有先天地生者物邪物物者非物物出不得先物也猶其有物也無已聖人之愛人也終無已者亦乃取於是者也顔淵問乎仲尼曰回嘗聞諸夫子曰無有所將無有所迎回敢問其遊仲尼曰古之人外化而内不化今之人内化而外不化與物化者一不化者也安化安不化安與之相靡必與之莫多狶韋氏之囿黄帝之圃有虞氏之宫湯武之室君子之人若儒墨者師故以是非相𩐎也而況今之人乎聖人處物不傷物不傷物者物亦不能傷也唯無所傷者爲能與人相將迎山林與臯壤與使我欣欣然而樂與樂未畢也哀又繼之哀樂之來吾不能禦其去弗能止悲夫世人直爲物逆旅耳夫知遇而不知所不遇知能能而不能所不能無知無能者固人之所不免也夫務免乎人之所不免者豈不亦悲哉至言去言至爲去爲齊知之所知則淺矣雜篇庚桑楚第二十三老聃之役有庚桑楚者偏得老聃之道以北居畏壘之山其臣之畫然知者去之其妾之絜然仁者遠之擁腫之與居鞅掌之爲使居三年畏壘大穰畏壘之民相與言曰庚桑子之始來吾洒然異之今吾日計之而不足歳計之而有餘庶幾其聖人乎子胡不相與尸而祝之杜而稷之乎庚桑子聞之南面而不釋然弟子異之庚桑子曰弟子何異於予夫春氣發而百草生正得秋而萬寳成夫春與秋豈無得而然哉天道已行矣吾聞至人尸居環堵之室而百姓猖狂不知所如往今以畏壘之細民而竊竊焉欲俎豆予于賢人之間我其杓之人邪吾是以不釋於老聃之言弟子曰不然夫尋常之溝巨魚無所還其體而鯢鰌爲之制步仞之丘陵巨獸無所隱其軀而㜸狐爲之祥且夫尊賢授能先善與利自古堯舜以然而況畏壘之民乎夫子亦聽矣庚桑子曰小子來夫函車之獸介而離山則不免于罔罟之患吞舟之魚碭而失水則蟻能苦之故鳥獸不厭高魚鼈不厭深夫全其形生之人藏其身也不厭深眇而已矣且夫二子者又何足以稱揚哉是其於辯也將妄鑿垣墻而殖蓬蒿也簡髮而櫛數米而炊竊竊乎又何足以濟世哉舉賢則民相軋任知則民相盜之數物者不足以厚民民之於利甚勤子有殺父臣有殺君正晝爲盜日中穴阫吾語汝大亂之本必生于堯舜之間其末存乎千世之後千世之後其必有人與人相食者也南榮趎蹴然正坐曰若趎之年者已長矣將惡乎託業以及此言邪庚桑子曰全汝形抱汝生無使汝思慮營營若此三年則可以及此言也南榮趎曰目之與形吾不知其異也而盲者不能自見耳之與形吾不知其異也而聾者不能自聞心之與形吾不知其異也而狂者不能自得形之與形亦辟矣而物或間之邪欲相求而不能相得今謂趎曰全汝形抱汝生勿使汝思慮營營趎勉聞道達耳矣庚桑子曰辭盡矣曰奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣雞之與雞其德非不同也有能與不能者其才固有巨小也今吾才小不足以化子子胡不南見老子南榮趎赢糧七日七夜至老子之所老子曰子自楚之所來乎南榮趎曰唯老子曰子何與人偕來之衆也南榮趎懼然顧其後老子曰子不知吾所謂乎南榮趎俯而慚仰而歎曰今者吾忘吾答因失吾問老子曰何謂也南榮趎曰不知乎人謂我朱愚知乎反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我己我安逃此而可此三言者趎之所患也願因楚而問之老子曰向吾見若眉睫之間吾因以得汝矣今汝又言而信之若規規然若喪父母揭竿而求諸海也汝亡人哉惘惘乎汝欲反汝情性而無由入可憐哉南榮趎請入就舍召其所好去其所惡十日自愁復見老子老子曰汝自洒濯熟哉鬱鬱乎然而中津津乎猶有惡也夫外穫者不可繁而捉將内揵内穫者不可繆而捉將外揵外内穫者道德不能持而況放道而行者乎南榮趎曰里人有病里人問之病者能言其病然其病病者猶未病也若趎之聞大道譬猶飲藥以加病也趎願聞衛生之經而已矣老子曰衛生之經能抱一乎能勿失乎能無卜筮而知吉凶乎能止乎能已乎能舍諸人而求諸己乎能翛然乎能侗然乎能兒子乎兒子終日嗥而嗌不嗄和之至也終日握而手不掜共其德也終日視而目不瞚偏不在外也行不知所之居不知所爲與物委蛇而同其波是衛生之經已南榮趎曰然則是至人之德已乎曰非也是乃所謂冰解凍釋者夫至人者相與交食乎地而交樂乎天不以人物利害相攖不相與爲怪不相與爲謀不相與爲事翛然而往侗然而來是謂衛生之經已曰然則是至乎曰未也吾固告汝曰能兒子乎兒子動不知所爲行不知所之身若槁木之枝而心若死灰若是者禍亦不至福亦不來禍福無有惡有人灾也宇泰定者發乎天光發乎天光者人見其人人有修者乃今有恒有恒者人舍之天助之人之所舍謂之天民天之所助謂之天子學者學其所不能學也行者行其所不能行也辯者辯其所不能辯也知止乎其所不能知至矣若有不即是者天鈞敗之備物以將形藏不虞以生心敬中以達彼若是而萬惡至者皆天也而非人也不足以滑成不可内於靈臺靈臺者有持而不知其所持而不可持者也不見其誠己而發每發而不當業入而不舍每更爲失爲不善乎顯明之中者人得而誅之爲不善乎幽間之中者鬼得而誅之明乎人明乎鬼者然後能獨行券内者行乎無名券外者志乎期費行乎無名者唯庸有光志乎期費者唯賈人也人見其跂猶之魁然與物窮者物入焉與物且者其身之不能容焉能容人不能容人者無親無親者盡人兵莫憯于志鏌鎁爲下寇莫大於陰陽無所逃於天地之間非陰陽賊之心則使之也道通其分也其成也毁也所惡乎分者其分也以備所以惡乎備者其有以備故出而不反見其鬼出而得是謂得死滅而有實鬼之一也以有形者象無形者而定矣出無本入無竅有實而無乎處有長而無乎本剽有所出而無竅者有實有實而無乎處者宇也有長而無本剽者宙也有乎生有乎死有乎出有乎入入出而無見其形是謂天門天門者無有也萬物出乎無有有不能以有爲有必出乎無有而無有一無有聖人藏乎是古之人其知有所至矣惡乎至有以爲未始有物者至矣盡矣弗可以加矣其次以爲有物矣將以生爲喪也以死爲反也是以分已其次曰始無有旣而有生生俄而死以無有爲首以生爲體以死爲尻孰知有無死生之一守者吾與之爲友是三者雖異公族也昭景也著戴也甲氏也著封也非一也有生黬也披然曰移是嘗言移是非所言也雖然不可知者也臘者之有膍胲可散而不可散也觀室者周於寢廟又適其偃焉爲是舉移是請常言移是是以生爲本以知爲師因以乘是非果有名實因以己爲質使人以爲己節因以死償節若然者以用爲知以不用爲愚以徹爲名以窮爲辱移是今之人也是蜩與學鳩同於同也蹍市人之足則辭以放驚兄則以嫗大親則已矣故曰至禮有不人至義不物至知不謀至仁無親至信辟金徹志之勃解心之繆去德之累達道之塞貴富顯嚴名利六者勃志也容動色理氣意六者繆心也惡欲喜怒哀樂六者累德也去就取與知能六者塞道也此四六者不盪胸中則正正則靜靜則明明則虚虚則無爲而無不爲也道者德之欽也生者德之光也性者生之質也性之動謂爲之爲之僞謂之失如者接也知者謨也知者之所不知猶睨也動以不得已之謂德動無非我之謂治名相反而實相順也羿工乎中微而拙乎使人無己譽聖人工乎天而拙乎人夫工乎天而食乎人者唯全人能之唯蟲能蟲唯蟲能天全人惡天惡人之天而況吾天乎人乎一雀適羿羿必得之威也以天下爲之籠則雀無所逃是故湯以庖人籠伊尹秦穆公以五羊之皮籠百里奚是故非以其所好籠之而可得者無有也介者拸畫外非譽也胥靡登高而不懼遺死生也夫復謂不餽而忘人忘人因以爲天人矣故敬之而不喜侮之而不怒者唯同乎天和者爲然出怒不怒則怒出於不怒矣出爲無爲則爲出於無爲矣欲靜則平氣欲神則順心有爲也欲當則縁於不得已不得已之類聖人之道雜篇徐無鬼第二十四徐無鬼因女商見魏武侯武侯勞之曰先生病矣苦於山林之勞故乃肯見於寡人徐無鬼曰我則勞於君君有何勞於我君將盈嗜欲長好惡則性命之情病矣君將黜嗜欲掔好惡則耳目病矣我將勞君君有何勞於我武侯超然不對少焉徐無鬼曰嘗語君吾相狗也下之質執飽而止是狸德也中之質若視曰上之質若亡其一吾相狗又不若吾相馬也吾相馬直者中繩曲者中鉤方者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若卹若失若喪其一若是者超軼絶塵不知其所武侯大悅而笑徐無鬼出女商曰先生獨何以說吾君乎吾所以說吾君者橫說之則以詩書禮樂從說之則以金板六弢奉事而大有功者不可爲數而吾君未嘗啓齒今先生何以說吾君使吾君悅若此乎徐無鬼曰吾直告之吾相狗馬耳女商曰若是乎曰子不聞夫越之流人乎去國數日見其所知而喜去國旬月見所嘗見於國中者喜及期年也見似人者而喜矣不亦去人滋乆思人滋深乎夫逃虚空者藜藋柱乎鼪鼬之逕踉位其空聞人足音跫然而喜矣又況乎昆弟親戚之謦欬其側者乎乆矣夫莫以眞人之言謦欬吾君之側乎徐無鬼見武侯武侯曰先生居山林食芧栗厭葱韭以賔寡人乆矣夫今老邪其欲干酒肉之味邪其寡人亦有社稷之福邪徐無鬼曰無鬼生於貧賤未嘗敢飲食君之酒肉將來勞君也君曰何哉奚勞寡人曰勞君之神與形武侯曰何謂邪徐無鬼曰天地之養也一登高不可以爲長居下不可以爲短君獨爲萬乘之主以苦一國之民以養耳目鼻口夫神者不自許也夫神者好和而惡姦夫姦病也故勞之唯君所病之何也武侯曰欲見先生乆矣吾欲愛民而爲義偃兵其可乎徐無鬼曰不可愛民害民之始也爲義偃兵造兵之本也君自此爲之則殆不成凡成美惡器也君雖爲仁義幾且僞哉形固造形成固有伐變固外戰君亦必無盛鶴列於麗譙之間無徒驥於錙壇之宫無藏逆於得無以巧勝人無以謀勝人無以戰勝人夫殺人之士民兼人之土地以養吾私與吾神者其戰不知孰善勝之惡乎在君若勿已矣修胸中之誠以應天地之情而勿攖夫民死已脱矣君將惡乎用夫偃兵哉黄帝將見大隗乎具茨之山方明爲御昌㝢驂乘張若謵朋前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問塗適遇牧馬童子問塗焉曰若知具茨之山乎曰然若知大隗之所存乎曰然黄帝曰異哉小童非徒知具茨之山又知大隗之所存請問爲天下小童曰夫爲天下者亦若此而已矣又奚事焉予少而自遊於六合之内予適有瞀病有長者教予曰若乘日之車而遊於襄城之野今予病少痊予又且復遊於六合之外夫爲天下亦若此而已予又奚事焉黄帝曰夫爲天下者則誠非吾子之事雖然請問爲天下小童辭黄帝又問小童曰夫爲天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣黄帝再拜稽首稱天師而退知士無思慮之變則不樂辯士無談說之序則不樂察士無凌誶之事則不樂皆囿於物者也招世之士與朝中民之士榮官筋力之士矜難勇敢之士奮患兵革之士樂戰祜槁之士宿名法律之士廣治禮教之士敬容仁義之士貴際農夫無草萊之事則不比商賈無市井之事則不比庶人有旦暮之業則勸百工有器械之巧則壯錢財不積則貪者憂權勢不尤則夸者悲勢物之徒樂變遭時有所用不能無爲也此皆順比於歲不物於易者也馳其形性潜之萬物終身不反悲夫莊子曰射者非前期而中謂之善射天下皆羿也可乎惠子曰可莊子曰天下非有公是也而各是其所是天下皆堯也可乎惠子曰可莊子曰然則儒墨楊秉四與夫子爲五果孰是邪或者若魯遽者邪其弟子曰我得夫子之道矣吾能冬爨鼎而夏造冰矣魯遽曰是直以陽召陽以陰召陰非吾所謂道也吾示子乎吾道於是爲之調瑟廢一於堂廢一於室鼓宫宫動鼓角角動音律同矣夫或改調一絃於五音無當也鼓之二十五絃皆動未始異於聲而音之君已且若是者邪惠子曰今夫儒墨楊秉且方與我以辯相拂以辭相鎭以聲而未始吾非也則奚若矣莊子曰齊人蹢子於宋者其命閽也不以完其求鈃鍾也以束縛其求唐子也而未始出域有遺類矣夫楚人寄而蹢閽者夜半於無人之時而與舟人鬭未始離於岑而足以造於怨也莊子送葬過惠子之墓顧謂從者曰郢人堊漫其鼻端若蠅翼使匠石斲之匠石運斤成風聽而斲之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試爲寡人爲之匠石曰臣則嘗能斲之雖然臣之質死乆矣自夫子之死也吾無以爲質矣吾無與言之矣管仲有病桓公問之曰仲父之病病矣可不謂云至於大病則寡人惡乎屬國而可管仲曰公誰欲與公曰鮑叔牙曰不可其爲人絜廉善士也其於不己若者不比之又一聞人之過終身不忘使之治國上且鉤乎君下且逆乎民其得罪於君也將弗乆矣公曰然則孰可對曰勿已則隰朋可其爲人也上忘而下畔愧不若黄帝而哀不己若者以德分人謂之聖以財分人謂之賢以賢臨人未有得人者也以賢下人未有不得人者也其於國有不聞也其於家有不見也勿已則隰朋可吴王浮于江登乎狙之山衆狙見之恂然棄而走逃於深蓁有一狙焉委蛇攫搔見巧乎王王射之敏給搏捷矢王命相者趨射之狙執死顧謂其友顔不疑曰之狙也伐其巧恃其便以敖予以至此殛也戒之哉嗟乎無以汝色驕人哉顔不疑歸而師董梧以鋤其色去樂辭顯三年而國人稱之南伯子綦隱几而坐仰天而嘘顔成子入見曰夫子物之尤也形固可使若槁骸心固可使若死灰乎曰吾嘗居山穴之中矣當是時也田禾一覩我而齊國之衆三賀之我必先之彼故知之我必賣之彼故鬻之若我而不有之彼惡得而知之若我而不賣之彼惡得而鬻之嗟乎我悲人之自喪者吾又悲夫悲人之悲者其後而日遠矣仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言已曰丘也聞不言之言矣未之嘗言於此乎言之市南宜僚弄丸而兩家之難解孫叔敖甘寢秉羽而郢人投兵丘願有喙三尺彼之謂不道之道此之謂不言之辯故德總乎道之所一而言休乎知之所不知至矣道之所一者德不能同也知之所不能知者辯不能舉也名若儒墨而凶矣故海不辭東流大之至也聖人並包天地澤及天下而不知其誰氏是故生無爵死無謚實不聚名不立此之謂大人狗不以善吠爲良人不以善言爲賢而況爲大乎夫爲大不足以爲大而況爲德乎夫大備矣莫若天地然奚求焉而大備矣知大備者無求無失無棄不以物易己也反己而不窮循古而不摩大人之誠子綦有八子陳諸前召九方歅曰爲我相吾子孰爲祥九方歅曰梱也爲祥子綦瞿然喜曰奚若曰梱也將與國君同食以終其身子綦索然出涕曰吾子何爲以至於是極也九方歅曰夫與國君同食澤及三族而況父母乎今夫子聞之而泣是禦福也子則祥矣父則不祥子綦曰歅汝何足以識之而梱祥邪盡於酒肉入於鼻口矣而何足以知其所自來吾未嘗爲牧而牂生於奥未嘗好田而鶉生於宎若勿怪何邪吾所與吾子遊者遊於天地吾與之邀樂於天吾與之邀食於地吾不與之爲事不與之爲謀不與之爲怪吾與之乘天地之誠而不以物與之相攖吾與之一委蛇而不與之爲事所宜今也然有世俗之償焉凡有怪徵者必有怪行殆乎非我與吾子之罪幾天與之也吾是以泣也無幾何而使梱之於燕盜得之於道全而鬻之則難不若刖之則易於是乎刖而鬻之於齊適當渠公之街然身食肉而終齧缺遇許由曰子將奚之曰將逃堯曰奚謂邪曰夫堯畜畜然仁吾恐其爲天下笑後世其人與人相食與夫民不難聚也愛之則親利之則至譽之則勸致其所惡則散愛利出乎仁義捐仁義者寡利仁義者衆夫仁義之行唯且無誠且假夫禽貪者器是以一人之斷制利天下譬之猶一覕也夫堯知賢人之利天下也而不知其賊天下也夫唯外乎賢者知之矣有暖姝者有濡需者有卷婁者所謂暖姝者學一先生之言則暖暖姝姝而私自悅也自以爲足矣而未知未始有物也是以謂暖姝者也濡需者豕蝨是也擇疏鬛自以爲廣宫大囿奎蹄曲隈乳間股脚自以爲安室利處不知屠者之一旦鼓臂布草操煙火而己與豕俱焦也此以域進此以域退此其所謂濡需者也卷婁者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悦之故三徙成都至鄧之墟而十有萬家堯聞舜之賢舉之童土之地曰冀得其來之澤舜舉乎童土之地年齒長矣聰明衰矣而不得休歸所謂卷婁者也是以神人惡衆至衆至則不比不比則不利也故無所甚親無所甚疏抱德煬和以順天下此謂眞人於蟻棄知於魚得計於羊棄意以目視目以耳聽耳以心復心若然者其平也繩其變也循古之眞人以天待之不以人入天古之眞人得之也生失之也死得之也死失之也生藥也其實堇也桔梗也雞壅也豕零也是時爲帝者也何可勝言勾踐也以甲楯三千棲於會稽唯種也能知亡之所以存唯種也不知其身之所以愁故曰䲭目有所適鶴脛有所節解之也悲故曰風之過河也有損焉日之過河也有損焉請只風與日相與守河而河以爲未始其攖也恃源而往者也故水之守土也審影之守人也審物之守物也審故目之於明也殆耳之於聰也殆心之於殉也殆凡能其於府也殆殆之成也不給改禍之長也兹萃其反也縁功其果也待乆而人以爲己寳不亦悲乎故有亡國戮民無已不知問是也故足之於地也踐雖踐恃其所不蹍而後善博也人之於知也少雖少恃其所不知而後知天之所謂也知大一知大陰知大目知大均知大方知大信知大定至矣大一通之大陰解之大目視之大均縁之大方體之大信稽之大定持之盡有天循有照宜有樞始有彼則其解之也似不解之者其知之也似不知之也不知而後知之其問之也不可以有崖而不可以無崖頡滑有實古今不代而不可以虧則可不謂有大揚搉乎闔不亦問是已奚惑然爲以不惑解惑復於不惑是尚大不惑雜篇則陽第二十五則陽游於楚夷節言之於王王未之見夷節歸彭陽見王果曰夫子何不譚我於王王果曰我不若公閲休彭陽曰公閲休奚爲者邪曰冬則擉鼈于江夏則休乎山樊有過而問者曰此予宅也夫夷節已不能而況我乎吾又不若夷節夫夷節之爲人也無德而有知不自許以之神其交固顛冥乎富貴之地非相助以德相助消也夫凍者假衣於春暍者反冬乎冷風夫楚王之爲人也形尊而嚴其於罪也無赦如虎非夫佞人正德其孰能撓焉故聖人其窮也使家人忘其貧其達也使王公忘爵禄而化卑其於物也與之爲娱矣其於人也樂物之通也保己焉故或不言而飲人以和與人並立而使人化父子之宜彼其乎歸居而一間其所施其於外人心者若是其遠也故曰待公閲休聖人達綢繆周盡一體矣而不知其然性也復命摇作而以天爲師人則從而命之也憂乎知而所行恒無幾時其有止也若之何生而美者人與之鑑不告則不知其美於人也若知之若不知之若聞之若不聞之其可喜也終無已人之好之亦無已性也聖人之愛人也人與之名不告則不知其愛人也若知之若不知之若聞之若不聞之其愛人也終無已人之安之亦無已性也舊國舊都望之暢然雖使丘陵草木之緡入之者十九猶之暢然况見見聞聞者也以十仞之臺縣衆間者也冉相氏得其環中以隨成與物無終無始無幾無時日與物化者一不化者也闔嘗舍之夫師天而不得師天與物皆殉其以爲事也若之何夫聖人未始有天未始有人未始有始未始有物與世偕行而不替所行之備而不洫其合之也若之何湯得其司御門尹登恒爲之傳之從師而不囿得其隨成爲之司其名之名嬴法得其兩見仲尼之盡慮爲之傳之容成民曰除日無歲無内無外魏瑩與田侯牟約田侯牟背之魏瑩怒將使人刺之犀首聞而恥之曰君爲萬乘之君也而以匹夫從讎衍請受甲二十萬爲君攻之虜其人民係其牛馬使其君内熱發於背然後拔其國忌也出走然後抶其背折其脊季子聞而恥之曰築十仞之城城者旣十仞矣則又壞之此胥靡之所苦也今兵不起七年矣此王之基也衍亂人不可聽也華子聞而醜之曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也君曰然則若何曰君求其道而已矣惠子聞之而見戴晋人晋人曰有所謂蝸者君知之乎曰然有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反君曰噫其虚言與曰臣請爲君實之君以意在四方上下有窮乎君曰無窮曰知遊心於無窮而反在通達之國若存若亡乎君曰然曰通達之中有魏於魏中有梁於梁中有王王與蠻氏有辯乎君曰無辯客出而君倘然若有亡也客出惠子見君曰客大人也聖人不足以當之惠子曰夫吹管也猶有嗃也吹劍首者吷而已矣堯舜人之所譽也道堯舜於戴晋人之前譬猶一吷也孔子之楚舍於蟻丘之漿其鄰有夫妻臣妾登極者子路曰是稯稯何爲者邪仲尼曰是聖人僕也是自埋於民自藏於畔其聲銷其志無窮其口雖言其心未嘗言方且與世違而心不屑與之俱是陸沈者也是其市南宜僚邪子路請往召之孔子曰已矣彼知丘之著於己也知丘之適楚也以丘爲必使楚王之召己也彼且以丘爲佞人也夫若然者其於佞人也羞聞其言而況親見其身乎而何以爲存子路往視之其室虚矣長梧封人問子牢曰君爲政焉勿鹵莽治民焉勿滅裂昔予爲禾耕而鹵莽之則其實亦鹵莽而報予芸而滅裂之其實亦滅裂而報予予來年變齊深其耕而熱耰之其禾蘩以滋予終年厭飱莊子聞之曰今人之治其形理其心多有似封人之所謂遁其天離其性滅其情亡其神以衆爲故鹵莽其性者欲惡之孽爲性萑葦蒹葭始萌以扶吾形尋擢吾性並潰漏發不擇所出漂疽疥癕内熱溲膏是也栢矩學於老聃曰請之天下遊老聃曰已矣天下猶是也又請之老聃曰汝將何始曰始於齊至齊見辜人焉推而彊之解朝服而幕之號天而哭之曰子乎子乎天下有大菑子獨先離之曰莫爲盜莫爲殺人榮辱立然後覩所病皆財聚然後覩所爭今立人之所病聚人之所爭窮困人之身使無休時欲無至此得乎古之君人者以得爲在民以失爲在己以正爲在民以枉爲在己故一形有失其形者退而自責今則不然匿爲物而愚不識大爲難而罪不敢重爲任而罰不勝遠其塗而誅不至民知力竭則以僞繼之日出多僞士民安取不僞夫力不足則僞知不足則欺財不足則盜盜竊之行於誰責而可乎籧伯玉行年六十而六十化未嘗不始於是之而卒詘之以非也未知今之所謂是之非五十九非也萬物有乎生而莫見其根有乎出而莫見其門人皆尊其知之所知而莫知恃其知之所不知而後知可不謂大疑乎已乎已乎且無所逃此所謂然與然乎仲尼問於太史大弢伯常騫狶韋曰夫衛靈公飲酒湛樂不聽國家之政田獵畢弋不應諸侯之際其所以爲靈公者何邪大弢曰是因是也伯常騫曰夫靈公有妻三人同濫而浴史鰌奉御而進所搏幣而扶冀其慢若彼之甚也見賢人若此其肅也是其所以爲靈公也狶韋曰夫靈公也死卜塟於故墓不吉卜塟於沙丘而吉掘之數仞得石槨焉洗而視之有銘焉曰不馮其子靈公奪而埋之夫靈公之爲靈也乆矣之二人何足以識之少知問於太公調曰何謂丘里之言太公調曰丘里者合十姓百名而以爲風俗也合異以爲同散同以爲異今指馬之百體而不得馬而馬係於前者立其百體而謂之馬也是故丘山積卑而爲高江河合水而爲大大人合并而爲公是以自外入者有主而不執由中出者有正而不距四時殊氣天不賜故歲成五官殊職君不私故國治文武大人不賜故德備萬物殊理道不私故無名無名故無爲無爲而無不爲時有終始世有變化禍福淳淳至有所拂者而有所宜自殉殊面有所正者有所差比于大澤百財皆度觀乎大山木石同壇此之謂丘里之言少知曰然則謂之道足乎太公調曰不然今計物之數不止於萬物而期曰萬物者以數之多者號而讀之也是故天地者形之大者也陰陽者氣之大者也道者爲之公因其大以號而讀之則可也已有之矣乃將得比哉則若以斯辯譬猶狗馬其不及遠矣少知曰四方之内六合之裏萬物之所生惡起太公調曰陰陽相照相蓋相治四時相代相生相殺欲惡去就於是橋起雌雄片合於是庸有安危相易禍福相生緩急相摩聚散以成此名實之可紀精之可志也隨序之相理橋運之相使窮則反終則始此物之所有言之所盡知之所至極物而已覩道之人不隨其所廢不原其所起此議之所止少知曰委眞之莫爲接子之或使二家之議孰正於其情孰徧於其理太公調曰雞鳴狗吠是人之所知雖有大知不能以言讀其所自化又不能以意其所將爲斯而析之精至於無倫大至於不可圍或之使莫之爲未免於物而終以爲過或使則實莫爲則虚有名有實是物之居無名無實在物之虚可言可意言而愈疏未生不可忌已死不可阻死生非遠也埋不可覩或之使莫之爲疑之所假吾觀之本其往無窮吾求之末其來無止無窮無止言之無也與物同埋或使莫爲言之本也與物終始道不可有有不可無道之爲名所假而行或使莫爲在物一曲夫胡爲於大方言而足則終日言而盡道言而不足則終日言而盡物道物之極言默不足以載非言非默議有所極南華眞經卷之四
