  - {type: variant, offset: 11617, length: 52, content: 無爲者非拱黙之謂也直各任其自爲則性命安矣不得巳者非迫於威刑也直抱道懷朴任乎必然之極而天下自賔也莅音利又音, HFL: ''}
  - {type: variant, offset: 11618, length: 0, content: '', ZTDZ: 端崖之辭時恣縱而不儻不以觭見之也以天下}
  - {type: substitution, offset: 11618, original: 爲, replacement: 為, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19875}}
  - {type: variant, offset: 11619, length: 0, content: '', ZTDZ: 沉濁不可與莊語以卮言爲曼衍以重言爲眞以寓言爲廣獨與天地精神往來而不敖倪於萬物不譴是非以與世俗處其書雖壞瑋而連抃無傷也其辭雖參差而諔詭可觀彼其充實不可以已上與造物}
  - {type: punctuation, offset: 11620, content: /, id: KR5c0051_krp_004-bkkpn1086}
  - {type: variant, offset: 11620, length: 3, content: 非拱黙, ZTDZ: 遊而下與外死生無終始者爲友其於本也弘大而闢深閎而肆其於宗也可謂調適而上遂矣雖然其應於化而解於物也其理不竭其來不蜕芒乎昧乎未之盡者惠施多方其書五車其道舛駁其言也不中歷物之意曰至大無外謂之大一至小無内謂之小一無厚不可積也其大千里天與地卑山與澤平日方中方睨物方生方死大同而與小同異此}
