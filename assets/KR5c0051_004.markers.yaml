  - {type: variant, offset: 32, length: 2, content: 性哉, ZTDZ: 左右曰有君曰令余且會朝明日余且朝君曰漁何得對曰且之網得白龜焉其圓五尺吾曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑽}
  - {type: variant, offset: 35, length: 1, content: 侈, ZTDZ: 無遺筴仲尼曰神龜能見夢}
  - {type: variant, offset: 37, length: 9, content: 德附贅縣疣出乎形哉, ZTDZ: 元君}
